<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS AUTHORITY | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0047AB; --danger: #ef4444; --success: #22c55e; --dark: #0f172a; }
        * { box-sizing: border-box; text-transform: uppercase; transition: 0.2s; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; margin: 0; }

        /* HEADER & HERO */
        .top-nav { background: var(--danger); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-weight: 800; }
        .hero { background: var(--dark); color: white; padding: 30px 20px; text-align: center; border-bottom: 5px solid var(--primary); }
        #live-clock { font-size: 3rem; font-weight: 800; margin: 0; letter-spacing: -2px; }

        /* SEARCH BAR */
        .search-container { padding: 20px; }
        .search-box { background: white; padding: 15px; border-radius: 15px; display: flex; border: 2px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .search-box input { border: none; width: 100%; outline: none; font-weight: 800; font-family: inherit; font-size: 1rem; }

        /* REGISTRATION FORM */
        .reg-box { background: white; margin: 0 20px 20px; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; }
        .reg-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-weight: 700; font-family: inherit; }
        .file-input { font-size: 0.7rem; border: none; padding: 5px; }
        .btn-main { background: var(--primary); color: white; padding: 15px; width: 100%; border: none; border-radius: 10px; margin-top: 10px; font-weight: 800; cursor: pointer; }

        /* TABLE */
        .table-wrap { background: white; margin: 20px; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
        .scroll { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { background: #f8fafc; padding: 15px; text-align: left; font-size: 0.65rem; color: #94a3b8; border-bottom: 1px solid #e2e8f0; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.8rem; font-weight: 700; }
        
        .student-pic { width: 45px; height: 45px; border-radius: 50%; background: #eee; object-fit: cover; border: 2px solid var(--primary); }
        .btn-action { padding: 8px 12px; border-radius: 8px; border: none; color: white; font-weight: 800; cursor: pointer; font-size: 0.6rem; margin-right: 5px; }
        .edit { background: var(--primary); }
        .del { background: var(--danger); }
    </style>
</head>
<body>

    <div id="main-ui">
        <div class="top-nav">
            <div>ESMS COMMAND</div>
            <div style="background:rgba(255,255,255,0.2); padding:4px 10px; border-radius:5px; font-size:0.7rem;">EUDES MEDIA</div>
        </div>

        <div class="hero"><h1 id="live-clock">00:00:00</h1></div>

        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="SEARCH BY NAME OR LIN NUMBER..." onkeyup="filterTable()">
            </div>
        </div>

        <div class="reg-box">
            <div class="reg-grid">
                <input type="text" id="inName" placeholder="NAME">
                <input type="text" id="inClass" placeholder="CLASS">
                <input type="number" id="inAge" placeholder="AGE">
                <input type="number" id="inTotal" placeholder="TOTAL FEES">
                <input type="file" id="inPhoto" class="file-input" accept="image/*">
            </div>
            <button class="btn-main" onclick="uploadAndSave()">SAVE NEW RECORD</button>
        </div>

        <div class="table-wrap">
            <div class="scroll">
                <table id="registryTable">
                    <thead>
                        <tr>
                            <th>LIN</th>
                            <th>PHOTO</th>
                            <th>NAME</th>
                            <th>CLASS</th>
                            <th>AGE</th>
                            <th>BALANCE</th>
                            <th>ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody id="stuBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const _URL = 'https://kjftrwuucjdnhfwesrup.supabase.co'; 
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const supabaseClient = supabase.createClient(_URL, _KEY);
        const schoolID = "PM001"; // Placeholder, set during login

        setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

        // SEARCH FUNCTION
        function filterTable() {
            let input = document.getElementById("searchInput").value.toUpperCase();
            let rows = document.getElementById("stuBody").getElementsByTagName("tr");
            for (let i = 0; i < rows.length; i++) {
                let lin = rows[i].getElementsByTagName("td")[0].textContent.toUpperCase();
                let name = rows[i].getElementsByTagName("td")[2].textContent.toUpperCase();
                rows[i].style.display = (name.includes(input) || lin.includes(input)) ? "" : "none";
            }
        }

        async function fetchRecords() {
            const { data } = await supabaseClient.from('students').select('*').order('name', {ascending:true});
            if(data) {
                document.getElementById('stuBody').innerHTML = data.map((s, i) => {
                    const lin = `#${(i+1).toString().padStart(3,'0')}`;
                    const bal = (s.total_fees || 0) - (s.paid_fees || 0);
                    return `
                        <tr>
                            <td>${lin}</td>
                            <td><img src="${s.photo_url || 'https://via.placeholder.com/50'}" class="student-pic"></td>
                            <td style="color:var(--primary)">${s.name}</td>
                            <td>${s.class || '--'}</td>
                            <td>${s.age || '--'}</td>
                            <td style="color:${bal > 0 ? 'red' : 'green'}">${bal.toLocaleString()}</td>
                            <td>
                                <button class="btn-action edit" onclick="editRow('${s.id}')">EDIT</button>
                                <button class="btn-action del" onclick="delRow('${s.id}')">DEL</button>
                            </td>
                        </tr>`;
                }).join('');
            }
        }

        async function uploadAndSave() {
            const file = document.getElementById('inPhoto').files[0];
            let photoUrl = "";

            if (file) {
                const fileName = `${Date.now()}_${file.name}`;
                const { data, error } = await supabaseClient.storage.from('student-photos').upload(fileName, file);
                if (data) {
                    const { data: urlData } = supabaseClient.storage.from('student-photos').getPublicUrl(fileName);
                    photoUrl = urlData.publicUrl;
                }
            }

            const { error } = await supabaseClient.from('students').insert([{
                name: document.getElementById('inName').value,
                class: document.getElementById('inClass').value,
                age: document.getElementById('inAge').value,
                total_fees: document.getElementById('inTotal').value,
                photo_url: photoUrl,
                school_id: schoolID
            }]);

            if(!error) { alert("SAVED!"); fetchRecords(); }
        }

        async function delRow(id) {
            if(confirm("DELETE RECORD?")) {
                await supabaseClient.from('students').delete().eq('id', id);
                fetchRecords();
            }
        }

        fetchRecords();
    </script>
</body>
</html>
