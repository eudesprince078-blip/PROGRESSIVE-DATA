<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eudes Media Control Center</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #003366; --gold: #ffc107; --white: #ffffff; --green: #2b9348; --red: #d90429; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--white); margin: 0; padding: 0; color: #333; }
        
        #loginGate { position:fixed; inset:0; background:var(--blue); z-index:2000; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px; }
        .header { background: var(--blue); color: white; padding: 15px; position: sticky; top: 0; z-index: 1000; border-bottom: 4px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        
        .hero { background: #001a33; padding: 20px; text-align: center; color: white; border-bottom: 4px solid var(--blue); }
        #clock { font-size: 32px; font-weight: 800; color: var(--gold); }

        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; margin-top: -30px; }
        .stat-card { background: white; padding: 12px; border-radius: 12px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 4px solid var(--blue); }
        .stat-val { font-size: 18px; font-weight: 900; color: var(--blue); display: block; }

        .nav-tabs { display: flex; background: var(--blue); position: sticky; top: 65px; z-index: 999; }
        .tab { flex: 1; text-align: center; padding: 15px; font-size: 10px; font-weight: 800; color: rgba(255,255,255,0.5); cursor: pointer; display: none; }
        .tab.active { color: var(--gold); border-bottom: 4px solid var(--gold); background: rgba(0,0,0,0.2); }
        .visible-tab { display: block !important; }

        .card { background: white; border-radius: 12px; padding: 15px; margin: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); border-left: 6px solid var(--blue); }
        
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px; font-weight: 600; box-sizing: border-box; }
        label { font-size: 10px; font-weight: 800; color: var(--blue); text-transform: uppercase; display: block; margin-bottom: 2px; }
        
        .btn-main { width: 100%; background: var(--blue); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loginGate">
    <div style="background:white; padding:5px; border-radius:50%; margin-bottom:10px;"><img src="https://via.placeholder.com/50" style="width:50px;"></div>
    <h1 style="color:white; margin:0; letter-spacing:1px;">SYSTEM ACCESS</h1>
    <p style="color:var(--gold); font-size:10px; font-weight:800;">EUDES MEDIA CONTROL CENTER</p>
    <input id="passKey" type="text" placeholder="ENTER ACCESS KEY" style="text-align:center; max-width:300px; border:3px solid var(--gold); margin-top:20px;">
    <button onclick="login()" class="btn-main" style="max-width:300px; background:var(--gold); color:var(--blue);">AUTHENTICATE</button>
</div>

<div id="app" class="hidden">
    <div class="header">
        <div><b id="sch_name_display">SCHOOL NAME</b><br><span id="role_display" style="font-size:9px; color:var(--gold);">LEVEL</span></div>
        <button onclick="location.reload()" style="background:var(--red); color:white; border:none; padding:8px 15px; border-radius:8px; font-weight:900;">LOGOUT</button>
    </div>

    <div class="hero">
        <div id="clock">00:00:00</div>
        <div style="font-size:10px; font-weight:900; margin-top:5px;">● SCHOOL IN SESSION</div>
    </div>

    <div class="dashboard">
        <div class="stat-card"><span class="stat-val" id="s_tot">0</span><span style="font-size:8px; font-weight:800;">ENROLLED</span></div>
        <div class="stat-card"><span class="stat-val" id="s_pres" style="color:var(--green)">0</span><span style="font-size:8px; font-weight:800;">PRESENT</span></div>
        <div class="stat-card"><span class="stat-val" id="s_abs" style="color:var(--red)">0</span><span style="font-size:8px; font-weight:800;">ABSENT</span></div>
    </div>

    <div class="nav-tabs">
        <div class="tab" id="t-sum" onclick="showView('sum')">Director</div>
        <div class="tab" id="t-rec" onclick="showView('rec')">Records</div>
        <div class="tab" id="t-adm" onclick="showView('adm')">Admission</div>
        <div class="tab" id="t-roll" onclick="showView('roll')">Roll-Call</div>
    </div>

    <div id="v-sum" class="hidden">
        <div class="card" style="background:var(--blue); color:white;">
            <h4 style="color:var(--gold); margin-top:0;">FINANCIAL STANDING</h4>
            <div id="dir_fin">Calculating...</div>
        </div>
        <div class="card">
            <h4>DAILY ABSENTEE REPORT</h4>
            <div id="absent_list">None</div>
        </div>
    </div>

    <div id="v-rec" class="hidden">
        <div style="padding:15px;"><input id="search" placeholder="Search LIN or Name..." oninput="render()"></div>
        <div id="list"></div>
    </div>

    <div id="v-adm" class="hidden">
        <div class="card">
            <h3>REGISTRATION</h3>
            <input type="hidden" id="edit_id">
            <label>Name</label><input id="a_name">
            <label>LIN (Auto-generated)</label><input id="a_lin" readonly placeholder="System will generate">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Age</label><input id="a_age" type="number"></div>
                <div><label>DOB</label><input id="a_dob" type="date"></div>
            </div>
            <label>Class</label><select id="a_class"><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
            <label>Physical Location</label><input id="a_loc">
            <label>Health Status</label><input id="a_health" value="Healthy">
            <label>Contact Number</label><input id="a_phone">
            <label>Fees Expected</label><input id="a_exp" type="number">
            <button onclick="save()" class="btn-main">SAVE STUDENT</button>
        </div>
    </div>

    <div id="v-roll" class="hidden">
        <div id="roll_body"></div>
    </div>

    <div style="text-align:center; padding:20px; font-size:10px; font-weight:800; color:#ccc;">EUDES MEDIA | +256762992440</div>
</div>

<script>
    const S_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
    const _client = supabase.createClient(S_URL, S_KEY);

    let data = [];
    let activeSchool = "PM001"; 
    let activeRole = "";

    async function login() {
        const key = document.getElementById('passKey').value.trim().toUpperCase();
        
        // Logic for PM001 and future auto-keys
        if(key === "PM2026") { activeRole = "Admin"; }
        else if(key === "FINANCE256") { activeRole = "Finance"; }
        else if(key === "TEACHER2026") { activeRole = "Teacher"; }
        else { alert("INVALID KEY"); return; }

        document.getElementById('role_display').innerText = activeRole.toUpperCase();
        document.getElementById('sch_name_display').innerText = "PROGRESSIVE MOTHER'S SCHOOL";
        
        const tabs = { Admin:['sum','rec','adm','roll'], Finance:['rec','adm'], Teacher:['roll','adm'] };
        tabs[activeRole].forEach(t => document.getElementById('t-'+t).classList.add('visible-tab'));
        
        await load();
        document.getElementById('loginGate').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        showView(tabs[activeRole][0]);
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
    }

    async function load() {
        const { data: res, error } = await _client.from('students').select('*').eq('school_id', activeSchool).order('name');
        if(!error) { data = res; render(); updateStats(); }
    }

    function updateStats() {
        let exp = 0, paid = 0;
        data.forEach(s => { exp += (s.fees_expected || 0); paid += (s.fees_paid || 0); });
        document.getElementById('s_tot').innerText = data.length;
        document.getElementById('s_pres').innerText = data.filter(s => !s.is_absent).length;
        document.getElementById('s_abs').innerText = data.filter(s => s.is_absent).length;
        document.getElementById('dir_fin').innerHTML = `Expected: UGX ${exp.toLocaleString()}<br>Paid: UGX ${paid.toLocaleString()}<br>Balance: UGX ${(exp-paid).toLocaleString()}`;
    }

    function render() {
        const q = document.getElementById('search').value.toLowerCase();
        document.getElementById('list').innerHTML = data.filter(s => s.name.toLowerCase().includes(q)).map(s => `
            <div class="card" onclick="edit('${s.id}')">
                <b>${s.name}</b><br><small>${s.class} | LIN: ${s.lin}</small>
            </div>
        `).join('');
    }

    async function save() {
        const payload = {
            school_id: activeSchool,
            name: document.getElementById('a_name').value.toUpperCase(),
            lin: "PM-"+Math.floor(1000+Math.random()*9000),
            age: document.getElementById('a_age').value,
            dob: document.getElementById('a_dob').value,
            class: document.getElementById('a_class').value,
            location: document.getElementById('a_loc').value,
            health_status: document.getElementById('a_health').value,
            contact: document.getElementById('a_phone').value,
            fees_expected: parseInt(document.getElementById('a_exp').value) || 0
        };
        await _client.from('students').insert([payload]);
        alert("STUDENT REGISTERED");
        load();
    }

    function showView(v) {
        ['v-sum','v-rec','v-adm','v-roll'].forEach(i => document.getElementById(i).classList.add('hidden'));
        document.getElementById('v-'+v).classList.remove('hidden');
    }
</script>
</body>
</html>
