<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS ELITE | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #0052cc; --bg: #f8fafc; --sidebar-bg: #020617; --white: #ffffff; --text: #1e293b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* MULTI-TENANT LOGIN OVERLAY */
        #auth-screen { position: fixed; inset: 0; background: radial-gradient(circle at top right, #1e3a8a, #0f172a); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--white); padding: 40px; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
        .auth-icon { background: var(--primary); width: 70px; height: 70px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; color: white; font-size: 1.8rem; }

        /* RESPONSIVE LAYOUT */
        .app-container { display: flex; flex: 1; height: 100%; overflow: hidden; }
        
        .sidebar { width: 260px; background: var(--sidebar-bg); display: flex; flex-direction: column; padding: 30px 15px; flex-shrink: 0; transition: 0.3s; }
        @media (max-width: 768px) { .sidebar { width: 70px; padding: 20px 10px; } .nav-text, .side-footer, .sch-info { display: none; } }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-bar { height: 70px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; flex-shrink: 0; }

        /* NAVIGATION */
        .nav-link { width: 100%; display: flex; align-items: center; padding: 15px; color: #94a3b8; border-radius: 12px; margin-bottom: 8px; border: none; background: transparent; cursor: pointer; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; transition: 0.2s; }
        .nav-link i { font-size: 1.2rem; min-width: 30px; }
        .nav-link.active { background: var(--primary); color: white; box-shadow: 0 8px 15px rgba(0, 82, 204, 0.2); }

        /* DASHBOARD & FORMS */
        .view-panel { flex: 1; padding: 25px; overflow-y: auto; }
        .card { background: white; border-radius: 20px; padding: 25px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 8px; }
        input, select { width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #f1f5f9; background: #f8fafc; font-weight: 700; outline: none; }
        input:focus { border-color: var(--primary); background: white; }

        .btn-primary { background: var(--primary); color: white; padding: 16px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase; letter-spacing: 1px; }

        /* TABLE DESIGN */
        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { text-align: left; padding: 15px; color: #64748b; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; border-bottom: 2px solid #f1f5f9; }
        td { padding: 15px; font-weight: 700; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <div class="auth-icon"><i class="fas fa-shield-halved"></i></div>
            <h2 style="font-weight: 900; letter-spacing: -1px; margin-bottom: 5px;">ESMS ELITE</h2>
            <p style="font-size: 0.6rem; color: #94a3b8; font-weight: 800; margin-bottom: 30px;">EUDES MEDIA | UGANDA BASED SYSTEM</p>
            
            <div style="text-align: left; margin-bottom: 15px;">
                <label>SCHOOL ID</label>
                <input type="text" id="login-id" placeholder="e.g. PM001" style="text-align: center;">
            </div>
            <div style="text-align: left; margin-bottom: 25px;">
                <label>ACCESS PIN</label>
                <input type="password" id="login-pin" placeholder="••••••" style="text-align: center;">
            </div>
            
            <button class="btn-primary" onclick="verifyAccess()" id="unlock-btn">UNLOCK SYSTEM</button>
            <p id="auth-err" style="color: #ef4444; font-size: 0.65rem; font-weight: 800; margin-top: 20px;"></p>
        </div>
    </div>

    <div class="app-container hidden" id="app-shell">
        <aside class="sidebar">
            <div class="sch-info" style="margin-bottom: 40px; text-align: center; color: white;">
                <img id="sch-logo" src="" style="max-height: 50px; border-radius: 10px; margin-bottom: 15px;" onerror="this.style.display='none'">
                <h3 id="side-name" style="font-size: 0.8rem; font-weight: 900;"></h3>
            </div>
            
            <nav style="flex: 1;">
                <button class="nav-link active" onclick="nav('dash', this)"><i class="fas fa-grid-2"></i><span class="nav-text">Dashboard</span></button>
                <button class="nav-link" onclick="nav('reg', this)"><i class="fas fa-user-plus"></i><span class="nav-text">Enrollment</span></button>
                <button class="nav-link" onclick="nav('list', this)"><i class="fas fa-users-rectangle"></i><span class="nav-text">Directory</span></button>
            </nav>

            <div class="side-footer" style="padding: 20px; background: rgba(255,255,255,0.05); border-radius: 15px;">
                <p style="color: #64748b; font-size: 0.55rem; font-weight: 800; margin-bottom: 5px;">SYSTEM BY EUDES MEDIA</p>
                <p style="color: white; font-size: 0.75rem; font-weight: 800;">+256 762 992440</p>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h2 id="header-title" style="font-weight: 900; font-size: 1rem; color: var(--primary);"></h2>
                <div style="background: #eff6ff; color: #1e40af; padding: 8px 15px; border-radius: 10px; font-size: 0.65rem; font-weight: 900;">OFFICIAL PORTAL</div>
            </header>

            <div class="view-panel">
                <div id="v-dash">
                    <div class="card" style="display: flex; align-items: center; gap: 20px; max-width: 400px;">
                        <div style="background: #f0f7ff; padding: 20px; border-radius: 15px;"><i class="fas fa-user-graduate" style="color: var(--primary); font-size: 1.5rem;"></i></div>
                        <div><h2 id="total-count" style="font-size: 2rem; font-weight: 900;">0</h2><label>TOTAL LEARNERS</label></div>
                    </div>
                </div>

                <div id="v-reg" class="hidden">
                    <div class="card">
                        <h3 style="font-weight: 900; margin-bottom: 25px; color: var(--primary);">NEW LEARNER REGISTRATION</h3>
                        <div class="form-grid">
                            <div><label>Full Name</label><input type="text" id="f-name"></div>
                            <div><label>Age</label><input type="number" id="f-age"></div>
                            <div><label>Date of Birth</label><input type="date" id="f-dob"></div>
                            <div><label>Physical Location</label><input type="text" id="f-loc"></div>
                            <div><label>Health Status</label><input type="text" id="f-health" value="NORMAL"></div>
                            <div><label>Class</label><select id="f-class"><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select></div>
                            <div><label>Contact Number</label><input type="tel" id="f-tel" value="+256 "></div>
                            <div><label>System LIN (Auto)</label><input type="text" id="f-lin" readonly style="color: var(--primary); font-family: monospace;"></div>
                        </div>
                        <button class="btn-primary" onclick="submitData()" id="save-btn">CONFIRM REGISTRATION</button>
                    </div>
                </div>

                <div id="v-list" class="hidden">
                    <div class="card">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 15px;">
                            <h3 style="font-weight: 900;">STUDENT DIRECTORY</h3>
                            <input type="text" placeholder="SEARCH DIRECTORY..." style="max-width: 300px;" onkeyup="filterList(this)">
                        </div>
                        <div class="table-container">
                            <table id="main-table">
                                <thead><tr><th>Learner Name</th><th>LIN Number</th><th>Class</th><th>Location</th><th>Health</th><th>Contact</th></tr></thead>
                                <tbody id="table-body"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        let db; 
        let ACTIVE_SCH = "";

        async function verifyAccess() {
            const btn = document.getElementById('unlock-btn');
            const err = document.getElementById('auth-err');
            const schId = document.getElementById('login-id').value.toUpperCase().trim();

            if(!schId) return err.innerText = "SCHOOL ID REQUIRED";
            btn.innerText = "AUTHENTICATING..."; btn.disabled = true;

            try {
                db = supabase.createClient(SB_URL, SB_KEY);
                const { data: school, error } = await db.from('Schools').select('*').eq('sch_id', schId).single();
                
                if (error || !school) throw new Error("ACCESS DENIED: INVALID ID");

                ACTIVE_SCH = schId;
                document.getElementById('side-name').innerText = school.school_name;
                document.getElementById('header-title').innerText = school.school_name;
                document.getElementById('sch-logo').src = school.logo_url;
                
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-shell').classList.remove('hidden');
                
                genLIN();
                loadList();
            } catch (e) {
                err.innerText = e.message;
                btn.innerText = "RETRY UNLOCK"; btn.disabled = false;
            }
        }

        function genLIN() {
            document.getElementById('f-lin').value = "PMS-" + Math.floor(1000 + Math.random() * 9000);
        }

        async function loadList() {
            const { data } = await db.from('Students').select('*').eq('sch_id', ACTIVE_SCH);
            if(data) {
                document.getElementById('total-count').innerText = data.length;
                document.getElementById('table-body').innerHTML = data.map(r => `
                    <tr>
                        <td style="color:var(--primary);">${r.name}</td>
                        <td style="font-family:monospace; color:#64748b;">${r.lin}</td>
                        <td>${r.class}</td>
                        <td style="font-size:0.75rem;">${r.location}</td>
                        <td><span style="background:#fef3c7; color:#92400e; padding:4px 8px; border-radius:6px; font-size:0.65rem;">${r.health_status}</span></td>
                        <td style="font-size:0.8rem;">${r.contact}</td>
                    </tr>
                `).join('');
            }
        }

        async function submitData() {
            const btn = document.getElementById('save-btn');
            const payload = {
                sch_id: ACTIVE_SCH,
                name: document.getElementById('f-name').value.toUpperCase(),
                lin: document.getElementById('f-lin').value,
                age: document.getElementById('f-age').value,
                dob: document.getElementById('f-dob').value,
                health_status: document.getElementById('f-health').value.toUpperCase(),
                location: document.getElementById('f-loc').value.toUpperCase(),
                class: document.getElementById('f-class').value,
                contact: document.getElementById('f-tel').value
            };

            if(!payload.name) return alert("NAME IS REQUIRED");
            btn.innerText = "SAVING TO CLOUD..."; btn.disabled = true;

            const { error } = await db.from('Students').insert([payload]);
            if(!error) { alert("SUCCESSFULLY ENROLLED"); location.reload(); }
            else { alert(error.message); btn.innerText = "CONFIRM"; btn.disabled = false; }
        }

        function nav(v, b) {
            ['v-dash', 'v-reg', 'v-list'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('v-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            b.classList.add('active');
        }

        function filterList(input) {
            let val = input.value.toUpperCase();
            let rows = document.querySelectorAll("#table-body tr");
            rows.forEach(r => r.style.display = r.innerText.toUpperCase().includes(val) ? "" : "none");
        }
    </script>
</body>
</html>
