<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESMS Ultra | Eudes Media</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0047AB;
            --sidebar-bg: #0f172a;
            --main-bg: #f8fafc;
            --white: #ffffff;
            --card-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--main-bg);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            color: #1e293b;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 40px 25px;
            box-sizing: border-box;
            box-shadow: 5px 0 15px rgba(0,0,0,0.1);
        }

        .brand {
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--white);
            margin-bottom: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand span { color: var(--primary); }

        .nav-link {
            padding: 14px 18px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 8px;
            color: #94a3b8;
            transition: 0.3s;
            display: flex;
            align-items: center;
            font-weight: 600;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(255,255,255,0.05);
            color: white;
        }

        .nav-link.active {
            background: var(--primary);
            box-shadow: 0 4px 15px rgba(0, 71, 171, 0.4);
        }

        /* --- MAIN CONTENT --- */
        .main {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        /* --- TOP HEADER & CLOCK --- */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 40px;
        }

        #live-clock {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0;
            color: var(--sidebar-bg);
            letter-spacing: -1px;
        }

        #live-date {
            color: #64748b;
            font-weight: 600;
            margin: 0;
        }

        /* --- DASHBOARD CARDS --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--white);
            padding: 30px;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(255,255,255,0.7);
        }

        .stat-card small { color: #64748b; font-weight: 600; font-size: 0.85rem; }
        .stat-card h2 { margin: 10px 0 0; font-size: 2.5rem; font-weight: 800; color: var(--sidebar-bg); }

        .content-grid {
            display: grid;
            grid-template-columns: 1.2fr 2fr;
            gap: 30px;
        }

        .panel {
            background: var(--white);
            padding: 35px;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
        }

        /* --- FORM & TABLES --- */
        h3 { margin-top: 0; font-size: 1.3rem; margin-bottom: 25px; }

        input {
            width: 100%;
            padding: 15px;
            background: #f1f5f9;
            border: 2px solid transparent;
            border-radius: 14px;
            margin-bottom: 15px;
            box-sizing: border-box;
            font-family: inherit;
            transition: 0.2s;
        }

        input:focus { border-color: var(--primary); outline: none; background: white; }

        .btn-main {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 71, 171, 0.2);
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; padding: 15px; }
        td { padding: 18px 15px; border-bottom: 1px solid #f1f5f9; font-weight: 500; }
        
        .badge {
            background: #ecfdf5;
            color: #059669;
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 700;
        }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">EUDES<span>MEDIA</span></div>
        <div class="nav-menu">
            <div class="nav-link active">🏠 Dashboard</div>
            <div class="nav-link">🎓 Students</div>
            <div class="nav-link">📑 Mark Sheets</div>
            <div class="nav-link">⚙️ System Config</div>
        </div>
        <div style="margin-top: auto; padding-top: 20px;">
            <button onclick="location.reload()" style="background:rgba(255,255,255,0.1); border:none; color:white; width:100%; padding:12px; border-radius:10px; cursor:pointer;">Logout</button>
        </div>
    </div>

    <div class="main">
        <header class="header-bar">
            <div>
                <p id="live-date">---</p>
                <h1 id="live-clock">00:00:00</h1>
            </div>
            <div style="text-align: right;">
                <h2 id="school-name" style="margin:0; font-size: 1.5rem;">---</h2>
                <p id="school-motto" style="margin:0; color:#64748b;">---</p>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <small>ENROLLED PUPILS</small>
                <h2 id="pupil-count">0</h2>
            </div>
            <div class="stat-card">
                <small>LICENSE STATUS</small>
                <h2 style="color: #10b981; font-size: 1.6rem;">PREMIUM ACTIVE</h2>
            </div>
            <div class="stat-card">
                <small>SYSTEM ID</small>
                <h2 id="sys-id" style="font-size: 1.2rem; color: #94a3b8;">---</h2>
            </div>
        </div>

        <div class="content-grid">
            <div class="panel">
                <h3>Quick Admission</h3>
                <input type="text" id="pName" placeholder="Full Name">
                <input type="text" id="pLoc" placeholder="Physical Location">
                <button class="btn-main" onclick="register()">Add Student</button>
            </div>

            <div class="panel">
                <h3>Recent Activity</h3>
                <table>
                    <thead>
                        <tr><th>Student Name</th><th>Location</th><th>Status</th></tr>
                    </thead>
                    <tbody id="student-list">
                        <tr><td colspan="3" style="text-align:center; padding:30px;">Loading Data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SUPABASE_KEY = 'YOUR_ANON_KEY';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // This ID is used for Progressive Mothers
        const activeSchoolID = "EUDES-PM-2026";

        // LIVE CLOCK FUNCTION
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour12: false });
            const dateStr = now.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            
            document.getElementById('live-clock').innerText = timeStr;
            document.getElementById('live-date').innerText = dateStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // LOAD DASHBOARD DATA
        async function loadData() {
            // Get School Info
            const { data: school } = await _supabase.from('schools').select('*').eq('school_id', activeSchoolID).single();
            if(school) {
                document.getElementById('school-name').innerText = school.school_name;
                document.getElementById('school-motto').innerText = school.motto;
                document.getElementById('sys-id').innerText = school.school_id;
            }

            // Get Students
            const { count, data: students } = await _supabase.from('students').select('*', {count: 'exact'}).eq('school_id', activeSchoolID);
            document.getElementById('pupil-count').innerText = count || 0;

            const tbody = document.getElementById('student-list');
            if(students && students.length > 0) {
                tbody.innerHTML = students.slice(-5).reverse().map(s => `
                    <tr>
                        <td style="font-weight:700;">${s.name}</td>
                        <td style="color:#64748b;">${s.location || 'N/A'}</td>
                        <td><span class="badge">ACTIVE</span></td>
                    </tr>
                `).join('');
            } else {
                tbody.innerHTML = "<tr><td colspan='3' style='text-align:center'>No students yet.</td></tr>";
            }
        }

        async function register() {
            const name = document.getElementById('pName').value;
            const loc = document.getElementById('pLoc').value;
            if(!name) return alert("Enter Student Name");

            const { error } = await _supabase.from('students').insert([{
                name: name,
                location: loc,
                school_id: activeSchoolID
            }]);

            if(!error) {
                document.getElementById('pName').value = '';
                document.getElementById('pLoc').value = '';
                loadData();
            }
        }

        loadData();
    </script>
</body>
</html>
