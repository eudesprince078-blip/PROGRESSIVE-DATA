<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Progressive Mothers PMS v43</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #001a33; --red: #e63946; --gold: #ffc107; --white: #ffffff; --green: #25D366; --light: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 0; }
        
        /* Header & Hero */
        .header { background: var(--red); color: white; padding: 15px; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--gold); }
        .hero { background: var(--blue); color: white; padding: 20px 15px; text-align: center; border-bottom: 5px solid var(--gold); }
        #clock { font-size: 38px; font-weight: 900; letter-spacing: -1px; margin: 5px 0; }

        /* Dashboard */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 15px; margin-top: -30px; }
        .stat-card { background: white; padding: 12px 5px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-bottom: 4px solid var(--blue); }
        .stat-val { font-size: 22px; font-weight: 900; color: var(--blue); display: block; }
        .stat-lbl { font-size: 8px; font-weight: 800; color: #888; text-transform: uppercase; }

        /* Navigation */
        .nav-tabs { display: flex; background: white; border-bottom: 1px solid #ddd; position: sticky; top: 68px; z-index: 999; }
        .tab { flex: 1; text-align: center; padding: 15px 5px; font-weight: 900; font-size: 10px; color: #bbb; cursor: pointer; text-transform: uppercase; }
        .tab.active { color: var(--blue); border-bottom: 4px solid var(--blue); background: #fcfcfc; }

        /* Cards */
        .item-card { background: white; border-radius: 15px; padding: 15px; margin: 10px 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 8px solid var(--blue); position: relative; }
        .lin-badge { position: absolute; top: 10px; right: 10px; background: var(--blue); color: white; padding: 3px 8px; border-radius: 5px; font-size: 9px; font-weight: 900; }
        
        .action-btn { padding: 10px; border-radius: 8px; border: none; font-weight: 800; font-size: 11px; cursor: pointer; width: 100%; }
        .btn-call { background: var(--green); color: white; text-decoration: none; display: block; text-align: center; line-height: 1.4; }

        /* Inputs */
        input, select { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 15px; margin: 5px 0 12px 0; box-sizing: border-box; font-weight: 600; }
        label { font-size: 9px; font-weight: 800; color: var(--blue); text-transform: uppercase; }
        .hidden { display: none !important; }

        /* Printing Styles */
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; color: black; background: white; }
            table { width: 100%; border-collapse: collapse; margin-top: 20px; }
            th, td { border: 1px solid #000; padding: 8px; text-align: left; font-size: 12px; }
            .print-header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #000; padding-bottom: 10px; }
        }
    </style>
</head>
<body>

<div id="loginGate" style="position:fixed; inset:0; background:var(--blue); z-index:2000; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px;">
    <h2 style="color:white; font-weight:900; margin-bottom:20px;">SCHOOL ACCESS</h2>
    <input id="key" type="password" placeholder="ENTER ACCESS KEY" style="text-align:center; max-width:280px; border:3px solid var(--gold);">
    <button onclick="secureLogin()" style="background:var(--gold); color:var(--blue); padding:18px; width:100%; max-width:280px; border:none; border-radius:12px; font-weight:900;">LOGIN SYSTEM</button>
</div>

<div id="mainApp" class="hidden">
    <div id="printArea" class="hidden"></div>

    <div class="header">
        <div style="line-height:1.1;"><b style="font-size:12px;">PROGRESSIVE MOTHERS</b><br><span style="font-size:9px;">Nursery & Primary School</span></div>
        <button onclick="location.reload()" style="background:white; color:var(--red); border:none; padding:8px 12px; border-radius:8px; font-weight:900; font-size:11px;">LOGOUT</button>
    </div>

    <div class="hero">
        <div id="full-date" style="color:var(--gold); font-size:11px; font-weight:800;">DATE</div>
        <div id="clock">00:00:00</div>
    </div>

    <div class="dashboard">
        <div class="stat-card"><span class="stat-val" id="c-tot">0</span><span class="stat-lbl">Total</span></div>
        <div class="stat-card" style="border-bottom-color: var(--green);"><span class="stat-val" id="c-pres" style="color:var(--green)">0</span><span class="stat-lbl">Present</span></div>
        <div class="stat-card" style="border-bottom-color: var(--red);"><span class="stat-val" id="c-abs" style="color:var(--red)">0</span><span class="stat-lbl">Absent</span></div>
    </div>

    <div class="nav-tabs">
        <div class="tab" id="tab-rec" onclick="tab('rec')">Records</div>
        <div class="tab" id="tab-adm" onclick="tab('adm'); clearForm();">Admission</div>
        <div class="tab" id="tab-roll" onclick="tab('roll')">Attendance</div>
    </div>

    <div id="v-rec" class="hidden">
        <div style="padding:15px;">
            <input id="searchBar" placeholder="🔍 Search name or LIN..." oninput="renderUI()" style="margin-bottom:10px;">
            
            <div id="adminControls" class="hidden" style="display:flex; gap:10px;">
                <button onclick="generatePrint('present')" style="flex:1; background:var(--green); color:white; border:none; padding:12px; border-radius:10px; font-weight:900; font-size:11px;">PRINT PRESENT</button>
                <button onclick="generatePrint('absent')" style="flex:1; background:var(--red); color:white; border:none; padding:12px; border-radius:10px; font-weight:900; font-size:11px;">PRINT ABSENT</button>
            </div>
        </div>
        <div id="dataList"></div>
    </div>

    <div id="v-adm" class="hidden" style="padding:15px;">
        <div style="background:white; padding:20px; border-radius:20px; border:1px solid #ddd;">
            <h3 id="admTitle" style="margin:0 0 15px 0; color:var(--blue); font-size:13px;">REGISTRATION</h3>
            <input type="hidden" id="editId">
            <label>Name</label><input id="name">
            <label>LIN</label><input id="lin" readonly>
            <label>Class</label>
            <select id="cls">
                <option>Baby Class</option><option>Middle Class</option><option>Top Class</option>
                <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                <option>P.5</option><option>P.6</option><option>P.7</option>
            </select>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Age</label><input id="age" type="number"></div>
                <div><label>DOB</label><input id="dob" type="date"></div>
            </div>
            <label>Location</label><input id="location">
            <label>Contact</label><input id="contact">
            <label>Health Status</label><input id="health_status">
            
            <div id="financeSection">
                <label style="color:var(--red)">Expected Fees</label><input id="f_exp" type="number">
                <label style="color:var(--green)">Paid Fees</label><input id="f_paid" type="number">
            </div>
            <button onclick="submitData()" style="width:100%; background:var(--blue); color:white; padding:18px; border:none; border-radius:15px; font-weight:900;">SAVE STUDENT</button>
        </div>
    </div>

    <div id="v-roll" class="hidden">
        <div style="padding:15px;">
            <select id="rollClass" onchange="renderUI()" style="border:2px solid var(--blue);">
                <option value="">-- Choose Class --</option>
                <option>Baby Class</option><option>Middle Class</option><option>Top Class</option>
                <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                <option>P.5</option><option>P.6</option><option>P.7</option>
            </select>
        </div>
        <div id="rollData"></div>
    </div>
</div>

<script>
    const SUPA_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
    const _client = supabase.createClient(SUPA_URL, SUPA_KEY);
    let role = ""; let cachedData = [];

    function secureLogin() {
        const k = document.getElementById('key').value.trim().toUpperCase();
        if (k === "JESUS CARES") role = "Admin";
        else if (k === "FINANCE 256") role = "Finance";
        else if (k === "TEACH2026") role = "Teacher";
        else return alert("ACCESS DENIED");
        
        document.getElementById('loginGate').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        
        if(role === "Admin") document.getElementById('adminControls').classList.remove('hidden');
        tab(role === "Teacher" ? 'roll' : 'rec');
        loadData();
    }

    function tab(t) {
        ['v-adm','v-rec','v-roll'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById('v-'+t).classList.remove('hidden');
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active');
    }

    async function loadData() {
        const { data } = await _client.from('students').select('*').order('name');
        if(data) { cachedData = data; renderUI(); }
    }

    function renderUI() {
        // Stats
        const total = cachedData.length;
        const absent = cachedData.filter(s => s.is_absent === true).length;
        document.getElementById('c-tot').innerText = total;
        document.getElementById('c-abs').innerText = absent;
        document.getElementById('c-pres').innerText = total - absent;

        // Records
        const q = document.getElementById('searchBar').value.toLowerCase();
        const list = document.getElementById('dataList'); list.innerHTML = "";
        cachedData.filter(s => s.name.toLowerCase().includes(q) || (s.lin && s.lin.toLowerCase().includes(q))).forEach(s => {
            list.innerHTML += `<div class="item-card">
                <div class="lin-badge">${s.lin || 'NEW'}</div>
                <b>${s.name}</b><br><small>${s.class} | ${s.location}</small>
                <div style="margin-top:10px; display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                    <button class="action-btn" style="background:#eee" onclick="editMode('${s.id}')">DETAILS</button>
                    <a href="tel:${s.contact}" class="action-btn btn-call">CALL</a>
                </div>
            </div>`;
        });

        // Attendance
        const rCls = document.getElementById('rollClass').value;
        const rollList = document.getElementById('rollData'); rollList.innerHTML = "";
        cachedData.filter(s => s.class === rCls).forEach(s => {
            const isA = s.is_absent === true;
            rollList.innerHTML += `<div class="item-card" style="border-left-color:${isA?'var(--red)':'var(--green)'}">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b>${s.name}</b>
                    <button style="padding:10px; border-radius:10px; border:none; color:white; font-weight:900; min-width:90px; background:${isA?'var(--red)':'var(--green)'}" onclick="markAtt('${s.id}', ${!isA})">${isA?'ABSENT':'PRESENT'}</button>
                </div>
            </div>`;
        });
    }

    async function markAtt(id, status) {
        await _client.from('students').update({ is_absent: status }).eq('id', id);
        loadData();
    }

    // PRINT REPORT LOGIC
    function generatePrint(type) {
        const today = new Date().toLocaleDateString('en-GB');
        const list = cachedData.filter(s => type === 'present' ? !s.is_absent : s.is_absent);
        
        let html = `
            <div class="print-header">
                <h2>PROGRESSIVE MOTHERS NURSERY & PRIMARY SCHOOL</h2>
                <h3>DAILY ATTENDANCE REPORT: ${type.toUpperCase()} STUDENTS</h3>
                <p>Date: ${today} | Total: ${list.length}</p>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>LIN</th>
                        <th>Class</th>
                        <th>Parent Contact</th>
                    </tr>
                </thead>
                <tbody>
        `;

        list.forEach((s, i) => {
            html += `
                <tr>
                    <td>${i + 1}</td>
                    <td>${s.name}</td>
                    <td>${s.lin || 'N/A'}</td>
                    <td>${s.class}</td>
                    <td>${s.contact || 'N/A'}</td>
                </tr>
            `;
        });

        html += `</tbody></table><p style="margin-top:30px; font-size:10px; text-align:right;">Generated by Progressive PMS Administrator</p>`;
        
        const printBox = document.getElementById('printArea');
        printBox.innerHTML = html;
        window.print();
    }

    async function submitData() {
        const id = document.getElementById('editId').value;
        const sName = document.getElementById('name').value.trim();
        if(!sName) return alert("Name required");
        let lin = document.getElementById('lin').value || `PM${sName.charAt(0).toUpperCase()}${Math.floor(1000+Math.random()*9000)}`;
        
        const payload = { 
            name: sName, class: document.getElementById('cls').value, lin: lin,
            age: parseInt(document.getElementById('age').value)||0, dob: document.getElementById('dob').value||null,
            location: document.getElementById('location').value, contact: document.getElementById('contact').value,
            health_status: document.getElementById('health_status').value,
            fees_paid: parseInt(document.getElementById('f_paid').value)||0, fees_expected: parseInt(document.getElementById('f_exp').value)||0
        };
        const { error } = id ? await _client.from('students').update(payload).eq('id', id) : await _client.from('students').insert([payload]);
        if(!error) { alert("Saved!"); clearForm(); loadData(); tab('rec'); }
    }

    function editMode(id) {
        const s = cachedData.find(st => st.id === id);
        document.getElementById('editId').value = s.id;
        document.getElementById('name').value = s.name;
        document.getElementById('lin').value = s.lin;
        document.getElementById('cls').value = s.class;
        document.getElementById('age').value = s.age;
        document.getElementById('dob').value = s.dob;
        document.getElementById('location').value = s.location;
        document.getElementById('contact').value = s.contact;
        document.getElementById('health_status').value = s.health_status;
        document.getElementById('f_paid').value = s.fees_paid;
        document.getElementById('f_exp').value = s.fees_expected;
        tab('adm');
    }

    function clearForm() {
        document.getElementById('editId').value = "";
        ['name','lin','age','dob','location','contact','health_status','f_paid','f_exp'].forEach(f => document.getElementById(f).value = "");
    }

    setInterval(() => {
        const now = new Date();
        document.getElementById('full-date').innerText = now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
    }, 1000);
</script>
</body>
</html>
