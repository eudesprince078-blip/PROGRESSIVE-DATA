<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS AUTHORITY | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0047AB; --danger: #ef4444; --success: #22c55e; --dark: #0f172a; --accent: #f59e0b; }
        * { box-sizing: border-box; text-transform: uppercase; transition: 0.2s; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; margin: 0; color: #1e293b; }

        /* HEADER & TABS */
        .top-nav { background: var(--danger); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-weight: 800; border-bottom: 4px solid var(--dark); }
        .tab-bar { background: white; display: flex; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 1000; }
        .tab { flex: 1; padding: 15px; text-align: center; font-size: 0.65rem; font-weight: 800; color: #64748b; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); background: #f8fafc; }

        /* STATS */
        .hero { background: var(--dark); color: white; padding: 30px 20px; text-align: center; }
        #live-clock { font-size: 2.5rem; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 20px; margin-top: -25px; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-bottom: 4px solid #cbd5e1; }
        .stat-card b { display: block; font-size: 1.4rem; }

        /* FORMS & UI */
        .container { padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        label { display: block; font-size: 0.6rem; font-weight: 800; color: var(--primary); margin-bottom: 5px; }
        input { padding: 12px; border-radius: 10px; border: 1px solid #cbd5e1; font-weight: 700; width: 100%; font-family: inherit; }
        
        /* BUTTONS */
        .btn { padding: 12px 20px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; color: white; }
        .btn-save { background: var(--primary); width: 100%; font-size: 1rem; }
        .btn-edit { background: var(--primary); font-size: 0.6rem; padding: 6px 10px; }
        .btn-del { background: var(--danger); font-size: 0.6rem; padding: 6px 10px; }
        .btn-cancel { background: #64748b; width: 100%; margin-top: 10px; display: none; }

        /* LIST */
        .table-wrap { overflow-x: auto; background: white; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #f8fafc; padding: 12px; text-align: left; font-size: 0.65rem; color: #94a3b8; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 0.8rem; font-weight: 700; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div>ESMS AUTHORITY HUB</div>
        <div style="font-size:0.6rem; background:rgba(255,255,255,0.2); padding:5px 10px; border-radius:5px;">EUDES MEDIA | +256762992440</div>
    </div>

    <div class="tab-bar">
        <div class="tab active" onclick="showTab('dash')">DASHBOARD</div>
        <div class="tab" onclick="showTab('admission')">ADMISSION</div>
    </div>

    <div id="dash" class="tab-content">
        <div class="hero"><h1 id="live-clock">00:00:00</h1></div>
        <div class="stat-grid">
            <div class="stat-card"><b id="countT">0</b><span>PUPILS</span></div>
            <div class="stat-card"><b id="countP" style="color:var(--success);">0</b><span>CLEARED</span></div>
            <div class="stat-card"><b id="countB" style="color:var(--danger);">0</b><span>OWING</span></div>
        </div>
        <div class="container">
            <div class="card"><input type="text" id="searchBox" placeholder="SEARCH BY NAME OR LIN..." onkeyup="doSearch()"></div>
            <div class="table-wrap card">
                <table>
                    <thead>
                        <tr><th>LIN</th><th>NAME</th><th>CLASS</th><th>CONTACT</th><th>HEALTH</th><th>BALANCE</th><th>ACTION</th></tr>
                    </thead>
                    <tbody id="dashBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="admission" class="tab-content container" style="display:none;">
        <div class="card">
            <h3 id="formTitle" style="color:var(--primary);">NEW ENROLLMENT</h3>
            <div class="form-grid">
                <div><label>FULL NAME</label><input type="text" id="inName"></div>
                <div><label>CLASS</label><input type="text" id="inClass"></div>
                <div><label>CONTACT NUMBER</label><input type="text" id="inContact"></div>
                <div><label>HEALTH STATUS</label><input type="text" id="inHealth"></div>
                <div><label>AGE</label><input type="number" id="inAge"></div>
                <div><label>TOTAL FEES</label><input type="number" id="inFees"></div>
            </div>
            <button class="btn btn-save" id="saveBtn" onclick="handleDatabaseAction()">SAVE RECORD</button>
            <button class="btn btn-cancel" id="cancelBtn" onclick="clearAdmission()">CANCEL EDIT</button>
        </div>
    </div>

    <script>
        const _URL = 'https://kjftrwuucjdnhfwesrup.supabase.co'; 
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const client = supabase.createClient(_URL, _KEY);
        
        let allStudents = [];
        let activeEditId = null;

        setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

        function showTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display='none');
            document.querySelectorAll('.tab').forEach(c => c.classList.remove('active'));
            document.getElementById(t).style.display='block';
            event.target.classList.add('active');
            if(t === 'dash') fetchAll();
        }

        async function fetchAll() {
            const { data } = await client.from('students').select('*').order('name');
            allStudents = data || [];
            renderDash();
        }

        function renderDash() {
            let cleared = 0, owing = 0;
            document.getElementById('dashBody').innerHTML = allStudents.map(s => {
                const bal = (s.total_fees || 0) - (s.paid_fees || 0);
                if(bal <= 0) cleared++; else owing++;
                return `<tr>
                    <td>${s.lin || '---'}</td>
                    <td style="color:var(--primary)">${s.name}</td>
                    <td>${s.class}</td>
                    <td>${s.contact_number || '--'}</td>
                    <td>${s.health_status || 'GOOD'}</td>
                    <td style="color:${bal > 0 ? 'red' : 'green'}">${bal.toLocaleString()}</td>
                    <td>
                        <button class="btn btn-edit" onclick="setupEdit('${s.id}')">EDIT</button>
                        <button class="btn btn-del" onclick="setupDelete('${s.id}')">DEL</button>
                    </td>
                </tr>`;
            }).join('');
            document.getElementById('countT').innerText = allStudents.length;
            document.getElementById('countP').innerText = cleared;
            document.getElementById('countB').innerText = owing;
        }

        async function handleDatabaseAction() {
            const btn = document.getElementById('saveBtn');
            btn.innerText = "WAIT..."; btn.disabled = true;

            const payload = {
                name: document.getElementById('inName').value,
                class: document.getElementById('inClass').value,
                contact_number: document.getElementById('inContact').value,
                health_status: document.getElementById('inHealth').value,
                age: document.getElementById('inAge').value,
                total_fees: document.getElementById('inFees').value
            };

            let res;
            if(activeEditId) {
                res = await client.from('students').update(payload).eq('id', activeEditId);
            } else {
                res = await client.from('students').insert([payload]);
            }

            if(!res.error) {
                alert("SUCCESS");
                clearAdmission();
                showTab('dash');
            } else {
                alert("ERROR: " + res.error.message);
            }
            btn.innerText = "SAVE RECORD"; btn.disabled = false;
        }

        function setupEdit(id) {
            const s = allStudents.find(x => x.id === id);
            activeEditId = id;
            document.getElementById('inName').value = s.name || "";
            document.getElementById('inClass').value = s.class || "";
            document.getElementById('inContact').value = s.contact_number || "";
            document.getElementById('inHealth').value = s.health_status || "";
            document.getElementById('inAge').value = s.age || "";
            document.getElementById('inFees').value = s.total_fees || "";
            
            document.getElementById('formTitle').innerText = "EDITING STUDENT";
            document.getElementById('saveBtn').innerText = "UPDATE RECORD";
            document.getElementById('cancelBtn').style.display = "block";
            showTab('admission');
        }

        async function setupDelete(id) {
            if(confirm("DELETE PERMANENTLY?")) {
                await client.from('students').delete().eq('id', id);
                fetchAll();
            }
        }

        function clearAdmission() {
            activeEditId = null;
            document.querySelectorAll('#admission input').forEach(i => i.value = "");
            document.getElementById('formTitle').innerText = "NEW ENROLLMENT";
            document.getElementById('saveBtn').innerText = "SAVE RECORD";
            document.getElementById('cancelBtn').style.display = "none";
        }

        function doSearch() {
            let f = document.getElementById('searchBox').value.toUpperCase();
            let rows = document.getElementById('dashBody').getElementsByTagName('tr');
            for(let row of rows) row.style.display = row.innerText.toUpperCase().includes(f) ? "" : "none";
        }

        fetchAll();
    </script>
</body>
</html>
