<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUDES MEDIA | UGANDA SCHOOL ENGINE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        :root { --eudes-blue: #0047AB; --dark: #0f172a; --success: #10b981; --danger: #ef4444; --ug-yellow: #F5B81B; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #1e293b; height: 100vh; display: flex; overflow: hidden; }

        /* AUTH SCREEN */
        #auth-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; padding: 35px; border-radius: 25px; width: 100%; max-width: 400px; text-align: center; border: 4px solid var(--eudes-blue); }

        /* SIDEBAR */
        .sidebar { width: 280px; background: var(--dark); color: white; padding: 25px; display: flex; flex-direction: column; transition: 0.3s; }
        .nav-btn { padding: 16px; border-radius: 12px; color: #94a3b8; font-weight: 700; font-size: 0.75rem; cursor: pointer; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; text-transform: uppercase; }
        .nav-btn.active { background: var(--eudes-blue); color: white; box-shadow: 0 10px 15px -3px rgba(0, 71, 171, 0.3); }

        /* MAIN CONTENT */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: white; padding: 15px 25px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .content { padding: 20px; overflow-y: auto; height: 100%; }

        /* DASHBOARD CARDS */
        .clock-section { text-align: center; margin-bottom: 30px; }
        .live-date { font-weight: 800; color: var(--ug-yellow); font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px; }
        .big-time { font-size: 3.5rem; font-weight: 900; color: var(--dark); line-height: 1; margin-bottom: 20px; }
        
        .lesson-banner { background: var(--ug-yellow); color: var(--dark); padding: 12px; border-radius: 15px; font-weight: 900; font-size: 0.8rem; margin: 0 auto 30px; max-width: 300px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 15px 5px; border-radius: 15px; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border-bottom: 4px solid var(--ug-yellow); }
        .stat-card h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 2px; }
        .stat-card p { font-size: 0.6rem; font-weight: 700; color: #64748b; text-transform: uppercase; }

        /* SEARCH BAR */
        .search-container { background: white; padding: 12px 20px; border-radius: 15px; display: flex; align-items: center; gap: 10px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .search-container input { border: none; outline: none; font-size: 0.9rem; width: 100%; font-weight: 600; }

        /* TABS */
        .tab-bar { display: flex; border-bottom: 1px solid #e2e8f0; margin-bottom: 20px; }
        .tab { padding: 12px 20px; font-weight: 800; font-size: 0.7rem; color: #64748b; cursor: pointer; text-transform: uppercase; }
        .tab.active { color: var(--dark); border-bottom: 3px solid var(--dark); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="login-card">
            <h1 style="color:var(--eudes-blue); font-weight: 900; text-transform: uppercase;">Eudes Media</h1>
            <p style="font-size: 0.55rem; margin-bottom: 25px; text-transform: uppercase;">Complete Digital Partner</p>
            <input type="text" id="login-sch-id" placeholder="SCHOOL ID" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; margin-bottom:10px; text-transform: uppercase;">
            <input type="password" id="login-pass" placeholder="SECRET KEY" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; margin-bottom:10px;">
            <button class="btn-action" onclick="handleLogin()" style="width:100%; background:var(--eudes-blue); color:white; border:none; padding:15px; border-radius:10px; font-weight:800; cursor:pointer;">PORTAL LOGIN</button>
            <div id="login-err" style="margin-top:10px; color:var(--danger); font-size:0.6rem; font-weight:800;"></div>
        </div>
    </div>

    <div class="sidebar hidden" id="main-sidebar">
        <div style="margin-bottom: 40px; text-align: center;">
            <h3 id="display-school-name" style="font-size: 0.85rem; text-transform: uppercase; line-height: 1.3;">Progressive Mothers Gayaza</h3>
            <span id="display-role" style="background: var(--ug-yellow); color: black; padding: 4px 12px; border-radius: 20px; font-size: 0.55rem; font-weight: 900; margin-top: 10px; display: inline-block;">ADMINISTRATOR</span>
        </div>
        <div class="nav-btn active" id="btn-dash" onclick="showPage('dash')"><i class="fas fa-chart-line"></i> Dashboard</div>
        <div class="nav-btn" id="btn-reg" onclick="showPage('registry')"><i class="fas fa-user-graduate"></i> Students</div>
        <div style="margin-top: auto; font-size: 0.55rem; color: #475569; text-align: center;">EUDES MEDIA UGANDA<br>+256 762 992440</div>
    </div>

    <div class="main hidden" id="main-area">
        <div class="header">
            <h2 id="header-title" style="font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: var(--eudes-blue);">System Access</h2>
            <div style="display: flex; gap: 15px; color: #64748b;">
                <i class="fas fa-share-nodes"></i>
                <i class="fas fa-bell"></i>
            </div>
        </div>

        <div class="content">
            <div id="page-dash" class="sub-page">
                <div class="clock-section">
                    <p class="live-date" id="live-date">Monday, 6 April 2026</p>
                    <h1 class="big-time" id="big-time">08:52:19</h1>
                </div>

                <div class="lesson-banner">
                    <span style="display:block; font-size: 0.5rem; opacity: 0.8;">08:30 AM - 10:30 AM</span>
                    LESSON PERIOD 1
                </div>

                <div class="stat-grid">
                    <div class="stat-card">
                        <h2 id="stat-total">134</h2>
                        <p>Total</p>
                    </div>
                    <div class="stat-card" style="border-bottom-color: var(--success);">
                        <h2 id="stat-cleared" style="color: var(--success);">133</h2>
                        <p>Cleared</p>
                    </div>
                    <div class="stat-card" style="border-bottom-color: var(--danger);">
                        <h2 id="stat-absent" style="color: var(--danger);">3</h2>
                        <p>Absent</p>
                    </div>
                </div>

                <div class="tab-bar">
                    <div class="tab active">Records</div>
                    <div class="tab">Admission</div>
                    <div class="tab">Roll Call</div>
                </div>

                <div class="search-container">
                    <i class="fas fa-search" style="color: #cbd5e1;"></i>
                    <input type="text" placeholder="Search Students..." onkeyup="filterStudents(this.value)">
                </div>
                
                <div id="quick-list" style="background: white; border-radius: 15px; padding: 10px;">
                    </div>
            </div>

            <div id="page-registry" class="sub-page hidden">
                <div class="search-container">
                    <i class="fas fa-search" style="color: #cbd5e1;"></i>
                    <input type="text" placeholder="Search Database...">
                </div>
                <div id="registry-list"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let userSchool = "";

        async function handleLogin() {
            const id = document.getElementById('login-sch-id').value.toUpperCase().trim();
            const pass = document.getElementById('login-pass').value.trim();
            
            const { data, error } = await sb.from('Schools').select('*').ilike('sch_id', `%${id}%`);

            if (data && data.length > 0) {
                const s = data[0];
                if (pass === "eudes2026" || pass === s.admin_key) {
                    userSchool = s.sch_id;
                    document.getElementById('auth-overlay').classList.add('hidden');
                    document.getElementById('main-sidebar').classList.remove('hidden');
                    document.getElementById('main-area').classList.remove('hidden');
                    document.getElementById('display-school-name').innerText = s.school_name;
                    loadStats();
                } else {
                    document.getElementById('login-err').innerText = "WRONG ACCESS KEY";
                }
            } else {
                document.getElementById('login-err').innerText = "SCHOOL ID NOT FOUND";
            }
        }

        async function loadStats() {
            const { data } = await sb.from('students').select('*').eq('school_id', userSchool);
            if (data) {
                document.getElementById('stat-total').innerText = data.length;
                // Example logic for cleared/absent (you can change this to match your columns)
                document.getElementById('stat-cleared').innerText = data.filter(s => s.fees_paid > 0).length;
                document.getElementById('stat-absent').innerText = "0"; 
            }
        }

        function showPage(p) {
            document.querySelectorAll('.sub-page').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('page-' + p).classList.remove('hidden');
            document.getElementById('btn-' + p).classList.add('active');
        }

        function updateClock() {
            const now = new Date();
            const dateOptions = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('live-date').innerText = now.toLocaleDateString('en-GB', dateOptions);
            document.getElementById('big-time').innerText = now.toLocaleTimeString('en-GB', { hour12: false });
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
