<script>
    const URL = "https://kjftrwuucjdnhfwesrup.supabase.co";
    const KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    let sb = null; // This starts as null
    let students = [];

    // 1. IMPROVED LOGIN: This now forces the connection
    function login() {
        const user = document.getElementById('u').value.trim().toUpperCase();
        const pass = document.getElementById('p').value.trim().toUpperCase();
        
        if(user === "PROGRESSIVE" && pass === "JESUS CARES") {
            // FORCE INITIALIZATION HERE
            try {
                sb = supabase.createClient(URL, KEY);
                console.log("Database Connected");
            } catch (err) {
                alert("Connection Error: " + err.message);
                return;
            }

            document.getElementById('loginGate').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            refresh();
        } else { 
            alert("Wrong Username or Password"); 
        }
    }

    async function refresh() {
        // Safety check: if sb is null, try to connect again
        if(!sb) sb = supabase.createClient(URL, KEY);

        const { data, error } = await sb.from('students').select('*').order('created_at', { ascending: false });
        if(error) {
            console.error("Refresh Error:", error.message);
            return;
        }
        students = data || [];
        render(students);
        
        // Update stats if elements exist
        if(document.getElementById('tCnt')) document.getElementById('tCnt').innerText = students.length;
    }

    async function save() {
        const nameInput = document.getElementById('name').value.trim();
        if(!nameInput) return alert("Please enter a student name");

        // IMPORTANT: Re-connect if somehow lost
        if(!sb) {
            console.log("Re-connecting to Supabase...");
            sb = supabase.createClient(URL, KEY);
        }

        const btn = document.getElementById('sBtn');
        btn.disabled = true; 
        btn.innerText = "SAVING...";

        const id = document.getElementById('editId').value;
        const pupilData = {
            name: nameInput,
            official_lin: document.getElementById('olin').value,
            age: document.getElementById('age').value,
            dob: document.getElementById('dob').value,
            contact: document.getElementById('ph').value,
            location: document.getElementById('loc').value,
            class: document.getElementById('cl').value,
            fees_status: document.getElementById('fStat').value,
            fees_paid: document.getElementById('fPaid').value || 0,
            fees_balance: document.getElementById('fBal').value || 0,
            health_status: document.getElementById('health').value,
            status: document.getElementById('st').value
        };

        try {
            let res;
            if(!id) {
                pupilData.lin = "PM" + nameInput.charAt(0).toUpperCase() + "-" + Math.floor(1000 + Math.random() * 9000);
                res = await sb.from('students').insert([pupilData]);
            } else {
                res = await sb.from('students').update(pupilData).eq('id', id);
            }

            if(res.error) throw res.error;

            alert("SUCCESS: Record Saved to Progressive School Data!");
            resetForm();
            refresh();
        } catch (e) {
            alert("SAVE ERROR: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "CONFIRM & UPLOAD RECORD";
        }
    }

    // Include your other helper functions (render, calcAge, search, etc.) below this line
</script>
