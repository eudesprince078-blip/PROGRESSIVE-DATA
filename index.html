<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROGRESSIVE PMS - V124 MASTER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #002b5b; --gold: #ffce00; --red: #ff3b3b; --green: #2ecc71; --gray: #f4f7fa; }
        body { font-family: 'Inter', sans-serif; background: var(--gray); margin: 0; padding-bottom: 90px; }
        
        .header { background: linear-gradient(135deg, #001a33, var(--blue)); color: white; padding: 15px 15px 85px; text-align: center; border-radius: 0 0 45px 45px; border-bottom: 5px solid var(--gold); position: relative; }
        .logout-btn { position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.1); border: 1.5px solid white; color: white; border-radius: 8px; padding: 6px 12px; font-size: 10px; font-weight: 800; cursor: pointer; }
        .school-name { font-size: 11px; font-weight: 800; color: var(--gold); margin-top: 5px; text-transform: uppercase; max-width: 70%; margin-left: auto; margin-right: auto; }
        .clock-box { font-size: 38px; font-weight: 900; color: white; margin: 5px 0; }
        .date-box { font-size: 13px; opacity: 0.8; margin-bottom: 12px; }
        .auto-notice { display: inline-block; background: white; color: var(--blue); padding: 6px 20px; border-radius: 50px; font-size: 10px; font-weight: 900; border: 2px solid var(--gold); }

        .dash-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 15px; margin-top: -55px; position: relative; z-index: 5; }
        .dash-card { background: white; padding: 15px 5px; border-radius: 22px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1.5px solid #eee; }
        .dash-card span { display: block; font-size: 22px; font-weight: 900; color: var(--blue); }
        .dash-card small { font-size: 8px; font-weight: 800; color: #999; text-transform: uppercase; }

        .tab-bar { display: flex; justify-content: space-around; background: white; padding: 8px; margin: 25px 15px 15px; border-radius: 20px; }
        .tab { padding: 12px 5px; font-size: 10px; font-weight: 900; color: #bbb; cursor: pointer; text-align: center; flex: 1; }
        .tab.active { background: var(--blue); color: white; border-radius: 15px; }

        .card { background: white; padding: 20px; border-radius: 28px; margin: 15px; border: 1px solid #eee; }
        
        /* ALERTS */
        .critical-alert { background: #fff1f1; border: 2px solid var(--red); padding: 15px; border-radius: 18px; margin-bottom: 10px; }
        .normal-absent { background: #fdfdfd; border-left: 5px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 12px; display: flex; justify-content: space-between; align-items:center; }
        
        .btn-call { background: var(--blue); color: white; padding: 10px 15px; border-radius: 10px; text-decoration: none; font-size: 11px; font-weight: 800; }
        .btn-main { background: var(--blue); color: white; border: none; padding: 18px; width: 100%; border-radius: 18px; font-weight: 900; margin-top: 15px; cursor: pointer; }
        
        .hidden { display: none !important; }
        .footer-brand { text-align: center; font-size: 10px; color: #bbb; font-weight: 800; margin-top: 30px; }
    </style>
</head>
<body>

<div id="loginGate" style="padding: 100px 30px; text-align: center;">
    <h2 style="color:var(--blue); font-weight:900;">PROGRESSIVE PMS</h2>
    <div class="card" style="max-width:320px; margin:auto; border: 2px solid var(--blue);">
        <input id="sysKey" type="password" placeholder="SYSTEM KEY" style="text-align:center; width:100%; padding:15px; border-radius:15px; border:1px solid #eee; margin-bottom:10px;">
        <button onclick="login()" class="btn-main">LOGIN</button>
    </div>
</div>

<div id="mainApp" class="hidden">
    <div class="header">
        <button class="logout-btn" onclick="location.reload()">LOGOUT</button>
        <div class="school-name">Progressive Mothers Nursery & Primary</div>
        <div id="clock" class="clock-box">00:00:00</div>
        <div id="fullDate" class="date-box">...</div>
        <div id="autoMsg" class="auto-notice">SYNCING...</div>
    </div>

    <div class="dash-container">
        <div class="dash-card"><span id="statTotal">0</span><small>Students</small></div>
        <div class="dash-card"><span id="statPres" style="color:var(--green)">0</span><small>Present</small></div>
        <div class="dash-card"><span id="statAbs" style="color:var(--red)">0</span><small>Absent</small></div>
    </div>

    <div class="tab-bar">
        <div id="tReg" class="tab active" onclick="showTab('reg')">REGISTER</div>
        <div id="tRoll" class="tab" onclick="showTab('roll')">ROLL CALL</div>
        <div id="tRec" class="tab" onclick="showTab('rec')">RECORDS</div>
        <div id="tAbs" class="tab" onclick="showTab('abs')" style="color:var(--red)">ABSENTEES</div>
    </div>

    <div id="secReg" class="card">
        <h4 style="margin:0; color:var(--blue);">NEW STUDENT</h4>
        <input id="fName" placeholder="Full Name" style="width:100%; padding:14px; margin-top:10px; border-radius:12px; border:1px solid #eee;">
        <select id="fClass" style="width:100%; padding:14px; margin-top:10px; border-radius:12px; border:1px solid #eee;"><option value="">Class</option><option>Baby</option><option>Middle</option><option>Top</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
        <input id="fCon" placeholder="Parent Contact" style="width:100%; padding:14px; margin-top:10px; border-radius:12px; border:1px solid #eee;">
        <input id="fLin" placeholder="LIN Number" style="width:100%; padding:14px; margin-top:10px; border-radius:12px; border:1px solid #eee;">
        <button onclick="save()" class="btn-main">SAVE STUDENT</button>
    </div>

    <div id="secRoll" class="hidden">
        <div class="card"><select id="rollClass" onchange="loadRoll()" style="width:100%; padding:14px; border-radius:12px; border:1px solid #eee;"><option value="">-- Choose Class --</option><option>Baby</option><option>Middle</option><option>Top</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select></div>
        <div id="rollArea"></div>
    </div>

    <div id="secRec" class="hidden">
        <div class="card"><input type="text" id="search" oninput="renderRec()" placeholder="🔍 Search name..." style="width:100%; padding:14px; border-radius:12px; border:1px solid #eee;"></div>
        <div id="recArea"></div>
    </div>

    <div id="secAbs" class="hidden">
        <div class="card">
            <h4 style="margin:0; color:var(--red);">ATTENDANCE WATCH</h4>
            <p style="font-size:11px; color:#666; margin-bottom:15px;">Red borders indicate students absent for 2+ days.</p>
            <div id="absArea"></div>
        </div>
    </div>

    <div class="footer-brand">EUDES MEDIA SOLUTIONS | +256762992440</div>
</div>

<script>
    const sb = supabase.createClient("https://kjftrwuucjdnhfwesrup.supabase.co", "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO");
    let students = [], attData = {}; 

    function login() {
        const k = document.getElementById('sysKey').value.toUpperCase();
        if(["JESUS CARES", "FINANCE2026", "TEACHER256"].includes(k)) {
            document.getElementById('loginGate').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            fetchData();
            setInterval(updateTime, 1000);
        } else alert("Access Denied");
    }

    async function fetchData() {
        const { data } = await sb.from('students').select('*').order('name');
        if(data) {
            students = data;
            document.getElementById('statTotal').innerText = students.length;
            // Initialize everyone as present (0 days absent)
            students.forEach(s => { if(!attData[s.id]) attData[s.id] = { status: 'present', daysCount: 0 }; });
            refreshStats();
        }
    }

    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
        document.getElementById('fullDate').innerText = now.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
    }

    async function save() {
        const row = { name: document.getElementById('fName').value, class: document.getElementById('fClass').value, contact: document.getElementById('fCon').value, lin: document.getElementById('fLin').value };
        await sb.from('students').insert([row]);
        alert("Saved!"); fetchData();
    }

    function loadRoll() {
        const cls = document.getElementById('rollClass').value;
        const list = students.filter(s => s.class === cls);
        let h = "";
        list.forEach(s => {
            const isAbs = attData[s.id].status === 'absent';
            h += `<div style="display:flex; justify-content:space-between; align-items:center; padding:18px; border-bottom:1px solid #eee; background:white; margin:0 15px;">
                <b>${s.name}</b>
                <button onclick="toggleAtt('${s.id}')" style="padding:10px 15px; border-radius:12px; border:none; font-weight:900; background:${isAbs ? 'var(--red)' : '#f0f0f0'}; color:${isAbs ? 'white' : '#333'};">
                    ${isAbs ? 'ABSENT' : 'PRESENT'}
                </button>
            </div>`;
        });
        document.getElementById('rollArea').innerHTML = h;
    }

    function toggleAtt(id) {
        if(attData[id].status === 'present') {
            attData[id].status = 'absent';
            attData[id].daysCount = 2; // Simulating "Day 2" for demonstration/reporting
        } else {
            attData[id].status = 'present';
            attData[id].daysCount = 0;
        }
        loadRoll();
        refreshStats();
    }

    function refreshStats() {
        let p = 0, a = 0;
        let absH = "";
        students.forEach(s => {
            const info = attData[s.id];
            if(info.status === 'present') p++;
            else {
                a++;
                const isCritical = info.daysCount >= 2;
                absH += `<div class="${isCritical ? 'critical-alert' : 'normal-absent'}">
                    <div>
                        <b style="color:${isCritical ? 'var(--red)' : '#333'}">${s.name} (${s.class})</b><br>
                        <small style="font-weight:800;">${isCritical ? '⚠️ CRITICAL: 2 DAYS ABSENT' : 'Absent Today'}</small>
                    </div>
                    <a href="tel:${s.contact}" class="btn-call">CALL</a>
                </div>`;
            }
        });
        document.getElementById('statPres').innerText = p;
        document.getElementById('statAbs').innerText = a;
        document.getElementById('absArea').innerHTML = absH || "<p style='text-align:center; color:green;'>All students accounted for.</p>";
    }

    function renderRec() {
        const q = document.getElementById('search').value.toUpperCase();
        let h = "";
        students.filter(s => s.name.toUpperCase().includes(q)).forEach(s => {
            h += `<div class="card"><b>${s.name}</b> - ${s.class}</div>`;
        });
        document.getElementById('recArea').innerHTML = h;
    }

    function showTab(t) {
        ['secReg','secRoll','secRec','secAbs'].forEach(s => document.getElementById(s).classList.add('hidden'));
        ['tReg','tRoll','tRec','tAbs'].forEach(s => document.getElementById(s).classList.remove('active'));
        document.getElementById('sec'+t.charAt(0).toUpperCase()+t.slice(1)).classList.remove('hidden');
        document.getElementById('t'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('active');
    }
</script>
</body>
</html>
