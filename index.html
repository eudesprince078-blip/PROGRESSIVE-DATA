<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eudes Media | Progressive Mother's School</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #003366; --gold: #ffc107; --white: #ffffff; --green: #2b9348; --red: #d90429; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--white); margin: 0; padding: 0; }
        
        #loginGate { position:fixed; inset:0; background:var(--blue); z-index:2000; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px; }
        .header { background: var(--blue); color: white; padding: 15px; position: sticky; top: 0; z-index: 1000; border-bottom: 4px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        
        .hero { background: #001a33; padding: 20px; text-align: center; color: white; border-bottom: 4px solid var(--blue); }
        #clock { font-size: 32px; font-weight: 800; color: var(--gold); }

        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; margin-top: -30px; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 4px solid var(--blue); }
        .stat-val { font-size: 18px; font-weight: 900; color: var(--blue); display: block; }

        .nav-tabs { display: flex; background: var(--blue); position: sticky; top: 65px; z-index: 999; }
        .tab { flex: 1; text-align: center; padding: 15px; font-size: 10px; font-weight: 800; color: rgba(255,255,255,0.5); cursor: pointer; display: none; }
        .tab.active { color: var(--gold); border-bottom: 4px solid var(--gold); background: rgba(0,0,0,0.2); }
        .visible-tab { display: block !important; }

        .card { background: white; border-radius: 12px; padding: 15px; margin: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); border-left: 6px solid var(--blue); position: relative; }
        .p-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; border: 2px solid var(--blue); margin-right: 12px; }
        
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px; font-weight: 600; box-sizing: border-box; }
        label { font-size: 10px; font-weight: 800; color: var(--blue); text-transform: uppercase; display: block; margin-bottom: 2px; }
        
        .btn-main { width: 100%; background: var(--blue); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; }
        .hidden { display: none !important; }
        
        .history-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; background: #f8f9fa; }
        .history-table td, th { padding: 8px; border: 1px solid #ddd; text-align: left; }
    </style>
</head>
<body>

<div id="loginGate">
    <h1 style="color:white; margin-bottom:0;">EUDES MEDIA</h1>
    <p style="color:var(--gold); margin-top:5px; font-weight:800; letter-spacing:1px;">SCHOOL PORTAL LOGIN</p>
    <input id="key" type="text" placeholder="ENTER ACCESS KEY" style="text-align:center; max-width:300px; border:3px solid var(--gold);">
    <button onclick="secureLogin()" class="btn-main" style="max-width:300px; background:var(--gold); color:var(--blue);">LOGIN NOW</button>
</div>

<div id="mainApp" class="hidden">
    <div class="header">
        <div><b id="displaySchoolName" style="font-size:14px;">PROGRESSIVE MOTHER'S SCHOOL</b><br><span id="userRoleBadge" style="font-size:9px; color:var(--gold);">LEVEL</span></div>
        <button onclick="location.reload()" style="background:var(--red); color:white; border:none; padding:8px 15px; border-radius:8px; font-weight:900;">LOGOUT</button>
    </div>

    <div class="hero">
        <div id="clock">00:00:00</div>
        <div id="status" style="font-size:10px; font-weight:900; margin-top:5px;">...</div>
    </div>

    <div class="dashboard">
        <div class="stat-card"><span class="stat-val" id="c-tot">0</span><span style="font-size:8px; font-weight:800;">ENROLLED</span></div>
        <div class="stat-card"><span class="stat-val" id="c-pres" style="color:var(--green)">0</span><span style="font-size:8px; font-weight:800;">PRESENT</span></div>
        <div class="stat-card"><span class="stat-val" id="c-abs" style="color:var(--red)">0</span><span style="font-size:8px; font-weight:800;">ABSENT</span></div>
    </div>

    <div class="nav-tabs">
        <div class="tab" id="tab-sum" onclick="tab('sum')">Director</div>
        <div class="tab" id="tab-rec" onclick="tab('rec')">Records</div>
        <div class="tab" id="tab-adm" onclick="tab('adm')">Admission</div>
        <div class="tab" id="tab-roll" onclick="tab('roll')">Roll-Call</div>
    </div>

    <div id="v-sum" class="hidden">
        <div class="card" style="background:var(--blue); color:white;">
            <h4 style="color:var(--gold); margin-top:0;">FINANCIAL STANDING</h4>
            <div id="finSummary">Loading...</div>
        </div>
        <div id="absenteeDetails" style="padding:5px;"></div>
    </div>

    <div id="v-rec" class="hidden">
        <div style="padding:15px;"><input id="searchBar" placeholder="Search LIN, Name, or Class..." oninput="renderUI()"></div>
        <div id="dataList"></div>
    </div>

    <div id="v-adm" class="hidden">
        <div class="card">
            <h3 id="admTitle">ADMISSION</h3>
            <input type="hidden" id="editId">
            <label>Photo URL</label><input id="p_url" placeholder="Image Link">
            <label>Full Name</label><input id="name">
            <label>LIN</label><input id="lin_field">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Age</label><input id="age" type="number"></div>
                <div><label>Academic Year</label><input id="acad_year" value="2026"></div>
            </div>
            <label>Date of Birth</label><input id="dob" type="date">
            <label>Class</label><select id="cls"><option>Baby</option><option>Middle</option><option>Top</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
            <label>Parent Contact</label><input id="contact">
            <label>Location</label><input id="loc">
            <label>Health Status</label><input id="health">
            
            <div id="financeBox" style="background:#f4f4f4; padding:15px; border-radius:10px;">
                <label>Fees Expected (UGX)</label><input id="f_exp" type="number">
                <label>New Payment</label>
                <div style="display:flex; gap:5px;"><input id="p_amt" type="number" placeholder="Amt"><input id="p_date" type="date"></div>
                <div id="historyContainer"></div>
            </div>
            <button onclick="saveStudent()" class="btn-main" style="margin-top:15px;">SAVE STUDENT</button>
        </div>
    </div>

    <div id="v-roll" class="hidden">
        <div style="padding:15px;">
            <select id="rollClassSelect" onchange="renderUI()"><option value="">-- Select Class --</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
        </div>
        <div id="rollData"></div>
    </div>

</div>

<script>
    const SUPA_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
    const _client = supabase.createClient(SUPA_URL, SUPA_KEY);

    let cachedData = [];
    let currentRole = "";
    let schoolID = "PMS-256"; // Fixed for Progressive Mother's

    async function secureLogin() {
        const inputKey = document.getElementById('key').value.trim().toUpperCase();
        
        // HARDCODED KEYS AS PER YOUR REQUEST
        const adminKey = "PM2026";
        const financeKey = "FINANCE256";
        const teacherKey = "TEACHER2026";

        if (inputKey === adminKey) currentRole = "Admin";
        else if (inputKey === financeKey) currentRole = "Finance";
        else if (inputKey === teacherKey) currentRole = "Teacher";
        else { alert("WRONG ACCESS KEY"); return; }

        document.getElementById('userRoleBadge').innerText = currentRole.toUpperCase();
        setupAccess();
        await loadData();
        
        document.getElementById('loginGate').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        startClock();
    }

    function setupAccess() {
        const map = { Admin:['sum','rec','adm','roll'], Finance:['rec','adm'], Teacher:['roll','adm'] };
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('visible-tab'));
        map[currentRole].forEach(id => document.getElementById('tab-'+id).classList.add('visible-tab'));
        tab(map[currentRole][0]);
    }

    async function loadData() {
        const { data, error } = await _client.from('students').select('*').eq('school_id', schoolID).order('name');
        if(!error) { cachedData = data; renderUI(); updateStats(); }
        else { console.log("Data Load Error:", error); }
    }

    function updateStats() {
        let tExp = 0, tPaid = 0;
        cachedData.forEach(s => { tExp += (s.fees_expected || 0); tPaid += (s.fees_paid || 0); });
        document.getElementById('c-tot').innerText = cachedData.length;
        document.getElementById('c-pres').innerText = cachedData.filter(s => !s.is_absent).length;
        document.getElementById('c-abs').innerText = cachedData.filter(s => s.is_absent).length;
        document.getElementById('finSummary').innerHTML = `<p>Expected: ${tExp.toLocaleString()}</p><p>Paid: ${tPaid.toLocaleString()}</p><p>Balance: ${(tExp-tPaid).toLocaleString()}</p>`;
    }

    function renderUI() {
        const query = document.getElementById('searchBar').value.toLowerCase();
        document.getElementById('dataList').innerHTML = cachedData.filter(s => s.name.toLowerCase().includes(query)).map(s => `
            <div class="card" onclick="editMode('${s.id}')">
                <div style="display:flex;">
                    <img src="${s.photo_url || 'https://via.placeholder.com/60'}" class="p-img">
                    <div><b>${s.name}</b><br><small>${s.class} | ${s.lin || 'N/A'}</small></div>
                </div>
            </div>
        `).join('');

        const rCls = document.getElementById('rollClassSelect').value;
        document.getElementById('rollData').innerHTML = cachedData.filter(s => s.class === rCls).map(s => `
            <div class="card" style="display:flex; justify-content:space-between;">
                <b>${s.name}</b>
                <button onclick="markAtt('${s.id}', ${!s.is_absent})" style="color:white; background:${s.is_absent?'var(--red)':'var(--green)'}">${s.is_absent?'ABSENT':'PRESENT'}</button>
            </div>
        `).join('');
    }

    function editMode(id) {
        const s = cachedData.find(x => x.id == id);
        document.getElementById('editId').value = s.id;
        document.getElementById('name').value = s.name;
        document.getElementById('lin_field').value = s.lin || "";
        document.getElementById('cls').value = s.class;
        document.getElementById('f_exp').value = s.fees_expected;
        tab('adm');
    }

    async function saveStudent() {
        const id = document.getElementById('editId').value;
        const payload = {
            school_id: schoolID,
            name: document.getElementById('name').value.toUpperCase(),
            lin: document.getElementById('lin_field').value || "LIN-"+Math.random(),
            class: document.getElementById('cls').value,
            fees_expected: parseInt(document.getElementById('f_exp').value) || 0
        };
        const { error } = id ? await _client.from('students').update(payload).eq('id', id) : await _client.from('students').insert([payload]);
        if(!error) { alert("SAVED"); await loadData(); tab('rec'); }
    }

    async function markAtt(id, stat) {
        await _client.from('students').update({ is_absent: stat }).eq('id', id);
        loadData();
    }

    function tab(t) {
        ['v-sum','v-rec','v-adm','v-roll'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById('v-'+t).classList.remove('hidden');
    }

    function startClock() { setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000); }
</script>
</body>
</html>
