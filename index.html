<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS ELITE | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #0052cc; --bg: #0f172a; --white: #ffffff; --text: #1e293b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; }

        /* MULTI-TENANT AUTH SCREEN */
        #auth-screen { position: fixed; inset: 0; background: radial-gradient(circle at top right, #1e3a8a, #0f172a); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--white); padding: 40px; border-radius: 40px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .fingerprint-btn { background: var(--primary); width: 80px; height: 80px; border-radius: 25px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; color: white; font-size: 2rem; border: none; cursor: pointer; }

        /* SIDEBAR NAVIGATION */
        .sidebar { width: 280px; background: #020617; display: flex; flex-direction: column; padding: 30px 15px; flex-shrink: 0; border-right: 1px solid rgba(255,255,255,0.1); }
        .nav-link { width: 100%; display: flex; align-items: center; padding: 18px 20px; color: #94a3b8; border-radius: 16px; margin-bottom: 8px; border: none; background: transparent; cursor: pointer; font-weight: 700; font-size: 0.8rem; transition: 0.3s; }
        .nav-link i { font-size: 1.2rem; margin-right: 15px; width: 25px; }
        .nav-link.active { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(0, 82, 204, 0.3); }

        /* MAIN AREA */
        .wrapper { flex: 1; display: flex; flex-direction: column; background: #f8fafc; }
        .header { height: 80px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        .content { flex: 1; padding: 30px; overflow-y: auto; }

        /* FORMS & TABLES */
        .panel { background: white; border-radius: 35px; padding: 35px; border: 1px solid #e2e8f0; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        label { display: block; font-size: 0.65rem; font-weight: 800; color: #64748b; margin-bottom: 8px; }
        input, select { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #f1f5f9; background: #f8fafc; font-weight: 700; outline: none; }
        input:focus { border-color: var(--primary); background: white; }

        .btn-unlock { background: var(--primary); color: white; padding: 20px; border-radius: 20px; border: none; font-weight: 800; cursor: pointer; width: 100%; margin-top: 10px; }
        .status-msg { font-size: 0.65rem; font-weight: 800; margin-top: 20px; color: #ef4444; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: #64748b; font-size: 0.7rem; border-bottom: 2px solid #f1f5f9; }
        td { padding: 15px; font-weight: 700; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <div class="fingerprint-btn"><i class="fas fa-fingerprint"></i></div>
            <h2 style="font-weight: 900; margin-bottom: 5px;">ESMS ELITE</h2>
            <p style="font-size: 0.6rem; color: #64748b; font-weight: 800; margin-bottom: 30px;">POWERED BY EUDES MEDIA</p>
            
            <label style="text-align: left;">SCHOOL ID</label>
            <input type="text" id="login-id" value="PM001" style="text-align: center; margin-bottom: 15px;">
            <label style="text-align: left;">ACCESS PIN</label>
            <input type="password" id="login-pin" value="123456" style="text-align: center; margin-bottom: 25px;">
            
            <button class="btn-unlock" onclick="startApp()" id="unlock-btn">UNLOCK SYSTEM</button>
            <div id="err-log" class="status-msg">SYSTEM SECURE. CONTACT EUDES MEDIA: +256762992440</div>
        </div>
    </div>

    <nav class="sidebar hidden" id="side-nav">
        <div style="margin-bottom: 40px; text-align: center;">
            <img id="sch-logo" src="" style="max-height: 50px; margin-bottom: 10px;" onerror="this.src='https://via.placeholder.com/50?text=LOGO'">
            <h1 id="side-sch-name" style="color: white; font-size: 0.9rem; font-weight: 900;"></h1>
        </div>
        
        <button class="nav-link active" onclick="nav('dash', this)"><i class="fas fa-th-large"></i>Dashboard</button>
        <button class="nav-link" onclick="nav('reg', this)"><i class="fas fa-plus-circle"></i>New Entry</button>
        <button class="nav-link" onclick="nav('list', this)"><i class="fas fa-list-ul"></i>Learner List</button>
        
        <div style="margin-top: auto; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 20px; text-align: center;">
            <p style="color: #64748b; font-size: 0.6rem; font-weight: 800;">SUPPORT: +256 762 992440</p>
        </div>
    </nav>

    <div class="wrapper hidden" id="main-app">
        <header class="header">
            <h2 id="header-name" style="font-weight: 900; color: var(--primary);"></h2>
            <div style="background:#dcfce7; color:#166534; padding:8px 15px; border-radius:10px; font-size:0.65rem; font-weight:900;">CLOUD CONNECTED</div>
        </header>

        <div class="content">
            <div id="v-dash">
                <div class="panel" style="display:flex; align-items:center; gap:20px;">
                    <div style="background:#eff6ff; padding:20px; border-radius:20px;"><i class="fas fa-users-viewfinder" style="color:var(--primary); font-size:1.5rem;"></i></div>
                    <div><h2 id="count" style="font-size:2rem; font-weight:900;">0</h2><label>TOTAL REGISTERED LEARNERS</label></div>
                </div>
            </div>

            <div id="v-reg" class="hidden">
                <div class="panel" style="max-width: 800px; margin: 0 auto;">
                    <h3 style="margin-bottom: 25px; font-weight: 900;">ADMISSION FORM</h3>
                    <div class="form-row">
                        <div class="group"><label>NAME</label><input type="text" id="f-name"></div>
                        <div class="group"><label>AGE</label><input type="number" id="f-age"></div>
                    </div>
                    <div class="form-row">
                        <div class="group"><label>DATE OF BIRTH</label><input type="date" id="f-dob"></div>
                        <div class="group"><label>HEALTH STATUS</label><input type="text" id="f-health" value="NORMAL"></div>
                    </div>
                    <div class="form-row">
                        <div class="group"><label>LOCATION</label><input type="text" id="f-loc"></div>
                        <div class="group">
                            <label>CLASS</label>
                            <select id="f-class"><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="group"><label>CONTACT</label><input type="tel" id="f-tel" value="+256 "></div>
                        <div class="group"><label>LIN (AUTO)</label><input type="text" id="f-lin" readonly style="color:var(--primary);"></div>
                    </div>
                    <button class="btn-unlock" onclick="save()" id="s-btn">SAVE TO SYSTEM</button>
                </div>
            </div>

            <div id="v-list" class="hidden">
                <div class="panel">
                    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                        <h3 style="font-weight:900;">DIRECTORY</h3>
                        <input type="text" placeholder="SEARCH..." style="width:250px; padding:10px;" onkeyup="search(this)">
                    </div>
                    <div style="overflow-x:auto;">
                        <table>
                            <thead><tr><th>NAME</th><th>LIN</th><th>CLASS</th><th>LOCATION</th><th>HEALTH</th><th>STATUS</th></tr></thead>
                            <tbody id="list-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const U = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const K = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        let supa; 
        let CURRENT_SCH_ID = "";

        async function startApp() {
            const btn = document.getElementById('unlock-btn');
            const err = document.getElementById('err-log');
            const schId = document.getElementById('login-id').value.toUpperCase();

            btn.innerText = "VERIFYING...";
            
            try {
                supa = supabase.createClient(U, K);
                const { data: school, error } = await supa.from('Schools').select('*').eq('sch_id', schId).single();
                
                if (error || !school) throw new Error("INVALID SCHOOL ID");

                CURRENT_SCH_ID = schId;
                document.getElementById('header-name').innerText = school.school_name;
                document.getElementById('side-sch-name').innerText = school.school_name;
                document.getElementById('sch-logo').src = school.logo_url;
                
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('side-nav').classList.remove('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                
                document.getElementById('f-lin').value = "LIN-" + Math.floor(100000 + Math.random() * 900000);
                loadData();
            } catch (e) {
                err.innerText = "ERROR: " + e.message;
                btn.innerText = "RETRY UNLOCK";
            }
        }

        async function loadData() {
            const { data } = await supa.from('Students').select('*').eq('sch_id', CURRENT_SCH_ID);
            if(data) {
                document.getElementById('count').innerText = data.length;
                document.getElementById('list-body').innerHTML = data.map(r => `
                    <tr>
                        <td style="color:var(--primary);">${r.name}</td>
                        <td style="font-family:monospace; color:#64748b;">${r.lin}</td>
                        <td>${r.class}</td>
                        <td style="font-size:0.7rem;">${r.location}</td>
                        <td>${r.health_status}</td>
                        <td><span style="background:#dcfce7; color:#166534; padding:5px 10px; border-radius:8px; font-size:0.6rem;">ACTIVE</span></td>
                    </tr>
                `).join('');
            }
        }

        async function save() {
            const btn = document.getElementById('s-btn');
            const payload = {
                sch_id: CURRENT_SCH_ID,
                name: document.getElementById('f-name').value,
                lin: document.getElementById('f-lin').value,
                age: document.getElementById('f-age').value,
                dob: document.getElementById('f-dob').value,
                health_status: document.getElementById('f-health').value,
                location: document.getElementById('f-loc').value,
                class: document.getElementById('f-class').value,
                contact: document.getElementById('f-tel').value
            };

            if(!payload.name) return alert("NAME REQUIRED");
            btn.innerText = "SAVING..."; btn.disabled = true;

            const { error } = await supa.from('Students').insert([payload]);
            if(!error) { alert("REGISTERED SUCCESSFULLY"); location.reload(); }
            else { alert(error.message); btn.innerText = "SAVE"; btn.disabled = false; }
        }

        function nav(v, b) {
            ['v-dash', 'v-reg', 'v-list'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('v-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            b.classList.add('active');
        }

        function search(i) {
            let val = i.value.toUpperCase();
            let rows = document.querySelectorAll("#list-body tr");
            rows.forEach(r => r.style.display = r.innerText.toUpperCase().includes(val) ? "" : "none");
        }
    </script>
</body>
</html>
