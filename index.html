<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS PRO | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0052cc; --dark: #020617; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #1e293b; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* HEADER & OVERLAY */
        .top-bar { height: 65px; background: white; border-bottom: 2px solid var(--primary); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 100; }
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; display: none; backdrop-filter: blur(3px); }
        .sidebar-overlay.active { display: block; }

        /* SIDEBAR FIX */
        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 280px; background: var(--dark); z-index: 1000; transform: translateX(-100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .sidebar.open { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.3); }
        
        .nav-item { padding: 18px 25px; color: #94a3b8; cursor: pointer; display: flex; align-items: center; font-weight: 700; border: none; background: none; width: 100%; text-align: left; transition: 0.2s; }
        .nav-item i { width: 35px; font-size: 1.2rem; }
        .nav-item.active { background: var(--primary); color: white; }

        .content { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        
        /* UI COMPONENTS */
        .card { background: white; border-radius: 18px; padding: 20px; border: 1px solid #e2e8f0; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #cbd5e1; margin-bottom: 10px; font-weight: 600; font-size: 0.95rem; }
        .btn-pro { background: var(--primary); color: white; padding: 16px; border-radius: 14px; border: none; font-weight: 800; width: 100%; cursor: pointer; }
        
        .st-row { background: white; padding: 12px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 12px; }
        .st-img { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; background: #eee; }
        
        #auth { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="overlay" class="sidebar-overlay" onclick="toggleMenu()"></div>

    <div id="auth">
        <div style="background:white; padding:35px; border-radius:25px; width:90%; max-width:380px; text-align:center;">
            <h1 style="font-weight:900; color:var(--dark)">ESMS <span style="color:var(--primary)">ELITE</span></h1>
            <input type="text" id="sch-input" placeholder="SCHOOL ID" style="text-align:center; text-transform:uppercase; margin-top:20px;">
            <button class="btn-pro" onclick="login()">SECURE LOGIN</button>
        </div>
    </div>

    <header class="top-bar">
        <div onclick="toggleMenu()" style="width:40px; height:40px; display:flex; align-items:center; justify-content:center; cursor:pointer;"><i class="fas fa-bars"></i></div>
        <div id="sch-title" style="font-weight:900; font-size:0.8rem; color:var(--primary); text-transform:uppercase;">CLIENT PORTAL</div>
        <div id="clock" style="font-size:0.6rem; font-weight:800; color:#64748b;"></div>
    </header>

    <div class="wrapper">
        <aside class="sidebar" id="sidebar">
            <div style="padding:30px 25px;">
                <h2 style="color:white; font-weight:900; font-size:1.2rem;">MENU</h2>
            </div>
            <nav>
                <button class="nav-item active" onclick="nav('dash', this)"><i class="fas fa-chart-line"></i>Dashboard</button>
                <button class="nav-item" onclick="nav('reg', this)"><i class="fas fa-user-plus"></i>Registration</button>
                <button class="nav-item" onclick="nav('list', this)"><i class="fas fa-list-ul"></i>Student List</button>
                <button class="nav-item" onclick="nav('fin', this)"><i class="fas fa-money-bill-wave"></i>Financials</button>
                <button class="nav-item" onclick="nav('rep', this)"><i class="fas fa-file-signature"></i>Reports</button>
            </nav>
            <div style="margin-top:auto; padding:25px; text-align:center; color:#94a3b8; font-size:0.7rem; border-top:1px solid #1e293b;">
                <b style="color:white;">EUDES MEDIA</b><br>+256762992440
            </div>
        </aside>

        <main class="content">
            <div id="v-dash">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px;">
                    <div class="card" style="text-align:center;"> <h2 id="count-s">0</h2><p style="font-size:0.6rem; font-weight:800; color:#94a3b8;">STUDENTS</p></div>
                    <div class="card" style="text-align:center;"> <h2 id="total-d" style="color:red">0</h2><p style="font-size:0.6rem; font-weight:800; color:#94a3b8;">DEBT (UGX)</p></div>
                </div>
            </div>

            <div id="v-reg" class="hidden">
                <div class="card">
                    <h3 id="form-title" style="margin-bottom:15px; font-weight:800;">REGISTRATION</h3>
                    <input type="hidden" id="f-id">
                    <div style="text-align:center; margin-bottom:15px;">
                        <img id="f-preview" style="width:70px; height:70px; border-radius:12px; object-fit:cover; display:none; margin:0 auto 10px; border:2px solid var(--primary);">
                        <input type="file" onchange="procImg(this)" style="font-size:0.7rem;">
                        <input type="hidden" id="f-img">
                    </div>
                    <input type="text" id="f-name" placeholder="Full Student Name">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <input type="number" id="f-age" placeholder="Age">
                        <input type="date" id="f-dob">
                    </div>
                    <input type="text" id="f-contact" placeholder="Guardian Contact">
                    <input type="text" id="f-loc" placeholder="Home Location">
                    <input type="text" id="f-health" placeholder="Health Status (health_status)">
                    <input type="number" id="f-fees" placeholder="Total Fees Amount">
                    <button id="save-btn" class="btn-pro" onclick="saveData()">SAVE TO DATABASE</button>
                    <button id="cancel-btn" class="hidden" onclick="resetForm()" style="background:#64748b; color:white; border:none; padding:12px; margin-top:10px; width:100%; border-radius:12px; font-weight:700;">CANCEL</button>
                </div>
            </div>

            <div id="v-list" class="hidden">
                <input type="text" id="search-input" placeholder="Search by Name or LIN..." onkeyup="filterData()" style="position:sticky; top:0; z-index:5;">
                <div id="master-list"></div>
            </div>

            <div id="v-fin" class="hidden"><div id="finance-list"></div></div>
            
            <div id="v-rep" class="hidden">
                <div class="card"><p style="text-align:center; color:#94a3b8; font-weight:700;">Report Generation Active</p></div>
            </div>
        </main>
    </div>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        let db, activeSch, students = [];

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        async function login() {
            const id = document.getElementById('sch-input').value.toUpperCase().trim();
            if(!id) return;
            db = supabase.createClient(SB_URL, SB_KEY);
            activeSch = id;
            document.getElementById('auth').classList.add('hidden');
            refresh();
        }

        async function refresh() {
            const { data } = await db.from('Students').select('*').eq('sch_id', activeSch);
            students = data || [];
            render();
        }

        function procImg(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 200; canvas.height = 200;
                    canvas.getContext('2d').drawImage(img, 0, 0, 200, 200);
                    document.getElementById('f-preview').src = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('f-preview').style.display = 'block';
                    document.getElementById('f-img').value = canvas.toDataURL('image/jpeg', 0.6);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }

        async function saveData() {
            const btn = document.getElementById('save-btn');
            const id = document.getElementById('f-id').value;
            btn.disabled = true; btn.innerText = "SAVING...";

            const payload = {
                sch_id: activeSch,
                name: document.getElementById('f-name').value.toUpperCase().trim(),
                age: parseInt(document.getElementById('f-age').value) || 0,
                dob: document.getElementById('f-dob').value || null,
                contact: document.getElementById('f-contact').value,
                location: document.getElementById('f-loc').value,
                health_status: document.getElementById('f-health').value || 'NORMAL',
                total_fees: parseInt(document.getElementById('f-fees').value) || 0,
                photo_url: document.getElementById('f-img').value
            };

            let error;
            if(id) {
                const res = await db.from('Students').update(payload).eq('id', id);
                error = res.error;
            } else {
                payload.lin = activeSch + "-" + Math.floor(1000 + Math.random()*8999);
                payload.payment_code = "PAY-" + Math.floor(100000 + Math.random()*899999);
                const res = await db.from('Students').insert([payload]);
                error = res.error;
            }

            if(!error) {
                alert("SUCCESSFULLY SAVED");
                refresh(); resetForm(); nav('list');
            } else { alert("ERROR: " + error.message); }
            btn.disabled = false; btn.innerText = "SAVE TO DATABASE";
        }

        function render() {
            let debt = 0; students.forEach(s => debt += (s.total_fees - (s.paid_fees || 0)));
            document.getElementById('count-s').innerText = students.length;
            document.getElementById('total-d').innerText = debt.toLocaleString();

            document.getElementById('master-list').innerHTML = students.map(s => `
                <div class="st-row">
                    <img src="${s.photo_url || ''}" class="st-img">
                    <div style="flex:1"><b>${s.name}</b><br><small>${s.lin}</small></div>
                    <div style="display:flex; gap:12px;"><i class="fas fa-edit" style="color:var(--primary)" onclick="editMode('${s.id}')"></i></div>
                </div>`).join('');

            document.getElementById('finance-list').innerHTML = students.map(s => `
                <div class="st-row">
                    <div style="flex:1"><b>${s.name}</b><br><small>Bal: ${(s.total_fees - (s.paid_fees || 0)).toLocaleString()}</small></div>
                    <input type="number" placeholder="UGX" style="width:80px; margin:0;" onchange="pay('${s.id}', this.value)">
                </div>`).join('');
        }

        async function pay(id, val) {
            const s = students.find(x => x.id == id);
            await db.from('Students').update({ paid_fees: Number(s.paid_fees || 0) + Number(val) }).eq('id', id);
            refresh();
        }

        function editMode(id) {
            const s = students.find(x => x.id == id);
            document.getElementById('f-id').value = s.id;
            document.getElementById('f-name').value = s.name;
            document.getElementById('f-age').value = s.age;
            document.getElementById('f-dob').value = s.dob;
            document.getElementById('f-contact').value = s.contact;
            document.getElementById('f-loc').value = s.location;
            document.getElementById('f-health').value = s.health_status;
            document.getElementById('f-fees').value = s.total_fees;
            document.getElementById('f-img').value = s.photo_url;
            document.getElementById('f-preview').src = s.photo_url;
            document.getElementById('f-preview').style.display = 'block';
            document.getElementById('form-title').innerText = "EDIT: " + s.name;
            document.getElementById('cancel-btn').classList.remove('hidden');
            nav('reg');
        }

        function resetForm() {
            ['f-id','f-name','f-age','f-dob','f-contact','f-loc','f-health','f-fees','f-img'].forEach(i => document.getElementById(i).value = "");
            document.getElementById('f-preview').style.display = 'none';
            document.getElementById('form-title').innerText = "REGISTRATION";
            document.getElementById('cancel-btn').classList.add('hidden');
        }

        function nav(v, b) {
            ['v-dash', 'v-reg', 'v-list', 'v-fin', 'v-rep'].forEach(x => document.getElementById(x).classList.add('hidden'));
            document.getElementById('v-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(b) b.classList.add('active');
            if(document.getElementById('sidebar').classList.contains('open')) toggleMenu();
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString('en-GB'); }, 1000);
    </script>
</body>
</html>
