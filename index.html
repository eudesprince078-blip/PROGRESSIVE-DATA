<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAMPUSSPHERE PRO | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0047AB; --success: #10b981; --danger: #e11d48; --bg: #f1f5f9; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; }
        body { margin: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        .sidebar { width: 280px; background: #0f172a; display: flex; flex-direction: column; padding: 25px; color: white; border-right: 1px solid #1e293b; }
        .nav-item { padding: 14px 18px; border-radius: 12px; color: #94a3b8; font-weight: 700; font-size: 0.7rem; cursor: pointer; margin-bottom: 8px; transition: 0.3s; }
        .nav-item.active { background: var(--primary); color: white; }
        .nav-item:hover:not(.active) { background: #1e293b; color: white; }
        
        /* MAIN AREA */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 15px 40px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .page { display: none; padding: 30px; height: 100%; overflow-y: auto; }
        .page.active { display: block; }

        /* DASHBOARD */
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 20px; border: 1px solid #e2e8f0; border-left: 6px solid var(--primary); }
        .stat-card h4 { margin: 0; font-size: 0.6rem; color: #64748b; }
        .stat-card p { margin: 10px 0 0; font-size: 1.5rem; font-weight: 800; color: #0f172a; }

        /* REGISTRATION FORM */
        .form-box { background: white; padding: 35px; border-radius: 25px; border: 1px solid #e2e8f0; max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.65rem; font-weight: 800; color: #64748b; }
        input, select { padding: 14px; border-radius: 12px; border: 1px solid #e2e8f0; font-weight: 700; background: #f8fafc; font-size: 0.75rem; }

        /* TABLE */
        .table-box { background: white; border-radius: 20px; border: 1px solid #e2e8f0; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 18px; text-align: left; font-size: 0.6rem; color: #64748b; border-bottom: 2px solid #f1f5f9; }
        td { padding: 15px 18px; font-size: 0.7rem; border-bottom: 1px solid #f1f5f9; font-weight: 700; }
        .img-circle { width: 45px; height: 45px; border-radius: 12px; object-fit: cover; border: 2px solid #e2e8f0; }

        .btn-action { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 800; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        #login-screen { position:fixed; inset:0; background:#0f172a; z-index:9999; display:flex; align-items:center; justify-content:center; }
    </style>
</head>
<body onload="startTime()">

    <div id="login-screen">
        <div style="background:white; padding:50px; border-radius:40px; width:420px; text-align:center;">
            <h2 style="color:var(--primary); margin:0;">EUDES MEDIA</h2>
            <p style="font-size:0.6rem; color:#64748b; margin-bottom:30px; letter-spacing:1px; font-weight: 800;">CAMPUSSPHERE PRO v4.0</p>
            <input type="text" id="schId" placeholder="SCHOOL ID" style="width:100%; margin-bottom:12px;">
            <input type="password" id="schKey" placeholder="ACCESS KEY" style="width:100%; margin-bottom:20px;">
            <button onclick="authenticate()" class="btn-action" style="width:100%;">INITIALIZE SYSTEM</button>
        </div>
    </div>

    <div class="sidebar">
        <div style="margin-bottom: 40px;">
            <h2 style="font-size: 0.9rem; margin:0;">CAMPUSSPHERE</h2>
            <p style="font-size: 0.5rem; color: var(--primary); font-weight: 800;">SYSTEMS ADMINISTRATION</p>
        </div>
        <div class="nav-item active" onclick="showPage('dash-page', this)">📊 DASHBOARD</div>
        <div class="nav-item" onclick="showPage('reg-page', this)">📝 ADMISSION FORM</div>
        <div class="nav-item" onclick="fetchStudents(); showPage('list-page', this)">👥 STUDENT REGISTRY</div>
        <div style="margin-top:auto;"><button onclick="location.reload()" style="background:none; border:none; color:var(--danger); font-weight:800; cursor:pointer; font-size:0.6rem;">TERMINATE SESSION</button></div>
    </div>

    <div class="main">
        <div class="header">
            <div style="display:flex; align-items:center; gap:15px;">
                <img id="dispLogo" src="" style="height:45px; border-radius:10px;">
                <h3 id="dispName" style="margin:0; font-size: 0.85rem; color: var(--primary);"></h3>
            </div>
            <div style="text-align:right;">
                <h5 id="txtClock" style="margin:0; font-size: 0.9rem; font-weight: 800;">00:00:00</h5>
                <p id="txtDate" style="margin:0; font-size: 0.5rem; color:#94a3b8; font-weight: 800;"></p>
            </div>
        </div>

        <div id="dash-page" class="page active">
            <h3 style="margin-bottom:25px;">Institutional Overview</h3>
            <div class="grid-stats">
                <div class="stat-card"><h4>TOTAL ENROLLED</h4><p id="statTotal">0</p></div>
                <div class="stat-card" style="border-left-color: var(--success);"><h4>PRESENT TODAY</h4><p id="statPres">0</p></div>
                <div class="stat-card" style="border-left-color: var(--danger);"><h4>TOTAL ARREARS</h4><p id="statDebt">0</p></div>
            </div>
        </div>

        <div id="reg-page" class="page">
            <div class="form-box">
                <div class="field"><label>LIN (SUPABASE ID)</label><input type="text" id="rLin"></div>
                <div class="field"><label>FULL NAME</label><input type="text" id="rName"></div>
                <div class="field"><label>ASSIGN CLASS</label>
                    <select id="rClass">
                        <option>Baby Class</option><option>Middle Class</option><option>Top Class</option>
                        <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                        <option>P.5</option><option>P.6</option><option>P.7</option>
                    </select>
                </div>
                <div class="field"><label>DATE OF BIRTH</label><input type="date" id="rDob" onchange="calcAge(this.value)"></div>
                <div class="field"><label>AGE (CALCULATED)</label><input type="text" id="rAge" readonly></div>
                <div class="field"><label>HEALTH STATUS</label><input type="text" id="rHealth" placeholder="e.g. Normal"></div>
                <div class="field"><label>STUDENT PHOTO URL</label><input type="text" id="rPhoto"></div>
                <div class="field"><label>TOTAL TUITION (UGX)</label><input type="number" id="rFees"></div>
                <button class="btn-action" onclick="submitAdmission()" style="grid-column: span 2;">ADMIT STUDENT</button>
            </div>
        </div>

        <div id="list-page" class="page">
            <div class="table-box">
                <table>
                    <thead>
                        <tr><th>PHOTO</th><th>LIN</th><th>NAME</th><th>ROLL CALL</th><th>PAID</th><th>DEBT</th><th>MANAGE</th></tr>
                    </thead>
                    <tbody id="stTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const _URL = 'https://kjftrwuucjdnhfwesrup.supabase.co'; 
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const client = supabase.createClient(_URL, _KEY);

        function startTime() {
            const now = new Date();
            document.getElementById('txtClock').innerText = now.toLocaleTimeString();
            document.getElementById('txtDate').innerText = now.toDateString();
            setTimeout(startTime, 1000);
        }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        function calcAge(dob) {
            const birth = new Date(dob).getFullYear();
            const now = new Date().getFullYear();
            document.getElementById('rAge').value = (now - birth) + " YEARS";
        }

        async function authenticate() {
            try {
                const id = document.getElementById('schId').value.trim();
                const key = document.getElementById('schKey').value.trim();
                
                const { data: school, error } = await client.from('Schools').select('*').eq('sch_id', id).single();
                
                if (error) { alert("DIAGNOSTIC: Login Table Error. " + error.message); return; }

                if (key === school.admin_key || key === school.teacher_key) {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('dispName').innerText = school.school_name;
                    document.getElementById('dispLogo').src = school.logo_url;
                    fetchStudents();
                } else { alert("ACCESS DENIED: WRONG KEY"); }
            } catch (e) { alert("DIAGNOSTIC: " + e.message); }
        }

        async function fetchStudents() {
            try {
                const { data, error } = await client.from('Students').select('*').order('name', { ascending: true });
                
                if (error) { 
                    alert("DIAGNOSTIC REPORT: Table 'Students' column error. " + error.message);
                    return;
                }

                const tbody = document.getElementById('stTable');
                tbody.innerHTML = '';
                let tDebt = 0, tPres = 0;

                data.forEach(st => {
                    const debt = (st.total_fees || 0) - (st.amount_paid || 0);
                    tDebt += debt;
                    if (!st.is_absent) tPres++;

                    tbody.innerHTML += `<tr>
                        <td><img src="${st.photo_url || 'https://via.placeholder.com/150'}" class="img-circle"></td>
                        <td style="color:var(--primary)">${st.lin}</td>
                        <td>${st.name}</td>
                        <td style="color:${st.is_absent ? 'var(--danger)' : 'var(--success)'}">${st.is_absent ? 'ABSENT' : 'PRESENT'}</td>
                        <td>${(st.amount_paid || 0).toLocaleString()}</td>
                        <td style="color:var(--danger)">${debt.toLocaleString()}</td>
                        <td><button style="font-size:0.5rem; background:#eee; border:none; padding:5px; border-radius:8px; cursor:pointer;">HISTORY</button></td>
                    </tr>`;
                });

                document.getElementById('statTotal').innerText = data.length;
                document.getElementById('statPres').innerText = tPres;
                document.getElementById('statDebt').innerText = "UGX " + tDebt.toLocaleString();
            } catch (e) { alert("DATA ERROR: " + e.message); }
        }

        async function submitAdmission() {
            const payload = {
                lin: document.getElementById('rLin').value,
                name: document.getElementById('rName').value,
                class: document.getElementById('rClass').value,
                dob: document.getElementById('rDob').value,
                age: document.getElementById('rAge').value,
                health_status: document.getElementById('rHealth').value,
                photo_url: document.getElementById('rPhoto').value,
                total_fees: parseFloat(document.getElementById('rFees').value) || 0,
                amount_paid: 0,
                is_absent: false,
                payment_history: []
            };

            const { error } = await client.from('Students').insert([payload]);
            if (error) alert("DIAGNOSTIC REPORT: Admission Failed. Column check: " + error.message);
            else { alert("STUDENT ENROLLED!"); fetchStudents(); showPage('dash-page', document.querySelector('.nav-item')); }
        }
    </script>
</body>
</html>
