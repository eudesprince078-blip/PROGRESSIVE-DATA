<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS ELITE | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #0052cc; --sidebar: #020617; --bg: #f8fafc; --white: #ffffff; --danger: #ef4444; --success: #22c55e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #1e293b; height: 100vh; display: flex; overflow: hidden; }

        /* SIDEBAR - NO OVERLAP */
        .sidebar { width: 280px; background: var(--sidebar); display: flex; flex-direction: column; transition: 0.3s; z-index: 2000; flex-shrink: 0; }
        @media (max-width: 1024px) { .sidebar { position: fixed; height: 100%; transform: translateX(-100%); } .sidebar.open { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.5); } }
        
        .nav-item { display: flex; align-items: center; padding: 14px 20px; color: #94a3b8; border: none; background: transparent; width: 100%; cursor: pointer; font-weight: 700; font-size: 0.8rem; border-radius: 12px; margin-bottom: 4px; transition: 0.2s; text-align: left; }
        .nav-item.active { background: var(--primary); color: white; }

        /* CONTENT AREA */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 70px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #e2e8f0; }
        .content { flex: 1; padding: 20px; overflow-y: auto; }

        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 20px; border: 1px solid #e2e8f0; text-align: center; }
        .stat-card h2 { font-size: 1.4rem; font-weight: 800; color: var(--primary); }
        .stat-card label { font-size: 0.6rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; }

        .glass-card { background: white; border-radius: 24px; padding: 20px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 12px; font-weight: 600; font-size: 0.85rem; }
        .btn-pro { background: var(--primary); color: white; padding: 14px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; width: 100%; }
        
        .photo-circle { width: 100px; height: 100px; border-radius: 50%; background: #f1f5f9; border: 2px dashed #cbd5e1; margin: 0 auto 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .photo-circle img { width: 100%; height: 100%; object-fit: cover; }
        
        .hidden { display: none !important; }
        .absent-tag { background: #fee2e2; color: #ef4444; padding: 4px 8px; border-radius: 6px; font-size: 0.65rem; font-weight: 900; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

    <div id="auth" style="position:fixed; inset:0; background:var(--sidebar); z-index:9999; display:flex; align-items:center; justify-content:center; padding:20px;">
        <div style="background:white; padding:40px; border-radius:30px; width:100%; max-width:400px; text-align:center;">
            <h2 style="font-weight:900; letter-spacing:-1px;">ESMS <span style="color:var(--primary)">ELITE</span></h2>
            <p style="color:#94a3b8; font-size:0.7rem; margin-bottom:25px; font-weight:700;">TENANT LOGIN</p>
            <input type="text" id="login-id" placeholder="SCHOOL ID (e.g. PM001)" style="text-align:center;">
            <button class="btn-pro" id="login-btn" onclick="verify()">UNLOCK SYSTEM</button>
            <p id="login-err" style="color:red; font-size:0.7rem; margin-top:10px; display:none; font-weight:800;">INVALID SCHOOL ID</p>
        </div>
    </div>

    <aside class="sidebar" id="sidebar">
        <div style="padding:40px 20px; text-align:center;">
            <img id="sch-logo" style="height:55px; background:white; border-radius:12px; padding:5px; margin-bottom:10px;">
            <h4 id="side-sch-name" style="color:white; font-size:0.8rem; text-transform:uppercase;"></h4>
        </div>
        <nav style="padding:15px; flex:1; overflow-y:auto;">
            <button class="nav-item active" onclick="nav('dash', this)"><i class="fas fa-home"></i> &nbsp; Dashboard</button>
            <button class="nav-item" onclick="nav('reg', this)"><i class="fas fa-user-plus"></i> &nbsp; Enrollment</button>
            <button class="nav-item" onclick="nav('list', this)"><i class="fas fa-users"></i> &nbsp; Student List</button>
            <button class="nav-item" onclick="nav('fin', this)"><i class="fas fa-wallet"></i> &nbsp; Finance</button>
            <button class="nav-item" onclick="nav('roll', this)"><i class="fas fa-calendar-check"></i> &nbsp; Rollcall</button>
            <button class="nav-item" onclick="nav('rep', this)"><i class="fas fa-file-invoice"></i> &nbsp; Report Cards</button>
        </nav>
        <div style="padding:20px; background:rgba(0,0,0,0.3); color:white; font-size:0.7rem; font-weight:700;">EUDES MEDIA | +256 762 992440</div>
    </aside>

    <main class="main">
        <header class="header">
            <div onclick="document.getElementById('sidebar').classList.toggle('open')" style="cursor:pointer;"><i class="fas fa-bars-staggered"></i></div>
            <h4 id="head-title" style="font-weight:800; font-size:0.9rem;">DASHBOARD</h4>
            <div style="position:relative;"><i class="fas fa-bell"></i><span id="notif-count" style="position:absolute; top:-5px; right:-5px; background:red; color:white; border-radius:50%; font-size:0.5rem; padding:2px 5px;">0</span></div>
        </header>

        <div class="content">
            <div id="v-dash">
                <div class="stat-grid">
                    <div class="stat-card"><h2 id="d-total">0</h2><label>Students</label></div>
                    <div class="stat-card" style="border-color:var(--danger);"><h2 id="d-absent" style="color:var(--danger)">0</h2><label>Absent Today</label></div>
                    <div class="stat-card"><h2><small>UGX</small> <span id="d-demand">0</span></h2><label>Demanding</label></div>
                </div>
                <div class="glass-card">
                    <h4 style="font-weight:800; margin-bottom:15px;">NOTIFICATIONS & ABSENTEES</h4>
                    <div id="absent-names-list"></div>
                </div>
            </div>

            <div id="v-reg" class="hidden">
                <div class="glass-card">
                    <h3 id="form-label" style="margin-bottom:20px;">NEW ENROLLMENT</h3>
                    <div class="photo-circle" id="photo-preview"><i class="fas fa-camera" style="color:#cbd5e1;"></i></div>
                    <input type="file" accept="image/*" onchange="handlePhoto(this)">
                    <input type="hidden" id="f-id"><input type="hidden" id="f-photo-url">
                    
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                        <input type="text" id="f-name" placeholder="FULL NAME">
                        <select id="f-class"><option value="">Class</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
                        <input type="number" id="f-total-fees" placeholder="TOTAL FEES (UGX)">
                        <input type="text" id="f-pcode" placeholder="PAYMENT CODE">
                        <input type="text" id="f-lin" readonly placeholder="LIN (AUTO)">
                    </div>
                    <button class="btn-pro" onclick="save()">SAVE STUDENT</button>
                </div>
            </div>

            <div id="v-fin" class="hidden">
                <div class="glass-card">
                    <h3>FEES MANAGEMENT & HISTORY</h3>
                    <div id="fin-list"></div>
                    <div id="pay-modal" class="hidden" style="margin-top:20px; border-top:2px solid #eee; padding-top:20px;">
                        <h4 id="pay-student-name"></h4>
                        <input type="number" id="pay-amount" placeholder="Enter Amount Paid Now">
                        <button class="btn-pro" onclick="processPayment()">UPDATE BALANCE</button>
                        <div id="pay-history" style="margin-top:15px; font-size:0.8rem; color:#64748b;"></div>
                    </div>
                </div>
            </div>

            <div id="v-roll" class="hidden">
                <div class="glass-card">
                    <h3>ATTENDANCE MARKER</h3>
                    <select id="roll-filter" onchange="renderRoll()"><option value="">Select Class</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
                    <div id="roll-list"></div>
                </div>
            </div>

            <div id="v-rep" class="hidden">
                <div class="glass-card">
                    <h3>AUTO-GRADING SYSTEM</h3>
                    <select id="rep-filter" onchange="renderRepList()"><option value="">Select Class</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
                    <div id="rep-list"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        let db, activeSch, students = [], absentees = [];

        async function verify() {
            const id = document.getElementById('login-id').value.toUpperCase().trim();
            db = supabase.createClient(SB_URL, SB_KEY);
            const { data } = await db.from('Schools').select('*').eq('sch_id', id).single();
            if(data) {
                activeSch = id;
                document.getElementById('side-sch-name').innerText = data.school_name;
                document.getElementById('sch-logo').src = data.logo_url;
                document.getElementById('auth').classList.add('hidden');
                load();
            } else { document.getElementById('login-err').style.display = 'block'; }
        }

        async function load() {
            const { data } = await db.from('Students').select('*').eq('sch_id', activeSch);
            students = data || [];
            updateDash();
            renderFin();
        }

        function handlePhoto(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 300; canvas.height = 300;
                    canvas.getContext('2d').drawImage(img, 0, 0, 300, 300);
                    const compressed = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('photo-preview').innerHTML = `<img src="${compressed}">`;
                    document.getElementById('f-photo-url').value = compressed;
                };
            };
            reader.readAsDataURL(file);
        }

        async function save() {
            const id = document.getElementById('f-id').value;
            const entry = {
                sch_id: activeSch, name: document.getElementById('f-name').value.toUpperCase(),
                class: document.getElementById('f-class').value, total_fees: document.getElementById('f-total-fees').value,
                payment_code: document.getElementById('f-pcode').value, photo_url: document.getElementById('f-photo-url').value,
                lin: document.getElementById('f-lin').value || (activeSch + "-" + Math.floor(1000+Math.random()*9000)),
                paid_fees: 0
            };
            if(id) await db.from('Students').update(entry).eq('id', id);
            else await db.from('Students').insert([entry]);
            alert("SAVED!"); location.reload();
        }

        function updateDash() {
            document.getElementById('d-total').innerText = students.length;
            let totalDemand = 0;
            students.forEach(s => { totalDemand += (Number(s.total_fees) - Number(s.paid_fees || 0)); });
            document.getElementById('d-demand').innerText = totalDemand.toLocaleString();
        }

        function renderFin() {
            document.getElementById('fin-list').innerHTML = students.map(s => `
                <div onclick="openPay('${s.id}')" style="padding:15px; border:1px solid #eee; border-radius:12px; margin-bottom:10px; cursor:pointer; display:flex; justify-content:space-between;">
                    <b>${s.name}</b>
                    <span style="color:red; font-weight:800;">Bal: UGX ${(s.total_fees - s.paid_fees).toLocaleString()}</span>
                </div>
            `).join('');
        }

        let selectedStudentId;
        function openPay(id) {
            selectedStudentId = id;
            const s = students.find(x => x.id == id);
            document.getElementById('pay-modal').classList.remove('hidden');
            document.getElementById('pay-student-name').innerText = "Update Payment for: " + s.name;
            document.getElementById('pay-history').innerHTML = "Current Paid: UGX " + (s.paid_fees || 0).toLocaleString();
        }

        async function processPayment() {
            const amt = Number(document.getElementById('pay-amount').value);
            const s = students.find(x => x.id == selectedStudentId);
            const newTotal = (Number(s.paid_fees) || 0) + amt;
            await db.from('Students').update({ paid_fees: newTotal }).eq('id', selectedStudentId);
            alert("PAYMENT UPDATED"); location.reload();
        }

        function renderRoll() {
            const cls = document.getElementById('roll-filter').value;
            const filtered = students.filter(s => s.class === cls);
            document.getElementById('roll-list').innerHTML = filtered.map(s => `
                <div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #eee;">
                    <b>${s.name}</b>
                    <button onclick="markAbsent('${s.name}')" style="background:var(--danger); color:white; border:none; padding:5px 10px; border-radius:6px;">Mark Absent</button>
                </div>
            `).join('');
        }

        function markAbsent(name) {
            if(!absentees.includes(name)) {
                absentees.push(name);
                document.getElementById('d-absent').innerText = absentees.length;
                document.getElementById('notif-count').innerText = absentees.length;
                document.getElementById('absent-names-list').innerHTML = absentees.map(n => `<span class="absent-tag">${n} is Absent</span>`).join('');
            }
        }

        function nav(v, b) {
            ['v-dash', 'v-reg', 'v-fin', 'v-roll', 'v-rep'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('v-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            b.classList.add('active');
        }
    </script>
</body>
</html>
