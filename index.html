<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS ELITE | FULL PRO SYSTEM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #0052cc; --sidebar: #020617; --bg: #f8fafc; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #1e293b; height: 100vh; overflow: hidden; display: flex; }

        /* SIDEBAR */
        .sidebar { width: 280px; background: var(--sidebar); display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; flex-shrink: 0; }
        @media (max-width: 1024px) { .sidebar { position: fixed; height: 100%; transform: translateX(-100%); } .sidebar.open { transform: translateX(0); } }
        .nav-item { display: flex; align-items: center; padding: 15px 20px; color: #94a3b8; border: none; background: transparent; width: 100%; cursor: pointer; font-weight: 700; font-size: 0.85rem; border-radius: 12px; margin-bottom: 5px; }
        .nav-item.active { background: var(--primary); color: white; }

        /* MAIN AREA */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 70px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; border-bottom: 1px solid #e2e8f0; }
        .content { flex: 1; padding: 25px; overflow-y: auto; }

        /* UI COMPONENTS */
        .glass-card { background: white; border-radius: 24px; padding: 25px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .btn-pro { background: var(--primary); color: white; padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; width: 100%; }
        .btn-edit { color: #0052cc; background: #eff6ff; padding: 6px 10px; border-radius: 8px; border: none; cursor: pointer; }
        .btn-del { color: #ef4444; background: #fef2f2; padding: 6px 10px; border-radius: 8px; border: none; cursor: pointer; }

        /* PHOTO PREVIEW */
        #photo-preview { width: 100px; height: 100px; border-radius: 15px; background: #f1f5f9; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; border: 2px dashed #cbd5e1; overflow: hidden; }
        #photo-preview img { width: 100%; height: 100%; object-fit: cover; }

        /* ID CARD PREVIEW */
        .id-card { width: 320px; height: 200px; background: var(--primary); border-radius: 15px; color: white; padding: 20px; position: relative; }
        
        .hidden { display: none !important; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 15px; font-weight: 600; }
    </style>
</head>
<body>

    <div id="auth" style="position:fixed; inset:0; background:var(--sidebar); z-index:9999; display:flex; align-items:center; justify-content:center;">
        <div style="background:white; padding:40px; border-radius:30px; width:400px; text-align:center;">
            <h2 style="font-weight:900;">ESMS ELITE</h2>
            <p style="font-size:0.7rem; color:#94a3b8; margin-bottom:25px;">EUDES MEDIA | DIGITAL PARTNER</p>
            <input type="text" id="login-id" placeholder="SCHOOL ID (PM001)" style="text-align:center">
            <button class="btn-pro" onclick="verify()">UNLOCK SYSTEM</button>
        </div>
    </div>

    <aside class="sidebar" id="sidebar">
        <div style="padding:30px; text-align:center; border-bottom:1px solid #1e293b;">
            <img id="sch-logo" style="height:50px; margin-bottom:10px;">
            <h4 id="side-sch-name" style="color:white; font-size:0.8rem;"></h4>
        </div>
        <nav style="padding:15px; flex:1;">
            <button class="nav-item active" onclick="nav('dash', this)"><i class="fas fa-home"></i> &nbsp; Dashboard</button>
            <button class="nav-item" onclick="nav('reg', this)"><i class="fas fa-user-plus"></i> &nbsp; Enrollment</button>
            <button class="nav-item" onclick="nav('list', this)"><i class="fas fa-users"></i> &nbsp; Student List</button>
            <button class="nav-item" onclick="nav('roll', this)"><i class="fas fa-check-double"></i> &nbsp; Rollcall</button>
            <button class="nav-item" onclick="nav('sms', this)"><i class="fas fa-bullhorn"></i> &nbsp; Broadcasting</button>
        </nav>
        <div style="padding:20px; background:rgba(0,0,0,0.2); color:white; font-size:0.7rem;">
            SUPPORT: +256 762 992440
        </div>
    </aside>

    <main class="main">
        <header class="header">
            <div onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></div>
            <h4 id="head-title" style="font-weight:800;"></h4>
            <div style="background:#dcfce7; color:#166534; padding:5px 12px; border-radius:8px; font-size:0.6rem; font-weight:900;">LIVE CLOUD</div>
        </header>

        <div class="content">
            <div id="v-dash">
                <div class="glass-card" style="display:flex; align-items:center; gap:20px;">
                    <div style="background:#eff6ff; padding:20px; border-radius:20px;"><i class="fas fa-users" style="color:var(--primary); font-size:1.5rem;"></i></div>
                    <div><h2 id="total-std">0</h2><label style="font-size:0.7rem; font-weight:800; color:#94a3b8;">TOTAL STUDENTS</label></div>
                </div>
            </div>

            <div id="v-reg" class="hidden">
                <div class="glass-card">
                    <h3 style="margin-bottom:20px;">ENROLL NEW LEARNER</h3>
                    <div id="photo-preview"><i class="fas fa-camera"></i></div>
                    <label>Upload Photo</label>
                    <input type="file" id="f-photo" accept="image/*" onchange="previewPhoto(this)">
                    
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                        <input type="text" id="f-name" placeholder="FULL NAME">
                        <input type="number" id="f-age" placeholder="AGE">
                        <input type="date" id="f-dob">
                        <input type="text" id="f-loc" placeholder="PHYSICAL LOCATION">
                        <input type="text" id="f-health" value="NORMAL" placeholder="HEALTH STATUS">
                        <input type="text" id="f-lin" readonly style="color:var(--primary)">
                    </div>
                    <button class="btn-pro" onclick="save()">SAVE STUDENT</button>
                </div>
            </div>

            <div id="v-list" class="hidden">
                <div class="glass-card">
                    <input type="text" placeholder="Search students..." onkeyup="search(this)">
                    <div style="overflow-x:auto;">
                        <table style="width:100%; border-collapse:collapse;">
                            <thead><tr style="text-align:left; border-bottom:2px solid #f1f5f9;">
                                <th>Photo</th><th>Name</th><th>LIN</th><th>Class</th><th>Actions</th>
                            </tr></thead>
                            <tbody id="table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="v-roll" class="hidden">
                <div class="glass-card">
                    <h3>DAILY ATTENDANCE</h3>
                    <p style="font-size:0.8rem; margin-bottom:20px;">Mark students present/absent today.</p>
                    <div id="roll-list"></div>
                    <button class="btn-pro" style="margin-top:20px;">SUBMIT ROLLCALL</button>
                </div>
            </div>

            <div id="v-sms" class="hidden">
                <div class="glass-card">
                    <h3>MESSAGE BROADCASTING</h3>
                    <textarea placeholder="Type message to parents..." rows="4"></textarea>
                    <button class="btn-pro">SEND TO ALL PARENTS</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        let db, activeSch;

        async function verify() {
            const id = document.getElementById('login-id').value.toUpperCase();
            db = supabase.createClient(SB_URL, SB_KEY);
            const { data } = await db.from('Schools').select('*').eq('sch_id', id).single();
            if(data) {
                activeSch = id;
                document.getElementById('side-sch-name').innerText = data.school_name;
                document.getElementById('head-title').innerText = data.school_name;
                document.getElementById('sch-logo').src = data.logo_url;
                document.getElementById('auth').classList.add('hidden');
                genLIN(); load();
            }
        }

        function previewPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => document.getElementById('photo-preview').innerHTML = `<img src="${e.target.result}">`;
                reader.readAsDataURL(input.files[0]);
            }
        }

        function genLIN() { document.getElementById('f-lin').value = activeSch + "-" + Math.floor(1000 + Math.random()*9000); }

        async function load() {
            const { data } = await db.from('Students').select('*').eq('sch_id', activeSch);
            if(data) {
                document.getElementById('total-std').innerText = data.length;
                document.getElementById('table-body').innerHTML = data.map(s => `
                    <tr style="border-bottom:1px solid #f8fafc;">
                        <td style="padding:10px;"><img src="${s.photo_url || 'https://via.placeholder.com/40'}" style="width:40px;height:40px;border-radius:8px;"></td>
                        <td style="font-weight:800;">${s.name}</td>
                        <td style="font-family:monospace;">${s.lin}</td>
                        <td>${s.class || 'P.1'}</td>
                        <td>
                            <button class="btn-edit" onclick="alert('Edit ${s.name}')"><i class="fas fa-edit"></i></button>
                            <button class="btn-del" onclick="deleteStd('${s.id}')"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
                
                document.getElementById('roll-list').innerHTML = data.map(s => `
                    <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #f1f5f9;">
                        <span>${s.name}</span>
                        <input type="checkbox" style="width:20px; height:20px;">
                    </div>
                `).join('');
            }
        }

        async function save() {
            const entry = {
                sch_id: activeSch, name: document.getElementById('f-name').value.toUpperCase(),
                age: document.getElementById('f-age').value, dob: document.getElementById('f-dob').value,
                location: document.getElementById('f-loc').value.toUpperCase(), health_status: document.getElementById('f-health').value.toUpperCase(),
                lin: document.getElementById('f-lin').value
            };
            await db.from('Students').insert([entry]);
            alert("STUDENT SAVED"); location.reload();
        }

        async function deleteStd(id) {
            if(confirm("DELETE STUDENT?")) {
                await db.from('Students').delete().eq('id', id);
                load();
            }
        }

        function nav(v, b) {
            ['v-dash', 'v-reg', 'v-list', 'v-roll', 'v-sms'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('v-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            b.classList.add('active');
        }

        function search(i) {
            let q = i.value.toUpperCase();
            document.querySelectorAll('#table-body tr').forEach(r => r.style.display = r.innerText.toUpperCase().includes(q) ? "" : "none");
        }
    </script>
</body>
</html>
