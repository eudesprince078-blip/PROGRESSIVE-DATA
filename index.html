<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS ELITE | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --main: #0047AB; --bg: #f4f7fe; --dark: #0f172a; --accent: #F5B81B; --white: #ffffff; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--dark); height: 100vh; display: flex; overflow: hidden; }

        /* SIDE NAVIGATION */
        .sidebar { width: 260px; background: var(--dark); display: flex; flex-direction: column; padding: 30px 15px; flex-shrink: 0; }
        .nav-btn { width: 100%; display: flex; align-items: center; padding: 15px 20px; color: #94a3b8; cursor: pointer; border-radius: 12px; margin-bottom: 8px; border: none; background: transparent; transition: 0.3s; font-weight: 600; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .nav-btn i { font-size: 1.2rem; margin-right: 15px; width: 25px; }
        .nav-btn.active { background: var(--main); color: white; box-shadow: 0 10px 20px rgba(0, 71, 171, 0.2); }
        .nav-btn:hover:not(.active) { background: rgba(255,255,255,0.05); color: white; }

        /* MAIN CONTENT AREA */
        .main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-nav { height: 75px; background: var(--white); padding: 0 30px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .content { flex: 1; padding: 30px; overflow-y: auto; }

        /* STATS CARDS */
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--white); padding: 20px; border-radius: 20px; display: flex; align-items: center; border: 1px solid var(--border); }
        .stat-icon { width: 50px; height: 50px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; margin-right: 15px; }

        /* FORMS */
        .panel { background: var(--white); border-radius: 24px; padding: 30px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; font-weight: 800; color: #64748b; margin-bottom: 6px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px 15px; border-radius: 10px; border: 1.5px solid #e2e8f0; background: #f8fafc; font-size: 0.9rem; font-weight: 600; outline: none; }
        input:focus { border-color: var(--main); background: white; }

        /* TABLE */
        .table-wrap { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { text-align: left; padding: 15px; background: #f8fafc; font-size: 0.7rem; font-weight: 800; color: #64748b; text-transform: uppercase; border-bottom: 2px solid var(--border); }
        td { padding: 15px; font-size: 0.85rem; font-weight: 600; border-bottom: 1px solid #f1f5f9; }

        .btn-action { background: var(--main); color: white; padding: 14px 28px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; }
        .hidden { display: none !important; }
        .tag-active { background: #dcfce7; color: #166534; padding: 5px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div style="margin-bottom: 40px; text-align: center;">
            <h1 style="color: white; font-weight: 800; font-size: 1.5rem;">EUDES<span style="color: var(--accent);">.</span></h1>
            <p style="color: #475569; font-size: 0.6rem; font-weight: 700; letter-spacing: 2px;">MEDIA ELITE</p>
        </div>
        
        <button class="nav-btn active" onclick="tab('dash', this)"><i class="fas fa-chart-line"></i>Dashboard</button>
        <button class="nav-btn" onclick="tab('reg', this)"><i class="fas fa-plus-circle"></i>New Admission</button>
        <button class="nav-btn" onclick="tab('list', this)"><i class="fas fa-address-book"></i>Student List</button>
        
        <div style="margin-top: auto; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 15px; text-align: center;">
            <p style="color: #94a3b8; font-size: 0.6rem; font-weight: 700;">OFFICIAL SUPPORT</p>
            <p style="color: white; font-size: 0.8rem; font-weight: 800; margin-top: 5px;">+256 762 992440</p>
        </div>
    </nav>

    <div class="main">
        <header class="top-nav">
            <div>
                <h2 id="school-name" style="font-weight: 800; font-size: 1rem;">CONNECTING...</h2>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <span style="font-size: 0.7rem; font-weight: 800; color: #16a34a; background: #dcfce7; padding: 5px 12px; border-radius: 20px;">SYSTEM ONLINE</span>
            </div>
        </header>

        <div class="content">
            <div id="view-dash">
                <div class="grid-stats">
                    <div class="stat-card">
                        <div class="stat-icon" style="background: #e0e7ff; color: #4338ca;"><i class="fas fa-user-graduate"></i></div>
                        <div><h2 id="total-students">0</h2><label>TOTAL LEARNERS</label></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: #fef3c7; color: #92400e;"><i class="fas fa-calendar-alt"></i></div>
                        <div><h2 id="expiry-display">--</h2><label>SYSTEM EXPIRY</label></div>
                    </div>
                </div>
            </div>

            <div id="view-reg" class="hidden">
                <div class="panel" style="max-width: 800px; margin: 0 auto;">
                    <h2 style="margin-bottom: 25px; font-weight: 800; border-left: 5px solid var(--main); padding-left: 15px;">LEARNER ENROLLMENT</h2>
                    
                    <div class="form-row">
                        <div class="input-group"><label>Full Name</label><input type="text" id="in-name" placeholder="Name"></div>
                        <div class="input-group"><label>LIN (Generated)</label><input type="text" id="in-lin" readonly style="background:#edf2f7;"></div>
                    </div>

                    <div class="form-row">
                        <div class="input-group"><label>Age</label><input type="number" id="in-age"></div>
                        <div class="input-group"><label>Date of Birth</label><input type="date" id="in-dob"></div>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label>Class</label>
                            <select id="in-class">
                                <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                                <option>P.5</option><option>P.6</option><option>P.7</option>
                            </select>
                        </div>
                        <div class="input-group"><label>Health Status</label><input type="text" id="in-health" value="Normal"></div>
                    </div>

                    <div class="form-row">
                        <div class="input-group"><label>Physical Location</label><input type="text" id="in-loc"></div>
                        <div class="input-group"><label>Guardian Contact</label><input type="tel" id="in-tel" value="+256"></div>
                    </div>

                    <button class="btn-action" onclick="saveStudent()" id="save-btn">SUBMIT TO CLOUD DATABASE</button>
                </div>
            </div>

            <div id="view-list" class="hidden">
                <div class="panel">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                        <h2 style="font-weight: 800;">STUDENT DIRECTORY</h2>
                        <input type="text" placeholder="Search by name or LIN..." style="width: 300px; margin-bottom:0;" onkeyup="searchTable(this)">
                    </div>
                    <div class="table-wrap">
                        <table id="main-table">
                            <thead>
                                <tr><th>Learner Name</th><th>LIN Number</th><th>Class</th><th>Location</th><th>Health</th><th>Status</th></tr>
                            </thead>
                            <tbody id="list-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const S_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const supa = supabase.createClient(S_URL, S_KEY);

        let activeID = "PM001"; // Hardcoded for Progressive Mother's for now

        async function init() {
            // Load School Info
            const { data: sch } = await supa.from('Schools').select('*').eq('sch_id', activeID).single();
            if(sch) {
                document.getElementById('school-name').innerText = sch.school_name;
                document.getElementById('expiry-display').innerText = sch.expiry_date;
            }
            // Generate Random LIN
            document.getElementById('in-lin').value = "LIN-" + Math.floor(100000 + Math.random() * 900000);
            fetchList();
        }

        async function fetchList() {
            const { data } = await supa.from('Students').select('*').eq('sch_id', activeID);
            if(data) {
                document.getElementById('total-students').innerText = data.length;
                const tbody = document.getElementById('list-body');
                tbody.innerHTML = data.map(s => `
                    <tr>
                        <td style="color:var(--main); font-weight:800;">${s.name}</td>
                        <td style="font-family: monospace;">${s.lin}</td>
                        <td>${s.class}</td>
                        <td>${s.location || 'N/A'}</td>
                        <td style="font-size:0.75rem;">${s.health_status || 'Normal'}</td>
                        <td><span class="tag-active">Active</span></td>
                    </tr>
                `).join('');
            }
        }

        async function saveStudent() {
            const btn = document.getElementById('save-btn');
            const student = {
                sch_id: activeID,
                name: document.getElementById('in-name').value,
                lin: document.getElementById('in-lin').value,
                age: document.getElementById('in-age').value,
                dob: document.getElementById('in-dob').value,
                class: document.getElementById('in-class').value,
                health_status: document.getElementById('in-health').value,
                location: document.getElementById('in-loc').value,
                contact: document.getElementById('in-tel').value
            };

            if(!student.name) return alert("ENTER NAME");

            btn.innerText = "UPLOADING...";
            btn.disabled = true;

            const { error } = await supa.from('Students').insert([student]);
            if(!error) {
                alert("SUCCESSFULLY REGISTERED");
                location.reload();
            } else {
                alert("ERROR: " + error.message);
                btn.disabled = false;
                btn.innerText = "SUBMIT TO CLOUD DATABASE";
            }
        }

        function tab(t, btn) {
            ['dash', 'reg', 'list'].forEach(id => document.getElementById('view-'+id).classList.add('hidden'));
            document.getElementById('view-'+t).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function searchTable(input) {
            let filter = input.value.toUpperCase();
            let tr = document.getElementById("main-table").getElementsByTagName("tr");
            for (let i = 1; i < tr.length; i++) {
                let td = tr[i].getElementsByTagName("td")[0];
                let td2 = tr[i].getElementsByTagName("td")[1];
                if (td || td2) {
                    let txt = (td.textContent || td.innerText) + (td2.textContent || td2.innerText);
                    tr[i].style.display = txt.toUpperCase().indexOf(filter) > -1 ? "" : "none";
                }
            }
        }

        window.onload = init;
    </script>
</body>
</html>
