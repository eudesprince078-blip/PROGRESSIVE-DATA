<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESMS AUTHORITY | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0047AB; --bg: #0f172a; --white: #ffffff; }
        * { box-sizing: border-box; text-transform: uppercase; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: var(--white); padding: 40px; border-radius: 30px; width: 95%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 2px solid #e2e8f0; font-weight: 700; text-align: center; outline: none; }
        .btn { padding: 16px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; color: white; background: var(--primary); width: 100%; }
        #err { color: #e11d48; font-size: 0.7rem; margin-top: 15px; font-weight: 800; display: none; background: #fff1f2; padding: 10px; border-radius: 10px; }
        #dash { display: none; color: white; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="color:var(--primary); margin:0; font-size: 1.6rem;">ESMS AUTHORITY</h1>
            <p style="font-size:0.55rem; color:#64748b; font-weight:800; margin-bottom:25px;">EUDES MEDIA SOLUTIONS</p>
            <input type="text" id="schId" placeholder="SCHOOL ID (PM001)">
            <input type="password" id="schKey" placeholder="ACCESS KEY">
            <button class="btn" onclick="authenticate()">OPEN SYSTEM</button>
            <div id="err"></div>
        </div>
    </div>

    <div id="dash">
        <div style="background:white; color:#000; padding:40px; border-radius:30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <h1 id="schName" style="color:var(--primary); margin-top:0;"></h1>
            <p style="font-weight: 800; color: #15803d;">✅ SYSTEM ONLINE</p>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
            <p style="font-size: 0.7rem; color: #64748b;">CONNECTED TO DATABASE: <b>SCHOOLS</b></p>
            <button class="btn" onclick="location.reload()" style="background:#444; margin-top:20px;">LOGOUT</button>
        </div>
    </div>

    <script>
        const _URL = 'https://kjftrwuucjdnhfwesrup.supabase.co'; 
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const client = supabase.createClient(_URL, _KEY);

        async function authenticate() {
            const idInput = document.getElementById('schId').value.trim().toUpperCase();
            const keyInput = document.getElementById('schKey').value.trim();
            const errBox = document.getElementById('err');
            errBox.style.display = "none";

            try {
                // We specifically target the table with the Capital 'S'
                const { data, error } = await client
                    .from('Schools')
                    .select('*')
                    .eq('scho_id', idInput)
                    .single();

                if (error || !data) {
                    throw new Error("SCHOOL ID NOT FOUND IN 'Schools' TABLE");
                }

                // Verify the Access Key (PM2026)
                if (keyInput === data.admin_key || keyInput === data.teacher_key) {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('dash').style.display = 'block';
                    document.getElementById('schName').innerText = data.school_name;
                } else {
                    throw new Error("INVALID ACCESS KEY");
                }

            } catch (e) {
                errBox.style.display = "block";
                errBox.innerText = "❌ " + e.message;
            }
        }
    </script>
</body>
</html>
