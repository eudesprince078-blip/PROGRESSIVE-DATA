<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eudes Media | Supreme Management System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #002d5b; --gold: #ffc107; --red: #d90429; --white: #ffffff; --light: #f1f4f9; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--light); margin: 0; padding: 0; color: #333; }
        
        /* High Visibility Headers */
        .header { background: var(--blue); color: white; padding: 20px 15px; border-bottom: 5px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .hero { background: #001a33; padding: 30px 15px; text-align: center; color: white; }
        #clock { font-size: 42px; font-weight: 900; letter-spacing: 2px; }
        
        /* Bold Dashboard Stats */
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; margin-top: -40px; }
        .stat-card { background: white; padding: 20px 10px; border-radius: 15px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.15); border-top: 5px solid var(--blue); }
        .stat-val { font-size: 24px; font-weight: 900; color: var(--blue); display: block; }
        .stat-lbl { font-size: 10px; font-weight: 800; color: #777; text-transform: uppercase; margin-top: 5px; }
        
        /* Bigger Navigation */
        .nav-tabs { display: flex; background: white; border-bottom: 2px solid #ddd; position: sticky; top: 0; z-index: 1000; }
        .tab { flex: 1; text-align: center; padding: 18px 5px; font-size: 14px; font-weight: 900; color: #999; cursor: pointer; text-transform: uppercase; }
        .tab.active { color: var(--blue); border-bottom: 4px solid var(--blue); background: #fdfdfd; }
        
        /* Large Readable Table */
        .card { background: white; border-radius: 15px; padding: 20px; margin: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px 8px; background: #eee; font-size: 13px; font-weight: 900; color: var(--blue); text-transform: uppercase; }
        td { padding: 14px 8px; border-bottom: 1px solid #eee; font-size: 14px; font-weight: 700; }
        tr:nth-child(even) { background-color: #fcfcfc; }

        /* Professional Buttons and Inputs */
        .btn-main { width: 100%; background: var(--blue); color: white; padding: 20px; border: none; border-radius: 12px; font-size: 16px; font-weight: 900; cursor: pointer; }
        input { width: 100%; padding: 16px; border: 2px solid #ddd; border-radius: 12px; margin-bottom: 15px; font-size: 16px; font-weight: 600; box-sizing: border-box; }
        label { font-weight: 900; font-size: 13px; color: var(--blue); text-transform: uppercase; display: block; margin-bottom: 5px; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="mainApp">
    <div class="header">
        <div><b id="headerSchoolName" style="font-size: 18px;">SYSTEM PORTAL</b><br><span style="font-size:11px; color:var(--gold); font-weight: 800;">ADMINISTRATION ACCESS</span></div>
        <button onclick="location.reload()" style="background:var(--red); color:white; border:none; padding:10px 15px; border-radius:8px; font-weight:900;">LOGOUT</button>
    </div>
    
    <div class="hero"><div id="clock">00:00:00</div></div>
    
    <div class="dashboard">
        <div class="stat-card"><span class="stat-val" id="c-tot">0</span><span class="stat-lbl">Pupils</span></div>
        <div class="stat-card"><span class="stat-val" style="color:#2b9348">LIVE</span><span class="stat-lbl">Server</span></div>
        <div class="stat-card"><span class="stat-val" style="color:var(--gold)">1</span><span class="stat-lbl">Entity</span></div>
    </div>

    <div class="nav-tabs">
        <div class="tab active" id="t-rec" onclick="tab('rec')">Master Records</div>
        <div class="tab" id="t-adm" onclick="tab('adm')">New Entry</div>
    </div>

    <div id="v-rec" class="p-view">
        <div class="card" style="padding:10px; overflow-x:auto;">
            <h2 style="color:var(--blue); text-align:center; margin-bottom:20px;">STUDENT MASTER LEDGER</h2>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Student Name</th>
                        <th>Age</th>
                        <th>Location</th>
                        <th>Contact</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="v-adm" class="hidden p-view">
        <div class="card">
            <h2 style="color:var(--blue); margin-top:0;">PUPIL REGISTRATION</h2>
            <label>Full Name</label><input id="name" placeholder="Full Name">
            <label>Age</label><input id="age" type="number" placeholder="Enter Age">
            <label>Physical Location</label><input id="loc" placeholder="Current Residence">
            <label>Guardian Contact</label><input id="contact" placeholder="+256...">
            <button onclick="submitData()" class="btn-main" id="saveBtn">SUBMIT TO SYSTEM</button>
        </div>
    </div>

    <div style="text-align:center; padding:30px; color:#999; font-size:12px; font-weight:900;">
        EUDES MEDIA SOFTWARE | +256762992440
    </div>
</div>

<script>
    const SUPA_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
    const _client = supabase.createClient(SUPA_URL, SUPA_KEY);
    let cachedData = [];

    // Auto-Login for Director (Your Credentials)
    window.currentSchool = {id: 1, school_name: "Progressive Mothers", brand_color: "#002d5b"};

    async function init() {
        document.getElementById('headerSchoolName').innerText = window.currentSchool.school_name.toUpperCase();
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
        await loadData();
    }

    async function loadData() {
        const { data } = await _client.from('students').select('*').eq('school_id', window.currentSchool.id).order('name', { ascending: true });
        if(data) { cachedData = data; renderUI(); }
    }

    function renderUI() {
        const body = document.getElementById('tableBody');
        body.innerHTML = "";
        cachedData.forEach((s, index) => {
            body.innerHTML += `
                <tr>
                    <td style="color:var(--blue)">${index+1}</td>
                    <td><b style="text-transform:uppercase;">${s.name}</b></td>
                    <td>${s.age || '-'}</td>
                    <td style="font-size:12px;">${s.location || '-'}</td>
                    <td style="color:#555;">${s.contact || '-'}</td>
                </tr>`;
        });
        document.getElementById('c-tot').innerText = cachedData.length;
    }

    async function submitData() {
        const btn = document.getElementById('saveBtn');
        const payload = {
            school_id: window.currentSchool.id,
            name: document.getElementById('name').value,
            age: document.getElementById('age').value,
            location: document.getElementById('loc').value,
            contact: document.getElementById('contact').value
        };
        if(!payload.name) return alert("Please enter a name");
        
        btn.innerText = "SAVING...";
        const { error } = await _client.from('students').insert([payload]);
        if(!error) {
            alert("SUCCESSFULLY REGISTERED");
            document.querySelectorAll('input').forEach(i => i.value = "");
            await loadData();
            tab('rec');
        }
        btn.innerText = "SUBMIT TO SYSTEM";
    }

    function tab(t) { 
        document.querySelectorAll('.p-view').forEach(v => v.classList.add('hidden')); 
        document.getElementById('v-'+t).classList.remove('hidden');
        document.querySelectorAll('.tab').forEach(tb => tb.classList.remove('active'));
        document.getElementById('t-'+t).classList.add('active');
    }

    init();
</script>
</body>
</html>
