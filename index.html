<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0052cc; --dark: #020617; --bg: #f1f5f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #0f172a; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* BIG HEADER */
        .header-main { background: white; padding: 20px; border-bottom: 3px solid var(--primary); text-align: center; }
        .sch-name { font-size: 1.4rem; font-weight: 900; color: var(--primary); text-transform: uppercase; letter-spacing: -0.5px; }
        .dt-box { font-size: 0.85rem; font-weight: 700; color: #64748b; margin-top: 5px; }

        .wrapper { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* SIDEBAR */
        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 280px; background: var(--dark); z-index: 1000; transform: translateX(-100%); transition: 0.3s; }
        .sidebar.open { transform: translateX(0); }
        .nav-item { padding: 18px 25px; color: #94a3b8; cursor: pointer; display: flex; align-items: center; font-weight: 700; border: none; background: none; width: 100%; text-align: left; }
        .nav-item.active { background: var(--primary); color: white; }
        
        /* SCROLLABLE CONTENT */
        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        
        .card { background: white; border-radius: 20px; padding: 20px; border: 1px solid #e2e8f0; margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .stat-card { background: white; padding: 15px; border-radius: 18px; border-left: 4px solid var(--primary); }
        
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #cbd5e1; margin-bottom: 10px; font-weight: 600; }
        .btn-pro { background: var(--primary); color: white; padding: 16px; border-radius: 14px; border: none; font-weight: 800; width: 100%; cursor: pointer; }

        /* LIST STYLING */
        .st-card { background: white; padding: 12px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 12px; }
        .st-img { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; background: #f1f5f9; }
        
        #auth { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 998; display: none; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

    <div id="auth">
        <div style="background:white; padding:40px; border-radius:30px; width:92%; max-width:400px; text-align:center;">
            <h1 style="font-weight:900;">ESMS <span style="color:var(--primary)">ELITE</span></h1>
            <input type="text" id="l-sch" placeholder="SCHOOL ID" style="text-align:center; text-transform:uppercase; margin-top:20px;">
            <input type="password" id="l-key" placeholder="ACCESS KEY" style="text-align:center;">
            <button class="btn-pro" onclick="login()">VERIFY ACCESS</button>
        </div>
    </div>

    <header class="header-main">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <i class="fas fa-bars" onclick="toggleMenu()" style="font-size:1.5rem; color:var(--dark)"></i>
            <span id="role-tag" style="font-size:0.6rem; font-weight:800; background:#e2e8f0; padding:4px 10px; border-radius:20px;">USER</span>
        </div>
        <div id="sch-display" class="sch-name">PROGRESSIVE MOTHER'S</div>
        <div id="clock-display" class="dt-box">Loading Date & Time...</div>
    </header>

    <div class="wrapper">
        <aside class="sidebar" id="sidebar">
            <div style="padding:40px 25px;"><h2 style="color:white; font-weight:900;">PORTAL</h2></div>
            <nav>
                <button class="nav-item active" onclick="nav('dash', this)"><i class="fas fa-chart-pie"></i>Dashboard</button>
                <button class="nav-item" id="n-reg" onclick="nav('reg', this)"><i class="fas fa-plus-circle"></i>New Student</button>
                <button class="nav-item" onclick="nav('list', this)"><i class="fas fa-address-book"></i>Student List</button>
                <button class="nav-item" id="n-fin" onclick="nav('fin', this)"><i class="fas fa-wallet"></i>Financials</button>
            </nav>
        </aside>

        <main class="content">
            <div id="v-dash">
                <div class="stat-grid">
                    <div class="stat-card"><h3 id="c-total">0</h3><small>ENROLLED</small></div>
                    <div class="stat-card"><h3 id="c-debt" style="color:red">0</h3><small>TOTAL DEBT</small></div>
                    <div class="stat-card"><h3 id="c-present" style="color:green">0</h3><small>PRESENT TODAY</small></div>
                    <div class="stat-card"><h3>100%</h3><small>SYSTEM STATUS</small></div>
                </div>
            </div>

            <div id="v-reg" class="hidden">
                <div class="card">
                    <h3 id="f-title">NEW ENROLLMENT</h3>
                    <input type="hidden" id="f-id">
                    <div style="text-align:center; margin:15px 0;">
                        <img id="f-preview" style="width:80px; height:80px; border-radius:15px; object-fit:cover; display:none; margin:0 auto 10px; border:2px solid var(--primary);">
                        <input type="file" onchange="imgP(this)" style="font-size:0.7rem;">
                        <input type="hidden" id="f-img">
                    </div>
                    <input type="text" id="f-name" placeholder="Full Name">
                    <select id="f-class">
                        <option>Baby Class</option><option>Middle Class</option><option>Top Class</option>
                        <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                        <option>P.5</option><option>P.6</option><option>P.7</option>
                    </select>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <input type="number" id="f-age" placeholder="Age">
                        <input type="date" id="f-dob">
                    </div>
                    <input type="text" id="f-contact" placeholder="Contact">
                    <input type="text" id="f-loc" placeholder="Location">
                    <input type="text" id="f-health" placeholder="Health Status">
                    <input type="number" id="f-fees" placeholder="Total Fees (UGX)">
                    <button class="btn-pro" onclick="save()">SAVE STUDENT</button>
                    <button id="f-cancel" class="hidden" onclick="resetForm()" style="width:100%; margin-top:10px; background:#94a3b8; color:white; border:none; padding:10px; border-radius:10px;">CANCEL</button>
                </div>
            </div>

            <div id="v-list" class="hidden">
                <div style="position:sticky; top:0; background:var(--bg); padding-bottom:10px; z-index:5;">
                    <input type="text" id="search" placeholder="Search Name, Class, or LIN..." onkeyup="filter()">
                </div>
                <div id="list-container"></div>
            </div>

            <div id="v-fin" class="hidden">
                <div class="card"><h3 style="margin-bottom:15px;">FEE COLLECTION</h3><div id="fin-container"></div></div>
            </div>
        </main>
    </div>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        let db, activeSch, role, students = [];

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        async function login() {
            const sid = document.getElementById('l-sch').value.toUpperCase().trim();
            const key = document.getElementById('l-key').value.trim();
            db = supabase.createClient(SB_URL, SB_KEY);
            const { data } = await db.from('Schools').select('*').eq('sch_id', sid).single();

            if (data) {
                if (key === data.admin_key) role = 'ADMIN';
                else if (key === data.finance_key) role = 'FINANCE';
                else if (key === data.teacher_key) role = 'TEACHER';
                else { alert("WRONG KEY"); return; }

                activeSch = sid;
                document.getElementById('sch-display').innerText = data.school_name || data.sch_name;
                document.getElementById('role-tag').innerText = role;
                document.getElementById('auth').classList.add('hidden');
                if(role === 'TEACHER') { document.getElementById('n-reg').remove(); document.getElementById('n-fin').remove(); }
                refresh();
            } else { alert("ID NOT FOUND"); }
        }

        async function refresh() {
            const { data } = await db.from('Students').select('*').eq('sch_id', activeSch).order('name', { ascending: true });
            students = data || [];
            render();
        }

        function imgP(i) {
            const r = new FileReader();
            r.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const c = document.createElement('canvas');
                    c.width = 200; c.height = 200;
                    c.getContext('2d').drawImage(img,0,0,200,200);
                    const b = c.toDataURL('image/jpeg',0.6);
                    document.getElementById('f-preview').src = b;
                    document.getElementById('f-preview').style.display='block';
                    document.getElementById('f-img').value = b;
                };
                img.src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }

        async function save() {
            const id = document.getElementById('f-id').value;
            const p = {
                sch_id: activeSch,
                name: document.getElementById('f-name').value.toUpperCase(),
                class: document.getElementById('f-class').value,
                age: parseInt(document.getElementById('f-age').value),
                dob: document.getElementById('f-dob').value,
                contact: document.getElementById('f-contact').value,
                location: document.getElementById('f-loc').value,
                health_status: document.getElementById('f-health').value,
                total_fees: parseInt(document.getElementById('f-fees').value),
                photo_url: document.getElementById('f-img').value
            };

            if(id) { await db.from('Students').update(p).eq('id', id); }
            else {
                p.lin = activeSch + "-" + Math.floor(1000 + Math.random()*8999);
                p.payment_code = "PAY" + Date.now().toString().slice(-6);
                await db.from('Students').insert([p]);
            }
            alert("SUCCESS"); refresh(); resetForm(); nav('list');
        }

        function render() {
            let d = 0; students.forEach(s => d += (s.total_fees - (s.paid_fees || 0)));
            document.getElementById('c-total').innerText = students.length;
            document.getElementById('c-debt').innerText = d.toLocaleString();

            const html = students.map(s => `
                <div class="st-card">
                    <img src="${s.photo_url || ''}" class="st-img">
                    <div style="flex:1"><b>${s.name}</b><br><small>${s.class} | ${s.lin}</small></div>
                    <div style="display:flex; gap:12px;">
                        <i class="fas fa-edit" style="color:var(--primary)" onclick="editMode('${s.id}')"></i>
                        <i class="fas fa-trash" style="color:red" onclick="del('${s.id}')"></i>
                    </div>
                </div>`).join('');
            document.getElementById('list-container').innerHTML = html;

            document.getElementById('fin-container').innerHTML = students.map(s => `
                <div class="st-card">
                    <div style="flex:1"><b>${s.name}</b><br><small>Bal: ${(s.total_fees - (s.paid_fees||0)).toLocaleString()}</small></div>
                    <input type="number" placeholder="UGX" style="width:90px; margin:0;" onchange="pay('${s.id}', this.value)">
                </div>`).join('');
        }

        function filter() {
            const q = document.getElementById('search').value.toUpperCase();
            const f = students.filter(s => s.name.includes(q) || s.class.toUpperCase().includes(q) || s.lin.includes(q));
            document.getElementById('list-container').innerHTML = f.map(s => `
                <div class="st-card">
                    <img src="${s.photo_url || ''}" class="st-img">
                    <div style="flex:1"><b>${s.name}</b><br><small>${s.class} | ${s.lin}</small></div>
                    <i class="fas fa-edit" style="color:var(--primary)" onclick="editMode('${s.id}')"></i>
                </div>`).join('');
        }

        async function pay(id, v) {
            const s = students.find(x => x.id == id);
            const total = Number(s.paid_fees || 0) + Number(v);
            const { error } = await db.from('Students').update({ paid_fees: total }).eq('id', id);
            if(!error) { alert("PAYMENT SAVED"); refresh(); }
        }

        async function del(id) { if(confirm("DELETE?")) { await db.from('Students').delete().eq('id', id); refresh(); } }

        function editMode(id) {
            const s = students.find(x => x.id == id);
            document.getElementById('f-id').value = s.id;
            document.getElementById('f-name').value = s.name;
            document.getElementById('f-class').value = s.class;
            document.getElementById('f-age').value = s.age;
            document.getElementById('f-dob').value = s.dob;
            document.getElementById('f-contact').value = s.contact;
            document.getElementById('f-loc').value = s.location;
            document.getElementById('f-health').value = s.health_status;
            document.getElementById('f-fees').value = s.total_fees;
            document.getElementById('f-img').value = s.photo_url;
            document.getElementById('f-preview').src = s.photo_url;
            document.getElementById('f-preview').style.display='block';
            document.getElementById('f-title').innerText = "EDIT: " + s.name;
            document.getElementById('f-cancel').classList.remove('hidden');
            nav('reg');
        }

        function resetForm() {
            ['f-id','f-name','f-age','f-dob','f-contact','f-loc','f-health','f-fees','f-img'].forEach(i => document.getElementById(i).value="");
            document.getElementById('f-preview').style.display='none';
            document.getElementById('f-title').innerText = "NEW ENROLLMENT";
            document.getElementById('f-cancel').classList.add('hidden');
        }

        function nav(v, b) {
            ['v-dash', 'v-reg', 'v-list', 'v-fin'].forEach(x => document.getElementById(x).classList.add('hidden'));
            document.getElementById('v-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(b) b.classList.add('active');
            if(document.getElementById('sidebar').classList.contains('open')) toggleMenu();
        }

        setInterval(() => { 
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('clock-display').innerText = now.toLocaleDateString('en-GB', options); 
        }, 1000);
    </script>
</body>
</html>
