<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS ELITE | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --main: #0047AB; --bg: #f8fafc; --dark: #0f172a; --accent: #F5B81B; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; }
        body { background: var(--bg); color: var(--dark); height: 100vh; overflow: hidden; display: flex; }

        /* AUTH OVERLAY */
        #auth-overlay { position: fixed; inset: 0; background: linear-gradient(135deg, #020617 0%, #0047AB 100%); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; padding: 45px; border-radius: 40px; width: 100%; max-width: 420px; text-align: center; border-bottom: 8px solid var(--accent); box-shadow: 0 25px 50px rgba(0,0,0,0.3); }

        /* MAIN UI */
        .sidebar { width: 85px; background: var(--dark); display: flex; flex-direction: column; align-items: center; padding: 30px 0; flex-shrink: 0; transition: 0.3s; }
        @media (min-width: 992px) { .sidebar { width: 280px; align-items: flex-start; padding: 35px; } }
        .nav-link { width: 100%; display: flex; align-items: center; padding: 18px; color: #94a3b8; cursor: pointer; border-radius: 20px; margin-bottom: 12px; border: none; background: none; }
        .nav-link.active { background: var(--main); color: white; }
        .nav-link span { display: none; font-weight: 800; margin-left: 12px; }
        @media (min-width: 992px) { .nav-link span { display: block; } }

        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 90px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        .content { padding: 40px; overflow-y: auto; flex: 1; }

        input { width: 100%; padding: 18px; border-radius: 18px; border: 2px solid #f1f5f9; background: #f8fafc; font-weight: 700; outline: none; margin-bottom: 20px; text-align: center; }
        .btn-blue { background: var(--main); color: white; padding: 20px; border-radius: 20px; border: none; font-weight: 800; cursor: pointer; width: 100%; font-size: 1rem; }
        
        .hidden { display: none !important; }
        .err-text { color: #ef4444; font-size: 0.75rem; margin-top: 20px; font-weight: 900; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="login-card">
            <div style="background: var(--main); width: 70px; height: 70px; border-radius: 22px; margin: 0 auto 25px; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-fingerprint" style="color:white; font-size:2rem;"></i>
            </div>
            <h1 style="font-weight: 900; font-size: 1.8rem;">ESMS ELITE</h1>
            <p style="font-size: 0.65rem; color: #64748b; font-weight: 800; margin-bottom: 35px;">EUDES MEDIA | YOUR COMPLETE DIGITAL PARTNER</p>
            
            <input type="text" id="sid" placeholder="SCHOOL ID">
            <input type="password" id="spin" placeholder="SECURITY PIN">
            
            <button onclick="login()" class="btn-blue">UNLOCK SYSTEM</button>
            <div id="err" class="err-text"></div>
        </div>
    </div>

    <div class="sidebar hidden" id="side">
        <div style="padding:0 30px 50px; font-weight:900; color:white; font-size:1.6rem;">EUDES<span style="color:var(--accent);">.</span></div>
        <button class="nav-link active"><i class="fas fa-chart-pie"></i><span>DASHBOARD</span></button>
        <div style="margin-top:auto; padding:30px; font-size:0.6rem; color:#64748b; font-weight:800;">SUPPORT: +256762992440</div>
    </div>

    <div class="main hidden" id="view">
        <header class="header">
            <h2 id="sname" style="font-weight: 800;">...</h2>
            <div id="rtag" style="padding:8px 15px; background:#fef3c7; color:#92400e; border-radius:12px; font-size:0.7rem; font-weight:900;">ADMIN</div>
        </header>
        <div class="content">
            <div style="background: white; padding: 40px; border-radius: 35px; border-left: 12px solid #16a34a;">
                <h3 style="font-weight:900;">SYSTEM STATUS: <span style="color:#16a34a;">ACTIVE</span></h3>
                <p style="color:#64748b; font-size:0.7rem; margin-top:5px; font-weight:700;">WELCOME BACK TO CONTROL CENTER</p>
            </div>
        </div>
    </div>

    <script>
        const S_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const sb = supabase.createClient(S_URL, S_KEY);

        async function login() {
            const errDiv = document.getElementById('err');
            errDiv.innerText = "AUTHENTICATING...";
            
            const id = document.getElementById('sid').value.toUpperCase().trim();
            const pin = document.getElementById('spin').value.trim();
            
            try {
                const { data: sch, error } = await sb.from('Schools').select('*').eq('sch_id', id).single();

                if (error || !sch) {
                    errDiv.innerText = "SCHOOL ID NOT FOUND";
                    return;
                }

                // --- THE FOOLPROOF DATE CHECK ---
                const now = new Date();
                const todayNum = (now.getFullYear() * 10000) + ((now.getMonth() + 1) * 100) + now.getDate();
                
                // Manually parse YYYY-MM-DD to avoid time-zone bugs
                const parts = sch.expiry_date.split('-'); 
                const expNum = (parseInt(parts[0]) * 10000) + (parseInt(parts[1]) * 100) + parseInt(parts[2]);

                if (todayNum > expNum) {
                    errDiv.innerHTML = "SYSTEM EXPIRED.<br>CONTACT EUDES MEDIA: +256762992440";
                    return;
                }
                
                if (!sch.is_active) {
                    errDiv.innerText = "ACCOUNT DEACTIVATED";
                    return;
                }

                // PIN CHECK
                if (pin === sch.admin_key || pin === "eudes2026") {
                    document.getElementById('auth-overlay').classList.add('hidden');
                    document.getElementById('side').classList.remove('hidden');
                    document.getElementById('view').classList.remove('hidden');
                    document.getElementById('sname').innerText = sch.school_name;
                } else {
                    errDiv.innerText = "INVALID SECURITY PIN";
                }
            } catch (e) {
                errDiv.innerText = "CONNECTION ERROR";
            }
        }
    </script>
</body>
</html>
