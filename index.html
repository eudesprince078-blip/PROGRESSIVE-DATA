<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROGRESSIVE PMS V60</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #004085; --dark: #001a33; --white: #ffffff; --green: #218838; --red: #c82333; --gold: #ffc107; --gray: #f1f4f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); margin: 0; padding: 0; }
        
        /* Dashboard Stats */
        .header { background: linear-gradient(135deg, var(--dark), var(--blue)); color: white; padding: 20px; text-align: center; border-radius: 0 0 25px 25px; }
        .dash-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; margin-top: -30px; }
        .stat-card { background: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .stat-card h2 { margin: 5px 0; font-size: 24px; }
        .stat-label { font-size: 10px; color: #888; font-weight: bold; text-transform: uppercase; }

        /* Missing Report Watchdog */
        .watchdog-alert { background: #fff5f5; border: 1px solid #feb2b2; color: #c53030; padding: 12px; margin: 15px; border-radius: 12px; font-size: 12px; animation: blink 2s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* Class-wise Absentee List */
        .class-group { background: white; margin: 10px 15px; padding: 15px; border-radius: 12px; border-left: 5px solid var(--blue); }
        .class-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 10px; }
        .tag-name { display: inline-block; background: #edf2f7; color: #2d3748; padding: 4px 10px; border-radius: 20px; font-size: 11px; margin: 3px; border: 1px solid #cbd5e0; }
        .tag-name.female { border-color: #fbb6ce; background: #fff5f7; }
        .tag-name.male { border-color: #bee3f8; background: #ebf8ff; }

        .btn-main { background: var(--blue); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="mainApp">
    <div class="header">
        <h3 style="margin:0;">PROGRESSIVE MOTHERS</h3>
        <div id="clock" style="font-size:11px; color:var(--gold); margin-top:5px;"></div>
    </div>

    <div id="watchdog" class="watchdog-alert hidden">
        <strong>⚠️ MISSING REPORTS:</strong> <span id="missingList">Checking...</span>
    </div>

    <div class="dash-container">
        <div class="stat-card" style="grid-column: span 2;">
            <div class="stat-label">Total Students in School</div>
            <h2 id="totalSchool">0</h2>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total Absent Today</div>
            <h2 id="totalAbs" style="color:var(--red);">0</h2>
        </div>
        <div class="stat-card">
            <div class="stat-label">Gender (M | F)</div>
            <h2 style="font-size:18px;"><span id="absM" style="color:#3182ce;">0</span> | <span id="absF" style="color:#d53f8c;">0</span></h2>
        </div>
    </div>

    <div id="absenteeBreakdown">
        </div>

    <div style="padding:15px;">
        <button class="btn-main" onclick="location.reload()">REFRESH DATA</button>
    </div>
</div>

<script>
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co";
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    const sb = supabase.createClient(SB_URL, SB_KEY);
    
    const allClasses = ["Baby", "Middle", "Top", "P.1", "P.2", "P.3", "P.4", "P.5", "P.6", "P.7"];

    async function loadDashboard() {
        const { data: students } = await sb.from('students').select('*');
        if(!students) return;

        const activeStudents = students.filter(s => s.class !== 'Left School');
        const absentees = activeStudents.filter(s => s.is_absent === true);

        // 1. Set Totals
        document.getElementById('totalSchool').innerText = activeStudents.length;
        document.getElementById('totalAbs').innerText = absentees.length;
        document.getElementById('absM').innerText = absentees.filter(s => s.gender === 'Male').length;
        document.getElementById('absF').innerText = absentees.filter(s => s.gender === 'Female').length;

        // 2. Watchdog: Find classes with ZERO activity today
        // (If no student in the class has been toggled to true OR false, it's missing)
        const now = new Date();
        if(now.getHours() >= 9) {
            const reportedClasses = [...new Set(students.filter(s => s.is_absent !== null).map(s => s.class))];
            const missing = allClasses.filter(c => !reportedClasses.includes(c));
            if(missing.length > 0) {
                document.getElementById('watchdog').classList.remove('hidden');
                document.getElementById('missingList').innerText = missing.join(", ");
            }
        }

        // 3. Detailed Class Breakdown
        let html = "";
        allClasses.forEach(cls => {
            const list = absentees.filter(s => s.class === cls);
            if(list.length > 0) {
                html += `
                    <div class="class-group">
                        <div class="class-header">
                            <strong style="color:var(--blue)">${cls} Class</strong>
                            <span style="font-size:11px; color:var(--red)">${list.length} Absent</span>
                        </div>
                        <div>
                            ${list.map(s => `
                                <span class="tag-name ${s.gender.toLowerCase()}">
                                    ${s.name.toUpperCase()} (${s.gender[0]})
                                </span>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
        });
        document.getElementById('absenteeBreakdown').innerHTML = html || "<p style='text-align:center; color:gray; font-size:12px;'>No absentees reported yet.</p>";
    }

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleString('en-GB');
    }, 1000);

    loadDashboard();
</script>
</body>
</html>
