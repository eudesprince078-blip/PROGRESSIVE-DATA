<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0052cc; --dark: #020617; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        #auth-gate { position: fixed; inset: 0; background: var(--dark); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: white; padding: 40px; border-radius: 35px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        input { width: 100%; padding: 16px; border-radius: 14px; border: 2px solid #e2e8f0; margin-bottom: 12px; font-weight: 700; text-align: center; font-size: 1rem; }
        .btn-main { background: var(--primary); color: white; padding: 18px; border-radius: 16px; border: none; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; }
        
        .header { background: white; padding: 20px; border-bottom: 5px solid var(--primary); text-align: center; }
        .sch-name { font-size: 1.6rem; font-weight: 900; text-transform: uppercase; color: var(--dark); }
        .hidden { display: none !important; }
        #debug-msg { color: #ff3b30; font-size: 0.75rem; margin-top: 10px; font-weight: 700; }
    </style>
</head>
<body>

    <div id="auth-gate">
        <div class="auth-card">
            <h1 style="margin-bottom:10px;">ESMS <span style="color:var(--primary)">PRO</span></h1>
            <p style="font-size:0.8rem; color:#94a3b8; margin-bottom:20px; font-weight:700;">PRINCIPLED DATA ACCESS</p>
            
            <input type="text" id="auth-id" placeholder="SCHOOL ID (PM001)">
            <input type="password" id="auth-key" placeholder="ACCESS KEY">
            
            <button id="login-btn" class="btn-main" onclick="initLogin()">AUTHORIZE LOGIN</button>
            <div id="debug-msg"></div>
        </div>
    </div>

    <header class="header">
        <div id="display-sch" class="sch-name">SYSTEM LOCKED</div>
        <div id="clock" style="font-size:0.8rem; font-weight:800; color:var(--primary); margin-top:5px;"></div>
    </header>

    <main style="flex:1; display:flex; align-items:center; justify-content:center; padding:20px;">
        <h2 id="welcome-msg">Please Login to view Database.</h2>
    </main>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        let db;

        async function initLogin() {
            const btn = document.getElementById('login-btn');
            const debug = document.getElementById('debug-msg');
            const sid = document.getElementById('auth-id').value.toUpperCase().trim();
            const key = document.getElementById('auth-key').value.trim();
            
            debug.innerText = "Checking connection...";
            btn.disabled = true;

            try {
                db = supabase.createClient(SB_URL, SB_KEY);
                
                // We check both "Schools" and "schools" to prevent naming errors
                let { data, error } = await db.from('Schools').select('*').eq('sch_id', sid).single();
                
                // If the table name is lowercase in your Supabase
                if (error && error.code === "PGRST116") {
                   const res = await db.from('schools').select('*').eq('sch_id', sid).single();
                   data = res.data; error = res.error;
                }

                if (data) {
                    if (key === data.admin_key || key === data.finance_key || key === data.teacher_key) {
                        document.getElementById('display-sch').innerText = data.sch_name;
                        document.getElementById('auth-gate').classList.add('hidden');
                        document.getElementById('welcome-msg').innerText = "Database Connected: Welcome " + data.sch_name;
                    } else {
                        debug.innerText = "Error: Access Key is incorrect.";
                    }
                } else {
                    debug.innerText = "Error: School ID not found in database.";
                }
            } catch (err) {
                debug.innerText = "System Error: " + err.message;
            } finally {
                btn.disabled = false;
            }
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleString().toUpperCase();
        }, 1000);
    </script>
</body>
</html>
