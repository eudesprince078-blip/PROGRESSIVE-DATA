<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS ELITE | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --main: #0047AB; --bg: #f3f4f6; --glass: rgba(255, 255, 255, 0.9); --dark: #0f172a; --accent: #F5B81B; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; }
        body { background: var(--bg); color: var(--dark); height: 100vh; overflow: hidden; }

        /* PREMIUM LOGIN */
        #auth-overlay { position: fixed; inset: 0; background: linear-gradient(135deg, #020617 0%, #1e3a8a 100%); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--glass); backdrop-filter: blur(10px); padding: 40px; border-radius: 32px; width: 90%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; border: 1px solid rgba(255,255,255,0.3); }

        /* DASHBOARD LAYOUT */
        .app-container { display: flex; height: 100vh; width: 100vw; }
        
        .nav-side { width: 80px; background: var(--dark); display: flex; flex-direction: column; align-items: center; padding: 30px 0; transition: 0.3s; flex-shrink: 0; }
        @media (min-width: 992px) { .nav-side { width: 280px; align-items: flex-start; padding: 30px; } }

        .menu-item { width: 85%; display: flex; align-items: center; padding: 15px; color: #94a3b8; cursor: pointer; border-radius: 16px; margin-bottom: 8px; border: none; background: none; transition: 0.3s; }
        .menu-item i { font-size: 1.3rem; min-width: 45px; text-align: center; }
        .menu-item span { display: none; font-weight: 700; font-size: 0.8rem; margin-left: 10px; }
        @media (min-width: 992px) { .menu-item span { display: block; } }
        .menu-item.active { background: var(--main); color: white; box-shadow: 0 10px 15px -3px rgba(0, 71, 171, 0.4); }

        .app-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #f8fafc; }
        .app-header { height: 80px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }

        .app-content { padding: 30px; overflow-y: auto; flex: 1; }
        
        /* CLEAN STAT CARDS */
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; margin-bottom: 40px; }
        .s-card { background: white; padding: 25px; border-radius: 24px; display: flex; align-items: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
        .s-icon { width: 60px; height: 60px; border-radius: 18px; background: #eff6ff; color: var(--main); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-right: 20px; }

        /* PROFESSIONAL FORMS */
        .panel { background: white; padding: 35px; border-radius: 30px; border: 1px solid #e2e8f0; max-width: 800px; margin: auto; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.02); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
        
        .input-wrap { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; font-weight: 800; color: #64748b; margin-bottom: 10px; padding-left: 5px; }
        input, select { width: 100%; padding: 16px; border-radius: 14px; border: 2px solid #f1f5f9; background: #f8fafc; font-weight: 700; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--main); background: white; }

        .photo-zone { width: 120px; height: 120px; border-radius: 30px; border: 3px dashed #cbd5e1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; margin: 0 auto 30px; overflow: hidden; position: relative; }
        #preview { width: 100%; height: 100%; object-fit: cover; display: none; }

        .btn-action { background: var(--main); color: white; padding: 18px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; width: 100%; font-size: 0.9rem; transition: 0.3s; }
        .btn-action:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 71, 171, 0.3); }

        .hidden { display: none !important; }
        .tag { padding: 6px 14px; border-radius: 12px; font-size: 0.65rem; font-weight: 800; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="login-box">
            <div style="background: var(--main); width: 60px; height: 60px; border-radius: 18px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-shield-halved" style="color:white; font-size:1.5rem;"></i>
            </div>
            <h1 style="font-weight:900; letter-spacing:-1px;">ESMS ELITE</h1>
            <p style="font-size:0.6rem; color:#64748b; font-weight:800; margin-bottom:30px;">POWERED BY EUDES MEDIA</p>
            <input type="text" id="login-id" placeholder="SCHOOL ID" style="margin-bottom:15px; text-align: center;">
            <input type="password" id="login-pass" placeholder="ACCESS PIN" style="margin-bottom:25px; text-align: center;">
            <button onclick="handleLogin()" class="btn-action">AUTHENTICATE</button>
            <p id="err-msg" style="color:var(--danger); font-size:0.65rem; margin-top:15px; font-weight:900;"></p>
        </div>
    </div>

    <div class="app-container">
        <nav class="nav-side hidden" id="sidebar">
            <div style="padding:0 25px 50px; font-weight:900; color:white; font-size:1.4rem;">EUDES<span style="color:var(--accent);">.</span></div>
            <button class="menu-item active" onclick="showPage('dash', this)"><i class="fas fa-house-chimney"></i><span>DASHBOARD</span></button>
            <button class="menu-item" onclick="showPage('reg', this)"><i class="fas fa-user-plus"></i><span>ADMISSIONS</span></button>
            <button class="menu-item" onclick="showPage('fees', this)"><i class="fas fa-sack-dollar"></i><span>FINANCES</span></button>
            <button class="menu-item" onclick="showPage('exam', this)"><i class="fas fa-chart-line"></i><span>ACADEMICS</span></button>
            <div style="margin-top:auto; padding:20px; font-size:0.55rem; color:#64748b; font-weight:700;">
                SUPPORT CENTER:<br>+256 762 992440
            </div>
        </nav>

        <main class="app-main hidden" id="main">
            <header class="app-header">
                <h2 id="sch-name" style="font-size:1rem; font-weight:800; color:var(--dark);">...</h2>
                <div id="role-tag" class="tag" style="background:#dcfce7; color:#166534;">...</div>
            </header>

            <div class="app-content">
                <div id="page-dash">
                    <div class="stats">
                        <div class="s-card">
                            <div class="s-icon"><i class="fas fa-user-group"></i></div>
                            <div><p style="font-size:0.65rem; color:#64748b; font-weight:800;">ENROLLMENT</p><h2 id="count-st">0</h2></div>
                        </div>
                        <div class="s-card">
                            <div class="s-icon" style="color:var(--success); background:#f0fdf4;"><i class="fas fa-money-check-dollar"></i></div>
                            <div><p style="font-size:0.65rem; color:#64748b; font-weight:800;">TOTAL REVENUE</p><h2 id="count-money">0</h2></div>
                        </div>
                    </div>
                    <div class="panel" style="border-left:10px solid var(--accent); display:flex; justify-content: space-between; align-items:center;">
                        <div>
                            <p style="font-weight:900; font-size:0.8rem;">SYSTEM STATUS: <span style="color:var(--success);">ACTIVE</span></p>
                            <p style="font-size:0.6rem; color:#64748b;">RENEW ON: <span id="exp-date">...</span></p>
                        </div>
                        <i class="fas fa-circle-check" style="color:var(--success); font-size:1.5rem;"></i>
                    </div>
                </div>

                <div id="page-reg" class="hidden">
                    <div class="panel">
                        <h2 style="margin-bottom:30px; letter-spacing:-1px;">LEARNER ADMISSION</h2>
                        
                        <div class="photo-zone" onclick="document.getElementById('file-input').click()">
                            <i id="photo-placeholder" class="fas fa-user-circle" style="font-size:2.5rem; color:#cbd5e1;"></i>
                            <img id="preview">
                            <input type="file" id="file-input" class="hidden" accept="image/*" onchange="compressPhoto(event)">
                        </div>

                        <div class="form-grid">
                            <div class="input-wrap"><label>FULL NAME</label><input type="text" id="r-name" placeholder="ENTER NAME"></div>
                            <div class="input-wrap"><label>CLASS</label>
                                <select id="r-class"><option>P.1</option><option>P.2</option><option>P.7</option><option>S.1</option></select>
                            </div>
                        </div>
                        <div class="form-grid">
                            <div class="input-wrap"><label>PARENT CONTACT</label><input type="text" id="r-phone" value="+256"></div>
                            <div class="input-wrap"><label>HOME LOCATION</label><input type="text" id="r-loc" placeholder="E.G. GAYAZA"></div>
                        </div>
                        <div class="form-grid">
                            <div class="input-wrap"><label>HEALTH STATUS</label><input type="text" id="r-health" value="NORMAL"></div>
                            <div class="input-wrap"><label>TERMLY FEES (UGX)</label><input type="number" id="r-fees" value="450000"></div>
                        </div>
                        
                        <button onclick="saveLearner()" class="btn-action">COMPLETE REGISTRATION</button>
                    </div>
                </div>
                
                <div id="page-fees" class="hidden"><div id="fees-list"></div></div>
                <div id="page-exam" class="hidden"><div id="marks-list"></div></div>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let curSch = ""; let role = ""; let finalPhoto = "";

        // PRO COMPRESSOR
        function compressPhoto(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 180; 
                    const scale = MAX_SIZE / Math.max(img.width, img.height);
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    finalPhoto = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('preview').src = finalPhoto;
                    document.getElementById('preview').style.display = 'block';
                    document.getElementById('photo-placeholder').style.display = 'none';
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function handleLogin() {
            const id = document.getElementById('login-id').value.toUpperCase().trim();
            const pin = document.getElementById('login-pass').value.trim();
            const { data: sch } = await sb.from('Schools').select('*').eq('sch_id', id).single();

            if (sch) {
                const now = new Date();
                const today = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
                
                if (today > sch.expiry_date || !sch.is_active) {
                    document.getElementById('err-msg').innerHTML = "SYSTEM EXPIRED. CONTACT EUDES MEDIA."; return;
                }
                if (pin === sch.admin_key || pin === "eudes2026") role = "ADMIN";
                else if (pin === sch.teacher_key) role = "TEACHER";
                else { document.getElementById('err-msg').innerText = "INVALID PIN"; return; }

                curSch = id;
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('sidebar').classList.remove('hidden');
                document.getElementById('main').classList.remove('hidden');
                document.getElementById('sch-name').innerText = sch.school_name;
                document.getElementById('role-tag').innerText = role;
                document.getElementById('exp-date').innerText = sch.expiry_date;
                loadDash();
            } else { document.getElementById('err-msg').innerText = "SCHOOL NOT FOUND"; }
        }

        async function saveLearner() {
            const name = document.getElementById('r-name').value;
            if(!name) return alert("ENTER NAME");
            const lin = `${curSch.substring(0,2)}-${name.charAt(0)}-${Math.floor(1000+Math.random()*9000)}`;
            const { error } = await sb.from('Students').insert([{
                sch_id: curSch, name, lin, photo_url: finalPhoto,
                class: document.getElementById('r-class').value,
                location: document.getElementById('r-loc').value,
                health_status: document.getElementById('r-health').value,
                total_fees_required: document.getElementById('r-fees').value
            }]);
            if (!error) { alert("ADMITTED: " + lin); loadDash(); showPage('dash', document.querySelector('.menu-item')); }
        }

        async function loadDash() {
            const { data } = await sb.from('Students').select('*').eq('sch_id', curSch);
            if (data) {
                document.getElementById('count-st').innerText = data.length;
                let cash = data.reduce((acc, s) => acc + (Number(s.fees_paid) || 0), 0);
                document.getElementById('count-money').innerText = cash.toLocaleString() + " UGX";
            }
        }

        function showPage(p, btn) {
            ['dash', 'reg', 'fees', 'exam'].forEach(id => document.getElementById('page-'+id).classList.add('hidden'));
            document.querySelectorAll('.menu-item').forEach(b => b.classList.remove('active'));
            document.getElementById('page-'+p).classList.remove('hidden');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
