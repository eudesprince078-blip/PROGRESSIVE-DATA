<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS ELITE | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0052cc; --accent: #ff3b30; --success: #34c759; --dark: #020617; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* HEADER */
        .app-header { background: white; padding: 20px; border-bottom: 5px solid var(--primary); text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .school-title { font-size: 1.6rem; font-weight: 900; color: var(--dark); text-transform: uppercase; }

        /* VIEWPORT */
        .main-view { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        
        .card { background: white; border-radius: 28px; padding: 22px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .stat-card { background: white; padding: 18px; border-radius: 24px; text-align: center; border-bottom: 5px solid var(--primary); }

        /* INPUTS */
        input, select { width: 100%; padding: 16px; border-radius: 16px; border: 2px solid #e2e8f0; margin-bottom: 12px; font-weight: 700; font-size: 1rem; }
        .btn-main { background: var(--primary); color: white; padding: 18px; border-radius: 18px; border: none; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; }
        .btn-green { background: var(--success); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 800; cursor: pointer; }

        /* LISTS */
        .list-item { background: white; padding: 16px; border-radius: 20px; margin-bottom: 12px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 15px; }
        .list-img { width: 60px; height: 60px; border-radius: 16px; object-fit: cover; background: #f1f5f9; }

        /* NAV */
        .nav-bar { background: white; height: 80px; border-top: 1px solid #e2e8f0; display: flex; justify-content: space-around; align-items: center; padding-bottom: 10px; }
        .nav-item { color: #94a3b8; text-align: center; font-size: 0.6rem; font-weight: 800; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.5rem; display: block; margin-bottom: 4px; }

        #auth-gate { position: fixed; inset: 0; background: var(--dark); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .hidden { display: none !important; }
        
        /* ID CARD PREVIEW */
        #id-card-pdf { width: 350px; padding: 20px; background: white; border: 2px solid var(--primary); border-radius: 15px; position: fixed; left: -9999px; }
    </style>
</head>
<body>

    <div id="auth-gate">
        <div style="background:white; padding:40px; border-radius:35px; width:100%; max-width:400px; text-align:center;">
            <h1 style="font-weight:900; letter-spacing:-2px; margin-bottom:20px;">ESMS <span style="color:var(--primary)">ELITE</span></h1>
            <input type="text" id="auth-id" placeholder="SCHOOL ID" style="text-align:center; text-transform:uppercase;">
            <input type="password" id="auth-key" placeholder="ACCESS KEY" style="text-align:center;">
            <button class="btn-main" onclick="startSession()">AUTHORIZE SESSION</button>
        </div>
    </div>

    <header class="app-header">
        <div id="display-sch" class="school-title">...</div>
        <div id="display-clock" style="font-size:0.8rem; font-weight:800; color:var(--primary); margin-top:5px;"></div>
    </header>

    <main class="main-view" id="main-scroll">
        
        <div id="v-dash">
            <div class="stat-grid">
                <div class="stat-card"> <h2 id="st-present" style="color:var(--success)">0</h2><small>PRESENT TODAY</small> </div>
                <div class="stat-card"> <h2 id="st-absent" style="color:var(--accent)">0</h2><small>ABSENT TODAY</small> </div>
                <div class="stat-card"> <h2 id="st-income">0</h2><small>COLLECTED</small> </div>
                <div class="stat-card"> <h2 id="st-debt" style="color:var(--accent)">0</h2><small>TOTAL DEBT</small> </div>
            </div>
            <div class="card">
                <h4 style="margin-bottom:12px;"><i class="fas fa-bullhorn"></i> BULK NOTIFICATIONS</h4>
                <button class="btn-main" style="background:#25D366; margin-bottom:10px;" onclick="sendBulk('whatsapp')"><i class="fab fa-whatsapp"></i> SEND BULK WHATSAPP</button>
                <button class="btn-main" style="background:#ea4335;" onclick="sendBulk('email')"><i class="fas fa-envelope"></i> SEND BULK EMAIL</button>
            </div>
        </div>

        <div id="v-list" class="hidden">
            <input type="text" id="search-box" placeholder="🔍 Search Name, LIN, or Class..." onkeyup="filterRegistry()" style="border:3px solid var(--primary); position:sticky; top:0; z-index:100;">
            <div id="render-list"></div>
        </div>

        <div id="v-roll" class="hidden">
            <div class="card">
                <h3>DAILY ROLL CALL</h3>
                <div id="render-roll" style="margin-top:15px;"></div>
            </div>
        </div>

        <div id="v-reg" class="hidden">
            <div class="card">
                <h3 id="form-title">STUDENT REGISTRATION</h3>
                <input type="hidden" id="f-id">
                <div style="text-align:center; margin:15px 0;">
                    <img id="f-preview" style="width:100px; height:100px; border-radius:20px; object-fit:cover; display:none; margin:0 auto 10px; border:3px solid var(--primary);">
                    <input type="file" onchange="loadImg(this)" style="font-size:0.7rem;">
                    <input type="hidden" id="f-img">
                </div>
                <input type="text" id="f-name" placeholder="Full Student Name">
                <select id="f-class">
                    <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                    <option>P.5</option><option>P.6</option><option>P.7</option>
                </select>
                <input type="number" id="f-fees" placeholder="Full Term Fees">
                <input type="text" id="f-contact" placeholder="Guardian Phone">
                <button id="save-btn" class="btn-main" onclick="saveRecord()">SAVE TO DATABASE</button>
            </div>
        </div>

        <div id="v-fin" class="hidden">
            <div class="card">
                <h3>FEES & PAYMENTS</h3>
                <div id="render-fin" style="margin-top:15px;"></div>
            </div>
        </div>

    </main>

    <div id="id-card-pdf">
        <div style="text-align:center;">
            <h3 id="id-sch" style="color:var(--primary);">SCHOOL NAME</h3>
            <img id="id-img" style="width:100px; height:100px; border-radius:10px; margin:10px 0;">
            <h2 id="id-name">STUDENT NAME</h2>
            <p id="id-class">CLASS</p>
            <p id="id-lin" style="font-weight:bold;">LIN: 0000</p>
            <div style="margin-top:15px; font-size:10px;">Contact: +256762992440</div>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="nav('dash', this)"><i class="fas fa-home"></i>DASH</div>
        <div class="nav-item" onclick="nav('list', this)"><i class="fas fa-search"></i>LIST</div>
        <div class="nav-item" onclick="nav('roll', this)"><i class="fas fa-check-circle"></i>ROLL</div>
        <div class="nav-item" onclick="nav('reg', this)"><i class="fas fa-plus-circle"></i>ADD</div>
        <div class="nav-item" onclick="nav('fin', this)"><i class="fas fa-money-check-alt"></i>FEES</div>
    </nav>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        let db, activeSch, students = [], attendance = {};

        async function startSession() {
            const sid = document.getElementById('auth-id').value.toUpperCase().trim();
            const key = document.getElementById('auth-key').value.trim();
            db = supabase.createClient(SB_URL, SB_KEY);
            
            const { data } = await db.from('Schools').select('*').eq('sch_id', sid).single();
            if (data && (key === data.admin_key || key === data.finance_key || key === data.teacher_key)) {
                activeSch = sid;
                document.getElementById('display-sch').innerText = data.sch_name;
                document.getElementById('auth-gate').classList.add('hidden');
                sync();
            } else { alert("Access Denied"); }
        }

        async function sync() {
            const { data } = await db.from('Students').select('*').eq('sch_id', activeSch).order('name', { ascending: true });
            students = data || [];
            render();
        }

        function render() {
            let col = 0, dbt = 0, p = 0;
            students.forEach(s => {
                col += (s.paid_fees || 0);
                dbt += (s.total_fees - (s.paid_fees || 0));
                if(attendance[s.id]) p++;
            });

            document.getElementById('st-income').innerText = col.toLocaleString();
            document.getElementById('st-debt').innerText = dbt.toLocaleString();
            document.getElementById('st-present').innerText = p;
            document.getElementById('st-absent').innerText = students.length - p;

            document.getElementById('render-list').innerHTML = students.map(s => `
                <div class="list-item">
                    <img src="${s.photo_url}" class="list-img">
                    <div style="flex:1"><b>${s.name}</b><br><small>${s.class} | ${s.lin}</small></div>
                    <button class="btn-green" onclick="generatePDF('${s.id}')">ID</button>
                </div>`).join('');

            document.getElementById('render-roll').innerHTML = students.map(s => `
                <div class="list-item" onclick="toggleRoll('${s.id}')" style="border-left: 8px solid ${attendance[s.id] ? 'var(--success)' : '#ddd'}">
                    <div style="flex:1"><b>${s.name}</b><br><small>${s.class}</small></div>
                    <i class="fas ${attendance[s.id] ? 'fa-check-circle' : 'fa-circle'}" style="color:${attendance[s.id] ? 'var(--success)' : '#ddd'}"></i>
                </div>`).join('');

            document.getElementById('render-fin').innerHTML = students.map(s => `
                <div class="list-item">
                    <div style="flex:1"><b>${s.name}</b><br><small>Bal: ${(s.total_fees - (s.paid_fees||0)).toLocaleString()}</small></div>
                    <input type="number" placeholder="Amt" style="width:100px; margin:0;" onchange="updateFees('${s.id}', this.value)">
                </div>`).join('');
        }

        async function updateFees(id, val) {
            const s = students.find(x => x.id == id);
            const sum = Number(s.paid_fees || 0) + Number(val);
            const { error } = await db.from('Students').update({ paid_fees: sum }).eq('id', id);
            if(!error) { alert("Fees Updated Successfully"); sync(); }
        }

        function filterRegistry() {
            const q = document.getElementById('search-box').value.toUpperCase();
            const filtered = students.filter(s => s.name.includes(q) || s.lin.includes(q) || s.class.toUpperCase().includes(q));
            document.getElementById('render-list').innerHTML = filtered.map(s => `
                <div class="list-item">
                    <img src="${s.photo_url}" class="list-img">
                    <div style="flex:1"><b>${s.name}</b><br><small>${s.class} | ${s.lin}</small></div>
                    <button class="btn-green" onclick="generatePDF('${s.id}')">ID</button>
                </div>`).join('');
        }

        function generatePDF(id) {
            const s = students.find(x => x.id == id);
            document.getElementById('id-sch').innerText = document.getElementById('display-sch').innerText;
            document.getElementById('id-name').innerText = s.name;
            document.getElementById('id-class').innerText = s.class;
            document.getElementById('id-lin').innerText = "LIN: " + s.lin;
            document.getElementById('id-img').src = s.photo_url;
            
            const element = document.getElementById('id-card-pdf');
            html2pdf().from(element).save(s.name + "_ID.pdf");
        }

        function toggleRoll(id) { attendance[id] = !attendance[id]; render(); }
        
        function sendBulk(type) {
            const count = students.length;
            alert(`Ready to send ${type} to ${count} guardians. This requires API integration for bulk delivery.`);
        }

        function nav(v, b) {
            ['v-dash','v-list','v-roll','v-reg','v-fin'].forEach(x => document.getElementById(x).classList.add('hidden'));
            document.getElementById('v-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(b) b.classList.add('active');
        }

        setInterval(() => {
            document.getElementById('display-clock').innerText = new Date().toLocaleString().toUpperCase();
        }, 1000);
    </script>
</body>
</html>
