<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAMPUSSPHERE PRO | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0047AB; --success: #10b981; --danger: #e11d48; --bg: #f1f5f9; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; }
        body { margin: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 280px; background: #0f172a; display: flex; flex-direction: column; padding: 25px; color: white; }
        .nav-item { padding: 14px 18px; border-radius: 12px; color: #94a3b8; font-weight: 700; font-size: 0.7rem; cursor: pointer; margin-bottom: 8px; transition: 0.3s; }
        .nav-item.active { background: var(--primary); color: white; }
        
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 15px 40px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .page { display: none; padding: 30px; height: 100%; overflow-y: auto; }
        .page.active { display: block; }

        /* FORMS & INPUTS */
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: white; padding: 30px; border-radius: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.6rem; font-weight: 800; color: #64748b; }
        input, select { padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; font-weight: 700; background: #f8fafc; }

        /* TABLE & PHOTO */
        .st-photo { width: 40px; height: 40px; border-radius: 10px; object-fit: cover; background: #eee; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; }
        th { background: #f8fafc; padding: 15px; text-align: left; font-size: 0.6rem; color: #64748b; }
        td { padding: 12px 15px; font-size: 0.65rem; border-bottom: 1px solid #f1f5f9; font-weight: 700; }

        /* MODAL FOR HISTORY */
        #historyModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:10000; align-items:center; justify-content:center; }
        .modal-content { background:white; padding:30px; border-radius:25px; width:450px; max-height:80vh; overflow-y:auto; }

        .btn-pay { background: var(--success); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.55rem; }
    </style>
</head>
<body onload="startTime()">

            <h2 style="color:var(--primary); margin:0;">EUDES MEDIA PRO</h2>
            <p style="font-size:0.6rem; color:#64748b; margin-bottom:30px;">SECURE ACADEMIC GATEWAY</p>
            <input type="text" id="schId" placeholder="SCHOOL ID" style="width:100%; margin-bottom:10px;">
            <input type="password" id="schKey" placeholder="ACCESS KEY" style="width:100%; margin-bottom:20px;">
            <button onclick="authenticate()" style="width:100%; background:var(--primary); color:white; border:none; padding:15px; border-radius:12px; font-weight:800; cursor:pointer;">SIGN IN</button>
        </div>
    </div>

    <div class="sidebar">
        <h2 style="font-size: 1rem; margin:0;">CAMPUSSPHERE</h2>
        <p style="font-size: 0.5rem; color: var(--primary); margin-bottom:40px;">FINANCIAL & ADMIN EDITION</p>
        <div class="nav-item active" onclick="showPage('dash-page', this)">📊 DASHBOARD</div>
        <div class="nav-item" onclick="showPage('reg-page', this)">📝 NEW REGISTRATION</div>
        <div class="nav-item" onclick="fetchStudents(); showPage('list-page', this)">👥 STUDENT LEDGER</div>

    <div class="main">

            </div>
        </div>

        <div id="dash-page" class="page active">
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px;">
                <div style="background:white; padding:25px; border-radius:20px; border-left: 5px solid var(--primary);">
                    <label>ENROLLMENT</label><p id="countAll" style="font-size:1.5rem; margin:5px 0;">0</p>
                </div>
                <div style="background:white; padding:25px; border-radius:20px; border-left: 5px solid var(--success);">
                    <label>ATTENDANCE (PRESENT)</label><p id="countPres" style="font-size:1.5rem; margin:5px 0;">0</p>
                </div>
                <div style="background:white; padding:25px; border-radius:20px; border-left: 5px solid var(--danger);">
                    <label>TOTAL ARREARS</label><p id="countDebt" style="font-size:1.5rem; margin:5px 0;">UGX 0</p>
                </div>
            </div>
        </div>

        <div id="reg-page" class="page">
            <h3 style="margin-bottom:20px;">Student Registration</h3>
            <div class="grid-form">
                <div class="input-group"><label>LIN NUMBER</label><input type="text" id="rLin"></div>
                <div class="input-group"><label>FULL NAME</label><input type="text" id="rName"></div>
                <div class="input-group"><label>CLASS</label>
                    <select id="rClass">
                        <option>Nursery</option><option>P.1</option><option>P.2</option><option>P.3</option>
                        <option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option>
                    </select>
                </div>
                <div class="input-group"><label>DATE OF BIRTH (CALENDAR)</label><input type="date" id="rDob" onchange="calcAge(this.value)"></div>
                <div class="input-group"><label>CALCULATED AGE</label><input type="text" id="rAge" readonly></div>
                <div class="input-group"><label>HEALTH STATUS</label><input type="text" id="rHealth" placeholder="Normal / Condition"></div>
                <div class="input-group"><label>TOTAL FEES</label><input type="number" id="rTotal"></div>
                <div class="input-group"><label>PHOTO URL</label><input type="text" id="rPhoto" placeholder="Link to photo"></div>
                <button class="btn-main" onclick="submitRegistration()" style="grid-column: span 2; background:var(--primary); color:white; border:none; padding:15px; border-radius:12px; font-weight:800; cursor:pointer;">FINALIZE REGISTRATION</button>
            </div>
        </div>

        <div id="list-page" class="page">
            <h3 style="margin-bottom:20px;">Master Student Ledger</h3>
            <table>
                <thead>
                    <tr>
                        <th>PHOTO</th><th>LIN</th><th>NAME</th><th>CLASS</th><th>ROLL</th><th>PAID</th><th>DEBT</th><th>HISTORY</th>
                    </tr>
                </thead>
                <tbody id="stTable"></tbody>
            </table>
        </div>
    </div>

    <div id="historyModal">
        <div class="modal-content">
            <h3 id="histName">Student History</h3>
            <div id="histList" style="margin:20px 0;"></div>
            <input type="number" id="payAmount" placeholder="Installment Amount">
            <button onclick="addPayment()" class="btn-main" style="width:100%; background:var(--success); color:white; border:none; padding:10px; border-radius:10px; font-weight:800;">POST PAYMENT</button>
            <button onclick="closeModal()" style="width:100%; margin-top:10px; background:none; border:none; color:var(--danger); font-weight:800;">CLOSE</button>
        </div>
    </div>

            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));

        }
