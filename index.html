<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMS | Eudes Media</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #2563eb; --dark-blue: #1e3a8a; --bg: #f8fafc; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1e293b; margin: 0; padding-bottom: 40px; }
        header { background: #3b82f6; color: white; padding: 20px; text-align: center; }
        .container { max-width: 450px; margin: 0 auto; padding: 15px; }
        
        .card { background: var(--white); padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        .photo-area { border: 2px dashed #cbd5e1; border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 15px; background: #f0f7ff; cursor: pointer; min-height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center;}
        #imgPrev { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; display: none; margin-bottom: 10px; border: 3px solid var(--blue); }
        
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, textarea, select { width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 15px; box-sizing: border-box; }
        .full { grid-column: span 2; }
        
        .btn-save { background: var(--blue); color: white; padding: 16px; border-radius: 12px; border: none; width: 100%; font-weight: 700; font-size: 16px; margin-top: 15px; cursor: pointer; }
        .btn-save:disabled { background: #94a3b8; }

        .record-card { background: white; padding: 20px; border-radius: 20px; margin-top: 10px; }
        .student-row { display: flex; align-items: center; gap: 15px; padding: 15px 0; border-bottom: 1px solid #f1f5f9; }
        .profile-img { width: 60px; height: 60px; border-radius: 50%; background: #2563eb; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; object-fit: cover; }
        
        .name-txt { font-size: 16px; font-weight: 700; color: #1e3a8a; margin: 0; }
        .info-txt { font-size: 12px; color: #64748b; margin: 2px 0; }

        /* Updated Multi-Number Footer */
        .footer { text-align: center; padding: 30px 20px; color: #64748b; font-size: 13px; line-height: 1.6; }
        .footer b { color: #475569; }
        .contact-link { color: var(--blue); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0; font-size: 1.2rem;">WELCOME TO EUDES CHAT</h2>
</header>

<div class="container">
    <div class="card">
        <div class="photo-area" onclick="document.getElementById('fileInp').click()">
            <img id="imgPrev" src="">
            <span id="txtPrompt">📷 Tap to Take Photo or Select</span>
            <input type="file" id="fileInp" accept="image/*" style="display:none" onchange="preview(this)">
        </div>

        <div class="input-grid">
            <input type="text" id="stuName" class="full" placeholder="Student Name">
            <input type="text" id="stuContact" placeholder="Contact Number">
            <input type="text" id="stuClass" placeholder="Class">
            <input type="text" id="stuAge" placeholder="Age">
            <input type="date" id="stuDob">
            <input type="text" id="stuLoc" class="full" placeholder="Physical Location">
            <textarea id="stuHealth" class="full" placeholder="Health Status (Allergies, etc.)"></textarea>
            <select id="stuStatus" class="full">
                <option value="Active">Active Student</option>
                <option value="Left">Left School</option>
            </select>
        </div>
        
        <input type="hidden" id="editId">
        <button class="btn-save" id="saveBtn" onclick="handleSave()">Save Student Record</button>
        <button id="cancelBtn" onclick="reset()" style="display:none; width:100%; background:none; border:none; color:gray; margin-top:10px;">Cancel</button>
    </div>

    <div class="record-card">
        <h3 style="margin-top:0; color:#1e3a8a; font-size: 1.1rem;">📋 School Records</h3>
        <div id="list">Loading...</div>
    </div>
</div>

<div class="footer">
    System Developed by <b>Eudes Media</b><br>
    WhatsApp: <a href="https://wa.me/256762992440" class="contact-link">+256 762 992 440</a><br>
    Direct Call: <a href="tel:+256200930932" class="contact-link">+256 200 930 932</a>
</div>

<script>
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co"; 
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    function preview(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('imgPrev').src = e.target.result;
                document.getElementById('imgPrev').style.display = 'block';
                document.getElementById('txtPrompt').style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function handleSave() {
        const nameVal = document.getElementById('stuName').value.trim();
        const file = document.getElementById('fileInp').files[0];
        const btn = document.getElementById('saveBtn');
        const id = document.getElementById('editId').value;
        const dobVal = document.getElementById('stuDob').value;

        if (!nameVal) return alert("Full Name is required");

        btn.disabled = true;
        btn.innerText = "Processing...";

        let uploadedUrl = "";
        if (file) {
            const fileName = `${Date.now()}_student.jpg`;
            const { data: storageData, error: storageErr } = await supabaseClient.storage
                .from('student-photos')
                .upload(fileName, file);

            if (!storageErr) {
                const { data } = supabaseClient.storage.from('student-photos').getPublicUrl(fileName);
                uploadedUrl = data.publicUrl;
            }
        }

        const student = {
            name: nameVal,
            contact: document.getElementById('stuContact').value,
            class: document.getElementById('stuClass').value,
            age: document.getElementById('stuAge').value,
            dob: dobVal === "" ? null : dobVal, // FIX: handles 'invalid input syntax'
            location: document.getElementById('stuLoc').value,
            health_status: document.getElementById('stuHealth').value,
            status: document.getElementById('stuStatus').value
        };

        if (uploadedUrl) student.photo_url = uploadedUrl;

        let res;
        if (id) {
            res = await supabaseClient.from('students').update(student).eq('id', id);
        } else {
            student.lin = "PMS-" + Math.floor(1000 + Math.random() * 9000);
            res = await supabaseClient.from('students').insert([student]);
        }

        if (res.error) {
            alert("Error: " + res.error.message);
        } else {
            reset();
            load();
        }
        btn.disabled = false;
        btn.innerText = "Save Student Record";
    }

    async function load() {
        const { data } = await supabaseClient.from('students').select('*').order('created_at', { ascending: false });
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = "";

        (data || []).forEach(s => {
            const initials = s.name ? s.name.substring(0,2).toUpperCase() : "ST";
            const photoHtml = s.photo_url 
                ? `<img src="${s.photo_url}" class="profile-img">` 
                : `<div class="profile-img">${initials}</div>`;

            listDiv.innerHTML += `
                <div class="student-row">
                    ${photoHtml}
                    <div style="flex:1;">
                        <p class="name-txt">${s.name}</p>
                        <p class="info-txt">${s.lin} | Class: ${s.class}</p>
                        <div style="margin-top:5px;">
                            <button onclick="edit('${s.id}')" style="background:#fbbf24; border:none; padding:4px 10px; border-radius:6px; color:white; font-size:11px; font-weight:bold;">Edit</button>
                            <button onclick="del('${s.id}')" style="background:#ef4444; border:none; padding:4px 10px; border-radius:6px; color:white; font-size:11px; font-weight:bold; margin-left:5px;">Delete</button>
                        </div>
                    </div>
                </div>`;
        });
    }

    async function edit(id) {
        const { data: s } = await supabaseClient.from('students').select('*').eq('id', id).single();
        if (s) {
            document.getElementById('editId').value = s.id;
            document.getElementById('stuName').value = s.name;
            document.getElementById('stuContact').value = s.contact;
            document.getElementById('stuClass').value = s.class;
            document.getElementById('stuAge').value = s.age;
            document.getElementById('stuDob').value = s.dob || "";
            document.getElementById('stuLoc').value = s.location;
            document.getElementById('stuHealth').value = s.health_status;
            document.getElementById('stuStatus').value = s.status || "Active";
            
            if (s.photo_url) {
                document.getElementById('imgPrev').src = s.photo_url;
                document.getElementById('imgPrev').style.display = 'block';
                document.getElementById('txtPrompt').style.display = 'none';
            }

            document.getElementById('saveBtn').innerText = "Update Record";
            document.getElementById('cancelBtn').style.display = "block";
            window.scrollTo(0,0);
        }
    }

    async function del(id) {
        if(confirm("Delete this student?")) {
            await supabaseClient.from('students').delete().eq('id', id);
            load();
        }
    }

    function reset() {
        document.getElementById('editId').value = "";
        document.getElementById('stuName').value = "";
        document.getElementById('stuContact').value = "";
        document.getElementById('stuClass').value = "";
        document.getElementById('stuAge').value = "";
        document.getElementById('stuDob').value = "";
        document.getElementById('stuLoc').value = "";
        document.getElementById('stuHealth').value = "";
        document.getElementById('fileInp').value = "";
        document.getElementById('imgPrev').style.display = "none";
        document.getElementById('txtPrompt').style.display = "block";
        document.getElementById('saveBtn').innerText = "Save Student Record";
        document.getElementById('cancelBtn').style.display = "none";
    }

    load();
</script>
</body>
</html>
