<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROGRESSIVE PMS - V126 ADMIN MASTER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #002b5b; --gold: #ffce00; --red: #ff3b3b; --green: #2ecc71; --gray: #f4f7fa; }
        body { font-family: 'Inter', sans-serif; background: var(--gray); margin: 0; padding-bottom: 90px; }
        
        /* HEADER */
        .header { background: linear-gradient(135deg, #001a33, var(--blue)); color: white; padding: 15px 15px 85px; text-align: center; border-radius: 0 0 45px 45px; border-bottom: 5px solid var(--gold); position: relative; }
        .logout-btn { position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.1); border: 1px solid white; color: white; border-radius: 8px; padding: 6px 12px; font-size: 10px; font-weight: 800; cursor: pointer; }
        .school-name { font-size: 11px; font-weight: 800; color: var(--gold); margin-top: 5px; text-transform: uppercase; }
        .clock-box { font-size: 38px; font-weight: 900; color: white; margin: 5px 0; }
        .date-box { font-size: 13px; opacity: 0.8; margin-bottom: 12px; }

        /* DASHBOARD */
        .dash-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 15px; margin-top: -55px; position: relative; z-index: 5; }
        .dash-card { background: white; padding: 15px 5px; border-radius: 22px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1.5px solid #eee; }
        .dash-card span { display: block; font-size: 20px; font-weight: 900; color: var(--blue); }
        .dash-card small { font-size: 8px; font-weight: 800; color: #999; text-transform: uppercase; }

        /* TABS */
        .tab-bar { display: flex; justify-content: space-around; background: white; padding: 8px; margin: 25px 15px 15px; border-radius: 20px; }
        .tab { padding: 12px 5px; font-size: 10px; font-weight: 900; color: #bbb; cursor: pointer; text-align: center; flex: 1; }
        .tab.active { background: var(--blue); color: white; border-radius: 15px; }

        .card { background: white; padding: 20px; border-radius: 28px; margin: 15px; border: 1px solid #eee; }
        input, select, textarea { width: 100%; padding: 15px; margin-top: 10px; border: 1.5px solid #eee; border-radius: 15px; font-weight: 600; box-sizing: border-box; font-size: 14px; }
        
        .btn-main { background: var(--blue); color: white; border: none; padding: 18px; width: 100%; border-radius: 18px; font-weight: 900; margin-top: 15px; cursor: pointer; }
        .btn-delete { background: var(--red); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 800; font-size: 11px; cursor: pointer; width: 100%; margin-top: 5px; }
        
        .status-tag { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 900; margin-bottom: 5px; }
        .active-tag { background: #e8f5e9; color: #2e7d32; }
        .left-tag { background: #ffebee; color: #c62828; }

        .hidden { display: none !important; }
        .footer-brand { text-align: center; font-size: 10px; color: #bbb; font-weight: 800; margin-top: 30px; }
    </style>
</head>
<body>

<div id="loginGate" style="padding: 100px 30px; text-align: center;">
    <h2 style="color:var(--blue); font-weight:900;">PROGRESSIVE PMS</h2>
    <div class="card" style="max-width:320px; margin:auto; border: 2.5px solid var(--blue);">
        <input id="sysKey" type="password" placeholder="ACCESS KEY" style="text-align:center;">
        <button onclick="login()" class="btn-main">AUTHORIZE</button>
    </div>
</div>

<div id="mainApp" class="hidden">
    <div class="header">
        <button class="logout-btn" onclick="location.reload()">LOGOUT</button>
        <div class="school-name">Progressive Mothers Nursery & Primary</div>
        <div id="clock" class="clock-box">00:00:00</div>
        <div id="fullDate" class="date-box">...</div>
    </div>

    <div class="dash-container">
        <div class="dash-card"><span id="statTotal">0</span><small>Students</small></div>
        <div class="dash-card"><span id="statPres" style="color:var(--green)">0</span><small>Present</small></div>
        <div class="dash-card"><span id="statAbs" style="color:var(--red)">0</span><small>Absent</small></div>
    </div>

    <div class="tab-bar">
        <div id="tReg" class="tab active" onclick="showTab('reg')">REGISTER</div>
        <div id="tRoll" class="tab" onclick="showTab('roll')">ROLL CALL</div>
        <div id="tRec" class="tab" onclick="showTab('rec')">RECORDS</div>
        <div id="tFin" class="tab hidden" onclick="showTab('fin')">FINANCES</div>
    </div>

    <div id="secReg" class="card">
        <h4 id="regTitle" style="margin:0; color:var(--blue);">NEW ENROLLMENT</h4>
        <input type="hidden" id="editId">
        <input id="fName" placeholder="Full Name">
        <select id="fClass"><option value="">Class</option><option>Baby</option><option>Middle</option><option>Top</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
        <input id="fCon" placeholder="Contact">
        <input id="fLin" placeholder="LIN Number">
        
        <div id="adminFields" class="hidden">
            <select id="fStatus"><option value="Active">Currently in School</option><option value="Left">Left School</option></select>
            <input type="number" id="fExp" placeholder="Expected Fees">
            <input type="number" id="fPaid" placeholder="Paid Fees">
        </div>
        
        <button id="saveBtn" onclick="saveData()" class="btn-main">SAVE TO CLOUD</button>
        <button id="delBtn" onclick="deleteStudent()" class="btn-delete hidden">PERMANENTLY DELETE STUDENT</button>
    </div>

    <div id="secRoll" class="hidden">
        <div class="card"><select id="rollClass" onchange="loadRoll()"><option value="">-- Choose Class --</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select></div>
        <div id="rollArea"></div>
    </div>

    <div id="secRec" class="hidden">
        <div class="card"><input type="text" id="search" oninput="renderRec()" placeholder="🔍 Search records..."></div>
        <div id="recArea"></div>
    </div>

    <div id="secFin" class="hidden">
        <div class="card" id="finArea"></div>
    </div>

    <div class="footer-brand">EUDES MEDIA SOLUTIONS | +256762992440</div>
</div>

<script>
    const sb = supabase.createClient("https://kjftrwuucjdnhfwesrup.supabase.co", "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO");
    let ROLE = "", students = [], att = {};

    function login() {
        const k = document.getElementById('sysKey').value.toUpperCase();
        if(k === "JESUS CARES") ROLE = "ADMIN";
        else if(k === "TEACHER256") ROLE = "TEACHER";
        else if(k === "FINANCE2026") ROLE = "FINANCE";
        else return alert("Access Denied");

        document.getElementById('loginGate').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');

        if(ROLE === "ADMIN") document.getElementById('adminFields').classList.remove('hidden');
        if(ROLE === "FINANCE") { showTab('fin'); document.getElementById('tReg').classList.add('hidden'); document.getElementById('tRoll').classList.add('hidden'); document.getElementById('tFin').classList.remove('hidden'); }
        
        fetchData();
        setInterval(updateClock, 1000);
    }

    async function fetchData() {
        const { data } = await sb.from('students').select('*').order('name');
        if(data) {
            students = data;
            document.getElementById('statTotal').innerText = students.filter(s => s.status !== 'Left').length;
            renderRec();
            if(ROLE === "FINANCE") renderFinance();
        }
    }

    async function saveData() {
        const id = document.getElementById('editId').value;
        const row = {
            name: document.getElementById('fName').value,
            class: document.getElementById('fClass').value,
            contact: document.getElementById('fCon').value,
            lin: document.getElementById('fLin').value
        };

        if(ROLE === "ADMIN") {
            row.status = document.getElementById('fStatus').value;
            row.fees_expected = parseInt(document.getElementById('fExp').value) || 0;
            row.fees_paid = parseInt(document.getElementById('fPaid').value) || 0;
        }

        if(id) {
            if(ROLE !== "ADMIN") return alert("Only Administrator can edit existing records.");
            await sb.from('students').update(row).eq('id', id);
        } else {
            await sb.from('students').insert([row]);
        }
        alert("Synced!"); clearForm(); fetchData();
    }

    async function deleteStudent() {
        if(!confirm("Are you sure? This cannot be undone.")) return;
        const id = document.getElementById('editId').value;
        await sb.from('students').delete().eq('id', id);
        alert("Deleted."); clearForm(); fetchData();
    }

    function renderRec() {
        const q = document.getElementById('search').value.toUpperCase();
        let h = "";
        students.filter(s => s.name.toUpperCase().includes(q)).forEach(s => {
            const isLeft = s.status === 'Left';
            h += `<div class="card" style="opacity:${isLeft ? '0.6' : '1'}">
                <span class="status-tag ${isLeft ? 'left-tag' : 'active-tag'}">${isLeft ? 'LEFT SCHOOL' : 'ACTIVE'}</span><br>
                <b style="font-size:16px;">${s.name}</b> [${s.class}]<br>
                <small>Contact: ${s.contact}</small>
                ${ROLE === "ADMIN" ? `<button onclick="editAdmin('${s.id}')" style="margin-top:10px; width:100%; padding:8px; border-radius:10px; border:none; background:#eee; font-weight:800;">EDIT / MANAGE</button>` : ''}
            </div>`;
        });
        document.getElementById('recArea').innerHTML = h;
    }

    function editAdmin(id) {
        const s = students.find(x => x.id == id);
        document.getElementById('editId').value = s.id;
        document.getElementById('fName').value = s.name;
        document.getElementById('fClass').value = s.class;
        document.getElementById('fCon').value = s.contact;
        document.getElementById('fLin').value = s.lin;
        document.getElementById('fStatus').value = s.status || 'Active';
        document.getElementById('fExp').value = s.fees_expected || 0;
        document.getElementById('fPaid').value = s.fees_paid || 0;
        document.getElementById('regTitle').innerText = "MANAGING: " + s.name;
        document.getElementById('delBtn').classList.remove('hidden');
        showTab('reg');
    }

    function loadRoll() {
        const cls = document.getElementById('rollClass').value;
        const list = students.filter(s => s.class === cls && s.status !== 'Left');
        let h = "";
        list.forEach(s => {
            const isAbs = att[s.id] === 'absent';
            h += `<div style="display:flex; justify-content:space-between; align-items:center; padding:15px; border-bottom:1px solid #eee;">
                <b>${s.name}</b>
                <button onclick="toggleAtt('${s.id}')" style="padding:10px 15px; border-radius:10px; border:none; background:${isAbs ? 'var(--red)' : '#eee'}; color:${isAbs ? 'white' : '#333'}; font-weight:900;">${isAbs ? 'ABSENT' : 'PRESENT'}</button>
            </div>`;
        });
        document.getElementById('rollArea').innerHTML = h;
    }

    function toggleAtt(id) {
        att[id] = (att[id] === 'absent') ? 'present' : 'absent';
        let p = 0, a = 0;
        Object.values(att).forEach(v => v === 'present' ? p++ : a++);
        document.getElementById('statPres').innerText = p;
        document.getElementById('statAbs').innerText = a;
        loadRoll();
    }

    function showTab(t) {
        ['secReg','secRoll','secRec','secFin'].forEach(s => document.getElementById(s).classList.add('hidden'));
        ['tReg','tRoll','tRec','tFin'].forEach(s => document.getElementById(s).classList.remove('active'));
        document.getElementById('sec'+t.charAt(0).toUpperCase()+t.slice(1)).classList.remove('hidden');
        document.getElementById('t'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('active');
    }

    function clearForm() {
        ['fName','fCon','fLin','fExp','fPaid','editId'].forEach(i => document.getElementById(i).value = "");
        document.getElementById('regTitle').innerText = "NEW ENROLLMENT";
        document.getElementById('delBtn').classList.add('hidden');
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
        document.getElementById('fullDate').innerText = now.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
    }
</script>
</body>
</html>
