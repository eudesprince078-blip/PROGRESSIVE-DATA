<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMS | Eudes Media</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #2563eb; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        header { background: #3b82f6; color: white; padding: 20px; text-align: center; font-weight: bold; }
        .container { max-width: 450px; margin: 0 auto; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        .photo-area { border: 2px dashed #cbd5e1; border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 15px; background: #f0f7ff; cursor: pointer; }
        #imgPrev { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; display: none; margin: 0 auto 10px; border: 3px solid var(--blue); }
        
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-save { background: var(--blue); color: white; padding: 16px; border-radius: 12px; border: none; width: 100%; font-weight: 700; cursor: pointer; }
        
        .student-row { display: flex; align-items: center; gap: 15px; padding: 15px; background: white; border-radius: 15px; margin-top: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .list-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background: #2563eb; }

        .footer { text-align: center; padding: 20px; color: #64748b; font-size: 13px; line-height: 1.6; }
    </style>
</head>
<body>

<header>WELCOME TO EUDES CHAT</header>

<div class="container">
    <div class="card">
        <div class="photo-area" onclick="document.getElementById('fileInp').click()">
            <img id="imgPrev" src="">
            <span id="txtPrompt">📸 Tap to Add Photo</span>
            <input type="file" id="fileInp" accept="image/*" style="display:none" onchange="preview(this)">
        </div>

        <input type="text" id="name" placeholder="Full Student Name">
        <input type="text" id="contact" placeholder="Contact Number">
        <input type="text" id="class" placeholder="Class">
        <input type="text" id="age" placeholder="Age">
        <input type="date" id="dob">
        <input type="text" id="location" placeholder="Physical Location">
        <textarea id="health_status" placeholder="Health Status"></textarea>
        <select id="status">
            <option value="Active">Active Student</option>
            <option value="Left">Left School</option>
        </select>
        
        <input type="hidden" id="editId">
        <button class="btn-save" id="saveBtn" onclick="handleSave()">Save Student Record</button>
    </div>

    <div id="list">Loading...</div>
</div>

<div class="footer">
    System Developed by <b>Eudes Media</b><br>
    WhatsApp: +256 762 992 440 [cite: 2026-03-05]<br>
    Direct Call: +256 200 930 932 [cite: 2026-03-05]
</div>

<script>
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co"; 
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    const BUCKET = "students photos"; // Matches your screenshot exactly [cite: 2026-03-05]

    function preview(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('imgPrev').src = e.target.result;
                document.getElementById('imgPrev').style.display = 'block';
                document.getElementById('txtPrompt').style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function handleSave() {
        const name = document.getElementById('name').value.trim();
        const file = document.getElementById('fileInp').files[0];
        const dob = document.getElementById('dob').value;
        const btn = document.getElementById('saveBtn');

        if (!name) return alert("Please enter a name");

        btn.disabled = true;
        btn.innerText = "Uploading...";

        let photoUrl = "";
        if (file) {
            const path = `${Date.now()}.jpg`;
            const { data, error } = await supabaseClient.storage.from(BUCKET).upload(path, file);
            if (!error) {
                const { data: p } = supabaseClient.storage.from(BUCKET).getPublicUrl(path);
                photoUrl = p.publicUrl;
            }
        }

        const student = {
            name: name,
            contact: document.getElementById('contact').value,
            class: document.getElementById('class').value,
            age: document.getElementById('age').value,
            dob: dob === "" ? null : dob, // FIX: Sends NULL if date is empty [cite: 2026-03-05]
            location: document.getElementById('location').value,
            health_status: document.getElementById('health_status').value,
            status: document.getElementById('status').value
        };

        if (photoUrl) student.photo_url = photoUrl;

        const id = document.getElementById('editId').value;
        let res = id 
            ? await supabaseClient.from('students').update(student).eq('id', id)
            : await supabaseClient.from('students').insert([{...student, lin: "PMS-"+Math.floor(1000+Math.random()*9000)}]);

        if (res.error) {
            alert("Error: " + res.error.message);
        } else {
            location.reload();
        }
    }

    async function load() {
        const { data, error } = await supabaseClient.from('students').select('*').order('created_at', { ascending: false });
        const listDiv = document.getElementById('list');
        
        if (error) {
            listDiv.innerHTML = "Database Error: " + error.message;
            return;
        }

        listDiv.innerHTML = "";
        data.forEach(s => {
            const initials = s.name ? s.name.substring(0,1).toUpperCase() : "S";
            const img = s.photo_url || `https://ui-avatars.com/api/?name=${initials}&background=2563eb&color=fff`;
            
            listDiv.innerHTML += `
                <div class="student-row">
                    <img src="${img}" class="list-img">
                    <div style="flex:1">
                        <b>${s.name}</b><br>
                        <small>${s.lin} | ${s.class}</small>
                    </div>
                    <button onclick="editRec('${s.id}')">Edit</button>
                </div>`;
        });
    }

    async function editRec(id) {
        const { data: s } = await supabaseClient.from('students').select('*').eq('id', id).single();
        if (s) {
            document.getElementById('editId').value = s.id;
            document.getElementById('name').value = s.name;
            document.getElementById('contact').value = s.contact;
            document.getElementById('class').value = s.class;
            document.getElementById('age').value = s.age;
            document.getElementById('dob').value = s.dob || "";
            document.getElementById('location').value = s.location;
            document.getElementById('health_status').value = s.health_status;
            document.getElementById('status').value = s.status || "Active";
            window.scrollTo(0,0);
        }
    }
    load();
</script>
</body>
</html>
