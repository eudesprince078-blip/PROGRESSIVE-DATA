<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROGRESSIVE PMS - V38 STABLE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #0056b3; --dark: #002244; --white: #ffffff; --green: #25d366; --red: #dc3545; --gray: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); margin: 0; padding: 10px; }
        .box { background: var(--white); padding: 18px; border-radius: 12px; max-width: 1000px; margin: 10px auto; border: 1px solid #ddd; }
        .header { background: linear-gradient(135deg, var(--blue), var(--dark)); color: white; padding: 20px; border-radius: 12px; text-align: center; }
        label { font-size: 12px; font-weight: bold; color: var(--blue); display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 14px; border: 1.5px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn-main { background: var(--blue); color: white; padding: 16px; border: none; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 20px; }
        .student-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 6px solid var(--blue); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loginGate" class="box" style="max-width:320px; margin-top:80px; text-align:center;">
    <h2 style="color:var(--blue)">PROGRESSIVE PMS</h2>
    <input id="passInput" type="password" placeholder="ENTER ACCESS KEY" style="text-align:center;">
    <button onclick="handleLogin()" class="btn-main">LOGIN</button>
</div>

<div id="mainApp" class="hidden">
    <div class="header">
        <h2 style="margin:0;">PROGRESSIVE SCHOOL</h2>
        <button onclick="location.reload()" style="background:none; border:1px solid white; color:white; font-size:10px; margin-top:10px; padding:5px 10px; border-radius:4px; cursor:pointer;">LOGOUT</button>
    </div>

    <div class="box">
        <h3 id="fTitle" style="margin:0; color:var(--blue);">Student Record Update</h3>
        <input type="hidden" id="editId">
        
        <div id="adminFields">
            <label>Full Name</label>
            <input id="name" placeholder="Name">
            
            <label>Gender (Inactive)</label>
            <select id="gender">
                <option value="Boy">Boy</option>
                <option value="Girl">Girl</option>
            </select>

            <label>Class</label>
            <select id="cl">
                <option value="Baby">Baby</option><option value="Middle">Middle</option><option value="Top">Top</option>
                <option value="P.1">P.1</option><option value="P.2">P.2</option><option value="P.3">P.3</option>
                <option value="P.4">P.4</option><option value="P.5">P.5</option><option value="P.6">P.6</option><option value="P.7">P.7</option>
            </select>
        </div>

        <label>Parent Phone</label>
        <input id="ph" placeholder="07...">

        <label>Payment Code</label>
        <input id="payCode" placeholder="Code">

        <label>Balance (UGX)</label>
        <input id="fBal" type="number" placeholder="0">

        <button id="saveBtn" onclick="save()" class="btn-main">CONFIRM & SAVE RECORD</button>
        <button onclick="resetForm()" style="width:100%; border:none; padding:10px; margin-top:10px; background:none; cursor:pointer;">Cancel</button>
    </div>

    <div class="box">
        <input type="text" id="sBar" oninput="search()" placeholder="🔍 Search Students..." style="border:2px solid var(--blue); margin-bottom:15px;">
        <div id="listBody"></div>
    </div>
</div>

<script>
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co";
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    let sb = null, students = [], USER_ROLE = "";

    function handleLogin() {
        const p = document.getElementById('passInput').value.trim().toUpperCase();
        if (p === "JESUS CARES") USER_ROLE = "ADMIN";
        else if (p === "FINANCE2026") USER_ROLE = "FINANCE";
        else { alert("Access Denied"); return; }

        sb = supabase.createClient(SB_URL, SB_KEY);
        document.getElementById('loginGate').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        
        if(USER_ROLE === "FINANCE") {
            document.getElementById('adminFields').classList.add('hidden');
        }
        refresh();
    }

    async function refresh() {
        const { data } = await sb.from('students').select('*').order('name', { ascending: true });
        students = data || [];
        render(students);
    }

    function render(list) {
        let html = "";
        list.forEach(s => {
            html += `<div class="student-card">
                <b>${s.name.toUpperCase()}</b>
                <div style="font-size:11px; color:#666;">LIN: ${s.lin} | Class: ${s.class}</div>
                <div style="color:var(--red); font-weight:bold;">BAL: UGX ${Number(s.fees_balance).toLocaleString()}</div>
                <button onclick="editMode('${s.id}')" style="margin-top:10px; padding:5px 10px; cursor:pointer;">EDIT</button>
            </div>`;
        });
        document.getElementById('listBody').innerHTML = html;
    }

    async function save() {
        const id = document.getElementById('editId').value;
        const btn = document.getElementById('saveBtn');
        
        // ONLY sending columns that definitely exist in your database
        const payload = {
            contact: document.getElementById('ph').value.trim(),
            fees_balance: parseInt(document.getElementById('fBal').value) || 0,
            payment_code: document.getElementById('payCode').value.trim().toUpperCase()
        };

        if (USER_ROLE === "ADMIN") {
            payload.name = document.getElementById('name').value.trim();
            payload.class = document.getElementById('cl').value;
            if(!payload.name) { alert("Please enter a name"); return; }
        }

        btn.innerText = "SAVING...";
        btn.disabled = true;

        try {
            let error;
            if (!id) {
                payload.lin = "PMA-" + Math.floor(1000 + Math.random() * 9000);
                const res = await sb.from('students').insert([payload]);
                error = res.error;
            } else {
                const res = await sb.from('students').update(payload).eq('id', id);
                error = res.error;
            }

            if (error) throw error;
            
            alert("Record Saved Successfully!");
            resetForm();
            refresh();
        } catch (err) {
            alert("Database Error: " + err.message);
        } finally {
            btn.innerText = "CONFIRM & SAVE RECORD";
            btn.disabled = false;
        }
    }

    function editMode(id) {
        const s = students.find(x => x.id == id);
        document.getElementById('editId').value = s.id;
        document.getElementById('ph').value = s.contact || '';
        document.getElementById('fBal').value = s.fees_balance || 0;
        document.getElementById('payCode').value = s.payment_code || '';
        if(USER_ROLE === "ADMIN") {
            document.getElementById('name').value = s.name;
            document.getElementById('cl').value = s.class;
        }
        document.getElementById('fTitle').innerText = "UPDATING: " + s.name;
        window.scrollTo(0,0);
    }

    function resetForm() {
        document.getElementById('editId').value = "";
        document.getElementById('name').value = "";
        document.getElementById('fTitle').innerText = "Student Record Update";
    }

    function search() {
        const q = document.getElementById('sBar').value.toUpperCase();
        render(students.filter(s => s.name.toUpperCase().includes(q)));
    }
</script>
</body>
</html>
