<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Progressive Mothers PMS v47.1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #001a33; --red: #e63946; --gold: #ffc107; --white: #ffffff; --green: #25D366; --light: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 0; }
        .header { background: var(--red); color: white; padding: 15px; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--gold); }
        .hero { background: var(--blue); color: white; padding: 20px 15px; text-align: center; border-bottom: 5px solid var(--gold); }
        #clock { font-size: 38px; font-weight: 900; letter-spacing: -1px; margin: 5px 0; }
        
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .sum-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 4px solid var(--blue); }
        .sum-card h4 { margin: 0; font-size: 10px; color: #888; text-transform: uppercase; }
        .sum-card p { margin: 5px 0 0 0; font-size: 18px; font-weight: 900; color: var(--blue); }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 15px; margin-top: -30px; }
        .stat-card { background: white; padding: 12px 5px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-bottom: 4px solid var(--blue); }
        .stat-val { font-size: 22px; font-weight: 900; color: var(--blue); display: block; }
        .stat-lbl { font-size: 8px; font-weight: 800; color: #888; text-transform: uppercase; }

        .nav-tabs { display: flex; background: white; border-bottom: 1px solid #ddd; position: sticky; top: 68px; z-index: 999; }
        .tab { flex: 1; text-align: center; padding: 15px 5px; font-weight: 900; font-size: 9px; color: #bbb; cursor: pointer; text-transform: uppercase; }
        .tab.active { color: var(--blue); border-bottom: 4px solid var(--blue); background: #fcfcfc; }

        .routine-box { background: rgba(255,255,255,0.1); padding: 8px; border-radius: 8px; font-size: 10px; margin-top: 10px; border: 1px solid var(--gold); }
        .item-card { background: white; border-radius: 15px; padding: 15px; margin: 10px 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 8px solid var(--blue); }
        input, select { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 15px; margin: 5px 0 12px 0; box-sizing: border-box; font-weight: 600; }
        label { font-size: 9px; font-weight: 800; color: var(--blue); text-transform: uppercase; }
        .hidden { display: none !important; }
        .btn-save { width: 100%; background: var(--blue); color: white; padding: 18px; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; }
        .btn-reset { background: var(--gold); color: var(--blue); border: none; padding: 8px 15px; border-radius: 8px; font-weight: 900; font-size: 10px; margin-bottom: 15px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div id="loginGate" style="position:fixed; inset:0; background:var(--blue); z-index:2000; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px;">
    <h2 style="color:white; font-weight:900;">SCHOOL ACCESS</h2>
    <input id="key" type="password" placeholder="ACCESS KEY" style="text-align:center; max-width:280px; border:3px solid var(--gold);">
    <button onclick="secureLogin()" style="background:var(--gold); color:var(--blue); padding:18px; width:100%; max-width:280px; border:none; border-radius:12px; font-weight:900; margin-top:10px;">LOGIN</button>
</div>

<div id="mainApp" class="hidden">
    <div class="header">
        <div style="line-height:1.1;"><b style="font-size:12px;">PROGRESSIVE MOTHERS</b><br><span style="font-size:9px;">Nursery & Primary School</span></div>
        <button onclick="location.reload()" style="background:white; color:var(--red); border:none; padding:8px 12px; border-radius:8px; font-weight:900;">LOGOUT</button>
    </div>

    <div class="hero">
        <div id="full-date" style="color:var(--gold); font-size:11px; font-weight:800;">DATE</div>
        <div id="clock">00:00:00</div>
        <div class="routine-box" id="routineDisplay">Loading Routine...</div>
    </div>

    <div class="dashboard">
        <div class="stat-card"><span class="stat-val" id="c-tot">0</span><span class="stat-lbl">Pupils</span></div>
        <div class="stat-card" style="border-bottom-color: var(--green);"><span class="stat-val" id="c-pres" style="color:var(--green)">0</span><span class="stat-lbl">Present</span></div>
        <div class="stat-card" style="border-bottom-color: var(--red);"><span class="stat-val" id="c-abs" style="color:var(--red)">0</span><span class="stat-lbl">Absent</span></div>
    </div>

    <div class="nav-tabs">
        <div class="tab" id="tab-sum" onclick="tab('sum')">Director</div>
        <div class="tab" id="tab-rec" onclick="tab('rec')">Records</div>
        <div class="tab" id="tab-adm" onclick="tab('adm')">Admission</div>
        <div class="tab" id="tab-roll" onclick="tab('roll')">Attendance</div>
    </div>

    <div id="v-sum" class="hidden">
        <div class="summary-grid">
            <div class="sum-card"><h4>Expected Revenue</h4><p id="s-exp">0</p></div>
            <div class="sum-card" style="border-top-color:var(--green)"><h4>Total Paid</h4><p id="s-paid" style="color:var(--green)">0</p></div>
            <div class="sum-card" style="border-top-color:var(--red)"><h4>Total Arrears</h4><p id="s-bal" style="color:var(--red)">0</p></div>
            <div class="sum-card"><h4>Collection %</h4><p id="s-perc">0%</p></div>
        </div>
        <div id="classBreakdown" style="padding:0 15px 20px 15px;"></div>
    </div>

    <div id="v-rec" class="hidden">
        <div style="padding:15px;"><input id="searchBar" placeholder="🔍 Search name..." oninput="renderUI()"></div>
        <div id="dataList"></div>
    </div>

    <div id="v-adm" class="hidden" style="padding:15px;">
        <button class="btn-reset" onclick="clearForm()">+ REGISTER NEW STUDENT (CLEAR FORM)</button>
        <div style="background:white; padding:20px; border-radius:20px; border:1px solid #ddd;">
            <h3 id="admTitle" style="margin:0 0 15px 0; color:var(--blue); font-size:13px;">STUDENT PROFILE</h3>
            <input type="hidden" id="editId">
            <label>Name</label><input id="name">
            <label>LIN</label><input id="lin" readonly placeholder="Auto-generated">
            <label>Class</label>
            <select id="cls"><option>Baby Class</option><option>Middle Class</option><option>Top Class</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
            <label>Contact</label><input id="contact">
            <label>Location</label><input id="location">
            <label>Health Status</label><input id="health_status">
            <label style="color:var(--red)">Expected Fees</label><input id="f_exp" type="number" value="0">
            <label style="color:var(--green)">Paid Fees</label><input id="f_paid" type="number" value="0">
            <button onclick="submitData()" class="btn-save">SAVE RECORD</button>
        </div>
    </div>

    <div id="v-roll" class="hidden">
        <div style="padding:15px;"><select id="rollClass" onchange="renderUI()"><option value="">-- Choose Class --</option><option>Baby Class</option><option>Middle Class</option><option>Top Class</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select></div>
        <div id="rollData"></div>
    </div>
</div>

<script>
    const SUPA_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
    const _client = supabase.createClient(SUPA_URL, SUPA_KEY);
    let role = ""; let cachedData = [];

    function secureLogin() {
        const val = document.getElementById('key').value.trim().toUpperCase();
        if (val === "JESUS CARES") role = "Admin";
        else if (val === "FINANCE 256") role = "Finance";
        else if (val === "TEACH2026") role = "Teacher";
        else return alert("ACCESS DENIED");
        document.getElementById('loginGate').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        tab(role === "Admin" ? 'sum' : (role === "Teacher" ? 'roll' : 'rec'));
        loadData();
    }

    function tab(t) {
        ['v-adm','v-rec','v-roll','v-sum'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById('v-'+t).classList.remove('hidden');
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active');
    }

    async function loadData() {
        const { data } = await _client.from('students').select('*').order('name');
        if(data) { cachedData = data; renderUI(); updateSummary(); }
    }

    function updateSummary() {
        let tE = 0, tP = 0;
        cachedData.forEach(s => { tE += (s.fees_expected||0); tP += (s.fees_paid||0); });
        document.getElementById('s-exp').innerText = tE.toLocaleString();
        document.getElementById('s-paid').innerText = tP.toLocaleString();
        document.getElementById('s-bal').innerText = (tE - tP).toLocaleString();
        document.getElementById('s-perc').innerText = tE > 0 ? Math.round((tP/tE)*100) + "%" : "0%";
    }

    function renderUI() {
        document.getElementById('c-tot').innerText = cachedData.length;
        document.getElementById('c-abs').innerText = cachedData.filter(s => s.is_absent === true).length;
        document.getElementById('c-pres').innerText = cachedData.length - cachedData.filter(s => s.is_absent === true).length;

        const q = document.getElementById('searchBar').value.toLowerCase();
        const list = document.getElementById('dataList'); list.innerHTML = "";
        cachedData.filter(s => s.name.toLowerCase().includes(q)).forEach(s => {
            list.innerHTML += `<div class="item-card" onclick="editMode('${s.id}')"><b>${s.name}</b><br><small>${s.class}</small></div>`;
        });

        const rCls = document.getElementById('rollClass').value;
        const rList = document.getElementById('rollData'); rList.innerHTML = "";
        cachedData.filter(s => s.class === rCls).forEach(s => {
            const isA = s.is_absent === true;
            rList.innerHTML += `<div class="item-card" style="border-left-color:${isA?'var(--red)':'var(--green)'}"><b>${s.name}</b> <button onclick="markAtt('${s.id}', ${!isA})" style="float:right; background:${isA?'var(--red)':'var(--green)'}; color:white; border:none; padding:5px;">${isA?'ABSENT':'PRESENT'}</button></div>`;
        });
    }

    async function markAtt(id, status) { await _client.from('students').update({ is_absent: status }).eq('id', id); loadData(); }

    function editMode(id) {
        const s = cachedData.find(st => st.id == id);
        document.getElementById('editId').value = s.id;
        document.getElementById('name').value = s.name;
        document.getElementById('lin').value = s.lin || "";
        document.getElementById('cls').value = s.class;
        document.getElementById('contact').value = s.contact || "";
        document.getElementById('f_exp').value = s.fees_expected || 0;
        document.getElementById('f_paid').value = s.fees_paid || 0;
        document.getElementById('admTitle').innerText = "EDITING: " + s.name;
        tab('adm');
    }

    function clearForm() {
        document.getElementById('editId').value = "";
        document.getElementById('name').value = "";
        document.getElementById('lin').value = "PMA-" + Math.floor(1000 + Math.random() * 9000);
        document.getElementById('contact').value = "";
        document.getElementById('f_exp').value = 0;
        document.getElementById('f_paid').value = 0;
        document.getElementById('admTitle').innerText = "NEW REGISTRATION";
        alert("Form Cleared. Ready for new student.");
    }

    async function submitData() {
        const id = document.getElementById('editId').value;
        const payload = { 
            name: document.getElementById('name').value, 
            class: document.getElementById('cls').value,
            contact: document.getElementById('contact').value,
            lin: document.getElementById('lin').value,
            fees_expected: parseInt(document.getElementById('f_exp').value) || 0,
            fees_paid: parseInt(document.getElementById('f_paid').value) || 0
        };
        const { error } = id ? await _client.from('students').update(payload).eq('id', id) : await _client.from('students').insert([payload]);
        if(!error) { alert("Saved!"); loadData(); tab('rec'); }
    }

    function updateRoutine() {
        const now = new Date();
        const time = now.getHours() * 60 + now.getMinutes();
        let rText = "Evening Program";
        if (time >= 420 && time < 480) rText = "Arrival & Cleanup";
        else if (time >= 480 && time < 780) rText = "Class Sessions";
        else if (time >= 780 && time < 840) rText = "Lunch Break";
        document.getElementById('routineDisplay').innerText = rText;
    }

    setInterval(() => {
        document.getElementById('full-date').innerText = new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
        updateRoutine();
    }, 1000);
</script>
</body>
</html>
