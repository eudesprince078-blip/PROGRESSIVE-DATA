<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROGRESSIVE PMS V53</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #004085; --dark: #001a33; --white: #ffffff; --green: #218838; --red: #c82333; --gold: #ffc107; --gray: #f1f4f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); margin: 0; padding: 0; }
        .header { background: linear-gradient(135deg, var(--dark), var(--blue)); color: white; padding: 25px 20px; text-align: center; border-radius: 0 0 25px 25px; }
        .motto { font-style: italic; font-size: 10px; color: var(--gold); margin-top: 5px; }
        
        /* Stats Grid */
        .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; margin-top: -30px; }
        .kpi-card { background: white; padding: 12px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-bottom: 4px solid var(--blue); }
        .kpi-card h3 { margin: 5px 0; font-size: 20px; }
        .kpi-card p { margin: 0; font-size: 9px; color: #888; font-weight: bold; }

        .card { background: white; padding: 15px; border-radius: 12px; margin: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1.5px solid #eee; border-radius: 8px; box-sizing: border-box; }
        .btn-main { background: var(--blue); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-danger { background: var(--red); color: white; border: none; padding: 8px; border-radius: 5px; font-size: 10px; cursor: pointer; }
        
        .student-row { background: white; padding: 15px; border-radius: 12px; margin: 10px 15px; border-left: 6px solid var(--blue); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .hidden { display: none !important; }
        .absent-mark { color: var(--red); font-weight: bold; font-size: 10px; }
    </style>
</head>
<body>

<div id="loginGate" style="padding: 100px 20px; text-align: center;">
    <h2 style="color:var(--blue)">PROGRESSIVE PMS</h2>
    <div class="card" style="max-width: 320px; margin: auto;">
        <input id="passInput" type="password" placeholder="Access Key" style="text-align:center;">
        <button onclick="handleLogin()" class="btn-main">ENTER SYSTEM</button>
    </div>
</div>

<div id="mainApp" class="hidden">
    <div class="header">
        <h2 style="margin:0;">PROGRESSIVE MOTHERS</h2>
        <div class="motto">"With God Everything Is Possible"</div>
        <div id="liveClock" style="font-size:11px; margin-top:10px;"></div>
    </div>

    <div class="kpi-grid">
        <div class="kpi-card"><p>TOTAL ENROLLED</p><h3 id="statTotal">0</h3></div>
        <div class="kpi-card"><p>ACTIVE TODAY</p><h3 id="statActive" style="color:var(--green)">0</h3></div>
        <div class="kpi-card"><p>ABSENT TODAY</p><h3 id="statAbsent" style="color:var(--red)">0</h3></div>
        <div class="kpi-card"><p>LEFT SCHOOL</p><h3 id="statLeft">0</h3></div>
    </div>

    <div id="regForm" class="card">
        <h4 id="formTitle" style="margin:0; color:var(--blue);">Register/Edit Student</h4>
        <input type="hidden" id="editId">
        <input id="stName" placeholder="Full Name">
        <select id="stClass">
            <option value="Baby">Baby</option><option value="Middle">Middle</option><option value="Top">Top</option>
            <option value="P.1">P.1</option><option value="P.2">P.2</option><option value="P.3">P.3</option>
            <option value="P.4">P.4</option><option value="P.5">P.5</option><option value="P.6">P.6</option><option value="P.7">P.7</option>
            <option value="Alumni">Left School</option>
        </select>
        <input id="stPhone" placeholder="Contact Number">
        <div id="adminOnly" class="hidden">
            <input id="stAge" placeholder="Age">
            <input id="stDob" placeholder="Date of Birth">
            <input id="stLoc" placeholder="Physical Location">
            <input id="stHealth" placeholder="Health Status">
            <input id="stBal" type="number" placeholder="Fees Balance (UGX)">
        </div>
        <button onclick="saveStudent()" class="btn-main">SAVE STUDENT RECORD</button>
    </div>

    <div class="card">
        <input type="text" id="sBar" oninput="renderList()" placeholder="🔍 Search by Name or LIN Number...">
    </div>

    <div id="studentList"></div>
</div>

<script>
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co";
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    let sb = null, students = [], USER_ROLE = "";

    setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleString(); }, 1000);

    function handleLogin() {
        const p = document.getElementById('passInput').value.trim().toUpperCase();
        // Restoring original requested keys
        if (p === "JESUS CARES") USER_ROLE = "ADMIN";
        else if (p === "DIRECTOR2026") USER_ROLE = "DIRECTOR";
        else if (p === "FINANCE2026") USER_ROLE = "FINANCE";
        else if (p === "TEACHER256") USER_ROLE = "TEACHER";
        else return alert("Invalid Key");

        sb = supabase.createClient(SB_URL, SB_KEY);
        document.getElementById('loginGate').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        
        if(["ADMIN", "DIRECTOR", "FINANCE"].includes(USER_ROLE)) {
            document.getElementById('adminOnly').classList.remove('hidden');
        }
        refresh();
    }

    async function refresh() {
        const { data } = await sb.from('students').select('*').order('name', { ascending: true });
        students = data || [];
        
        const enrolled = students.filter(s => s.class !== 'Alumni');
        document.getElementById('statTotal').innerText = enrolled.length;
        document.getElementById('statLeft').innerText = students.filter(s => s.class === 'Alumni').length;
        document.getElementById('statAbsent').innerText = enrolled.filter(s => s.is_absent === true).length;
        document.getElementById('statActive').innerText = enrolled.filter(s => !s.is_absent).length;

        renderList();
    }

    async function saveStudent() {
        const id = document.getElementById('editId').value;
        const payload = {
            name: document.getElementById('stName').value.trim(),
            class: document.getElementById('stClass').value,
            contact: document.getElementById('stPhone').value,
            age: document.getElementById('stAge').value,
            dob: document.getElementById('stDob').value,
            location: document.getElementById('stLoc').value,
            health_status: document.getElementById('stHealth').value,
            fees_balance: parseInt(document.getElementById('stBal').value) || 0
        };

        if(!id) {
            payload.lin = "PMA-" + Math.floor(10000 + Math.random() * 90000);
            await sb.from('students').insert([payload]);
        } else {
            await sb.from('students').update(payload).eq('id', id);
        }
        
        alert("Success!");
        resetForm();
        refresh();
    }

    function renderList() {
        const q = document.getElementById('sBar').value.toUpperCase();
        let h = "";
        
        // Fixed Search: Checking Name and LIN
        const filtered = students.filter(s => 
            s.name.toUpperCase().includes(q) || (s.lin && s.lin.toUpperCase().includes(q))
        );

        filtered.forEach(s => {
            const isAlumni = s.class === 'Alumni';
            h += `<div class="student-row" style="${isAlumni ? 'opacity:0.6; border-left-color:#888;' : ''}">
                <div>
                    <b>${s.name.toUpperCase()}</b><br>
                    <small>${s.class} | LIN: ${s.lin || '---'}</small>
                    ${s.is_absent ? '<br><span class="absent-mark">ABSENT TODAY</span>' : ''}
                </div>
                <div>
                    <button onclick="editStudent('${s.id}')" style="margin-right:5px;">EDIT</button>
                    ${USER_ROLE === 'ADMIN' ? `<button class="btn-danger" onclick="toggleAbsent('${s.id}', ${!s.is_absent})">${s.is_absent ? 'MARK PRESENT' : 'MARK ABSENT'}</button>` : ''}
                </div>
            </div>`;
        });
        document.getElementById('studentList').innerHTML = h;
    }

    function editStudent(id) {
        const s = students.find(x => x.id == id);
        document.getElementById('editId').value = s.id;
        document.getElementById('stName').value = s.name;
        document.getElementById('stClass').value = s.class;
        document.getElementById('stPhone').value = s.contact || '';
        document.getElementById('stAge').value = s.age || '';
        document.getElementById('stDob').value = s.dob || '';
        document.getElementById('stLoc').value = s.location || '';
        document.getElementById('stHealth').value = s.health_status || '';
        document.getElementById('stBal').value = s.fees_balance || 0;
        document.getElementById('formTitle').innerText = "Editing: " + s.name;
        window.scrollTo(0,0);
    }

    async function toggleAbsent(id, status) {
        await sb.from('students').update({ is_absent: status }).eq('id', id);
        refresh();
    }

    function resetForm() {
        document.getElementById('editId').value = "";
        document.getElementById('stName').value = "";
        document.getElementById('formTitle').innerText = "Register Student";
    }
</script>
</body>
</html>
