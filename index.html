<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SECURE ACCESS | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0052cc; --dark: #020617; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #1e293b; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* OVERLAYS */
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; display: none; backdrop-filter: blur(4px); }
        .sidebar-overlay.active { display: block; }

        /* HEADER */
        .top-bar { height: 65px; background: white; border-bottom: 2px solid var(--primary); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 100; }
        
        /* SIDEBAR */
        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 280px; background: var(--dark); z-index: 1000; transform: translateX(-100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .sidebar.open { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.3); }
        .nav-item { padding: 18px 25px; color: #94a3b8; cursor: pointer; display: flex; align-items: center; font-weight: 700; border: none; background: none; width: 100%; text-align: left; transition: 0.2s; }
        .nav-item.active { background: var(--primary); color: white; }
        .nav-item i { width: 35px; font-size: 1.2rem; }

        .content { flex: 1; overflow-y: auto; padding: 15px; }
        .card { background: white; border-radius: 20px; padding: 20px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #cbd5e1; margin-bottom: 12px; font-weight: 600; font-size: 0.95rem; }
        .btn-pro { background: var(--primary); color: white; padding: 16px; border-radius: 14px; border: none; font-weight: 800; width: 100%; cursor: pointer; }
        
        .st-row { background: white; padding: 12px; border-radius: 15px; margin-bottom: 8px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 12px; }
        .st-img { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; background: #eee; }
        
        /* AUTH PAGE */
        #auth { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        .error-tag { color: #ff4d4d; font-size: 0.75rem; font-weight: 800; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div id="overlay" class="sidebar-overlay" onclick="toggleMenu()"></div>

    <div id="auth">
        <div style="background:white; padding:40px; border-radius:30px; width:90%; max-width:400px; text-align:center;">
            <h1 style="font-weight:900; margin-bottom:5px;">ESMS <span style="color:var(--primary)">PRO</span></h1>
            <p style="font-size:0.7rem; font-weight:800; color:#94a3b8; margin-bottom:25px;">EUDES MEDIA SECURE LOGIN</p>
            
            <input type="text" id="log-sch" placeholder="SCHOOL ID (e.g. PM001)" style="text-align:center; text-transform:uppercase;">
            <input type="password" id="log-key" placeholder="ACCESS KEY" style="text-align:center;">
            
            <button id="login-btn" class="btn-pro" onclick="secureLogin()">VERIFY IDENTITY</button>
            <p id="auth-err" class="error-tag">ACCESS DENIED: INVALID ID OR KEY</p>
        </div>
    </div>

    <header class="top-bar">
        <div onclick="toggleMenu()" style="cursor:pointer; width:40px; height:40px; display:flex; align-items:center; justify-content:center;"><i class="fas fa-bars"></i></div>
        <div style="text-align:center;">
            <div id="school-name-display" style="font-weight:900; font-size:0.75rem; color:var(--primary); text-transform:uppercase;">ESMS CLIENT</div>
            <div id="clock" style="font-size:0.6rem; font-weight:700; color:#94a3b8;"></div>
        </div>
        <div id="user-role" style="background:var(--bg); padding:5px 10px; border-radius:8px; font-size:0.6rem; font-weight:800; border:1px solid #e2e8f0;">USER</div>
    </header>

    <div class="wrapper">
        <aside class="sidebar" id="sidebar">
            <div style="padding:30px 25px;"><h2 style="color:white; font-weight:900; letter-spacing:1px;">PORTAL</h2></div>
            <nav>
                <button class="nav-item active" onclick="nav('dash', this)"><i class="fas fa-th-large"></i>Dashboard</button>
                <button id="nav-reg" class="nav-item" onclick="nav('reg', this)"><i class="fas fa-user-plus"></i>Registration</button>
                <button class="nav-item" onclick="nav('list', this)"><i class="fas fa-users-viewfinder"></i>Students</button>
                <button id="nav-fin" class="nav-item" onclick="nav('fin', this)"><i class="fas fa-money-check-dollar"></i>Financials</button>
            </nav>
            <div style="margin-top:auto; padding:25px; text-align:center; border-top:1px solid #1e293b;">
                <p style="color:white; font-size:0.7rem; font-weight:800;">EUDES MEDIA</p>
                <p style="color:var(--primary); font-size:0.65rem; font-weight:700;">+256762992440</p>
            </div>
        </aside>

        <main class="content">
            <div id="v-dash">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px;">
                    <div class="card" style="text-align:center;"> <h2 id="st-count">0</h2><small style="font-weight:800; color:#94a3b8;">STUDENTS</small></div>
                    <div class="card" style="text-align:center;"> <h2 id="st-debt" style="color:red">0</h2><small style="font-weight:800; color:#94a3b8;">DEBT (UGX)</small></div>
                </div>
                <div class="card" id="expiry-warn" style="display:none; border-left:5px solid red;">
                    <b style="color:red; font-size:0.7rem;">SUBSCRIPTION NOTICE</b>
                    <p style="font-size:0.8rem; margin-top:5px;">System expires on: <span id="exp-date-text"></span></p>
                </div>
            </div>

            <div id="v-reg" class="hidden">
                <div class="card">
                    <h3 id="form-title" style="margin-bottom:15px;">ENROLLMENT</h3>
                    <input type="hidden" id="f-id">
                    <div style="text-align:center; margin-bottom:15px;">
                        <img id="f-preview" style="width:80px; height:80px; border-radius:15px; object-fit:cover; display:none; margin:0 auto 10px; border:2px solid var(--primary);">
                        <input type="file" onchange="imgProc(this)" style="font-size:0.7rem;">
                        <input type="hidden" id="f-img">
                    </div>
                    <input type="text" id="f-name" placeholder="Full Student Name">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <input type="number" id="f-age" placeholder="Age">
                        <input type="date" id="f-dob">
                    </div>
                    <input type="text" id="f-contact" placeholder="Guardian Phone">
                    <input type="text" id="f-loc" placeholder="Home Location">
                    <input type="text" id="f-health" placeholder="Health Status">
                    <input type="number" id="f-fees" placeholder="Term Fees">
                    <button id="save-btn" class="btn-pro" onclick="saveData()">SAVE TO DATABASE</button>
                    <button id="cancel-btn" class="hidden" onclick="resetForm()" style="background:#64748b; color:white; border:none; padding:12px; margin-top:10px; width:100%; border-radius:12px;">CANCEL</button>
                </div>
            </div>

            <div id="v-list" class="hidden">
                <input type="text" id="search-box" placeholder="Search Name or LIN..." onkeyup="filter()">
                <div id="master-list"></div>
            </div>

            <div id="v-fin" class="hidden"><div id="finance-list"></div></div>
        </main>
    </div>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        let db, activeSch, userRole, students = [];

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        async function secureLogin() {
            const schId = document.getElementById('log-sch').value.toUpperCase().trim();
            const key = document.getElementById('log-key').value.trim();
            const btn = document.getElementById('login-btn');
            const err = document.getElementById('auth-err');

            if(!schId || !key) return;
            btn.disabled = true; btn.innerText = "AUTHENTICATING...";
            err.style.display = "none";

            db = supabase.createClient(SB_URL, SB_KEY);
            const { data, error } = await db.from('Schools').select('*').eq('sch_id', schId).single();

            if (data) {
                // Multi-Key Verification
                if (key === data.admin_key) userRole = 'ADMIN';
                else if (key === data.finance_key) userRole = 'FINANCE';
                else if (key === data.teacher_key) userRole = 'TEACHER';
                else {
                    err.innerText = "WRONG ACCESS KEY";
                    err.style.display = "block";
                    btn.disabled = false; btn.innerText = "VERIFY IDENTITY";
                    return;
                }

                activeSch = schId;
                applyPermissions();
                document.getElementById('school-name-display').innerText = data.sch_name;
                document.getElementById('user-role').innerText = userRole;
                document.getElementById('exp-date-text').innerText = data.expiry_date;
                document.getElementById('expiry-warn').style.display = "block";
                document.getElementById('auth').classList.add('hidden');
                refresh();
            } else {
                err.innerText = "SCHOOL ID NOT FOUND";
                err.style.display = "block";
                btn.disabled = false; btn.innerText = "VERIFY IDENTITY";
            }
        }

        function applyPermissions() {
            // Hide things based on role
            if(userRole === 'TEACHER') {
                document.getElementById('nav-reg').classList.add('hidden');
                document.getElementById('nav-fin').classList.add('hidden');
            }
            if(userRole === 'FINANCE') {
                document.getElementById('nav-reg').classList.add('hidden');
            }
        }

        async function refresh() {
            const { data } = await db.from('Students').select('*').eq('sch_id', activeSch);
            students = data || [];
            render();
        }

        function imgProc(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 200; canvas.height = 200;
                    canvas.getContext('2d').drawImage(img, 0, 0, 200, 200);
                    document.getElementById('f-preview').src = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('f-preview').style.display = 'block';
                    document.getElementById('f-img').value = canvas.toDataURL('image/jpeg', 0.6);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }

        async function saveData() {
            const id = document.getElementById('f-id').value;
            const payload = {
                sch_id: activeSch,
                name: document.getElementById('f-name').value.toUpperCase().trim(),
                age: parseInt(document.getElementById('f-age').value) || 0,
                dob: document.getElementById('f-dob').value || null,
                contact: document.getElementById('f-contact').value,
                location: document.getElementById('f-loc').value,
                health_status: document.getElementById('f-health').value || 'NORMAL',
                total_fees: parseInt(document.getElementById('f-fees').value) || 0,
                photo_url: document.getElementById('f-img').value
            };

            if(id) { await db.from('Students').update(payload).eq('id', id); }
            else {
                payload.lin = activeSch + "-" + Math.floor(1000 + Math.random()*8999);
                payload.payment_code = "PAY-" + Math.floor(100000 + Math.random()*899999);
                await db.from('Students').insert([payload]);
            }
            alert("SAVED SUCCESSFULLY"); refresh(); resetForm(); nav('list');
        }

        function render() {
            let debt = 0; students.forEach(s => debt += (s.total_fees - (s.paid_fees || 0)));
            document.getElementById('st-count').innerText = students.length;
            document.getElementById('st-debt').innerText = debt.toLocaleString();

            document.getElementById('master-list').innerHTML = students.map(s => `
                <div class="st-row">
                    <img src="${s.photo_url || ''}" class="st-img">
                    <div style="flex:1"><b>${s.name}</b><br><small>${s.lin}</small></div>
                    ${userRole === 'ADMIN' ? `<i class="fas fa-edit" style="color:var(--primary)" onclick="editMode('${s.id}')"></i>` : ''}
                </div>`).join('');

            document.getElementById('finance-list').innerHTML = students.map(s => `
                <div class="st-row">
                    <div style="flex:1"><b>${s.name}</b><br><small>Bal: ${(s.total_fees - (s.paid_fees || 0)).toLocaleString()}</small></div>
                    <input type="number" placeholder="UGX" style="width:80px; margin:0;" onchange="pay('${s.id}', this.value)">
                </div>`).join('');
        }

        async function pay(id, val) {
            const s = students.find(x => x.id == id);
            await db.from('Students').update({ paid_fees: Number(s.paid_fees || 0) + Number(val) }).eq('id', id);
            refresh();
        }

        function editMode(id) {
            const s = students.find(x => x.id == id);
            document.getElementById('f-id').value = s.id;
            document.getElementById('f-name').value = s.name;
            document.getElementById('f-age').value = s.age;
            document.getElementById('f-dob').value = s.dob;
            document.getElementById('f-contact').value = s.contact;
            document.getElementById('f-loc').value = s.location;
            document.getElementById('f-health').value = s.health_status;
            document.getElementById('f-fees').value = s.total_fees;
            document.getElementById('f-img').value = s.photo_url;
            document.getElementById('f-preview').src = s.photo_url;
            document.getElementById('f-preview').style.display = 'block';
            document.getElementById('form-title').innerText = "EDIT: " + s.name;
            document.getElementById('cancel-btn').classList.remove('hidden');
            nav('reg');
        }

        function resetForm() {
            ['f-id','f-name','f-age','f-dob','f-contact','f-loc','f-health','f-fees','f-img'].forEach(i => document.getElementById(i).value = "");
            document.getElementById('f-preview').style.display = 'none';
            document.getElementById('form-title').innerText = "ENROLLMENT";
            document.getElementById('cancel-btn').classList.add('hidden');
        }

        function nav(v, b) {
            ['v-dash', 'v-reg', 'v-list', 'v-fin'].forEach(x => document.getElementById(x).classList.add('hidden'));
            document.getElementById('v-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(b) b.classList.add('active');
            if(document.getElementById('sidebar').classList.contains('open')) toggleMenu();
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString(); }, 1000);
    </script>
</body>
</html>
