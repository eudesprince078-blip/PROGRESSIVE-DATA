<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SECURE ESMS | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0052cc; --dark: #020617; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #1e293b; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* HEADER */
        .top-bar { height: 65px; background: white; border-bottom: 2px solid var(--primary); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 100; }
        
        /* SIDEBAR & OVERLAY */
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; display: none; backdrop-filter: blur(3px); }
        .sidebar-overlay.active { display: block; }
        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 280px; background: var(--dark); z-index: 1000; transform: translateX(-100%); transition: 0.3s; display: flex; flex-direction: column; }
        .sidebar.open { transform: translateX(0); }
        .nav-item { padding: 18px 25px; color: #94a3b8; cursor: pointer; display: flex; align-items: center; font-weight: 700; border: none; background: none; width: 100%; text-align: left; }
        .nav-item.active { background: var(--primary); color: white; }

        .content { flex: 1; overflow-y: auto; padding: 15px; }
        .card { background: white; border-radius: 18px; padding: 20px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #cbd5e1; margin-bottom: 10px; font-weight: 600; }
        .btn-pro { background: var(--primary); color: white; padding: 16px; border-radius: 14px; border: none; font-weight: 800; width: 100%; cursor: pointer; }
        
        #auth { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        .error-msg { color: #ff4d4d; font-size: 0.75rem; font-weight: 700; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div id="overlay" class="sidebar-overlay" onclick="toggleMenu()"></div>

    <div id="auth">
        <div style="background:white; padding:35px; border-radius:25px; width:90%; max-width:380px; text-align:center;">
            <h1 style="font-weight:900;">ESMS <span style="color:var(--primary)">ELITE</span></h1>
            <p style="font-size:0.7rem; font-weight:800; color:#94a3b8; margin-bottom:20px;">AUTHORIZED PERSONNEL ONLY</p>
            <input type="text" id="sch-input" placeholder="ENTER SCHOOL ID" style="text-align:center; text-transform:uppercase;">
            <button id="login-btn" class="btn-pro" onclick="login()">VERIFY & ENTER</button>
            <p id="login-err" class="error-msg">INVALID ID: ACCESS DENIED</p>
        </div>
    </div>

    <header class="top-bar">
        <div onclick="toggleMenu()" style="cursor:pointer; width:40px;"><i class="fas fa-bars"></i></div>
        <div id="sch-title" style="font-weight:900; font-size:0.8rem; color:var(--primary);">CLIENT PORTAL</div>
        <div id="clock" style="font-size:0.6rem; font-weight:800;"></div>
    </header>

    <div class="wrapper">
        <aside class="sidebar" id="sidebar">
            <div style="padding:30px 25px;"><h2 style="color:white; font-weight:900;">MENU</h2></div>
            <nav>
                <button class="nav-item active" onclick="nav('dash', this)"><i class="fas fa-home"></i>Dashboard</button>
                <button class="nav-item" onclick="nav('reg', this)"><i class="fas fa-user-plus"></i>Registration</button>
                <button class="nav-item" onclick="nav('list', this)"><i class="fas fa-users"></i>Student List</button>
                <button class="nav-item" onclick="nav('fin', this)"><i class="fas fa-wallet"></i>Financials</button>
            </nav>
            <div style="margin-top:auto; padding:25px; text-align:center; color:#94a3b8; font-size:0.75rem; border-top:1px solid #1e293b;">
                <b style="color:white;">EUDES MEDIA</b><br>+256762992440
            </div>
        </aside>

        <main class="content">
            <div id="v-dash">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                    <div class="card" style="text-align:center;"><h2 id="count-s">0</h2><small>STUDENTS</small></div>
                    <div class="card" style="text-align:center;"><h2 id="total-d" style="color:red">0</h2><small>DEBT</small></div>
                </div>
            </div>

            <div id="v-reg" class="hidden">
                <div class="card">
                    <h3 id="form-title" style="margin-bottom:15px;">REGISTRATION</h3>
                    <input type="hidden" id="f-id">
                    <div style="text-align:center;">
                        <img id="f-preview" style="width:70px; height:70px; border-radius:10px; display:none; margin:0 auto 10px; border:2px solid var(--primary);">
                        <input type="file" onchange="procImg(this)" style="font-size:0.7rem;">
                        <input type="hidden" id="f-img">
                    </div>
                    <input type="text" id="f-name" placeholder="Name">
                    <input type="number" id="f-age" placeholder="Age">
                    <input type="date" id="f-dob">
                    <input type="text" id="f-contact" placeholder="Contact">
                    <input type="text" id="f-loc" placeholder="Location">
                    <input type="text" id="f-health" placeholder="Health Status">
                    <input type="number" id="f-fees" placeholder="Total Fees">
                    <button class="btn-pro" onclick="saveData()">SAVE STUDENT</button>
                </div>
            </div>

            <div id="v-list" class="hidden">
                <input type="text" placeholder="Search..." onkeyup="filter(this.value)">
                <div id="master-list"></div>
            </div>

            <div id="v-fin" class="hidden"><div id="finance-list"></div></div>
        </main>
    </div>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        let db, activeSch, students = [];

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        // --- STRICT LOGIN ---
        async function login() {
            const id = document.getElementById('sch-input').value.toUpperCase().trim();
            const btn = document.getElementById('login-btn');
            const err = document.getElementById('login-err');
            
            if(!id) return;
            btn.disabled = true; btn.innerText = "VERIFYING...";
            err.style.display = "none";

            db = supabase.createClient(SB_URL, SB_KEY);
            
            // Check if ID exists in 'Schools' table
            const { data, error } = await db.from('Schools').select('*').eq('sch_id', id).single();

            if (data) {
                activeSch = id;
                document.getElementById('sch-title').innerText = data.school_name;
                document.getElementById('auth').classList.add('hidden');
                refresh();
            } else {
                err.style.display = "block";
                btn.disabled = false; btn.innerText = "VERIFY & ENTER";
            }
        }

        async function refresh() {
            const { data } = await db.from('Students').select('*').eq('sch_id', activeSch);
            students = data || [];
            render();
        }

        function procImg(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 150; canvas.height = 150;
                    canvas.getContext('2d').drawImage(img, 0, 0, 150, 150);
                    const b64 = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('f-preview').src = b64;
                    document.getElementById('f-preview').style.display = 'block';
                    document.getElementById('f-img').value = b64;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }

        async function saveData() {
            const id = document.getElementById('f-id').value;
            const payload = {
                sch_id: activeSch,
                name: document.getElementById('f-name').value.toUpperCase(),
                age: parseInt(document.getElementById('f-age').value) || 0,
                dob: document.getElementById('f-dob').value || null,
                contact: document.getElementById('f-contact').value,
                location: document.getElementById('f-loc').value,
                health_status: document.getElementById('f-health').value || 'NORMAL',
                total_fees: parseInt(document.getElementById('f-fees').value) || 0,
                photo_url: document.getElementById('f-img').value
            };

            if(id) {
                await db.from('Students').update(payload).eq('id', id);
            } else {
                payload.lin = activeSch + "-" + Math.floor(1000 + Math.random()*8999);
                payload.payment_code = "PAY-" + Math.floor(100000 + Math.random()*899999);
                await db.from('Students').insert([payload]);
            }
            alert("SAVED"); refresh(); nav('list');
        }

        function render() {
            let debt = 0; students.forEach(s => debt += (s.total_fees - (s.paid_fees || 0)));
            document.getElementById('count-s').innerText = students.length;
            document.getElementById('total-d').innerText = debt.toLocaleString();

            document.getElementById('master-list').innerHTML = students.map(s => `
                <div class="st-row" style="background:white; padding:10px; border-radius:10px; margin-bottom:5px; display:flex; align-items:center; gap:10px;">
                    <img src="${s.photo_url || ''}" style="width:40px; height:40px; border-radius:5px; object-fit:cover;">
                    <div style="flex:1"><b>${s.name}</b><br><small>${s.lin}</small></div>
                    <i class="fas fa-edit" onclick="editMode('${s.id}')"></i>
                </div>`).join('');
        }

        function editMode(id) {
            const s = students.find(x => x.id == id);
            document.getElementById('f-id').value = s.id;
            document.getElementById('f-name').value = s.name;
            document.getElementById('f-age').value = s.age;
            document.getElementById('f-dob').value = s.dob;
            document.getElementById('f-contact').value = s.contact;
            document.getElementById('f-loc').value = s.location;
            document.getElementById('f-health').value = s.health_status;
            document.getElementById('f-fees').value = s.total_fees;
            document.getElementById('f-img').value = s.photo_url;
            nav('reg');
        }

        function nav(v, b) {
            ['v-dash', 'v-reg', 'v-list', 'v-fin'].forEach(x => document.getElementById(x).classList.add('hidden'));
            document.getElementById('v-'+v).classList.remove('hidden');
            if(document.getElementById('sidebar').classList.contains('open')) toggleMenu();
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString(); }, 1000);
    </script>
</body>
</html>
