<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eudes Media | Progressive Mother's</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #003366; --gold: #ffc107; --white: #ffffff; --green: #2b9348; --red: #d90429; --light: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 0; color: #333; }
        
        #gate { position:fixed; inset:0; background:var(--blue); z-index:5000; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
        .login-box { background:white; padding:35px; border-radius:30px; width:90%; max-width:380px; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,0.5); }
        
        .header { background: var(--blue); color: white; padding: 15px 20px; position: sticky; top: 0; z-index: 2000; border-bottom: 4px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .hero { background: #001a33; padding: 25px; text-align: center; color: white; border-bottom: 4px solid var(--blue); }
        #clock { font-size: 38px; font-weight: 800; color: var(--gold); }

        .nav-tabs { display: flex; background: var(--blue); position: sticky; top: 74px; z-index: 1999; }
        .tab { flex: 1; text-align: center; padding: 18px 5px; font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.5); cursor: pointer; text-transform: uppercase; }
        .tab.active { color: var(--gold); border-bottom: 5px solid var(--gold); background: rgba(0,0,0,0.2); }

        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 20px; margin-top: -45px; }
        .stat-card { background: white; padding: 20px 10px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 6px solid var(--blue); }
        .stat-val { font-size: 24px; font-weight: 900; color: var(--blue); display: block; }

        .container { padding: 15px; max-width: 800px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); border-left: 10px solid var(--blue); }
        .card-title { color: var(--blue); font-weight: 900; margin-bottom: 20px; font-size: 16px; border-bottom: 2px solid #eee; padding-bottom: 10px; }

        input, select { width: 100%; padding: 15px; border: 2px solid #edf2f7; border-radius: 15px; margin-bottom: 15px; font-size: 15px; font-weight: 600; box-sizing: border-box; }
        .btn-main { width: 100%; background: var(--blue); color: white; padding: 20px; border: none; border-radius: 18px; font-weight: 900; cursor: pointer; font-size: 18px; text-transform: uppercase; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="gate">
    <div class="login-box">
        <h1 style="color:var(--blue); margin:0; font-size:26px;">EUDES MEDIA</h1>
        <p style="font-size:10px; font-weight:900; color:#888; margin-bottom:30px;">SCHOOL CONTROL CENTER</p>
        <input id="login_id" type="text" value="PM001" style="text-align:center;">
        <input id="login_key" type="password" placeholder="ACCESS KEY" style="text-align:center;">
        <button onclick="startApp()" class="btn-main">LOGIN</button>
    </div>
</div>

<div id="app" class="hidden">
    <div class="header">
        <div><b id="display_name">...</b><br><span id="db_status" style="font-size:10px; color:var(--gold);">● OFFLINE</span></div>
        <button onclick="forceSync()" style="background:var(--green); color:white; border:none; padding:10px 15px; border-radius:10px; font-weight:900;">SYNC</button>
    </div>

    <div class="hero">
        <div id="clock">00:00:00</div>
        <div style="font-size:11px; font-weight:900; margin-top:8px; color:var(--gold);">SYSTEM ONLINE</div>
    </div>

    <div class="dashboard">
        <div class="stat-card"><span class="stat-val" id="stat_total">0</span><small>PUPILS</small></div>
        <div class="stat-card"><span class="stat-val" id="stat_present" style="color:var(--green)">0</span><small>PRESENT</small></div>
        <div class="stat-card"><span class="stat-val" id="stat_absent" style="color:var(--red)">0</span><small>ABSENT</small></div>
    </div>

    <div class="nav-tabs">
        <div class="tab active" id="tab-sum" onclick="show('sum')">Director</div>
        <div class="tab" id="tab-rec" onclick="show('rec')">Records</div>
        <div class="tab" id="tab-adm" onclick="show('adm')">Admission</div>
        <div class="tab" id="tab-roll" onclick="show('roll')">Roll-Call</div>
    </div>

    <div class="container">
        <div id="v-sum">
            <div class="card">
                <div class="card-title">FINANCIALS</div>
                <p>Expected: <b id="fin_exp">UGX 0</b></p>
                <p>Collected: <b id="fin_paid" style="color:var(--green);">UGX 0</b></p>
                <p>Balance: <b id="fin_bal" style="color:var(--red);">UGX 0</b></p>
            </div>
        </div>

        <div id="v-rec" class="hidden">
            <input id="search_in" placeholder="Search by name..." oninput="draw()">
            <div id="list_view"></div>
        </div>

        <div id="v-adm" class="hidden">
            <div class="card">
                <div class="card-title">REGISTRATION</div>
                <input id="reg_name" placeholder="Full Name">
                <input id="reg_class" placeholder="Class (P.7)">
                <input id="reg_loc" placeholder="Location">
                <input id="reg_exp" type="number" placeholder="Fees Expected">
                <button onclick="commit()" class="btn-main">SAVE STUDENT</button>
            </div>
        </div>

        <div id="v-roll" class="hidden">
            <div class="card">
                <div class="card-title">ATTENDANCE</div>
                <div id="roll_view"></div>
            </div>
        </div>
    </div>

    <div style="text-align:center; padding:30px; font-size:10px; font-weight:900; color:#aaa;">
        EUDES MEDIA | +256762992440
    </div>
</div>

<script>
    const S_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
    const _db = supabase.createClient(S_URL, S_KEY);

    let _data = [];
    let _sch = "PM001";

    function startApp() {
        document.getElementById('display_name').innerText = "PROGRESSIVE MOTHER'S SCHOOL";
        document.getElementById('gate').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
        forceSync();
    }

    async function forceSync() {
        document.getElementById('db_status').innerText = "● SYNCING...";
        // FIX: Using capital 'Students' to match your database exactly
        let { data, error } = await _db.from('Students').select('*').eq('sch_id', _sch);

        if(error) {
            document.getElementById('db_status').innerText = "● ERROR";
            alert("Error: " + error.message);
        } else {
            _data = data || [];
            document.getElementById('db_status').innerText = "● LIVE";
            updateUI();
        }
    }

    function updateUI() {
        let exp = 0, paid = 0, absentCount = 0;
        _data.forEach(s => {
            exp += (s.fees_expected || 0);
            paid += (s.fees_paid || 0);
            if(s.is_absent) absentCount++;
        });

        document.getElementById('stat_total').innerText = _data.length;
        document.getElementById('stat_present').innerText = _data.length - absentCount;
        document.getElementById('stat_absent').innerText = absentCount;
        document.getElementById('fin_exp').innerText = "UGX " + exp.toLocaleString();
        document.getElementById('fin_paid').innerText = "UGX " + paid.toLocaleString();
        document.getElementById('fin_bal').innerText = "UGX " + (exp - paid).toLocaleString();
        draw();
    }

    function draw() {
        const q = document.getElementById('search_in').value.toLowerCase();
        const filtered = _data.filter(s => s.name.toLowerCase().includes(q));

        document.getElementById('list_view').innerHTML = filtered.map(s => `
            <div class="card"><b>${s.name}</b><br><small>${s.class} | LIN: ${s.lin || 'N/A'}</small></div>
        `).join('');

        document.getElementById('roll_view').innerHTML = _data.map(s => `
            <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;">
                <span>${s.name}</span>
                <button onclick="toggleAttend('${s.id}', ${!s.is_absent})" style="background:${s.is_absent?'red':'green'}; color:white; border:none; border-radius:5px; padding:5px 10px;">
                    ${s.is_absent?'ABSENT':'PRESENT'}
                </button>
            </div>
        `).join('');
    }

    async function toggleAttend(id, status) {
        await _db.from('Students').update({ is_absent: status }).eq('id', id);
        forceSync();
    }

    async function commit() {
        const student = {
            sch_id: _sch,
            name: document.getElementById('reg_name').value.toUpperCase(),
            class: document.getElementById('reg_class').value,
            location: document.getElementById('reg_loc').value,
            fees_expected: parseInt(document.getElementById('reg_exp').value) || 0,
            lin: "PMA-" + Math.floor(1000 + Math.random() * 9000)
        };
        const { error } = await _db.from('Students').insert([student]);
        if(!error) { alert("Saved!"); forceSync(); show('rec'); }
    }

    function show(id) {
        ['sum','rec','adm','roll'].forEach(x => {
            document.getElementById('v-'+x).classList.add('hidden');
            document.getElementById('tab-'+x).classList.remove('active');
        });
        document.getElementById('v-'+id).classList.remove('hidden');
        document.getElementById('tab-'+id).classList.add('active');
    }
</script>
</body>
</html>
