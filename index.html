<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUDES MEDIA | SCHOOL ENGINE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0047AB; --success: #10b981; --danger: #e11d48; --bg: #f1f5f9; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; }
        body { margin: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 280px; background: #0f172a; display: flex; flex-direction: column; padding: 25px; color: white; }
        .nav-item { padding: 14px 18px; border-radius: 12px; color: #94a3b8; font-weight: 700; font-size: 0.7rem; cursor: pointer; margin-bottom: 8px; }
        .nav-item.active { background: var(--primary); color: white; }
        
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 15px 40px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .page { display: none; padding: 30px; height: 100%; overflow-y: auto; }
        .page.active { display: block; }

        /* PHOTO UPLOAD STYLING */
        .photo-picker {
            border: 2px dashed #cbd5e1;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            background: #f8fafc;
            transition: 0.3s;
        }
        .photo-picker:hover { border-color: var(--primary); background: #eff6ff; }
        #imgPreview { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; display: none; margin: 10px auto; border: 2px solid var(--primary); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: white; padding: 30px; border-radius: 20px; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.6rem; font-weight: 800; color: #64748b; }
        input, select { padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; font-weight: 700; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; }
        th { background: #f8fafc; padding: 15px; text-align: left; font-size: 0.6rem; color: #64748b; }
        td { padding: 12px 15px; font-size: 0.65rem; border-bottom: 1px solid #f1f5f9; font-weight: 700; }
        .st-img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }
        
        .btn-main { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; }
        #login-screen { position:fixed; inset:0; background:#0f172a; z-index:9999; display:flex; align-items:center; justify-content:center; }
    </style>
</head>
<body onload="startTime()">

    <div id="login-screen">
        <div style="background:white; padding:50px; border-radius:40px; width:400px; text-align:center;">
            <h2 style="color:var(--primary); margin:0;">EUDES MEDIA</h2>
            <p style="font-size:0.6rem; color:#64748b; margin-bottom:30px;">SCHOOL ACCESS PORTAL</p>
            <input type="text" id="schId" placeholder="SCHOOL ID" style="width:100%; margin-bottom:10px; padding:12px; border-radius:10px; border:1px solid #ddd;">
            <input type="password" id="schKey" placeholder="ACCESS KEY" style="width:100%; margin-bottom:20px; padding:12px; border-radius:10px; border:1px solid #ddd;">
            <button onclick="authenticate()" class="btn-main" style="width:100%;">LOGIN SYSTEM</button>
        </div>
    </div>

    <div class="sidebar">
        <h2 style="font-size: 0.9rem; margin-bottom: 40px;">EUDES MEDIA</h2>
        <div class="nav-item active" onclick="showPage('dash-page', this)">📊 DASHBOARD</div>
        <div class="nav-item" onclick="showPage('reg-page', this)">📝 ADMISSION</div>
        <div class="nav-item" onclick="fetchStudents(); showPage('list-page', this)">👥 REGISTRY</div>
    </div>

    <div class="main">
        <div class="header">
            <div style="display:flex; align-items:center; gap:15px;">
                <img id="dispLogo" src="" style="height:40px; border-radius:8px;">
                <h3 id="dispName" style="margin:0; font-size: 0.8rem; color: var(--primary);"></h3>
            </div>
            <div style="text-align:right;">
                <h5 id="txtClock" style="margin:0;">00:00:00</h5>
                <p id="txtDate" style="margin:0; font-size: 0.5rem; color:#94a3b8;"></p>
            </div>
        </div>

        <div id="dash-page" class="page active">
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px;">
                <div style="background:white; padding:25px; border-radius:20px; border-left: 5px solid var(--primary);">
                    <label>TOTAL STUDENTS</label><p id="statTotal" style="font-size:1.5rem; margin:5px 0;">0</p>
                </div>
                <div style="background:white; padding:25px; border-radius:20px; border-left: 5px solid var(--success);">
                    <label>TOTAL PAID</label><p id="statPaid" style="font-size:1.5rem; margin:5px 0;">0</p>
                </div>
                <div style="background:white; padding:25px; border-radius:20px; border-left: 5px solid var(--danger);">
                    <label>TOTAL ARREARS (DEBT)</label><p id="statDebt" style="font-size:1.5rem; margin:5px 0;">0</p>
                </div>
            </div>
        </div>

        <div id="reg-page" class="page">
            <div class="form-grid">
                <div class="field" style="grid-column: span 2;">
                    <label>STUDENT PHOTO</label>
                    <div class="photo-picker" onclick="document.getElementById('fileInput').click()">
                        <img id="imgPreview" src="">
                        <p id="photoLabel" style="font-size:0.6rem; color:#64748b;">CLICK TO SELECT STUDENT PHOTO</p>
                        <input type="file" id="fileInput" hidden accept="image/*" onchange="handleImage(this)">
                    </div>
                </div>
                <div class="field"><label>LIN NUMBER</label><input type="text" id="rLin"></div>
                <div class="field"><label>FULL NAME</label><input type="text" id="rName"></div>
                <div class="field"><label>CLASS</label>
                    <select id="rClass">
                        <option>Baby Class</option><option>Middle Class</option><option>Top Class</option>
                        <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                        <option>P.5</option><option>P.6</option><option>P.7</option>
                    </select>
                </div>
                <div class="field"><label>DATE OF BIRTH</label><input type="date" id="rDob" onchange="calcAge(this.value)"></div>
                <div class="field"><label>AGE</label><input type="text" id="rAge" readonly></div>
                <div class="field"><label>TOTAL TUITION</label><input type="number" id="rFees"></div>
                <button class="btn-main" onclick="submitAdmission()" style="grid-column: span 2;">SAVE STUDENT</button>
            </div>
        </div>

        <div id="list-page" class="page">
            <table>
                <thead>
                    <tr><th>PHOTO</th><th>LIN</th><th>NAME</th><th>CLASS</th><th>PAID</th><th>ARREARS</th></tr>
                </thead>
                <tbody id="stTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        const _URL = 'https://kjftrwuucjdnhfwesrup.supabase.co'; 
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const client = supabase.createClient(_URL, _KEY);
        let currentPhotoBase64 = "";

        function startTime() {
            const now = new Date();
            document.getElementById('txtClock').innerText = now.toLocaleTimeString();
            document.getElementById('txtDate').innerText = now.toDateString();
            setTimeout(startTime, 1000);
        }

        function handleImage(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onloadend = function() {
                currentPhotoBase64 = reader.result;
                document.getElementById('imgPreview').src = reader.result;
                document.getElementById('imgPreview').style.display = 'block';
                document.getElementById('photoLabel').style.display = 'none';
            }
            if (file) reader.readAsDataURL(file);
        }

        function calcAge(dob) {
            const yr = new Date(dob).getFullYear();
            const cur = new Date().getFullYear();
            document.getElementById('rAge').value = (cur - yr) + " YEARS";
        }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        async function authenticate() {
            const id = document.getElementById('schId').value.trim();
            const key = document.getElementById('schKey').value.trim();
            const { data: school } = await client.from('Schools').select('*').eq('sch_id', id).single();
            if (school && (key === school.admin_key || key === school.teacher_key)) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dispName').innerText = school.school_name;
                document.getElementById('dispLogo').src = school.logo_url;
                fetchStudents();
            } else { alert("WRONG ACCESS DETAILS"); }
        }

        async function submitAdmission() {
            const student = {
                lin: document.getElementById('rLin').value,
                name: document.getElementById('rName').value,
                class: document.getElementById('rClass').value,
                dob: document.getElementById('rDob').value,
                age: document.getElementById('rAge').value,
                photo_url: currentPhotoBase64, // The actual image data
                total_fees: parseFloat(document.getElementById('rFees').value) || 0,
                amount_paid: 0,
                is_absent: false,
                payment_history: []
            };
            const { error } = await client.from('Students').insert([student]);
            if (!error) { 
                alert("STUDENT SAVED SUCCESSFULLY"); 
                location.reload(); 
            } else {
                alert("ERROR: Check if your Supabase columns match exactly.");
            }
        }

        async function fetchStudents() {
            const { data, error } = await client.from('Students').select('*').order('name', { ascending: true });
            if (error) return;

            const tbody = document.getElementById('stTable');
            tbody.innerHTML = '';
            let tPaid = 0, tDebt = 0;

            data.forEach(st => {
                const debt = (st.total_fees || 0) - (st.amount_paid || 0);
                tPaid += (st.amount_paid || 0);
                tDebt += debt;

                tbody.innerHTML += `<tr>
                    <td><img src="${st.photo_url || 'https://via.placeholder.com/50'}" class="st-img"></td>
                    <td>${st.lin}</td>
                    <td>${st.name}</td>
                    <td>${st.class}</td>
                    <td style="color:var(--success)">${(st.amount_paid || 0).toLocaleString()}</td>
                    <td style="color:var(--danger)">${debt.toLocaleString()}</td>
                </tr>`;
            });

            document.getElementById('statTotal').innerText = data.length;
            document.getElementById('statPaid').innerText = "UGX " + tPaid.toLocaleString();
            document.getElementById('statDebt').innerText = "UGX " + tDebt.toLocaleString();
        }
    </script>
</body>
</html>
