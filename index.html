<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROGRESSIVE PMS - PRO V15</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #0056b3; --white: #ffffff; --green: #25d366; --red: #dc3545; --dark: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; margin: 0; padding: 10px; }
        .box { background: var(--white); padding: 18px; border-radius: 12px; max-width: 1000px; margin: 10px auto; border: 1.5px solid var(--blue); }
        .header { background: linear-gradient(135deg, var(--blue), #002244); color: white; padding: 15px; border-radius: 12px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin: 15px 0; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        .btn { background: var(--blue); color: white; padding: 14px; border: none; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-wa { background: var(--green); margin-top: 10px; }
        .footer { text-align: center; margin-top: 20px; font-size: 11px; font-weight: bold; color: #777; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loginGate" class="box" style="max-width:320px; margin-top:100px; text-align:center;">
    <h3 style="color:var(--blue)">PROGRESSIVE LOGIN</h3>
    <input id="u" placeholder="USERNAME" style="margin-bottom:10px;">
    <input id="p" type="password" placeholder="PASSWORD">
    <button onclick="login()" class="btn" style="margin-top:15px;">LOGIN</button>
</div>

<div id="mainApp" class="hidden">
    <div class="header">
        <h2 style="margin:0;">PROGRESSIVE SCHOOL DATA</h2>
        <p style="margin:0; font-size:10px;">Eudes Media Smart System</p>
    </div>

    <div class="box">
        <h4 id="fTitle" style="margin-top:0; color:var(--blue);">Student Registration</h4>
        <input type="hidden" id="editId">
        <div class="grid">
            <div><label>Full Name</label><input id="name"></div>
            <div><label>Parent Phone</label><input id="ph" placeholder="2567..."></div>
            <div><label>Age</label><input id="age" type="number"></div>
            <div><label>Class</label>
                <select id="cl">
                    <option value="Baby">Baby</option><option value="Middle">Middle</option><option value="Top">Top</option>
                    <option value="P.1">P.1</option><option value="P.2">P.2</option><option value="P.3">P.3</option>
                    <option value="P.4">P.4</option><option value="P.5">P.5</option><option value="P.6">P.6</option><option value="P.7">P.7</option>
                </select>
            </div>
            <div><label>Amount Paid (UGX)</label><input id="fPaid" type="number" value="0"></div>
            <div><label>Balance (UGX)</label><input id="fBal" type="number" value="0"></div>
        </div>
        <button onclick="processRecord()" id="sBtn" class="btn">CONFIRM & SAVE RECORD</button>
    </div>

    <div class="box">
        <input type="text" id="sBar" onkeyup="search()" placeholder="🔍 Search Students..." style="margin-bottom:10px; height:40px;">
        <div id="statusList" style="font-size:12px;"></div>
    </div>

    <div class="footer">Eudes Media | +256762992440</div>
</div>

<script>
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co".trim();
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO".trim();
    let sb = null;
    let students = [];
    let messagedNumbers = new Set(); // To avoid double sending

    function login() {
        const u = document.getElementById('u').value.trim().toUpperCase();
        const p = document.getElementById('p').value.trim().toUpperCase();
        if(u === "PROGRESSIVE" && p === "JESUS CARES") {
            sb = supabase.createClient(SB_URL, SB_KEY);
            document.getElementById('loginGate').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            refresh();
        } else { alert("Access Denied"); }
    }

    async function refresh() {
        const { data } = await sb.from('students').select('*').order('name', { ascending: true });
        students = data || [];
        render();
    }

    function render() {
        let html = "";
        students.forEach(s => {
            html += `<div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
                <div><b>${s.name.toUpperCase()}</b><br><small>Bal: UGX ${Number(s.fees_balance).toLocaleString()}</small></div>
                <button onclick="editStep('${s.id}')" style="background:var(--blue); color:white; border:none; padding:5px 10px; border-radius:4px;">EDIT</button>
            </div>`;
        });
        document.getElementById('statusList').innerHTML = html;
    }

    async function processRecord() {
        const name = document.getElementById('name').value.trim();
        const age = document.getElementById('age').value;
        const ph = document.getElementById('ph').value.trim();
        const id = document.getElementById('editId').value;
        
        // 1. DUPLICATE CHECK (Only for new registrations)
        if(!id) {
            const isDuplicate = students.some(s => 
                s.name.toLowerCase() === name.toLowerCase() && 
                s.age == age && 
                s.contact === ph
            );
            if(isDuplicate) return alert("❌ ERROR: This student is already registered with the same age and contact!");
        }

        const pupil = {
            name: name, contact: ph, age: age,
            class: document.getElementById('cl').value,
            fees_paid: document.getElementById('fPaid').value || 0,
            fees_balance: document.getElementById('fBal').value || 0,
            lin: id ? undefined : "PM-" + Math.floor(1000 + Math.random() * 9000)
        };

        try {
            if(!id) {
                await sb.from('students').insert([pupil]);
                alert("New Student Registered!");
            } else {
                await sb.from('students').update(pupil).eq('id', id);
                // 2. AUTO WHATSAPP TRIGGER ON FEE ADJUSTMENT
                autoNotify(pupil);
            }
            refresh();
            reset();
        } catch(e) { alert("Error saving."); }
    }

    function autoNotify(s) {
        if(messagedNumbers.has(s.contact)) {
            console.log("Already messaged this number in this session.");
            return;
        }

        const msg = `OFFICIAL RECEIPT - PROGRESSIVE SCHOOL\n\nStudent: ${s.name}\nClass: ${s.class}\nAmount Paid: UGX ${Number(s.fees_paid).toLocaleString()}\nRemaining Balance: UGX ${Number(s.fees_balance).toLocaleString()}\n\nThank you for your payment.\nContact: +256762992440`;
        
        if(confirm(`Send automatic WhatsApp receipt to ${s.name}'s parent?`)) {
            window.open(`https://api.whatsapp.com/send?phone=${s.contact}&text=${encodeURIComponent(msg)}`, '_blank');
            messagedNumbers.add(s.contact); // Mark as sent
        }
    }

    function editStep(id) {
        const s = students.find(x => x.id == id);
        document.getElementById('editId').value = s.id;
        document.getElementById('name').value = s.name;
        document.getElementById('ph').value = s.contact;
        document.getElementById('age').value = s.age;
        document.getElementById('fPaid').value = s.fees_paid;
        document.getElementById('fBal').value = s.fees_balance;
        document.getElementById('fTitle').innerText = "UPDATING: " + s.name;
        window.scrollTo(0,0);
    }

    function reset() {
        document.getElementById('editId').value = "";
        document.getElementById('fTitle').innerText = "Student Registration";
        document.getElementById('name').value = "";
    }
</script>
</body>
</html>
