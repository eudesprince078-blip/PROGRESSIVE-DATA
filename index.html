<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PMS Online System | Eudes Media</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    :root { --blue: #0056b3; --white: #ffffff; }
    body { font-family: sans-serif; margin: 0; background: #f0f4f8; }
    header { background: var(--blue); color: white; padding: 20px; text-align: center; }
    .container { padding: 15px; max-width: 900px; margin: auto; background: white; min-height: 100vh; }
    input, select, button { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    button { background: var(--blue); color: white; font-weight: bold; border: none; cursor: pointer; }
    .pass-container { position: relative; }
    .toggle-pass { position: absolute; right: 10px; top: 15px; cursor: pointer; color: #666; }
    .hidden { display: none; }
    .footer { text-align: center; font-size: 12px; padding: 20px; font-weight: bold; border-top: 2px solid var(--blue); margin-top: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #eee; }
</style>
</head>
<body>

<div id="loginBox">
    <header><h2>PROGRESSIVE MOTHER’S SCHOOL</h2></header>
    <div class="container" style="max-width: 350px; min-height: auto; margin-top: 50px; border-radius: 10px; border: 1px solid #ddd;">
        <input id="username" placeholder="USERNAME (ALL CAPS)">
        <div class="pass-container">
            <input id="password" type="password" placeholder="PASSWORD (ALL CAPS)">
            <span class="toggle-pass" onclick="togglePass()">👁️</span>
        </div>
        <button onclick="login()">LOGIN SYSTEM</button>
        <p id="msg" style="color:red; text-align:center; font-size:12px; font-weight:bold;"></p>
        <div class="footer">Eudes Media | +256762992440</div>
    </div>
</div>

<div id="systemBox" class="hidden">
    <header><h2>STUDENT MANAGEMENT DASHBOARD</h2></header>
    <div class="container">
        <h3>New Registration</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <input id="studentName" placeholder="Student Full Name">
            <input id="age" type="number" placeholder="Age">
            <input type="date" id="dob">
            <input id="contact" placeholder="Contact Number">
            <input id="address" placeholder="Physical Location">
            <select id="cl">
                <option value="P.1">P.1 (Cost: 200,000)</option>
                <option value="P.2">P.2 (Cost: 200,000)</option>
                <option value="P.3">P.3 (Cost: 250,000)</option>
                <option value="P.4">P.4 (Cost: 250,000)</option>
                <option value="P.5">P.5 (Cost: 300,000)</option>
                <option value="P.6">P.6 (Cost: 300,000)</option>
                <option value="P.7">P.7 (Cost: 400,000)</option>
            </select>
            <select id="hStatus"><option value="Good">Health: Good</option><option value="Special">Special Attention</option></select>
            <select id="sStatus"><option value="Active">Status: Active</option><option value="Left">Status: Left</option></select>
        </div>
        
        <button onclick="saveStudent()" id="saveBtn" style="margin-top:10px;">CONFIRM & UPLOAD TO CLOUD</button>
        <button onclick="downloadData()" style="background:#28a745; margin-top:10px;">📥 DOWNLOAD STUDENT LIST (CSV)</button>

        <hr>
        <h3>Student Registry</h3>
        <div id="list"></div>
        <div class="footer">Developed by Eudes Media | +256762992440</div>
    </div>
</div>

<script>
const URL = "https://cpfttwvonuptqdpskobx.supabase.co";
const KEY = "sb_secret_er0jEX9JyM89pIB7lp9zww_zP5UbQaj"; 
const client = supabase.createClient(URL, KEY);
let studentData = [];

function togglePass() {
    const p = document.getElementById('password');
    p.type = p.type === "password" ? "text" : "password";
}

function login() {
    // NEW CREDENTIALS [cite: 2026-03-05]
    if(username.value === "PROGRESSIVE" && password.value === "JESUS CARES") {
        loginBox.classList.add("hidden");
        systemBox.classList.remove("hidden");
        fetchData();
    } else { msg.textContent = "WRONG USERNAME OR PASSWORD"; }
}

async function saveStudent() {
    const name = document.getElementById('studentName').value;
    if(!name) return alert("Enter Name");
    
    // SMART LIN GENERATION: PM + First Letter + 4 Random Numbers (e.g., PMK2963)
    const randomNum = Math.floor(1000 + Math.random() * 9000);
    const newLin = "PM" + name.charAt(0).toUpperCase() + randomNum;

    const payload = {
        name: name,
        age: document.getElementById('age').value,
        dob: document.getElementById('dob').value,
        contact: document.getElementById('contact').value,
        location: document.getElementById('address').value,
        class: document.getElementById('cl').value,
        health_status: document.getElementById('hStatus').value,
        status: document.getElementById('sStatus').value,
        lin: newLin,
        is_active: document.getElementById('sStatus').value === 'Active'
    };

    const { error } = await client.from('students').insert([payload]);
    if(error) alert("Error: " + error.message);
    else { alert("✅ Registered with LIN: " + newLin); location.reload(); }
}

async function fetchData() {
    const { data, error } = await client.from('students').select('*').order('name');
    if(!error) { studentData = data; render(); }
}

function render() {
    const box = document.getElementById('list');
    let html = "<table><tr><th>LIN</th><th>NAME</th><th>CLASS</th><th>STATUS</th></tr>";
    studentData.forEach(s => {
        html += `<tr><td>${s.lin}</td><td>${s.name}</td><td>${s.class}</td><td>${s.status}</td></tr>`;
    });
    box.innerHTML = html + "</table>";
}

function downloadData() {
    let csv = "LIN,Name,Class,Age,Contact,Status\n";
    studentData.forEach(s => {
        csv += `${s.lin},${s.name},${s.class},${s.age},${s.contact},${s.status}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.setAttribute('href', url);
    a.setAttribute('download', 'PMS_Student_List.csv');
    a.click();
}
</script>
</body>
</html>
