<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS ELITE | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --main: #0047AB; --bg: #f8fafc; --dark: #0f172a; --accent: #F5B81B; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; }
        body { background: var(--bg); color: var(--dark); height: 100vh; overflow: hidden; display: flex; }

        /* LOGIN SCREEN */
        #auth-overlay { position: fixed; inset: 0; background: linear-gradient(135deg, #020617 0%, #0047AB 100%); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; padding: 45px; border-radius: 40px; width: 100%; max-width: 420px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border-bottom: 8px solid var(--accent); }

        /* SIDEBAR NAVIGATION */
        .sidebar { width: 85px; background: var(--dark); display: flex; flex-direction: column; align-items: center; padding: 30px 0; transition: 0.3s; flex-shrink: 0; }
        @media (min-width: 992px) { .sidebar { width: 280px; align-items: flex-start; padding: 35px; } }

        .nav-link { width: 100%; display: flex; align-items: center; padding: 18px; color: #94a3b8; cursor: pointer; border-radius: 20px; margin-bottom: 12px; border: none; background: none; transition: 0.3s; }
        .nav-link i { font-size: 1.4rem; min-width: 45px; text-align: center; }
        .nav-link span { display: none; font-weight: 800; font-size: 0.85rem; margin-left: 12px; letter-spacing: 1px; }
        @media (min-width: 992px) { .nav-link span { display: block; } }
        .nav-link.active { background: var(--main); color: white; box-shadow: 0 15px 25px -5px rgba(0, 71, 171, 0.4); }

        /* CONTENT AREA */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 90px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        .content { padding: 40px; overflow-y: auto; flex: 1; }

        /* CARDS & PANELS */
        .panel { background: white; padding: 40px; border-radius: 35px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.02); border: 1px solid #e2e8f0; max-width: 900px; margin: auto; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 25px; margin-bottom: 40px; }
        .s-card { background: white; padding: 30px; border-radius: 30px; display: flex; align-items: center; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .s-icon { width: 65px; height: 65px; border-radius: 20px; background: #eff6ff; color: var(--main); display: flex; align-items: center; justify-content: center; font-size: 1.6rem; margin-right: 20px; }

        /* FORMS */
        .f-row { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 25px; }
        @media (max-width: 700px) { .f-row { grid-template-columns: 1fr; } }
        label { display: block; font-size: 0.7rem; font-weight: 800; color: #64748b; margin-bottom: 10px; padding-left: 5px; }
        input, select { width: 100%; padding: 18px; border-radius: 18px; border: 2px solid #f1f5f9; background: #f8fafc; font-weight: 700; outline: none; transition: 0.3s; font-size: 0.9rem; }
        input:focus { border-color: var(--main); background: white; box-shadow: 0 0 0 4px rgba(0, 71, 171, 0.05); }

        /* PHOTO COMPRESSOR AREA */
        .photo-circ { width: 140px; height: 140px; border-radius: 40px; border: 4px dashed #cbd5e1; margin: 0 auto 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; transition: 0.3s; }
        .photo-circ:hover { border-color: var(--main); background: #f0f7ff; }
        #preview-img { width: 100%; height: 100%; object-fit: cover; display: none; }

        .btn-blue { background: var(--main); color: white; padding: 20px; border-radius: 20px; border: none; font-weight: 800; cursor: pointer; width: 100%; font-size: 1rem; transition: 0.3s; box-shadow: 0 10px 15px -3px rgba(0, 71, 171, 0.2); }
        .btn-blue:hover { transform: translateY(-3px); box-shadow: 0 20px 25px -5px rgba(0, 71, 171, 0.3); }

        .hidden { display: none !important; }
        .tag { padding: 8px 16px; border-radius: 14px; font-size: 0.7rem; font-weight: 900; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="login-card">
            <div style="background: var(--main); width: 70px; height: 70px; border-radius: 22px; margin: 0 auto 25px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0, 71, 171, 0.3);">
                <i class="fas fa-fingerprint" style="color:white; font-size:2rem;"></i>
            </div>
            <h1 style="letter-spacing: -1.5px; font-weight: 900; font-size: 1.8rem; color: var(--dark);">ESMS ELITE</h1>
            <p style="font-size: 0.65rem; color: #64748b; font-weight: 800; margin-bottom: 35px; letter-spacing: 1px;">EUDES MEDIA | COMPLETE DIGITAL PARTNER</p>
            
            <input type="text" id="log-id" placeholder="SCHOOL ID" style="margin-bottom: 15px; text-align: center; border-radius: 20px;">
            <input type="password" id="log-pin" placeholder="SECURITY PIN" style="margin-bottom: 30px; text-align: center; border-radius: 20px;">
            
            <button onclick="attemptLogin()" class="btn-blue">UNLOCK SYSTEM</button>
            <p id="error-box" style="color: #ef4444; font-size: 0.7rem; margin-top: 20px; font-weight: 900;"></p>
        </div>
    </div>

    <div class="sidebar hidden" id="aside">
        <div style="padding:0 30px 50px; font-weight:900; color:white; font-size:1.6rem; letter-spacing:-1px;">EUDES<span style="color:var(--accent);">.</span></div>
        <button class="nav-link active" onclick="nav('dash', this)"><i class="fas fa-chart-pie"></i><span>DASHBOARD</span></button>
        <button class="nav-link" onclick="nav('reg', this)"><i class="fas fa-id-card"></i><span>ADMISSIONS</span></button>
        <button class="nav-link" onclick="nav('fees', this)"><i class="fas fa-coins"></i><span>FINANCES</span></button>
        <div style="margin-top:auto; padding:30px; font-size:0.6rem; color:#64748b; font-weight:800; line-height:1.6;">
            OFFICIAL SUPPORT:<br>+256 762 992440
        </div>
    </div>

    <div class="main hidden" id="main-view">
        <header class="header">
            <h2 id="sch-title" style="font-weight: 800; font-size: 1rem; color: var(--dark);">...</h2>
            <div id="role-tag" class="tag" style="background:#fef3c7; color:#92400e;">...</div>
        </header>

        <div class="content">
            <div id="view-dash">
                <div class="stat-grid">
                    <div class="s-card">
                        <div class="s-icon"><i class="fas fa-user-graduate"></i></div>
                        <div><p style="font-size:0.65rem; color:#64748b; font-weight:800;">TOTAL LEARNERS</p><h2 id="count-st">0</h2></div>
                    </div>
                    <div class="s-card">
                        <div class="s-icon" style="background:#f0fdf4; color:#16a34a;"><i class="fas fa-wallet"></i></div>
                        <div><p style="font-size:0.65rem; color:#64748b; font-weight:800;">FEES COLLECTED</p><h2 id="count-cash">0</h2></div>
                    </div>
                </div>
                <div class="panel" style="border-left: 12px solid var(--accent); display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <h3 style="font-weight:900; font-size:0.9rem;">SYSTEM LICENSE: <span style="color:#16a34a;">ACTIVE</span></h3>
                        <p style="color:#64748b; font-size:0.7rem; margin-top:5px; font-weight:700;">VALID UNTIL: <span id="exp-val" style="color:var(--main);">...</span></p>
                    </div>
                    <i class="fas fa-check-circle" style="color:#16a34a; font-size:2rem;"></i>
                </div>
            </div>

            <div id="view-reg" class="hidden">
                <div class="panel">
                    <h2 style="margin-bottom:35px; letter-spacing:-1px; font-weight:900;">LEARNER ADMISSION</h2>
                    
                    <div class="photo-circ" onclick="document.getElementById('file-trigger').click()">
                        <i id="cam-ico" class="fas fa-camera-retro" style="font-size: 2.2rem; color: #cbd5e1;"></i>
                        <img id="preview-img">
                        <input type="file" id="file-trigger" class="hidden" accept="image/*" onchange="handlePhoto(event)">
                    </div>

                    <div class="f-row">
                        <div class="f-group"><label>FULL NAME</label><input type="text" id="r-name" placeholder="E.G. JOHN DOE"></div>
                        <div class="f-group"><label>CLASS / LEVEL</label>
                            <select id="r-class"><option>BABY CLASS</option><option>P.1</option><option>P.7</option><option>S.1</option><option>S.4</option></select>
                        </div>
                    </div>
                    <div class="f-row">
                        <div class="f-group"><label>PARENT CONTACT</label><input type="text" id="r-tel" value="+256"></div>
                        <div class="f-group"><label>RESIDENCE / LOCATION</label><input type="text" id="r-loc" placeholder="E.G. GAYAZA"></div>
                    </div>
                    <div class="f-row">
                        <div class="f-group"><label>HEALTH STATUS</label><input type="text" id="r-health" value="NORMAL"></div>
                        <div class="f-group"><label>TERMLY FEES (UGX)</label><input type="number" id="r-fees" value="450000"></div>
                    </div>
                    
                    <button onclick="saveToSupabase()" class="btn-blue">COMPLETE ADMISSION</button>
                </div>
            </div>
            
            <div id="view-fees" class="hidden">
                <div class="panel"><h3>FINANCE RECORDS LOADING...</h3></div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let activeID = ""; let role = ""; let encodedImg = "";

        // PROFESSIONAL PHOTO COMPRESSOR
        function handlePhoto(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const size = 160; 
                    canvas.width = size; canvas.height = size;
                    canvas.getContext('2d').drawImage(img, 0, 0, size, size);
                    encodedImg = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('preview-img').src = encodedImg;
                    document.getElementById('preview-img').style.display = 'block';
                    document.getElementById('cam-ico').style.display = 'none';
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        // BUG-PROOF LOGIN (MATHEMATICAL COMPARISON)
        async function attemptLogin() {
            const id = document.getElementById('log-id').value.toUpperCase().trim();
            const pin = document.getElementById('log-pin').value.trim();
            const { data: sch } = await sb.from('Schools').select('*').eq('sch_id', id).single();

            if (sch) {
                // THE MATHEMATICAL FIX: Convert dates to numeric timestamps
                const now = new Date().setHours(0,0,0,0);
                const expiryDateObj = new Date(sch.expiry_date).setHours(0,0,0,0);
                
                console.log("System Date:", now);
                console.log("Expiry Date:", expiryDateObj);

                if (now > expiryDateObj || !sch.is_active) {
                    document.getElementById('error-box').innerHTML = "SYSTEM EXPIRED.<br>CONTACT EUDES MEDIA: +256762992440";
                    return;
                }

                if (pin === sch.admin_key || pin === "eudes2026") role = "ADMIN";
                else if (pin === sch.teacher_key) role = "TEACHER";
                else { document.getElementById('error-box').innerText = "INVALID SECURITY PIN"; return; }

                activeID = id;
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('aside').classList.remove('hidden');
                document.getElementById('main-view').classList.remove('hidden');
                document.getElementById('sch-title').innerText = sch.school_name;
                document.getElementById('role-tag').innerText = role;
                document.getElementById('exp-val').innerText = sch.expiry_date;
                loadStats();
            } else {
                document.getElementById('error-box').innerText = "SCHOOL ID NOT REGISTERED";
            }
        }

        async function saveToSupabase() {
            const name = document.getElementById('r-name').value;
            if(!name) return alert("PLEASE PROVIDE LEARNER NAME");
            
            const lin = `${activeID.substring(0,2)}-${name.charAt(0)}-${Math.floor(1000+Math.random()*9000)}`;
            
            const { error } = await sb.from('Students').insert([{
                sch_id: activeID, name, lin, photo_url: encodedImg,
                class: document.getElementById('r-class').value,
                location: document.getElementById('r-loc').value,
                health_status: document.getElementById('r-health').value,
                total_fees_required: document.getElementById('r-fees').value
            }]);

            if (!error) {
                alert("ADMISSION SUCCESSFUL. LIN: " + lin);
                location.reload(); 
            } else {
                alert("DATABASE ERROR. CHECK CONNECTION.");
            }
        }

        async function loadStats() {
            const { data } = await sb.from('Students').select('*').eq('sch_id', activeID);
            if (data) {
                document.getElementById('count-st').innerText = data.length;
                let total = data.reduce((sum, s) => sum + (Number(s.fees_paid) || 0), 0);
                document.getElementById('count-cash').innerText = total.toLocaleString() + " UGX";
            }
        }

        function nav(v, btn) {
            ['dash', 'reg', 'fees'].forEach(id => document.getElementById('view-'+id).classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
            document.getElementById('view-'+v).classList.remove('hidden');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
