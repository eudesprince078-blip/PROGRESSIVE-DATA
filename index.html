<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESMS | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0047AB; --bg: #f8fafc; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; }
        body { margin: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: white; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; padding: 20px; }
        .nav-item { padding: 12px 15px; border-radius: 10px; color: #64748b; font-weight: 700; font-size: 0.75rem; cursor: pointer; margin-bottom: 5px; }
        .nav-item.active { background: #eff6ff; color: var(--primary); }
        .main { flex: 1; display: flex; flex-direction: column; }
        .header { padding: 15px 40px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .page { display: none; padding: 30px; height: 100%; overflow-y: auto; }
        .page.active { display: block; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; }
        th { background: #f1f5f9; padding: 15px; text-align: left; font-size: 0.6rem; color: #64748b; }
        td { padding: 15px; font-size: 0.65rem; border-bottom: 1px solid #f1f5f9; font-weight: 700; color: #1e293b; }
        #login-screen { position: fixed; inset: 0; background: #0f172a; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div style="background:white; padding:40px; border-radius:30px; width:380px; text-align:center;">
            <h1 style="color:var(--primary); margin:0;">ESMS AUTHORITY</h1>
            <p style="font-size:0.55rem; color:#64748b; margin-bottom:20px;">EUDES MEDIA SOLUTIONS</p>
            <input type="text" id="schId" placeholder="SCHOOL ID" style="width:100%; padding:15px; margin-bottom:10px; border-radius:10px; border:1px solid #e2e8f0; text-align:center;">
            <input type="password" id="schKey" placeholder="ACCESS KEY" style="width:100%; padding:15px; margin-bottom:20px; border-radius:10px; border:1px solid #e2e8f0; text-align:center;">
            <button onclick="authenticate()" style="width:100%; padding:16px; border-radius:12px; border:none; background:var(--primary); color:white; font-weight:800; cursor:pointer;">VERIFY SYSTEM</button>
        </div>
    </div>

    <div class="sidebar">
        <h2 style="font-size: 0.8rem; color: var(--primary); margin-bottom: 30px;">CAMPUSSPHERE</h2>
        <div class="nav-item active" onclick="showPage('dash-page', this)">📊 Dashboard</div>
        <div class="nav-item" onclick="fetchStudents(); showPage('list-page', this)">👤 Student List</div>
        <div style="margin-top: auto;"><button onclick="location.reload()" style="background:none; border:none; color:#e11d48; font-weight:800; cursor:pointer; font-size:0.7rem;">LOGOUT</button></div>
    </div>

    <div class="main">
        <div class="header">
            <h2 id="dispName" style="margin:0; font-size: 0.9rem;"></h2>
            <img id="dispLogo" src="" style="height:35px; border-radius:5px;">
        </div>

        <div id="dash-page" class="page active">
            <div style="background:white; padding:30px; border-radius:20px; border:1px solid #e2e8f0;">
                <h3 style="margin:0; color:var(--primary);">System Status: Ready</h3>
                <p id="connStatus" style="font-size: 0.7rem; color:#64748b;">Checking Database Connection...</p>
            </div>
        </div>

        <div id="list-page" class="page">
            <h3 style="margin-bottom:20px;">Registered Students</h3>
            <table>
                <thead><tr><th>LIN</th><th>NAME</th><th>AGE</th><th>CONTACT</th><th>LOCATION</th></tr></thead>
                <tbody id="stTable">
                    <tr><td colspan="5" style="text-align:center; padding:40px;">Waiting for connection...</td></tr>
                </tbody>
            </table>
            <div id="debugLog" style="font-size: 0.5rem; color: red; margin-top: 10px;"></div>
        </div>
    </div>

    <script>
        const _URL = 'https://kjftrwuucjdnhfwesrup.supabase.co'; 
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const client = supabase.createClient(_URL, _KEY);

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        async function authenticate() {
            const id = document.getElementById('schId').value.trim();
            const key = document.getElementById('schKey').value.trim();
            
            const { data: school, error } = await client.from('Schools').select('*').eq('sch_id', id).single();
            
            if (school && (key === school.admin_key || key === school.teacher_key)) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dispName').innerText = school.school_name;
                document.getElementById('dispLogo').src = school.logo_url;
                document.getElementById('connStatus').innerText = "Connected: " + school.school_name;
                fetchStudents();
            } else {
                alert("Login failed.");
            }
        }

        async function fetchStudents() {
            const tbody = document.getElementById('stTable');
            const debug = document.getElementById('debugLog');
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px;">Scanning Database...</td></tr>';

            // ATTEMPT 1: Try Capitalized 'Students'
            let response = await client.from('Students').select('*');

            // ATTEMPT 2: If failed, try lowercase 'students'
            if (response.error && response.error.code === "PGRST116" || response.error?.message.includes("not found")) {
                debug.innerText = "Retrying with lowercase 'students' table name...";
                response = await client.from('students').select('*');
            }

            if (response.error) {
                debug.innerText = "FINAL ERROR: " + response.error.message;
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:red; padding:40px;">TABLE NOT FOUND. PLEASE CHECK SUPABASE TABLE NAME.</td></tr>`;
                return;
            }

            if (!response.data || response.data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px;">DATABASE CONNECTED BUT TABLE IS EMPTY.</td></tr>';
                return;
            }

            tbody.innerHTML = '';
            debug.innerText = ""; // Clear errors if successful
            response.data.forEach(st => {
                tbody.innerHTML += `<tr>
                    <td style="color:var(--primary)">${st.lin_number || '---'}</td>
                    <td>${st.name || '---'}</td>
                    <td>${st.age || '---'}</td>
                    <td>${st.contact_number || '---'}</td>
                    <td>${st.physical_location || '---'}</td>
                </tr>`;
            });
        }
    </script>
</body>
</html>
