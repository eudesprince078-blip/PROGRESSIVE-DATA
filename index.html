<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROGRESSIVE MOTHERS PMS - V166</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #002b5b; --gold: #ffce00; --red: #ff3b3b; --green: #2ecc71; --gray: #f4f7fa; }
        body { font-family: 'Inter', sans-serif; background: var(--gray); margin: 0; padding-bottom: 100px; color: #333; }
        
        /* TOP BAR */
        .top-nav { background: #001326; color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-weight: 800; position: sticky; top: 0; z-index: 2000; }
        .header { background: linear-gradient(135deg, #001a33, var(--blue)); color: white; padding: 30px 15px 90px; text-align: center; border-bottom: 6px solid var(--gold); border-radius: 0 0 40px 40px; }
        .clock-box { font-size: 48px; font-weight: 900; margin: 0; }

        /* DASHBOARD & FINANCE BOX */
        .dash-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 15px; margin-top: -45px; position: relative; z-index: 100; }
        .dash-card { background: white; padding: 15px 5px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .dash-card b { display: block; font-size: 24px; color: var(--blue); }
        .dash-card small { font-size: 9px; font-weight: 800; color: #888; text-transform: uppercase; }

        .fin-strip { background: #001326; color: white; margin: 15px; padding: 20px; border-radius: 20px; display: flex; justify-content: space-between; text-align: center; }
        .fin-box { flex: 1; }
        .fin-box div { font-size: 14px; font-weight: 900; color: var(--gold); }
        .fin-box small { font-size: 8px; opacity: 0.7; text-transform: uppercase; }

        /* LIST & SEARCH */
        .search-container { padding: 0 15px; margin-bottom: 10px; }
        .search-bar { width: 100%; padding: 16px; border-radius: 15px; border: 2px solid #ddd; font-weight: 700; font-size: 14px; box-sizing: border-box; }
        
        .list-item { border-left: 10px solid var(--blue); padding: 20px; margin: 12px 15px; background: white; border-radius: 20px; border: 1px solid #eee; position: relative; }
        .lin-tag { font-size: 14px; font-weight: 900; color: white; background: var(--blue); padding: 5px 12px; border-radius: 8px; display: inline-block; margin: 8px 0; }
        
        /* TABS */
        .tab-bar { display: flex; background: white; padding: 8px; margin: 20px 15px; border-radius: 15px; gap: 5px; overflow-x: auto; }
        .tab { flex: 1; padding: 12px 5px; font-size: 9px; font-weight: 900; color: #bbb; text-align: center; display: none; cursor: pointer; border-radius: 10px; white-space: nowrap; }
        .tab.active { background: var(--blue); color: white; }

        /* BUTTONS */
        .action-row { display: flex; gap: 8px; margin-top: 15px; }
        .btn-act { flex: 1; padding: 12px; border-radius: 12px; border: none; color: white; font-weight: 900; font-size: 11px; display: flex; align-items: center; justify-content: center; gap: 6px; text-decoration: none; cursor: pointer; }

        .card { background: white; padding: 20px; border-radius: 25px; margin: 15px; border: 1px solid #eee; }
        .alert-bar { background: var(--red); color: white; margin: 15px; padding: 12px; border-radius: 12px; font-weight: 800; font-size: 10px; text-align: center; }

        input, select { width: 100%; padding: 14px; margin-top: 5px; border: 1.5px solid #eee; border-radius: 12px; font-weight: 600; box-sizing: border-box; }
        .btn-main { background: var(--blue); color: white; border: none; padding: 18px; width: 100%; border-radius: 15px; font-weight: 900; margin-top: 15px; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loginGate" style="max-width: 350px; margin: 100px auto; text-align: center;">
    <h1 style="color:var(--blue); font-weight:900;">PROGRESSIVE MOTHERS</h1>
    <div class="card">
        <label style="font-size:10px; font-weight:800; color:var(--blue);">ENTER KEY</label>
        <div style="position:relative;">
            <input id="sysKey" type="password" placeholder="••••••••" style="text-align:center;">
            <i class="fa-solid fa-eye" style="position:absolute; right:15px; top:18px; color:var(--blue);" onclick="const x=document.getElementById('sysKey'); x.type=x.type==='password'?'text':'password';"></i>
        </div>
        <button onclick="login()" class="btn-main">LOGIN</button>
    </div>
</div>

<div id="mainApp" class="hidden">
    <div class="top-nav">
        <span id="dateTop">...</span>
        <button onclick="location.reload()" style="background:var(--red); color:white; border:none; padding:6px 12px; border-radius:8px; font-weight:900;">LOGOUT</button>
    </div>

    <div class="header">
        <div id="clock" class="clock-box">00:00:00</div>
        <div style="font-size:12px; font-weight:700; text-transform:uppercase; opacity:0.8;" id="dateLong">...</div>
    </div>

    <div id="guard9am" class="alert-bar hidden">⚠️ 9:00AM ATTENDANCE MISSING: <span id="missClasses">...</span></div>

    <div class="dash-container">
        <div class="dash-card"><b id="statTotal">0</b><small>Total</small></div>
        <div class="dash-card"><b id="statPres" style="color:var(--green)">0</b><small>Present</small></div>
        <div class="dash-card"><b id="statAbs" style="color:var(--red)">0</b><small>Absent</small></div>
    </div>

    <div id="finStrip" class="fin-strip hidden">
        <div class="fin-box"><small>EXPECTED</small><div id="sumExp">0</div></div>
        <div class="fin-box"><small>PAID</small><div id="sumPaid" style="color:var(--green)">0</div></div>
        <div class="fin-box"><small>DEBT</small><div id="sumDebt" style="color:var(--red)">0</div></div>
    </div>

    <div class="tab-bar">
        <div id="tReg" class="tab" onclick="showTab('reg')">ADMISSION</div>
        <div id="tRoll" class="tab" onclick="showTab('roll')">ROLL CALL</div>
        <div id="tRec" class="tab" onclick="showTab('rec')">RECORDS</div>
        <div id="tFin" class="tab" onclick="showTab('fin')">FINANCE</div>
        <div id="tAdm" class="tab" onclick="showTab('adm')">ADMIN</div>
    </div>

    <div id="searchWrap" class="search-container hidden">
        <input type="text" id="globalSearch" oninput="runSearch()" class="search-bar" placeholder="Search LIN, Name, or Class...">
    </div>

    <div id="secReg" class="card hidden">
        <label style="font-size:10px; font-weight:800;">LIN NUMBER (AUTO)</label>
        <input id="fLin" disabled style="background:#f4f4f4; color:var(--blue); font-weight:900;">
        <label style="font-size:10px; font-weight:800; margin-top:10px; display:block;">NAME</label><input id="fName">
        <label style="font-size:10px; font-weight:800; margin-top:10px; display:block;">CLASS</label>
        <select id="fClass"><option>Baby</option><option>Middle</option><option>Top</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
        <label style="font-size:10px; font-weight:800; margin-top:10px; display:block;">PARENT CONTACT</label><input id="fCon">
        <label style="font-size:10px; font-weight:800; margin-top:10px; display:block;">AGE</label><input type="number" id="fAge">
        <label style="font-size:10px; font-weight:800; margin-top:10px; display:block;">LOCATION</label><input id="fLoc">
        <label style="font-size:10px; font-weight:800; margin-top:10px; display:block;">HEALTH STATUS</label><input id="fHealth">
        <label style="font-size:10px; font-weight:800; margin-top:10px; display:block;">TOTAL FEES</label><input id="fExp" type="number">
        <label style="font-size:10px; font-weight:800; margin-top:10px; display:block;">PAID</label><input id="fPaid" type="number">
        <button onclick="saveData()" class="btn-main">SAVE RECORD</button>
    </div>

    <div id="secAdm" class="card hidden">
        <h3 style="color:var(--blue); margin-top:0;">SYSTEM CONTROLS</h3>
        <button onclick="autoPromote()" class="btn-main" style="background:var(--green)">🚀 AUTO-PROMOTE ALL STUDENTS</button>
    </div>

    <div id="secList" class="hidden"></div>

    <div style="text-align:center; padding:40px; font-size:10px; font-weight:800; color:#bbb;">EUDES MEDIA SOLUTIONS | +256762992440</div>
</div>

<script>
    const sb = supabase.createClient("https://kjftrwuucjdnhfwesrup.supabase.co", "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO");
    let ROLE = "", students = [], activeTab = "";

    function login() {
        const k = document.getElementById('sysKey').value.trim().toUpperCase();
        if (k === "JESUS CARES") ROLE = "ADMIN";
        else if (k === "FINANCE2026") ROLE = "FINANCE";
        else if (k === "TEACHER256") ROLE = "TEACHER";
        else return alert("Key Error");
        
        document.getElementById('loginGate').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        
        ['tReg','tRoll','tRec','tFin','tAdm'].forEach(t => { 
            let show = ROLE === "ADMIN";
            if(ROLE === "FINANCE" && (t==="tFin"||t==="tReg")) show = true;
            if(ROLE === "TEACHER" && (t==="tRoll"||t==="tReg")) show = true;
            if(show) document.getElementById(t).style.display="block";
        });
        showTab(ROLE === "ADMIN" ? 'rec' : (ROLE === "TEACHER" ? 'roll' : 'fin'));
        fetchData(); setInterval(tick, 1000);
    }

    async function fetchData() {
        const { data } = await sb.from('students').select('*').order('name');
        if(data) { 
            students = data.filter(s => s.status !== 'LEFT');
            let tExp = 0, tPaid = 0;
            students.forEach(s => { tExp += (s.fees_expected||0); tPaid += (s.fees_paid||0); });
            document.getElementById('sumExp').innerText = tExp.toLocaleString();
            document.getElementById('sumPaid').innerText = tPaid.toLocaleString();
            document.getElementById('sumDebt').innerText = (tExp - tPaid).toLocaleString();
            document.getElementById('statTotal').innerText = students.length;
            runSearch();
        }
    }

    function tick() {
        const n = new Date();
        document.getElementById('clock').innerText = n.toLocaleTimeString('en-GB');
        document.getElementById('dateTop').innerText = n.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }).toUpperCase();
        document.getElementById('dateLong').innerText = n.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' }).toUpperCase();
        if(n.getHours() >= 9) document.getElementById('guard9am').classList.remove('hidden');
    }

    function showTab(t) {
        activeTab = t;
        ['tReg','tRoll','tRec','tFin','tAdm'].forEach(id => document.getElementById(id).classList.remove('active'));
        document.getElementById('t'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('active');
        ['secReg','secList','searchWrap','finStrip','secAdm'].forEach(id => document.getElementById(id).classList.add('hidden'));

        if(t === 'reg') { document.getElementById('secReg').classList.remove('hidden'); clearForm(); }
        else if(t === 'adm') document.getElementById('secAdm').classList.remove('hidden');
        else {
            document.getElementById('secList').classList.remove('hidden');
            document.getElementById('searchWrap').classList.remove('hidden');
            if(t === 'fin') document.getElementById('finStrip').classList.remove('hidden');
            runSearch();
        }
    }

    function runSearch() {
        const q = document.getElementById('globalSearch').value.toUpperCase();
        const filtered = students.filter(s => s.name.toUpperCase().includes(q) || (s.lin_number||"").toUpperCase().includes(q) || s.class.toUpperCase().includes(q));
        let h = "";
        filtered.forEach(s => {
            h += `<div class="list-item">
                <b onclick="${ROLE==='ADMIN'?'setEdit('+s.id+')':''}" style="cursor:pointer">${s.name}</b>
                <div class="lin-tag">LIN: ${s.lin_number}</div><br>
                <small>${s.class} | Parent: ${s.contact}</small>
                ${activeTab === 'fin' ? `<div style="font-weight:900; color:var(--red); margin-top:5px;">DEBT: ${(s.fees_expected - s.fees_paid).toLocaleString()}</div>` : ''}
                <div class="action-row">
                    <a href="tel:${s.contact}" class="btn-act" style="background:var(--blue)"><i class="fa-solid fa-phone"></i> CALL</a>
                    <a href="https://wa.me/${(s.contact||'').replace(/\D/g,'')}" class="btn-act" style="background:var(--green)"><i class="fa-brands fa-whatsapp"></i> CHAT</a>
                    ${ROLE === 'ADMIN' ? `<button onclick="markLeft(${s.id})" class="btn-act" style="background:#555">LEFT</button>` : ''}
                </div>
            </div>`;
        });
        document.getElementById('secList').innerHTML = h || "<p style='text-align:center;padding:20px;'>Not Found.</p>";
    }

    async function saveData() {
        const id = document.getElementById('editId').value;
        if(id && ROLE !== "ADMIN") return alert("Access Denied: Only Admin can edit names.");
        const name = document.getElementById('fName').value;
        const row = {
            name, class: document.getElementById('fClass').value, contact: document.getElementById('fCon').value,
            age: document.getElementById('fAge').value, location: document.getElementById('fLoc').value,
            health_status: document.getElementById('fHealth').value,
            fees_expected: parseInt(document.getElementById('fExp').value) || 0,
            fees_paid: parseInt(document.getElementById('fPaid').value) || 0
        };
        if(!id) row.lin_number = `PM${name.charAt(0).toUpperCase()}${Math.floor(1000+Math.random()*9000)}`;
        const { error } = id ? await sb.from('students').update(row).eq('id', id) : await sb.from('students').insert([row]);
        if(!error) { alert("Synced!"); fetchData(); showTab('rec'); }
    }

    async function markLeft(id) {
        if(confirm("Mark student as LEFT?")) { await sb.from('students').update({ status: 'LEFT' }).eq('id', id); fetchData(); }
    }

    async function autoPromote() {
        if(confirm("PROMOTE ALL STUDENTS NOW?")) {
            const cls = ["Baby","Middle","Top","P.1","P.2","P.3","P.4","P.5","P.6","P.7","GRADUATED"];
            for(let s of students) {
                let idx = cls.indexOf(s.class);
                if(idx < cls.length - 1) await sb.from('students').update({ class: cls[idx+1] }).eq('id', s.id);
            }
            alert("Promoted!"); fetchData();
        }
    }

    function setEdit(id) {
        const s = students.find(x => x.id == id);
        document.getElementById('fName').value = s.name; document.getElementById('fClass').value = s.class;
        document.getElementById('fCon').value = s.contact; document.getElementById('fExp').value = s.fees_expected;
        document.getElementById('fPaid').value = s.fees_paid; document.getElementById('fLin').value = s.lin_number;
        document.getElementById('fAge').value = s.age; document.getElementById('fLoc').value = s.location;
        document.getElementById('fHealth').value = s.health_status; document.getElementById('editId').value = s.id;
        showTab('reg');
    }

    function clearForm() {
        ['fName','fCon','fExp','fPaid','fLin','fAge','fLoc','fHealth'].forEach(f => document.getElementById(f).value="");
        document.getElementById('editId').value="";
    }
</script>
<input type="hidden" id="editId">
</body>
    </html>
