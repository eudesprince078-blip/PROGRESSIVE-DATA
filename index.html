<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0052cc; --dark: #020617; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #1e293b; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* NAVIGATION */
        .top-bar { height: 70px; background: white; border-bottom: 2px solid var(--primary); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; }
        .wrapper { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 260px; background: var(--dark); display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; }
        @media (max-width: 1024px) { .sidebar { position: fixed; height: 100%; transform: translateX(-100%); } .sidebar.open { transform: translateX(0); } }
        
        .nav-item { padding: 15px 20px; color: #94a3b8; cursor: pointer; display: flex; align-items: center; font-weight: 700; border: none; background: none; width: 100%; text-align: left; }
        .nav-item.active { background: var(--primary); color: white; border-radius: 0 30px 30px 0; margin-right: 10px; }
        .nav-item i { width: 30px; }
        
        .content { flex: 1; overflow-y: auto; padding: 20px; }

        /* UI COMPONENTS */
        .card { background: white; border-radius: 20px; padding: 20px; border: 1px solid #e2e8f0; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-box { background: white; padding: 20px; border-radius: 20px; text-align: center; border-bottom: 4px solid var(--primary); }
        
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #cbd5e1; margin-bottom: 12px; font-weight: 600; }
        .btn-main { background: var(--primary); color: white; padding: 16px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-main:disabled { background: #94a3b8; }

        .st-row { background: white; padding: 12px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 12px; }
        .st-img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; background: #eee; }
        
        #auth { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

            </div>

        <main class="content">

                    </div>
                    <input type="text" id="f-name" placeholder="Full Student Name">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">

                        <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                        <option>P.5</option><option>P.6</option><option>P.7</option>
                    </select>
                    <input type="text" id="f-contact" placeholder="Guardian Contact">
                    <input type="text" id="f-loc" placeholder="Physical Location">

                    <input type="number" id="f-fees" placeholder="Total Fees Amount">
                    <button id="save-btn" class="btn-main" onclick="saveStudent()">SAVE TO DATABASE</button>
                </div>
            </div>

            <div id="v-list" class="hidden">
                <input type="text" placeholder="Search name..." onkeyup="filterList(this.value)" style="margin-bottom:15px;">

            </div>

            <div id="v-roll" class="hidden">

                    <button class="btn-main" onclick="submitRoll()" style="margin-top:15px;">SUBMIT ATTENDANCE</button>
                </div>
            </div>

            <div id="v-fin" class="hidden">
                <div id="fin-list"></div>
            </div>

            <div id="v-rep" class="hidden">

                        <h4 id="rep-active-name" style="color:var(--primary); margin-bottom:15px;"></h4>
                        <div id="subject-inputs" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
                        <div style="background:var(--dark); color:white; padding:20px; border-radius:20px; text-align:center; margin:15px 0;">
                            <h1 id="calc-agg">--</h1><p style="font-size:0.6rem;">AGGREGATES</p>
                            <h4 id="calc-div" style="color:var(--primary)"></h4>
                        </div>
                        <button class="btn-main" onclick="saveReport()">ARCHIVE REPORT</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

        let db, activeSch, students = [], currentSid;

        // AUTH & INIT
        async function login() {
            const id = document.getElementById('sch-id').value.toUpperCase().trim();
            db = supabase.createClient(SB_URL, SB_KEY);
            const { data, error } = await db.from('Schools').select('*').eq('sch_id', id).single();
            if(data) {
                activeSch = id;
                document.getElementById('sch-logo').src = data.logo_url;
                document.getElementById('sch-name').innerText = data.school_name;
                document.getElementById('auth').classList.add('hidden');
                refreshData();
            } else { alert("ID NOT RECOGNIZED"); }
        }

        async function refreshData() {
            const { data } = await db.from('Students').select('*').eq('sch_id', activeSch);
            students = data || [];
            renderUI();
        }

        // IMAGE HANDLER
        function processImg(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 300; canvas.height = 300;
                    canvas.getContext('2d').drawImage(img, 0, 0, 300, 300);
                    const b64 = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('f-preview').src = b64;
                    document.getElementById('f-preview').style.display = 'block';
                    document.getElementById('f-img').value = b64;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }

        // SAVE LOGIC (WITH DATABASE SAFETY FIXES)
        async function saveStudent() {
            const btn = document.getElementById('save-btn');
            btn.disabled = true; btn.innerText = "SAVING...";

            // CRITICAL FIX: Ensure no empty strings go to Date or BigInt columns
            const age = document.getElementById('f-age').value;
            const fees = document.getElementById('f-fees').value;
            const dob = document.getElementById('f-dob').value;

            const payload = {
                sch_id: activeSch,
                name: document.getElementById('f-name').value.toUpperCase().trim(),
                age: age ? parseInt(age) : 0, // Fixed BigInt error
                dob: dob || null, // Fixed Date syntax error
                class: document.getElementById('f-class').value,
                contact: document.getElementById('f-contact').value,
                location: document.getElementById('f-loc').value,
                health_status: document.getElementById('f-health').value, // Fixed column name
                total_fees: fees ? parseInt(fees) : 0,
                photo_url: document.getElementById('f-img').value || ''
            };

            // Generate IDs for new students
            payload.lin = activeSch + "-" + Math.floor(1000 + Math.random()*8999);
            payload.payment_code = "PAY-" + Math.floor(100000 + Math.random()*899999);

            const { error } = await db.from('Students').insert([payload]);

            if(!error) {
                alert("STUDENT ARCHIVED SUCCESSFULLY");
                refreshData(); nav('list');
                resetForm();
            } else {
                alert("DATABASE REJECTED: " + error.message);
            }
            btn.disabled = false; btn.innerText = "SAVE TO DATABASE";
        }

        function renderUI() {

            students.forEach(s => debt += (Number(s.total_fees || 0) - Number(s.paid_fees || 0)));
            document.getElementById('count-total').innerText = students.length;
            document.getElementById('sum-debt').innerText = debt.toLocaleString();

            document.getElementById('student-list-container').innerHTML = students.map(s => `

                    <img src="${s.photo_url}" class="st-img">

                    <i class="fas fa-trash" style="color:#cbd5e1" onclick="delSt('${s.id}')"></i>
                </div>`).join('');
