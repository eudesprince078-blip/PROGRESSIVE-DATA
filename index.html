<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROGRESSIVE MOTHERS PMS - V135</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #002b5b; --gold: #ffce00; --red: #ff3b3b; --green: #2ecc71; --gray: #f4f7fa; }
        body { font-family: 'Inter', sans-serif; background: var(--gray); margin: 0; padding-bottom: 100px; }
        
        .header { background: linear-gradient(135deg, #001a33, var(--blue)); color: white; padding: 20px 15px 90px; text-align: center; border-radius: 0 0 45px 45px; border-bottom: 5px solid var(--gold); position: relative; }
        .school-title { font-size: 13px; font-weight: 900; color: var(--gold); text-transform: uppercase; line-height: 1.4; margin-bottom: 5px; }
        .school-loc { font-size: 10px; font-weight: 700; opacity: 0.9; letter-spacing: 1px; }
        .clock-box { font-size: 40px; font-weight: 900; margin: 10px 0; color: white; }
        
        .dash-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 15px; margin-top: -65px; position: relative; z-index: 5; }
        .dash-card { background: white; padding: 15px 5px; border-radius: 22px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .dash-card span { display: block; font-size: 22px; font-weight: 900; color: var(--blue); }
        .dash-card small { font-size: 8px; font-weight: 800; color: #999; text-transform: uppercase; }

        .tab-bar { display: flex; justify-content: space-around; background: white; padding: 8px; margin: 25px 15px 15px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .tab { padding: 12px 5px; font-size: 10px; font-weight: 900; color: #bbb; cursor: pointer; text-align: center; flex: 1; }
        .tab.active { background: var(--blue); color: white; border-radius: 15px; }

        .card { background: white; padding: 20px; border-radius: 28px; margin: 15px; border: 1px solid #eee; }
        label { font-size: 10px; font-weight: 800; color: var(--blue); margin-top: 15px; display: block; text-transform: uppercase; }
        input, select { width: 100%; padding: 16px; margin-top: 5px; border: 1.5px solid #eee; border-radius: 15px; font-weight: 600; box-sizing: border-box; font-size: 15px; }
        input:disabled { background: #f0f3f7; color: #888; }
        
        .bal-box { background: var(--gray); padding: 15px; border-radius: 15px; margin-top: 15px; text-align: center; border: 2px dashed #ddd; }
        .status-pill { display: inline-block; padding: 5px 15px; border-radius: 50px; font-size: 10px; font-weight: 900; margin-top: 10px; }
        .paid { background: var(--green); color: white; }
        .pending { background: var(--red); color: white; }

        .btn-main { background: var(--blue); color: white; border: none; padding: 20px; width: 100%; border-radius: 18px; font-weight: 900; margin-top: 15px; cursor: pointer; font-size: 16px; box-shadow: 0 5px 15px rgba(0,43,91,0.3); }
        .logout-btn { background: none; border: 1px solid white; color: white; padding: 5px 10px; border-radius: 8px; font-size: 9px; font-weight: 800; position: absolute; top: 15px; right: 15px; }

        .hidden { display: none !important; }
        .footer-brand { text-align: center; font-size: 10px; color: #bbb; font-weight: 800; margin-top: 40px; padding-bottom: 20px; }
    </style>
</head>
<body>

<div id="loginGate" style="padding: 120px 30px; text-align: center;">
    <div class="school-title" style="color:var(--blue); font-size:16px;">PROGRESSIVE MOTHERS<br>NURSERY & PRIMARY SCHOOL</div>
    <div class="card" style="max-width:340px; margin:40px auto; border: 3px solid var(--blue);">
        <input id="sysKey" type="password" placeholder="ENTER ACCESS KEY" style="text-align:center;">
        <button onclick="login()" class="btn-main">AUTHORIZE</button>
    </div>
</div>

<div id="mainApp" class="hidden">
    <div class="header">
        <button class="logout-btn" onclick="location.reload()">LOGOUT</button>
        <div class="school-title">PROGRESSIVE MOTHERS NURSERY AND PRIMARY SCHOOL</div>
        <div class="school-loc">GAYAZA-KIJABIJJO</div>
        <div id="clock" class="clock-box">00:00:00</div>
        <div id="activityStatus" style="font-weight:800; color:var(--gold); font-size:12px;">SYSTEM SYNCED</div>
    </div>

    <div class="dash-container">
        <div class="dash-card"><span id="statTotal">0</span><small>Students</small></div>
        <div class="dash-card"><span id="statPres" style="color:var(--green)">0</span><small>Present</small></div>
        <div class="dash-card"><span id="statAbs" style="color:var(--red)">0</span><small>Absent</small></div>
    </div>

    <div class="tab-bar">
        <div id="tReg" class="tab active" onclick="showTab('reg')">ADMISSION</div>
        <div id="tRoll" class="tab" onclick="showTab('roll')">ROLL CALL</div>
        <div id="tRec" class="tab" onclick="showTab('rec')">RECORDS</div>
        <div id="tFin" class="tab hidden" onclick="showTab('fin')">FINANCE</div>
    </div>

    <div id="secReg" class="card">
        <h3 id="regTitle" style="margin:0; color:var(--blue); font-size:18px;">NEW ADMISSION</h3>
        <input type="hidden" id="editId">
        
        <label>Full Student Name</label>
        <input id="fName" placeholder="Enter names">
        
        <label>Assigned Class</label>
        <select id="fClass">
            <option value="">-- Choose --</option>
            <option>Baby</option><option>Middle</option><option>Top</option>
            <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
            <option>P.5</option><option>P.6</option><option>P.7</option>
        </select>
        
        <label>Parent/Guardian Contact</label>
        <input id="fCon" placeholder="e.g. 07xx xxx xxx">
        
        <div id="financePanel" class="hidden">
            <div style="border-top: 2px solid var(--gray); margin-top: 25px; padding-top: 15px;">
                <h4 style="color:var(--blue); margin:0;">FINANCE ENTRY</h4>
                
                <label>Write Fees Required (UGX)</label>
                <input type="number" id="fExp" oninput="calcStatus()" placeholder="0">
                
                <label>Write Amount Paid (UGX)</label>
                <input type="number" id="fPaid" oninput="calcStatus()" placeholder="0">
                
                <div class="bal-box">
                    <small style="font-weight:800; color:#888;">BALANCE CALCULATION</small><br>
                    <b id="balDisp" style="font-size:20px; color:var(--red);">UGX 0</b><br>
                    <span id="statusLabel" class="status-pill">PENDING</span>
                </div>
            </div>
        </div>

        <button onclick="saveData()" class="btn-main">SAVE & UPDATE CLOUD</button>
        <button id="delBtn" onclick="deleteStudent()" class="btn-main hidden" style="background:var(--red)">REMOVE STUDENT</button>
    </div>

    <div id="secRoll" class="hidden">
        <div class="card"><select id="rollClass" onchange="loadRoll()"><option value="">-- Select Class for Roll Call --</option><option>Baby</option><option>Middle</option><option>Top</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select></div>
        <div id="rollArea"></div>
    </div>

    <div id="secRec" class="hidden">
        <div class="card"><input type="text" id="search" oninput="renderRec()" placeholder="🔍 Search student name..."></div>
        <div id="recArea"></div>
    </div>

    <div id="secFin" class="hidden">
        <div id="finArea"></div>
    </div>

    <div class="footer-brand">EUDES MEDIA SOLUTIONS | +256762992440</div>
</div>

<script>
    const sb = supabase.createClient("https://kjftrwuucjdnhfwesrup.supabase.co", "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO");
    let ROLE = "", students = [], att = {};

    function login() {
        const k = document.getElementById('sysKey').value.toUpperCase();
        if (k === "JESUS CARES") ROLE = "ADMIN";
        else if (k === "FINANCE2026") ROLE = "FINANCE";
        else if (k === "TEACHER256") ROLE = "TEACHER";
        else return alert("Wrong Access Key");

        document.getElementById('loginGate').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');

        if (ROLE !== "TEACHER") {
            document.getElementById('financePanel').classList.remove('hidden');
            document.getElementById('tFin').classList.remove('hidden');
        }
        if (ROLE === "FINANCE") {
            document.getElementById('tRoll').classList.add('hidden');
            showTab('fin');
        }
        fetchData();
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);
    }

    async function fetchData() {
        const { data } = await sb.from('students').select('*').order('name');
        if(data) { students = data; document.getElementById('statTotal').innerText = students.length; renderRec(); renderFinance(); }
    }

    function calcStatus() {
        const exp = parseInt(document.getElementById('fExp').value) || 0;
        const paid = parseInt(document.getElementById('fPaid').value) || 0;
        const bal = exp - paid;
        document.getElementById('balDisp').innerText = "UGX " + bal.toLocaleString();
        
        const label = document.getElementById('statusLabel');
        if (exp > 0 && bal <= 0) {
            label.innerText = "FULLY PAID";
            label.className = "status-pill paid";
            document.getElementById('balDisp').style.color = "var(--green)";
        } else {
            label.innerText = "PENDING";
            label.className = "status-pill pending";
            document.getElementById('balDisp').style.color = "var(--red)";
        }
    }

    function setEdit(id) {
        const s = students.find(x => x.id == id);
        document.getElementById('editId').value = s.id;
        document.getElementById('fName').value = s.name;
        document.getElementById('fClass').value = s.class;
        document.getElementById('fCon').value = s.contact;
        document.getElementById('fExp').value = s.fees_expected || 0;
        document.getElementById('fPaid').value = s.fees_paid || 0;
        
        const isFin = (ROLE === "FINANCE");
        document.getElementById('fName').disabled = isFin;
        document.getElementById('fClass').disabled = isFin;
        document.getElementById('fCon').disabled = isFin;

        calcStatus();
        document.getElementById('regTitle').innerText = "EDIT STUDENT";
        if(ROLE === "ADMIN") document.getElementById('delBtn').classList.remove('hidden');
        showTab('reg');
    }

    async function saveData() {
        const id = document.getElementById('editId').value;
        const row = {};
        if (!id || ROLE === "ADMIN") {
            row.name = document.getElementById('fName').value;
            row.class = document.getElementById('fClass').value;
            row.contact = document.getElementById('fCon').value;
        }
        if (ROLE === "ADMIN" || ROLE === "FINANCE") {
            row.fees_expected = parseInt(document.getElementById('fExp').value) || 0;
            row.fees_paid = parseInt(document.getElementById('fPaid').value) || 0;
        }
        if(id) await sb.from('students').update(row).eq('id', id);
        else await sb.from('students').insert([row]);
        alert("System Updated Successfully"); clearForm(); fetchData();
    }

    function renderFinance() {
        let h = "";
        students.forEach(s => {
            const bal = (s.fees_expected || 0) - (s.fees_paid || 0);
            const isPaid = (s.fees_expected > 0 && bal <= 0);
            h += `<div class="card" onclick="setEdit('${s.id}')" style="border-left:8px solid ${isPaid ? 'var(--green)' : 'var(--red)'}">
                <b>${s.name}</b><br>
                <small>Class: ${s.class}</small><br>
                <b style="color:${isPaid ? 'var(--green)' : 'var(--red)'}">${isPaid ? 'FULLY PAID' : 'BAL: UGX ' + bal.toLocaleString()}</b>
            </div>`;
        });
        document.getElementById('finArea').innerHTML = h;
    }

    function renderRec() {
        const q = document.getElementById('search').value.toUpperCase();
        let h = "";
        students.filter(s => s.name.toUpperCase().includes(q)).forEach(s => {
            h += `<div class="card" onclick="setEdit('${s.id}')">
                <b>${s.name}</b> <small style="float:right;">${s.class}</small>
            </div>`;
        });
        document.getElementById('recArea').innerHTML = h;
    }

    function loadRoll() {
        const cls = document.getElementById('rollClass').value;
        const list = students.filter(s => s.class === cls);
        let h = "";
        list.forEach(s => {
            const isAbs = att[s.id] === 'absent';
            h += `<div style="display:flex; justify-content:space-between; align-items:center; padding:15px; border-bottom:1px solid #eee;">
                <b>${s.name}</b>
                <button onclick="toggleAtt('${s.id}')" style="padding:10px 18px; border-radius:12px; border:none; background:${isAbs ? 'var(--red)' : 'var(--green)'}; color:white; font-weight:900;">${isAbs ? 'ABSENT' : 'PRESENT'}</button>
            </div>`;
        });
        document.getElementById('rollArea').innerHTML = h;
    }

    function toggleAtt(id) {
        att[id] = (att[id] === 'absent') ? 'present' : 'absent';
        let a = 0; Object.values(att).forEach(v => { if(v === 'absent') a++; });
        document.getElementById('statAbs').innerText = a;
        document.getElementById('statPres').innerText = students.length - a;
        loadRoll();
    }

    function showTab(t) {
        ['secReg','secRoll','secRec','secFin'].forEach(s => document.getElementById(s).classList.add('hidden'));
        ['tReg','tRoll','tRec','tFin'].forEach(s => document.getElementById(s).classList.remove('active'));
        document.getElementById('sec'+t.charAt(0).toUpperCase()+t.slice(1)).classList.remove('hidden');
        document.getElementById('t'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('active');
    }

    function clearForm() {
        ['fName','fCon','fExp','fPaid','editId'].forEach(i => {
            document.getElementById(i).value = "";
            document.getElementById(i).disabled = false;
        });
        document.getElementById('regTitle').innerText = "NEW ADMISSION";
        document.getElementById('delBtn').classList.add('hidden');
        document.getElementById('balDisp').innerText = "UGX 0";
    }

    async function deleteStudent() {
        if(confirm("DELETE STUDENT PERMANENTLY?")) {
            await sb.from('students').delete().eq('id', document.getElementById('editId').value);
            fetchData(); clearForm();
        }
    }
</script>
</body>
</html>
