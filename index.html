<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Progressive Mothers PMS v47.3</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #001a33; --red: #e63946; --gold: #ffc107; --white: #ffffff; --green: #25D366; --light: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 0; }
        .header { background: var(--red); color: white; padding: 20px 15px; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--gold); }
        .hero { background: var(--blue); color: white; padding: 20px 15px; text-align: center; border-bottom: 5px solid var(--gold); }
        #clock { font-size: 36px; font-weight: 900; margin: 5px 0; }
        
        /* Dashboard Stats */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 15px; margin-top: -30px; }
        .stat-card { background: white; padding: 12px 5px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-bottom: 4px solid var(--blue); }
        .stat-val { font-size: 22px; font-weight: 900; color: var(--blue); display: block; }
        .stat-lbl { font-size: 8px; font-weight: 800; color: #888; text-transform: uppercase; }

        /* Navigation */
        .nav-tabs { display: flex; background: white; border-bottom: 1px solid #ddd; position: sticky; top: 78px; z-index: 999; overflow-x: auto; }
        .tab { flex: 1; min-width: 80px; text-align: center; padding: 15px 5px; font-weight: 900; font-size: 9px; color: #bbb; cursor: pointer; text-transform: uppercase; }
        .tab.active { color: var(--blue); border-bottom: 4px solid var(--blue); background: #fcfcfc; }

        /* Cards & UI */
        .item-card { background: white; border-radius: 15px; padding: 15px; margin: 10px 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 8px solid var(--blue); position: relative; }
        .follow-up-badge { background: var(--red); color: white; padding: 2px 6px; border-radius: 4px; font-size: 8px; font-weight: 900; position: absolute; top: 10px; right: 10px; }
        .alert-box { background: #fff3f3; border: 1px solid var(--red); color: var(--red); padding: 10px; margin: 15px; border-radius: 10px; font-size: 11px; font-weight: 800; }

        input, select { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; font-size: 15px; margin: 5px 0 15px 0; box-sizing: border-box; font-weight: 600; }
        .hidden { display: none !important; }
        .btn-save { width: 100%; background: var(--blue); color: white; padding: 18px; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; }
        
        /* Login Styles */
        .login-input-wrap { position: relative; width: 100%; max-width: 300px; }
        .toggle-btn { position: absolute; right: 15px; top: 18px; font-size: 11px; font-weight: 900; color: var(--gold); cursor: pointer; }
    </style>
</head>
<body>

<div id="loginGate" style="position:fixed; inset:0; background:var(--blue); z-index:2000; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px;">
    <h1 style="color:white; font-weight:900; font-size:22px; text-align:center; margin-bottom:10px;">PROGRESSIVE MOTHER'S</h1>
    <p style="color:var(--gold); font-weight:800; margin-bottom:30px;">NURSERY & PRIMARY SCHOOL</p>
    
    <div class="login-input-wrap">
        <input id="key" type="password" placeholder="ENTER ACCESS KEY" style="text-align:center; border:3px solid var(--gold); text-transform: uppercase;">
        <span class="toggle-btn" onclick="togglePass()">SHOW</span>
    </div>
    
    <button onclick="secureLogin()" style="background:var(--gold); color:var(--blue); padding:18px; width:100%; max-width:300px; border:none; border-radius:12px; font-weight:900; margin-top:10px; font-size:16px;">LOGIN SYSTEM</button>
</div>

<div id="mainApp" class="hidden">
    <div class="header">
        <div style="line-height:1.2;">
            <b style="font-size:15px; letter-spacing:1px;">PROGRESSIVE MOTHER'S</b><br>
            <span style="font-size:10px; font-weight:800; opacity:0.9;">NURSERY & PRIMARY SCHOOL</span>
        </div>
        <button onclick="location.reload()" style="background:white; color:var(--red); border:none; padding:10px 15px; border-radius:10px; font-weight:900; font-size:11px;">LOGOUT</button>
    </div>

    <div class="hero">
        <div id="full-date" style="color:var(--gold); font-size:12px; font-weight:800;">DATE</div>
        <div id="clock">00:00:00</div>
        <div id="routineDisplay" style="background:rgba(255,255,255,0.1); padding:8px; border-radius:8px; font-size:11px; margin-top:10px; border:1px solid var(--gold);">Loading Daily Routine...</div>
    </div>

    <div class="dashboard">
        <div class="stat-card"><span class="stat-val" id="c-tot">0</span><span class="stat-lbl">Total Pupils</span></div>
        <div class="stat-card" style="border-bottom-color: var(--green);"><span class="stat-val" id="c-pres" style="color:var(--green)">0</span><span class="stat-lbl">Present</span></div>
        <div class="stat-card" style="border-bottom-color: var(--red);"><span class="stat-val" id="c-abs" style="color:var(--red)">0</span><span class="stat-lbl">Absent</span></div>
    </div>

    <div class="nav-tabs">
        <div class="tab" id="tab-sum" onclick="tab('sum')">Director</div>
        <div class="tab" id="tab-rec" onclick="tab('rec')">Records</div>
        <div class="tab" id="tab-adm" onclick="tab('adm')">Admission</div>
        <div class="tab" id="tab-roll" onclick="tab('roll')">Attendance</div>
    </div>

    <div id="v-sum" class="hidden">
        <div id="absenceFollowUp"></div>
        <div style="padding:15px; font-weight:900; color:var(--blue); border-top: 1px solid #ddd;">FINANCIAL OVERVIEW:</div>
        <div id="financeSummary" style="padding: 0 15px 20px 15px;"></div>
    </div>

    <div id="v-rec" class="hidden">
        <div style="padding:15px;"><input id="searchBar" placeholder="🔍 Search pupil name..." oninput="renderUI()"></div>
        <div id="dataList"></div>
    </div>

    <div id="v-adm" class="hidden" style="padding:15px;">
        <button onclick="clearForm()" style="width:100%; background:var(--gold); border:none; padding:15px; border-radius:12px; font-weight:900; margin-bottom:15px; color:var(--blue)">+ REGISTER NEW PUPIL</button>
        <div style="background:white; padding:20px; border-radius:20px; border:1px solid #ddd;">
            <h3 id="admTitle" style="margin:0 0 15px 0; color:var(--blue); font-size:14px;">PUPIL INFORMATION</h3>
            <input type="hidden" id="editId">
            <input id="name" placeholder="Full Name">
            <input id="lin" readonly placeholder="System LIN">
            <select id="cls"><option>Baby Class</option><option>Middle Class</option><option>Top Class</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
            <input id="contact" placeholder="Parent Contact">
            <input id="f_exp" type="number" placeholder="Expected Fees">
            <input id="f_paid" type="number" placeholder="Paid Fees">
            <button onclick="submitData()" class="btn-save">SAVE TO DATABASE</button>
        </div>
    </div>

    <div id="v-roll" class="hidden">
        <div style="padding:15px;"><select id="rollClass" onchange="renderUI()" style="border:3px solid var(--blue);"><option value="">-- Select Class for Roll Call --</option><option>Baby Class</option><option>Middle Class</option><option>Top Class</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select></div>
        <div id="rollData"></div>
    </div>
</div>

<script>
    const SUPA_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
    const _client = supabase.createClient(SUPA_URL, SUPA_KEY);
    let role = ""; let cachedData = [];

    function togglePass() {
        const p = document.getElementById('key');
        const b = document.querySelector('.toggle-btn');
        if(p.type === "password") { p.type = "text"; b.innerText = "HIDE"; }
        else { p.type = "password"; b.innerText = "SHOW"; }
    }

    function secureLogin() {
        const val = document.getElementById('key').value.trim().toUpperCase();
        if (val === "JESUS CARES") role = "Admin";
        else if (val === "TEACH2026") role = "Teacher";
        else return alert("ACCESS DENIED: INCORRECT KEY");
        document.getElementById('loginGate').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        tab(role === "Admin" ? 'sum' : 'roll');
        loadData();
    }

    function tab(t) {
        ['v-adm','v-rec','v-roll','v-sum'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById('v-'+t).classList.remove('hidden');
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active');
    }

    async function loadData() {
        const { data } = await _client.from('students').select('*').order('name');
        if(data) { cachedData = data; renderUI(); updateDirectorDash(); }
    }

    function updateDirectorDash() {
        const followDiv = document.getElementById('absenceFollowUp');
        const absents = cachedData.filter(s => s.is_absent === true);
        
        let followHtml = '<div class="alert-box">FOLLOW-UP: STUDENTS ABSENT TODAY</div>';
        absents.forEach(s => {
            followHtml += `<div class="item-card" style="border-left-color:var(--red)">
                <span class="follow-up-badge">ABSENT</span>
                <b>${s.name}</b><br><small>Class: ${s.class} | Parent: ${s.contact || 'No Contact'}</small>
            </div>`;
        });
        followDiv.innerHTML = absents.length > 0 ? followHtml : '<div style="padding:20px; text-align:center; color:gray;">All pupils are present today.</div>';

        // Financial Summary Logic
        let tE = 0, tP = 0;
        cachedData.forEach(s => { tE += (s.fees_expected || 0); tP += (s.fees_paid || 0); });
        document.getElementById('financeSummary').innerHTML = `<div style="background:var(--blue); color:white; padding:15px; border-radius:15px;">
            <p>Total Expected: UGX ${tE.toLocaleString()}</p>
            <p style="color:var(--green)">Total Collected: UGX ${tP.toLocaleString()}</p>
            <p style="color:var(--gold)">Balance Demand: UGX ${(tE - tP).toLocaleString()}</p>
        </div>`;
    }

    function renderUI() {
        document.getElementById('c-tot').innerText = cachedData.length;
        document.getElementById('c-abs').innerText = cachedData.filter(s => s.is_absent === true).length;
        document.getElementById('c-pres').innerText = cachedData.length - cachedData.filter(s => s.is_absent === true).length;

        const q = document.getElementById('searchBar').value.toLowerCase();
        const list = document.getElementById('dataList'); list.innerHTML = "";
        cachedData.filter(s => s.name.toLowerCase().includes(q)).forEach(s => {
            list.innerHTML += `<div class="item-card" onclick="editMode('${s.id}')"><b>${s.name}</b><br><small>${s.class}</small></div>`;
        });

        const rCls = document.getElementById('rollClass').value;
        const rollList = document.getElementById('rollData'); rollList.innerHTML = "";
        cachedData.filter(s => s.class === rCls).forEach(s => {
            const isA = s.is_absent === true;
            rollList.innerHTML += `<div class="item-card" style="border-left-color:${isA?'var(--red)':'var(--green)'}">
                <b>${s.name}</b>
                <button onclick="markAtt('${s.id}', ${!isA})" style="float:right; padding:10px 15px; border-radius:10px; border:none; background:${isA?'var(--red)':'var(--green)'}; color:white; font-weight:900;">${isA?'ABSENT':'PRESENT'}</button>
            </div>`;
        });
    }

    async function markAtt(id, status) {
        await _client.from('students').update({ is_absent: status }).eq('id', id);
        loadData();
    }

    function editMode(id) {
        const s = cachedData.find(st => st.id == id);
        document.getElementById('editId').value = s.id;
        document.getElementById('name').value = s.name;
        document.getElementById('lin').value = s.lin || "";
        document.getElementById('cls').value = s.class;
        document.getElementById('contact').value = s.contact || "";
        document.getElementById('f_exp').value = s.fees_expected || 0;
        document.getElementById('f_paid').value = s.fees_paid || 0;
        document.getElementById('admTitle').innerText = "EDITING: " + s.name;
        tab('adm');
    }

    function clearForm() {
        document.getElementById('editId').value = "";
        document.getElementById('name').value = "";
        document.getElementById('lin').value = "PM-" + Math.floor(1000 + Math.random()*9000);
        document.getElementById('contact').value = "";
        document.getElementById('f_exp').value = 0;
        document.getElementById('f_paid').value = 0;
        document.getElementById('admTitle').innerText = "NEW REGISTRATION";
        alert("Form cleared. Ready for new student.");
    }

    async function submitData() {
        const id = document.getElementById('editId').value;
        const payload = { 
            name: document.getElementById('name').value, 
            class: document.getElementById('cls').value,
            contact: document.getElementById('contact').value,
            lin: document.getElementById('lin').value,
            fees_expected: parseInt(document.getElementById('f_exp').value) || 0,
            fees_paid: parseInt(document.getElementById('f_paid').value) || 0
        };
        const { error } = id ? await _client.from('students').update(payload).eq('id', id) : await _client.from('students').insert([payload]);
        if(!error) { alert("Successfully Saved!"); loadData(); tab('rec'); }
    }

    setInterval(() => {
        document.getElementById('full-date').innerText = new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
    }, 1000);
</script>
</body>
</html>
