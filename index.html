<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROGRESSIVE PMS V91</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #002b5b; --light-blue: #eef6ff; --ug-yellow: #ffce00; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: #f4f7fa; margin: 0; padding-bottom: 90px; color: #333; }
        
        .header { background: linear-gradient(135deg, #001a33, var(--blue)); color: white; padding: 30px 20px; text-align: center; border-radius: 0 0 35px 35px; border-bottom: 4px solid var(--ug-yellow); }
        .clock-v91 { font-size: 28px; font-weight: 900; color: var(--ug-yellow); font-family: monospace; margin-bottom: 5px; }
        
        .card-container { padding: 10px 15px; }
        
        /* THE PERFECT ARRANGEMENT - AS REQUESTED */
        .student-card {
            background: var(--white);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #e0e6ed;
            position: relative;
        }

        .student-name {
            font-size: 18px;
            font-weight: 800;
            color: var(--blue);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .lin-code {
            font-size: 13px;
            font-weight: 700;
            color: #005bc5;
            margin-bottom: 12px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 10px;
        }

        .info-item b {
            display: block;
            font-size: 9px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-item span {
            font-size: 13px;
            font-weight: 600;
            color: #444;
        }

        .open-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--light-blue);
            color: var(--blue);
            border: none;
            padding: 8px 18px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 11px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Input Styles */
        .search-box {
            padding: 15px 20px;
            margin: 10px 15px;
        }
        input.main-search {
            width: 100%;
            padding: 15px;
            border-radius: 20px;
            border: 1.5px solid #ddd;
            font-size: 15px;
            outline: none;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loginArea" style="padding: 100px 30px; text-align: center;">
    <h2 style="color:var(--blue)">PROGRESSIVE MOTHERS</h2>
    <input id="sysKey" type="password" placeholder="System Key" style="width:250px; padding:15px; border-radius:15px; border:1px solid #ccc; text-align:center;">
    <br><br>
    <button onclick="handleLogin()" style="background:var(--blue); color:white; padding:15px 40px; border:none; border-radius:50px; font-weight:900;">SECURE LOGIN</button>
</div>

<div id="appBody" class="hidden">
    <div class="header">
        <div id="clock" class="clock-v91">00:00:00</div>
        <div style="font-size:12px; font-weight:700;">PROGRESSIVE MOTHERS SYSTEM</div>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" class="main-search" oninput="renderList()" placeholder="🔍 Search name, LIN or class...">
    </div>

    <div id="studentList" class="card-container">
        </div>
</div>

<script>
    const sb = supabase.createClient("https://kjftrwuucjdnhfwesrup.supabase.co", "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO");
    let allStudents = [];

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', { hour12: false });
    }

    function handleLogin() {
        const k = document.getElementById('sysKey').value.toUpperCase();
        if(k === "JESUS CARES" || k === "TEACHER256" || k === "FINANCE2026") {
            document.getElementById('loginArea').classList.add('hidden');
            document.getElementById('appBody').classList.remove('hidden');
            fetchData();
            setInterval(updateClock, 1000);
        } else {
            alert("Access Denied");
        }
    }

    async function fetchData() {
        const { data, error } = await sb.from('students').select('*').order('name');
        if (error) return console.error(error);
        allStudents = data || [];
        renderList();
    }

    function renderList() {
        const q = document.getElementById('searchInput').value.toUpperCase();
        let html = "";

        const filtered = allStudents.filter(s => 
            s.name.toUpperCase().includes(q) || 
            (s.lin && s.lin.toUpperCase().includes(q)) ||
            s.class.toUpperCase().includes(q)
        );

        filtered.forEach(s => {
            html += `
            <div class="student-card">
                <button class="open-btn" onclick="alert('Student Info: ${s.name}')">OPEN</button>
                <div class="student-name">${s.name}</div>
                <div class="lin-code">LIN: ${s.lin || 'PENDING'}</div>
                
                <div class="info-grid">
                    <div class="info-item"><b>Class</b><span>${s.class}</span></div>
                    <div class="info-item"><b>Contact</b><span>${s.contact || 'N/A'}</span></div>
                    <div class="info-item"><b>Health</b><span>${s.health_status || 'Normal'}</span></div>
                    <div class="info-item"><b>Address</b><span>${s.physical_location || 'N/A'}</span></div>
                </div>
            </div>`;
        });

        document.getElementById('studentList').innerHTML = html || "<p style='text-align:center; opacity:0.5;'>No records found.</p>";
    }
</script>
</body>
</html>
