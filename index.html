<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS AUTHORITY | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0047AB; --bg: #f8fafc; --dark: #0f172a; }
        * { box-sizing: border-box; text-transform: uppercase; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); margin: 0; color: #1e293b; }
        
        /* AUTH SCREEN */
        #login-screen { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; padding: 35px; border-radius: 25px; width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; border: 2px solid #e2e8f0; font-weight: 700; text-align: center; outline: none; }
        .btn { padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; color: white; background: var(--primary); width: 100%; }

        /* APP UI */
        .header { background: white; padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #e2e8f0; }
        .logo { width: 50px; height: 50px; border-radius: 10px; object-fit: contain; }
        
        .pipeline { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 20px; }
        .step { background: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-bottom: 4px solid #cbd5e1; }
        .step b { display: block; font-size: 1.4rem; color: var(--dark); }
        .step span { font-size: 0.5rem; color: #64748b; font-weight: 800; }

        .tab-bar { background: white; display: flex; border-bottom: 2px solid #e2e8f0; }
        .tab { flex: 1; padding: 16px; text-align: center; font-size: 0.6rem; font-weight: 800; color: #64748b; cursor: pointer; }
        .tab.active { color: var(--primary); border-bottom: 4px solid var(--primary); }

        .container { padding: 20px; }
        .card { background: white; border-radius: 20px; border: 1px solid #e2e8f0; overflow-x: auto; padding: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        td, th { padding: 12px; text-align: left; font-size: 0.7rem; border-bottom: 1px solid #f1f5f9; font-weight: 700; }
        
        .badge { background: #eef2ff; color: var(--primary); padding: 4px 8px; border-radius: 5px; font-size: 0.6rem; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="color:var(--primary); margin:0; font-size: 1.8rem;">ESMS PRO</h1>
            <p style="font-size:0.5rem; color:#64748b; font-weight:800; margin-bottom:20px;">EUDES MEDIA INNOVATION</p>
            <input type="text" id="schIdInput" placeholder="SCHOOL ID (PM001)">
            <input type="password" id="passInput" placeholder="ACCESS KEY">
            <button class="btn" onclick="authenticate()">UNLOCKED SYSTEM</button>
            <p id="err" style="color:red; font-size:0.7rem; margin-top:10px; display:none;"></p>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <div class="header">
            <img src="" id="schLogo" class="logo" onerror="this.src='https://via.placeholder.com/50'">
            <div>
                <h2 id="schName" style="margin:0; font-size: 1rem; color: var(--primary);">---</h2>
                <div id="roleDisplay" style="font-size:0.55rem; color:#64748b; font-weight:800;">---</div>
            </div>
        </div>

        <div class="tab-bar">
            <div class="tab active" id="t-dash" onclick="showTab('dash')">PIPELINE</div>
            <div class="tab" id="t-adm" onclick="showTab('adm')">ADMISSIONS</div>
            <div class="tab" onclick="location.reload()" style="color:red">LOGOUT</div>
        </div>

        <div id="view-dash" class="tab-content">
            <div class="pipeline">
                <div class="step"><b id="c1">0</b><span>APPLIED</span></div>
                <div class="step"><b id="c2">0</b><span>INTERVIEW</span></div>
                <div class="step"><b id="c3">0</b><span>PAYMENT</span></div>
                <div class="step" style="border-color:var(--primary)"><b id="c4">0</b><span>ENROLLED</span></div>
            </div>
            <div class="container">
                <div class="card">
                    <table>
                        <thead><tr><th>#</th><th>NAME</th><th>LOCATION</th><th>HEALTH</th><th>STATUS</th><th>PIPELINE</th></tr></thead>
                        <tbody id="stuBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="view-adm" class="tab-content container" style="display:none;">
            <div class="card" style="max-width: 500px; margin: auto;">
                <h3 style="color:var(--primary); text-align: center;">NEW ENROLLMENT</h3>
                <input type="text" id="nName" placeholder="FULL NAME">
                <input type="text" id="nLoc" placeholder="LOCATION">
                <input type="text" id="nHealth" placeholder="HEALTH STATUS" value="NORMAL">
                <button class="btn" onclick="saveStudent()">SUBMIT STUDENT</button>
            </div>
        </div>
    </div>

    <script>
        const _URL = 'https://kjftrwuucjdnhfwesrup.supabase.co'; 
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const client = supabase.createClient(_URL, _KEY);
        let activeID = "";

        async function authenticate() {
            const id = document.getElementById('schIdInput').value.trim();
            const key = document.getElementById('passInput').value.trim();
            
            // 1. Fetch from Schools
            const { data: schools } = await client.from('Schools').select('*');
            const school = schools?.find(s => s.sch_id === id);

            if (school && (key === school.admin_key || key === school.teacher_key)) {
                activeID = id;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('schName').innerText = school.school_name;
                document.getElementById('schLogo').src = school.logo_url;
                document.getElementById('roleDisplay').innerText = "ACCESS: AUTHORIZED";
                loadData();
            } else {
                alert("INVALID ID OR KEY");
            }
        }

        async function loadData() {
            // 2. Fetch students where sch_id matches the login ID
            const { data } = await client.from('students').select('*').eq('sch_id', activeID);
            
            const list = data || [];
            let counts = { APPLIED: 0, INTERVIEW: 0, PAYMENT: 0, ENROLLED: 0 };

            document.getElementById('stuBody').innerHTML = list.map((s, index) => {
                const st = s.status || 'APPLIED';
                if(counts[st] !== undefined) counts[st]++;
                return `<tr>
                    <td>${index + 1}</td>
                    <td>${s.name}</td>
                    <td>${s.location || '--'}</td>
                    <td>${s.health_status || 'NORMAL'}</td>
                    <td><span class="badge">${st}</span></td>
                    <td>
                        <select onchange="updateStat('${s.id}', this.value)" style="padding:4px; font-size:0.6rem;">
                            <option value="">MOVE...</option>
                            <option value="APPLIED">APPLIED</option>
                            <option value="INTERVIEW">INTERVIEW</option>
                            <option value="PAYMENT">PAYMENT</option>
                            <option value="ENROLLED">ENROLLED</option>
                        </select>
                    </td>
                </tr>`;
            }).join('');

            document.getElementById('c1').innerText = counts.APPLIED;
            document.getElementById('c2').innerText = counts.INTERVIEW;
            document.getElementById('c3').innerText = counts.PAYMENT;
            document.getElementById('c4').innerText = counts.ENROLLED;
        }

        async function saveStudent() {
            const student = {
                sch_id: activeID,
                name: document.getElementById('nName').value,
                location: document.getElementById('nLoc').value,
                health_status: document.getElementById('nHealth').value,
                status: 'APPLIED'
            };

            const { error } = await client.from('students').insert([student]);
            if (error) {
                alert("ERROR: " + error.message);
            } else {
                alert("STUDENT ADDED TO PIPELINE");
                document.getElementById('nName').value = "";
                showTab('dash');
            }
        }

        async function updateStat(id, val) {
            if(val) {
                await client.from('students').update({ status: val }).eq('id', id);
                loadData();
            }
        }

        function showTab(t) {
            document.getElementById('view-dash').style.display = t === 'dash' ? 'block' : 'none';
            document.getElementById('view-adm').style.display = t === 'adm' ? 'block' : 'none';
            document.getElementById('t-dash').classList.toggle('active', t === 'dash');
            document.getElementById('t-adm').classList.toggle('active', t === 'adm');
            if(t === 'dash') loadData();
        }
    </script>
</body>
</html>
