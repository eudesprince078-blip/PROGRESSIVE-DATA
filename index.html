<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESMS | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0047AB; --bg: #f8fafc; --sidebar: #ffffff; --text: #1e293b; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; }
        body { margin: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR (From Video) */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; padding: 20px; }
        .nav-item { padding: 12px 15px; border-radius: 10px; color: #64748b; font-weight: 700; font-size: 0.75rem; cursor: pointer; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; }
        .nav-item.active { background: #eff6ff; color: var(--primary); }
        .nav-item:hover:not(.active) { background: #f1f5f9; }

        /* MAIN CONTENT */
        .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .header { padding: 20px 40px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .content { padding: 40px; }

        /* PIPELINE TRACKER (From Video) */
        .pipeline { display: flex; justify-content: space-between; margin-bottom: 40px; position: relative; padding: 0 20px; }
        .pipeline::before { content: ''; position: absolute; top: 15px; left: 50px; right: 50px; height: 2px; background: #e2e8f0; z-index: 1; }
        .step { position: relative; z-index: 2; text-align: center; width: 80px; }
        .step-circle { width: 32px; height: 32px; border-radius: 50%; background: white; border: 2px solid #e2e8f0; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: #64748b; font-weight: 800; transition: 0.3s; }
        .step.active .step-circle { border-color: var(--primary); background: var(--primary); color: white; box-shadow: 0 0 0 4px rgba(0, 71, 171, 0.1); }
        .step-label { font-size: 0.55rem; font-weight: 800; color: #94a3b8; }
        .step.active .step-label { color: var(--primary); }

        /* LOGIN OVERLAY */
        #login-screen { position: fixed; inset: 0; background: #0f172a; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 30px; width: 380px; text-align: center; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 2px solid #e2e8f0; font-weight: 700; text-align: center; }
        .btn { padding: 16px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; color: white; background: var(--primary); width: 100%; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="color:var(--primary); margin:0;">ESMS AUTHORITY</h1>
            <p style="font-size:0.6rem; color:#64748b; margin-bottom:30px;">EUDES MEDIA SYSTEMS</p>
            <input type="text" id="schId" placeholder="SCHOOL ID (PM001)">
            <input type="password" id="schKey" placeholder="ACCESS KEY">
            <button class="btn" id="loginBtn" onclick="authenticate()">VERIFY SYSTEM</button>
            <div id="err" style="color:red; font-size:0.7rem; margin-top:15px; display:none;"></div>
        </div>
    </div>

    <div class="sidebar">
        <h2 style="font-size: 0.9rem; color: var(--primary); margin-bottom: 30px;">CAMPUSSPHERE</h2>
        <div class="nav-item">📊 Dashboard</div>
        <div class="nav-item active">👤 Admissions</div>
        <div class="nav-item">📚 Students</div>
        <div class="nav-item">💰 Billing</div>
        <div style="margin-top: auto;">
            <button onclick="location.reload()" style="background:none; border:none; color:#e11d48; font-weight:800; cursor:pointer; font-size:0.7rem;">LOGOUT</button>
        </div>
    </div>

    <div class="main">
        <div class="header">
            <div>
                <h2 id="dispName" style="margin:0; font-size: 1rem; color: var(--text);"></h2>
                <p id="dispId" style="margin:0; font-size: 0.6rem; color: #64748b;"></p>
            </div>
            <img id="dispLogo" src="" style="height:40px; border-radius:8px;">
        </div>

        <div class="content">
            <div class="pipeline">
                <div class="step active"><div class="step-circle">✓</div><div class="step-label">Applied</div></div>
                <div class="step active"><div class="step-circle">2</div><div class="step-label">Review</div></div>
                <div class="step"><div class="step-circle">3</div><div class="step-label">Interview</div></div>
                <div class="step"><div class="step-circle">4</div><div class="step-label">Tested</div></div>
                <div class="step"><div class="step-circle">5</div><div class="step-label">Accepted</div></div>
                <div class="step"><div class="step-circle">6</div><div class="step-label">Payment</div></div>
                <div class="step"><div class="step-circle">7</div><div class="step-label">Enrolled</div></div>
            </div>

            <div style="background:white; padding:30px; border-radius:20px; border:1px solid #e2e8f0;">
                <h3 style="margin-top:0; color:var(--primary); font-size:0.8rem;">Registration Status</h3>
                <p style="font-size:0.7rem; color:#64748b;">System is currently synchronized with the <b>Schools</b> database. All student records for PM001 are accessible.</p>
            </div>
        </div>
    </div>

    <script>
        const _URL = 'https://kjftrwuucjdnhfwesrup.supabase.co'; 
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const client = supabase.createClient(_URL, _KEY);

        async function authenticate() {
            const idInput = document.getElementById('schId').value.trim();
            const keyInput = document.getElementById('schKey').value.trim();
            const errBox = document.getElementById('err');
            
            errBox.style.display = "none";

            try {
                const { data: school, error } = await client
                    .from('Schools')
                    .select('*')
                    .eq('sch_id', idInput)
                    .single();

                if (error || !school) throw new Error("ID NOT RECOGNIZED");

                if (keyInput === school.admin_key || keyInput === school.teacher_key) {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('dispName').innerText = school.school_name;
                    document.getElementById('dispId').innerText = "LICENSED TO: " + school.sch_id;
                    if(school.logo_url) document.getElementById('dispLogo').src = school.logo_url;
                } else {
                    throw new Error("ACCESS DENIED");
                }
            } catch (e) {
                errBox.style.display = "block";
                errBox.innerText = "❌ " + e.message;
            }
        }
    </script>
</body>
</html>
