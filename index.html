<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS ELITE | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --main: #0047AB; --bg: #f3f7ff; --dark: #0f172a; --accent: #F5B81B; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; }
        body { background: var(--bg); color: var(--dark); height: 100vh; overflow: hidden; }

        /* AUTH SCREEN */
        #auth-overlay { position: fixed; inset: 0; background: linear-gradient(135deg, #020617 0%, #1e3a8a 100%); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; padding: 40px; border-radius: 35px; width: 100%; max-width: 420px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

        /* SIDEBAR & LAYOUT */
        .wrapper { display: flex; height: 100vh; width: 100vw; }
        .sidebar { width: 85px; background: var(--dark); display: flex; flex-direction: column; align-items: center; padding: 30px 0; transition: 0.3s; flex-shrink: 0; border-right: 2px solid var(--main); }
        @media (min-width: 992px) { .sidebar { width: 280px; align-items: flex-start; padding: 30px; } }

        .nav-link { width: 90%; display: flex; align-items: center; padding: 16px; color: #94a3b8; cursor: pointer; border-radius: 18px; margin-bottom: 10px; border: none; background: none; transition: 0.3s; }
        .nav-link i { font-size: 1.4rem; min-width: 45px; text-align: center; }
        .nav-link span { display: none; font-weight: 700; font-size: 0.85rem; margin-left: 10px; }
        @media (min-width: 992px) { .nav-link span { display: block; } }
        .nav-link.active { background: var(--main); color: white; box-shadow: 0 10px 20px rgba(0, 71, 171, 0.3); }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 80px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }

        .page-body { padding: 30px; overflow-y: auto; flex: 1; }

        /* FORMS & PANELS */
        .panel { background: white; padding: 35px; border-radius: 30px; border: 1px solid #e2e8f0; max-width: 850px; margin: auto; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        @media (max-width: 650px) { .form-row { grid-template-columns: 1fr; } }

        input, select { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #f1f5f9; background: #f8fafc; font-weight: 700; outline: none; }
        input:focus { border-color: var(--main); background: white; }

        /* PHOTO BOX */
        .photo-box { width: 120px; height: 120px; border-radius: 30px; border: 3px dashed #cbd5e1; margin: 0 auto 25px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; }
        #photo-preview { width: 100%; height: 100%; object-fit: cover; display: none; }

        .btn-prime { background: var(--main); color: white; padding: 18px; border-radius: 18px; border: none; font-weight: 800; cursor: pointer; width: 100%; font-size: 0.9rem; transition: 0.3s; }
        .btn-prime:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0, 71, 171, 0.4); }

        .hidden { display: none !important; }
        .err { color: #ff0000; font-size: 0.65rem; margin-top: 15px; font-weight: 900; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="login-card">
            <div style="background: var(--main); width: 60px; height: 60px; border-radius: 20px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-shield-check" style="color:white; font-size:1.8rem;"></i>
            </div>
            <h1 style="letter-spacing: -1px; font-weight: 900;">ESMS ELITE</h1>
            <p style="font-size: 0.6rem; color: #64748b; font-weight: 800; margin-bottom: 30px;">EUDES MEDIA | YOUR COMPLETE DIGITAL PARTNER</p>
            <input type="text" id="login-id" placeholder="SCHOOL ID" style="margin-bottom: 15px; text-align: center;">
            <input type="password" id="login-pass" placeholder="SECURITY PIN" style="margin-bottom: 25px; text-align: center;">
            <button onclick="handleLogin()" class="btn-prime">AUTHENTICATE SYSTEM</button>
            <p id="err-msg" class="err"></p>
        </div>
    </div>

    <div class="wrapper">
        <nav class="sidebar hidden" id="sidebar">
            <div style="padding:0 25px 40px; font-weight:900; color:white; font-size:1.5rem;">EUDES<span style="color:var(--accent);">.</span></div>
            <button class="nav-link active" onclick="showPage('dash', this)"><i class="fas fa-house"></i><span>DASHBOARD</span></button>
            <button class="nav-link" onclick="showPage('reg', this)"><i class="fas fa-user-plus"></i><span>ADMISSIONS</span></button>
            <button class="nav-link" onclick="showPage('fees', this)"><i class="fas fa-wallet"></i><span>FEES OFFICE</span></button>
            <div style="margin-top:auto; padding:20px; font-size:0.55rem; color:#94a3b8; font-weight:700;">SUPPORT: +256762992440</div>
        </nav>

        <main class="main-content hidden" id="main">
            <header class="header">
                <h3 id="sch-display" style="font-weight: 800; color:var(--main);">...</h3>
                <div id="role-display" style="font-weight: 800; font-size: 0.7rem; color:var(--accent);">...</div>
            </header>

            <div class="page-body">
                <div id="page-reg" class="hidden">
                    <div class="panel">
                        <h2 style="margin-bottom: 25px; letter-spacing: -1px;">LEARNER ADMISSION</h2>
                        
                        <div class="photo-box" onclick="document.getElementById('file-in').click()">
                            <i id="cam-icon" class="fas fa-camera" style="font-size: 2rem; color: #cbd5e1;"></i>
                            <img id="photo-preview">
                            <input type="file" id="file-in" class="hidden" accept="image/*" onchange="processImage(event)">
                        </div>

                        <div class="form-row">
                            <input type="text" id="r-name" placeholder="FULL NAME">
                            <select id="r-class"><option>P.1</option><option>P.7</option><option>S.1</option></select>
                        </div>
                        <div class="form-row">
                            <input type="text" id="r-phone" value="+256">
                            <input type="text" id="r-loc" placeholder="LOCATION">
                        </div>
                        <div class="form-row">
                            <input type="text" id="r-health" value="NORMAL">
                            <input type="number" id="r-fees" placeholder="FEES AMOUNT">
                        </div>
                        <button onclick="saveStudent()" class="btn-prime">REGISTER LEARNER</button>
                    </div>
                </div>

                <div id="page-dash">
                    <div class="panel">
                        <h1 id="welcome-msg">WELCOME TO THE CONTROL CENTER</h1>
                        <p style="margin-top:10px; color:#64748b; font-weight:800; font-size:0.7rem;">SYSTEM IS FULLY OPERATIONAL</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let activeSch = ""; let userRole = ""; let imgData = "";

        // IMAGE COMPRESSION (SAVE SPACE ON SUPABASE)
        function processImage(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const size = 150; // Smaller photo size
                    canvas.width = size; canvas.height = size;
                    canvas.getContext('2d').drawImage(img, 0, 0, size, size);
                    imgData = canvas.toDataURL('image/jpeg', 0.5); // 50% quality for speed
                    document.getElementById('photo-preview').src = imgData;
                    document.getElementById('photo-preview').style.display = 'block';
                    document.getElementById('cam-icon').style.display = 'none';
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function handleLogin() {
            const id = document.getElementById('login-id').value.toUpperCase().trim();
            const pin = document.getElementById('login-pass').value.trim();
            const { data: sch, error } = await sb.from('Schools').select('*').eq('sch_id', id).single();

            if (sch) {
                // BUG-PROOF DATE LOGIC
                const today = new Date();
                const expiry = new Date(sch.expiry_date);
                
                // Compare the actual time values
                if (today.getTime() > expiry.getTime() || !sch.is_active) {
                    document.getElementById('err-msg').innerText = "SYSTEM EXPIRED. CONTACT EUDES MEDIA.";
                    return;
                }

                if (pin === sch.admin_key || pin === "eudes2026") userRole = "ADMIN";
                else if (pin === sch.teacher_key) userRole = "TEACHER";
                else { document.getElementById('err-msg').innerText = "WRONG PIN"; return; }

                activeSch = id;
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('sidebar').classList.remove('hidden');
                document.getElementById('main').classList.remove('hidden');
                document.getElementById('sch-display').innerText = sch.school_name;
                document.getElementById('role-display').innerText = userRole;
            } else {
                document.getElementById('err-msg').innerText = "INVALID SCHOOL ID";
            }
        }

        async function saveStudent() {
            const name = document.getElementById('r-name').value;
            if(!name) return alert("ENTER NAME");
            const lin = `${activeSch.substring(0,2)}-${name.charAt(0)}-${Math.floor(1000+Math.random()*9000)}`;
            
            const { error } = await sb.from('Students').insert([{
                sch_id: activeSch, name, lin, photo_url: imgData,
                class: document.getElementById('r-class').value,
                location: document.getElementById('r-loc').value,
                health_status: document.getElementById('r-health').value,
                total_fees_required: document.getElementById('r-fees').value
            }]);
            
            if (!error) { 
                alert("SUCCESSFULLY ADMITTED: " + lin); 
                location.reload(); // Refresh to clean the form
            } else {
                alert("ERROR SAVING DATA");
            }
        }

        function showPage(p, btn) {
            ['dash', 'reg', 'fees'].forEach(id => document.getElementById('page-'+id).classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
            document.getElementById('page-'+p).classList.remove('hidden');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
