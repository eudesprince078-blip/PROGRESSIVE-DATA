<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESMS ELITE | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #0052cc; --bg: #0f172a; --card: #ffffff; --text: #1e293b; --accent: #3b82f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; display: flex; height: 100vh; }

        /* AUTHENTICATION OVERLAY */
        #auth-screen { position: fixed; inset: 0; background: radial-gradient(circle at top right, #1e3a8a, #0f172a); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 40px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px); }
        .auth-icon { background: var(--primary); width: 80px; height: 80px; border-radius: 25px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; color: white; font-size: 2rem; box-shadow: 0 10px 15px -3px rgba(0, 82, 204, 0.4); }

        /* SIDE NAVIGATION */
        .sidebar { width: 280px; background: #020617; display: flex; flex-direction: column; padding: 40px 20px; flex-shrink: 0; border-right: 1px solid rgba(255,255,255,0.1); }
        .nav-link { display: flex; align-items: center; padding: 18px 20px; color: #94a3b8; text-decoration: none; border-radius: 16px; margin-bottom: 10px; font-weight: 700; transition: 0.3s; font-size: 0.85rem; border: none; background: transparent; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; }
        .nav-link i { margin-right: 15px; font-size: 1.2rem; }
        .nav-link.active { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(0, 82, 204, 0.3); }

        /* MAIN CONTENT */
        .main-wrapper { flex: 1; display: flex; flex-direction: column; background: #f8fafc; }
        .top-bar { height: 80px; background: white; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e2e8f0; }
        .view-container { flex: 1; padding: 40px; overflow-y: auto; }

        /* DASHBOARD CARDS */
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 25px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 30px; border-radius: 30px; border: 1px solid #e2e8f0; display: flex; align-items: center; }
        .stat-val { font-size: 2rem; font-weight: 800; color: var(--primary); }

        /* FORM STYLING */
        .form-panel { background: white; border-radius: 35px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); max-width: 900px; margin: 0 auto; border: 1px solid #e2e8f0; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 25px; }
        label { font-size: 0.7rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 8px; display: block; }
        input, select { width: 100%; padding: 16px 20px; border-radius: 14px; border: 2px solid #f1f5f9; background: #f8fafc; font-weight: 700; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(0, 82, 204, 0.1); }

        .btn-action { background: var(--primary); color: white; padding: 20px; border-radius: 18px; border: none; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 1rem; }

        /* TABLE */
        .table-card { background: white; border-radius: 30px; padding: 30px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 20px; font-size: 0.75rem; color: #64748b; font-weight: 800; border-bottom: 2px solid #f1f5f9; text-transform: uppercase; }
        td { padding: 20px; font-weight: 700; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }

        .tag-active { background: #dcfce7; color: #166534; padding: 6px 12px; border-radius: 10px; font-size: 0.7rem; font-weight: 900; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <div class="auth-icon"><i class="fas fa-fingerprint"></i></div>
            <h1 style="font-weight: 900; margin-bottom: 5px;">ESMS ELITE</h1>
            <p style="font-size: 0.65rem; color: #64748b; font-weight: 800; margin-bottom: 30px;">EUDES MEDIA | DIGITAL PARTNER</p>
            
            <input type="text" id="auth-code" value="PM001" style="text-align: center; margin-bottom: 15px;">
            <input type="password" placeholder="••••••" style="text-align: center; margin-bottom: 25px;">
            
            <button class="btn-action" onclick="authenticate()">UNLOCK SYSTEM</button>
            <p style="color: #ef4444; font-size: 0.65rem; font-weight: 800; margin-top: 25px;">SYSTEM SECURE. CONTACT EUDES MEDIA: +256762992440</p>
        </div>
    </div>

    <nav class="sidebar hidden" id="app-sidebar">
        <div style="margin-bottom: 50px; padding-left: 20px;">
            <h1 style="color: white; font-weight: 900; font-size: 1.5rem;">EUDES<span style="color: var(--accent);">.</span></h1>
            <p style="color: #475569; font-size: 0.6rem; font-weight: 800; letter-spacing: 2px;">MANAGEMENT ELITE</p>
        </div>
        
        <button class="nav-link active" onclick="showView('dash', this)"><i class="fas fa-layer-group"></i>Dashboard</button>
        <button class="nav-link" onclick="showView('reg', this)"><i class="fas fa-user-plus"></i>New Learner</button>
        <button class="nav-link" onclick="showView('list', this)"><i class="fas fa-address-book"></i>Directory</button>
        
        <div style="margin-top: auto; padding: 25px; background: rgba(255,255,255,0.03); border-radius: 25px;">
            <p style="color: #64748b; font-size: 0.6rem; font-weight: 800; margin-bottom: 10px;">SUPPORT LINE</p>
            <p style="color: white; font-size: 0.85rem; font-weight: 800;">+256 762 992440</p>
        </div>
    </nav>

    <div class="main-wrapper hidden" id="app-main">
        <header class="top-bar">
            <div><h2 id="school-title" style="font-weight: 900; font-size: 1.1rem; color: var(--primary);">LOADING...</h2></div>
            <div class="tag-active">CONTROL CENTER ACTIVE</div>
        </header>

        <div class="view-container">
            <div id="v-dash">
                <div class="stat-grid">
                    <div class="stat-card">
                        <div style="background: #eff6ff; padding: 20px; border-radius: 20px; margin-right: 20px;"><i class="fas fa-user-graduate" style="color: var(--primary); font-size: 1.5rem;"></i></div>
                        <div><div class="stat-val" id="total-val">0</div><label>TOTAL LEARNERS</label></div>
                    </div>
                </div>
            </div>

            <div id="v-reg" class="hidden">
                <div class="form-panel">
                    <h2 style="font-weight: 900; margin-bottom: 35px; border-left: 6px solid var(--primary); padding-left: 20px;">ENROLLMENT FORM</h2>
                    
                    <div class="form-grid">
                        <div class="group"><label>Full Name</label><input type="text" id="i-name"></div>
                        <div class="group"><label>Age</label><input type="number" id="i-age"></div>
                    </div>

                    <div class="form-grid">
                        <div class="group"><label>Date of Birth</label><input type="date" id="i-dob"></div>
                        <div class="group"><label>Health Status</label><input type="text" id="i-health" value="NORMAL"></div>
                    </div>

                    <div class="form-grid">
                        <div class="group"><label>Location</label><input type="text" id="i-loc"></div>
                        <div class="group">
                            <label>Class</label>
                            <select id="i-class">
                                <option>Primary 1</option><option>Primary 2</option><option>Primary 3</option>
                                <option>Primary 4</option><option>Primary 5</option><option>Primary 6</option><option>Primary 7</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-grid">
                        <div class="group"><label>Contact Number</label><input type="tel" id="i-tel" value="+256 "></div>
                        <div class="group"><label>LIN Number (System Gen)</label><input type="text" id="i-lin" readonly style="color:var(--primary);"></div>
                    </div>

                    <button class="btn-action" onclick="saveData()" id="save-btn">REGISTER TO CLOUD</button>
                </div>
            </div>

            <div id="v-list" class="hidden">
                <div class="table-card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                        <h2 style="font-weight: 900;">LEARNER DIRECTORY</h2>
                        <input type="text" placeholder="SEARCH NAME OR LIN..." style="width: 350px;" onkeyup="search(this)">
                    </div>
                    <div style="overflow-x: auto;">
                        <table id="data-table">
                            <thead>
                                <tr><th>Learner Name</th><th>LIN Number</th><th>Class</th><th>Location</th><th>Health</th><th>Status</th></tr>
                            </thead>
                            <tbody id="table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPA_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const client = supabase.createClient(SUPA_URL, SUPA_KEY);
        const SCH_ID = "PM001";

        function authenticate() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-sidebar').classList.remove('hidden');
            document.getElementById('app-main').classList.remove('hidden');
            init();
        }

        async function init() {
            const { data: s } = await client.from('Schools').select('*').eq('sch_id', SCH_ID).single();
            if(s) document.getElementById('school-title').innerText = s.school_name;
            
            document.getElementById('i-lin').value = "LIN-" + Math.floor(100000 + Math.random() * 900000);
            fetchRecords();
        }

        async function fetchRecords() {
            const { data } = await client.from('Students').select('*').eq('sch_id', SCH_ID);
            if(data) {
                document.getElementById('total-val').innerText = data.length;
                document.getElementById('table-body').innerHTML = data.map(r => `
                    <tr>
                        <td style="color:var(--primary); font-weight:800;">${r.name}</td>
                        <td style="font-family:monospace; color:#64748b;">${r.lin}</td>
                        <td>${r.class}</td>
                        <td style="font-size:0.75rem;">${r.location || 'N/A'}</td>
                        <td>${r.health_status || 'NORMAL'}</td>
                        <td><span class="tag-active">ACTIVE</span></td>
                    </tr>
                `).join('');
            }
        }

        async function saveData() {
            const btn = document.getElementById('save-btn');
            const data = {
                sch_id: SCH_ID,
                name: document.getElementById('i-name').value,
                lin: document.getElementById('i-lin').value,
                age: document.getElementById('i-age').value,
                dob: document.getElementById('i-dob').value,
                health_status: document.getElementById('i-health').value,
                location: document.getElementById('i-loc').value,
                class: document.getElementById('i-class').value,
                contact: document.getElementById('i-tel').value
            };

            if(!data.name) return alert("NAME REQUIRED");
            btn.innerText = "UPLOADING..."; btn.disabled = true;

            const { error } = await client.from('Students').insert([data]);
            if(!error) { alert("SUCCESS"); location.reload(); }
            else { alert(error.message); btn.innerText = "REGISTER"; btn.disabled = false; }
        }

        function showView(v, btn) {
            ['v-dash', 'v-reg', 'v-list'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('v-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            btn.classList.add('active');
        }

        function search(input) {
            let filter = input.value.toUpperCase();
            let rows = document.getElementById("data-table").getElementsByTagName("tr");
            for (let i = 1; i < rows.length; i++) {
                let txt = rows[i].innerText.toUpperCase();
                rows[i].style.display = txt.indexOf(filter) > -1 ? "" : "none";
            }
        }
    </script>
</body>
</html>
