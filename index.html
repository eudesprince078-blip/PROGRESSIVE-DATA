<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESMS Pro | Eudes Media</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0047AB;
            --secondary: #f8fafc;
            --accent: #10b981;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
            --sidebar-width: 260px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            display: flex;
            color: var(--text-main);
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width);
            background: #0f172a;
            height: 100vh;
            color: white;
            position: fixed;
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            box-sizing: border-box;
        }

        .brand-area {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 50px;
            color: var(--white);
            border-left: 4px solid var(--primary);
            padding-left: 15px;
        }

        .nav-menu { flex-grow: 1; }

        .nav-link {
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            color: #94a3b8;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .nav-link.active { border-right: 4px solid var(--primary); }

        /* --- MAIN CONTENT --- */
        .main-content {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            padding: 40px;
            box-sizing: border-box;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .school-info h1 { margin: 0; font-size: 1.8rem; }
        .school-info p { margin: 5px 0 0; color: var(--text-muted); }

        /* --- CARDS & GRIDS --- */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .card-stat {
            background: var(--white);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        .card-stat span { color: var(--text-muted); font-size: 0.9rem; font-weight: 600; }
        .card-stat h2 { margin: 10px 0 0; font-size: 2rem; color: var(--primary); }

        .content-card {
            background: var(--white);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        /* --- TABLE DESIGN --- */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .data-table th {
            text-align: left;
            padding: 15px;
            background: #f8fafc;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .data-table td {
            padding: 15px;
            border-bottom: 1px solid #f1f5f9;
        }

        .data-table tr:hover { background: #fdfdfd; }

        /* --- FORM STYLING --- */
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.85rem; }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border 0.2s;
        }
        input:focus { outline: none; border-color: var(--primary); ring: 2px solid var(--primary); }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-primary:hover { background: #003685; transform: translateY(-1px); }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .badge-success { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand-area">EUDES MEDIA</div>
        <nav class="nav-menu">
            <div class="nav-link active">🏠 Overview</div>
            <div class="nav-link">👥 Students</div>
            <div class="nav-link">📊 Academics</div>
            <div class="nav-link">⚙️ Settings</div>
        </nav>
        <div style="font-size: 0.7rem; color: #475569;">© 2026 ESMS Professional</div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div class="school-info">
                <h1 id="sName">Progressive Mothers</h1>
                <p id="sMotto">Excellence in Education</p>
            </div>
            <button class="btn-primary" style="background:#e11d48;" onclick="location.reload()">Logout</button>
        </header>

        <section class="stats-row">
            <div class="card-stat">
                <span>Total Enrollment</span>
                <h2 id="totalP">0</h2>
            </div>
            <div class="card-stat">
                <span>System Status</span>
                <h2 style="color: var(--accent); font-size: 1.4rem;">Premium Active</h2>
            </div>
            <div class="card-stat">
                <span>License ID</span>
                <h2 id="sID" style="font-size: 1.2rem; color: var(--text-muted);">---</h2>
            </div>
        </section>

        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 30px;">
            <div class="content-card">
                <h3 style="margin-top:0">Quick Admission</h3>
                <div class="input-group">
                    <label>Student Full Name</label>
                    <input type="text" id="pName" placeholder="Enter name">
                </div>
                <div class="input-group">
                    <label>Home Village / Zone</label>
                    <input type="text" id="pLoc" placeholder="e.g. Seeta">
                </div>
                <button class="btn-primary" style="width:100%" onclick="addStudent()">Register Pupil</button>
            </div>

            <div class="content-card">
                <h3 style="margin-top:0">Recent Admissions</h3>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Location</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="studentList">
                        <tr><td colspan="3" style="text-align:center; padding:40px; color:#94a3b8;">Loading records...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SUPABASE_KEY = 'YOUR_ANON_KEY';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // This ID will come from your login session
        let activeSchoolID = "EUDES-PM-2026"; 

        async function init() {
            // 1. Fetch School Branding
            const { data: school } = await _supabase.from('schools').select('*').eq('school_id', activeSchoolID).single();
            if(school) {
                document.getElementById('sName').innerText = school.school_name;
                document.getElementById('sMotto').innerText = school.motto;
                document.getElementById('sID').innerText = school.school_id;
            }

            // 2. Fetch Students
            const { count, data: students } = await _supabase.from('students').select('*', { count: 'exact' }).eq('school_id', activeSchoolID);
            
            document.getElementById('totalP').innerText = count || 0;
            const list = document.getElementById('studentList');
            
            if(students && students.length > 0) {
                list.innerHTML = students.map(s => `
                    <tr>
                        <td style="font-weight:600">${s.name}</td>
                        <td style="color:#64748b">${s.location || 'Not Set'}</td>
                        <td><span class="badge badge-success">Enrolled</span></td>
                    </tr>
                `).reverse().join('');
            } else {
                list.innerHTML = "<tr><td colspan='3' style='text-align:center'>No students found.</td></tr>";
            }
        }

        async function addStudent() {
            const name = document.getElementById('pName').value;
            const loc = document.getElementById('pLoc').value;
            if(!name) return;

            const { error } = await _supabase.from('students').insert([{
                name: name,
                location: loc,
                school_id: activeSchoolID
            }]);

            if(!error) {
                document.getElementById('pName').value = '';
                document.getElementById('pLoc').value = '';
                init();
            }
        }

        init();
    </script>
</body>
</html>
