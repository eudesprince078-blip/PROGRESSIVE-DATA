```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EUDES MEDIA PRO SYSTEM</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}

.container { padding:20px; }

.card {
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

input, select {
    padding:10px;
    width:100%;
    margin:5px 0;
    border-radius:8px;
    border:none;
}

button {
    padding:10px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

table {
    width:100%;
    border-collapse: collapse;
}

th, td {
    padding:10px;
    border-bottom:1px solid #333;
}

.stats {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

.stat {
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    text-align:center;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="login">
    <div class="card">
        <h2>Login</h2>
        <input id="schoolId" placeholder="School ID">
        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p id="msg"></p>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">

<div class="card">
    <h2>Dashboard</h2>
</div>

<div class="stats">
    <div class="stat"><h2 id="totalStudents">0</h2><p>Students</p></div>
    <div class="stat"><h2 id="totalPaid">0</h2><p>Fees Paid</p></div>
    <div class="stat"><h2 id="totalBalance">0</h2><p>Balance</p></div>
</div>

<div class="card">
    <h3>Add Student</h3>
    <input id="name" placeholder="Name">
    <input id="class" placeholder="Class">
    <input id="contact" placeholder="Contact">
    <input id="fees" placeholder="Fees Expected">
    <button onclick="addStudent()">Save Student</button>
</div>

<div class="card">
    <h3>Students</h3>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Class</th>
                <th>Paid</th>
                <th>Balance</th>
            </tr>
        </thead>
        <tbody id="table"></tbody>
    </table>
</div>

<canvas id="chart"></canvas>

</div>
</div>

<script>

const SUPABASE_URL = "https://kjftrwuucjdnhfwesrup.supabase.co";
const SUPABASE_KEY = "YOUR_SUPABASE_KEY";

let SCHOOL_ID = null;
let students = [];

// LOGIN
async function login() {

    const school = document.getElementById("schoolId").value;
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const res = await fetch(`${SUPABASE_URL}/rest/v1/users?school_id=eq.${school}&username=eq.${username}&password=eq.${password}`, {
        headers:{
            apikey:SUPABASE_KEY,
            Authorization:`Bearer ${SUPABASE_KEY}`
        }
    });

    const data = await res.json();

    if(data.length === 0){
        document.getElementById("msg").innerText = "Login failed";
        return;
    }

    SCHOOL_ID = school;

    document.getElementById("login").style.display="none";
    document.getElementById("dashboard").style.display="block";

    loadStudents();
}

// LOAD
async function loadStudents(){
    const res = await fetch(`${SUPABASE_URL}/rest/v1/Students?school_id=eq.${SCHOOL_ID}`, {
        headers:{
            apikey:SUPABASE_KEY,
            Authorization:`Bearer ${SUPABASE_KEY}`
        }
    });

    students = await res.json();
    render();
}

// ADD
async function addStudent(){

    const data = {
        name:document.getElementById("name").value,
        class:document.getElementById("class").value,
        contact:document.getElementById("contact").value,
        fees_expected:parseInt(document.getElementById("fees").value),
        fees_paid:0,
        school_id:SCHOOL_ID
    };

    const res = await fetch(`${SUPABASE_URL}/rest/v1/Students`,{
        method:"POST",
        headers:{
            apikey:SUPABASE_KEY,
            Authorization:`Bearer ${SUPABASE_KEY}`,
            "Content-Type":"application/json",
            "Prefer":"return=representation"
        },
        body:JSON.stringify(data)
    });

    const txt = await res.text();

    if(!res.ok){
        alert("Error: "+txt);
        return;
    }

    loadStudents();
}

// RENDER
function render(){

    let html="";
    let paid=0;
    let expected=0;

    students.forEach(s=>{
        const bal = (s.fees_expected||0)-(s.fees_paid||0);
        paid += s.fees_paid||0;
        expected += s.fees_expected||0;

        html += `
        <tr>
            <td>${s.name}</td>
            <td>${s.class}</td>
            <td>${s.fees_paid||0}</td>
            <td>${bal}</td>
        </tr>`;
    });

    document.getElementById("table").innerHTML = html;

    document.getElementById("totalStudents").innerText = students.length;
    document.getElementById("totalPaid").innerText = paid;
    document.getElementById("totalBalance").innerText = expected-paid;

    drawChart(paid, expected);
}

// CHART
function drawChart(paid, expected){

    new Chart(document.getElementById("chart"), {
        type:'bar',
        data:{
            labels:["Paid","Expected"],
            datasets:[{
                data:[paid, expected]
            }]
        }
    });
}

</script>

</body>
</html>
```
