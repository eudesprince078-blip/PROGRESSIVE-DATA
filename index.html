<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shield Health Uganda</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Inter', sans-serif; }
        body { background: #eef2f7; display: flex; justify-content: center; padding: 20px; }
        .app { max-width: 500px; width: 100%; background: white; border-radius: 32px; overflow: hidden; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1); }
        .header { background: #0a2b5e; color: white; padding: 24px 20px; }
        .header h1 { font-size: 1.6rem; }
        .header h1 span { color: #F5B042; }
        .content { padding: 20px; }
        .card { background: #f9fafc; border-radius: 24px; padding: 16px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        button { background: #0a2b5e; color: white; border: none; padding: 12px 16px; border-radius: 40px; width: 100%; font-weight: 600; cursor: pointer; margin-top: 8px; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 40px; border: 1px solid #cbd5e1; margin: 8px 0; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .badge { background: #e2e8f0; padding: 4px 12px; border-radius: 40px; font-size: 0.75rem; }
        .gold-text { color: #F5B042; font-weight: bold; }
        .nav { display: flex; justify-content: space-around; border-top: 1px solid #e2e8f0; padding: 12px; background: white; }
        .nav-item { text-align: center; flex: 1; cursor: pointer; color: #64748b; }
        .nav-item.active { color: #0a2b5e; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="header">
        <h1>Shield<span>Health</span> Uganda</h1>
        <div id="userStatus">Securing your health</div>
    </div>
    <div id="authSection" class="content">
        <div class="card">
            <h3>Welcome to Shield Health</h3>
            <p>Sign up or log in with email</p>
            <input type="email" id="email" placeholder="Email address">
            <input type="password" id="password" placeholder="Password (min 6 chars)">
            <button id="signUpBtn">Sign Up</button>
            <button id="signInBtn" style="background: #2c3e66;">Log In</button>
            <div id="authMessage" style="margin-top: 12px; font-size: 0.8rem;"></div>
        </div>
    </div>

    <div id="appSection" class="hidden">
        <div class="content" id="mainContent"></div>
        <div class="nav" id="bottomNav">
            <div class="nav-item active" data-tab="dashboard">🏠 Dashboard</div>
            <div class="nav-item" data-tab="buy">🛡️ Buy Policy</div>
            <div class="nav-item" data-tab="claims">📋 Claims</div>
            <div class="nav-item" data-tab="profile">👤 Profile</div>
        </div>
    </div>
</div>

<script>
    // SUPABASE CONFIGURATION - REPLACE WITH YOUR VALUES
    const SUPABASE_URL = "https://your-project.supabase.co";
    const SUPABASE_ANON_KEY = "your-anon-key-here";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let currentTab = "dashboard";

    // UI elements
    const authSection = document.getElementById("authSection");
    const appSection = document.getElementById("appSection");
    const mainContent = document.getElementById("mainContent");
    const userStatus = document.getElementById("userStatus");

    // Auth functions
    async function handleSignUp() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const { data, error } = await supabase.auth.signUp({ email, password });
        if (error) showAuthMessage(error.message);
        else showAuthMessage("Check your email (including spam) to confirm your account.", "green");
    }

    async function handleSignIn() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) showAuthMessage(error.message);
        else onLogin(data.user);
    }

    function showAuthMessage(msg, color = "red") {
        const div = document.getElementById("authMessage");
        div.style.color = color;
        div.innerText = msg;
    }

    async function onLogin(user) {
        currentUser = user;
        authSection.classList.add("hidden");
        appSection.classList.remove("hidden");
        userStatus.innerText = `Hello, ${user.email}`;
        // ensure profile exists
        const { data: profile } = await supabase.from("profiles").select().eq("id", user.id).single();
        if (!profile) {
            await supabase.from("profiles").insert({ id: user.id, full_name: user.email.split("@")[0] });
        }
        renderCurrentTab();
    }

    async function logout() {
        await supabase.auth.signOut();
        currentUser = null;
        authSection.classList.remove("hidden");
        appSection.classList.add("hidden");
        document.getElementById("email").value = "";
        document.getElementById("password").value = "";
    }

    // Rendering different tabs (simplified for demo)
    async function renderCurrentTab() {
        if (!currentUser) return;
        if (currentTab === "dashboard") await renderDashboard();
        if (currentTab === "buy") await renderBuyPolicy();
        if (currentTab === "claims") await renderClaims();
        if (currentTab === "profile") await renderProfile();
    }

    async function renderDashboard() {
        const { data: policies } = await supabase.from("policies").select("*").eq("user_id", currentUser.id);
        const { data: claims } = await supabase.from("claims").select("*").eq("user_id", currentUser.id);
        mainContent.innerHTML = `
            <div class="card">
                <div class="flex-between"><strong>Active Policies</strong> <span class="badge">${policies?.length || 0}</span></div>
                <div class="flex-between"><strong>Pending Claims</strong> <span class="badge">${claims?.filter(c => c.status === 'pending').length || 0}</span></div>
                <button id="newClaimBtn">➕ Submit a Claim</button>
            </div>
            <div class="card">
                <strong>Recent Notifications</strong><br>
                <p>✅ Welcome to Shield Health Uganda – secure your future today.</p>
                <p>📧 All emails are sent via Brevo (free & reliable).</p>
            </div>
        `;
        document.getElementById("newClaimBtn")?.addEventListener("click", () => { currentTab = "claims"; renderCurrentTab(); });
    }

    async function renderBuyPolicy() {
        mainContent.innerHTML = `
            <div class="card">
                <h3>Health Plans</h3>
                <select id="planSelect">
                    <option value="Individual">Individual – UGX 120,000/year</option>
                    <option value="Family">Family (up to 5) – UGX 350,000/year</option>
                    <option value="Senior">Senior (60+) – UGX 280,000/year</option>
                </select>
                <button id="purchaseBtn">Purchase Policy</button>
            </div>
        `;
        document.getElementById("purchaseBtn")?.addEventListener("click", async () => {
            const plan = document.getElementById("planSelect").value.split(" – ")[0];
            const premium = { Individual: 120000, Family: 350000, Senior: 280000 }[plan];
            await supabase.from("policies").insert({
                user_id: currentUser.id,
                plan_type: plan,
                premium,
                start_date: new Date().toISOString().slice(0,10),
                end_date: new Date(new Date().setFullYear(new Date().getFullYear()+1)).toISOString().slice(0,10),
                status: "active"
            });
            alert("Policy purchased! Check your dashboard.");
            currentTab = "dashboard";
            renderCurrentTab();
        });
    }

    async function renderClaims() {
        const { data: claims } = await supabase.from("claims").select("*").eq("user_id", currentUser.id);
        mainContent.innerHTML = `
            <div class="card">
                <h3>Submit a Claim</h3>
                <textarea id="claimDesc" placeholder="Describe your medical expense or accident"></textarea>
                <input type="file" id="claimFile" accept="image/*,application/pdf">
                <button id="submitClaimBtn">Submit Claim</button>
            </div>
            <div class="card">
                <h3>Your Claims</h3>
                ${claims?.map(c => `<div style="border-bottom:1px solid #ccc; padding:8px 0;"><strong>${c.id}</strong> – ${c.status} <br> ${c.description?.slice(0,50)}</div>`).join("") || "<p>No claims yet</p>"}
            </div>
        `;
        document.getElementById("submitClaimBtn")?.addEventListener("click", async () => {
            const description = document.getElementById("claimDesc").value;
            if (!description) return alert("Please describe your claim");
            await supabase.from("claims").insert({
                user_id: currentUser.id,
                description,
                status: "pending"
            });
            alert("Claim submitted. Admin will review.");
            renderClaims();
        });
    }

    async function renderProfile() {
        const { data: profile } = await supabase.from("profiles").select().eq("id", currentUser.id).single();
        mainContent.innerHTML = `
            <div class="card">
                <h3>Your Profile</h3>
                <p>Email: ${currentUser.email}</p>
                <p>Name: ${profile?.full_name || "Not set"}</p>
                <button id="logoutBtn">Sign Out</button>
            </div>
        `;
        document.getElementById("logoutBtn")?.addEventListener("click", logout);
    }

    // Navigation
    document.getElementById("bottomNav")?.addEventListener("click", (e) => {
        const tab = e.target.closest(".nav-item")?.dataset.tab;
        if (tab) {
            currentTab = tab;
            document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
            e.target.closest(".nav-item").classList.add("active");
            renderCurrentTab();
        }
    });

    document.getElementById("signUpBtn")?.addEventListener("click", handleSignUp);
    document.getElementById("signInBtn")?.addEventListener("click", handleSignIn);

    // Check existing session
    supabase.auth.getSession().then(({ data: { session } }) => {
        if (session?.user) onLogin(session.user);
    });
</script>
</body>
</html>
