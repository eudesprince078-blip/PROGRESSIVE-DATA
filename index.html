<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Progressive Mothers Management System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #001a33; --red: #e63946; --gold: #ffc107; --white: #ffffff; --green: #28a745; --wa: #25D366; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; margin: 0; padding: 0; }
        .header { background: var(--red); color: white; padding: 12px; position: sticky; top: 0; z-index: 1000; border-bottom: 4px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .school-title { font-size: 10px; font-weight: 900; line-height: 1.2; text-transform: uppercase; }
        .login-screen { position: fixed; inset: 0; background: var(--blue); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; color: white; text-align: center; }
        .pass-box { position: relative; width: 100%; max-width: 280px; margin-top: 15px; }
        .hero { background: var(--blue); color: white; padding: 15px 10px; text-align: center; }
        #clock { font-size: 38px; font-weight: 900; }
        .routine-box { background: var(--gold); color: var(--blue); padding: 12px; margin: -15px 15px 10px 15px; border-radius: 12px; text-align: center; font-weight: 900; font-size: 16px; text-transform: uppercase; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 10px 15px; }
        .stat-card { background: white; padding: 10px; border-radius: 12px; text-align: center; border-bottom: 4px solid var(--gold); }
        .stat-val { font-size: 22px; font-weight: 900; color: var(--blue); display: block; }
        .stat-lbl { font-size: 9px; font-weight: bold; color: #666; text-transform: uppercase; }
        .nav-tabs { display: flex; background: white; border-bottom: 2px solid #ddd; position: sticky; top: 62px; z-index: 900; }
        .tab { flex: 1; text-align: center; padding: 15px 5px; font-weight: 900; font-size: 11px; color: #666; cursor: pointer; }
        .tab.active { color: var(--blue); border-bottom: 4px solid var(--blue); background: #f8f9fa; }
        .item-card { background: white; border-radius: 12px; padding: 15px; margin: 10px 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 6px solid var(--blue); }
        .lin-tag { font-weight: 900; color: white; background: var(--blue); padding: 5px 12px; border-radius: 4px; font-size: 14px; display: inline-block; margin-bottom: 10px; border: 1px solid var(--gold); }
        .contact-row { display: flex; gap: 8px; margin-top: 15px; }
        .contact-btn { flex: 1; padding: 14px; border-radius: 8px; text-align: center; color: white; text-decoration: none; font-weight: 900; font-size: 11px; text-transform: uppercase; }
        .c-call { background: var(--blue); }
        .c-wa { background: var(--wa); }
        .btn-roll { padding: 15px; border-radius: 8px; border: none; font-weight: 900; min-width: 110px; color: white; cursor: pointer; }
        .present { background: var(--green); }
        .absent { background: var(--red); }
        .balance-box { background: #fdf2f2; border: 1px dashed var(--red); padding: 10px; border-radius: 8px; margin-top: 10px; font-weight: 900; text-align: center; color: var(--red); }
        input, select { width: 100%; padding: 14px; border: 2px solid #ccc; border-radius: 8px; font-size: 16px; margin-top: 8px; box-sizing: border-box; }
        input:disabled { background: #f0f0f0; cursor: not-allowed; border-color: #eee; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loginGate" class="login-screen">
    <div style="font-size: 18px; font-weight:900; color:var(--gold);">PROGRESSIVE MOTHERS SCHOOL</div>
    <div class="pass-box"><input id="key" type="password" placeholder="ACCESS KEY" style="text-align:center;"></div>
    <button onclick="secureLogin()" style="width:100%; max-width:250px; background:var(--gold); color:var(--blue); padding:18px; border:none; border-radius:10px; font-weight:900; margin-top:15px;">LOGIN</button>
</div>

<div id="mainApp" class="hidden">
    <div class="header">
        <div class="school-title">PROGRESSIVE MOTHERS<br>MANAGEMENT</div>
        <div><button onclick="loadData()" style="background:var(--gold); border:none; padding:5px 10px; border-radius:5px; font-weight:bold; font-size:10px;">REFRESH</button></div>
    </div>

    <div class="hero">
        <div id="full-date">DATE</div>
        <div id="clock">00:00:00</div>
    </div>
    <div class="routine-box" id="r-task">LOADING...</div>

    <div class="dashboard">
        <div class="stat-card"><span class="stat-val" id="c-tot">0</span><span class="stat-lbl">Students</span></div>
        <div class="stat-card"><span class="stat-val" id="c-clr">0</span><span class="stat-lbl">Cleared</span></div>
        <div class="stat-card"><span class="stat-val" id="c-abs" style="color:var(--red)">0</span><span class="stat-lbl">Absent</span></div>
    </div>

    <div class="nav-tabs">
        <div class="tab" id="tab-rec" onclick="tab('rec')">RECORDS</div>
        <div class="tab" id="tab-adm" onclick="tab('adm')">ADMISSION / FINANCE</div>
        <div class="tab" id="tab-roll" onclick="tab('roll')">ROLL CALL</div>
    </div>

    <div id="v-rec" class="hidden">
        <div style="padding:15px;"><input id="searchBar" placeholder="🔍 Search Name, LIN, or Class..." oninput="loadData()"></div>
        <div id="dataList"></div>
    </div>

    <div id="v-adm" class="hidden" style="padding:15px;">
        <div style="background:white; padding:20px; border-radius:15px; border:1px solid #ddd;">
            <input type="hidden" id="editId">
            <label>STUDENT NAME</label><input id="name" placeholder="Full Name">
            <label>LIN NUMBER</label><input id="lin" placeholder="LIN">
            <label>CLASS</label>
            <select id="cls"><option>Baby Class</option><option>Middle Class</option><option>Top Class</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
            <label>CONTACT</label><input id="contact" type="tel" placeholder="07...">
            
            <div style="margin-top:20px; padding-top:10px; border-top:2px solid var(--gold);">
                <label>FEES EXPECTED</label><input id="f_exp" type="number" oninput="calcBal()">
                <label>FEES PAID</label><input id="f_paid" type="number" oninput="calcBal()">
                <div class="balance-box">BALANCE: <span id="balDisplay">0</span> UGX</div>
            </div>
            <button onclick="submitData()" style="width:100%; background:var(--blue); color:white; padding:18px; border:none; border-radius:10px; font-weight:900; margin-top:20px;">UPDATE SYSTEM</button>
        </div>
    </div>

    <div id="v-roll" class="hidden" style="padding:15px;">
        <select id="rollClass" onchange="loadData()"><option value="">-- Choose Class --</option><option>Baby Class</option><option>Middle Class</option><option>Top Class</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
        <div id="rollData" style="margin-top:15px;"></div>
    </div>
</div>

<script>
    const SUPA_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
    const _client = supabase.createClient(SUPA_URL, SUPA_KEY);
    let role = "";

    function secureLogin() {
        const k = document.getElementById('key').value.trim().toUpperCase();
        if (k === "JESUS CARES") role = "Admin";
        else if (k === "FINANCE 256") role = "Finance";
        else if (k === "TEACH2026") role = "Teacher";
        else { alert("Access Denied"); return; }
        document.getElementById('loginGate').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        tab(role === "Teacher" ? 'roll' : 'rec');
        loadData();
    }

    function tab(t) {
        ['v-adm','v-rec','v-roll'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById('v-'+t).classList.remove('hidden');
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active');
    }

    function calcBal() {
        const exp = parseFloat(document.getElementById('f_exp').value) || 0;
        const paid = parseFloat(document.getElementById('f_paid').value) || 0;
        document.getElementById('balDisplay').innerText = (exp - paid).toLocaleString();
    }

    async function loadData() {
        const { data, error } = await _client.from('students').select('*').order('name');
        if(error) return;

        document.getElementById('c-tot').innerText = data.length;
        document.getElementById('c-clr').innerText = data.filter(s => parseFloat(s.fees_paid) >= parseFloat(s.fees_expected) && parseFloat(s.fees_expected) > 0).length;
        document.getElementById('c-abs').innerText = data.filter(s => s.is_absent).length;

        const q = document.getElementById('searchBar').value.toLowerCase();
        let filtered = q ? data.filter(s => s.name.toLowerCase().includes(q) || (s.lin && s.lin.toLowerCase().includes(q))) : data;

        const list = document.getElementById('dataList'); list.innerHTML = "";
        filtered.forEach(s => {
            const ph = s.contact || "";
            list.innerHTML += `<div class="item-card">
                <span class="lin-tag">LIN: ${s.lin || 'N/A'}</span><br>
                <b style="font-size:19px; color:var(--blue);">${s.name}</b><br>
                <small style="font-weight:bold;">${s.class}</small>
                <div class="contact-row">
                    <a href="tel:${ph}" class="contact-btn c-call">📞 CALL: ${ph}</a>
                    <a href="https://wa.me/${ph.startsWith('0')?'256'+ph.substring(1):ph}" class="contact-btn c-wa">💬 WHATSAPP</a>
                </div>
                <button onclick="editMode('${s.id}')" style="margin-top:12px; width:100%; padding:10px; border-radius:6px; font-weight:bold;">EDIT RECORD</button>
            </div>`;
        });

        const rCls = document.getElementById('rollClass').value;
        const rollList = document.getElementById('rollData'); rollList.innerHTML = "";
        data.filter(s => s.class === rCls).forEach(s => {
            rollList.innerHTML += `<div class="item-card" style="border-left-color:${s.is_absent?'red':'green'}">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b>${s.name}</b><br><small>LIN: ${s.lin || '---'}</small></div>
                    <button id="btn-${s.id}" class="btn-roll ${s.is_absent?'absent':'present'}" onclick="markAtt('${s.id}', ${!s.is_absent})">${s.is_absent?'ABSENT':'PRESENT'}</button>
                </div>
            </div>`;
        });
    }

    async function markAtt(id, status) {
        const btn = document.getElementById('btn-'+id); btn.innerText = "...";
        const { data: cur } = await _client.from('students').select('absent_days').eq('id', id).single();
        let newCount = status ? ((cur.absent_days || 0) + 1) : 0;
        await _client.from('students').update({ is_absent: status, absent_days: newCount }).eq('id', id);
        loadData();
    }

    async function editMode(id) {
        const { data } = await _client.from('students').select('*').eq('id', id).single();
        document.getElementById('editId').value = data.id;
        document.getElementById('name').value = data.name;
        document.getElementById('lin').value = data.lin || "";
        document.getElementById('cls').value = data.class;
        document.getElementById('contact').value = data.contact || "";
        document.getElementById('f_paid').value = data.fees_paid;
        document.getElementById('f_exp').value = data.fees_expected;
        
        // FINANCE RESTRICTION
        const isFin = (role === "Finance");
        ['name','lin','cls','contact'].forEach(id => document.getElementById(id).disabled = isFin);
        
        calcBal();
        tab('adm');
    }

    async function submitData() {
        const id = document.getElementById('editId').value;
        const payload = {
            fees_paid: parseFloat(document.getElementById('f_paid').value) || 0,
            fees_expected: parseFloat(document.getElementById('f_exp').value) || 0
        };
        // Add other fields only if NOT Finance
        if(role !== "Finance") {
            payload.name = document.getElementById('name').value;
            payload.lin = document.getElementById('lin').value;
            payload.class = document.getElementById('cls').value;
            payload.contact = document.getElementById('contact').value;
        }

        const { error } = id ? await _client.from('students').update(payload).eq('id', id) : await _client.from('students').insert([payload]);
        if(error) alert("Error saving!"); else { alert("Saved!"); loadData(); tab('rec'); }
    }

    setInterval(() => {
        const now = new Date();
        document.getElementById('full-date').innerText = now.toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
        const h = now.getHours();
        let t = "AFTER SCHOOL";
        if(h >= 8 && h < 10) t = "MORNING LESSONS";
        else if(h >= 10 && h < 11) t = "BREAK TIME";
        else if(h >= 11 && h < 13) t = "MID-DAY LESSONS";
        else if(h >= 13 && h < 14) t = "LUNCH BREAK";
        else if(h >= 14 && h < 17) t = "AFTERNOON LESSONS";
        document.getElementById('r-task').innerText = "ROUTINE: " + t;
    }, 1000);
</script>
</body>
</html>
