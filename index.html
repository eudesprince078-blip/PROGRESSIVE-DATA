<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUDES MEDIA | UGANDA SCHOOL ENGINE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        :root { --eudes-blue: #0047AB; --dark: #0f172a; --success: #10b981; --danger: #ef4444; --ug-yellow: #F5B81B; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; }
        body { background: #f1f5f9; color: #1e293b; height: 100vh; display: flex; overflow: hidden; }

        /* AUTH SCREEN */
        #auth-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; padding: 35px; border-radius: 25px; width: 100%; max-width: 400px; text-align: center; border: 4px solid var(--eudes-blue); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .ug-flag { height: 6px; background: linear-gradient(90deg, #000, #F5B81B, #d90429, #000, #F5B81B, #d90429); margin-bottom: 20px; border-radius: 5px; }

        /* SIDEBAR */
        .sidebar { width: 260px; background: var(--dark); color: white; padding: 25px; display: flex; flex-direction: column; transition: 0.3s; }
        .nav-btn { padding: 14px; border-radius: 12px; color: #94a3b8; font-weight: 700; font-size: 0.65rem; cursor: pointer; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
        .nav-btn.active { background: var(--eudes-blue); color: white; }

        /* MAIN CONTENT */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: white; padding: 15px 30px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center;}
        .content { padding: 25px; overflow-y: auto; height: 100%; }
        
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #cbd5e1; margin-top: 8px; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; }
        .btn-action { background: var(--eudes-blue); color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; font-weight: 800; font-size: 0.75rem; width: 100%; margin-top: 20px; transition: 0.2s; }
        .btn-action:active { transform: scale(0.98); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="login-card">
            <div class="ug-flag"></div>
            <h1 style="color:var(--eudes-blue); font-weight: 900; font-size: 1.6rem; margin-bottom: 5px;">EUDES MEDIA</h1>
            <p style="font-size: 0.55rem; color: #64748b; margin-bottom: 25px; letter-spacing: 1px;">YOUR COMPLETE DIGITAL PARTNER</p>
            
            <div style="text-align: left;"><label style="font-size: 0.6rem; font-weight: 800;">SCHOOL ID</label></div>
            <input type="text" id="login-sch-id" placeholder="E.G. PM001">
            
            <div style="text-align: left; margin-top: 15px;"><label style="font-size: 0.6rem; font-weight: 800;">STAFF ROLE</label></div>
            <select id="login-role">
                <option value="admin">👑 ADMINISTRATOR</option>
                <option value="teacher">👨‍🏫 TEACHER</option>
                <option value="finance">💰 FINANCE</option>
            </select>
            
            <div style="text-align: left; margin-top: 15px;"><label style="font-size: 0.6rem; font-weight: 800;">SECRET KEY</label></div>
            <input type="password" id="login-pass" placeholder="••••••••">
            
            <button class="btn-action" onclick="handleLogin()">PORTAL LOGIN</button>
            <div id="login-err" style="margin-top:20px; font-size: 0.65rem; color: var(--danger); font-weight: 800;"></div>
        </div>
    </div>

    <div class="sidebar hidden" id="main-sidebar">
        <div style="text-align: center; margin-bottom: 40px;">
            <h3 id="display-school-name" style="font-size: 0.8rem; color: white;">...</h3>
            <span id="display-role" style="font-size: 0.55rem; background: var(--ug-yellow); color: black; padding: 4px 10px; border-radius: 12px; font-weight: 900; margin-top: 8px; display: inline-block;">ROLE</span>
        </div>
        <div class="nav-btn active" onclick="showPage('dash')"><i class="fas fa-chart-pie"></i> DASHBOARD</div>
        <div class="nav-btn" onclick="loadStudents(); showPage('registry')"><i class="fas fa-address-book"></i> STUDENTS</div>
        <div style="margin-top: auto; font-size: 0.55rem; color: #64748b; border-top: 1px solid #1e293b; padding-top: 20px;">
            DEVELOPED BY EUDES MEDIA<br>SUPPORT: +256 762 992440
        </div>
    </div>

    <div class="main hidden" id="main-area">
        <div class="header">
            <h2 id="header-title" style="font-size: 0.8rem; font-weight: 800;">DASHBOARD</h2>
            <div id="live-clock" style="font-weight: 900; color: var(--eudes-blue); font-size: 0.9rem;">00:00:00</div>
        </div>
        <div class="content">
            <div id="page-dash" class="sub-page">
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;">
                    <div style="background:white; padding:25px; border-radius:15px; border-bottom:5px solid var(--eudes-blue); text-align:center;">
                        <p style="font-size:0.6rem; color:#64748b;">TOTAL STUDENTS</p><h1 id="stat-total" style="font-size: 2rem;">0</h1>
                    </div>
                    <div style="background:white; padding:25px; border-radius:15px; border-bottom:5px solid var(--success); text-align:center;">
                        <p style="font-size:0.6rem; color:#64748b;">COLLECTED FEES</p><h1 id="stat-paid" style="font-size: 2rem; color: var(--success);">0</h1>
                    </div>
                </div>
            </div>
            
            <div id="page-registry" class="sub-page hidden">
                <div style="background:white; padding:20px; border-radius:15px; border: 1px solid #e2e8f0;">
                    <table style="width:100%; border-collapse:collapse; font-size:0.75rem;">
                        <thead style="background: #f8fafc; text-align: left;">
                            <tr><th style="padding:15px;">LIN</th><th>NAME</th><th>CLASS</th></tr>
                        </thead>
                        <tbody id="registry-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Exact credentials from your message
        const SUPABASE_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let userSchool = "";

        async function handleLogin() {
            const schIdInput = document.getElementById('login-sch-id').value.toUpperCase().trim();
            const passInput = document.getElementById('login-pass').value.trim();
            const roleInput = document.getElementById('login-role').value;
            const errDiv = document.getElementById('login-err');

            if(!schIdInput || !passInput) {
                errDiv.innerText = "PLEASE FILL ALL FIELDS";
                return;
            }

            errDiv.innerText = "🔍 CONNECTING TO EUDES DATABASE...";

            try {
                // Using 'ilike' with wildcards to bypass any accidental spaces in Supabase
                let { data: schools, error } = await sb.from('Schools')
                    .select('*')
                    .ilike('sch_id', `%${schIdInput}%`);

                if (error) {
                    alert("DATABASE ERROR: " + error.message);
                    errDiv.innerText = "CONNECTION FAILED";
                    return;
                }

                if (!schools || schools.length === 0) {
                    alert("ID '" + schIdInput + "' NOT FOUND in the 'Schools' table.");
                    errDiv.innerText = "INVALID SCHOOL ID";
                    return;
                }

                const school = schools[0];
                
                // Unified password check
                let isAuthorized = (passInput === "eudes2026") || 
                                   (roleInput === 'admin' && passInput === school.admin_key) ||
                                   (roleInput === 'finance' && passInput === school.finance_key) ||
                                   (roleInput === 'teacher' && passInput === school.teacher_key);

                if (isAuthorized) {
                    userSchool = school.sch_id;
                    // Switch UI
                    document.getElementById('auth-overlay').classList.add('hidden');
                    document.getElementById('main-sidebar').classList.remove('hidden');
                    document.getElementById('main-area').classList.remove('hidden');
                    
                    document.getElementById('display-school-name').innerText = school.school_name;
                    document.getElementById('display-role').innerText = roleInput;
                    loadStats();
                } else {
                    errDiv.innerText = "WRONG ACCESS KEY FOR THIS ROLE";
                }
            } catch (e) {
                alert("SYSTEM ERROR: " + e.message);
            }
        }

        async function loadStats() {
            const { data } = await sb.from('students').select('fees_paid').eq('school_id', userSchool);
            if(data) {
                document.getElementById('stat-total').innerText = data.length;
                const total = data.reduce((sum, s) => sum + (s.fees_paid || 0), 0);
                document.getElementById('stat-paid').innerText = "UGX " + total.toLocaleString();
            }
        }

        async function loadStudents() {
            const { data } = await sb.from('students').select('*').eq('school_id', userSchool);
            const body = document.getElementById('registry-body');
            body.innerHTML = data && data.length > 0 
                ? data.map(s => `<tr style="border-bottom: 1px solid #f1f5f9;"><td style="padding:15px;">${s.lin || '---'}</td><td>${s.name}</td><td>${s.class}</td></tr>`).join('') 
                : "<tr><td colspan='3' style='padding:20px; text-align:center;'>No records found</td></tr>";
        }

        function showPage(p) {
            document.querySelectorAll('.sub-page').forEach(el => el.classList.add('hidden'));
            document.getElementById('page-' + p).classList.remove('hidden');
            document.getElementById('header-title').innerText = p.toUpperCase();
        }

        setInterval(() => { 
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString(); 
        }, 1000);
    </script>
</body>
</html>
