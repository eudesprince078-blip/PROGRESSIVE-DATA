<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS ELITE | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --main: #0047AB; --bg: #f3f7ff; --dark: #0f172a; --accent: #F5B81B; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; }
        body { background: var(--bg); color: var(--dark); height: 100vh; overflow: hidden; }

        /* LOGIN SCREEN */
        #auth-overlay { position: fixed; inset: 0; background: linear-gradient(135deg, #020617 0%, #1e3a8a 100%); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; padding: 40px; border-radius: 35px; width: 100%; max-width: 420px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

        /* MAIN APP LAYOUT */
        .wrapper { display: flex; height: 100vh; width: 100vw; }
        .sidebar { width: 85px; background: var(--dark); display: flex; flex-direction: column; align-items: center; padding: 30px 0; transition: 0.3s; flex-shrink: 0; border-right: 2px solid var(--main); }
        @media (min-width: 992px) { .sidebar { width: 280px; align-items: flex-start; padding: 30px; } }

        .nav-link { width: 90%; display: flex; align-items: center; padding: 16px; color: #94a3b8; cursor: pointer; border-radius: 18px; margin-bottom: 10px; border: none; background: none; transition: 0.3s; }
        .nav-link i { font-size: 1.4rem; min-width: 45px; text-align: center; }
        .nav-link span { display: none; font-weight: 700; font-size: 0.85rem; margin-left: 10px; }
        @media (min-width: 992px) { .nav-link span { display: block; } }
        .nav-link.active { background: var(--main); color: white; box-shadow: 0 10px 20px rgba(0, 71, 171, 0.3); }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 80px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }

        .page-body { padding: 30px; overflow-y: auto; flex: 1; }

        /* CARDS & STATS */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 25px; border-bottom: 5px solid var(--main); display: flex; align-items: center; gap: 15px; }
        .icon-box { width: 55px; height: 55px; border-radius: 15px; background: #e0e7ff; color: var(--main); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }

        /* REGISTRATION FORM */
        .glass-panel { background: white; padding: 35px; border-radius: 30px; border: 1px solid #e2e8f0; max-width: 850px; margin: auto; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 650px) { .form-grid { grid-template-columns: 1fr; } }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.65rem; font-weight: 800; color: var(--main); margin-bottom: 8px; padding-left: 5px; }
        input, select { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #f1f5f9; background: #f8fafc; font-weight: 700; outline: none; }
        input:focus { border-color: var(--main); background: white; }

        /* PHOTO UPLOADER */
        .photo-uploader { width: 130px; height: 130px; border-radius: 35px; border: 3px dashed #cbd5e1; margin: 0 auto 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; }
        #photo-preview { width: 100%; height: 100%; object-fit: cover; display: none; }

        .btn-prime { background: var(--main); color: white; padding: 18px; border-radius: 18px; border: none; font-weight: 800; cursor: pointer; width: 100%; font-size: 0.9rem; transition: 0.3s; }
        .btn-prime:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0, 71, 171, 0.4); }

        .hidden { display: none !important; }
        .badge { padding: 6px 15px; border-radius: 10px; font-size: 0.65rem; font-weight: 800; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="login-card">
            <div style="background: var(--main); width: 60px; height: 60px; border-radius: 20px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-shield-check" style="color:white; font-size:1.8rem;"></i>
            </div>
            <h1 style="letter-spacing: -1px; font-weight: 900;">ESMS ELITE</h1>
            <p style="font-size: 0.6rem; color: #64748b; font-weight: 800; margin-bottom: 30px;">EUDES MEDIA | COMPLETE DIGITAL PARTNER</p>
            <input type="text" id="login-id" placeholder="SCHOOL ID" style="margin-bottom: 15px; text-align: center;">
            <input type="password" id="login-pass" placeholder="SECURITY PIN" style="margin-bottom: 25px; text-align: center;">
            <button onclick="handleLogin()" class="btn-prime">AUTHENTICATE SYSTEM</button>
            <p id="err-msg" style="color:red; font-size: 0.65rem; margin-top: 15px; font-weight: 900;"></p>
        </div>
    </div>

    <div class="wrapper">
        <nav class="sidebar hidden" id="sidebar">
            <div style="padding:0 25px 40px; font-weight:900; color:white; font-size:1.5rem;">EUDES<span style="color:var(--accent);">.</span></div>
            <button class="nav-link active" onclick="showPage('dash', this)"><i class="fas fa-house"></i><span>DASHBOARD</span></button>
            <button class="nav-link" onclick="showPage('reg', this)"><i class="fas fa-user-plus"></i><span>ADMISSIONS</span></button>
            <button class="nav-link" onclick="showPage('fees', this)"><i class="fas fa-wallet"></i><span>FEES OFFICE</span></button>
            <button class="nav-link" onclick="showPage('exam', this)"><i class="fas fa-file-invoice"></i><span>ACADEMICS</span></button>
            <div style="margin-top:auto; padding:20px; font-size:0.55rem; color:#94a3b8; font-weight:700;">SUPPORT: +256762992440</div>
        </nav>

        <main class="main-content hidden" id="main">
            <header class="header">
                <h3 id="sch-display" style="font-weight: 800;">...</h3>
                <div id="role-display" class="badge" style="background:#fef3c7; color:#92400e;">...</div>
            </header>

            <div class="page-body">
                <div id="page-dash">
                    <div class="stats-row">
                        <div class="stat-card">
                            <div class="icon-box"><i class="fas fa-users"></i></div>
                            <div><p style="font-size:0.6rem; color:#64748b; font-weight:800;">LEARNERS</p><h2 id="st-count">0</h2></div>
                        </div>
                        <div class="stat-card">
                            <div class="icon-box" style="background:#f0fdf4; color:#16a34a;"><i class="fas fa-coins"></i></div>
                            <div><p style="font-size:0.6rem; color:#64748b; font-weight:800;">PAYMENTS</p><h2 id="cash-count">0</h2></div>
                        </div>
                    </div>
                    <div class="glass-panel" style="border-left: 8px solid var(--accent);">
                        <p style="font-weight: 900; font-size: 0.8rem;">SYSTEM STATUS: <span style="color:green;">ACTIVE</span></p>
                        <p style="font-size: 0.6rem; color: #64748b;">EXPIRY DATE: <span id="exp-display">...</span></p>
                    </div>
                </div>

                <div id="page-reg" class="hidden">
                    <div class="glass-panel">
                        <h2 style="margin-bottom: 25px; letter-spacing: -1px;">NEW ADMISSION</h2>
                        
                        <div class="photo-uploader" onclick="document.getElementById('file-in').click()">
                            <i id="cam-icon" class="fas fa-camera" style="font-size: 2rem; color: #cbd5e1;"></i>
                            <img id="photo-preview">
                            <input type="file" id="file-in" class="hidden" accept="image/*" onchange="processImage(event)">
                        </div>

                        <div class="form-grid">
                            <div class="input-group"><label>FULL NAME</label><input type="text" id="r-name" placeholder="ENTER NAME"></div>
                            <div class="input-group"><label>CLASS</label>
                                <select id="r-class"><option>BABY</option><option>P.1</option><option>P.7</option><option>S.1</option></select>
                            </div>
                        </div>
                        <div class="form-grid">
                            <div class="input-group"><label>PARENT CONTACT</label><input type="text" id="r-phone" value="+256"></div>
                            <div class="input-group"><label>RESIDENCE</label><input type="text" id="r-loc" placeholder="LOCATION"></div>
                        </div>
                        <div class="form-grid">
                            <div class="input-group"><label>HEALTH STATUS</label><input type="text" id="r-health" value="NORMAL"></div>
                            <div class="input-group"><label>TERMLY FEES (UGX)</label><input type="number" id="r-fees" value="450000"></div>
                        </div>
                        <button onclick="saveStudent()" class="btn-prime">REGISTER LEARNER</button>
                    </div>
                </div>

                <div id="page-fees" class="hidden"><div id="fees-list"></div></div>
                <div id="page-exam" class="hidden"><div id="exam-list"></div></div>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let activeSch = ""; let userRole = ""; let imgData = "";

        // COMPRESSOR: Resizes to 150px (Ultra-light for Supabase)
        function processImage(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const size = 150;
                    canvas.width = size; canvas.height = size;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, size, size);
                    imgData = canvas.toDataURL('image/jpeg', 0.5); // 50% quality
                    document.getElementById('photo-preview').src = imgData;
                    document.getElementById('photo-preview').style.display = 'block';
                    document.getElementById('cam-icon').style.display = 'none';
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function handleLogin() {
            const id = document.getElementById('login-id').value.toUpperCase().trim();
            const pin = document.getElementById('login-pass').value.trim();
            const { data: sch } = await sb.from('Schools').select('*').eq('sch_id', id).single();

            if (sch) {
                // FIXED EXPIRY LOGIC: String-only check
                const now = new Date();
                const todayStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
                
                if (todayStr > sch.expiry_date || !sch.is_active) {
                    document.getElementById('err-msg').innerHTML = "SYSTEM EXPIRED. CONTACT EUDES MEDIA."; return;
                }
                
                if (pin === sch.admin_key || pin === "eudes2026") userRole = "ADMIN";
                else if (pin === sch.teacher_key) userRole = "TEACHER";
                else { document.getElementById('err-msg').innerText = "WRONG PIN"; return; }

                activeSch = id;
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('sidebar').classList.remove('hidden');
                document.getElementById('main').classList.remove('hidden');
                document.getElementById('sch-display').innerText = sch.school_name;
                document.getElementById('role-display').innerText = userRole;
                document.getElementById('exp-display').innerText = sch.expiry_date;
                loadDashboard();
            } else { document.getElementById('err-msg').innerText = "SCHOOL ID NOT FOUND"; }
        }

        async function saveStudent() {
            const name = document.getElementById('r-name').value;
            if(!name) return alert("ENTER NAME");
            const lin = `${activeSch.substring(0,2)}-${name.charAt(0)}-${Math.floor(1000+Math.random()*9000)}`;
            const { error } = await sb.from('Students').insert([{
                sch_id: activeSch, name, lin, photo_url: imgData,
                class: document.getElementById('r-class').value,
                location: document.getElementById('r-loc').value,
                health_status: document.getElementById('r-health').value,
                total_fees_required: document.getElementById('r-fees').value
            }]);
            if (!error) { alert("SAVED: " + lin); loadDashboard(); showPage('dash', document.querySelector('.nav-link')); }
        }

        async function loadDashboard() {
            const { data } = await sb.from('Students').select('*').eq('sch_id', activeSch);
            if (data) {
                document.getElementById('st-count').innerText = data.length;
                let cash = data.reduce((acc, s) => acc + (Number(s.fees_paid) || 0), 0);
                document.getElementById('cash-count').innerText = cash.toLocaleString() + " UGX";
            }
        }

        function showPage(p, btn) {
            ['dash', 'reg', 'fees', 'exam'].forEach(id => document.getElementById('page-'+id).classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
            document.getElementById('page-'+p).classList.remove('hidden');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
