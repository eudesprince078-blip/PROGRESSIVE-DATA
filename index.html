<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMS Registry | Stable</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --pms-blue: #1e40af; --pms-red: #e11d48; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #fdf2f8; padding-bottom: 60px; }
        header { background: var(--pms-red); color: white; padding: 15px; text-align: center; display: flex; justify-content: space-between; align-items: center; }
        .hero { background: var(--pms-blue); color: white; padding: 30px 20px 50px; text-align: center; border-radius: 0 0 40px 40px; }
        
        .dash-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; margin-top: -30px; }
        .stat-card { background: white; padding: 15px; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-bottom: 4px solid var(--pms-red); }
        .stat-num { display: block; font-size: 26px; font-weight: 900; color: var(--pms-blue); }
        .stat-label { font-size: 11px; font-weight: bold; color: #64748b; text-transform: uppercase; }

        .container { max-width: 450px; margin: 0 auto; padding: 10px; }
        .card { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 15px; }
        
        input, select, textarea { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; border: 1.5px solid #e2e8f0; font-size: 15px; box-sizing: border-box; }
        .btn-save { background: var(--pms-blue); color: white; border: none; width: 100%; padding: 16px; border-radius: 15px; font-weight: bold; cursor: pointer; }
        
        .s-box { background: white; padding: 18px; border-radius: 20px; margin-bottom: 12px; border-left: 8px solid var(--pms-red); position: relative; }
        #adminArea { display: none; }
        .footer { text-align: center; padding: 20px; font-size: 11px; color: #64748b; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div style="width:40px"></div>
    <span style="font-weight: 900;">PMS REGISTRY</span>
    <div onclick="openAdmin()" style="cursor:pointer; font-size:24px;">⚙️</div>
</header>

<div class="hero">
    <h2 style="margin:0;">PROGRESSIVE MOTHERS</h2>
    <div style="font-style:italic; font-size:12px; opacity:0.8;">"With God everything is possible"</div>
</div>

<div class="dash-row">
    <div class="stat-card">
        <span class="stat-num" id="activeTotal">0</span>
        <span class="stat-label">Active Students</span>
    </div>
    <div class="stat-card">
        <span class="stat-num" id="filterCount">0</span>
        <span class="stat-label" id="filterLabel">Filtered Total</span>
    </div>
</div>

<div class="container">
    <div id="adminArea" class="card">
        <h3 style="margin-top:0; color:var(--pms-blue)">New Entry</h3>
        <input type="text" id="fName" placeholder="Student Full Name">
        <input type="text" id="fLoc" placeholder="Location (Where they stay)">
        <select id="fClass">
            <option>Baby Class</option><option>Middle Class</option><option>Top Class</option>
            <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
            <option>P.5</option><option>P.6</option><option>P.7</option>
        </select>
        <select id="fStatus">
            <option value="Active">Currently in School</option>
            <option value="Left">Left School</option>
        </select>
        <textarea id="fHealth" placeholder="Health Status (e.g. Normal)"></textarea>
        <input type="text" id="fPayCode" placeholder="Payment/Receipt Code">
        <button class="btn-save" onclick="saveRecord()">SAVE STUDENT RECORD</button>
    </div>

    <div class="card" style="padding: 10px; border: 2px solid var(--pms-blue);">
        <input type="text" id="search" placeholder="🔍 Search name or location..." onkeyup="applyFilters()" style="margin-bottom:10px;">
        <select id="classFilter" onchange="applyFilters()" style="margin-bottom:0; font-weight:bold;">
            <option value="All">All Classes (Show All)</option>
            <option>Baby Class</option><option>Middle Class</option><option>Top Class</option>
            <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
            <option>P.5</option><option>P.6</option><option>P.7</option>
        </select>
    </div>

    <div id="mainList"></div>
    <p id="errorNote" style="text-align:center; color:red; font-weight:bold;"></p>
</div>

<div class="footer">
    Developed by Eudes Media<br>
    +256762992440
</div>

<script>
    const SB_URL = "https://cpfttwvonuptqdpskobx.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwdGZ0d3ZvbnVwdHFkcHNrb2J4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MjAxNDUsImV4cCI6MjA4ODA5NjE0NX0.gnl0g0NKUv_zfyaJufSKSRO54drR6nGjIKgioj8Tcxc";

    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    let studentDB = [];

    async function loadData() {
        try {
            const { data, error } = await supabaseClient.from('students').select('*').order('name');
            if(error) throw error;
            studentDB = data || [];
            applyFilters();
        } catch (e) {
            document.getElementById('errorNote').innerText = "Database connection error. Check your API key.";
        }
    }

    function openAdmin() {
        const p = prompt("Password:");
        if(p === "mothers.comit1") document.getElementById('adminArea').style.display = 'block';
    }

    function applyFilters() {
        const sVal = document.getElementById('search').value.toLowerCase();
        const cVal = document.getElementById('classFilter').value;

        // Count only students marked "Currently in School"
        const activeCount = studentDB.filter(s => s.status !== 'Left').length;
        document.getElementById('activeTotal').innerText = activeCount;

        let filtered = studentDB.filter(s => {
            const mS = s.name.toLowerCase().includes(sVal) || (s.location && s.location.toLowerCase().includes(sVal));
            const mC = (cVal === "All") || (s.class === cVal);
            return mS && mC;
        });

        document.getElementById('filterCount').innerText = filtered.length;
        display(filtered);
    }

    function display(list) {
        const box = document.getElementById('mainList');
        box.innerHTML = "";
        list.forEach(s => {
            box.innerHTML += `
                <div class="s-box ${s.status === 'Left' ? 'opacity:0.5' : ''}">
                    <div style="font-weight:900; color:var(--pms-blue); font-size:18px;">${s.name}</div>
                    <div style="font-size:13px; color:#64748b;">📍 ${s.location} | 📚 ${s.class}</div>
                    <div style="background:#e0f2fe; padding:4px 8px; border-radius:5px; font-size:11px; margin-top:5px; display:inline-block;">
                        Code: ${s.payment_code || 'N/A'}
                    </div>
                </div>`;
        });
    }

    async function saveRecord() {
        const name = document.getElementById('fName').value;
        if(!name) return;
        const lin = name.charAt(0).toUpperCase() + "-" + Math.floor(1000 + Math.random() * 9000);

        const { error } = await supabaseClient.from('students').insert([{
            name: name, location: document.getElementById('fLoc').value,
            class: document.getElementById('fClass').value, status: document.getElementById('fStatus').value,
            health_status: document.getElementById('fHealth').value, payment_code: document.getElementById('fPayCode').value, lin: lin
        }]);
        if(error) alert("Save Error: " + error.message); else location.reload();
    }

    window.onload = loadData;
</script>
</body>
</html>
