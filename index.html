<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progressive Mother’s School | Eudes Media</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --brand-purple: #673ab7; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f0fa; margin: 0; padding: 0; }
        header { background: var(--brand-purple); color: white; padding: 30px 15px; text-align: center; border-bottom: 4px solid #4527a0; }
        .container { max-width: 450px; margin: 20px auto; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: var(--brand-purple); margin-top: 0; font-size: 1.3rem; border-left: 4px solid var(--brand-purple); padding-left: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 15px; background: var(--brand-purple); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .student-item { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .student-item b { color: #333; font-size: 1.1rem; }
        .student-item small { color: var(--brand-purple); font-weight: bold; }
        .footer { text-align: center; font-size: 0.85rem; color: #666; padding: 20px; line-height: 1.5; }
        .footer b { color: var(--brand-purple); }
    </style>
</head>
<body>

<header>
    <h1>PROGRESSIVE MOTHER’S SCHOOL</h1>
    <p>Motto: With God Everything Is Possible</p>
</header>

<div class="container">
    <div class="card">
        <h2>Quick Registration</h2>
        <input type="text" id="stuName" placeholder="Student Full Name">
        <input type="text" id="stuClass" placeholder="Class (e.g., P.4)">
        <button id="saveBtn" onclick="register()">Save Student Record</button>
    </div>

    <div class="card">
        <h2>Registered Students</h2>
        <div id="studentList">Checking database...</div>
    </div>
</div>

<div class="footer">
    Developed by <b>Eudes Media</b><br>
    No TikTok Icons | Professional Data System<br>
    Support: <b>+256762992440</b>
</div>

<script>
    // Your Connection
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co"; 
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    const supabase = libSupabase.createClient(SB_URL, SB_KEY);

    async function register() {
        const name = document.getElementById('stuName').value;
        const cls = document.getElementById('stuClass').value;
        const btn = document.getElementById('saveBtn');

        if (!name || !cls) return alert("Please enter Name and Class");

        btn.disabled = true;
        btn.innerText = "Saving...";

        try {
            // Saving ONLY text data
            const { error } = await supabase
                .from('students')
                .insert([{ name: name, class: cls }]);

            if (error) throw error;

            alert("Student Registered Successfully!");
            document.getElementById('stuName').value = "";
            document.getElementById('stuClass').value = "";
            load(); // Refresh the list
        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "Save Student Record";
        }
    }

    async function load() {
        const { data, error } = await supabase
            .from('students')
            .select('name, class')
            .order('created_at', { ascending: false });

        const listDiv = document.getElementById('studentList');
        
        if (error) {
            listDiv.innerHTML = "Error connecting to database.";
            return;
        }

        if (data.length === 0) {
            listDiv.innerHTML = "No students registered yet.";
        } else {
            listDiv.innerHTML = "";
            data.forEach(s => {
                listDiv.innerHTML += `
                    <div class="student-item">
                        <b>${s.name}</b>
                        <small>${s.class}</small>
                    </div>`;
            });
        }
    }
    load();
</script>
</body>
</html>
