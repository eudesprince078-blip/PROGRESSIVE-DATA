<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progressive Mother’s School | Eudes Media</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --brand-purple: #673ab7; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f0fa; margin: 0; padding: 0; }
        header { background: var(--brand-purple); color: white; padding: 30px; text-align: center; border-bottom: 5px solid #4527a0; }
        .container { max-width: 600px; margin: 20px auto; padding: 15px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: var(--brand-purple); border-left: 5px solid var(--brand-purple); padding-left: 10px; margin-bottom: 20px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        textarea { grid-column: span 2; height: 60px; }
        
        button { width: 100%; padding: 15px; background: var(--brand-purple); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        button:disabled { background: #ccc; }
        
        .student-card { background: #fff; padding: 15px; border-radius: 10px; border-left: 5px solid var(--brand-purple); margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .student-details { font-size: 0.85rem; color: #555; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 5px; }
        
        .footer { text-align: center; font-size: 0.9rem; color: #666; padding: 30px; }
        .footer b { color: var(--brand-purple); }
    </style>
</head>
<body>

<header>
    <h1>PROGRESSIVE MOTHER’S SCHOOL</h1>
    <p>Motto: With God Everything Is Possible</p>
</header>

<div class="container">
    <div class="card">
        <h2>Full Student Registration</h2>
        <div class="grid">
            <input type="text" id="stuName" placeholder="Full Name">
            <input type="text" id="stuContact" placeholder="Contact Number">
            <input type="text" id="stuClass" placeholder="Class">
            <input type="number" id="stuAge" placeholder="Age">
            <input type="date" id="stuDob" placeholder="Date of Birth">
            <input type="text" id="stuLoc" placeholder="Physical Location">
            <textarea id="stuHealth" placeholder="Health Status (e.g. Good, Allergies)"></textarea>
        </div>
        <button id="saveBtn" onclick="register()">Save Student Record</button>
    </div>

    <div class="card">
        <h2>Registered Students</h2>
        <div id="studentList">Connecting to database...</div>
    </div>
</div>

<div class="footer">
    System Managed by <b>Eudes Media</b><br>
    Support: <b>+256762992440</b>
</div>

<script>
    // Your Connection
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co"; 
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    const supabase = libSupabase.createClient(SB_URL, SB_KEY);

    // Auto-generate LIN Number
    function generateLIN() {
        return "PMS-" + Math.floor(1000 + Math.random() * 9000);
    }

    async function register() {
        const btn = document.getElementById('saveBtn');
        const data = {
            name: document.getElementById('stuName').value,
            contact: document.getElementById('stuContact').value,
            class: document.getElementById('stuClass').value,
            age: document.getElementById('stuAge').value,
            dob: document.getElementById('stuDob').value,
            location: document.getElementById('stuLoc').value,
            health_status: document.getElementById('stuHealth').value,
            lin: generateLIN() 
        };

        if (!data.name || !data.class) return alert("Please enter Name and Class");

        btn.disabled = true;
        btn.innerText = "Saving to School Cloud...";

        try {
            const { error } = await supabase.from('students').insert([data]);
            if (error) throw error;
            alert("Registered Successfully! LIN: " + data.lin);
            location.reload(); 
        } catch (e) {
            alert("Database Error: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "Save Student Record";
        }
    }

    async function load() {
        const listDiv = document.getElementById('studentList');
        try {
            // We select ALL columns to match your new table
            const { data, error } = await supabase
                .from('students')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) throw error;

            if (!data || data.length === 0) {
                listDiv.innerHTML = "No students found in the cloud.";
            } else {
                listDiv.innerHTML = "";
                data.forEach(s => {
                    listDiv.innerHTML += `
                        <div class="student-card">
                            <b>${s.name} (${s.lin || 'No LIN'})</b>
                            <div class="student-details">
                                <span>Class: ${s.class}</span>
                                <span>Contact: ${s.contact || 'N/A'}</span>
                                <span>Age: ${s.age || 'N/A'}</span>
                                <span>Location: ${s.location || 'N/A'}</span>
                                <span>Health: ${s.health_status || 'N/A'}</span>
                            </div>
                        </div>`;
                });
            }
        } catch (e) {
            listDiv.innerHTML = "Connection Error. Check your Supabase columns.";
        }
    }
    load();
</script>
</body>
</html>
