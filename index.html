<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESMS - Multi-Tenant Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --eudes-blue: #0047AB; --white: #ffffff; --admin-bg: #1a202c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; }
        
        /* Sidebar for Master Control */
        .sidebar { 
            width: 250px; height: 100vh; background: var(--admin-bg); 
            color: white; position: fixed; padding: 20px; box-sizing: border-box;
        }
        
        .main-content { margin-left: 250px; padding: 40px; }

        /* Tenant Card Styling */
        .tenant-card {
            background: var(--white); border-radius: 15px; 
            padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-top: 5px solid var(--eudes-blue); margin-bottom: 30px;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        /* Table Design */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 10px; overflow: hidden; }
        th { background: #edf2f7; color: #4a5568; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #edf2f7; }

        /* Status Toggles */
        .status-btn { padding: 8px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .active { background: #c6f6d5; color: #22543d; }
        .blocked { background: #fed7d7; color: #822727; }

        /* Master Controls */
        .master-panel { display: block; } /* Toggle this with JS based on user role */
    </style>
</head>
<body>

    <div class="sidebar" id="masterSidebar">
        <h2 style="color: var(--eudes-blue);">EUDES MEDIA</h2>
        <p style="font-size: 0.8rem; color: #a0aec0;">MASTER COMMAND</p>
        <hr border="0.1">
        <nav>
            <p style="cursor:pointer;" onclick="showSection('overview')">📊 Overview</p>
            <p style="cursor:pointer;" onclick="showSection('tenants')">🏢 Manage Tenants</p>
            <p style="cursor:pointer;" onclick="showSection('revenue')">💰 Revenue</p>
        </nav>
    </div>

    <div class="main-content">
        
        <div id="tenants-section" class="master-panel">
            <div class="tenant-card">
                <h2>Register New Tenant (School)</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <input type="text" id="schoolName" placeholder="School Name" style="padding:10px; border-radius:5px; border:1px solid #ccc;">
                    <input type="text" id="schoolMotto" placeholder="School Motto" style="padding:10px; border-radius:5px; border:1px solid #ccc;">
                    <input type="date" id="expiryDate" style="padding:10px; border-radius:5px; border:1px solid #ccc;">
                    <button onclick="registerTenant()" style="background:var(--eudes-blue); color:white; border:none; border-radius:5px; cursor:pointer;">ACTIVATE TENANT</button>
                </div>
            </div>

            <div class="tenant-card">
                <h2>Active School Tenants</h2>
                <table id="tenantTable">
                    <thead>
                        <tr>
                            <th>Tenant ID</th>
                            <th>School Name</th>
                            <th>Expiry Status</th>
                            <th>Access Control</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tenantBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SUPABASE_KEY = 'YOUR_ANON_KEY'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 1. REGISTER NEW TENANT
        async function registerTenant() {
            const name = document.getElementById('schoolName').value;
            const motto = document.getElementById('schoolMotto').value;
            const expiry = document.getElementById('expiryDate').value;
            const tenantID = "TENANT-" + Math.floor(1000 + Math.random() * 9000);

            const { error } = await _supabase.from('schools').insert([{
                school_id: tenantID,
                school_name: name,
                motto: motto,
                expiry_date: expiry,
                is_active: true
            }]);

            if (!error) {
                alert("New Tenant Registered: " + name);
                fetchTenants(); // Refresh list
            } else {
                alert("Error: " + error.message);
            }
        }

        // 2. FETCH AND DISPLAY ALL TENANTS
        async function fetchTenants() {
            const { data: schools, error } = await _supabase.from('schools').select('*');
            
            const tbody = document.getElementById('tenantBody');
            tbody.innerHTML = '';

            schools.forEach(school => {
                const row = `
                    <tr>
                        <td><b>${school.school_id}</b></td>
                        <td>${school.school_name}</td>
                        <td>${school.expiry_date}</td>
                        <td>
                            <button class="status-btn ${school.is_active ? 'active' : 'blocked'}" 
                                onclick="toggleAccess('${school.school_id}', ${school.is_active})">
                                ${school.is_active ? 'ENABLED' : 'DISABLED'}
                            </button>
                        </td>
                        <td>
                            <button style="border:none; background:none; cursor:pointer; color:blue;">Edit</button>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        // 3. KILL-SWITCH LOGIC (Enable/Disable Tenant)
        async function toggleAccess(id, currentStatus) {
            const { error } = await _supabase
                .from('schools')
                .update({ is_active: !currentStatus })
                .eq('school_id', id);
            
            if(!error) fetchTenants();
        }

        // Initial Load
        fetchTenants();
    </script>
</body>
</html>
