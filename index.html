<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS AUTHORITY | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0047AB; --bg: #f8fafc; --dark: #0f172a; }
        * { box-sizing: border-box; text-transform: uppercase; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); margin: 0; color: #1e293b; overflow-x: hidden; }
        
        #login-screen { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; padding: 35px; border-radius: 25px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; border: 2px solid #e2e8f0; font-weight: 700; text-align: center; outline: none; }
        .btn { padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; color: white; background: var(--primary); width: 100%; }
        
        .header { background: white; padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #e2e8f0; }
        .logo { width: 50px; height: 50px; border-radius: 10px; object-fit: contain; }
        .tab-bar { background: white; display: flex; border-bottom: 2px solid #e2e8f0; }
        .tab { flex: 1; padding: 16px; text-align: center; font-size: 0.6rem; font-weight: 800; color: #64748b; cursor: pointer; }
        .tab.active { color: var(--primary); border-bottom: 4px solid var(--primary); }
        .container { padding: 20px; }
        .card { background: white; border-radius: 20px; border: 1px solid #e2e8f0; padding: 15px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        td, th { padding: 12px; text-align: left; font-size: 0.7rem; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="color:var(--primary); margin:0;">ESMS AUTHORITY</h1>
            <p style="font-size:0.5rem; color:#64748b; font-weight:800; margin-bottom:20px;">EUDES MEDIA SOLUTIONS</p>
            <input type="text" id="schIdInput" placeholder="ENTER SCHOOL ID">
            <input type="password" id="passInput" placeholder="ENTER ACCESS KEY">
            <button class="btn" id="loginBtn" onclick="authenticate()">OPEN SYSTEM</button>
            <p id="err" style="color:red; font-size:0.6rem; margin-top:15px; display:none; background: #fff1f2; padding: 10px; border-radius: 8px;"></p>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <div class="header">
            <img src="" id="schLogo" class="logo" onerror="this.src='https://via.placeholder.com/50'">
            <div>
                <h2 id="schName" style="margin:0; font-size: 1rem; color: var(--primary);">---</h2>
                <div id="roleDisplay" style="font-size:0.55rem; color:#64748b; font-weight:800;">---</div>
            </div>
        </div>
        <div class="tab-bar">
            <div class="tab active" id="t-dash" onclick="showTab('dash')">PIPELINE</div>
            <div class="tab" id="t-adm" onclick="showTab('adm')">ADMISSIONS</div>
            <div class="tab" onclick="location.reload()" style="color:red">LOGOUT</div>
        </div>
        <div id="view-dash" class="tab-content container">
            <div class="card">
                <table>
                    <thead><tr><th>NAME</th><th>LOCATION</th><th>STATUS</th><th>ACTION</th></tr></thead>
                    <tbody id="stuBody"></tbody>
                </table>
            </div>
        </div>
        <div id="view-adm" class="tab-content container" style="display:none;">
            <div class="card">
                <h3>NEW STUDENT</h3>
                <input type="text" id="nName" placeholder="STUDENT NAME">
                <input type="text" id="nLoc" placeholder="LOCATION">
                <button class="btn" onclick="saveStudent()">SAVE STUDENT</button>
            </div>
        </div>
    </div>

    <script>
        const _URL = 'https://kjftrwuucjdnhfwesrup.supabase.co'; 
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const client = supabase.createClient(_URL, _KEY);
        let activeID = "";

        async function authenticate() {
            const idInput = document.getElementById('schIdInput').value.trim().toUpperCase();
            const keyInput = document.getElementById('passInput').value.trim();
            const errBox = document.getElementById('err');
            
            // Fetch everything from Schools to see what's inside
            const { data: allSchools, error } = await client.from('Schools').select('*');

            if (error) {
                errBox.style.display = "block";
                errBox.innerText = "DATABASE ERROR: " + error.message;
                return;
            }

            // Find matching school by checking BOTH possible column names
            const school = allSchools.find(s => 
                (s.sch_id && s.sch_id.toUpperCase() === idInput) || 
                (s.school_id && s.school_id.toUpperCase() === idInput)
            );

            if (school) {
                if (keyInput === school.admin_key || keyInput === school.teacher_key) {
                    activeID = school.sch_id || school.school_id;
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('main-app').style.display = 'block';
                    document.getElementById('schName').innerText = school.school_name;
                    document.getElementById('schLogo').src = school.logo_url;
                    loadData();
                } else {
                    errBox.style.display = "block";
                    errBox.innerText = "WRONG ACCESS KEY";
                }
            } else {
                // Diagnostic: Show the user what IDs actually exist in the DB
                const existingIDs = allSchools.map(s => s.sch_id || s.school_id).join(", ");
                errBox.style.display = "block";
                errBox.innerText = `ID "${idInput}" NOT FOUND. EXISTING IDS IN DATABASE: ${existingIDs}`;
            }
        }

        async function loadData() {
            const { data } = await client.from('students').select('*').or(`sch_id.eq.${activeID},scho_id.eq.${activeID}`);
            const list = data || [];
            document.getElementById('stuBody').innerHTML = list.map(s => `
                <tr>
                    <td>${s.name}</td>
                    <td>${s.location || '--'}</td>
                    <td>${s.status || 'APPLIED'}</td>
                    <td><button onclick="alert('Student ID: ${s.id}')">VIEW</button></td>
                </tr>`).join('');
        }

        async function saveStudent() {
            const name = document.getElementById('nName').value;
            const { error } = await client.from('students').insert([{ sch_id: activeID, name: name, location: document.getElementById('nLoc').value, status: 'APPLIED' }]);
            if (error) alert(error.message);
            else { alert("SAVED!"); showTab('dash'); }
        }

        function showTab(t) {
            document.getElementById('view-dash').style.display = t === 'dash' ? 'block' : 'none';
            document.getElementById('view-adm').style.display = t === 'adm' ? 'block' : 'none';
            document.getElementById('t-dash').classList.toggle('active', t === 'dash');
            document.getElementById('t-adm').classList.toggle('active', t === 'adm');
            if(t === 'dash') loadData();
        }
    </script>
</body>
</html>
