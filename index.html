<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROGRESSIVE MOTHERS PMS - V150 FINAL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #002b5b; --gold: #ffce00; --red: #ff3b3b; --green: #2ecc71; --gray: #f4f7fa; }
        body { font-family: 'Inter', sans-serif; background: var(--gray); margin: 0; padding-bottom: 100px; color: #333; }
        
        /* LOGIN STYLES */
        .login-box { max-width: 340px; margin: 100px auto; padding: 20px; text-align: center; }
        .pass-wrapper { position: relative; display: flex; align-items: center; }
        .pass-wrapper i { position: absolute; right: 15px; color: var(--blue); cursor: pointer; z-index: 10; }

        .header { background: linear-gradient(135deg, #001a33, var(--blue)); color: white; padding: 25px 15px 100px; text-align: center; border-bottom: 6px solid var(--gold); position: relative; border-radius: 0 0 40px 40px; }
        .clock-box { font-size: 42px; font-weight: 900; margin: 5px 0; }
        .activity-banner { font-size: 11px; font-weight: 900; padding: 8px 20px; border-radius: 50px; display: inline-block; border: 2px solid white; background: rgba(255,255,255,0.1); color: var(--gold); }

        .dash-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 15px; margin-top: -50px; z-index: 100; position: relative; }
        .dash-card { background: white; padding: 15px 5px; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .dash-card span { display: block; font-size: 18px; font-weight: 900; color: var(--blue); }

        .tab-bar { display: flex; background: white; padding: 8px; margin: 20px 15px; border-radius: 15px; }
        .tab { flex: 1; padding: 12px 5px; font-size: 10px; font-weight: 900; color: #bbb; text-align: center; display: none; cursor: pointer; }
        .tab.active { background: var(--blue); color: white; border-radius: 10px; }

        .search-container { padding: 0 15px 10px; sticky: top; }
        .search-bar { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #eee; font-weight: 600; box-sizing: border-box; }

        .card { background: white; padding: 20px; border-radius: 25px; margin: 15px; border: 1px solid #eee; }
        label { font-size: 10px; font-weight: 800; color: var(--blue); margin-top: 10px; display: block; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; margin-top: 5px; border: 1.5px solid #eee; border-radius: 10px; font-size: 14px; box-sizing: border-box; }
        input:disabled { background: #f4f4f4; border-style: dashed; }

        .list-item { border-left: 6px solid var(--blue); padding: 15px; margin: 10px 15px; background: white; border-radius: 15px; position: relative; }
        .list-item b { font-size: 14px; display: block; text-transform: uppercase; }
        .status-pill { position: absolute; right: 15px; top: 15px; font-size: 8px; padding: 4px 8px; border-radius: 4px; font-weight: 900; }

        .btn-main { background: var(--blue); color: white; border: none; padding: 16px; width: 100%; border-radius: 15px; font-weight: 900; margin-top: 15px; }
        .hidden { display: none !important; }
        .footer-brand { text-align: center; font-size: 10px; color: #bbb; padding: 20px; font-weight: 800; }
    </style>
</head>
<body>

<div id="loginGate" class="login-box">
    <h2 style="color:var(--blue); font-weight:900;">PROGRESSIVE MOTHERS</h2>
    <div class="card">
        <div class="pass-wrapper">
            <input id="sysKey" type="password" placeholder="ACCESS KEY" style="text-align:center;">
            <i class="fa-solid fa-eye" id="togglePass" onclick="togglePass()"></i>
        </div>
        <button onclick="login()" class="btn-main">LOGIN SYSTEM</button>
    </div>
</div>

<div id="mainApp" class="hidden">
    <div class="header">
        <span style="font-weight:900; font-size: 14px;">PROGRESSIVE MOTHERS SCHOOL</span>
        <div id="clock" class="clock-box">00:00:00</div>
        <div id="activityStatus" class="activity-banner">...</div>
    </div>

    <div class="dash-container">
        <div class="dash-card"><span id="statTotal">0</span><small>STUDENTS</small></div>
        <div class="dash-card"><span id="statPres" style="color:var(--green)">0</span><small>PRESENT</small></div>
        <div class="dash-card"><span id="statAbs" style="color:var(--red)">0</span><small>ABSENT</small></div>
    </div>

    <div class="tab-bar">
        <div id="tReg" class="tab" onclick="showTab('reg')">ADMISSION</div>
        <div id="tRoll" class="tab" onclick="showTab('roll')">ROLL CALL</div>
        <div id="tRec" class="tab" onclick="showTab('rec')">RECORDS</div>
        <div id="tFin" class="tab" onclick="showTab('fin')">FINANCE</div>
    </div>

    <div id="searchWrapper" class="search-container hidden">
        <input type="text" id="globalSearch" class="search-bar" oninput="runGlobalSearch()" placeholder="Search Name, LIN, or Class...">
    </div>

    <div id="secReg" class="card hidden">
        <h3 id="regTitle" style="color:var(--blue); font-size:15px; margin:0;">ADMISSION PANEL</h3>
        <input type="hidden" id="editId">
        <label>LIN</label><input id="fLin" disabled placeholder="AUTO-GEN">
        <label>Name</label><input id="fName">
        <label>Class</label>
        <select id="fClass"><option>Baby</option><option>Middle</option><option>Top</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
        <label>Age</label><input type="number" id="fAge">
        <label>Date of Birth</label><input type="date" id="fDob">
        <label>Location</label><input id="fLoc">
        <label>Health</label><input id="fHealth">
        <label>Contact</label><input id="fCon">
        
        <div id="financeBox">
            <label>Total Fees (UGX)</label><input type="number" id="fExp">
            <label>Paid (UGX)</label><input type="number" id="fPaid">
        </div>
        
        <button onclick="saveData()" class="btn-main">SYNC RECORD</button>
        <button id="delBtn" onclick="deleteStudent()" class="btn-main hidden" style="background:var(--red)">DELETE STUDENT</button>
        <button onclick="clearForm()" class="btn-main" style="background:#666">NEW / CANCEL</button>
    </div>

    <div id="secList" class="hidden"></div> <div class="footer-brand">EUDES MEDIA SOLUTIONS | +256762992440</div>
</div>

<script>
    const sb = supabase.createClient("https://kjftrwuucjdnhfwesrup.supabase.co", "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO");
    let ROLE = "", students = [], att = {}, activeTab = "";

    function togglePass() {
        const p = document.getElementById('sysKey');
        const i = document.getElementById('togglePass');
        if(p.type === "password") { p.type = "text"; i.className = "fa-solid fa-eye-slash"; }
        else { p.type = "password"; i.className = "fa-solid fa-eye"; }
    }

    function login() {
        const k = document.getElementById('sysKey').value.trim().toUpperCase();
        if (k === "JESUS CARES") ROLE = "ADMIN";
        else if (k === "FINANCE2026") ROLE = "FINANCE";
        else if (k === "TEACHER256") ROLE = "TEACHER";
        else return alert("Invalid Key");

        document.getElementById('loginGate').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');

        if(ROLE === "ADMIN") ['tReg','tRoll','tRec','tFin'].forEach(t => document.getElementById(t).style.display="block");
        else if(ROLE === "FINANCE") ['tReg','tFin'].forEach(t => document.getElementById(t).style.display="block");
        else ['tReg','tRoll'].forEach(t => document.getElementById(t).style.display="block");

        showTab(ROLE === "TEACHER" ? 'roll' : (ROLE === "FINANCE" ? 'fin' : 'reg'));
        fetchData(); setInterval(tick, 1000);
    }

    async function fetchData() {
        const { data } = await sb.from('students').select('*').order('name');
        if(data) { students = data; document.getElementById('statTotal').innerText = students.length; runGlobalSearch(); }
    }

    function tick() {
        const n = new Date();
        document.getElementById('clock').innerText = n.toLocaleTimeString('en-GB');
        const t = n.getHours() * 100 + n.getMinutes();
        const sch = [ {s:630, e:800, t:"🌅 ARRIVAL"}, {s:800, e:1030, t:"📚 LESSONS"}, {s:1030, e:1100, t:"☕ BREAK"}, {s:1100, e:1230, t:"📖 LESSONS"}, {s:1230, e:1330, t:"🍲 LUNCH"}, {s:1500, e:2400, t:"🌙 CLOSED"} ];
        let cur = "🏫 CLASS"; sch.forEach(s => { if(t >= s.s && t < s.e) cur = s.t; });
        document.getElementById('activityStatus').innerText = "UPDATES: " + cur;
    }

    function showTab(t) {
        activeTab = t;
        ['tReg','tRoll','tRec','tFin'].forEach(id => {
            const el = document.getElementById(id);
            if(el) el.classList.remove('active');
        });
        const activeEl = document.getElementById('t' + t.charAt(0).toUpperCase() + t.slice(1));
        if(activeEl) activeEl.classList.add('active');

        document.getElementById('secReg').classList.add('hidden');
        document.getElementById('secList').classList.add('hidden');
        document.getElementById('searchWrapper').classList.add('hidden');

        if(t === 'reg') {
            document.getElementById('secReg').classList.remove('hidden');
        } else {
            document.getElementById('secList').classList.remove('hidden');
            document.getElementById('searchWrapper').classList.remove('hidden');
            runGlobalSearch();
        }
    }

    function runGlobalSearch() {
        const q = document.getElementById('globalSearch').value.toUpperCase();
        const filtered = students.filter(s => 
            s.name.toUpperCase().includes(q) || 
            (s.lin_number || s.lin || "").toUpperCase().includes(q) ||
            s.class.toUpperCase().includes(q)
        );

        let h = "";
        filtered.forEach(s => {
            const lin = s.lin_number || s.lin || "NO LIN";
            const exp = s.fees_expected || 0;
            const paid = s.fees_paid || 0;
            const bal = exp - paid;
            
            if(activeTab === 'roll') {
                const isAbs = att[s.id] === 'absent';
                h += `<div class="list-item">
                        <b>${s.name}</b><small>${lin} | ${s.class}</small>
                        <button onclick="toggleAtt('${s.id}')" style="position:absolute; right:15px; top:12px; padding:10px; border-radius:8px; border:none; background:${isAbs ? 'var(--red)' : 'var(--green)'}; color:white; font-weight:900;">${isAbs ? 'ABS' : 'PRES'}</button>
                      </div>`;
            } else if(activeTab === 'fin') {
                const status = bal <= 0 ? 'CLEARED' : 'DEBT';
                const color = bal <= 0 ? 'var(--green)' : 'var(--red)';
                h += `<div class="list-item" onclick="setEdit('${s.id}')">
                        <span class="status-pill" style="background:${color}; color:white;">${status}</span>
                        <b>${s.name}</b><small>Paid: ${paid.toLocaleString()} | Bal: ${bal.toLocaleString()}</small>
                      </div>`;
            } else {
                h += `<div class="list-item" onclick="setEdit('${s.id}')">
                        <b>${s.name}</b><small>${lin} | ${s.class} | 📞 ${s.contact}</small>
                      </div>`;
            }
        });
        document.getElementById('secList').innerHTML = h || "<p style='text-align:center; margin-top:20px;'>No students found.</p>";
    }

    function toggleAtt(id) {
        att[id] = (att[id] === 'absent') ? 'present' : 'absent';
        let a = 0; Object.values(att).forEach(v => { if(v === 'absent') a++; });
        document.getElementById('statAbs').innerText = a; 
        document.getElementById('statPres').innerText = students.length - a;
        runGlobalSearch();
    }

    function setEdit(id) {
        const s = students.find(x => x.id == id);
        if(!s) return;
        document.getElementById('editId').value = s.id;
        document.getElementById('fLin').value = s.lin_number || s.lin || "GENERATING...";
        document.getElementById('fName').value = s.name;
        document.getElementById('fClass').value = s.class;
        document.getElementById('fAge').value = s.age || "";
        document.getElementById('fDob').value = s.date_of_birth || "";
        document.getElementById('fLoc').value = s.physical_location || "";
        document.getElementById('fHealth').value = s.health_status || "";
        document.getElementById('fCon').value = s.contact;
        document.getElementById('fExp').value = s.fees_expected || 0;
        document.getElementById('fPaid').value = s.fees_paid || 0;

        // --- STRICT PERMISSIONS ---
        const isFin = ROLE === "FINANCE";
        ['fName','fClass','fAge','fDob','fLoc','fHealth','fCon'].forEach(f => document.getElementById(f).disabled = isFin);
        
        if(ROLE === "ADMIN") document.getElementById('delBtn').classList.remove('hidden');
        else document.getElementById('delBtn').classList.add('hidden');

        showTab('reg');
    }

    async function saveData() {
        const id = document.getElementById('editId').value;
        const name = document.getElementById('fName').value;
        const row = {
            name: name, class: document.getElementById('fClass').value, age: document.getElementById('fAge').value,
            date_of_birth: document.getElementById('fDob').value, physical_location: document.getElementById('fLoc').value,
            health_status: document.getElementById('fHealth').value, contact: document.getElementById('fCon').value,
            fees_expected: parseInt(document.getElementById('fExp').value) || 0,
            fees_paid: parseInt(document.getElementById('fPaid').value) || 0
        };

        if(!id) row.lin_number = `PM${name.charAt(0).toUpperCase()}${Math.floor(1000+Math.random()*9000)}`;
        
        if(id) await sb.from('students').update(row).eq('id', id);
        else await sb.from('students').insert([row]);
        
        alert("Synced Successfully!"); clearForm(); fetchData();
    }

    function clearForm() {
        ['fName','fAge','fDob','fLoc','fHealth','fCon','fExp','fPaid','editId','fLin'].forEach(f => {
            document.getElementById(f).value = "";
            document.getElementById(f).disabled = false;
        });
        document.getElementById('delBtn').classList.add('hidden');
    }

    async function deleteStudent() {
        if(confirm("Confirm deletion?")) {
            await sb.from('students').delete().eq('id', document.getElementById('editId').value);
            fetchData(); clearForm();
        }
    }
</script>
</body>
</html>
