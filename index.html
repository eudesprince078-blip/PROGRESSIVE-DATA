<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS AUTHORITY | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0047AB; --danger: #ef4444; --success: #22c55e; --dark: #0f172a; }
        * { box-sizing: border-box; text-transform: uppercase; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; margin: 0; }
        
        /* LOGIN SHIELD */
        #login-screen { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 2px solid #e2e8f0; font-weight: 700; }

        /* HEADER & TABS */
        .school-header { background: white; padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #e2e8f0; }
        .school-logo { width: 45px; height: 45px; border-radius: 8px; object-fit: contain; }
        .tab-bar { background: white; display: flex; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 1000; }
        .tab { flex: 1; padding: 15px; text-align: center; font-size: 0.6rem; font-weight: 800; color: #64748b; cursor: pointer; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        /* DASHBOARD STATS */
        .hero { background: var(--dark); color: white; padding: 20px; text-align: center; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 20px; margin-top: -15px; }
        .stat-card { background: white; padding: 12px; border-radius: 12px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .stat-card b { display: block; font-size: 1.2rem; }

        .container { padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; overflow-x: auto; }
        
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { text-align: left; font-size: 0.55rem; color: #94a3b8; padding: 10px; }
        td { padding: 10px; font-size: 0.75rem; font-weight: 700; border-bottom: 1px solid #f1f5f9; }
        
        .btn { padding: 10px; border-radius: 8px; border: none; font-weight: 800; cursor: pointer; color: white; background: var(--primary); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="color:var(--primary)">SYSTEM ACCESS</h2>
            <input type="text" id="schIdInput" placeholder="SCHOOL ID (e.g., SCH-101)">
            <input type="password" id="passInput" placeholder="ACCESS KEY">
            <button class="btn" style="width:100%" onclick="authenticate()">LOGIN</button>
            <p id="login-err" style="color:var(--danger); font-size:0.6rem; display:none; margin-top:10px;"></p>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <div class="school-header">
            <img src="" id="displayLogo" class="school-logo" onerror="this.src='https://via.placeholder.com/50'">
            <div>
                <h2 id="displayName" style="margin:0; font-size:1rem;">SCHOOL NAME</h2>
                <div id="displayRole" style="font-size:0.5rem; color:var(--primary); font-weight:800;">ROLE: ---</div>
            </div>
        </div>

        <div class="tab-bar">
            <div class="tab active" onclick="showTab('dash')">DASHBOARD</div>
            <div class="tab" id="tab-adm" onclick="showTab('admission')">ADMISSION</div>
            <div class="tab" onclick="location.reload()" style="color:var(--danger)">LOGOUT</div>
        </div>

        <div id="dash" class="tab-content">
            <div class="hero"><h1 id="live-clock" style="margin:0">00:00:00</h1></div>
            <div class="stat-grid">
                <div class="stat-card"><b id="countT">0</b><span>PUPILS</span></div>
                <div class="stat-card"><b id="countC" style="color:var(--success);">0</b><span>CLEARED</span></div>
                <div class="stat-card"><b id="countO" style="color:var(--danger);">0</b><span>OWING</span></div>
            </div>
            <div class="container">
                <div class="card">
                    <table>
                        <thead>
                            <tr>
                                <th>PHOTO</th><th>NAME</th><th>CLASS</th>
                                <th class="money">EXPECTED</th><th class="money">PAID</th>
                                <th>STATUS</th><th>ROLLCALL</th><th class="admin-only">ACTION</th>
                            </tr>
                        </thead>
                        <tbody id="dashBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="admission" class="tab-content container" style="display:none;">
            <div class="card">
                <h3>NEW ENROLLMENT</h3>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <input type="text" id="inLin" placeholder="LIN">
                    <input type="text" id="inName" placeholder="FULL NAME">
                    <input type="text" id="inClass" placeholder="CLASS">
                    <input type="text" id="inContact" placeholder="CONTACT">
                    <input type="number" id="inExp" placeholder="TOTAL FEES">
                    <input type="number" id="inPaid" placeholder="PAID">
                    <select id="inStatus"><option value="OWING">OWING</option><option value="CLEARED">CLEARED</option></select>
                </div>
                <button class="btn" style="width:100%; margin-top:15px;" id="saveBtn" onclick="saveStudent()">SAVE DATA</button>
            </div>
        </div>
    </div>

    <script>
        const _URL = 'https://kjftrwuucjdnhfwesrup.supabase.co'; 
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const client = supabase.createClient(_URL, _KEY);

        let activeSchoolId = "";
        let userRole = "";
        let students = [];

        async function authenticate() {
            const schId = document.getElementById('schIdInput').value;
            const inputKey = document.getElementById('passInput').value;
            const err = document.getElementById('login-err');

            const { data: school, error } = await client.from('schools').select('*').eq('school_id', schId).single();

            if (error || !school) {
                err.innerText = "SCHOOL ID NOT FOUND"; err.style.display = 'block'; return;
            }

            if (inputKey === school.admin_key) userRole = "ADMIN";
            else if (inputKey === school.finance_key) userRole = "FINANCE";
            else if (inputKey === school.teacher_key) userRole = "TEACHER";
            else { err.innerText = "INVALID KEY"; err.style.display = 'block'; return; }

            activeSchoolId = schId;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('displayName').innerText = school.school_name;
            document.getElementById('displayLogo').src = school.logo_url;
            document.getElementById('displayRole').innerText = "ROLE: " + userRole;

            if(userRole === "TEACHER") {
                document.querySelectorAll('.money').forEach(e => e.style.display = 'none');
                document.getElementById('tab-adm').style.display = 'none';
            }
            loadData();
        }

        async function loadData() {
            const { data } = await client.from('students').select('*').eq('scho_id', activeSchoolId).order('name');
            students = data || [];
            let t=0, c=0, o=0;
            document.getElementById('dashBody').innerHTML = students.map(s => {
                t++; s.fees_status === 'CLEARED' ? c++ : o++;
                return `<tr>
                    <td><img src="${s.photo_url || ''}" style="width:35px;height:35px;border-radius:4px;" onerror="this.src='https://via.placeholder.com/35'"></td>
                    <td>${s.name}</td><td>${s.class}</td>
                    ${userRole !== 'TEACHER' ? `<td>${s.fees_expected}</td><td>${s.fees_paid}</td>` : ''}
                    <td style="color:${s.fees_status === 'CLEARED' ? 'green' : 'red'}">${s.fees_status}</td>
                    <td><button onclick="mark('${s.id}','P')">P</button> <button onclick="mark('${s.id}','A')">A</button></td>
                    <td class="admin-only">${userRole==='ADMIN' ? `<button onclick="del('${s.id}')">DEL</button>` : '--'}</td>
                </tr>`;
            }).join('');
            document.getElementById('countT').innerText = t;
            document.getElementById('countC').innerText = c;
            document.getElementById('countO').innerText = o;
        }

        async function saveStudent() {
            const btn = document.getElementById('saveBtn');
            btn.innerText = "SAVING..."; btn.disabled = true;
            const obj = {
                scho_id: activeSchoolId,
                lin: document.getElementById('inLin').value,
                name: document.getElementById('inName').value,
                class: document.getElementById('inClass').value,
                contact: document.getElementById('inContact').value,
                fees_expected: document.getElementById('inExp').value,
                fees_paid: document.getElementById('inPaid').value,
                fees_status: document.getElementById('inStatus').value
            };
            const { error } = await client.from('students').insert([obj]);
            if(!error) { alert("SUCCESS"); showTab('dash'); } else { alert("ERROR: " + error.message); }
            btn.innerText = "SAVE DATA"; btn.disabled = false;
        }

        function showTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display='none');
            document.getElementById(t).style.display='block';
            if(t==='dash') loadData();
        }

        setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
