<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PMS SYSTEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; padding: 10px; margin: 0; }
        .box { background: white; padding: 20px; border-radius: 12px; max-width: 450px; margin: 20px auto; border: 2px solid #0056b3; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 15px; box-sizing: border-box; }
        button { background: #0056b3; color: white; font-weight: bold; border: none; cursor: pointer; }
        .hidden { display: none !important; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 11px; }
        th { background: #0056b3; color: white; padding: 8px; text-align: left; }
        td { border-bottom: 1px solid #ddd; padding: 8px; }
    </style>
</head>
<body>

<div id="loginSection" class="box">
    <h2 style="text-align:center; color:#0056b3;">SCHOOL LOGIN</h2>
    <input id="user" placeholder="USERNAME">
    <input id="pass" type="password" placeholder="PASSWORD">
    <button onclick="checkLogin()">LOGIN SYSTEM</button>
    <p id="msg" style="color:red; text-align:center; font-size:12px;"></p>
</div>

<div id="mainSection" class="hidden">
    <div class="box">
        <h2 style="text-align:center; color:#0056b3; margin-top:0;">REGISTRATION</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <input id="n" placeholder="Full Name">
            <input id="a" type="number" placeholder="Age">
            <input id="d" type="date">
            <input id="ph" placeholder="Contact">
            <input id="loc" placeholder="Location">
            <input id="pay" placeholder="Payment Code">
            <select id="cl"><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
            <select id="he"><option value="Good">Health: Good</option><option value="Attention">Health: Check</option></select>
            <select id="st"><option value="active">Status: active</option><option value="left">Status: left</option></select>
        </div>
        <button id="upBtn" onclick="doUpload()">CONFIRM & UPLOAD</button>
        <hr>
        <div id="listArea"></div>
        <p style="text-align:center; font-weight:bold; font-size:12px; margin-top:15px;">Eudes Media | +256762992440</p>
    </div>
</div>

<script>
    // 1. Connection Info
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co";
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    let sbClient = null;

    // 2. Simple Login Function
    function checkLogin() {
        const u = document.getElementById('user').value.trim().toUpperCase();
        const p = document.getElementById('pass').value.trim().toUpperCase();
        
        if (u === "PROGRESSIVE" && p === "JESUS CARES") {
            // Hide login, show app
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('mainSection').classList.remove('hidden');
            
            // Connect to database only after login works
            if (typeof supabase !== 'undefined') {
                sbClient = supabase.createClient(SB_URL, SB_KEY);
                fetchRecords();
            }
        } else {
            document.getElementById('msg').innerText = "WRONG USERNAME OR PASSWORD";
        }
    }

    // 3. Upload Function
    async function doUpload() {
        const name = document.getElementById('n').value;
        const status = document.getElementById('st').value;
        const btn = document.getElementById('upBtn');

        if (!name) return alert("Please enter a name");
        if (!sbClient) return alert("System error: Refresh page");

        btn.innerText = "SAVING...";
        btn.disabled = true;

        try {
            const { error } = await sbClient.from('students').insert([{
                name: name,
                age: document.getElementById('a').value,
                dob: document.getElementById('d').value,
                contact: document.getElementById('ph').value,
                location: document.getElementById('loc').value,
                payment_code: document.getElementById('pay').value,
                class: document.getElementById('cl').value,
                health_status: document.getElementById('he').value,
                status: status,
                active: (status === "active"), // FIXED: Matches your database column
                lin: "PM-" + Math.floor(1000 + Math.random() * 9000)
            }]);

            if (error) throw error;
            alert("SUCCESSFULLY SAVED");
            location.reload();
        } catch (e) {
            alert("Error: " + e.message);
            btn.innerText = "CONFIRM & UPLOAD";
            btn.disabled = false;
        }
    }

    // 4. Load Records
    async function fetchRecords() {
        if (!sbClient) return;
        const { data } = await sbClient.from('students').select('*').order('created_at', { ascending: false });
        if (data) {
            let h = "<table><tr><th>LIN</th><th>NAME</th><th>CLASS</th></tr>";
            data.forEach(r => {
                h += `<tr><td>${r.lin}</td><td>${r.name}</td><td>${r.class}</td></tr>`;
            });
            document.getElementById('listArea').innerHTML = h + "</table>";
        }
    }
</script>
</body>
</html>
