<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROGRESSIVE PMS V40 - EXECUTIVE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #0056b3; --dark: #001a33; --white: #ffffff; --green: #2ecc71; --red: #e74c3c; --gray: #f1f4f8; --gold: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); margin: 0; padding: 0; }
        
        /* Dashboard Header */
        .header-box { background: linear-gradient(135deg, var(--dark), var(--blue)); color: white; padding: 30px 20px; text-align: center; border-radius: 0 0 25px 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .clock { font-family: monospace; background: rgba(0,0,0,0.4); padding: 5px 15px; border-radius: 20px; display: inline-block; margin-top: 10px; font-size: 14px; }
        
        /* Professional Stats Cards */
        .stats-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 20px; margin-top: -30px; }
        .stat-card { background: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-bottom: 4px solid var(--blue); }
        .stat-card h2 { margin: 5px 0; font-size: 28px; color: var(--dark); }
        .stat-card p { margin: 0; font-size: 10px; color: #888; font-weight: bold; text-transform: uppercase; }

        /* Tabs */
        .tab-nav { display: flex; margin: 10px 20px; background: #ddd; border-radius: 10px; overflow: hidden; }
        .tab-btn { flex: 1; padding: 15px; border: none; cursor: pointer; font-weight: bold; background: none; }
        .tab-active { background: var(--blue); color: white; }

        .content-box { padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        input, select { width: 100%; padding: 14px; margin-top: 8px; border: 1.5px solid #dfe6e9; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn-save { background: var(--blue); color: white; border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 16px; margin-top: 20px; cursor: pointer; }
        
        .student-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--blue); }
        .status-tag { padding: 3px 8px; border-radius: 5px; font-size: 9px; font-weight: bold; color: white; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loginGate" style="padding: 50px 20px; text-align: center;">
    <div class="card" style="max-width: 350px; margin: auto;">
        <h2 style="color:var(--blue)">ADMIN LOGIN</h2>
        <input id="passInput" type="password" placeholder="Access Key" style="text-align:center;">
        <button onclick="handleLogin()" class="btn-save">ENTER DASHBOARD</button>
    </div>
</div>

<div id="mainApp" class="hidden">
    <div class="header-box">
        <h1 style="margin:0;">PROGRESSIVE PMS</h1>
        <div id="liveClock" class="clock">00:00:00 PM</div>
        <div style="margin-top:15px;"><button onclick="location.reload()" style="background:none; border:1px solid white; color:white; padding:5px 10px; border-radius:5px; font-size:10px;">LOGOUT</button></div>
    </div>

    <div class="stats-container">
        <div class="stat-card" style="border-color: var(--blue);">
            <p>Total Students</p><h2 id="totalSt">0</h2>
        </div>
        <div class="stat-card" style="border-color: var(--green);">
            <p>Active Today</p><h2 id="activeSt">0</h2>
        </div>
        <div class="stat-card" style="border-color: var(--red);">
            <p>Absent</p><h2 id="absentSt">0</h2>
        </div>
        <div class="stat-card" style="border-color: #636e72;">
            <p>Left School</p><h2 id="leftSt">0</h2>
        </div>
    </div>

    <div class="tab-nav">
        <button id="btnReg" onclick="switchView('REG')" class="tab-btn tab-active">RECORDS</button>
        <button id="btnArc" onclick="switchView('ARC')" class="tab-btn">ARCHIVE (LEFT)</button>
    </div>

    <div class="content-box">
        <div id="viewReg">
            <div class="card">
                <h3 id="fTitle" style="margin-top:0; color:var(--blue);">Student Update Form</h3>
                <input type="hidden" id="editId">
                
                <label style="font-size:11px; font-weight:bold;">Student Full Name</label>
                <input id="name" placeholder="Enter Name">
                
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <div style="flex:1;">
                        <label style="font-size:11px; font-weight:bold;">Class</label>
                        <select id="cl">
                            <option value="Baby">Baby</option><option value="Middle">Middle</option><option value="Top">Top</option>
                            <option value="P.1">P.1</option><option value="P.7">P.7</option>
                        </select>
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:11px; font-weight:bold;">Current Status</label>
                        <select id="status">
                            <option value="Active">Active</option>
                            <option value="Left">Left School</option>
                        </select>
                    </div>
                </div>

                <label style="font-size:11px; font-weight:bold; margin-top:10px; display:block;">Fees Balance (UGX)</label>
                <input id="fBal" type="number" placeholder="0">

                <button id="saveBtn" onclick="save()" class="btn-save">CONFIRM & UPDATE</button>
            </div>

            <input type="text" id="searchBar" oninput="doSearch()" placeholder="🔍 Search Active Students..." style="margin-bottom:15px; border:2px solid var(--blue);">
            <div id="listActive"></div>
        </div>

        <div id="viewArc" class="hidden">
            <h3 style="color:#636e72;">Archived Students (Left School)</h3>
            <div id="listLeft"></div>
        </div>
    </div>

    <div style="text-align:center; padding:20px; font-size:11px; color:#aaa;">Eudes Media Support | +256762992440</div>
</div>

<script>
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co";
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    let sb = null, students = [];

    // 1. Clock Update
    setInterval(() => {
        document.getElementById('liveClock').innerText = new Date().toLocaleTimeString();
    }, 1000);

    // 2. Login Logic
    function handleLogin() {
        const p = document.getElementById('passInput').value.trim().toUpperCase();
        if (p === "JESUS CARES") {
            sb = supabase.createClient(SB_URL, SB_KEY);
            document.getElementById('loginGate').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            refreshData();
        } else { alert("Invalid Access Key"); }
    }

    // 3. Refresh Data & Stats
    async function refreshData() {
        const { data } = await sb.from('students').select('*').order('name', { ascending: true });
        students = data || [];
        
        // Calculate Stats
        const total = students.length;
        const active = students.filter(s => s.status !== 'Left').length;
        const left = students.filter(s => s.status === 'Left').length;

        document.getElementById('totalSt').innerText = total;
        document.getElementById('activeSt').innerText = active;
        document.getElementById('leftSt').innerText = left;

        renderLists();
    }

    // 4. Render Active vs Left
    function renderLists() {
        let activeHtml = "";
        let leftHtml = "";

        students.forEach(s => {
            const template = `
                <div class="student-item" style="border-left-color: ${s.status === 'Left' ? '#636e72' : 'var(--blue)'}">
                    <div>
                        <b>${s.name.toUpperCase()}</b><br>
                        <small>${s.class} | BAL: ${Number(s.fees_balance).toLocaleString()}</small>
                    </div>
                    <div style="text-align:right;">
                        <span class="status-tag" style="background:${s.status === 'Left' ? '#636e72' : '#2ecc71'}">${s.status || 'Active'}</span><br>
                        <button onclick="editMode('${s.id}')" style="margin-top:5px; font-size:10px; cursor:pointer;">EDIT</button>
                    </div>
                </div>`;
            
            if(s.status === 'Left') leftHtml += template;
            else activeHtml += template;
        });

        document.getElementById('listActive').innerHTML = activeHtml || "No active students.";
        document.getElementById('listLeft').innerHTML = leftHtml || "No archived students.";
    }

    // 5. Save Data
    async function save() {
        const id = document.getElementById('editId').value;
        const btn = document.getElementById('saveBtn');
        const payload = {
            name: document.getElementById('name').value.trim(),
            class: document.getElementById('cl').value,
            fees_balance: parseInt(document.getElementById('fBal').value) || 0,
            status: document.getElementById('status').value
        };

        if(!payload.name) return alert("Please enter a name");

        btn.innerText = "SAVING..."; btn.disabled = true;

        try {
            if(!id) {
                payload.lin = "PMA-" + Math.floor(1000 + Math.random() * 9000);
                await sb.from('students').insert([payload]);
            } else {
                await sb.from('students').update(payload).eq('id', id);
            }
            alert("Updated Successfully!");
            resetForm(); refreshData();
        } catch (e) { alert(e.message); }
        finally { btn.innerText = "CONFIRM & UPDATE"; btn.disabled = false; }
    }

    // 6. Support Functions
    function editMode(id) {
        const s = students.find(x => x.id == id);
        document.getElementById('editId').value = s.id;
        document.getElementById('name').value = s.name;
        document.getElementById('cl').value = s.class;
        document.getElementById('fBal').value = s.fees_balance;
        document.getElementById('status').value = s.status || 'Active';
        document.getElementById('fTitle').innerText = "Updating: " + s.name;
        switchView('REG');
        window.scrollTo(0,0);
    }

    function switchView(v) {
        document.getElementById('viewReg').classList.toggle('hidden', v !== 'REG');
        document.getElementById('viewArc').classList.toggle('hidden', v !== 'ARC');
        document.getElementById('btnReg').classList.toggle('tab-active', v === 'REG');
        document.getElementById('btnArc').classList.toggle('tab-active', v === 'ARC');
    }

    function resetForm() {
        document.getElementById('editId').value = "";
        document.getElementById('name').value = "";
        document.getElementById('fBal').value = "";
        document.getElementById('fTitle').innerText = "Student Update Form";
    }

    function doSearch() {
        const q = document.getElementById('searchBar').value.toUpperCase();
        const filtered = students.filter(s => s.name.toUpperCase().includes(q) && s.status !== 'Left');
        // Rerender just the active list for the search
        let html = "";
        filtered.forEach(s => {
            html += `<div class="student-item"><div><b>${s.name.toUpperCase()}</b><br><small>${s.class}</small></div><button onclick="editMode('${s.id}')">EDIT</button></div>`;
        });
        document.getElementById('listActive').innerHTML = html;
    }
</script>
</body>
</html>
