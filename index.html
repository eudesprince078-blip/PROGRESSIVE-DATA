<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUDES MEDIA | ULTIMATE ENGINE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0047AB; --dark: #0f172a; --bg: #f8fafc; --white: #ffffff; --success: #10b981; --danger: #ef4444; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; }
        body { margin: 0; background: var(--bg); color: #1e293b; overflow-x: hidden; }

        /* NAVIGATION */
        .sidebar { position: fixed; left: -100%; top: 0; bottom: 0; width: 280px; background: var(--dark); color: white; padding: 30px; transition: 0.3s; z-index: 1000; }
        .sidebar.open { left: 0; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; }
        .overlay.active { display: block; }
        .nav-btn { padding: 15px; border-radius: 12px; color: #94a3b8; font-weight: 800; font-size: 0.75rem; cursor: pointer; margin-bottom: 10px; }
        .nav-btn.active { background: var(--primary); color: white; }

        /* HEADER */
        .header { position: sticky; top: 0; background: var(--white); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; z-index: 900; }
        .menu-icon { font-size: 1.5rem; cursor: pointer; color: var(--primary); background: none; border: none; }

        .content { padding: 15px; max-width: 100%; margin: auto; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }

        /* FORM & CARDS */
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; }
        label { font-size: 0.65rem; font-weight: 800; color: #64748b; }
        input, select { padding: 14px; border-radius: 12px; border: 1px solid #e2e8f0; font-weight: 700; font-size: 0.85rem; width: 100%; }

        /* TABLE & LISTS */
        .table-wrap { background: white; border-radius: 15px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { padding: 15px; text-align: left; font-size: 0.6rem; color: #64748b; background: #fcfdfe; }
        td { padding: 15px; font-size: 0.8rem; font-weight: 700; border-top: 1px solid #f1f5f9; }
        .st-img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; }

        /* ATTENDANCE TOGGLE */
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        input:checked + .slider { background-color: var(--success); }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider:before { transform: translateX(26px); }

        .btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; }
        #login-screen { position:fixed; inset:0; background:var(--dark); z-index:2000; display:flex; align-items:center; justify-content:center; padding: 20px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div style="background:white; padding:40px; border-radius:30px; width:100%; max-width:400px; text-align:center;">
            <h2 style="color:var(--primary); margin:0;">EUDES MEDIA</h2>
            <p style="font-size:0.7rem; color:#94a3b8; margin-bottom:25px;">SECURE ACCESS</p>
            <input type="text" id="schId" placeholder="SCHOOL ID" style="margin-bottom:10px;">
            <input type="password" id="schKey" placeholder="ACCESS KEY" style="margin-bottom:20px;">
            <button onclick="authenticate()" class="btn">LOGIN</button>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <h3 style="text-align:center; margin-bottom:40px;">PREMIER ENGINE</h3>
        <div class="nav-btn active" onclick="showPage('dash-p', this)">📊 DASHBOARD</div>
        <div class="nav-btn" onclick="showPage('reg-p', this)">📝 NEW ADMISSION</div>
        <div class="nav-btn" onclick="fetchStudents(); showPage('list-p', this)">👥 REGISTRY & PAYMENTS</div>
        <div class="nav-btn" onclick="fetchStudents(); showPage('roll-p', this)">✅ ROLL CALL</div>
    </div>

    <div class="header">
        <button class="menu-icon" onclick="toggleMenu()">☰</button>
        <img id="dispLogo" src="" style="height:35px; border-radius:8px;">
        <h4 id="dispName" style="margin:0; font-size: 0.7rem; color: var(--primary);"></h4>
    </div>

    <div class="content">
        <div id="dash-p" class="page active">
            <div style="display:grid; gap:10px;">
                <div class="card"><label>TOTAL STUDENTS</label><p id="stCount">0</p></div>
                <div class="card" style="border-left-color:var(--success)"><label>TOTAL PAID</label><p id="stPaid">0</p></div>
            </div>
        </div>

        <div id="reg-p" class="page">
            <div class="card">
                <div class="field"><label>LIN (ID)</label><input type="text" id="rLin"></div>
                <div class="field"><label>FULL NAME</label><input type="text" id="rName"></div>
                <div class="field"><label>CONTACT</label><input type="tel" id="rTel"></div>
                <div class="field"><label>LOCATION</label><input type="text" id="rLoc"></div>
                <div class="field"><label>DATE OF BIRTH</label><input type="date" id="rDob"></div>
                <div class="field"><label>HEALTH STATUS</label><input type="text" id="rHealth" value="NORMAL"></div>
                <div class="field"><label>TOTAL TUITION (UGX)</label><input type="number" id="rFees"></div>
                <button class="btn" onclick="saveStudent()">ADMIT STUDENT</button>
            </div>
        </div>

        <div id="list-p" class="page">
            <h3>REGISTRY & HISTORY</h3>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr><th>PHOTO</th><th>NAME</th><th>CONTACT</th><th>LOCATION</th><th>HEALTH</th><th>DEBT</th></tr>
                    </thead>
                    <tbody id="stTable"></tbody>
                </table>
            </div>
        </div>

        <div id="roll-p" class="page">
            <h3>DAILY ROLL CALL</h3>
            <div id="rollList"></div>
        </div>
    </div>

    <script>
        const _U = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const _K = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const client = supabase.createClient(_U, _K);

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            if(window.innerWidth < 1000) toggleMenu();
        }

        async function authenticate() {
            const id = document.getElementById('schId').value;
            const key = document.getElementById('schKey').value;
            const { data: sch } = await client.from('Schools').select('*').eq('sch_id', id).single();
            if (sch && (key === sch.admin_key || key === sch.teacher_key)) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dispName').innerText = sch.school_name;
                document.getElementById('dispLogo').src = sch.logo_url;
                fetchStudents();
            } else { alert("WRONG KEY"); }
        }

        async function saveStudent() {
            const st = {
                lin: document.getElementById('rLin').value,
                name: document.getElementById('rName').value,
                contact_number: document.getElementById('rTel').value,
                physical_location: document.getElementById('rLoc').value,
                dob: document.getElementById('rDob').value,
                health_status: document.getElementById('rHealth').value,
                total_fees: parseFloat(document.getElementById('rFees').value) || 0,
                amount_paid: 0,
                is_absent: false,
                payment_history: []
            };
            const { error } = await client.from('Students').insert([st]);
            if (!error) { alert("SAVED"); location.reload(); }
            else { alert("DB ERROR: Check columns in Supabase."); }
        }

        async function fetchStudents() {
            const { data } = await client.from('Students').select('*').order('name');
            const tb = document.getElementById('stTable');
            const rl = document.getElementById('rollList');
            tb.innerHTML = ''; rl.innerHTML = '';
            
            data.forEach(s => {
                // Table
                tb.innerHTML += `<tr>
                    <td><img src="${s.photo_url || ''}" class="st-img"></td>
                    <td>${s.name}</td>
                    <td>${s.contact_number}</td>
                    <td>${s.physical_location}</td>
                    <td>${s.health_status}</td>
                    <td>${(s.total_fees - s.amount_paid).toLocaleString()}</td>
                </tr>`;

                // Roll Call List
                rl.innerHTML += `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                    <span>${s.name}</span>
                    <label class="switch">
                        <input type="checkbox" ${s.is_absent ? '' : 'checked'} onchange="markAttendance('${s.id}', this.checked)">
                        <span class="slider"></span>
                    </label>
                </div>`;
            });
            document.getElementById('stCount').innerText = data.length;
        }

        async function markAttendance(id, present) {
            await client.from('Students').update({ is_absent: !present }).eq('id', id);
        }
    </script>
</body>
</html>
