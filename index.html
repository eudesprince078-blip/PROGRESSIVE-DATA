<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROGRESSIVE PMS - V119 FINAL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #002b5b; --gold: #ffce00; --red: #ff3b3b; --green: #2ecc71; --gray: #f4f7fa; }
        body { font-family: 'Inter', sans-serif; background: var(--gray); margin: 0; padding-bottom: 80px; color: #333; }
        
        .header { background: linear-gradient(135deg, #001a33, var(--blue)); color: white; padding: 40px 20px 65px; text-align: center; border-radius: 0 0 45px 45px; border-bottom: 6px solid var(--gold); position: relative; }
        .clock-box { font-size: 34px; font-weight: 900; color: var(--gold); }
        .auto-notice { display: inline-block; background: white; color: var(--blue); padding: 10px 24px; border-radius: 50px; font-size: 11px; font-weight: 900; margin-top: 12px; border: 2px solid var(--gold); text-transform: uppercase; }
        .logout-btn { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.15); border: 1px solid white; color: white; border-radius: 12px; padding: 8px 15px; font-size: 10px; font-weight: 800; cursor: pointer; }

        .dash-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 15px; margin-top: -35px; }
        .dash-card { background: white; padding: 18px 5px; border-radius: 25px; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.06); border: 1px solid #eee; min-height: 60px; }
        .dash-card b { display: block; font-size: 18px; color: var(--blue); }
        
        .tab-bar { display: flex; justify-content: space-around; background: white; padding: 10px; margin: 20px 15px; border-radius: 25px; }
        .tab { padding: 12px 15px; font-size: 11px; font-weight: 900; color: #ccc; cursor: pointer; border-radius: 15px; }
        .tab.active { background: var(--blue); color: white; }

        .card { background: white; padding: 20px; border-radius: 25px; margin: 15px; border: 1px solid #eef0f2; }
        .info-tag { font-size: 10px; font-weight: 800; background: #f0f0f0; padding: 4px 8px; border-radius: 6px; margin-right: 5px; color: #666; }
        
        input, select, textarea { width: 100%; padding: 15px; margin-top: 10px; border: 1.5px solid #eee; border-radius: 15px; font-weight: 600; box-sizing: border-box; }
        .btn-main { background: var(--blue); color: white; border: none; padding: 18px; width: 100%; border-radius: 20px; font-weight: 900; margin-top: 15px; cursor: pointer; }
        .footer-brand { text-align: center; font-size: 10px; color: #aaa; font-weight: 800; margin-top: 30px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loginGate" style="padding: 100px 30px; text-align: center;">
    <h1 style="color:var(--blue); font-weight:900;">PROGRESSIVE PMS</h1>
    <div class="card" style="max-width:320px; margin:auto; border: 2px solid var(--blue);">
        <input id="sysKey" type="password" placeholder="ENTER SYSTEM KEY" style="text-align:center;">
        <button onclick="login()" class="btn-main">AUTHORIZE</button>
    </div>
</div>

<div id="mainApp" class="hidden">
    <div class="header">
        <button class="logout-btn" onclick="logout()">Logout</button>
        <div id="clock" class="clock-box">00:00:00</div>
        <div id="autoMsg" class="auto-notice">CALCULATING...</div>
    </div>

    <div class="dash-container">
        <div class="dash-card"><b id="statTotal">0</b><small style="font-size:8px; font-weight:800;">STUDENTS</small></div>
        <div class="dash-card"><b id="statPres" style="color:var(--green)">0</b><small style="font-size:8px; font-weight:800;">PRESENT</small></div>
        <div class="dash-card"><b id="statAbs" style="color:var(--red)">0</b><small style="font-size:8px; font-weight:800;">ABSENT</small></div>
    </div>

    <div class="tab-bar">
        <div id="tReg" class="tab active" onclick="showTab('reg')">REGISTER</div>
        <div id="tRoll" class="tab" onclick="showTab('roll')">ROLL CALL</div>
        <div id="tRec" class="tab" onclick="showTab('rec')">RECORDS</div>
    </div>

    <div id="secReg" class="card">
        <h4 id="formTitle" style="margin:0; color:var(--blue);">STUDENT ENTRY</h4>
        <input type="hidden" id="editId">
        <input id="fName" placeholder="Full Name">
        <select id="fClass"><option value="">Select Class</option><option>Baby</option><option>Middle</option><option>Top</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
        <input id="fCon" placeholder="Parent Contact">
        <input id="fLin" placeholder="LIN Number">
        <textarea id="fHealth" placeholder="Health Status"></textarea>
        <div id="fFin" class="hidden">
            <input id="fExp" type="number" placeholder="Expected Fees">
            <input id="fPaid" type="number" placeholder="Paid Fees">
        </div>
        <button id="saveBtn" onclick="save()" class="btn-main">SAVE & SYNC</button>
    </div>

    <div id="secRoll" class="hidden">
        <div class="card"><select id="rollClass" onchange="loadRoll()"><option value="">-- Choose Class --</option><option>Baby</option><option>Middle</option><option>Top</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select></div>
        <div id="rollArea"></div>
    </div>

    <div id="secRec" class="hidden">
        <div class="card"><input type="text" id="search" oninput="renderRec()" placeholder="🔍 Search name..."></div>
        <div id="recArea"></div>
    </div>

    <div class="footer-brand">SUPPORT: +256762992440 | EUDES MEDIA</div>
</div>

<script>
    const sb = supabase.createClient("https://kjftrwuucjdnhfwesrup.supabase.co", "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO");
    let ROLE = "", students = [], att = {};

    function login() {
        const k = document.getElementById('sysKey').value.toUpperCase();
        if(k === "JESUS CARES") ROLE = "ADMIN";
        else if(k === "FINANCE2026") ROLE = "FINANCE";
        else if(k === "TEACHER256") ROLE = "TEACHER";
        else return alert("Wrong Key");
        
        document.getElementById('loginGate').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        if(ROLE !== "TEACHER") document.getElementById('fFin').classList.remove('hidden');
        fetchData();
        setInterval(engine, 1000);
    }

    function logout() { location.reload(); }

    async function engine() {
        const now = new Date();
        const hr = now.getHours();
        const min = now.getMinutes();
        const time = hr * 100 + min;
        const day = now.getDay();
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');

        let msg = "SCHOOL ACTIVITY";
        
        // FIXED LOGIC FOR 10:20 PM AND SABBATH
        if (day === 6) { // Saturday
            if (time >= 2130 || time < 500) msg = "🌙 SLEEPING TIME";
            else if (time >= 1900) msg = "🌙 EVENING LESSONS";
            else msg = "⛪ HAPPY SABBATH";
        } else { // Weekdays / Sunday
            if (time >= 2130 || time < 500) msg = "🌙 SLEEPING TIME";
            else if (time >= 1600 && time < 1700) msg = "🏠 DEPARTURE & PREP";
            else if (time >= 1900 && time < 2100) msg = "🌙 EVENING LESSONS";
            else if (time >= 1300 && time < 1400) msg = "🍲 LUNCH TIME";
            else msg = "📖 CLASS IN SESSION";
        }
        document.getElementById('autoMsg').innerText = msg;
    }

    async function fetchData() {
        const { data } = await sb.from('students').select('*').order('name');
        students = data || [];
        document.getElementById('statTotal').innerText = students.length;
        renderRec();
    }

    async function save() {
        const id = document.getElementById('editId').value;
        const row = {
            name: document.getElementById('fName').value,
            class: document.getElementById('fClass').value,
            contact: document.getElementById('fCon').value,
            lin: document.getElementById('fLin').value,
            health_status: document.getElementById('fHealth').value
        };
        if(ROLE !== "TEACHER") {
            row.fees_expected = parseInt(document.getElementById('fExp').value) || 0;
            row.fees_paid = parseInt(document.getElementById('fPaid').value) || 0;
        }
        await (id ? sb.from('students').update(row).eq('id', id) : sb.from('students').insert([row]));
        alert("Synced!");
        fetchData();
        clearForm();
    }

    function renderRec() {
        const q = document.getElementById('search').value.toUpperCase();
        let h = "";
        students.filter(s => s.name.toUpperCase().includes(q)).forEach(s => {
            const bal = (s.fees_expected || 0) - (s.fees_paid || 0);
            h += `<div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b style="color:var(--blue)">${s.name}</b>
                    <span class="info-tag">${s.class}</span>
                </div>
                <div style="margin-top:10px; font-size:11px;">
                    <div><span class="info-tag">LIN:</span> <b>${s.lin || 'N/A'}</b></div>
                    <div style="margin-top:5px;"><span class="info-tag">HEALTH:</span> ${s.health_status || 'Normal'}</div>
                    ${ROLE !== "TEACHER" ? `<div style="margin-top:5px; color:${bal > 0 ? 'var(--red)' : 'var(--green)'}"><b>BAL: UGX ${bal.toLocaleString()}</b></div>` : ''}
                </div>
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button onclick="edit('${s.id}')" style="flex:1; border:none; padding:10px; border-radius:12px; font-weight:800; font-size:11px;">EDIT</button>
                    <a href="tel:${s.contact}" style="flex:1; background:var(--blue); color:white; padding:10px; border-radius:12px; text-align:center; text-decoration:none; font-size:11px; font-weight:800;">CALL</a>
                </div>
            </div>`;
        });
        document.getElementById('recArea').innerHTML = h;
    }

    function edit(id) {
        const s = students.find(x => x.id == id);
        if(!s) return;
        document.getElementById('editId').value = s.id;
        document.getElementById('fName').value = s.name;
        document.getElementById('fClass').value = s.class;
        document.getElementById('fCon').value = s.contact;
        document.getElementById('fLin').value = s.lin;
        document.getElementById('fHealth').value = s.health_status;
        if(ROLE !== "TEACHER") {
            document.getElementById('fExp').value = s.fees_expected;
            document.getElementById('fPaid').value = s.fees_paid;
        }
        showTab('reg');
    }

    function loadRoll() {
        const cls = document.getElementById('rollClass').value;
        const list = students.filter(s => s.class === cls);
        let h = "";
        list.forEach(s => {
            const st = att[s.id] || 'present';
            h += `<div style="display:flex; justify-content:space-between; align-items:center; padding:15px; border-bottom:1px solid #eee;">
                <b>${s.name}</b>
                <div style="display:flex; gap:10px;">
                    <button onclick="setAtt('${s.id}','present')" style="padding:10px; border-radius:10px; border:1px solid #eee; ${st==='present'?'background:var(--green); color:white;':''}">P</button>
                    <button onclick="setAtt('${s.id}','absent')" style="padding:10px; border-radius:10px; border:1px solid #eee; ${st==='absent'?'background:var(--red); color:white;':''}">A</button>
                </div>
            </div>`;
        });
        document.getElementById('rollArea').innerHTML = h;
    }

    function setAtt(id, s) { 
        att[id] = s; 
        let p = 0, a = 0;
        Object.values(att).forEach(v => v==='present'?p++:a++);
        document.getElementById('statPres').innerText = p;
        document.getElementById('statAbs').innerText = a;
        loadRoll(); 
    }

    function showTab(t) {
        ['secReg','secRoll','secRec'].forEach(s => document.getElementById(s).classList.add('hidden'));
        ['tReg','tRoll','tRec'].forEach(s => document.getElementById(s).classList.remove('active'));
        document.getElementById('sec'+t.charAt(0).toUpperCase()+t.slice(1)).classList.remove('hidden');
        document.getElementById('t'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('active');
    }

    function clearForm() {
        ['fName','fCon','fHealth','fExp','fPaid','editId','fLin'].forEach(i => document.getElementById(i).value = "");
    }
</script>
</body>
</html>
