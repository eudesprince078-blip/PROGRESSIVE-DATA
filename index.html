<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROGRESSIVE MOTHERS PMS - V153</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #002b5b; --gold: #ffce00; --red: #ff3b3b; --green: #2ecc71; --gray: #f4f7fa; }
        body { font-family: 'Inter', sans-serif; background: var(--gray); margin: 0; padding-bottom: 100px; color: #333; }
        
        .top-nav { background: #001326; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-weight: 700; position: sticky; top: 0; z-index: 2000; }
        .logout-btn { background: var(--red); color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: 900; cursor: pointer; font-size: 10px; }

        .header { background: linear-gradient(135deg, #001a33, var(--blue)); color: white; padding: 20px 15px 90px; text-align: center; border-bottom: 6px solid var(--gold); position: relative; border-radius: 0 0 40px 40px; }
        .clock-box { font-size: 42px; font-weight: 900; margin: 5px 0; }
        .activity-banner { font-size: 10px; font-weight: 900; padding: 8px 15px; border-radius: 50px; display: inline-block; border: 2px solid white; background: rgba(255,255,255,0.1); color: var(--gold); text-transform: uppercase; }

        .dash-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 15px; margin-top: -45px; z-index: 100; position: relative; }
        .dash-card { background: white; padding: 15px 5px; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .dash-card span { display: block; font-size: 18px; font-weight: 900; color: var(--blue); }

        .tab-bar { display: flex; background: white; padding: 8px; margin: 20px 15px; border-radius: 15px; overflow-x: auto; }
        .tab { flex: 1; padding: 12px 5px; font-size: 10px; font-weight: 900; color: #bbb; text-align: center; display: none; cursor: pointer; white-space: nowrap; }
        .tab.active { background: var(--blue); color: white; border-radius: 10px; }

        .search-container { padding: 0 15px 10px; }
        .search-bar { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #ddd; font-weight: 600; box-sizing: border-box; font-size: 14px; }

        .list-item { border-left: 6px solid var(--blue); padding: 15px; margin: 10px 15px; background: white; border-radius: 15px; position: relative; border: 1px solid #eee; border-left-width: 6px; }
        .list-item b { font-size: 14px; display: block; text-transform: uppercase; padding-right: 80px; color: var(--blue); }
        
        .action-tray { margin-top: 10px; display: flex; gap: 15px; }
        .action-btn { text-decoration: none; font-size: 18px; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 10px; background: #f8f9fa; border: 1px solid #eee; }
        .call-btn { color: var(--blue); }
        .wa-btn { color: var(--green); }

        .card { background: white; padding: 20px; border-radius: 25px; margin: 15px; border: 1px solid #eee; }
        label { font-size: 10px; font-weight: 800; color: var(--blue); margin-top: 10px; display: block; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; margin-top: 5px; border: 1.5px solid #eee; border-radius: 10px; font-size: 14px; box-sizing: border-box; font-weight: 600; }
        
        .pass-container { position: relative; display: flex; align-items: center; width: 100%; }
        .pass-container i { position: absolute; right: 15px; color: var(--blue); cursor: pointer; }

        .btn-main { background: var(--blue); color: white; border: none; padding: 16px; width: 100%; border-radius: 15px; font-weight: 900; margin-top: 15px; cursor: pointer; font-size: 14px; }
        .hidden { display: none !important; }
        .footer-brand { text-align: center; font-size: 10px; color: #bbb; padding: 20px; font-weight: 800; }
    </style>
</head>
<body>

<div id="loginGate" style="max-width: 340px; margin: 100px auto; text-align: center;">
    <h2 style="color:var(--blue); font-weight:900;">PROGRESSIVE MOTHERS</h2>
    <div class="card">
        <label>SYSTEM ACCESS KEY</label>
        <div class="pass-container">
            <input id="sysKey" type="password" placeholder="••••••••" style="text-align:center;">
            <i class="fa-solid fa-eye" id="toggleEye" onclick="togglePass()"></i>
        </div>
        <button onclick="login()" class="btn-main">LOG IN</button>
    </div>
</div>

<div id="mainApp" class="hidden">
    <div class="top-nav">
        <span id="sysDateDisplay">...</span>
        <button class="logout-btn" onclick="location.reload()">LOGOUT</button>
    </div>

    <div class="header">
        <span style="font-weight:900; font-size: 12px; letter-spacing: 1px; display:block; margin-bottom:5px;">GAYAZA-KIJABIJJO</span>
        <div id="clock" class="clock-box">00:00:00</div>
        <div id="activityStatus" class="activity-banner">INITIALIZING...</div>
    </div>

    <div class="dash-container">
        <div class="dash-card"><span id="statTotal">0</span><small>STUDENTS</small></div>
        <div class="dash-card"><span id="statPres" style="color:var(--green)">0</span><small>PRESENT</small></div>
        <div class="dash-card"><span id="statAbs" style="color:var(--red)">0</span><small>ABSENT</small></div>
    </div>

    <div class="tab-bar">
        <div id="tReg" class="tab" onclick="showTab('reg')">ADMISSION</div>
        <div id="tRoll" class="tab" onclick="showTab('roll')">ROLL CALL</div>
        <div id="tRec" class="tab" onclick="showTab('rec')">RECORDS</div>
        <div id="tFin" class="tab" onclick="showTab('fin')">FINANCE</div>
    </div>

    <div id="rollPicker" class="card hidden" style="margin-bottom:0; background: var(--blue);">
        <label style="color:white;">SELECT CLASS FOR ATTENDANCE</label>
        <select id="selClassRoll" onchange="runGlobalSearch()">
            <option value="">-- ALL CLASSES --</option>
            <option>Baby</option><option>Middle</option><option>Top</option>
            <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
            <option>P.5</option><option>P.6</option><option>P.7</option>
        </select>
    </div>

    <div id="searchWrapper" class="search-container hidden">
        <input type="text" id="globalSearch" class="search-bar" oninput="runGlobalSearch()" placeholder="Search Name, LIN, or Class...">
    </div>

    <div id="secReg" class="card hidden">
        <h3 id="regTitle" style="color:var(--blue); font-size:15px; margin:0;">STUDENT PROFILE</h3>
        <input type="hidden" id="editId">
        <label>LIN</label><input id="fLin" disabled style="background:#f4f4f4;">
        <label>Full Name</label><input id="fName">
        <label>Class</label>
        <select id="fClass"><option>Baby</option><option>Middle</option><option>Top</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
        <label>Parent Contact</label><input id="fCon" placeholder="e.g 0770000000">
        
        <div id="financeBox">
            <label>Total Fees (UGX)</label><input type="number" id="fExp">
            <label>Paid (UGX)</label><input type="number" id="fPaid">
        </div>
        
        <button onclick="saveData()" class="btn-main">SYNC RECORD</button>
        <button id="delBtn" onclick="deleteStudent()" class="btn-main hidden" style="background:var(--red)">DELETE STUDENT</button>
        <button onclick="clearForm()" class="btn-main" style="background:#666">CANCEL / NEW</button>
    </div>

    <div id="secList" class="hidden"></div>

    <div class="footer-brand">EUDES MEDIA SOLUTIONS | +256762992440</div>
</div>

<script>
    const sb = supabase.createClient("https://kjftrwuucjdnhfwesrup.supabase.co", "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO");
    let ROLE = "", students = [], att = {}, activeTab = "";

    function togglePass() {
        const p = document.getElementById('sysKey');
        const e = document.getElementById('toggleEye');
        if(p.type === "password") { p.type = "text"; e.className = "fa-solid fa-eye-slash"; }
        else { p.type = "password"; e.className = "fa-solid fa-eye"; }
    }

    function login() {
        const k = document.getElementById('sysKey').value.trim().toUpperCase();
        if (k === "JESUS CARES") ROLE = "ADMIN";
        else if (k === "FINANCE2026") ROLE = "FINANCE";
        else if (k === "TEACHER256") ROLE = "TEACHER";
        else return alert("Invalid Key");

        document.getElementById('loginGate').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');

        if(ROLE === "ADMIN") ['tReg','tRoll','tRec','tFin'].forEach(t => document.getElementById(t).style.display="block");
        else if(ROLE === "FINANCE") ['tReg','tFin'].forEach(t => document.getElementById(t).style.display="block");
        else ['tReg','tRoll'].forEach(t => document.getElementById(t).style.display="block");

        showTab(ROLE === "TEACHER" ? 'roll' : (ROLE === "FINANCE" ? 'fin' : 'reg'));
        fetchData(); setInterval(tick, 1000);
    }

    async function fetchData() {
        const { data } = await sb.from('students').select('*').order('name');
        if(data) { students = data; document.getElementById('statTotal').innerText = students.length; runGlobalSearch(); }
    }

    function tick() {
        const n = new Date();
        const dStr = n.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }).toUpperCase();
        document.getElementById('clock').innerText = n.toLocaleTimeString('en-GB');
        document.getElementById('sysDateDisplay').innerText = dStr;

        const day = n.getDate(); const mon = n.getMonth() + 1;
        const hr = n.getHours(); const min = n.getMinutes();
        const t = hr * 100 + min;
        
        let updateText = "🏫 CLASS TIME";
        
        // 1. Check Holiday First
        if (day === 5 && mon === 4) updateText = "🐣 HAPPY EASTER 2026";
        else if (day === 6 && mon === 4) updateText = "🐣 EASTER MONDAY";
        else if (day === 1 && mon === 5) updateText = "👷 LABOUR DAY";
        else {
            // 2. Check Daily Routine
            if (t >= 630 && t < 800) updateText = "🌅 ARRIVAL & CLEANING";
            else if (t >= 800 && t < 1030) updateText = "📚 MORNING LESSONS";
            else if (t >= 1030 && t < 1100) updateText = "☕ BREAK TIME";
            else if (t >= 1100 && t < 1230) updateText = "📖 LESSONS CONTINUING";
            else if (t >= 1230 && t < 1330) updateText = "🍲 LUNCH TIME";
            else if (t >= 1330 && t < 1430) updateText = "💤 SLEEPING / REST";
            else if (t >= 1600) updateText = "🌙 SCHOOL CLOSED";
        }
        document.getElementById('activityStatus').innerText = updateText;
    }

    function showTab(t) {
        activeTab = t;
        ['tReg','tRoll','tRec','tFin'].forEach(id => { if(document.getElementById(id)) document.getElementById(id).classList.remove('active'); });
        if(document.getElementById('t'+t.charAt(0).toUpperCase()+t.slice(1))) document.getElementById('t'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('active');
        
        document.getElementById('secReg').classList.add('hidden');
        document.getElementById('secList').classList.add('hidden');
        document.getElementById('searchWrapper').classList.add('hidden');
        document.getElementById('rollPicker').classList.add('hidden');

        if(t === 'reg') { 
            document.getElementById('secReg').classList.remove('hidden'); 
        } else {
            if(t === 'roll') document.getElementById('rollPicker').classList.remove('hidden');
            document.getElementById('secList').classList.remove('hidden');
            document.getElementById('searchWrapper').classList.remove('hidden');
            runGlobalSearch();
        }
    }

    function runGlobalSearch() {
        const q = document.getElementById('globalSearch').value.toUpperCase();
        const rollClass = document.getElementById('selClassRoll').value;
        
        const filtered = students.filter(s => {
            const matchesSearch = s.name.toUpperCase().includes(q) || (s.lin_number || s.lin || "").toUpperCase().includes(q) || s.class.toUpperCase().includes(q);
            const matchesClass = activeTab === 'roll' && rollClass ? s.class === rollClass : true;
            return matchesSearch && matchesClass;
        });

        let h = "";
        filtered.forEach(s => {
            const lin = s.lin_number || s.lin || "MISSING";
            const bal = (s.fees_expected || 0) - (s.fees_paid || 0);
            const rawPhone = s.contact ? s.contact.toString().replace(/\D/g, '') : "";
            
            let actions = "";
            if(rawPhone) {
                actions = `<div class="action-tray">
                    <a href="tel:${rawPhone}" class="action-btn call-btn"><i class="fa-solid fa-phone"></i></a>
                    <a href="https://wa.me/${rawPhone.length === 9 ? '256'+rawPhone : rawPhone}" class="action-btn wa-btn"><i class="fa-brands fa-whatsapp"></i></a>
                </div>`;
            }

            if(activeTab === 'roll') {
                const isAbs = att[s.id] === 'absent';
                h += `<div class="list-item"><b>${s.name}</b><small>${lin} | ${s.class}</small>${actions}<button onclick="toggleAtt('${s.id}')" style="position:absolute; right:15px; top:15px; padding:12px; border-radius:10px; border:none; background:${isAbs ? 'var(--red)' : 'var(--green)'}; color:white; font-weight:900;">${isAbs ? 'ABS' : 'PRES'}</button></div>`;
            } else if(activeTab === 'fin') {
                h += `<div class="list-item" onclick="setEdit('${s.id}')"><span style="position:absolute; right:15px; top:15px; font-size:9px; padding:4px 8px; border-radius:5px; background:${bal<=0?'var(--green)':'var(--red)'}; color:white; font-weight:900;">${bal<=0?'CLEARED':'DEBT'}</span><b>${s.name}</b><small>Bal: UGX ${bal.toLocaleString()}</small>${actions}</div>`;
            } else {
                h += `<div class="list-item" onclick="setEdit('${s.id}')"><b>${s.name}</b><small>${lin} | ${s.class}</small>${actions}</div>`;
            }
        });
        document.getElementById('secList').innerHTML = h || "<p style='text-align:center; padding:20px; color:#999;'>No students found.</p>";
    }

    function toggleAtt(id) {
        att[id] = (att[id] === 'absent') ? 'present' : 'absent';
        let a = 0; Object.values(att).forEach(v => { if(v === 'absent') a++; });
        document.getElementById('statAbs').innerText = a; 
        document.getElementById('statPres').innerText = students.length - a;
        runGlobalSearch();
    }

    function setEdit(id) {
        const s = students.find(x => x.id == id);
        if(!s) return;
        document.getElementById('editId').value = s.id;
        document.getElementById('fLin').value = s.lin_number || s.lin || "GENERATING...";
        document.getElementById('fName').value = s.name;
        document.getElementById('fClass').value = s.class;
        document.getElementById('fCon').value = s.contact || "";
        document.getElementById('fExp').value = s.fees_expected || 0;
        document.getElementById('fPaid').value = s.fees_paid || 0;

        const isFin = ROLE === "FINANCE";
        ['fName','fClass','fCon'].forEach(f => document.getElementById(f).disabled = isFin);
        if(ROLE === "ADMIN") document.getElementById('delBtn').classList.remove('hidden');
        showTab('reg');
    }

    async function saveData() {
        const id = document.getElementById('editId').value;
        const name = document.getElementById('fName').value;
        const row = {
            name: name, class: document.getElementById('fClass').value, contact: document.getElementById('fCon').value,
            fees_expected: parseInt(document.getElementById('fExp').value) || 0,
            fees_paid: parseInt(document.getElementById('fPaid').value) || 0
        };

        if(!id) row.lin_number = `PM${name.charAt(0).toUpperCase()}${Math.floor(1000+Math.random()*9000)}`;

        if(id) await sb.from('students').update(row).eq('id', id);
        else await sb.from('students').insert([row]);
        
        alert("Synced!"); clearForm(); fetchData();
    }

    function clearForm() {
        ['fName','fCon','fExp','fPaid','editId','fLin'].forEach(f => { document.getElementById(f).value = ""; document.getElementById(f).disabled = false; });
        document.getElementById('delBtn').classList.add('hidden');
    }

    async function deleteStudent() {
        if(confirm("Delete student?")) { await sb.from('students').delete().eq('id', document.getElementById('editId').value); fetchData(); clearForm(); }
    }
</script>
</body>
</html>
