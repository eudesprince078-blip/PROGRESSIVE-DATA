<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS PRO | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #0047AB; --bg: #f8fafc; --text: #1e293b; --accent: #F5B81B; --white: #ffffff; --sidebar-w: 260px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; text-transform: uppercase; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* PROFESSIONAL LOGIN */
        #auth-overlay { position: fixed; inset: 0; background: linear-gradient(135deg, #0f172a 0%, #0047AB 100%); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--white); padding: 40px; border-radius: 24px; width: 90%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border-top: 6px solid var(--accent); }

        /* DASHBOARD LAYOUT */
        .wrapper { display: flex; height: 100vh; width: 100vw; }
        
        .sidebar { width: 70px; background: #0f172a; color: white; display: flex; flex-direction: column; padding: 20px 0; transition: 0.3s; z-index: 100; flex-shrink: 0; }
        @media (min-width: 768px) { .sidebar { width: var(--sidebar-w); padding: 25px; } }

        .nav-link { display: flex; align-items: center; padding: 14px 20px; color: #94a3b8; text-decoration: none; cursor: pointer; border-radius: 12px; margin-bottom: 8px; transition: 0.2s; border: none; background: none; width: 100%; text-align: left; }
        .nav-link i { font-size: 1.2rem; min-width: 30px; }
        .nav-link span { display: none; font-weight: 600; font-size: 0.85rem; margin-left: 10px; }
        @media (min-width: 768px) { .nav-link span { display: block; } }
        .nav-link.active { background: var(--primary); color: white; }

        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-bar { height: 70px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }

        .content { padding: 30px; overflow-y: auto; flex: 1; }
        
        /* MODERN CARDS */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 24px; border-radius: 16px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 20px; }
        .stat-icon { width: 50px; height: 50px; border-radius: 12px; background: #eff6ff; color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }

        /* FORM STYLING */
        .form-container { background: white; padding: 30px; border-radius: 20px; border: 1px solid #e2e8f0; max-width: 700px; margin: 0 auto; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 600px) { .input-row { grid-template-columns: 1fr; } }
        
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; font-weight: 800; color: #64748b; margin-bottom: 8px; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1.5px solid #e2e8f0; font-weight: 700; outline: none; }
        input:focus { border-color: var(--primary); }

        .photo-upload { border: 2px dashed #cbd5e1; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; margin-bottom: 20px; }
        #photo-preview { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; display: none; margin: 10px auto; border: 3px solid var(--primary); }

        .btn-prime { background: var(--primary); color: white; padding: 15px 25px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-prime:hover { opacity: 0.9; transform: translateY(-2px); }

        .hidden { display: none !important; }
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 0.65rem; font-weight: 800; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="login-card">
            <h1 style="color:var(--primary); font-weight:900; letter-spacing:-1px; margin-bottom:5px;">ESMS PRO</h1>
            <p style="font-size:0.6rem; color:#64748b; font-weight:800; margin-bottom:30px;">POWERED BY EUDES MEDIA</p>
            <input type="text" id="login-id" placeholder="SCHOOL ID" style="margin-bottom:15px;">
            <input type="password" id="login-pass" placeholder="ACCESS PIN" style="margin-bottom:20px;">
            <button onclick="handleLogin()" class="btn-prime">LOGIN TO SYSTEM</button>
            <p id="err-msg" style="color:var(--danger); font-size:0.65rem; margin-top:15px; font-weight:900;"></p>
        </div>
    </div>

    <div class="wrapper">
        <nav class="sidebar hidden" id="sidebar">
            <div style="padding:0 25px 30px; font-weight:900; color:var(--accent);">EUDES</div>
            <button class="nav-link active" onclick="showPage('dash', this)"><i class="fas fa-grid-2"></i><span>DASHBOARD</span></button>
            <button class="nav-link" onclick="showPage('reg', this)"><i class="fas fa-user-plus"></i><span>ADMISSIONS</span></button>
            <button class="nav-link" onclick="showPage('fees', this)"><i class="fas fa-wallet"></i><span>FINANCE</span></button>
            <button class="nav-link" onclick="showPage('exam', this)"><i class="fas fa-file-signature"></i><span>EXAMS</span></button>
            <div style="margin-top:auto; padding:20px; font-size:0.55rem; color:#64748b; font-weight:700; line-height:1.4;">
                SUPPORT:<br>+256 762 992440
            </div>
        </nav>

        <main class="main hidden" id="main">
            <header class="top-bar">
                <h2 id="sch-name" style="font-size:0.9rem; font-weight:800; color:#0f172a;">...</h2>
                <div id="role-tag" class="badge" style="background:#fef3c7; color:#92400e;">...</div>
            </header>

            <div class="content">
                <div id="page-dash">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-users"></i></div>
                            <div><p style="font-size:0.7rem; color:#64748b;">STUDENTS</p><h2 id="count-st">0</h2></div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-money-bill-wave"></i></div>
                            <div><p style="font-size:0.7rem; color:#64748b;">COLLECTIONS</p><h2 id="count-money">0</h2></div>
                        </div>
                    </div>
                    <div class="form-container" style="border-left:8px solid var(--accent);">
                        <p style="font-weight:800;">SYSTEM EXPIRY: <span id="exp-date" style="color:var(--danger);">...</span></p>
                    </div>
                </div>

                <div id="page-reg" class="hidden">
                    <div class="form-container">
                        <h2 style="margin-bottom:25px;">NEW STUDENT ADMISSION</h2>
                        
                        <div class="photo-upload" onclick="document.getElementById('file-input').click()">
                            <i class="fas fa-camera" style="font-size:1.5rem; color:#cbd5e1;"></i>
                            <p style="font-size:0.6rem; margin-top:5px;">UPLOAD PHOTO</p>
                            <img id="photo-preview">
                            <input type="file" id="file-input" class="hidden" accept="image/*" onchange="compressImage(event)">
                        </div>

                        <div class="input-row">
                            <div class="field"><label>FULL NAME</label><input type="text" id="r-name"></div>
                            <div class="field"><label>CLASS</label>
                                <select id="r-class"><option>P.1</option><option>P.2</option><option>P.7</option></select>
                            </div>
                        </div>
                        <div class="input-row">
                            <div class="field"><label>CONTACT</label><input type="text" id="r-phone" value="+256"></div>
                            <div class="field"><label>LOCATION</label><input type="text" id="r-loc"></div>
                        </div>
                        <div class="field"><label>HEALTH STATUS</label><input type="text" id="r-health" value="NORMAL"></div>
                        <div class="field"><label>TOTAL FEES (UGX)</label><input type="number" id="r-fees" value="500000"></div>
                        
                        <button onclick="saveStudent()" class="btn-prime">SAVE STUDENT RECORD</button>
                    </div>
                </div>
                
                <div id="page-fees" class="hidden"><div id="fees-list"></div></div>
                <div id="page-exam" class="hidden"><div id="marks-list"></div></div>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentSch = ""; let role = ""; let compressedPhoto = "";

        // IMAGE COMPRESSION (SAVES SPACE)
        function compressImage(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 200; // Small size for database
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    compressedPhoto = canvas.toDataURL('image/jpeg', 0.7); // 70% quality
                    document.getElementById('photo-preview').src = compressedPhoto;
                    document.getElementById('photo-preview').style.display = 'block';
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        }

        async function handleLogin() {
            const id = document.getElementById('login-id').value.toUpperCase().trim();
            const pin = document.getElementById('login-pass').value.trim();
            const { data: sch } = await sb.from('Schools').select('*').eq('sch_id', id).single();

            if (sch) {
                const today = new Date().toISOString().split('T')[0];
                if (today > sch.expiry_date || !sch.is_active) {
                    document.getElementById('err-msg').innerHTML = "SYSTEM EXPIRED. CALL: +256762992440"; return;
                }
                if (pin === sch.admin_key || pin === "eudes2026") role = "ADMIN";
                else if (pin === sch.teacher_key) role = "TEACHER";
                else { document.getElementById('err-msg').innerText = "WRONG PIN"; return; }

                currentSch = id;
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('sidebar').classList.remove('hidden');
                document.getElementById('main').classList.remove('hidden');
                document.getElementById('sch-name').innerText = sch.school_name;
                document.getElementById('role-tag').innerText = role;
                document.getElementById('exp-date').innerText = sch.expiry_date;
                loadDash();
            } else { document.getElementById('err-msg').innerText = "NOT FOUND"; }
        }

        async function saveStudent() {
            const name = document.getElementById('r-name').value;
            const lin = `${currentSch.substring(0,2)}-${name.charAt(0)}-${Math.floor(1000+Math.random()*9000)}`;
            const { error } = await sb.from('Students').insert([{
                sch_id: currentSch, name, lin, 
                photo_url: compressedPhoto, // This is now the actual image text!
                class: document.getElementById('r-class').value,
                total_fees_required: document.getElementById('r-fees').value,
                location: document.getElementById('r-loc').value,
                health_status: document.getElementById('r-health').value
            }]);
            if (!error) { alert("SUCCESS: " + lin); loadDash(); showPage('dash', document.querySelector('.nav-link')); }
        }

        async function loadDash() {
            const { data } = await sb.from('Students').select('*').eq('sch_id', currentSch);
            if (data) {
                document.getElementById('count-st').innerText = data.length;
                let money = data.reduce((acc, s) => acc + (Number(s.fees_paid) || 0), 0);
                document.getElementById('count-money').innerText = money.toLocaleString() + " UGX";
            }
        }

        function showPage(p, btn) {
            ['dash', 'reg', 'fees', 'exam'].forEach(id => document.getElementById('page-'+id).classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
            document.getElementById('page-'+p).classList.remove('hidden');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
