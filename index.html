<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS ELITE | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0052cc; --dark: #020617; --bg: #f8fafc; --danger: #ef4444; --success: #22c55e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #1e293b; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .top-bar { height: 70px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; }
        .wrapper { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 240px; background: var(--dark); display: flex; flex-direction: column; transition: 0.3s; }
        @media (max-width: 1024px) { .sidebar { position: fixed; height: 100%; transform: translateX(-100%); z-index: 2000; } .sidebar.open { transform: translateX(0); } }
        
        .nav-item { padding: 15px 20px; color: #94a3b8; cursor: pointer; display: flex; align-items: center; font-weight: 700; border: none; background: none; width: 100%; text-align: left; }
        .nav-item.active { background: var(--primary); color: white; }
        .content { flex: 1; overflow-y: auto; padding: 20px; }

        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 20px; border-radius: 20px; border-bottom: 4px solid var(--primary); text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .glass-card { background: white; border-radius: 20px; padding: 20px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .student-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 15px; }
        .st-photo { width: 55px; height: 55px; border-radius: 12px; object-fit: cover; background: #cbd5e1; }
        
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #cbd5e1; margin-bottom: 12px; font-weight: 600; }
        .btn-pro { background: var(--primary); color: white; padding: 16px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; width: 100%; }
        .hidden { display: none !important; }
        
        #auth { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="auth">
        <div style="background:white; padding:40px; border-radius:30px; width:100%; max-width:400px; text-align:center;">
            <h1 style="font-weight:900;">ESMS <span style="color:var(--primary)">ELITE</span></h1>
            <p style="font-size:0.7rem; font-weight:800; color:#94a3b8; margin-bottom:20px;">EUDES MEDIA SOLUTIONS</p>
            <input type="text" id="sch-login" placeholder="SCHOOL ID" style="text-align:center;">
            <button class="btn-pro" onclick="verify()">LOAD SYSTEM</button>
        </div>
    </div>

    <header class="top-bar">
        <div onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></div>
        <div style="text-align:center;">
            <img id="logo" style="height:35px; border-radius:5px;">
            <p id="live-clock" style="font-size:0.6rem; font-weight:900; color:var(--primary)"></p>
        </div>
        <i class="fas fa-sync" onclick="refresh()" style="cursor:pointer; color:var(--primary)"></i>
    </header>

    <div class="wrapper">
        <aside class="sidebar" id="sidebar">
            <nav style="margin-top:20px;">
                <button class="nav-item active" onclick="nav('dash', this)"><i class="fas fa-chart-line"></i>&nbsp;&nbsp;Dashboard</button>
                <button class="nav-item" onclick="nav('list', this)"><i class="fas fa-address-book"></i>&nbsp;&nbsp;Student List</button>
                <button class="nav-item" onclick="nav('reg', this)"><i class="fas fa-plus-circle"></i>&nbsp;&nbsp;Enrollment</button>
                <button class="nav-item" onclick="nav('fin', this)"><i class="fas fa-coins"></i>&nbsp;&nbsp;Finance</button>
                <button class="nav-item" onclick="nav('rep', this)"><i class="fas fa-file-pdf"></i>&nbsp;&nbsp;Reports</button>
            </nav>
        </aside>

        <div class="content">
            <div id="v-dash">
                <div class="stat-grid">
                    <div class="stat-card"><h2><span id="st-count">0</span></h2><p style="font-size:0.6rem; font-weight:800;">STUDENTS</p></div>
                    <div class="stat-card"><h2><span id="st-paid" style="color:var(--success)">0</span></h2><p style="font-size:0.6rem; font-weight:800;">PAID (UGX)</p></div>
                    <div class="stat-card"><h2><span id="st-debt" style="color:var(--danger)">0</span></h2><p style="font-size:0.6rem; font-weight:800;">BALANCE</p></div>
                </div>
            </div>

            <div id="v-reg" class="hidden">
                <div class="glass-card">
                    <h3>REGISTRATION</h3>
                    <input type="hidden" id="f-id">
                    <div style="text-align:center; margin-bottom:15px;">
                        <img id="f-preview" class="st-photo" style="width:100px; height:100px; display:none; margin:0 auto 10px;">
                        <input type="file" id="f-file" accept="image/*" onchange="previewImg(this)">
                    </div>
                    <input type="text" id="f-name" placeholder="Full Name">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <input type="number" id="f-age" placeholder="Age">
                        <input type="date" id="f-dob">
                    </div>
                    <select id="f-class">
                        <option>Baby Class</option><option>Middle Class</option><option>Top Class</option>
                        <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                        <option>P.5</option><option>P.6</option><option>P.7</option>
                    </select>
                    <input type="text" id="f-contact" placeholder="Contact (+256...)">
                    <input type="text" id="f-loc" placeholder="Location">
                    <input type="text" id="f-health" placeholder="Health Status (health_status)">
                    <input type="number" id="f-fees" placeholder="Total Fees">
                    <button id="save-btn" class="btn-pro" onclick="saveStudent()">SECURE SAVE</button>
                </div>
            </div>

            <div id="v-list" class="hidden"><div id="master-list"></div></div>
            <div id="v-fin" class="hidden"><div id="finance-list"></div></div>

            <div id="v-rep" class="hidden">
                <div class="glass-card">
                    <select id="rep-cls" onchange="loadRepList()"><option value="">Select Class</option></select>
                    <div id="rep-st-list"></div>
                    <div id="g-panel" class="hidden">
                        <h4 id="g-name" style="margin-top:20px; color:var(--primary)"></h4>
                        <div id="g-inputs" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;"></div>
                        <button class="btn-pro" onclick="saveReport()" style="margin-top:15px;">SAVE REPORT</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        let db, activeSch, students = [];

        function updateClock() {
            document.getElementById('live-clock').innerText = new Date().toLocaleString();
        }
        setInterval(updateClock, 1000);

        async function verify() {
            const id = document.getElementById('sch-login').value.toUpperCase().trim();
            db = supabase.createClient(SB_URL, SB_KEY);
            const { data } = await db.from('Schools').select('*').eq('sch_id', id).single();
            if(data) {
                activeSch = id;
                document.getElementById('logo').src = data.logo_url;
                document.getElementById('auth').classList.add('hidden');
                refresh();
            }
        }

        async function refresh() {
            const { data } = await db.from('Students').select('*').eq('sch_id', activeSch);
            students = data || [];
            updateUI();
        }

        function previewImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { 
                    document.getElementById('f-preview').src = e.target.result; 
                    document.getElementById('f-preview').style.display='block'; 
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function saveStudent() {
            const btn = document.getElementById('save-btn');
            const file = document.getElementById('f-file').files[0];
            const id = document.getElementById('f-id').value;
            btn.innerText = "SAVING...";
            btn.disabled = true;

            let photoUrl = document.getElementById('f-preview').src;

            // UPLOAD TO STORAGE IF NEW FILE (STOPS SLOWDOWN)
            if (file) {
                const fileName = `${activeSch}/${Date.now()}-${file.name}`;
                const { data, error } = await db.storage.from('photos').upload(fileName, file);
                if (!error) {
                    const { data: urlData } = db.storage.from('photos').getPublicUrl(fileName);
                    photoUrl = urlData.publicUrl;
                }
            }

            const payload = {
                sch_id: activeSch, name: document.getElementById('f-name').value.toUpperCase(),
                age: document.getElementById('f-age').value, dob: document.getElementById('f-dob').value,
                class: document.getElementById('f-class').value, contact: document.getElementById('f-contact').value,
                location: document.getElementById('f-loc').value, health_status: document.getElementById('f-health').value,
                total_fees: document.getElementById('f-fees').value, photo_url: photoUrl
            };

            if(!id) {
                payload.lin = activeSch + "-" + Math.floor(1000 + Math.random()*8999);
                payload.payment_code = "PAY-" + Math.floor(100000 + Math.random()*899999);
            }

            const { error } = id ? await db.from('Students').update(payload).eq('id', id) : await db.from('Students').insert([payload]);
            
            btn.innerText = "SECURE SAVE";
            btn.disabled = false;
            
            if(!error) { alert("SUCCESS"); refresh(); nav('list'); } else { alert(error.message); }
        }

        // Standard Navigation and UI Refresh
        function updateUI() {
            let p = 0, t = 0;
            students.forEach(s => { p += Number(s.paid_fees || 0); t += Number(s.total_fees || 0); });
            document.getElementById('st-count').innerText = students.length;
            document.getElementById('st-paid').innerText = p.toLocaleString();
            document.getElementById('st-debt').innerText = (t - p).toLocaleString();
            
            document.getElementById('master-list').innerHTML = students.map(s => `
                <div class="student-item">
                    <img src="${s.photo_url || ''}" class="st-photo">
                    <div style="flex:1"><b>${s.name}</b><br><small>${s.lin} | ${s.class}</small></div>
                    <div style="display:flex; gap:10px;">
                        <i class="fas fa-edit" style="color:var(--primary)" onclick="editS('${s.id}')"></i>
                        <i class="fas fa-trash" style="color:red" onclick="delS('${s.id}')"></i>
                    </div>
                </div>`).join('');

            document.getElementById('finance-list').innerHTML = students.map(s => `
                <div class="student-item">
                    <div style="flex:1"><b>${s.name}</b><br><small>${s.payment_code || 'N/A'}</small></div>
                    <div style="text-align:right">
                        <small>Bal: ${(s.total_fees - s.paid_fees).toLocaleString()}</small><br>
                        <input type="number" placeholder="Pay" style="width:70px; margin:0;" onchange="updatePay('${s.id}', this.value)">
                    </div>
                </div>`).join('');

            const cls = [...new Set(students.map(s => s.class))].sort();
            document.getElementById('rep-cls').innerHTML = '<option value="">Class</option>' + cls.map(c => `<option>${c}</option>`).join('');
        }

        async function updatePay(id, val) {
            const s = students.find(x => x.id == id);
            await db.from('Students').update({ paid_fees: Number(s.paid_fees || 0) + Number(val) }).eq('id', id);
            refresh();
        }

        function loadRepList() {
            const cls = document.getElementById('rep-cls').value;
            const filtered = students.filter(s => s.class === cls);
            document.getElementById('rep-st-list').innerHTML = filtered.map(s => `<div class="student-item" onclick="openG('${s.id}')">${s.name}</div>`).join('');
        }

        async function openG(id) {
            currentSid = id; const s = students.find(x => x.id == id);
            document.getElementById('g-panel').classList.remove('hidden');
            document.getElementById('g-name').innerText = s.name;
            const isP = s.class.includes('P.');
            const subs = isP ? ['English', 'Math', 'SST', 'Science'] : ['Literacy', 'Numeracy', 'Reading', 'Drawing'];
            const { data: rep } = await db.from('Reports').select('*').eq('student_id', id).single();
            document.getElementById('g-inputs').innerHTML = subs.map(sub => `
                <div><label style="font-size:0.6rem;">${sub}</label>
                <input type="number" class="mk" data-sub="${sub.toLowerCase()}" value="${rep ? rep[sub.toLowerCase()] || '' : ''}"></div>`).join('');
        }

        async function saveReport() {
            const m = {}; document.querySelectorAll('.mk').forEach(i => m[i.getAttribute('data-sub')] = Number(i.value));
            await db.from('Reports').upsert({ student_id: currentSid, sch_id: activeSch, ...m }, { onConflict: 'student_id' });
            alert("REPORT SAVED");
        }

        function editS(id) {
            const s = students.find(x => x.id == id);
            document.getElementById('f-id').value = s.id;
            document.getElementById('f-name').value = s.name;
            document.getElementById('f-class').value = s.class;
            document.getElementById('f-fees').value = s.total_fees;
            document.getElementById('f-preview').src = s.photo_url || '';
            document.getElementById('f-preview').style.display = 'block';
            nav('reg');
        }

        async function delS(id) { if(confirm("Delete permanently?")) { await db.from('Students').delete().eq('id', id); refresh(); } }

        function nav(v, b) {
            ['v-dash', 'v-list', 'v-reg', 'v-fin', 'v-rep'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('v-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(b) b.classList.add('active');
            if(window.innerWidth < 1024) document.getElementById('sidebar').classList.remove('open');
        }
    </script>
</body>
</html>
