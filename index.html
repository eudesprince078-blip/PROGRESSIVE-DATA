<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUDES MEDIA | UGANDA SCHOOL ENGINE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        :root { --eudes-blue: #0047AB; --dark: #0f172a; --success: #10b981; --danger: #ef4444; --ug-yellow: #F5B81B; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; }
        body { background: #f1f5f9; color: #1e293b; height: 100vh; display: flex; overflow: hidden; }

        /* AUTH SCREEN */
        #auth-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; padding: 35px; border-radius: 25px; width: 100%; max-width: 400px; text-align: center; border: 4px solid var(--eudes-blue); }

        /* SIDEBAR */
        .sidebar { width: 280px; background: var(--dark); color: white; padding: 25px; display: flex; flex-direction: column; }
        .nav-btn { padding: 16px; border-radius: 12px; color: #94a3b8; font-weight: 700; font-size: 0.7rem; cursor: pointer; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
        .nav-btn.active { background: var(--eudes-blue); color: white; }

        /* MAIN AREA */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: white; padding: 20px 30px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center;}
        .content { padding: 20px; overflow-y: auto; height: 100%; }
        
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #cbd5e1; margin-top: 8px; font-weight: 700; font-size: 0.75rem; }
        .btn-action { background: var(--eudes-blue); color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: 800; width: 100%; margin-top: 20px; }
        
        /* TABLE STYLES */
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        th { text-align: left; padding: 10px; color: #64748b; font-size: 0.65rem; }
        td { background: white; padding: 15px 10px; font-size: 0.75rem; font-weight: 700; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; }
        td:first-child { border-left: 1px solid #f1f5f9; border-top-left-radius: 12px; border-bottom-left-radius: 12px; }
        td:last-child { border-right: 1px solid #f1f5f9; border-top-right-radius: 12px; border-bottom-right-radius: 12px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="login-card">
            <h1 style="color:var(--eudes-blue); font-weight: 900;">EUDES MEDIA</h1>
            <p style="font-size: 0.55rem; margin-bottom: 25px;">YOUR COMPLETE DIGITAL PARTNER</p>
            <input type="text" id="login-sch-id" placeholder="SCHOOL ID">
            <select id="login-role">
                <option value="admin">👑 ADMINISTRATOR</option>
                <option value="teacher">👨‍🏫 TEACHER</option>
            </select>
            <input type="password" id="login-pass" placeholder="SECRET KEY">
            <button class="btn-action" onclick="handleLogin()">SECURE LOGIN</button>
            <div id="login-err" style="margin-top:15px; color:var(--danger); font-size:0.6rem;"></div>
        </div>
    </div>

    <div class="sidebar hidden" id="main-sidebar">
        <div style="margin-bottom: 40px;">
            <h3 id="display-school-name" style="font-size: 0.9rem; margin-bottom: 5px;">...</h3>
            <span id="display-role" style="background: var(--ug-yellow); color: black; padding: 4px 10px; border-radius: 8px; font-size: 0.55rem; font-weight: 900;">ROLE</span>
        </div>
        <div class="nav-btn active" id="btn-dash" onclick="showPage('dash')"><i class="fas fa-th-large"></i> DASHBOARD</div>
        <div class="nav-btn" id="btn-reg" onclick="showPage('registry')"><i class="fas fa-users"></i> STUDENT LIST</div>
        <div style="margin-top: auto; font-size: 0.55rem; color: #475569;">EUDES MEDIA UGANDA<br>0762992440</div>
    </div>

    <div class="main hidden" id="main-area">
        <div class="header">
            <h2 id="header-title" style="font-size: 0.8rem;">DASHBOARD</h2>
            <div id="live-clock" style="font-weight: 900; color: var(--eudes-blue);">00:00:00</div>
        </div>
        <div class="content">
            <div id="page-dash" class="sub-page">
                <div style="background:white; padding:25px; border-radius:20px; text-align:center; border-bottom:5px solid var(--eudes-blue);">
                    <p style="font-size:0.6rem; color:#64748b;">TOTAL STUDENTS</p>
                    <h1 id="stat-total" style="font-size:2.5rem;">0</h1>
                </div>
            </div>
            
            <div id="page-registry" class="sub-page hidden">
                <table>
                    <thead>
                        <tr>
                            <th width="20%">LIN</th>
                            <th width="50%">NAME</th>
                            <th width="30%">CLASS</th>
                        </tr>
                    </thead>
                    <tbody id="registry-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let userSchool = "";

        async function handleLogin() {
            const id = document.getElementById('login-sch-id').value.toUpperCase().trim();
            const pass = document.getElementById('login-pass').value.trim();
            const role = document.getElementById('login-role').value;
            
            const { data } = await sb.from('Schools').select('*').ilike('sch_id', `%${id}%`);

            if (data && data.length > 0) {
                const s = data[0];
                if (pass === "eudes2026" || pass === s.admin_key || pass === s.teacher_key) {
                    userSchool = s.sch_id;
                    document.getElementById('auth-overlay').classList.add('hidden');
                    document.getElementById('main-sidebar').classList.remove('hidden');
                    document.getElementById('main-area').classList.remove('hidden');
                    document.getElementById('display-school-name').innerText = s.school_name;
                    document.getElementById('display-role').innerText = role;
                    loadStats();
                } else {
                    document.getElementById('login-err').innerText = "WRONG KEY";
                }
            } else {
                document.getElementById('login-err').innerText = "SCHOOL NOT FOUND";
            }
        }

        async function loadStats() {
            const { data } = await sb.from('students').select('*').eq('school_id', userSchool);
            document.getElementById('stat-total').innerText = data ? data.length : 0;
            
            const body = document.getElementById('registry-body');
            body.innerHTML = data && data.length > 0 
                ? data.map(s => `<tr><td>${s.lin || '-'}</td><td>${s.name}</td><td>${s.class}</td></tr>`).join('')
                : '<tr><td colspan="3" style="text-align:center; background:none; border:none;">NO STUDENTS REGISTERED</td></tr>';
        }

        function showPage(p) {
            document.querySelectorAll('.sub-page').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('page-' + p).classList.remove('hidden');
            document.getElementById('btn-' + p).classList.add('active');
            if(p === 'registry') loadStats();
        }

        setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
