<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PMS ADMIN - STAY LOGGED IN</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; padding: 10px; margin: 0; }
        .box { background: white; padding: 20px; border-radius: 12px; max-width: 900px; margin: 15px auto; border: 2px solid #0056b3; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .dash { display: flex; gap: 10px; margin-bottom: 15px; }
        .stat { flex: 1; background: #0056b3; color: white; padding: 15px; border-radius: 10px; text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; }
        button { background: #0056b3; color: white; font-weight: bold; border: none; cursor: pointer; }
        .btn-edit { background: #ffc107; color: black; padding: 5px 10px; border-radius: 4px; width: auto; margin-right: 5px; cursor: pointer; border: none; font-size: 10px; }
        .btn-del { background: #dc3545; color: white; padding: 5px 10px; border-radius: 4px; width: auto; cursor: pointer; border: none; font-size: 10px; }
        .hidden { display: none !important; }
        .scroll-box { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 750px; }
        th { background: #0056b3; color: white; padding: 10px; text-align: left; }
        td { border-bottom: 1px solid #ddd; padding: 10px; background: #fff; }
        #searchBar { border: 2px solid #0056b3; padding-left: 10px; height: 45px; }
    </style>
</head>
<body>

<div id="loginSection" class="box" style="max-width: 400px;">
    <h2 style="text-align:center; color:#0056b3;">SCHOOL LOGIN</h2>
    <input id="user" placeholder="USERNAME">
    <input id="pass" type="password" placeholder="PASSWORD">
    <button onclick="checkLogin()">LOGIN SYSTEM</button>
    <p id="msg" style="color:red; text-align:center; font-size:12px;"></p>
</div>

<div id="mainSection" class="hidden">
    <div class="box">
        <h3 style="margin-top:0; color:#0056b3;">DASHBOARD</h3>
        <div class="dash">
            <div class="stat"><small>TOTAL</small><br><b id="countT">0</b></div>
            <div class="stat" style="background: #28a745;"><small>ACTIVE</small><br><b id="countA">0</b></div>
        </div>
        <input id="searchBar" onkeyup="filterTable()" placeholder="🔍 Search Name or LIN...">
    </div>

    <div class="box">
        <h2 id="formTitle" style="text-align:center; color:#0056b3; margin-top:0;">STUDENT REGISTRATION</h2>
        <input id="editId" type="hidden">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <input id="n" placeholder="Full Name">
            <input id="a" type="number" placeholder="Age">
            <input id="d" type="date">
            <input id="ph" placeholder="Contact Number">
            <input id="loc" placeholder="Physical Location">
            <input id="pay" placeholder="Payment Code">
            <select id="cl"><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
            <select id="he"><option value="Good">Health: Good</option><option value="Check">Health: Check</option></select>
            <select id="st"><option value="active">Status: active</option><option value="left">Status: left</option></select>
        </div>
        <button id="upBtn" onclick="doUpload()">CONFIRM & UPLOAD</button>
        <button id="cancelBtn" class="hidden" style="background:#6c757d;" onclick="resetForm()">CANCEL EDIT</button>
        
        <div class="scroll-box">
            <div id="listArea"></div>
        </div>
        <p style="text-align:center; font-weight:bold; font-size:12px; margin-top:15px;">Eudes Media | +256762992440</p>
    </div>
</div>

<script>
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co";
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    let sbClient = null;
    let allStudents = [];

    function checkLogin() {
        const u = document.getElementById('user').value.trim().toUpperCase();
        const p = document.getElementById('pass').value.trim().toUpperCase();
        if (u === "PROGRESSIVE" && p === "JESUS CARES") {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('mainSection').classList.remove('hidden');
            sbClient = supabase.createClient(SB_URL, SB_KEY);
            fetchRecords();
        } else { document.getElementById('msg').innerText = "WRONG CREDENTIALS"; }
    }

    async function doUpload() {
        const name = document.getElementById('n').value.trim();
        const editId = document.getElementById('editId').value;
        const status = document.getElementById('st').value;
        if (!name) return alert("Enter Name");

        const dataObj = {
            name: name, age: document.getElementById('a').value,
            dob: document.getElementById('d').value, contact: document.getElementById('ph').value,
            location: document.getElementById('loc').value, payment_code: document.getElementById('pay').value,
            class: document.getElementById('cl').value, health_status: document.getElementById('he').value,
            status: status, active: (status === "active")
        };

        if (!editId) {
            // Pick first letter of name for LIN (e.g., M for Mugisha)
            const firstLetter = name.charAt(0).toUpperCase();
            dataObj.lin = "PM" + firstLetter + "-" + Math.floor(1000 + Math.random() * 9000);
        }

        try {
            const { error } = editId 
                ? await sbClient.from('students').update(dataObj).eq('id', editId)
                : await sbClient.from('students').insert([dataObj]);
            
            if (error) throw error;
            alert("SUCCESSFULLY SAVED!");
            resetForm(); // Clears inputs without logging out
            fetchRecords(); // Refreshes the list instantly
        } catch (e) { alert(e.message); }
    }

    async function fetchRecords() {
        const { data } = await sbClient.from('students').select('*').order('created_at', { ascending: false });
        if (data) {
            allStudents = data;
            renderTable(data);
            document.getElementById('countT').innerText = data.length;
            document.getElementById('countA').innerText = data.filter(s => s.status === 'active').length;
        }
    }

    function renderTable(data) {
        let html = "<table><tr><th>LIN</th><th>NAME</th><th>CONTACT</th><th>HEALTH</th><th>CLASS</th><th>ACTION</th></tr>";
        data.forEach(r => {
            html += `<tr>
                <td><b>${r.lin}</b></td>
                <td>${r.name}</td>
                <td>${r.contact || '-'}</td>
                <td>${r.health_status}</td>
                <td>${r.class}</td>
                <td>
                    <button class="btn-edit" onclick="startEdit('${r.id}')">EDIT</button>
                    <button class="btn-del" onclick="doDelete('${r.id}')">DEL</button>
                </td>
            </tr>`;
        });
        document.getElementById('listArea').innerHTML = html + "</table>";
    }

    function filterTable() {
        const term = document.getElementById('searchBar').value.toUpperCase();
        const filtered = allStudents.filter(s => s.name.toUpperCase().includes(term) || s.lin.toUpperCase().includes(term));
        renderTable(filtered);
    }

    function startEdit(id) {
        const s = allStudents.find(x => x.id == id);
        document.getElementById('editId').value = s.id;
        document.getElementById('n').value = s.name;
        document.getElementById('a').value = s.age;
        document.getElementById('d').value = s.dob;
        document.getElementById('ph').value = s.contact;
        document.getElementById('loc').value = s.location;
        document.getElementById('pay').value = s.payment_code;
        document.getElementById('cl').value = s.class;
        document.getElementById('he').value = s.health_status;
        document.getElementById('st').value = s.status;
        document.getElementById('formTitle').innerText = "EDITING: " + s.lin;
        document.getElementById('upBtn').innerText = "SAVE CHANGES";
        document.getElementById('cancelBtn').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    async function doDelete(id) {
        if(confirm("Are you sure you want to delete this student?")) {
            const { error } = await sbClient.from('students').delete().eq('id', id);
            if (!error) fetchRecords();
        }
    }

    function resetForm() {
        document.getElementById('editId').value = "";
        document.getElementById('n').value = "";
        document.getElementById('a').value = "";
        document.getElementById('d').value = "";
        document.getElementById('ph').value = "";
        document.getElementById('loc').value = "";
        document.getElementById('pay').value = "";
        document.getElementById('formTitle').innerText = "STUDENT REGISTRATION";
        document.getElementById('upBtn').innerText = "CONFIRM & UPLOAD";
        document.getElementById('cancelBtn').classList.add('hidden');
    }
</script>
</body>
</html>
