<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS ELITE | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #0052cc; --sidebar: #020617; --bg: #f8fafc; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #1e293b; height: 100vh; display: flex; overflow: hidden; }

        /* SIDEBAR - NO OVERLAP */
        .sidebar { width: 280px; background: var(--sidebar); display: flex; flex-direction: column; transition: 0.3s; z-index: 2000; flex-shrink: 0; }
        @media (max-width: 1024px) { .sidebar { position: fixed; height: 100%; transform: translateX(-100%); } .sidebar.open { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.5); } }
        .nav-item { display: flex; align-items: center; padding: 14px 20px; color: #94a3b8; border: none; background: transparent; width: 100%; cursor: pointer; font-weight: 700; font-size: 0.8rem; border-radius: 12px; margin-bottom: 4px; transition: 0.2s; text-align: left; }
        .nav-item.active { background: var(--primary); color: white; }

        /* MAIN CONTENT */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 70px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #e2e8f0; flex-shrink: 0; }
        .content { flex: 1; padding: 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; }

        /* CARDS & GRIDS */
        .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 20px; border: 1px solid #e2e8f0; text-align: center; }
        .stat-card h2 { font-size: 1.4rem; font-weight: 800; color: var(--primary); }
        .stat-card label { font-size: 0.6rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; }

        .glass-card { background: white; border-radius: 24px; padding: 20px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 12px; font-weight: 600; font-size: 0.85rem; }
        .btn-pro { background: var(--primary); color: white; padding: 14px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; width: 100%; }

        /* PHOTO UPLOAD */
        #photo-box { width: 100px; height: 100px; border-radius: 50%; background: #f1f5f9; border: 2px dashed #cbd5e1; margin: 0 auto 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #photo-box img { width: 100%; height: 100%; object-fit: cover; }

        .hidden { display: none !important; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1500; display: none; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div id="auth" style="position:fixed; inset:0; background:var(--sidebar); z-index:9999; display:flex; align-items:center; justify-content:center; padding:20px;">
        <div style="background:white; padding:40px; border-radius:30px; width:100%; max-width:400px; text-align:center;">
            <h2 style="font-weight:900;">ESMS ELITE</h2>
            <p style="color:#94a3b8; font-size:0.7rem; margin-bottom:25px;">TENANT PORTAL | EUDES MEDIA</p>
            <input type="text" id="login-id" placeholder="SCHOOL ID (e.g. PM001)" style="text-align:center">
            <button class="btn-pro" onclick="verify()">ACCESS SYSTEM</button>
        </div>
    </div>

    <aside class="sidebar" id="sidebar">
        <div style="padding:40px 20px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.05);">
            <img id="sch-logo" style="height:55px; margin-bottom:10px; background:white; border-radius:12px; padding:5px;">
            <h4 id="side-sch-name" style="color:white; font-size:0.8rem; text-transform:uppercase; letter-spacing:1px;"></h4>
        </div>
        <nav style="padding:15px; flex:1; overflow-y:auto;">
            <button class="nav-item active" onclick="nav('dash', this)"><i class="fas fa-chart-pie"></i> &nbsp; Dashboard</button>
            <button class="nav-item" onclick="nav('reg', this)"><i class="fas fa-user-plus"></i> &nbsp; Enrollment</button>
            <button class="nav-item" onclick="nav('list', this)"><i class="fas fa-users"></i> &nbsp; Student List</button>
            <button class="nav-item" onclick="nav('fin', this)"><i class="fas fa-money-bill-wave"></i> &nbsp; Finance</button>
            <button class="nav-item" onclick="nav('roll', this)"><i class="fas fa-check-square"></i> &nbsp; Roll Call</button>
            <button class="nav-item" onclick="nav('rep', this)"><i class="fas fa-file-invoice"></i> &nbsp; Digital Report</button>
        </nav>
        <div style="padding:20px; background:rgba(0,0,0,0.3); color:white; font-size:0.7rem; font-weight:700;">+256 762 992440</div>
    </aside>

    <main class="main">
        <header class="header">
            <div onclick="toggleMenu()" style="cursor:pointer;"><i class="fas fa-bars-staggered"></i></div>
            <h4 id="head-title" style="font-weight:800; font-size:0.9rem;">PORTAL</h4>
            <div style="background:#fef2f2; color:#ef4444; padding:5px 12px; border-radius:8px; font-size:0.6rem; font-weight:900;">SECURE</div>
        </header>

        <div class="content">
            <div id="v-dash">
                <div class="dash-grid">
                    <div class="stat-card"><h2 id="d-total">0</h2><label>Students</label></div>
                    <div class="stat-card"><h2 id="d-absent">0</h2><label>Absent</label></div>
                    <div class="stat-card"><h2><small>UGX</small> <span id="d-demand">0</span></h2><label>Demanding</label></div>
                </div>
                <div class="glass-card">
                    <h4 style="font-weight:800; margin-bottom:10px;">FINANCIAL SUMMARY</h4>
                    <div style="display:flex; justify-content:space-between; font-size:0.85rem;">
                        <span>Collected: <b id="d-paid" style="color:green;">0</b></span>
                        <span>Expected: <b id="d-exp">0</b></span>
                    </div>
                </div>
            </div>

            <div id="v-reg" class="hidden">
                <div class="glass-card">
                    <h3 id="form-label" style="margin-bottom:20px; font-weight:800;">NEW LEARNER</h3>
                    <div id="photo-box"><i class="fas fa-user-circle" style="font-size:3rem; color:#cbd5e1;"></i></div>
                    <input type="file" id="f-photo" accept="image/*" onchange="handlePhoto(this)">
                    <input type="hidden" id="f-id">
                    <input type="hidden" id="f-photo-url">
                    
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <input type="text" id="f-name" placeholder="FULL NAME">
                        <select id="f-class"><option value="">Select Class</option><option>Baby</option><option>Middle</option><option>Top</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
                        <input type="number" id="f-age" placeholder="AGE">
                        <input type="date" id="f-dob">
                        <input type="text" id="f-loc" placeholder="LOCATION">
                        <input type="text" id="f-health" value="NORMAL">
                        <input type="text" id="f-lin" readonly placeholder="LIN (AUTO)">
                        <input type="text" id="f-pcode" placeholder="PAYMENT CODE">
                        <input type="number" id="f-total-fees" placeholder="TOTAL FEES (UGX)">
                        <input type="number" id="f-paid-fees" placeholder="INITIAL PAYMENT (UGX)" value="0">
                    </div>
                    <button class="btn-pro" onclick="save()">SAVE STUDENT RECORD</button>
                </div>
            </div>

            <div id="v-list" class="hidden">
                <div class="glass-card">
                    <input type="text" placeholder="Search by name, LIN, or Class..." onkeyup="search(this)">
                    <div style="overflow-x:auto;"><table style="width:100%; border-collapse:collapse; min-width:600px;">
                        <thead style="text-align:left; font-size:0.7rem; color:#94a3b8; border-bottom:2px solid #f1f5f9;">
                            <tr><th>PHOTO</th><th>NAME</th><th>LIN</th><th>CLASS</th><th>ACTIONS</th></tr>
                        </thead>
                        <tbody id="list-body"></tbody>
                    </table></div>
                </div>
            </div>

            <div id="v-fin" class="hidden">
                <div class="glass-card">
                    <h3 style="margin-bottom:20px;">FEES TRACKER</h3>
                    <div id="fin-body"></div>
                </div>
            </div>

            <div id="v-roll" class="hidden">
                <div class="glass-card">
                    <h3>CLASS ATTENDANCE</h3>
                    <select id="roll-filter" onchange="renderRoll()"><option value="">Select Class to Mark</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
                    <div id="roll-body"></div>
                </div>
            </div>

            <div id="v-rep" class="hidden">
                <div class="glass-card">
                    <h3>DIGITAL REPORT CARDS</h3>
                    <p style="font-size:0.8rem; color:#64748b;">Select a student from the list to generate their termly report.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        let db, activeSch, students = [];

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        async function verify() {
            const id = document.getElementById('login-id').value.toUpperCase();
            db = supabase.createClient(SB_URL, SB_KEY);
            const { data } = await db.from('Schools').select('*').eq('sch_id', id).single();
            if(data) {
                activeSch = id;
                document.getElementById('side-sch-name').innerText = data.school_name;
                document.getElementById('head-title').innerText = data.school_name;
                document.getElementById('sch-logo').src = data.logo_url;
                document.getElementById('auth').classList.add('hidden');
                load();
            }
        }

        async function handlePhoto(input) {
            const file = input.files[0];
            if (!file) return;
            // Compression Logic
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 300;
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const compressed = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('photo-box').innerHTML = `<img src="${compressed}">`;
                    document.getElementById('f-photo-url').value = compressed; // Base64 saving for speed
                };
            };
        }

        async function load() {
            const { data } = await db.from('Students').select('*').eq('sch_id', activeSch);
            students = data || [];
            updateDash();
            renderList();
            renderFin();
        }

        function updateDash() {
            document.getElementById('d-total').innerText = students.length;
            let paid = 0, exp = 0;
            students.forEach(s => { paid += Number(s.paid_fees||0); exp += Number(s.total_fees||0); });
            document.getElementById('d-paid').innerText = paid.toLocaleString();
            document.getElementById('d-exp').innerText = exp.toLocaleString();
            document.getElementById('d-demand').innerText = (exp - paid).toLocaleString();
        }

        function renderList() {
            document.getElementById('list-body').innerHTML = students.map(s => `
                <tr style="border-bottom:1px solid #f8fafc;">
                    <td style="padding:10px;"><img src="${s.photo_url || 'https://via.placeholder.com/40'}" style="width:40px;height:40px;border-radius:8px;object-fit:cover;"></td>
                    <td style="font-weight:700; font-size:0.8rem;">${s.name}</td>
                    <td style="font-family:monospace; font-size:0.7rem; color:var(--primary);">${s.lin}</td>
                    <td style="font-weight:600; font-size:0.8rem;">${s.class}</td>
                    <td>
                        <button onclick="editStd('${s.id}')" style="border:none; background:#eff6ff; color:var(--primary); padding:8px; border-radius:8px;"><i class="fas fa-edit"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function renderFin() {
            document.getElementById('fin-body').innerHTML = students.map(s => `
                <div class="glass-card" style="padding:15px; margin-bottom:10px;">
                    <div style="display:flex; justify-content:space-between;">
                        <span style="font-weight:800;">${s.name}</span>
                        <span style="font-size:0.7rem; color:#94a3b8;">${s.payment_code}</span>
                    </div>
                    <div style="font-size:0.8rem; margin-top:5px; color:red; font-weight:700;">Balance: UGX ${(s.total_fees - s.paid_fees).toLocaleString()}</div>
                </div>
            `).join('');
        }

        function renderRoll() {
            const cls = document.getElementById('roll-filter').value;
            const filtered = students.filter(s => s.class === cls);
            document.getElementById('roll-body').innerHTML = filtered.map(s => `
                <div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #f1f5f9;">
                    <span style="font-weight:600;">${s.name}</span>
                    <input type="checkbox" style="width:20px; height:20px;">
                </div>
            `).join('');
        }

        function editStd(id) {
            const s = students.find(x => x.id == id);
            document.getElementById('f-id').value = s.id;
            document.getElementById('f-name').value = s.name;
            document.getElementById('f-class').value = s.class;
            document.getElementById('f-lin').value = s.lin;
            document.getElementById('f-total-fees').value = s.total_fees;
            document.getElementById('f-paid-fees').value = s.paid_fees;
            document.getElementById('f-pcode').value = s.payment_code;
            if(s.photo_url) document.getElementById('photo-box').innerHTML = `<img src="${s.photo_url}">`;
            nav('reg', document.querySelector('[onclick*="reg"]'));
            document.getElementById('form-label').innerText = "EDIT LEARNER";
        }

        async function save() {
            const id = document.getElementById('f-id').value;
            const entry = {
                sch_id: activeSch, name: document.getElementById('f-name').value.toUpperCase(),
                class: document.getElementById('f-class').value, age: document.getElementById('f-age').value,
                total_fees: document.getElementById('f-total-fees').value, paid_fees: document.getElementById('f-paid-fees').value,
                payment_code: document.getElementById('f-pcode').value, photo_url: document.getElementById('f-photo-url').value,
                lin: document.getElementById('f-lin').value || (activeSch + "-" + Math.floor(1000+Math.random()*9000))
            };
            if(id) await db.from('Students').update(entry).eq('id', id);
            else await db.from('Students').insert([entry]);
            alert("SUCCESS"); location.reload();
        }

        function nav(v, b) {
            ['v-dash', 'v-reg', 'v-list', 'v-fin', 'v-roll', 'v-rep'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('v-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            b.classList.add('active');
            if(window.innerWidth <= 1024) toggleMenu();
        }

        function search(i) {
            let q = i.value.toUpperCase();
            document.querySelectorAll('#list-body tr').forEach(r => r.style.display = r.innerText.toUpperCase().includes(q) ? "" : "none");
        }
    </script>
</body>
</html>
