<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS ELITE | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #0052cc; --sidebar-bg: #020617; --bg: #f8fafc; --white: #ffffff; --danger: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #1e293b; height: 100vh; display: flex; overflow: hidden; }

        /* --- THE FIX FOR THE "BLUE COVERING" --- */
        .sidebar { 
            width: 280px; 
            background: var(--sidebar-bg); 
            display: flex; 
            flex-direction: column; 
            transition: transform 0.3s ease; 
            z-index: 3000; 
            flex-shrink: 0; 
        }

        @media (max-width: 1024px) { 
            .sidebar { 
                position: fixed; 
                height: 100%; 
                transform: translateX(-100%); /* Hidden by default */
            } 
            .sidebar.open { 
                transform: translateX(0); /* Slides in only when requested */
                box-shadow: 10px 0 50px rgba(0,0,0,0.8);
            } 
        }

        .overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); 
            z-index: 2500; display: none; backdrop-filter: blur(4px); 
        }
        .overlay.active { display: block; }

        /* --- UI COMPONENTS --- */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; width: 100%; }
        .header { height: 70px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #e2e8f0; flex-shrink: 0; }
        .content { flex: 1; padding: 15px; overflow-y: auto; -webkit-overflow-scrolling: touch; }

        .nav-item { display: flex; align-items: center; padding: 14px 20px; color: #94a3b8; border: none; background: transparent; width: 100%; cursor: pointer; font-weight: 700; font-size: 0.85rem; border-radius: 12px; margin-bottom: 5px; text-align: left; }
        .nav-item.active { background: var(--primary); color: white; }

        .stat-card { background: white; padding: 20px; border-radius: 20px; border: 1px solid #e2e8f0; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .glass-card { background: white; border-radius: 24px; padding: 20px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 12px; font-weight: 600; }
        .btn-pro { background: var(--primary); color: white; padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; width: 100%; }

        #photo-drop { width: 100px; height: 100px; border-radius: 50%; background: #f1f5f9; border: 2px dashed #cbd5e1; margin: 0 auto 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
        #photo-drop img { width: 100%; height: 100%; object-fit: cover; }

        .hidden { display: none !important; }
        .absent-bar { background: #fef2f2; border-left: 4px solid var(--danger); padding: 10px; border-radius: 8px; margin-bottom: 8px; font-weight: 700; font-size: 0.8rem; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div id="auth" style="position:fixed; inset:0; background:var(--sidebar-bg); z-index:9999; display:flex; align-items:center; justify-content:center; padding:20px;">
        <div style="background:white; padding:40px; border-radius:30px; width:100%; max-width:400px; text-align:center;">
            <h1 style="font-weight:900; color:var(--sidebar-bg);">ESMS <span style="color:var(--primary)">ELITE</span></h1>
            <p style="color:#94a3b8; font-size:0.7rem; margin-bottom:30px; font-weight:800;">EUDES MEDIA TENANT SYSTEM</p>
            <input type="text" id="login-id" placeholder="SCHOOL ID" style="text-align:center;">
            <button class="btn-pro" id="login-btn" onclick="verify()">ACCESS PORTAL</button>
        </div>
    </div>

    <aside class="sidebar" id="sidebar">
        <div style="padding:40px 20px; text-align:center;">
            <img id="sch-logo" style="height:60px; background:white; border-radius:12px; padding:5px; margin-bottom:10px;">
            <h4 id="side-sch-name" style="color:white; font-size:0.8rem; text-transform:uppercase;"></h4>
        </div>
        <nav style="padding:15px; flex:1; overflow-y:auto;">
            <button class="nav-item active" onclick="nav('dash', this)"><i class="fas fa-grid-2"></i> &nbsp; Dashboard</button>
            <button class="nav-item" onclick="nav('reg', this)"><i class="fas fa-user-plus"></i> &nbsp; Enrollment</button>
            <button class="nav-item" onclick="nav('fin', this)"><i class="fas fa-wallet"></i> &nbsp; Fees & History</button>
            <button class="nav-item" onclick="nav('roll', this)"><i class="fas fa-calendar-check"></i> &nbsp; Rollcall</button>
            <button class="nav-item" onclick="nav('rep', this)"><i class="fas fa-file-invoice"></i> &nbsp; Digital Reports</button>
        </nav>
        <div style="padding:20px; color:#64748b; font-size:0.7rem; font-weight:700; border-top:1px solid rgba(255,255,255,0.05);">
            SUPPORT: +256 762 992440
        </div>
    </aside>

    <main class="main">
        <header class="header">
            <div onclick="toggleMenu()" style="cursor:pointer; font-size:1.2rem;"><i class="fas fa-bars-staggered"></i></div>
            <h4 id="head-title" style="font-weight:800; font-size:0.9rem;">PORTAL</h4>
            <div style="position:relative;"><i class="fas fa-bell"></i><span id="notif-count" style="position:absolute; top:-5px; right:-5px; background:red; color:white; border-radius:50%; font-size:0.5rem; padding:2px 5px;">0</span></div>
        </header>

        <div class="content">
            <div id="v-dash">
                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap:15px; margin-bottom:20px;">
                    <div class="stat-card"><h2 id="d-total">0</h2><label>Students</label></div>
                    <div class="stat-card" style="border-color:var(--danger);"><h2 id="d-absent" style="color:var(--danger)">0</h2><label>Absent</label></div>
                    <div class="stat-card"><h2><small>UGX</small> <span id="d-demand">0</span></h2><label>Demanding</label></div>
                </div>
                <div class="glass-card">
                    <h4 style="margin-bottom:15px; font-weight:800;">ABSENT LIST</h4>
                    <div id="absent-names-list"></div>
                </div>
            </div>

            <div id="v-reg" class="hidden">
                <div class="glass-card">
                    <h3>REGISTRATION</h3>
                    <div id="photo-drop"><i class="fas fa-camera" style="color:#cbd5e1;"></i></div>
                    <input type="file" accept="image/*" onchange="handlePhoto(this)">
                    <input type="hidden" id="f-photo-url">
                    <input type="text" id="f-name" placeholder="FULL NAME">
                    <select id="f-class"><option value="">Select Class</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
                    <input type="number" id="f-total-fees" placeholder="TOTAL FEES (UGX)">
                    <button class="btn-pro" onclick="save()">SAVE TO SUPABASE</button>
                </div>
            </div>

            <div id="v-fin" class="hidden">
                <div class="glass-card">
                    <h3>FEES TRACKER</h3>
                    <div id="fin-list"></div>
                    <div id="pay-panel" class="hidden" style="margin-top:20px; border-top:2px solid #f1f5f9; padding-top:20px;">
                        <h4 id="pay-name" style="color:var(--primary);"></h4>
                        <input type="number" id="pay-amt" placeholder="Amount to Add">
                        <button class="btn-pro" onclick="updatePayment()">SUBMIT PAYMENT</button>
                    </div>
                </div>
            </div>

            <div id="v-roll" class="hidden">
                <div class="glass-card">
                    <h3>ATTENDANCE</h3>
                    <select id="roll-filter" onchange="renderRoll()"><option value="">Select Class</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
                    <div id="roll-body"></div>
                </div>
            </div>

            <div id="v-rep" class="hidden">
                <div class="glass-card">
                    <h3>REPORTS</h3>
                    <select id="rep-filter" onchange="renderRepList()"><option value="">Select Class</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
                    <div id="rep-body"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        let db, activeSch, students = [], absentees = [];

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        async function verify() {
            const id = document.getElementById('login-id').value.toUpperCase().trim();
            db = supabase.createClient(SB_URL, SB_KEY);
            const { data } = await db.from('Schools').select('*').eq('sch_id', id).single();
            if(data) {
                activeSch = id;
                document.getElementById('side-sch-name').innerText = data.school_name;
                document.getElementById('sch-logo').src = data.logo_url;
                document.getElementById('auth').classList.add('hidden');
                load();
            }
        }

        async function load() {
            const { data } = await db.from('Students').select('*').eq('sch_id', activeSch);
            students = data || [];
            updateDash();
            renderFin();
        }

        function updateDash() {
            document.getElementById('d-total').innerText = students.length;
            let demand = 0;
            students.forEach(s => demand += (Number(s.total_fees) - Number(s.paid_fees || 0)));
            document.getElementById('d-demand').innerText = demand.toLocaleString();
        }

        function handlePhoto(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 300; canvas.height = 300;
                    canvas.getContext('2d').drawImage(img, 0, 0, 300, 300);
                    const base64 = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('photo-drop').innerHTML = `<img src="${base64}">`;
                    document.getElementById('f-photo-url').value = base64;
                }
            };
            reader.readAsDataURL(file);
        }

        async function save() {
            const entry = {
                sch_id: activeSch, name: document.getElementById('f-name').value.toUpperCase(),
                class: document.getElementById('f-class').value, total_fees: document.getElementById('f-total-fees').value,
                photo_url: document.getElementById('f-photo-url').value,
                lin: activeSch + "-" + Math.floor(1000 + Math.random() * 9000), paid_fees: 0
            };
            await db.from('Students').insert([entry]);
            alert("SAVED!"); location.reload();
        }

        function renderFin() {
            document.getElementById('fin-list').innerHTML = students.map(s => `
                <div onclick="openPay('${s.id}')" style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; cursor:pointer;">
                    <b>${s.name}</b> <span style="color:red;">Bal: ${(s.total_fees - s.paid_fees).toLocaleString()}</span>
                </div>
            `).join('');
        }

        let curId;
        function openPay(id) {
            curId = id; const s = students.find(x => x.id == id);
            document.getElementById('pay-panel').classList.remove('hidden');
            document.getElementById('pay-name').innerText = s.name;
        }

        async function updatePayment() {
            const s = students.find(x => x.id == curId);
            const total = Number(s.paid_fees || 0) + Number(document.getElementById('pay-amt').value);
            await db.from('Students').update({ paid_fees: total }).eq('id', curId);
            alert("UPDATED!"); location.reload();
        }

        function renderRoll() {
            const cls = document.getElementById('roll-filter').value;
            const filtered = students.filter(s => s.class === cls);
            document.getElementById('roll-body').innerHTML = filtered.map(s => `
                <div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #eee;">
                    <span>${s.name}</span> <button onclick="markAbs('${s.name}')" style="background:red; color:white; border:none; padding:5px; border-radius:5px;">Absent</button>
                </div>
            `).join('');
        }

        function markAbs(n) {
            if(!absentees.includes(n)) {
                absentees.push(n);
                document.getElementById('d-absent').innerText = absentees.length;
                document.getElementById('notif-count').innerText = absentees.length;
                document.getElementById('absent-names-list').innerHTML = absentees.map(x => `<div class="absent-bar">${x} <span>MARKED</span></div>`).join('');
            }
        }

        function nav(v, b) {
            ['v-dash', 'v-reg', 'v-fin', 'v-roll', 'v-rep'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('v-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            b.classList.add('active');
            if(window.innerWidth <= 1024) toggleMenu();
        }
    </script>
</body>
</html>
