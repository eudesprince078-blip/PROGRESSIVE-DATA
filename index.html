<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROGRESSIVE PMS V47</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #004085; --dark: #001a33; --white: #ffffff; --green: #218838; --red: #c82333; --gray: #f1f4f8; --gold: #ffc107; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); margin: 0; padding: 0; color: #333; }
        
        .header { background: linear-gradient(135deg, var(--dark), var(--blue)); color: white; padding: 25px 20px; text-align: center; border-radius: 0 0 25px 25px; position: relative; }
        .time-box { font-family: 'Courier New', monospace; background: rgba(0,0,0,0.3); padding: 5px 12px; border-radius: 50px; display: inline-block; margin-top: 8px; font-size: 13px; }

        /* Info Board / Notice Area */
        .notice-board { background: #fff3cd; border-left: 6px solid var(--gold); padding: 15px; margin: 15px; border-radius: 10px; font-size: 13px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .notice-title { font-weight: bold; color: #856404; display: block; margin-bottom: 5px; text-transform: uppercase; font-size: 11px; }

        /* School Time Switch */
        .school-status { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .on-time { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .off-time { background: var(--red); }

        .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; margin-top: -30px; }
        .kpi-card { background: white; padding: 12px; border-radius: 15px; text-align: center; box-shadow: 0 5px 10px rgba(0,0,0,0.05); border-bottom: 4px solid var(--blue); }
        .kpi-card h3 { margin: 5px 0; font-size: 22px; color: var(--dark); }
        
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin: 0 15px 15px 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 4px; border: 1.5px solid #eee; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        .btn-call { background: var(--green); color: white; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; text-decoration: none; display: inline-block; font-size: 11px; }
        .btn-save { background: var(--blue); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        
        .student-row { background: white; padding: 15px; border-radius: 12px; margin: 0 15px 10px 15px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid var(--blue); box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loginGate" style="padding: 100px 20px; text-align: center;">
    <div class="card" style="max-width: 320px; margin: auto;">
        <h2 style="color:var(--blue)">PROGRESSIVE LOGIN</h2>
        <input id="passInput" type="password" placeholder="Access Key" style="text-align:center;">
        <button onclick="handleLogin()" class="btn-save">ENTER SYSTEM</button>
    </div>
</div>

<div id="mainApp" class="hidden">
    <div class="header">
        <p id="liveDate" style="margin:0; font-size:10px; opacity:0.8;"></p>
        <h2 style="margin:0;">PROGRESSIVE SCHOOL</h2>
        <div class="time-box" id="liveClock">00:00:00</div>
        
        <div class="school-status" style="margin-top:15px;">
            <div id="statusDot" class="status-dot off-time"></div>
            <span id="statusText" style="font-size:11px; font-weight:bold;">OFF SCHOOL TIME</span>
        </div>
    </div>

    <div id="adminControls" class="card hidden">
        <h4 style="margin:0 0 10px 0; color:var(--blue);">Admin Control Center</h4>
        <label>School Time Switch</label>
        <select id="schoolTimeToggle" onchange="toggleSchoolTime()">
            <option value="false">Off School Time</option>
            <option value="true">Active School Time (9:00AM Roll Call)</option>
        </select>
        
        <label style="margin-top:10px;">Post Information for Teachers</label>
        <textarea id="infoInput" rows="2" placeholder="Write message to staff..."></textarea>
        <button onclick="postNotice()" class="btn-save" style="padding:10px; margin-top:10px; background:var(--gold); color:black;">UPDATE NOTICE BOARD</button>
    </div>

    <div id="noticeArea" class="notice-board">
        <span class="notice-title">📢 Staff Information</span>
        <div id="noticeText">Loading notices...</div>
    </div>

    <div class="kpi-grid">
        <div class="kpi-card"><p style="font-size:9px; color:#888;">REGISTERED</p><h3 id="statTotal">0</h3></div>
        <div class="kpi-card"><p style="font-size:9px; color:#888;">ABSENT TODAY</p><h3 id="statAbsent" style="color:var(--red)">0</h3></div>
    </div>

    <div class="content">
        <div id="regForm" class="card">
            <h4 id="fTitle" style="margin:0; color:var(--blue);">Student Entry</h4>
            <input type="hidden" id="editId">
            <input id="stName" placeholder="Full Name">
            <select id="stClass">
                <option value="Baby">Baby</option><option value="Middle">Middle</option><option value="Top">Top</option>
                <option value="P.1">P.1</option><option value="P.2">P.2</option><option value="P.3">P.3</option>
                <option value="P.4">P.4</option><option value="P.5">P.5</option><option value="P.6">P.6</option><option value="P.7">P.7</option>
            </select>
            <input id="stPhone" placeholder="Parent Contact (07...)">
            <button onclick="save()" class="btn-save">SAVE DATA</button>
        </div>

        <input type="text" id="sBar" oninput="search()" placeholder="🔍 Search Name or Code..." style="margin:0 15px 15px 15px; width:calc(100% - 30px); border:2px solid var(--blue);">
        <div id="activeList"></div>
    </div>
</div>

<script>
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co";
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    let sb = null, students = [], USER_ROLE = "";

    setInterval(() => {
        const d = new Date();
        document.getElementById('liveClock').innerText = d.toLocaleTimeString();
        document.getElementById('liveDate').innerText = d.toDateString();
        
        // Auto-Check for Roll Call Alarm at 9:00 AM
        if(d.getHours() === 9 && d.getMinutes() === 0 && d.getSeconds() === 0) {
            checkRollCallTrigger();
        }
    }, 1000);

    function handleLogin() {
        const p = document.getElementById('passInput').value.trim().toUpperCase();
        if (p === "JESUS CARES") USER_ROLE = "ADMIN";
        else if (p === "TEACHER256") USER_ROLE = "TEACHER";
        else return alert("Invalid Key");

        sb = supabase.createClient(SB_URL, SB_KEY);
        document.getElementById('loginGate').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        
        if(USER_ROLE === "ADMIN") document.getElementById('adminControls').classList.remove('hidden');
        
        refresh();
        loadSettings();
    }

    async function loadSettings() {
        // Fetch notice and school time from a 'settings' table or similar in Supabase
        const { data } = await sb.from('school_config').select('*').single();
        if(data) {
            document.getElementById('noticeText').innerText = data.notice || "No new updates from Admin.";
            updateStatusUI(data.is_school_time);
        }
    }

    async function postNotice() {
        const msg = document.getElementById('infoInput').value;
        await sb.from('school_config').update({ notice: msg }).eq('id', 1);
        alert("Notice Updated");
        loadSettings();
    }

    async function toggleSchoolTime() {
        const val = document.getElementById('schoolTimeToggle').value === "true";
        await sb.from('school_config').update({ is_school_time: val }).eq('id', 1);
        updateStatusUI(val);
    }

    function updateStatusUI(isActive) {
        const dot = document.getElementById('statusDot');
        const txt = document.getElementById('statusText');
        if(isActive) {
            dot.className = "status-dot on-time";
            txt.innerText = "ACTIVE SCHOOL TIME";
        } else {
            dot.className = "status-dot off-time";
            txt.innerText = "OFF SCHOOL TIME";
        }
    }

    function checkRollCallTrigger() {
        // This function would check if 'is_school_time' is true and alert teachers
        // Logic to notify teachers would go here
    }

    async function refresh() {
        const { data } = await sb.from('students').select('*').order('name', { ascending: true });
        students = data || [];
        document.getElementById('statTotal').innerText = students.length;
        document.getElementById('statAbsent').innerText = students.filter(s => (s.absent_days || 0) > 0).length;
        renderActive();
    }

    function renderActive() {
        let h = "";
        students.forEach(s => {
            const hasPhone = s.contact && s.contact.length >= 10;
            h += `<div class="student-row">
                <div><b>${s.name.toUpperCase()}</b><br><small>${s.class}</small></div>
                <div>
                    ${hasPhone ? `<a href="tel:${s.contact}" class="btn-call">📞 CALL PARENT</a>` : '<small style="color:#ccc;">No Phone</small>'}
                </div>
            </div>`;
        });
        document.getElementById('activeList').innerHTML = h;
    }

    async function save() {
        const payload = {
            name: document.getElementById('stName').value.trim(),
            class: document.getElementById('stClass').value,
            contact: document.getElementById('stPhone').value.trim()
        };
        await sb.from('students').insert([payload]);
        alert("Student Saved"); refresh();
    }
</script>
</body>
</html>
