<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS AUTHORITY | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0047AB; --danger: #ef4444; --success: #22c55e; --dark: #0f172a; --accent: #f59e0b; }
        * { box-sizing: border-box; text-transform: uppercase; transition: 0.2s; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; margin: 0; color: #1e293b; }

        /* HEADER & TABS */
        .top-nav { background: var(--danger); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-weight: 800; border-bottom: 4px solid var(--dark); }
        .tab-bar { background: white; display: flex; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 1000; }
        .tab { flex: 1; padding: 15px; text-align: center; font-size: 0.65rem; font-weight: 800; color: #64748b; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); background: #f8fafc; }

        /* DASHBOARD STATS */
        .hero { background: var(--dark); color: white; padding: 30px 20px; text-align: center; }
        #live-clock { font-size: 2.5rem; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 20px; margin-top: -25px; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-bottom: 4px solid #cbd5e1; }
        .stat-card b { display: block; font-size: 1.4rem; }

        /* FORMS & TABLES */
        .container { padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 15px; }
        input { padding: 12px; border-radius: 10px; border: 1px solid #cbd5e1; font-weight: 700; width: 100%; font-family: inherit; }
        
        .btn { padding: 12px 20px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; color: white; }
        .btn-save { background: var(--primary); width: 100%; }
        .btn-edit { background: var(--primary); font-size: 0.6rem; padding: 6px 10px; }
        .btn-del { background: var(--danger); font-size: 0.6rem; padding: 6px 10px; }

        .stu-pic { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; background: #eee; border: 1px solid #e2e8f0; }
        .table-wrap { overflow-x: auto; background: white; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #f8fafc; padding: 12px; text-align: left; font-size: 0.65rem; color: #94a3b8; border-bottom: 1px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 0.8rem; font-weight: 700; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div>ESMS AUTHORITY HUB</div>
        <div style="font-size:0.6rem; background:rgba(255,255,255,0.2); padding:5px 10px; border-radius:5px;">EUDES MEDIA | 256762992440</div>
    </div>

    <div class="tab-bar">
        <div class="tab active" onclick="showTab('dash')">DASHBOARD</div>
        <div class="tab" onclick="showTab('admission')">ADMISSION</div>
    </div>

    <div id="dash" class="tab-content">
        <div class="hero"><h1 id="live-clock">00:00:00</h1></div>
        <div class="stat-grid">
            <div class="stat-card" style="border-color:var(--accent);"><b id="countT">0</b><span>TOTAL</span></div>
            <div class="stat-card" style="border-color:var(--success);"><b id="countP" style="color:var(--success);">0</b><span>PAID</span></div>
            <div class="stat-card" style="border-color:var(--danger);"><b id="countB" style="color:var(--danger);">0</b><span>OWING</span></div>
        </div>
        <div class="container">
            <div class="card">
                <input type="text" id="searchBox" placeholder="SEARCH BY NAME OR LIN..." onkeyup="doSearch()" style="border: 2px solid var(--primary); padding:15px;">
            </div>
            <div class="table-wrap card">
                <table>
                    <thead>
                        <tr><th>LIN</th><th>PHOTO</th><th>NAME</th><th>CLASS</th><th>BALANCE</th><th>ACTION</th></tr>
                    </thead>
                    <tbody id="dashBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="admission" class="tab-content container" style="display:none;">
        <div class="card">
            <h3 id="formTitle" style="margin-top:0; font-size:0.8rem; color:var(--primary);">STUDENT ENROLLMENT</h3>
            <div class="input-grid">
                <input type="text" id="inName" placeholder="NAME">
                <input type="text" id="inClass" placeholder="CLASS">
                <input type="number" id="inTotal" placeholder="FEES">
                <input type="file" id="inPhoto" accept="image/*" style="border:none;">
            </div>
            <button class="btn btn-save" id="saveBtn" onclick="handleSave()">SAVE RECORD</button>
            <button class="btn btn-del" id="cancelBtn" style="display:none; width:100%; margin-top:10px;" onclick="cancelEdit()">CANCEL EDIT</button>
        </div>
    </div>

    <script>
        const _URL = 'https://kjftrwuucjdnhfwesrup.supabase.co'; 
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const client = supabase.createClient(_URL, _KEY);
        
        let allStudents = [];
        let editId = null;

        setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

        function showTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display='none');
            document.querySelectorAll('.tab').forEach(c => c.classList.remove('active'));
            document.getElementById(t).style.display='block';
            event.target.classList.add('active');
            if(t === 'dash') fetchAll();
        }

        async function fetchAll() {
            const { data } = await client.from('students').select('*').order('name');
            allStudents = data || [];
            renderDash();
        }

        function renderDash() {
            let p = 0, b = 0;
            document.getElementById('dashBody').innerHTML = allStudents.map(s => {
                const bal = (s.total_fees || 0) - (s.paid_fees || 0);
                if(bal <= 0) p++; else b++;
                return `<tr>
                    <td>${s.lin || '---'}</td>
                    <td><img src="${s.photo_url || ''}" class="stu-pic"></td>
                    <td style="color:var(--primary)">${s.name}</td>
                    <td>${s.class}</td>
                    <td style="color:${bal > 0 ? 'red' : 'green'}">${bal.toLocaleString()}</td>
                    <td>
                        <button class="btn btn-edit" onclick="prepEdit('${s.id}')">EDIT</button>
                        <button class="btn btn-del" onclick="handleDelete('${s.id}')">DEL</button>
                    </td>
                </tr>`;
            }).join('');
            document.getElementById('countT').innerText = allStudents.length;
            document.getElementById('countP').innerText = p;
            document.getElementById('countB').innerText = b;
        }

        async function compress(file) {
            return new Promise(res => {
                const r = new FileReader(); r.readAsDataURL(file);
                r.onload = e => {
                    const img = new Image(); img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 300; canvas.height = 300;
                        canvas.getContext('2d').drawImage(img, 0, 0, 300, 300);
                        canvas.toBlob(b => res(b), 'image/jpeg', 0.7);
                    }
                }
            });
        }

        async function handleSave() {
            const file = document.getElementById('inPhoto').files[0];
            let pUrl = undefined;

            if(file) {
                const blob = await compress(file);
                const path = `img_${Date.now()}.jpg`;
                const { data } = await client.storage.from('student-photos').upload(path, blob);
                if(data) pUrl = client.storage.from('student-photos').getPublicUrl(path).data.publicUrl;
            }

            const payload = {
                name: document.getElementById('inName').value,
                class: document.getElementById('inClass').value,
                total_fees: document.getElementById('inTotal').value
            };
            if(pUrl) payload.photo_url = pUrl;

            if(editId) {
                await client.from('students').update(payload).eq('id', editId);
                editId = null;
            } else {
                await client.from('students').insert([payload]);
            }
            
            alert("SUCCESS");
            cancelEdit();
        }

        function prepEdit(id) {
            const s = allStudents.find(x => x.id === id);
            editId = id;
            document.getElementById('inName').value = s.name;
            document.getElementById('inClass').value = s.class;
            document.getElementById('inTotal').value = s.total_fees;
            document.getElementById('formTitle').innerText = "EDITING: " + s.name;
            document.getElementById('saveBtn').innerText = "UPDATE STUDENT";
            document.getElementById('cancelBtn').style.display = "block";
            showTab('admission');
        }

        async function handleDelete(id) {
            if(confirm("DELETE PERMANENTLY?")) {
                await client.from('students').delete().eq('id', id);
                fetchAll();
            }
        }

        function cancelEdit() {
            editId = null;
            document.getElementById('inName').value = "";
            document.getElementById('inClass').value = "";
            document.getElementById('inTotal').value = "";
            document.getElementById('formTitle').innerText = "STUDENT ENROLLMENT";
            document.getElementById('saveBtn').innerText = "SAVE RECORD";
            document.getElementById('cancelBtn').style.display = "none";
            showTab('dash');
        }

        function doSearch() {
            let f = document.getElementById('searchBox').value.toUpperCase();
            let rows = document.getElementById('dashBody').getElementsByTagName('tr');
            for(let row of rows) row.style.display = row.innerText.toUpperCase().includes(f) ? "" : "none";
        }

        fetchAll();
    </script>
</body>
</html>
