<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS ELITE PRO | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #0052cc; --sidebar: #020617; --bg: #f8fafc; --success: #22c55e; --danger: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #1e293b; height: 100vh; display: flex; overflow: hidden; }

        /* AUTH SCREEN */
        #auth { position: fixed; inset: 0; background: var(--sidebar); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: white; padding: 40px; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        
        /* SIDEBAR */
        .sidebar { width: 280px; background: var(--sidebar); display: flex; flex-direction: column; transition: 0.3s; z-index: 2000; flex-shrink: 0; }
        @media (max-width: 1024px) { .sidebar { position: fixed; height: 100%; transform: translateX(-100%); } .sidebar.open { transform: translateX(0); } }
        .nav-item { display: flex; align-items: center; padding: 14px 20px; color: #94a3b8; border: none; background: transparent; width: 100%; cursor: pointer; font-weight: 700; font-size: 0.8rem; border-radius: 12px; margin-bottom: 4px; text-align: left; }
        .nav-item.active { background: var(--primary); color: white; }

        /* CONTENT */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 70px; background: white; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e2e8f0; }
        .content { flex: 1; padding: 20px; overflow-y: auto; }

        .glass-card { background: white; border-radius: 24px; padding: 20px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 15px; font-weight: 600; font-size: 0.9rem; }
        .btn-pro { background: var(--primary); color: white; padding: 16px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; width: 100%; }
        
        .hidden { display: none !important; }
        .err-msg { color: var(--danger); font-size: 0.75rem; font-weight: 800; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div id="auth">
        <div class="auth-card">
            <h1 style="font-weight:900; letter-spacing:-1px;">ESMS <span style="color:var(--primary)">ELITE</span></h1>
            <p style="color:#94a3b8; font-size:0.7rem; margin-bottom:30px; font-weight:700; text-transform:uppercase;">Eudes Media Digital Partner</p>
            
            <input type="text" id="login-id" placeholder="ENTER SCHOOL ID (e.g. PM001)" style="text-align:center;">
            <button class="btn-pro" id="login-btn" onclick="verify()">UNLOCK SYSTEM</button>
            <p id="login-err" class="err-msg">INVALID SCHOOL ID. TRY AGAIN.</p>
        </div>
    </div>

    <aside class="sidebar" id="sidebar">
        <div style="padding:40px 20px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.05);">
            <img id="sch-logo" style="height:55px; background:white; border-radius:12px; padding:5px; margin-bottom:12px;">
            <h4 id="side-sch-name" style="color:white; font-size:0.8rem; text-transform:uppercase; letter-spacing:1px;"></h4>
        </div>
        <nav style="padding:15px; flex:1;">
            <button class="nav-item active" onclick="nav('dash', this)"><i class="fas fa-chart-pie"></i> &nbsp; Dashboard</button>
            <button class="nav-item" onclick="nav('reg', this)"><i class="fas fa-user-plus"></i> &nbsp; Enrollment</button>
            <button class="nav-item" onclick="nav('list', this)"><i class="fas fa-users"></i> &nbsp; Student List</button>
            <button class="nav-item" onclick="nav('fin', this)"><i class="fas fa-wallet"></i> &nbsp; Finance</button>
            <button class="nav-item" onclick="nav('roll', this)"><i class="fas fa-calendar-check"></i> &nbsp; Rollcall</button>
        </nav>
    </aside>

    <main class="main">
        <header class="header">
            <div onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars-staggered"></i></div>
            <h4 id="head-title" style="font-weight:800; font-size:0.9rem;">DASHBOARD</h4>
            <div style="background:#fef2f2; color:#ef4444; padding:5px 12px; border-radius:8px; font-size:0.6rem; font-weight:900;">ACTIVE</div>
        </header>

        <div class="content">
            <div id="v-dash">
                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap:15px;">
                    <div class="glass-card" style="text-align:center;">
                        <h2 id="d-total">0</h2>
                        <label style="font-size:0.6rem; font-weight:800; color:#94a3b8;">STUDENTS</label>
                    </div>
                    <div class="glass-card" style="text-align:center; border-color:var(--danger);">
                        <h2 id="d-absent" style="color:var(--danger)">0</h2>
                        <label style="font-size:0.6rem; font-weight:800; color:#94a3b8;">ABSENT TODAY</label>
                    </div>
                </div>
            </div>

            <div id="v-reg" class="hidden">
                <div class="glass-card">
                    <h3>ENROLL STUDENT</h3>
                    <input type="text" id="f-name" placeholder="FULL NAME">
                    <select id="f-class">
                        <option>P.1</option><option>P.2</option><option>P.3</option>
                        <option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option>
                    </select>
                    <input type="number" id="f-fees" placeholder="TOTAL FEES">
                    <button class="btn-pro" onclick="save()">SAVE TO SUPABASE</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const db = supabase.createClient(SB_URL, SB_KEY);
        let activeSch = "";

        async function verify() {
            const idInput = document.getElementById('login-id');
            const btn = document.getElementById('login-btn');
            const err = document.getElementById('login-err');
            const id = idInput.value.toUpperCase().trim();

            if(!id) return;
            
            btn.innerText = "VERIFYING...";
            err.style.display = "none";

            try {
                const { data, error } = await db.from('Schools').select('*').eq('sch_id', id).single();
                
                if(data) {
                    activeSch = id;
                    document.getElementById('side-sch-name').innerText = data.school_name;
                    document.getElementById('sch-logo').src = data.logo_url;
                    document.getElementById('auth').classList.add('hidden');
                    load();
                } else {
                    btn.innerText = "UNLOCK SYSTEM";
                    err.style.display = "block";
                }
            } catch (e) {
                btn.innerText = "UNLOCK SYSTEM";
                err.innerText = "CONNECTION ERROR. CHECK INTERNET.";
                err.style.display = "block";
            }
        }

        async function load() {
            const { data } = await db.from('Students').select('*').eq('sch_id', activeSch);
            if(data) document.getElementById('d-total').innerText = data.length;
        }

        async function save() {
            const entry = {
                sch_id: activeSch,
                name: document.getElementById('f-name').value.toUpperCase(),
                class: document.getElementById('f-class').value,
                total_fees: document.getElementById('f-fees').value
            };
            await db.from('Students').insert([entry]);
            alert("STUDENT SAVED");
            load();
        }

        function nav(v, b) {
            ['v-dash', 'v-reg'].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.classList.add('hidden');
            });
            document.getElementById('v-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            b.classList.add('active');
        }
    </script>
</body>
</html>
