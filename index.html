<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLIENT PORTAL | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0052cc; --dark: #020617; --bg: #f8fafc; --success: #22c55e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #1e293b; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* TOP NAVIGATION */
        .top-bar { height: 75px; background: white; border-bottom: 2px solid var(--primary); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; }
        #live-clock { font-size: 0.75rem; font-weight: 800; color: var(--primary); }

        .wrapper { display: flex; flex: 1; overflow: hidden; }
        
        /* SIDEBAR */
        .sidebar { width: 260px; background: var(--dark); display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; }
        @media (max-width: 1024px) { .sidebar { position: fixed; height: 100%; transform: translateX(-100%); } .sidebar.open { transform: translateX(0); } }
        
        .nav-item { padding: 18px 25px; color: #94a3b8; cursor: pointer; display: flex; align-items: center; font-weight: 700; border: none; background: none; width: 100%; text-align: left; }
        .nav-item i { width: 30px; font-size: 1.2rem; }
        .nav-item.active { background: var(--primary); color: white; border-radius: 0 30px 30px 0; margin-right: 10px; }
        
        .content { flex: 1; overflow-y: auto; padding: 25px; }

        /* UI CARDS */
        .stat-card { background: white; padding: 25px; border-radius: 20px; border-left: 6px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .glass-card { background: white; border-radius: 25px; padding: 30px; border: 1px solid #e2e8f0; margin-bottom: 25px; }
        
        input, select { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid #cbd5e1; margin-bottom: 15px; font-weight: 600; font-size: 1rem; }
        .btn-pro { background: var(--primary); color: white; padding: 20px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; width: 100%; transition: 0.2s; box-shadow: 0 5px 15px rgba(0, 82, 204, 0.3); }
        .btn-pro:disabled { background: #94a3b8; transform: none; }

        .st-row { background: white; padding: 15px; border-radius: 18px; margin-bottom: 12px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 15px; }
        .st-photo { width: 60px; height: 60px; border-radius: 15px; object-fit: cover; background: #e2e8f0; border: 2px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        .hidden { display: none !important; }
        #auth { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="auth">
        <div style="background:white; padding:50px; border-radius:40px; width:100%; max-width:420px; text-align:center;">
            <h1 style="font-weight:900; color:var(--dark)">ESMS <span style="color:var(--primary)">ELITE</span></h1>
            <p style="font-size:0.8rem; font-weight:800; color:#94a3b8; margin-bottom:30px;">EUDES MEDIA SOLUTIONS</p>
            <input type="text" id="sch-id-input" placeholder="ENTER SCHOOL ACCESS ID" style="text-align:center; text-transform:uppercase;">
            <button class="btn-pro" onclick="login()">SECURE CONNECT</button>
            <p id="login-error" style="color:red; font-size:0.7rem; margin-top:15px; font-weight:700;"></p>
        </div>
    </div>

    <header class="top-bar">
        <div onclick="document.getElementById('sidebar').classList.toggle('open')" style="cursor:pointer; font-size:1.5rem;"><i class="fas fa-bars"></i></div>
        <div style="text-align:center;">
            <img id="sch-logo" style="height:45px; border-radius:8px; margin-bottom:5px; display:none;">
            <div id="live-clock" style="font-size:0.65rem; font-weight:800;"></div>
        </div>
        <div id="sch-display-name" style="font-weight:900; color:var(--primary); font-size:0.7rem;"></div>
    </header>

    <div class="wrapper">
        <aside class="sidebar" id="sidebar">
            <nav style="margin-top:30px;">
                <button class="nav-item active" onclick="nav('dash', this)"><i class="fas fa-chart-pie"></i>Dashboard</button>
                <button class="nav-item" onclick="nav('reg', this)"><i class="fas fa-user-plus"></i>Registration</button>
                <button class="nav-item" onclick="nav('list', this)"><i class="fas fa-address-book"></i>Student List</button>
                <button class="nav-item" onclick="nav('fin', this)"><i class="fas fa-wallet"></i>Financials</button>
                <button class="nav-item" onclick="nav('rep', this)"><i class="fas fa-file-contract"></i>Report Cards</button>
            </nav>
            <div style="margin-top:auto; padding:30px; text-align:center; border-top:1px solid #1e293b;">
                <p style="color:white; font-size:0.7rem; font-weight:800;">EUDES MEDIA</p>
                <p style="color:var(--primary); font-size:0.65rem; font-weight:800;">+256762992440</p>
            </div>
        </aside>

        <main class="content">
            <div id="v-dash">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:30px;">
                    <div class="stat-card"><h2><span id="st-count">0</span></h2><p style="font-size:0.6rem; font-weight:800; color:#64748b;">TOTAL STUDENTS</p></div>
                    <div class="stat-card"><h2><span id="st-debt" style="color:red">0</span></h2><p style="font-size:0.6rem; font-weight:800; color:#64748b;">FEES BALANCE (UGX)</p></div>
                </div>
                <div class="glass-card">
                    <h4 style="font-size:0.7rem; font-weight:900; color:var(--primary);"><i class="fas fa-shield-alt"></i> SYSTEM INTEGRITY</h4>
                    <p style="font-size:0.65rem; color:#64748b; margin-top:10px;">End-to-end encryption active. Database linked to Eudes Media Master Cloud.</p>
                </div>
            </div>

            <div id="v-reg" class="hidden">
                <div class="glass-card">
                    <h3 style="margin-bottom:25px; font-weight:900;">NEW STUDENT ENROLLMENT</h3>
                    <div style="text-align:center; margin-bottom:20px;">
                        <img id="f-preview" class="st-photo" style="width:120px; height:120px; display:none; margin:0 auto 15px; border:3px solid var(--primary);">
                        <input type="file" accept="image/*" onchange="processPhoto(this)">
                        <input type="hidden" id="f-img">
                    </div>
                    <input type="text" id="f-name" placeholder="Full Student Name">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                        <input type="number" id="f-age" placeholder="Age">
                        <input type="date" id="f-dob">
                    </div>
                    <select id="f-class">
                        <option>Baby Class</option><option>Middle Class</option><option>Top Class</option>
                        <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                        <option>P.5</option><option>P.6</option><option>P.7</option>
                    </select>
                    <input type="text" id="f-contact" placeholder="Guardian Contact Number">
                    <input type="text" id="f-loc" placeholder="Physical Home Location">
                    <input type="text" id="f-health" placeholder="Health Status / Allergies">
                    <input type="number" id="f-fees" placeholder="Total Fees for Term">
                    <button id="save-btn" class="btn-pro" onclick="saveToCloud()">SECURE SAVE</button>
                </div>
            </div>

            <div id="v-list" class="hidden">
                <input type="text" placeholder="Search student name..." onkeyup="search(this.value)" style="margin-bottom:20px;">
                <div id="master-list"></div>
            </div>

            <div id="v-fin" class="hidden">
                <div id="finance-list"></div>
            </div>

            <div id="v-rep" class="hidden">
                <div class="glass-card">
                    <select id="rep-cls" onchange="loadRepList()"><option value="">Select Class</option></select>
                    <div id="rep-st-list"></div>
                    <div id="g-panel" class="hidden" style="margin-top:25px; padding-top:25px; border-top:2px dashed #eee;">
                        <h4 id="g-name" style="color:var(--primary); font-weight:900; margin-bottom:15px;"></h4>
                        <div id="g-inputs" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>
                        <div style="background:var(--dark); color:white; padding:25px; border-radius:25px; text-align:center; margin:20px 0;">
                            <h1 id="res-agg">--</h1><p style="font-size:0.65rem; letter-spacing:2px;">TOTAL AGGREGATES</p>
                            <h4 id="res-div" style="color:var(--primary); margin-top:5px;"></h4>
                        </div>
                        <button class="btn-pro" onclick="saveReport()">ARCHIVE TO CLOUD</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        let db, activeSch, students = [], currentSid;

        // --- AUTH & LOGIN ---
        async function login() {
            const id = document.getElementById('sch-id-input').value.toUpperCase().trim();
            const errBox = document.getElementById('login-error');
            if(!id) { errBox.innerText = "PLEASE ENTER ID"; return; }
            
            db = supabase.createClient(SB_URL, SB_KEY);
            
            try {
                const { data, error } = await db.from('Schools').select('*').eq('sch_id', id).single();
                
                if(error) throw error;

                if(data) {
                    activeSch = id;
                    if(data.logo_url) {
                        document.getElementById('sch-logo').src = data.logo_url;
                        document.getElementById('sch-logo').style.display = 'block';
                    }
                    document.getElementById('sch-display-name').innerText = data.school_name;
                    document.getElementById('auth').classList.add('hidden');
                    refresh();
                }
            } catch (e) {
                console.error(e);
                errBox.innerText = "LOGIN FAILED: " + e.message;
            }
        }

        async function refresh() {
            const { data } = await db.from('Students').select('*').eq('sch_id', activeSch);
            students = data || [];
            updateUI();
        }

        // --- IMAGE PROCESSING ---
        function processPhoto(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 300; canvas.height = 300;
                    canvas.getContext('2d').drawImage(img, 0, 0, 300, 300);
                    const b64 = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('f-preview').src = b64;
                    document.getElementById('f-preview').style.display = 'block';
                    document.getElementById('f-img').value = b64;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // --- SAVE TO DATABASE ---
        async function saveToCloud() {
            const btn = document.getElementById('save-btn');
            btn.disabled = true; btn.innerText = "CONNECTING...";

            const age = document.getElementById('f-age').value;
            const fees = document.getElementById('f-fees').value;
            const dob = document.getElementById('f-dob').value;

            const payload = {
                sch_id: activeSch,
                name: document.getElementById('f-name').value.toUpperCase().trim(),
                age: age ? parseInt(age) : 0,
                dob: dob || null, // Fixes "invalid input syntax for type date"
                class: document.getElementById('f-class').value,
                contact: document.getElementById('f-contact').value,
                location: document.getElementById('f-loc').value,
                health_status: document.getElementById('f-health').value || 'NORMAL',
                total_fees: fees ? parseInt(fees) : 0,
                photo_url: document.getElementById('f-img').value || ''
            };

            if(!payload.name) { alert("NAME IS REQUIRED"); btn.disabled = false; return; }

            // Automatic System IDs
            payload.lin = activeSch + "-" + Math.floor(1000 + Math.random()*8999);
            payload.payment_code = "PAY-" + Math.floor(100000 + Math.random()*899999);

            const { error } = await db.from('Students').insert([payload]);

            if(!error) {
                alert("SECURELY SAVED");
                refresh(); nav('list');
                ['f-name','f-age','f-dob','f-contact','f-loc','f-health','f-fees','f-img'].forEach(id => document.getElementById(id).value="");
                document.getElementById('f-preview').style.display = 'none';
            } else {
                alert("SAVE ERROR: " + error.message);
            }
            btn.disabled = false; btn.innerText = "SECURE SAVE";
        }

        function updateUI() {
            let debt = 0;
            students.forEach(s => debt += (Number(s.total_fees || 0) - Number(s.paid_fees || 0)));
            document.getElementById('st-count').innerText = students.length;
            document.getElementById('st-debt').innerText = debt.toLocaleString();

            document.getElementById('master-list').innerHTML = students.map(s => `
                <div class="st-row">
                    <img src="${s.photo_url}" class="st-photo">
                    <div style="flex:1"><b>${s.name}</b><br><small>${s.lin} | ${s.class}</small></div>
                    <i class="fas fa-trash" style="color:#cbd5e1" onclick="del('${s.id}')"></i>
                </div>`).join('');

            document.getElementById('finance-list').innerHTML = students.map(s => `
                <div class="st-row">
                    <div style="flex:1"><b>${s.name}</b><br><small>PAY CODE: ${s.payment_code}</small></div>
                    <div style="text-align:right">
                        <small>Bal: ${(s.total_fees - s.paid_fees).toLocaleString()}</small><br>
                        <input type="number" placeholder="UGX" style="width:100px; padding:8px; margin:0; font-size:0.8rem;" onchange="pay('${s.id}', this.value)">
                    </div>
                </div>`).join('');

            const cls = [...new Set(students.map(s => s.class))].sort();
            document.getElementById('rep-cls').innerHTML = '<option value="">Class</option>' + cls.map(c => `<option>${c}</option>`).join('');
        }

        async function pay(id, val) {
            const s = students.find(x => x.id == id);
            await db.from('Students').update({ paid_fees: Number(s.paid_fees || 0) + Number(val) }).eq('id', id);
            refresh();
        }

        function loadRepList() {
            const c = document.getElementById('rep-cls').value;
            const filtered = students.filter(s => s.class === c);
            document.getElementById('rep-st-list').innerHTML = filtered.map(s => `
                <div class="st-row" onclick="openRep('${s.id}')" style="cursor:pointer;">${s.name}</div>`).join('');
        }

        async function openRep(id) {
            currentSid = id; const s = students.find(x => x.id == id);
            document.getElementById('g-panel').classList.remove('hidden');
            document.getElementById('g-name').innerText = s.name;
            const isP = s.class.includes('P.');
            const subs = isP ? ['English', 'Math', 'SST', 'Science'] : ['Literacy', 'Numeracy', 'Reading', 'Drawing'];
            document.getElementById('g-inputs').innerHTML = subs.map(sub => `
                <div><label style="font-size:0.6rem; font-weight:800;">${sub}</label>
                <input type="number" class="score-in" data-sub="${sub.toLowerCase()}" oninput="calcAgg()"></div>`).join('');
        }

        function calcAgg() {
            let pts = 0, ok = true;
            document.querySelectorAll('.score-in').forEach(i => {
                if(!i.value) ok = false;
                const m = Number(i.value);
                if(m >= 90) pts += 1; else if(m >= 80) pts += 2; else if(m >= 75) pts += 3;
                else if(m >= 70) pts += 4; else if(m >= 60) pts += 5; else if(m >= 50) pts += 6;
                else if(m >= 45) pts += 7; else if(m >= 40) pts += 8; else pts += 9;
            });
            if(!ok) return;
            document.getElementById('res-agg').innerText = pts;
            document.getElementById('res-div').innerText = "DIVISION " + (pts <= 12 ? "1" : pts <= 24 ? "2" : pts <= 28 ? "3" : "U");
        }

        async function saveReport() {
            const m = {}; document.querySelectorAll('.score-in').forEach(i => m[i.getAttribute('data-sub')] = Number(i.value));
            await db.from('Reports').upsert({ 
                student_id: currentSid, sch_id: activeSch, ...m, 
                aggregates: parseInt(document.getElementById('res-agg').innerText),
                division: document.getElementById('res-div').innerText
            });
            alert("REPORT ARCHIVED");
        }

        async function del(id) { if(confirm("DELETE STUDENT?")) { await db.from('Students').delete().eq('id', id); refresh(); } }

        function nav(v, b) {
            ['v-dash', 'v-list', 'v-reg', 'v-fin', 'v-rep'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('v-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(b) b.classList.add('active');
            if(window.innerWidth < 1024) document.getElementById('sidebar').classList.remove('open');
        }

        setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleString('en-GB'); }, 1000);
    </script>
</body>
</html>
