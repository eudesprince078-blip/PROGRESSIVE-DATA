<script>
    const _URL = 'https://kjftrwuucjdnhfwesrup.supabase.co'; 
    const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
    const client = supabase.createClient(_URL, _KEY);

    let activeSID = "";

    async function authenticate() {
        const inputID = document.getElementById('schIdInput').value.trim();
        const inputKey = document.getElementById('passInput').value.trim();
        const btn = document.getElementById('loginBtn');
        const errBox = document.getElementById('err');

        btn.innerText = "CONNECTING...";
        errBox.style.display = 'none';

        try {
            // STEP 1: Fetch all rows from the Schools table
            const { data: allSchools, error } = await client.from('Schools').select('*');

            if (error) {
                console.error("Supabase Error:", error);
                throw new Error("DATABASE REJECTED CONNECTION");
            }

            if (!allSchools || allSchools.length === 0) {
                throw new Error("NO SCHOOLS FOUND IN DATABASE");
            }

            // STEP 2: Manually find the school by checking every possible column name
            // This bypasses the "Column sch_id does not exist" error
            const school = allSchools.find(s => 
                s.sch_id === inputID || 
                s.school_id === inputID || 
                s.Sch_ID === inputID
            );

            if (!school) {
                throw new Error("INVALID SCHOOL ID");
            }

            // STEP 3: Verify the Access Key
            let userRole = "";
            if (inputKey === school.admin_key) userRole = "ADMIN";
            else if (inputKey === school.teacher_key) userRole = "TEACHER";
            else if (inputKey === school.finance_key) userRole = "FINANCE";
            else throw new Error("WRONG ACCESS KEY");

            // SUCCESS: Launch the App
            activeSID = inputID;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            
            document.getElementById('schName').innerText = school.school_name || "SCHOOL DASHBOARD";
            document.getElementById('schLogo').src = school.logo_url || "";
            document.getElementById('roleDisplay').innerText = "ACCESS: " + userRole;

            loadData();

        } catch (e) {
            btn.innerText = "OPEN SYSTEM";
            errBox.innerText = e.message;
            errBox.style.display = 'block';
            console.log("Login Failed:", e.message);
        }
    }

    async function loadData() {
        try {
            const { data, error } = await client
                .from('students')
                .select('*')
                .eq('scho_id', activeSID);

            if (error) throw error;

            const list = data || [];
            let c = { APPLIED: 0, INTERVIEW: 0, PAYMENT: 0, ENROLLED: 0 };

            document.getElementById('stuBody').innerHTML = list.map(s => {
                const stat = s.status || 'APPLIED';
                if(c[stat] !== undefined) c[stat]++;
                return `<tr>
                    <td style="padding:15px; font-weight:800; border-bottom:1px solid #eee;">${s.name}</td>
                    <td style="border-bottom:1px solid #eee;"><span style="background:#eef2ff; color:#0047AB; padding:4px 8px; border-radius:5px; font-size:0.6rem;">${stat}</span></td>
                </tr>`;
            }).join('');

            document.getElementById('c1').innerText = c.APPLIED;
            document.getElementById('c2').innerText = c.INTERVIEW;
            document.getElementById('c3').innerText = c.PAYMENT;
            document.getElementById('c4').innerText = c.ENROLLED;

        } catch (err) {
            console.log("Data Load Error:", err.message);
        }
    }
</script>
