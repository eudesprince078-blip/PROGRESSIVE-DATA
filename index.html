<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROGRESSIVE PMS PRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf-autotable.min.js"></script>
    <style>
        :root { --blue: #004085; --dark: #001a33; --white: #ffffff; --green: #218838; --red: #c82333; --gold: #ffc107; --gray: #f1f4f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); margin: 0; padding: 0; }
        
        /* Layout */
        .header { background: linear-gradient(135deg, var(--dark), var(--blue)); color: white; padding: 20px; text-align: center; border-radius: 0 0 25px 25px; position: relative; }
        .logout-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.2); color: white; border: none; padding: 6px 15px; border-radius: 50px; cursor: pointer; font-size: 11px; }
        
        /* Dashboard Stats */
        .grid-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; margin-top: -30px; }
        .stat-card { background: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        .stat-card h3 { margin: 5px 0; font-size: 20px; color: var(--dark); }
        .stat-label { font-size: 10px; color: #888; font-weight: bold; text-transform: uppercase; }

        /* Security Alert */
        .watchdog { background: #fff5f5; border-left: 5px solid var(--red); color: #c53030; padding: 12px; margin: 15px; border-radius: 8px; font-size: 12px; font-weight: bold; }

        /* UI Elements */
        .card { background: white; padding: 15px; border-radius: 12px; margin: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-pro { background: var(--blue); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-sec { background: var(--dark); color: var(--gold); border: 1px solid var(--gold); padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; margin-top: 10px; font-weight: bold; }
        
        input, select { width: 100%; padding: 12px; margin-top: 8px; border: 1.5px solid #eee; border-radius: 8px; box-sizing: border-box; }
        
        .role-tag { font-size: 10px; background: var(--gold); color: black; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
        .hidden { display: none !important; }

        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div id="loginPage" style="padding: 80px 20px; text-align: center;">
    <h1 style="color:var(--blue)">PROGRESSIVE PMS PRO</h1>
    <div class="card" style="max-width: 350px; margin: auto;">
        <input id="key" type="password" placeholder="System Access Key" style="text-align:center;">
        <button onclick="login()" class="btn-pro">ENTER SYSTEM</button>
    </div>
</div>

<div id="app" class="hidden">
    <div class="header">
        <button class="logout-btn" onclick="location.reload()">LOGOUT</button>
        <h3 style="margin:0;">PROGRESSIVE MOTHERS</h3>
        <span id="displayRole" class="role-tag">ROLE</span>
    </div>

    <div id="watchdog" class="watchdog hidden">
        ⚠️ MISSING REPORTS: <span id="missingClasses"></span>
    </div>

    <div class="grid-stats">
        <div class="stat-card" style="grid-column: span 2;">
            <div class="stat-label">Total Enrollment</div>
            <h3 id="statTotal">0</h3>
        </div>
        <div class="stat-card">
            <div class="stat-label">Absent Today</div>
            <h3 id="statAbs" style="color:var(--red);">0</h3>
        </div>
        <div class="stat-card">
            <div class="stat-label">Gender (M|F)</div>
            <h3 id="statGender" style="font-size:16px;">0 | 0</h3>
        </div>
        <div id="finStat" class="stat-card" style="grid-column: span 2;">
            <div class="stat-label">Total Outstanding Debt</div>
            <h3 id="statDebt" style="color:var(--red);">UGX 0</h3>
        </div>
    </div>

    <div id="adminPanel" class="card hidden">
        <h4 style="margin:0; color:var(--blue);">MASTER CONTROLS</h4>
        <button class="btn-sec" onclick="promoteStudents()">🚀 AUTO-PROMOTE ALL STUDENTS (End of Year)</button>
        <button class="btn-sec" onclick="downloadReport()">📥 DOWNLOAD FULL DEBTOR SOFT COPY (PDF)</button>
    </div>

    <div id="regCard" class="card">
        <h4 style="margin:0; color:var(--blue);">STUDENT MANAGEMENT</h4>
        <input type="hidden" id="editId">
        <input id="stName" placeholder="Student Full Name">
        <select id="stGender"><option value="Male">Male</option><option value="Female">Female</option></select>
        <select id="stClass">
            <option value="Baby">Baby</option><option value="Middle">Middle</option><option value="Top">Top</option>
            <option value="P.1">P.1</option><option value="P.2">P.2</option><option value="P.3">P.3</option>
            <option value="P.4">P.4</option><option value="P.5">P.5</option><option value="P.6">P.6</option><option value="P.7">P.7</option>
            <option value="Left School" id="optLeft" class="hidden">Left School (Archive)</option>
        </select>
        
        <div id="finInputs" class="hidden" style="margin-top:10px; padding:10px; border:1px dashed var(--gold); border-radius:8px;">
            <label style="font-size:11px; font-weight:bold;">FINANCIAL RECORD</label>
            <input id="stExp" type="number" placeholder="Total Fees (UGX)">
            <input id="stPaid" type="number" placeholder="Amount Paid (UGX)">
        </div>
        <button onclick="saveStudent()" class="btn-pro">SAVE RECORD</button>
    </div>

    <div class="card">
        <input type="text" id="search" oninput="render()" placeholder="🔍 Search Name or LIN...">
        <div id="list" style="margin-top:10px;"></div>
    </div>
</div>

<script>
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co";
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    const sb = supabase.createClient(SB_URL, SB_KEY);
    
    let students = [], ROLE = "";
    const classes = ["Baby", "Middle", "Top", "P.1", "P.2", "P.3", "P.4", "P.5", "P.6", "P.7"];

    function login() {
        const k = document.getElementById('key').value.toUpperCase();
        if(k === "JESUS CARES") ROLE = "ADMIN";
        else if(k === "DIRECTOR2026") ROLE = "DIRECTOR";
        else if(k === "FINANCE2026") ROLE = "FINANCE";
        else if(k === "TEACHER256") ROLE = "TEACHER";
        else return alert("Access Denied");

        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('displayRole').innerText = ROLE;

        // Apply Security Limits
        if(ROLE === "ADMIN" || ROLE === "DIRECTOR") {
            document.getElementById('adminPanel').classList.remove('hidden');
            document.getElementById('optLeft').classList.remove('hidden');
            document.getElementById('finInputs').classList.remove('hidden');
        } else if(ROLE === "FINANCE") {
            document.getElementById('finInputs').classList.remove('hidden');
        } else if(ROLE === "TEACHER") {
            document.getElementById('finStat').classList.add('hidden');
        }
        refresh();
    }

    async function refresh() {
        const { data } = await sb.from('students').select('*').order('name', { ascending: true });
        students = data || [];
        render();
    }

    function render() {
        const active = students.filter(s => s.class !== 'Left School');
        const abs = active.filter(s => s.is_absent);
        const q = document.getElementById('search').value.toUpperCase();

        document.getElementById('statTotal').innerText = active.length;
        document.getElementById('statAbs').innerText = abs.length;
        document.getElementById('statGender').innerText = `${abs.filter(s=>s.gender==='Male').length} | ${abs.filter(s=>s.gender==='Female').length}`;
        
        if(ROLE !== "TEACHER") {
            const debt = active.reduce((acc, s) => acc + (parseInt(s.fees_balance) || 0), 0);
            document.getElementById('statDebt').innerText = "UGX " + debt.toLocaleString();
        }

        // Watchdog (9 AM)
        const reported = [...new Set(students.filter(s => s.is_absent !== null).map(s => s.class))];
        const missing = classes.filter(c => !reported.includes(c));
        if(new Date().getHours() >= 9 && missing.length > 0 && (ROLE === "ADMIN" || ROLE === "DIRECTOR")) {
            document.getElementById('watchdog').classList.remove('hidden');
            document.getElementById('missingClasses').innerText = missing.join(", ");
        }

        let h = "";
        active.filter(s => s.name.toUpperCase().includes(q)).forEach(s => {
            h += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;">
                <div>
                    <b>${s.name}</b><br><small>${s.class} | ${s.gender}</small>
                    ${ROLE !== 'TEACHER' && s.fees_balance > 0 ? `<br><span style="color:red; font-size:10px;">Bal: ${s.fees_balance.toLocaleString()}</span>` : ''}
                </div>
                <div>
                    <button onclick="edit('${s.id}')" style="padding:5px;">EDIT</button>
                    <button onclick="mark('${s.id}', ${!s.is_absent})" style="background:${s.is_absent?'red':'green'}; color:white; border:none; padding:5px; margin-left:5px;">${s.is_absent?'ABSENT':'PRESENT'}</button>
                </div>
            </div>`;
        });
        document.getElementById('list').innerHTML = h;
    }

    async function saveStudent() {
        const id = document.getElementById('editId').value;
        let p = {
            name: document.getElementById('stName').value,
            class: document.getElementById('stClass').value,
            gender: document.getElementById('stGender').value,
            fees_expected: parseInt(document.getElementById('stExp').value) || 0,
            fees_paid: parseInt(document.getElementById('stPaid').value) || 0
        };
        p.fees_balance = p.fees_expected - p.fees_paid;

        if(id) await sb.from('students').update(p).eq('id', id);
        else await sb.from('students').insert([p]);
        
        alert("Success");
        location.reload();
    }

    async function promoteStudents() {
        if(!confirm("Are you sure? This will move ALL students to the next class (e.g. P.1 to P.2).")) return;
        for(let s of students) {
            let next = classes[classes.indexOf(s.class) + 1] || "Left School";
            await sb.from('students').update({ class: next, is_absent: null, fees_paid: 0 }).eq('id', s.id);
        }
        alert("Promotion Complete!");
        refresh();
    }

    function downloadReport() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("PROGRESSIVE MOTHERS - DEBTOR REPORT", 14, 15);
        const rows = students.filter(s => s.fees_balance > 0).map(s => [s.name, s.class, s.fees_balance.toLocaleString()]);
        doc.autoTable({ head: [['Student Name', 'Class', 'Balance (UGX)']], body: rows, startY: 20 });
        doc.save("School_Debtors.pdf");
    }

    function edit(id) {
        const s = students.find(x => x.id == id);
        document.getElementById('editId').value = s.id;
        document.getElementById('stName').value = s.name;
        document.getElementById('stClass').value = s.class;
        document.getElementById('stGender').value = s.gender;
        document.getElementById('stExp').value = s.fees_expected;
        document.getElementById('stPaid').value = s.fees_paid;
        
        if(ROLE === "TEACHER" || ROLE === "FINANCE") {
            document.getElementById('stName').disabled = true;
        }
    }

    async function mark(id, status) {
        await sb.from('students').update({ is_absent: status }).eq('id', id);
        refresh();
    }
</script>
</body>
</html>
