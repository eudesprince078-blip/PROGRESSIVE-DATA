<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Progressive Mothers | Eudes Media V86</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #002d5b; --gold: #ffc107; --white: #ffffff; --light: #f1f4f9; --red: #d90429; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--light); margin: 0; padding: 0; }
        .header { background: var(--blue); color: white; padding: 15px; border-bottom: 5px solid var(--gold); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .nav-tabs { display: flex; background: white; border-bottom: 2px solid #ddd; position: sticky; top: 60px; z-index: 999; }
        .tab { flex: 1; text-align: center; padding: 15px; font-size: 12px; font-weight: 900; color: #999; cursor: pointer; text-transform: uppercase; }
        .tab.active { color: var(--blue); border-bottom: 4px solid var(--blue); background: #f0f4ff; }
        .container { padding: 15px; }
        .search-bar { width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #ddd; margin-bottom: 12px; box-sizing: border-box; }
        .pupil-card { background: white; margin-bottom: 12px; padding: 12px; border-radius: 15px; display: flex; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 6px solid var(--blue); }
        .pupil-photo { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-right: 15px; border: 3px solid var(--blue); background: #eee; }
        .pupil-name { font-weight: 900; color: var(--blue); font-size: 14px; text-transform: uppercase; }
        .btn-save { background: var(--blue); color: white; padding: 18px; border: none; border-radius: 12px; font-weight: 900; width: 100%; cursor: pointer; margin-top: 10px; }
        .hidden { display: none !important; }
        input, select { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; }
        label { font-weight: 900; font-size: 11px; color: var(--blue); display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="header">
    <div><b>PROGRESSIVE MOTHERS</b><br><span style="font-size:9px; color:var(--gold);">EUDES MEDIA | V86 FIXED</span></div>
    <button onclick="location.reload()" style="background:var(--red); color:white; border:none; padding:8px 12px; border-radius:6px; font-weight:900; font-size:10px;">REFRESH</button>
</div>

<div class="nav-tabs">
    <div class="tab active" id="t-list" onclick="tab('list')">Pupils</div>
    <div class="tab" id="t-form" onclick="tab('form')">Add/Edit Pupil</div>
</div>

<div id="v-list" class="container">
    <input type="text" id="sb" class="search-bar" placeholder="🔍 Search Pupil..." oninput="render()">
    <div id="list-container"></div>
</div>

<div id="v-form" class="container hidden">
    <div style="background:white; padding:20px; border-radius:15px;">
        <input type="hidden" id="edit-id">
        <label>FULL NAME</label><input id="in-name" placeholder="Name">
        <label>CLASS</label>
        <select id="in-cls">
            <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option>
        </select>
        <label>LIN NUMBER</label><input id="in-lin" placeholder="LIN">
        <label>PHYSICAL LOCATION</label><input id="in-loc" placeholder="Location">
        <label>HEALTH STATUS</label><input id="in-health" value="Good">
        
        <label>UPLOAD PHOTO</label>
        <input type="file" id="in-photo" accept="image/*">
        
        <button class="btn-save" id="save-btn" onclick="saveData()">SAVE & UPDATE CLOUD</button>
    </div>
</div>

<script>
    const S_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
    const _db = supabase.createClient(S_URL, S_KEY);
    const BKT = 'student-photos';
    let pupils = [];

    async function load() {
        const { data } = await _db.from('students').select('*').order('name');
        if(data) { pupils = data; render(); }
    }

    function render() {
        const box = document.getElementById('list-container');
        const q = document.getElementById('sb').value.toLowerCase();
        box.innerHTML = "";
        
        pupils.filter(p => p.name.toLowerCase().includes(q)).forEach(p => {
            // Using the photo_url column from your screenshot
            const photo = p.photo_url || 'https://via.placeholder.com/100?text=No+Photo';
            
            box.innerHTML += `
                <div class="pupil-card">
                    <img src="${photo}" class="pupil-photo" onerror="this.src='https://via.placeholder.com/100?text=Wait...'">
                    <div style="flex:1">
                        <div class="pupil-name">${p.name}</div>
                        <div style="font-size:11px; font-weight:bold; color:#555;">
                            CLASS: ${p.class} | LIN: ${p.lin || 'N/A'}<br>
                            LOC: ${p.location || 'N/A'} | HEALTH: ${p.health_status || 'Good'}
                        </div>
                        <button onclick="prepEdit('${p.id}')" style="margin-top:8px; padding:6px 12px; background:var(--gold); border:none; border-radius:6px; font-weight:900; font-size:10px; cursor:pointer;">EDIT RECORD</button>
                    </div>
                </div>`;
        });
    }

    function prepEdit(id) {
        const p = pupils.find(x => x.id == id);
        document.getElementById('edit-id').value = p.id;
        document.getElementById('in-name').value = p.name;
        document.getElementById('in-cls').value = p.class;
        document.getElementById('in-lin').value = p.lin || "";
        document.getElementById('in-loc').value = p.location || "";
        document.getElementById('in-health').value = p.health_status || "Good";
        tab('form');
    }

    async function saveData() {
        const btn = document.getElementById('save-btn');
        const file = document.getElementById('in-photo').files[0];
        const eid = document.getElementById('edit-id').value;
        
        btn.disabled = true;
        btn.innerText = "UPLOADING PHOTO...";

        let finalUrl = null;
        if(file) {
            const fileName = `${Date.now()}_${file.name.replace(/\s/g, '_')}`;
            const { data: up, error: err } = await _db.storage.from(BKT).upload(fileName, file);
            
            if(err) {
                alert("Storage Error: " + err.message + "\nCheck if Policy is attached to bucket!");
                btn.disabled = false; btn.innerText = "RETRY";
                return;
            }
            finalUrl = `${S_URL}/storage/v1/object/public/${BKT}/${fileName}`;
        }

        const payload = {
            name: document.getElementById('in-name').value,
            class: document.getElementById('in-cls').value,
            lin: document.getElementById('in-lin').value,
            location: document.getElementById('in-loc').value,
            health_status: document.getElementById('in-health').value
        };
        
        if(finalUrl) payload.photo_url = finalUrl;

        btn.innerText = "SAVING DATA...";
        const { error: dbErr } = eid ? 
            await _db.from('students').update(payload).eq('id', eid) : 
            await _db.from('students').insert([payload]);

        if(dbErr) {
            alert("Database Error: " + dbErr.message);
            btn.disabled = false;
        } else {
            alert("Record Updated Successfully!");
            location.reload();
        }
    }

    function tab(v) {
        document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
        document.getElementById('v-'+v).classList.remove('hidden');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('t-'+v).classList.add('active');
    }

    load();
</script>
</body>
    </html>
