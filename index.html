<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Progressive Mothers Management System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #001a33; --red: #e63946; --gold: #ffc107; --white: #ffffff; --green: #28a745; --wa: #25D366; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; margin: 0; padding: 0; }
        
        .header { background: var(--red); color: white; padding: 12px; position: sticky; top: 0; z-index: 1000; border-bottom: 4px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .school-title { font-size: 11px; font-weight: 900; line-height: 1.2; text-transform: uppercase; }

        .login-screen { position: fixed; inset: 0; background: var(--blue); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; color: white; text-align: center; }
        .pass-box { position: relative; width: 100%; max-width: 280px; margin-top: 15px; }
        .toggle-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--blue); font-weight: bold; font-size: 11px; cursor: pointer; padding: 5px; }

        .hero { background: var(--blue); color: white; padding: 15px 10px; text-align: center; }
        #clock { font-size: 38px; font-weight: 900; }
        
        .routine-box { background: var(--gold); color: var(--blue); padding: 12px; margin: -15px 15px 10px 15px; border-radius: 12px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.15); font-weight: 900; font-size: 18px; }

        /* DASHBOARD BOXES */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 10px 15px; }
        .stat-card { background: white; padding: 10px; border-radius: 12px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-bottom: 4px solid var(--gold); }
        .stat-val { font-size: 22px; font-weight: 900; color: var(--blue); display: block; }
        .stat-lbl { font-size: 10px; font-weight: bold; color: #666; text-transform: uppercase; }

        .nav-tabs { display: flex; background: white; border-bottom: 2px solid #ddd; position: sticky; top: 62px; z-index: 900; }
        .tab { flex: 1; text-align: center; padding: 15px 5px; font-weight: 900; font-size: 11px; color: #666; cursor: pointer; }
        .tab.active { color: var(--blue); border-bottom: 4px solid var(--blue); background: #f8f9fa; }

        .item-card { background: white; border-radius: 12px; padding: 15px; margin: 10px 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 6px solid var(--blue); position: relative; }
        .lin-tag { font-weight: 900; color: var(--blue); background: #eef2f7; padding: 4px 8px; border-radius: 4px; font-size: 12px; margin-bottom: 8px; display: inline-block; }
        
        .action-btn { padding: 10px 18px; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: bold; color: white; display: inline-flex; align-items: center; margin-right: 8px; }
        .call-btn { background: var(--blue); }
        .wa-btn { background: var(--wa); }
        
        .btn-roll { padding: 15px; border-radius: 8px; border: none; font-weight: 900; min-width: 115px; color: white; cursor: pointer; }
        .present { background: var(--green); }
        .absent { background: var(--red); }
        
        .alert-card { background: #fff0f0; border: 2px solid var(--red); color: var(--red); padding: 15px; margin: 10px 15px; border-radius: 12px; }

        input, select { width: 100%; padding: 14px; border: 2px solid #ccc; border-radius: 8px; font-size: 16px; margin-top: 8px; box-sizing: border-box; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loginGate" class="login-screen">
    <div style="font-size: 18px; font-weight:900; color:var(--gold);">PROGRESSIVE MOTHERS<br>NURSERY AND PRIMARY SCHOOL</div>
    <div class="pass-box">
        <input id="key" type="password" placeholder="ACCESS KEY" style="text-align:center;">
        <span class="toggle-btn" onclick="togglePass()">SHOW</span>
    </div>
    <button onclick="secureLogin()" style="width:100%; max-width:250px; background:var(--gold); color:var(--blue); padding:18px; border:none; border-radius:10px; font-weight:900; margin-top:15px;">LOGIN</button>
</div>

<div id="mainApp" class="hidden">
    <div class="header">
        <div class="school-title">PROGRESSIVE MOTHERS<br>NURSERY AND PRIMARY SCHOOL</div>
        <button onclick="location.reload()" style="background:white; color:var(--red); border:none; padding:5px 10px; border-radius:5px; font-weight:bold; font-size:10px;">LOGOUT</button>
    </div>

    <div class="hero"><div id="clock">00:00:00</div></div>
    <div class="routine-box" id="r-task">LOADING...</div>

    <div class="dashboard">
        <div class="stat-card"><span class="stat-val" id="count-total">0</span><span class="stat-lbl">Students</span></div>
        <div class="stat-card"><span class="stat-val" id="count-clear">0</span><span class="stat-lbl">Cleared</span></div>
        <div class="stat-card"><span class="stat-val" id="count-absent">0</span><span class="stat-lbl" style="color:var(--red);">Absent</span></div>
    </div>

    <div id="chronicSection" class="hidden">
        <div class="alert-card">
            <h4 style="margin:0 0 10px 0;">⚠️ ATTENTION: ABSENT 2+ DAYS</h4>
            <div id="chronicList"></div>
        </div>
    </div>

    <div class="nav-tabs">
        <div class="tab" id="tab-rec" onclick="tab('rec')">RECORDS</div>
        <div class="tab" id="tab-adm" onclick="tab('adm')">ADMISSION</div>
        <div class="tab" id="tab-roll" onclick="tab('roll')">ROLL CALL</div>
    </div>

    <div id="v-rec" class="hidden">
        <div style="padding:15px;"><input id="searchBar" placeholder="🔍 Search Name, Class or LIN..." oninput="loadData()"></div>
        <div id="dataList"></div>
    </div>

    <div id="v-adm" class="hidden" style="padding:15px;">
        <div style="background:white; padding:20px; border-radius:15px; border:1px solid #ddd;">
            <input type="hidden" id="editId">
            <input id="name" placeholder="Full Name">
            <input id="o_lin" placeholder="LIN NUMBER">
            <select id="cls">
                <option>P.1</option><option>P.2</option><option>P.3</option>
                <option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option>
            </select>
            <input id="parent_ph" type="tel" placeholder="Parent Contact Number">
            <div id="finSection">
                <input id="f_exp" type="number" placeholder="Fees Expected">
                <input id="f_paid" type="number" placeholder="Fees Paid">
            </div>
            <button onclick="submitData()" style="width:100%; background:var(--blue); color:white; padding:18px; border:none; border-radius:10px; font-weight:900; margin-top:20px;">SAVE STUDENT</button>
        </div>
    </div>

    <div id="v-roll" class="hidden" style="padding:15px;">
        <select id="rollClass" onchange="loadData()"><option value="">-- Select Class --</option>
            <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option>
        </select>
        <div id="rollData" style="margin-top:15px;"></div>
    </div>
</div>

<script>
    const SUPA_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
    const _client = supabase.createClient(SUPA_URL, SUPA_KEY);

    let role = "";

    function togglePass() {
        const p = document.getElementById('key');
        p.type = p.type === 'password' ? 'text' : 'password';
        document.querySelector('.toggle-btn').innerText = p.type === 'password' ? 'SHOW' : 'HIDE';
    }

    function secureLogin() {
        const k = document.getElementById('key').value.trim().toUpperCase();
        if (k === "JESUS CARES") role = "Admin";
        else if (k === "FINANCE 256") role = "Finance";
        else if (k === "TEACH2026") role = "Teacher";
        else { alert("Wrong Key!"); return; }

        document.getElementById('loginGate').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        
        if(role === "Teacher") { 
            document.getElementById('tab-rec').classList.add('hidden'); 
            document.getElementById('finSection').classList.add('hidden'); 
            tab('roll'); 
        } else if(role === "Finance") { 
            document.getElementById('tab-roll').classList.add('hidden'); 
            tab('rec'); 
        } else {
            document.getElementById('chronicSection').classList.remove('hidden');
            tab('rec');
        }
        loadData();
    }

    function tab(t) {
        ['v-adm','v-rec','v-roll'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById('v-'+t).classList.remove('hidden');
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active');
    }

    async function loadData() {
        let { data, error } = await _client.from('students').select('*').order('name');
        if(error) { console.error(error); return; }

        // Update Dashboard Stats
        document.getElementById('count-total').innerText = data.length;
        document.getElementById('count-clear').innerText = data.filter(s => s.fees_paid >= s.fees_expected && s.fees_expected > 0).length;
        document.getElementById('count-absent').innerText = data.filter(s => s.is_absent).length;

        // Chronic Alarm
        if(role === "Admin") {
            const chronic = data.filter(s => s.absent_days >= 2);
            document.getElementById('chronicList').innerHTML = chronic.map(s => `
                <div style="border-bottom:1px solid #ffcccc; padding:8px 0; font-weight:bold;">
                    ${s.name} (${s.class}) - ${s.absent_days} Days Absent
                </div>
            `).join('');
        }

        // Search Filter
        const q = document.getElementById('searchBar').value.toLowerCase();
        let filtered = q ? data.filter(s => s.name.toLowerCase().includes(q) || s.class.toLowerCase().includes(q) || (s.official_lin && s.official_lin.toLowerCase().includes(q))) : data;

        // Render Records
        const list = document.getElementById('dataList');
        list.innerHTML = "";
        filtered.forEach(s => {
            const ph = s.parent_contact || "";
            const wa = ph.startsWith('0') ? '256' + ph.substring(1) : ph;
            list.innerHTML += `<div class="item-card">
                <span class="lin-tag">LIN: ${s.official_lin || 'NO LIN'}</span><br>
                <b style="font-size:18px;">${s.name}</b><br><small>${s.class}</small>
                <div style="margin-top:12px; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <a href="tel:${ph}" class="action-btn call-btn">CALL</a>
                        <a href="https://wa.me/${wa}" class="action-btn wa-btn">WHATSAPP</a>
                    </div>
                    ${role !== "Teacher" ? `<button onclick="editMode('${s.id}')" style="background:#eee; border:none; padding:8px 12px; border-radius:5px; font-weight:bold;">EDIT</button>` : ''}
                </div>
            </div>`;
        });

        // Render Roll Call
        const rCls = document.getElementById('rollClass').value;
        const rollList = document.getElementById('rollData');
        rollList.innerHTML = "";
        data.filter(s => s.class === rCls).forEach(s => {
            rollList.innerHTML += `<div class="item-card" style="border-left-color:${s.is_absent?'red':'green'}">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b>${s.name}</b><br><small class="lin-tag">LIN: ${s.official_lin || ''}</small></div>
                    <button class="btn-roll ${s.is_absent?'absent':'present'}" onclick="markAtt('${s.id}', ${!s.is_absent}, this)">
                        ${s.is_absent ? 'ABSENT' : 'PRESENT'}
                    </button>
                </div>
            </div>`;
        });
    }

    async function markAtt(id, status, btn) {
        btn.innerText = "...";
        const { data: cur } = await _client.from('students').select('absent_days').eq('id', id).single();
        let newCount = status ? ((cur.absent_days || 0) + 1) : Math.max(0, (cur.absent_days || 0) - 1);
        
        const { error } = await _client.from('students').update({ is_absent: status, absent_days: newCount }).eq('id', id);
        if(error) { alert("Network Error! Try again."); btn.innerText = status ? "PRESENT" : "ABSENT"; }
        else { loadData(); }
    }

    async function submitData() {
        const id = document.getElementById('editId').value;
        const payload = {
            name: document.getElementById('name').value,
            official_lin: document.getElementById('o_lin').value,
            class: document.getElementById('cls').value,
            parent_contact: document.getElementById('parent_ph').value,
            fees_paid: parseFloat(document.getElementById('f_paid').value) || 0,
            fees_expected: parseFloat(document.getElementById('f_exp').value) || 0
        };
        if(id) await _client.from('students').update(payload).eq('id', id);
        else await _client.from('students').insert([payload]);
        alert("Saved!"); loadData();
    }

    async function editMode(id) {
        const { data } = await _client.from('students').select('*').eq('id', id).single();
        document.getElementById('editId').value = data.id;
        document.getElementById('name').value = data.name;
        document.getElementById('o_lin').value = data.official_lin || "";
        document.getElementById('cls').value = data.class;
        document.getElementById('parent_ph').value = data.parent_contact || "";
        document.getElementById('f_paid').value = data.fees_paid;
        document.getElementById('f_exp').value = data.fees_expected;
        tab('adm');
    }

    function updateRoutine() {
        const now = new Date();
        const time = now.getHours() * 100 + now.getMinutes();
        let t = "School Resting";
        if (time >= 830 && time < 1030) t = "Morning Lessons";
        else if (time >= 1030 && time < 1100) t = "Porridge Break";
        else if (time >= 1300 && time < 1400) t = "Lunch Break";
        document.getElementById('r-task').innerText = t;
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
    }
    setInterval(updateRoutine, 1000);
</script>
</body>
</html>
