<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS ELITE | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0052cc; --dark: #020617; --bg: #f8fafc; --danger: #ef4444; --success: #22c55e; --warning: #f59e0b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #1e293b; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* HEADER */
        .top-bar { height: 65px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; }
        
        /* MAIN AREA */
        .wrapper { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 240px; background: var(--dark); display: flex; flex-direction: column; transition: 0.3s; }
        @media (max-width: 1024px) { .sidebar { position: fixed; height: 100%; transform: translateX(-100%); z-index: 2000; } .sidebar.open { transform: translateX(0); } }
        
        .nav-item { padding: 15px 20px; color: #94a3b8; cursor: pointer; display: flex; align-items: center; font-weight: 700; border: none; background: none; width: 100%; text-align: left; }
        .nav-item.active { background: var(--primary); color: white; }
        .content { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg); }

        /* DASHBOARD CARDS */
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 20px; border-radius: 20px; border-bottom: 4px solid var(--primary); text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .stat-card h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 5px; }
        .stat-card p { font-size: 0.7rem; font-weight: 700; color: #64748b; text-transform: uppercase; }

        /* LISTS & UI */
        .glass-card { background: white; border-radius: 20px; padding: 20px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .student-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 15px; }
        .st-photo { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; background: #eee; }
        .st-info { flex: 1; }
        .st-actions { display: flex; gap: 12px; font-size: 1.1rem; }
        
        input, select, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #cbd5e1; margin-bottom: 10px; font-weight: 600; }
        .btn-pro { background: var(--primary); color: white; padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; width: 100%; }
        .hidden { display: none !important; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.65rem; font-weight: 800; color: white; }
    </style>
</head>
<body>

    <div id="auth" style="position:fixed; inset:0; background:var(--dark); z-index:9999; display:flex; align-items:center; justify-content:center; padding:20px;">
        <div style="background:white; padding:40px; border-radius:30px; width:100%; max-width:400px; text-align:center;">
            <h1 style="font-weight:900;">ESMS <span style="color:var(--primary)">ELITE</span></h1>
            <p style="font-size:0.7rem; font-weight:800; color:#94a3b8; margin-bottom:20px;">EUDES MEDIA SOLUTIONS</p>
            <input type="text" id="sch-login" placeholder="SCHOOL ID" style="text-align:center;">
            <button class="btn-pro" onclick="verify()">UNLOCKED SYSTEM</button>
        </div>
    </div>

    <header class="top-bar">
        <div onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></div>
        <div style="text-align:center;"><img id="logo" style="height:35px;"><h5 id="sch-name"></h5></div>
        <i class="fas fa-user-circle" style="font-size:1.5rem; color:var(--primary)"></i>
    </header>

    <div class="wrapper">
        <aside class="sidebar" id="sidebar">
            <nav style="margin-top:20px;">
                <button class="nav-item active" onclick="nav('dash', this)"><i class="fas fa-th-large"></i>&nbsp;&nbsp;Dashboard</button>
                <button class="nav-item" onclick="nav('list', this)"><i class="fas fa-users"></i>&nbsp;&nbsp;Student List</button>
                <button class="nav-item" onclick="nav('reg', this)"><i class="fas fa-user-plus"></i>&nbsp;&nbsp;Enrollment</button>
                <button class="nav-item" onclick="nav('att', this)"><i class="fas fa-calendar-check"></i>&nbsp;&nbsp;Roll Call</button>
                <button class="nav-item" onclick="nav('fin', this)"><i class="fas fa-wallet"></i>&nbsp;&nbsp;Finance</button>
                <button class="nav-item" onclick="nav('rep', this)"><i class="fas fa-file-invoice"></i>&nbsp;&nbsp;Reports</button>
            </nav>
        </aside>

        <div class="content">
            <div id="v-dash">
                <div class="stat-grid">
                    <div class="stat-card"><h3><span id="stat-total">0</span></h3><p>Students</p></div>
                    <div class="stat-card"><h3><span id="stat-absent">0</span></h3><p>Absent Today</p></div>
                    <div class="stat-card"><h3><span id="stat-paid" style="color:var(--success)">0</span></h3><p>Paid (UGX)</p></div>
                    <div class="stat-card"><h3><span id="stat-debt" style="color:var(--danger)">0</span></h3><p>Debt (UGX)</p></div>
                </div>
            </div>

            <div id="v-reg" class="hidden">
                <div class="glass-card">
                    <h3 id="form-title">ENROLL STUDENT</h3>
                    <input type="hidden" id="f-id">
                    <div style="text-align:center; margin-bottom:15px;">
                        <img id="f-preview" class="st-photo" style="width:100px; height:100px; display:none; margin:0 auto;">
                        <input type="file" onchange="handleImg(this)" style="font-size:0.7rem;">
                        <input type="hidden" id="f-img">
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <input type="text" id="f-name" placeholder="Full Name">
                        <input type="number" id="f-age" placeholder="Age">
                        <input type="date" id="f-dob">
                        <select id="f-class">
                            <option>Baby Class</option><option>Middle Class</option><option>Top Class</option>
                            <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                            <option>P.5</option><option>P.6</option><option>P.7</option>
                        </select>
                        <input type="text" id="f-contact" placeholder="Contact Number">
                        <input type="text" id="f-loc" placeholder="Physical Location">
                    </div>
                    <input type="text" id="f-health" placeholder="Health Status">
                    <input type="number" id="f-fees" placeholder="Total Fees Amount">
                    <button class="btn-pro" onclick="saveStudent()">SECURE DATA</button>
                </div>
            </div>

            <div id="v-list" class="hidden">
                <div class="glass-card" style="padding:10px;"><input type="text" placeholder="Search by LIN or Name..." onkeyup="filter(this.value)" style="margin:0;"></div>
                <div id="master-list"></div>
            </div>

            <div id="v-att" class="hidden">
                <div class="glass-card">
                    <h3>DAILY ATTENDANCE</h3>
                    <div id="roll-call-list"></div>
                </div>
            </div>

            <div id="v-fin" class="hidden">
                <div class="glass-card">
                    <h3>FEES & PAYMENT CODES</h3>
                    <div id="finance-list"></div>
                </div>
            </div>

            <div id="v-rep" class="hidden">
                <div class="glass-card">
                    <h3>GRADING ENGINE</h3>
                    <select id="rep-cls" onchange="loadRepList()"><option value="">Select Class</option></select>
                    <div id="rep-st-list"></div>
                    <div id="g-panel" class="hidden" style="margin-top:20px; border-top:1px solid #eee; padding-top:20px;">
                        <h4 id="g-name" style="color:var(--primary); margin-bottom:15px;"></h4>
                        <div id="g-inputs" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
                        <div style="background:var(--dark); color:white; padding:15px; border-radius:15px; text-align:center; margin-top:15px;">
                            <h2 id="res-agg">--</h2><p>Aggregates</p>
                            <h3 id="res-div" style="color:var(--success)">--</h3>
                        </div>
                        <button class="btn-pro" style="margin-top:10px;" onclick="saveReport()">SAVE TO CLOUD</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        let db, activeSch, students = [], attendance = {};

        async function verify() {
            const id = document.getElementById('sch-login').value.toUpperCase().trim();
            db = supabase.createClient(SB_URL, SB_KEY);
            const { data } = await db.from('Schools').select('*').eq('sch_id', id).single();
            if(data) {
                activeSch = id;
                document.getElementById('sch-name').innerText = data.school_name;
                document.getElementById('logo').src = data.logo_url;
                document.getElementById('auth').classList.add('hidden');
                refresh();
            }
        }

        async function refresh() {
            const { data } = await db.from('Students').select('*').eq('sch_id', activeSch);
            students = data || [];
            updateStats();
            renderList();
            renderAtt();
            renderFin();
            const cls = [...new Set(students.map(s => s.class))].sort();
            document.getElementById('rep-cls').innerHTML = '<option value="">Class</option>' + cls.map(c => `<option>${c}</option>`).join('');
        }

        function updateStats() {
            let paid = 0, exp = 0;
            students.forEach(s => { paid += Number(s.paid_fees || 0); exp += Number(s.total_fees || 0); });
            document.getElementById('stat-total').innerText = students.length;
            document.getElementById('stat-paid').innerText = paid.toLocaleString();
            document.getElementById('stat-debt').innerText = (exp - paid).toLocaleString();
            document.getElementById('stat-absent').innerText = Object.values(attendance).filter(v => v === 'absent').length;
        }

        function handleImg(i) {
            const r = new FileReader();
            r.onload = e => { document.getElementById('f-preview').src = e.target.result; document.getElementById('f-preview').style.display='block'; document.getElementById('f-img').value = e.target.result; };
            r.readAsDataURL(i.files[0]);
        }

        async function saveStudent() {
            const id = document.getElementById('f-id').value;
            const paycode = "PAY-" + Math.floor(100000 + Math.random() * 900000);
            const payload = {
                sch_id: activeSch, name: document.getElementById('f-name').value.toUpperCase(),
                age: document.getElementById('f-age').value, dob: document.getElementById('f-dob').value,
                class: document.getElementById('f-class').value, contact: document.getElementById('f-contact').value,
                location: document.getElementById('f-loc').value, health: document.getElementById('f-health').value,
                total_fees: document.getElementById('f-fees').value, photo_url: document.getElementById('f-img').value,
                lin: id ? undefined : activeSch + "-" + Math.floor(1000 + Math.random()*8999),
                payment_code: id ? undefined : paycode
            };
            const { error } = id ? await db.from('Students').update(payload).eq('id', id) : await db.from('Students').insert([payload]);
            if(!error) { alert("DATA SECURED"); refresh(); nav('list'); }
        }

        function renderList() {
            document.getElementById('master-list').innerHTML = students.map(s => `
                <div class="student-item">
                    <img src="${s.photo_url || ''}" class="st-photo">
                    <div class="st-info">
                        <b>${s.name}</b><br><small>${s.lin} | ${s.class} | ${s.contact}</small><br>
                        <small style="color:var(--primary)">${s.location} | ${s.health}</small>
                    </div>
                    <div class="st-actions">
                        <i class="fas fa-edit" style="color:var(--primary)" onclick="editS('${s.id}')"></i>
                        <i class="fas fa-trash" style="color:red" onclick="delS('${s.id}')"></i>
                    </div>
                </div>
            `).join('');
        }

        function renderAtt() {
            document.getElementById('roll-call-list').innerHTML = students.map(s => `
                <div class="student-item">
                    <div style="flex:1"><b>${s.name}</b></div>
                    <div style="display:flex; gap:10px;">
                        <button onclick="setAtt('${s.id}', 'present', this)" style="padding:5px 10px; border-radius:5px; border:1px solid #eee;">Present</button>
                        <button onclick="setAtt('${s.id}', 'absent', this)" style="padding:5px 10px; border-radius:5px; border:1px solid #eee;">Absent</button>
                    </div>
                </div>
            `).join('');
        }

        function setAtt(id, status, btn) {
            attendance[id] = status;
            btn.parentElement.querySelectorAll('button').forEach(b => b.style.background = 'none');
            btn.style.background = status === 'present' ? 'var(--success)' : 'var(--danger)';
            btn.style.color = 'white';
            updateStats();
        }

        function renderFin() {
            document.getElementById('finance-list').innerHTML = students.map(s => {
                const bal = (s.total_fees || 0) - (s.paid_fees || 0);
                return `
                <div class="student-item">
                    <div style="flex:1"><b>${s.name}</b><br><small>PAY CODE: ${s.payment_code || 'N/A'}</small></div>
                    <div style="text-align:right">
                        <span class="badge" style="background:${bal > 0 ? 'var(--danger)' : 'var(--success)'}">Bal: ${bal.toLocaleString()}</span><br>
                        <input type="number" placeholder="Pay" style="width:80px; margin:0; font-size:0.7rem;" onchange="updatePay('${s.id}', this.value)">
                    </div>
                </div>`;
            }).join('');
        }

        async function updatePay(id, v) {
            const s = students.find(x => x.id == id);
            await db.from('Students').update({ paid_fees: Number(s.paid_fees || 0) + Number(v) }).eq('id', id);
            refresh();
        }

        function loadRepList() {
            const cls = document.getElementById('rep-cls').value;
            const filtered = students.filter(s => s.class === cls);
            document.getElementById('rep-st-list').innerHTML = filtered.map(s => `<div class="student-item" onclick="openG('${s.id}')">${s.name}</div>`).join('');
        }

        async function openG(id) {
            currentSid = id;
            const s = students.find(x => x.id == id);
            document.getElementById('g-panel').classList.remove('hidden');
            document.getElementById('g-name').innerText = s.name;
            const isP = s.class.includes('P.');
            const subs = isP ? ['English', 'Math', 'SST', 'Science'] : ['Literacy', 'Numeracy', 'Reading', 'Writing', 'News', 'Drawing'];
            const { data: rep } = await db.from('Reports').select('*').eq('student_id', id).single();
            document.getElementById('g-inputs').innerHTML = subs.map(sub => `
                <div><label style="font-size:0.6rem;">${sub}</label>
                <input type="number" class="mk" data-sub="${sub.toLowerCase()}" value="${rep ? rep[sub.toLowerCase()] || '' : ''}" oninput="calcG()"></div>
            `).join('');
            if(rep) calcG();
        }

        function calcG() {
            let pts = 0, filled = true;
            document.querySelectorAll('.mk').forEach(i => {
                if(!i.value) filled = false;
                const m = Number(i.value);
                if(m >= 90) pts += 1; else if(m >= 80) pts += 2; else if(m >= 75) pts += 3;
                else if(m >= 70) pts += 4; else if(m >= 60) pts += 5; else if(m >= 50) pts += 6;
                else if(m >= 45) pts += 7; else if(m >= 40) pts += 8; else pts += 9;
            });
            if(!filled) return;
            document.getElementById('res-agg').innerText = pts;
            document.getElementById('res-div').innerText = "Division " + (pts <= 12 ? "1" : pts <= 24 ? "2" : pts <= 28 ? "3" : "U");
        }

        async function saveReport() {
            const m = {}; document.querySelectorAll('.mk').forEach(i => m[i.getAttribute('data-sub')] = Number(i.value));
            const payload = {
                student_id: currentSid, sch_id: activeSch, ...m,
                aggregates: parseInt(document.getElementById('res-agg').innerText),
                division: document.getElementById('res-div').innerText
            };
            const { error } = await db.from('Reports').upsert(payload, { onConflict: 'student_id' });
            if(!error) alert("REPORT SAVED");
        }

        function editS(id) {
            const s = students.find(x => x.id == id);
            document.getElementById('f-id').value = s.id;
            document.getElementById('f-name').value = s.name;
            document.getElementById('f-class').value = s.class;
            document.getElementById('f-fees').value = s.total_fees;
            document.getElementById('f-img').value = s.photo_url;
            document.getElementById('f-preview').src = s.photo_url;
            document.getElementById('f-preview').style.display = 'block';
            nav('reg');
        }

        async function delS(id) { if(confirm("Permanent Delete?")) { await db.from('Students').delete().eq('id', id); refresh(); } }

        function nav(v, b) {
            ['v-dash', 'v-list', 'v-reg', 'v-att', 'v-fin', 'v-rep'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('v-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(b) b.classList.add('active');
            if(window.innerWidth < 1024) document.getElementById('sidebar').classList.remove('open');
        }
    </script>
</body>
</html>
