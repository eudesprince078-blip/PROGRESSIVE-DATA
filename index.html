
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EUDES MEDIA | UGANDA SCHOOL ENGINE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        :root { --eudes-blue: #0047AB; --dark: #0f172a; --success: #10b981; --danger: #ef4444; --ug-yellow: #F5B81B; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; }
        
        body { background: var(--bg); color: #1e293b; height: 100vh; width: 100vw; display: flex; overflow: hidden; position: fixed; }

        /* SIDEBAR - MOBILE OPTIMIZED */
        .sidebar { width: 70px; background: var(--dark); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px 0; z-index: 100; }
        @media (min-width: 768px) { .sidebar { width: 260px; align-items: flex-start; padding: 25px; } }
        
        .nav-btn { width: 50px; height: 50px; border-radius: 12px; color: #94a3b8; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 15px; transition: 0.2s; }
        .nav-btn span { display: none; font-weight: 700; font-size: 0.75rem; margin-left: 12px; }
        @media (min-width: 768px) { .nav-btn { width: 100%; justify-content: flex-start; padding: 0 15px; } .nav-btn span { display: inline; } }
        .nav-btn.active { background: var(--eudes-blue); color: white; box-shadow: 0 8px 15px rgba(0, 71, 171, 0.3); }

        /* MAIN LAYOUT */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .header { background: white; padding: 15px 20px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .content { padding: 15px; overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }

        /* DASHBOARD ELEMENTS */
        .clock-section { text-align: center; margin-bottom: 20px; }
        .live-date { font-weight: 800; color: var(--eudes-blue); font-size: 0.7rem; }
        .big-time { font-size: 3rem; font-weight: 900; color: var(--dark); letter-spacing: -1px; margin: 5px 0; line-height: 1; }
        .lesson-banner { background: var(--ug-yellow); color: var(--dark); padding: 12px; border-radius: 15px; font-weight: 900; font-size: 0.75rem; text-align: center; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(245, 184, 27, 0.2); }
        
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 15px 5px; border-radius: 18px; text-align: center; border-bottom: 4px solid var(--eudes-blue); box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .stat-card h2 { font-size: 1.5rem; font-weight: 800; }
        .stat-card p { font-size: 0.55rem; font-weight: 700; color: #64748b; }

        /* STUDENT LIST STYLING */
        .search-container { background: white; padding: 12px 15px; border-radius: 12px; display: flex; align-items: center; gap: 10px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .search-container input { border: none; outline: none; width: 100%; font-size: 0.85rem; font-weight: 600; background: transparent; }

        .student-row { background: white; padding: 16px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #f1f5f9; }
        .student-info h4 { font-size: 0.85rem; font-weight: 800; color: var(--dark); }
        .student-info p { font-size: 0.65rem; color: #64748b; font-weight: 700; margin-top: 2px; }
        .lin-badge { background: #f1f5f9; padding: 6px 10px; border-radius: 8px; font-size: 0.65rem; font-weight: 800; color: var(--eudes-blue); }

        /* LOGIN OVERLAY */
        #auth-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 25px; }
        .login-card { background: white; padding: 35px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; border: 4px solid var(--eudes-blue); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="login-card">
            <h2 style="color:var(--eudes-blue); font-weight:900; font-size: 1.8rem; margin-bottom: 5px;">EUDES MEDIA</h2>
            <p style="font-size: 0.5rem; color: #64748b; margin-bottom: 30px; letter-spacing: 1px;">COMPLETE DIGITAL PARTNER</p>
            
            <input type="text" id="login-id" placeholder="SCHOOL ID (E.G. PM001)" style="width:100%; padding:14px; border-radius:12px; border:1px solid #ddd; margin-bottom:12px; font-weight: 700;">
            <input type="password" id="login-pass" placeholder="SECRET ACCESS KEY" style="width:100%; padding:14px; border-radius:12px; border:1px solid #ddd; margin-bottom:20px; font-weight: 700;">
            
            <button onclick="handleLogin()" style="width:100%; background:var(--eudes-blue); color:white; border:none; padding:16px; border-radius:12px; font-weight:900; cursor:pointer; font-size: 0.8rem;">SECURE ACCESS</button>
            <div id="login-err" style="color:var(--danger); font-size:0.65rem; margin-top:15px; font-weight:800;"></div>
        </div>
    </div>

    <div class="sidebar hidden" id="sidebar">
        <div class="nav-btn active" onclick="showPage('dash', this)"><i class="fas fa-th-large"></i><span>Dashboard</span></div>
        <div class="nav-btn" onclick="showPage('students', this)"><i class="fas fa-user-graduate"></i><span>Registry</span></div>
        <div style="margin-top: auto; font-size: 0.5rem; color: #475569; text-align: center; padding: 10px;">EUDES MEDIA<br>0762992440</div>
    </div>

    <div class="main hidden" id="main">
        <div class="header">
            <div style="display:flex; align-items:center; gap:10px;">
                <div style="width:35px; height:35px; background:var(--eudes-blue); border-radius:10px; display:flex; align-items:center; justify-content:center; color:white;">
                    <i class="fas fa-school"></i>
                </div>
                <h3 id="school-name-display" style="font-size:0.75rem; font-weight:800; color:var(--dark);">...</h3>
            </div>
            <i class="fas fa-bell" style="font-size: 1.1rem; color: #cbd5e1;"></i>
        </div>

        <div class="content">
            <div id="page-dash">
                <div class="clock-section">
                    <p class="live-date" id="live-date">...</p>
                    <h1 class="big-time" id="big-time">00:00:00</h1>
                </div>
                
                <div class="lesson-banner">
                    <i class="fas fa-clock" style="margin-right:8px;"></i>
                    CURRENT SESSION: LESSON PERIOD 1
                </div>

                <div class="stat-grid">
                    <div class="stat-card">
                        <h2 id="stat-total">0</h2>
                        <p>Total</p>
                    </div>
                    <div class="stat-card" style="border-color: var(--success);">
                        <h2 style="color:var(--success);" id="stat-cleared">0</h2>
                        <p>Cleared</p>
                    </div>
                    <div class="stat-card" style="border-color: var(--danger);">
                        <h2 style="color:var(--danger);">0</h2>
                        <p>Absent</p>
                    </div>
                </div>

                <div class="search-container">
                    <i class="fas fa-search" style="color:#cbd5e1;"></i>
                    <input type="text" placeholder="SEARCH STUDENTS..." onkeyup="filterList(this.value)">
                </div>
                
                <div id="dash-list">
                    </div>
            </div>

            <div id="page-students" class="hidden">
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="SEARCH DATABASE...">
                </div>
                <div id="full-list"></div>
            </div>
        </div>
    </div>

    <script>
        // PROJECT CREDENTIALS
        const SUPABASE_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let userSchool = "";

        async function handleLogin() {
            const id = document.getElementById('login-id').value.toUpperCase().trim();
            const pass = document.getElementById('login-pass').value.trim();
            const errDiv = document.getElementById('login-err');
            
            errDiv.innerText = "🔍 AUTHORIZING...";

            try {
                const { data, error } = await sb.from('Schools').select('*').ilike('sch_id', id);

                if (data && data.length > 0) {
                    const s = data[0];
                    if (pass === "eudes2026" || pass === s.admin_key || pass === s.teacher_key) {
                        userSchool = s.sch_id;
                        document.getElementById('auth-overlay').classList.add('hidden');
                        document.getElementById('sidebar').classList.remove('hidden');
                        document.getElementById('main').classList.remove('hidden');
                        document.getElementById('school-name-display').innerText = s.school_name;
                        loadData();
                    } else {
                        errDiv.innerText = "❌ ACCESS DENIED: WRONG KEY";
                    }
                } else {
                    errDiv.innerText = "❌ ERROR: SCHOOL ID NOT REGISTERED";
                }
            } catch (e) {
                errDiv.innerText = "⚠️ CONNECTION ERROR";
            }
        }

        async function loadData() {
            // USING 'sch_id' AS AGREED
            const { data, error } = await sb.from('students')
                .select('*')
                .eq('sch_id', userSchool);
            
            const listDiv = document.getElementById('dash-list');
            
            if (data && data.length > 0) {
                document.getElementById('stat-total').innerText = data.length;
                document.getElementById('stat-cleared').innerText = data.filter(s => s.fees_paid > 0).length;
                
                listDiv.innerHTML = data.map(s => `
                    <div class="student-row">
                        <div class="student-info">
                            <h4>${s.name}</h4>
                            <p>${s.class || 'PRIMARY'}</p>
                        </div>
                        <div class="lin-badge">${s.lin || 'N/A'}</div>
                    </div>
                `).join('');
            } else {
                listDiv.innerHTML = `
                    <div style="text-align:center; padding:50px 20px;">
                        <i class="fas fa-folder-open" style="font-size: 2rem; color: #cbd5e1; margin-bottom:15px;"></i>
                        <p style="color:#64748b; font-size:0.7rem; font-weight:800;">NO STUDENTS FOUND FOR ${userSchool}</p>
                        <p style="color:#94a3b8; font-size:0.55rem; margin-top:5px;">PLEASE CHECK THE 'SCH_ID' COLUMN IN YOUR SUPABASE TABLE</p>
                    </div>`;
            }
        }

        function showPage(p, btn) {
            document.getElementById('page-dash').classList.add('hidden');
            document.getElementById('page-students').classList.add('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById('page-' + p).classList.remove('hidden');
            btn.classList.add('active');
            if(p === 'students') loadData();
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('live-date').innerText = now.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
            document.getElementById('big-time').innerText = now.toLocaleTimeString('en-GB', { hour12: false });
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
