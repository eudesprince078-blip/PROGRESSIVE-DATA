<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EUDES MEDIA | ESMS PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0052cc; --dark: #020617; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #1e293b; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .top-bar { height: 70px; background: white; border-bottom: 2px solid var(--primary); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; }
        .wrapper { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 260px; background: var(--dark); display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; }
        @media (max-width: 1024px) { .sidebar { position: fixed; height: 100%; transform: translateX(-100%); } .sidebar.open { transform: translateX(0); } }
        
        .nav-item { padding: 16px 25px; color: #94a3b8; cursor: pointer; display: flex; align-items: center; font-weight: 700; border: none; background: none; width: 100%; text-align: left; }
        .nav-item.active { background: var(--primary); color: white; }
        .content { flex: 1; overflow-y: auto; padding: 20px; }

        .card { background: white; border-radius: 20px; padding: 25px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #cbd5e1; margin-bottom: 12px; font-weight: 600; }
        .btn-pro { background: var(--primary); color: white; padding: 18px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; width: 100%; }
        
        .st-row { background: white; padding: 12px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 12px; }
        .st-img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; background: #eee; }
        
        #auth { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        .search-box { position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 10; }
    </style>
</head>
<body>

    <div id="auth">
        <div style="background:white; padding:40px; border-radius:30px; width:90%; max-width:400px; text-align:center;">
            <h1 style="font-weight:900;">ESMS <span style="color:var(--primary)">ELITE</span></h1>
            <input type="text" id="sch-input" placeholder="SCHOOL ID" style="text-align:center; text-transform:uppercase; margin-top:20px;">
            <button class="btn-pro" onclick="login()">LOGIN</button>
        </div>
    </div>

    <header class="top-bar">
        <div onclick="document.getElementById('sidebar').classList.toggle('open')" style="cursor:pointer;"><i class="fas fa-bars"></i></div>
        <div id="sch-title" style="font-weight:900; color:var(--primary);">SCHOOL SYSTEM</div>
        <div id="clock" style="font-size:0.7rem; font-weight:800;"></div>
    </header>

    <div class="wrapper">
        <aside class="sidebar" id="sidebar">
            <nav style="margin-top:20px;">
                <button class="nav-item active" onclick="nav('dash', this)"><i class="fas fa-home"></i>Dashboard</button>
                <button class="nav-item" onclick="nav('reg', this)"><i class="fas fa-plus-circle"></i>Registration</button>
                <button class="nav-item" onclick="nav('list', this)"><i class="fas fa-users"></i>Student List</button>
                <button class="nav-item" onclick="nav('fin', this)"><i class="fas fa-coins"></i>Financials</button>
            </nav>
            <div style="margin-top:auto; padding:20px; text-align:center; color:white; font-size:0.7rem; border-top:1px solid #334155;">
                <b>EUDES MEDIA</b><br>+256762992440
            </div>
        </aside>

        <main class="content">
            <div id="v-dash">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                    <div class="card" style="text-align:center;"> <h2 id="count-s">0</h2><small>Students</small></div>
                    <div class="card" style="text-align:center;"> <h2 id="total-d" style="color:red">0</h2><small>Debt (UGX)</small></div>
                </div>
            </div>

            <div id="v-reg" class="hidden">
                <div class="card">
                    <h3 id="form-title" style="margin-bottom:15px;">NEW STUDENT</h3>
                    <input type="hidden" id="f-id"> <div style="text-align:center;">
                        <img id="f-preview" style="width:80px; height:80px; border-radius:10px; display:none; margin:0 auto 10px; border:2px solid var(--primary);">
                        <input type="file" onchange="procImg(this)" style="font-size:0.7rem;">
                        <input type="hidden" id="f-img">
                    </div>
                    <input type="text" id="f-name" placeholder="Full Name">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <input type="number" id="f-age" placeholder="Age">
                        <input type="date" id="f-dob">
                    </div>
                    <input type="text" id="f-contact" placeholder="Contact">
                    <input type="text" id="f-loc" placeholder="Location">
                    <input type="text" id="f-health" placeholder="Health Status">
                    <input type="number" id="f-fees" placeholder="Total Fees">
                    <button id="save-btn" class="btn-pro" onclick="saveData()">SAVE STUDENT</button>
                    <button id="cancel-btn" class="hidden" onclick="resetForm()" style="background:#64748b; color:white; border:none; padding:10px; margin-top:10px; width:100%; border-radius:10px;">CANCEL EDIT</button>
                </div>
            </div>

            <div id="v-list" class="hidden">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Search by Name or LIN..." onkeyup="filterData()">
                </div>
                <div id="master-list"></div>
            </div>

            <div id="v-fin" class="hidden"><div id="finance-list"></div></div>
        </main>
    </div>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        let db, activeSch, students = [];

        async function login() {
            const id = document.getElementById('sch-input').value.toUpperCase().trim();
            if(!id) return;
            db = supabase.createClient(SB_URL, SB_KEY);
            activeSch = id;
            document.getElementById('auth').classList.add('hidden');
            refresh();
        }

        async function refresh() {
            const { data } = await db.from('Students').select('*').eq('sch_id', activeSch);
            students = data || [];
            render();
        }

        function procImg(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 200; canvas.height = 200;
                    canvas.getContext('2d').drawImage(img, 0, 0, 200, 200);
                    const b64 = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('f-preview').src = b64;
                    document.getElementById('f-preview').style.display = 'block';
                    document.getElementById('f-img').value = b64;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }

        async function saveData() {
            const btn = document.getElementById('save-btn');
            const id = document.getElementById('f-id').value;
            btn.disabled = true; btn.innerText = "PROCESSING...";

            const payload = {
                sch_id: activeSch,
                name: document.getElementById('f-name').value.toUpperCase().trim(),
                age: parseInt(document.getElementById('f-age').value) || 0,
                dob: document.getElementById('f-dob').value || null,
                contact: document.getElementById('f-contact').value,
                location: document.getElementById('f-loc').value,
                health_status: document.getElementById('f-health').value,
                total_fees: parseInt(document.getElementById('f-fees').value) || 0,
                photo_url: document.getElementById('f-img').value
            };

            let error;
            if(id) {
                // UPDATE MODE
                const res = await db.from('Students').update(payload).eq('id', id);
                error = res.error;
            } else {
                // NEW ENTRY MODE
                payload.lin = activeSch + "-" + Math.floor(1000 + Math.random()*8999);
                payload.payment_code = "PAY-" + Math.floor(100000 + Math.random()*899999);
                const res = await db.from('Students').insert([payload]);
                error = res.error;
            }

            if(!error) {
                alert("SUCCESSFULLY SAVED TO CLOUD");
                refresh(); resetForm(); nav('list');
            } else { alert("ERROR: " + error.message); }
            btn.disabled = false; btn.innerText = "SAVE STUDENT";
        }

        function render() {
            let debt = 0; students.forEach(s => debt += (s.total_fees - s.paid_fees));
            document.getElementById('count-s').innerText = students.length;
            document.getElementById('total-d').innerText = debt.toLocaleString();

            const listHTML = students.map(s => `
                <div class="st-row">
                    <img src="${s.photo_url || ''}" class="st-img">
                    <div style="flex:1"><b>${s.name}</b><br><small>${s.lin}</small></div>
                    <div style="display:flex; gap:10px;">
                        <i class="fas fa-edit" style="color:var(--primary)" onclick="editMode('${s.id}')"></i>
                        <i class="fas fa-trash" style="color:red" onclick="del('${s.id}')"></i>
                    </div>
                </div>`).join('');
            document.getElementById('master-list').innerHTML = listHTML;

            document.getElementById('finance-list').innerHTML = students.map(s => `
                <div class="st-row">
                    <div style="flex:1"><b>${s.name}</b><br><small>Bal: ${(s.total_fees - s.paid_fees).toLocaleString()}</small></div>
                    <input type="number" placeholder="Pay" style="width:90px; margin:0;" onchange="pay('${s.id}', this.value)">
                </div>`).join('');
        }

        function filterData() {
            const query = document.getElementById('search-input').value.toUpperCase();
            const filtered = students.filter(s => s.name.includes(query) || s.lin.includes(query));
            document.getElementById('master-list').innerHTML = filtered.map(s => `
                <div class="st-row">
                    <img src="${s.photo_url || ''}" class="st-img">
                    <div style="flex:1"><b>${s.name}</b><br><small>${s.lin}</small></div>
                    <i class="fas fa-edit" style="color:var(--primary)" onclick="editMode('${s.id}')"></i>
                </div>`).join('');
        }

        function editMode(id) {
            const s = students.find(x => x.id == id);
            document.getElementById('f-id').value = s.id;
            document.getElementById('f-name').value = s.name;
            document.getElementById('f-age').value = s.age;
            document.getElementById('f-dob').value = s.dob;
            document.getElementById('f-contact').value = s.contact;
            document.getElementById('f-loc').value = s.location;
            document.getElementById('f-health').value = s.health_status;
            document.getElementById('f-fees').value = s.total_fees;
            document.getElementById('f-img').value = s.photo_url;
            document.getElementById('f-preview').src = s.photo_url;
            document.getElementById('f-preview').style.display = 'block';
            
            document.getElementById('form-title').innerText = "EDITING: " + s.name;
            document.getElementById('cancel-btn').classList.remove('hidden');
            nav('reg');
        }

        function resetForm() {
            ['f-id','f-name','f-age','f-dob','f-contact','f-loc','f-health','f-fees','f-img'].forEach(i => document.getElementById(i).value = "");
            document.getElementById('f-preview').style.display = 'none';
            document.getElementById('form-title').innerText = "NEW STUDENT";
            document.getElementById('cancel-btn').classList.add('hidden');
        }

        async function pay(id, val) {
            const s = students.find(x => x.id == id);
            const newTotal = Number(s.paid_fees || 0) + Number(val);
            await db.from('Students').update({ paid_fees: newTotal }).eq('id', id);
            refresh();
        }

        async function del(id) { if(confirm("DELETE STUDENT?")) { await db.from('Students').delete().eq('id', id); refresh(); } }

        function nav(v, b) {
            ['v-dash', 'v-reg', 'v-list', 'v-fin'].forEach(x => document.getElementById(x).classList.add('hidden'));
            document.getElementById('v-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(b) b.classList.add('active');
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString('en-GB'); }, 1000);
    </script>
</body>
</html>
