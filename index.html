<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROGRESSIVE PMS V55</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #004085; --dark: #001a33; --white: #ffffff; --green: #218838; --red: #c82333; --gold: #ffc107; --gray: #f1f4f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); margin: 0; padding: 0; }
        
        /* Notification Center */
        .notice-bar { background: var(--dark); color: white; padding: 10px; text-align: center; font-size: 11px; border-bottom: 2px solid var(--gold); }
        .holiday-banner { background: #fff3cd; color: #856404; padding: 8px; font-size: 12px; font-weight: bold; text-align: center; border-bottom: 1px solid #ffeeba; }

        .header { background: linear-gradient(135deg, var(--dark), var(--blue)); color: white; padding: 20px; text-align: center; border-radius: 0 0 25px 25px; position: relative; }
        .logout-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.2); color: white; border: none; padding: 5px 12px; border-radius: 50px; font-size: 10px; cursor: pointer; }
        
        .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; margin-top: -30px; }
        .kpi-card { background: white; padding: 12px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        .card { background: white; padding: 15px; border-radius: 12px; margin: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input, select { width: 100%; padding: 12px; margin-top: 8px; border: 1.5px solid #eee; border-radius: 8px; box-sizing: border-box; }
        
        .btn-main { background: var(--blue); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-delete { background: var(--red); color: white; border: none; padding: 10px; border-radius: 8px; font-size: 11px; margin-top: 10px; width: 100%; }
        
        .student-row { background: white; padding: 15px; border-radius: 12px; margin: 10px 15px; border-left: 6px solid var(--blue); display: flex; justify-content: space-between; align-items: center; }
        .hidden { display: none !important; }
        .fee-calc-box { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-top: 10px; border: 1px dashed #ccc; }
    </style>
</head>
<body>

<div id="loginGate" style="padding: 100px 20px; text-align: center;">
    <h2 style="color:var(--blue)">PROGRESSIVE PMS</h2>
    <div class="card" style="max-width: 320px; margin: auto;">
        <input id="passInput" type="password" placeholder="Access Key" style="text-align:center;">
        <button onclick="handleLogin()" class="btn-main">LOGIN</button>
    </div>
</div>

<div id="mainApp" class="hidden">
    <div class="notice-bar">
        <span id="liveDate"></span> | <span id="liveTime"></span>
    </div>
    <div id="holidayBanner" class="holiday-banner hidden"></div>

    <div class="header">
        <button class="logout-btn" onclick="location.reload()">LOGOUT</button>
        <h3 style="margin:0;">PROGRESSIVE MOTHERS</h3>
        <div style="font-size:10px; color:var(--gold); margin-top:5px;">"With God Everything Is Possible"</div>
    </div>

    <div class="kpi-grid">
        <div class="kpi-card"><p style="font-size:9px; color:#888;">ENROLLED</p><h3 id="statTotal">0</h3></div>
        <div class="kpi-card"><p style="font-size:9px; color:#888;">TOTAL DEBT</p><h3 id="statMoney" style="color:var(--red)">0</h3></div>
    </div>

    <div id="masterForm" class="card">
        <h4 id="formTitle" style="margin:0; color:var(--blue);">Student Registration & Profile</h4>
        <input type="hidden" id="editId">
        
        <div id="bioSection">
            <input id="stName" placeholder="Student Full Name">
            <select id="stClass">
                <option value="Baby">Baby</option><option value="Middle">Middle</option><option value="Top">Top</option>
                <option value="P.1">P.1</option><option value="P.2">P.2</option><option value="P.3">P.3</option>
                <option value="P.4">P.4</option><option value="P.5">P.5</option><option value="P.6">P.6</option><option value="P.7">P.7</option>
                <option value="Left School">Left School (Alumni)</option>
            </select>
            <input id="stPhone" placeholder="Parent Contact Number">
        </div>

        <div id="financeSection" class="hidden">
            <div class="fee-calc-box">
                <label style="font-size:11px; font-weight:bold;">FEES MANAGEMENT (UGX)</label>
                <input id="stExpected" type="number" oninput="calcBal()" placeholder="Total Expected Fees">
                <input id="stPaid" type="number" oninput="calcBal()" placeholder="Amount Paid">
                <p style="font-size:12px; margin-top:10px;">Balance: <b id="autoBal" style="color:var(--red)">0</b></p>
            </div>
        </div>

        <button onclick="saveStudent()" class="btn-main">SAVE STUDENT DATA</button>
        <button id="delBtn" onclick="deleteStudent()" class="btn-delete hidden">DELETE STUDENT PERMANENTLY</button>
    </div>

    <div class="card">
        <input type="text" id="sBar" oninput="renderList()" placeholder="🔍 Search Name or LIN Number...">
    </div>

    <div id="studentList"></div>
</div>

<script>
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co";
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    let sb = null, students = [], USER_ROLE = "";

    // Uganda Holiday Engine
    const UG_CALENDAR = {
        "1-1": "New Year's Day", "1-26": "NRM Liberation Day", "2-16": "Janani Luwum Day",
        "3-8": "Women's Day", "4-3": "Good Friday", "4-6": "Easter Monday",
        "5-1": "Labour Day", "6-3": "Martyrs' Day", "6-9": "Heroes' Day", "10-9": "Independence Day"
    };

    function updateClock() {
        const now = new Date();
        document.getElementById('liveDate').innerText = now.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        document.getElementById('liveTime').innerText = now.toLocaleTimeString();
        
        const key = `${now.getMonth() + 1}-${now.getDate()}`;
        if(UG_CALENDAR[key]) {
            const banner = document.getElementById('holidayBanner');
            banner.classList.remove('hidden');
            banner.innerText = "🇺🇬 IMPORTANT: Today is " + UG_CALENDAR[key];
        }
    }
    setInterval(updateClock, 1000);

    function handleLogin() {
        const p = document.getElementById('passInput').value.trim().toUpperCase();
        if (p === "JESUS CARES") USER_ROLE = "ADMIN";
        else if (p === "FINANCE2026") USER_ROLE = "FINANCE";
        else if (p === "TEACHER256") USER_ROLE = "TEACHER";
        else return alert("Invalid Key");

        sb = supabase.createClient(SB_URL, SB_KEY);
        document.getElementById('loginGate').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        
        // Dynamic UI Permissions
        if(USER_ROLE === "ADMIN") {
            document.getElementById('financeSection').classList.remove('hidden');
            document.getElementById('bioSection').classList.remove('hidden');
        } else if(USER_ROLE === "FINANCE") {
            document.getElementById('financeSection').classList.remove('hidden');
            document.getElementById('bioSection').classList.add('hidden'); // Finance only registers, doesn't edit Bio
        }
        
        refresh();
    }

    function calcBal() {
        const exp = parseInt(document.getElementById('stExpected').value) || 0;
        const paid = parseInt(document.getElementById('stPaid').value) || 0;
        document.getElementById('autoBal').innerText = (exp - paid).toLocaleString();
    }

    async function refresh() {
        const { data } = await sb.from('students').select('*').order('name', { ascending: true });
        students = data || [];
        document.getElementById('statTotal').innerText = students.length;
        const totalBal = students.reduce((s, x) => s + (parseInt(x.fees_balance) || 0), 0);
        document.getElementById('statMoney').innerText = "UGX " + totalBal.toLocaleString();
        renderList();
    }

    async function saveStudent() {
        const id = document.getElementById('editId').value;
        const exp = parseInt(document.getElementById('stExpected').value) || 0;
        const paid = parseInt(document.getElementById('stPaid').value) || 0;

        let payload = {};
        if(USER_ROLE === "ADMIN" || USER_ROLE === "TEACHER" || (USER_ROLE === "FINANCE" && !id)) {
            payload.name = document.getElementById('stName').value;
            payload.class = document.getElementById('stClass').value;
            payload.contact = document.getElementById('stPhone').value;
        }
        if(USER_ROLE === "ADMIN" || USER_ROLE === "FINANCE") {
            payload.fees_expected = exp;
            payload.fees_paid = paid;
            payload.fees_balance = exp - paid;
        }

        if(!id) {
            payload.lin = "PMA-" + Math.floor(1000 + Math.random() * 9000);
            await sb.from('students').insert([payload]);
        } else {
            await sb.from('students').update(payload).eq('id', id);
        }
        
        alert("Record Updated Successfully");
        resetForm();
        refresh();
    }

    async function deleteStudent() {
        const id = document.getElementById('editId').value;
        if(confirm("Are you sure? This will permanently delete this student.")) {
            await sb.from('students').delete().eq('id', id);
            alert("Deleted");
            resetForm();
            refresh();
        }
    }

    function renderList() {
        const q = document.getElementById('sBar').value.toUpperCase();
        let h = "";
        students.filter(s => s.name.toUpperCase().includes(q) || (s.lin && s.lin.toUpperCase().includes(q))).forEach(s => {
            h += `<div class="student-row">
                <div>
                    <b>${s.name.toUpperCase()}</b><br>
                    <small>${s.class} | LIN: ${s.lin || 'N/A'}</small>
                </div>
                <button onclick="editEntry('${s.id}')">MANAGE</button>
            </div>`;
        });
        document.getElementById('studentList').innerHTML = h;
    }

    function editEntry(id) {
        const s = students.find(x => x.id == id);
        document.getElementById('editId').value = s.id;
        document.getElementById('stName').value = s.name;
        document.getElementById('stClass').value = s.class;
        document.getElementById('stPhone').value = s.contact || '';
        document.getElementById('stExpected').value = s.fees_expected || 0;
        document.getElementById('stPaid').value = s.fees_paid || 0;
        calcBal();
        
        if(USER_ROLE === "ADMIN") document.getElementById('delBtn').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    function resetForm() {
        document.getElementById('editId').value = "";
        document.getElementById('delBtn').classList.add('hidden');
        document.getElementById('stName').value = "";
    }
</script>
</body>
</html>
