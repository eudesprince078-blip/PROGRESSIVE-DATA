<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS AUTHORITY | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0047AB; --danger: #ef4444; --success: #22c55e; --dark: #0f172a; }
        * { box-sizing: border-box; text-transform: uppercase; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; margin: 0; color: #1e293b; }
        
        /* LOGIN SHIELD */
        #login-screen { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 2px solid #e2e8f0; font-weight: 700; font-family: inherit; }

        /* BRANDING AREA */
        .school-header { background: white; padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #e2e8f0; }
        .school-logo { width: 50px; height: 50px; border-radius: 10px; object-fit: contain; }
        .school-info h2 { margin: 0; font-size: 1rem; color: var(--primary); }

        .top-nav { background: var(--danger); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 0.7rem; font-weight: 800; }
        .tab-bar { background: white; display: flex; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 1000; }
        .tab { flex: 1; padding: 15px; text-align: center; font-size: 0.6rem; font-weight: 800; color: #64748b; cursor: pointer; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        /* DASHBOARD HERO */
        .hero { background: var(--dark); color: white; padding: 20px; text-align: center; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 20px; margin-top: -15px; }
        .stat-card { background: white; padding: 12px; border-radius: 12px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .stat-card b { display: block; font-size: 1.2rem; }

        .container { padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; overflow-x: auto; }
        
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { text-align: left; font-size: 0.55rem; color: #94a3b8; padding: 10px; }
        td { padding: 10px; font-size: 0.75rem; font-weight: 700; border-bottom: 1px solid #f1f5f9; }
        
        .btn { padding: 10px; border-radius: 8px; border: none; font-weight: 800; cursor: pointer; color: white; }
        .btn-p { background: var(--success); }
        .btn-a { background: var(--danger); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <div style="text-align:center; margin-bottom:20px;">
                <h1 style="color:var(--primary); margin:0;">ESMS HUB</h1>
                <p style="font-size:0.6rem; font-weight:800;">EUDES MEDIA INNOVATION</p>
            </div>
            <label style="font-size:0.6rem; font-weight:800;">SCHOOL ID</label>
            <input type="text" id="schIdInput" placeholder="E.G. SCHOOL-001">
            
            <label style="font-size:0.6rem; font-weight:800;">STAFF PASSWORD</label>
            <input type="password" id="passInput" placeholder="****">
            
            <button class="btn" style="background:var(--primary); width:100%; padding:15px;" onclick="authenticate()">ENTER SYSTEM</button>
            <p id="login-err" style="color:var(--danger); font-size:0.6rem; text-align:center; display:none; margin-top:10px;">INVALID ID OR PASSWORD</p>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <div class="school-header">
            <img src="" id="displayLogo" class="school-logo" onerror="this.src='https://via.placeholder.com/50'">
            <div class="school-info">
                <h2 id="displayName">LOADING SCHOOL...</h2>
                <div style="font-size:0.5rem; color:#64748b;">POWERED BY EUDES MEDIA</div>
            </div>
        </div>

        <div class="top-nav">
            <div id="displayRole">ROLE: ---</div>
            <div id="live-clock">00:00:00</div>
        </div>

        <div class="tab-bar">
            <div class="tab active" onclick="showTab('dash')">DASHBOARD</div>
            <div class="tab" id="tab-adm" onclick="showTab('admission')">ADMISSION</div>
            <div class="tab" onclick="location.reload()" style="color:var(--danger)">EXIT</div>
        </div>

        <div id="dash" class="tab-content">
            <div class="hero">
                <p style="margin:0; font-size:0.6rem; opacity:0.7;">SCHOOL SUMMARY</p>
            </div>
            <div class="stat-grid">
                <div class="stat-card"><b id="countT">0</b><span>TOTAL</span></div>
                <div class="stat-card"><b id="countC" style="color:var(--success);">0</b><span>PAID</span></div>
                <div class="stat-card"><b id="countO" style="color:var(--danger);">0</b><span>OWING</span></div>
            </div>

            <div class="container">
                <div class="card">
                    <table>
                        <thead>
                            <tr>
                                <th>PHOTO</th><th>NAME</th><th>CLASS</th>
                                <th class="money">EXPECTED</th><th class="money">PAID</th>
                                <th>STATUS</th><th>ROLLCALL</th><th class="admin-only">ACTION</th>
                            </tr>
                        </thead>
                        <tbody id="dashBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="admission" class="tab-content container" style="display:none;">
            <div class="card">
                <h3>NEW STUDENT REGISTRATION</h3>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <input type="text" id="inLin" placeholder="LIN NUMBER">
                    <input type="text" id="inName" placeholder="STUDENT NAME">
                    <input type="text" id="inClass" placeholder="CLASS">
                    <input type="text" id="inContact" placeholder="PARENT CONTACT">
                    <input type="number" id="inExp" placeholder="FEES EXPECTED">
                    <input type="number" id="inPaid" placeholder="FEES PAID">
                    <select id="inStatus"><option value="OWING">OWING</option><option value="CLEARED">CLEARED</option></select>
                    <input type="file" id="inPhoto">
                </div>
                <button class="btn" style="background:var(--primary); width:100%; margin-top:15px;" onclick="saveStudent()">SAVE STUDENT</button>
            </div>
        </div>
    </div>

    <script>
        const _URL = 'https://kjftrwuucjdnhfwesrup.supabase.co'; 
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const client = supabase.createClient(_URL, _KEY);

        let activeSchoolId = "";
        let userRole = "";
        let students = [];

        // STAFF PASSWORDS
        const PASSWORDS = { "ADMIN77": "ADMIN", "FIN88": "FINANCE", "TEACH99": "TEACHER" };

        async function authenticate() {
            const schId = document.getElementById('schIdInput').value;
            const pass = document.getElementById('passInput').value;

            if(schId && PASSWORDS[pass]) {
                activeSchoolId = schId;
                userRole = PASSWORDS[pass];
                
                // Show App
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('displayRole').innerText = "ROLE: " + userRole;
                document.getElementById('displayName').innerText = schId; // Temporary, can be linked to a 'schools' table

                applySecurity();
                loadData();
            } else {
                document.getElementById('login-err').style.display = 'block';
            }
        }

        function applySecurity() {
            if(userRole === "TEACHER") {
                document.querySelectorAll('.money').forEach(e => e.style.display = 'none');
                document.getElementById('tab-adm').style.display = 'none';
            }
            if(userRole === "FINANCE") {
                document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'none');
            }
        }

        async function loadData() {
            // CRITICAL: We only fetch students for THIS school ID
            const { data } = await client.from('students').select('*').eq('scho_id', activeSchoolId).order('name');
            students = data || [];
            render();
        }

        function render() {
            const body = document.getElementById('dashBody');
            let t=0, c=0, o=0;
            body.innerHTML = students.map(s => {
                t++; s.fees_status === 'CLEARED' ? c++ : o++;
                return `<tr>
                    <td><img src="${s.photo_url || ''}" class="stu-img" onerror="this.src='https://via.placeholder.com/40'"></td>
                    <td>${s.name}</td>
                    <td>${s.class}</td>
                    ${userRole !== 'TEACHER' ? `<td>${s.fees_expected}</td><td>${s.fees_paid}</td>` : ''}
                    <td>${s.fees_status}</td>
                    <td>
                        <button class="btn btn-p" onclick="mark('${s.id}','P')">P</button>
                        <button class="btn btn-a" onclick="mark('${s.id}','A')">A</button>
                    </td>
                    <td class="admin-only"><button class="btn" style="background:gray; font-size:0.5rem;" onclick="del('${s.id}')">DEL</button></td>
                </tr>`;
            }).join('');
            document.getElementById('countT').innerText = t;
            document.getElementById('countC').innerText = c;
            document.getElementById('countO').innerText = o;
        }

        async function mark(id, status) {
            await client.from('students').update({ attendance: status }).eq('id', id);
            alert("RECORDED: " + status);
            loadData();
        }

        async function saveStudent() {
            const obj = {
                scho_id: activeSchoolId,
                lin: document.getElementById('inLin').value,
                name: document.getElementById('inName').value,
                class: document.getElementById('inClass').value,
                contact: document.getElementById('inContact').value,
                fees_expected: document.getElementById('inExp').value,
                fees_paid: document.getElementById('inPaid').value,
                fees_status: document.getElementById('inStatus').value
            };
            await client.from('students').insert([obj]);
            alert("STUDENT ADDED");
            showTab('dash');
        }

        function showTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display='none');
            document.getElementById(t).style.display='block';
            if(t === 'dash') loadData();
        }

        setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
