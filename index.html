<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eudes Media | Progressive Mother's Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #003366; --gold: #ffc107; --white: #ffffff; --green: #2b9348; --red: #d90429; --light: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 0; color: #333; }
        
        .header { background: var(--blue); color: white; padding: 15px; position: sticky; top: 0; z-index: 2000; border-bottom: 4px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .hero { background: #001a33; padding: 20px; text-align: center; color: white; }
        
        /* Stats Dashboard */
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; margin-top: -30px; }
        .stat-card { background: white; padding: 15px 5px; border-radius: 12px; text-align: center; box-shadow: 0 8px 16px rgba(0,0,0,0.1); border-top: 5px solid var(--blue); }
        .stat-val { font-size: 20px; font-weight: 900; color: var(--blue); display: block; }

        .nav-tabs { display: flex; background: var(--blue); overflow-x: auto; position: sticky; top: 70px; z-index: 1999; }
        .tab { flex: 0 0 auto; padding: 15px 20px; font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.5); cursor: pointer; text-transform: uppercase; }
        .tab.active { color: var(--gold); border-bottom: 4px solid var(--gold); background: rgba(0,0,0,0.2); }

        .container { padding: 15px; max-width: 900px; margin: 0 auto; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 12px; border-left: 6px solid var(--blue); }
        .pfp { width: 55px; height: 55px; border-radius: 12px; object-fit: cover; background: #eee; border: 1px solid #ddd; }
        
        /* Specialized Sections */
        .fin-row { display: flex; justify-content: space-between; font-size: 11px; padding: 4px 0; border-bottom: 1px dashed #eee; }
        .absent-card { border-left-color: var(--red); opacity: 0.9; }
        
        .form-box { background: white; border-radius: 20px; padding: 20px; border-top: 6px solid var(--blue); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        input, select { width: 100%; padding: 12px; border: 2px solid #edf2f7; border-radius: 10px; box-sizing: border-box; margin-bottom: 10px; font-weight: 600; }
        label { font-size: 10px; font-weight: 900; color: var(--blue); display: block; margin-bottom: 5px; text-transform: uppercase; }
        
        .btn { padding: 12px; border-radius: 10px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .btn-blue { background: var(--blue); color: white; width: 100%; }
        .btn-edit { background: var(--gold); color: #000; font-size: 10px; }
        .btn-del { background: var(--red); color: white; font-size: 10px; }
        
        .hidden { display: none !important; }
        .badge { font-size: 9px; padding: 3px 7px; border-radius: 5px; color: white; font-weight: 800; }
    </style>
</head>
<body>

    <div class="header">
        <div><b>PROGRESSIVE MOTHER'S</b><br><span id="db_status" style="font-size:10px;">● CONNECTING</span></div>
        <button onclick="forceSync()" class="btn" style="background:var(--green); color:white; padding:5px 10px;">SYNC</button>
    </div>

    <div class="hero">
        <h2 id="clock" style="margin:0; font-size:32px; color:var(--gold);">00:00:00</h2>
        <div style="font-size:10px; font-weight:900; letter-spacing:1px;">EUDES MEDIA ENTERPRISE SYSTEM</div>
    </div>

    <div class="dashboard">
        <div class="stat-card"><span class="stat-val" id="stat_total">0</span><small>ENROLLED</small></div>
        <div class="stat-card"><span class="stat-val" id="stat_present" style="color:var(--green)">0</span><small>PRESENT</small></div>
        <div class="stat-card"><span class="stat-val" id="stat_absent" style="color:var(--red)">0</span><small>ABSENT</small></div>
    </div>

    <div class="nav-tabs">
        <div class="tab active" id="tab-dir" onclick="show('dir')">Director</div>
        <div class="tab" id="tab-rec" onclick="show('rec')">Records</div>
        <div class="tab" id="tab-adm" onclick="show('adm')">Admission</div>
        <div class="tab" id="tab-roll" onclick="show('roll')">Roll-Call</div>
    </div>

    <div class="container">
        <div id="v-dir">
            <div class="form-box" style="margin-bottom:15px;">
                <h3 style="margin:0 0 10px 0;">Absentees Today</h3>
                <div id="absentee_list">No absentees reported.</div>
            </div>
            <div class="form-box">
                <h3 style="margin:0 0 10px 0;">Financial Standing</h3>
                <div id="financial_summary">Loading...</div>
            </div>
        </div>

        <div id="v-rec" class="hidden">
            <input id="search_in" placeholder="Search Name, Class, LIN..." oninput="draw()" style="margin-bottom:15px;">
            <div id="list_view"></div>
        </div>

        <div id="v-adm" class="hidden">
            <div class="form-box">
                <h3 id="form_title" style="margin-top:0;">New Admission</h3>
                <label>Photo URL</label>
                <input id="reg_photo" placeholder="Paste image link">
                <label>Full Name</label>
                <input id="reg_name">
                <label>Class</label>
                <select id="reg_class">
                    <option>Baby</option><option>Middle</option><option>Top</option>
                    <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                    <option>P.5</option><option>P.6</option><option>P.7</option>
                </select>
                <label>Parent Contact</label>
                <input id="reg_phone" placeholder="2567...">
                <label>Total Fees (UGX)</label>
                <input id="reg_exp" type="number" value="0">
                <label>Amount Paid (UGX)</label>
                <input id="reg_paid" type="number" value="0">
                <button onclick="commit()" id="save_btn" class="btn btn-blue" style="margin-top:10px;">Save Student Record</button>
                <button onclick="resetForm()" class="btn" style="width:100%; margin-top:5px; font-size:10px;">Cancel</button>
            </div>
        </div>

        <div id="v-roll" class="hidden">
            <div id="roll_view"></div>
        </div>
    </div>

    <div style="text-align:center; padding:40px; font-size:10px; font-weight:900; color:#aaa;">
        DESIGNED BY EUDES MEDIA | +256762992440
    </div>
