<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMS - Eudes Media Solutions</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --pms-red: #e63946; --pms-dark: #001a33; --pms-bg: #f8f9fc; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: var(--pms-bg); }

        /* TOP RED BAR */
        .top-nav { background: var(--pms-red); color: white; padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; }
        .school-logo { height: 35px; background: white; border-radius: 50%; padding: 3px; }
        .top-icons { font-size: 22px; display: flex; gap: 15px; }

        /* DASHBOARD SECTION (Image 2) */
        .dashboard-header { background: var(--pms-dark); color: white; padding: 40px 20px; text-align: center; position: relative; }
        .logout-btn { position: absolute; top: 15px; left: 15px; border: 1px solid gold; color: gold; padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .current-date { position: absolute; top: 15px; right: 15px; font-size: 12px; text-transform: uppercase; }
        .school-name { font-size: 16px; font-weight: bold; color: white; margin-bottom: 2px; }
        .school-loc { font-size: 11px; color: #ffc107; text-transform: uppercase; letter-spacing: 1px; }
        .digital-clock { font-size: 52px; font-weight: bold; margin: 15px 0; letter-spacing: 2px; }
        
        /* STAT CARDS (Image 2) */
        .stats-container { display: flex; justify-content: center; gap: 10px; margin-top: -30px; padding: 0 10px; }
        .stat-card { background: white; border-radius: 20px; padding: 15px 5px; width: 30%; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-bottom: 4px solid #ffc107; }
        .stat-val { font-size: 24px; font-weight: bold; color: var(--pms-dark); display: block; }
        .stat-label { font-size: 9px; color: #888; text-transform: uppercase; font-weight: bold; margin-top: 5px; }

        /* NAV BUTTONS (Image 2) */
        .main-nav { display: flex; overflow-x: auto; padding: 25px 15px; gap: 10px; justify-content: center; }
        .nav-pill { padding: 10px 18px; border-radius: 25px; border: 1px solid #eee; background: white; font-size: 12px; font-weight: bold; color: #999; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .nav-pill.active { background: var(--pms-dark); color: white; border-color: var(--pms-dark); }

        /* STUDENT CARDS (Image 3) */
        .student-list { padding: 0 15px 100px 15px; }
        .student-card { background: white; border-radius: 15px; margin-bottom: 12px; padding: 15px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 6px solid var(--pms-dark); }
        .student-info b { font-size: 15px; text-transform: uppercase; color: #333; }
        .student-sub { font-size: 13px; color: #666; margin-top: 4px; display: flex; align-items: center; gap: 5px; }
        
        /* ADMISSION FORM (Image 1) */
        .form-card { background: white; border-radius: 15px; padding: 20px; margin: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; background: #fff; box-sizing: border-box; }
        .btn-gen { background: #28a745; color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }

        /* FOOTER */
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #999; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-gate" style="display:flex; justify-content:center; align-items:center; height:100vh; background:var(--pms-dark);">
    <div style="background:white; padding:30px; border-radius:20px; text-align:center; width:280px;">
        <h3>SYSTEM LOGIN</h3>
        <input type="password" id="sysPass" placeholder="Enter Password">
        <button onclick="checkLogin()" class="btn-gen" style="background:var(--pms-dark)">LOGIN</button>
    </div>
</div>

<div id="app" style="display:none;">
    <div class="top-nav">
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="https://via.placeholder.com/40" class="school-logo">
            <span style="font-weight:bold; letter-spacing:1px; font-size:14px;">SCHOOL DATA <span style="font-size:20px; color:white;">⊕</span></span>
        </div>
        <div class="top-icons"><span>🔗</span><span>🔔</span></div>
    </div>

    <div class="dashboard-header">
        <div class="logout-btn">LOGOUT</div>
        <div class="current-date" id="headerDate">05 APRIL 2026</div>
        <div class="school-name">PROGRESSIVE MOTHERS SCHOOL</div>
        <div class="school-loc">GAYAZA-KIJABIJJO</div>
        <div class="digital-clock" id="clock">22:19:05</div>
        <div style="color:white; font-size:18px;">...</div>
    </div>

    <div class="stats-container">
        <div class="stat-card"><span class="stat-val" id="count-total">0</span><span class="stat-label">Students</span></div>
        <div class="stat-card"><span class="stat-val" style="color:#28a745;">0</span><span class="stat-label">Present</span></div>
        <div class="stat-card"><span class="stat-val" style="color:#e63946;">0</span><span class="stat-label">Absent</span></div>
    </div>

    <div class="main-nav">
        <div class="nav-pill" onclick="showPortal('admission')">ADMISSION</div>
        <div class="nav-pill active" onclick="showPortal('rollcall')">ROLL CALL</div>
        <div class="nav-pill" onclick="showPortal('records')">RECORDS</div>
        <div class="nav-pill">ABSENTEES</div>
        <div class="nav-pill">FINANCE</div>
    </div>

    <div id="portal-rollcall" class="portal">
        <div class="student-list" id="studentCards">
            </div>
    </div>

    <div id="portal-admission" class="portal" style="display:none;">
        <div class="form-card">
            <h3 style="margin-top:0;">Registration</h3>
            <div class="form-group"><input id="regName" placeholder="Full Name"></div>
            <div class="form-group"><input id="regAge" placeholder="Age"></div>
            <div class="form-group"><input id="regLoc" placeholder="Physical Location (Stay)"></div>
            <div class="form-group">
                <select id="regHealth">
                    <option>Health: Normal</option>
                    <option>Health: Special Care</option>
                </select>
            </div>
            <div class="form-group">
                <select id="regClass">
                    <option>Class: P.1</option><option>Class: P.7</option>
                </select>
            </div>
            <button class="btn-gen" onclick="saveStudent()">Register & Generate LIN</button>
        </div>
    </div>

    <div class="footer">
        EUDES MEDIA SOLUTIONS | +256762992440
    </div>
</div>

<script>
    const _supabase = supabase.createClient('https://kjftrwuucjdnhfwesrup.supabase.co', 'sbp_publishable_1PetUo8klWCLfupRq52CVg_Y_Y');
    
    function checkLogin() {
        if(document.getElementById('sysPass').value === "JESUS CARES") {
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            loadData();
        } else { alert("Try Again"); }
    }

    function showPortal(p) {
        document.querySelectorAll('.portal').forEach(el => el.style.display = 'none');
        document.querySelectorAll('.nav-pill').forEach(el => el.classList.remove('active'));
        document.getElementById('portal-' + p).style.display = 'block';
        event.currentTarget.classList.add('active');
    }

    async function saveStudent() {
        const lin = "PMA-" + Math.floor(1000 + Math.random() * 9000);
        const { error } = await _supabase.from('students').insert([{
            name: document.getElementById('regName').value,
            lin: lin,
            age: document.getElementById('regAge').value,
            location: document.getElementById('regLoc').value,
            health: document.getElementById('regHealth').value,
            class: document.getElementById('regClass').value,
            contact: "+2567..." // Default or prompted
        }]);
        if(!error) { alert("Success! LIN: " + lin); loadData(); }
    }

    async function loadData() {
        const { data } = await _supabase.from('students').select('*');
        const container = document.getElementById('studentCards');
        document.getElementById('count-total').innerText = data.length;
        container.innerHTML = "";

        data.forEach(s => {
            container.innerHTML += `
                <div class="student-card">
                    <div class="student-info">
                        <b>${s.name}</b>
                        <div class="student-sub">
                            ${s.lin} | ${s.class} | 📞 ${s.contact || '+256...'}
                        </div>
                    </div>
                </div>
            `;
        });
    }

    // CLOCK LOGIC
    setInterval(() => {
        const n = new Date();
        document.getElementById('clock').innerText = n.toLocaleTimeString('en-GB');
        document.getElementById('headerDate').innerText = n.toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' });
    }, 1000);
</script>
</body>
</html>
