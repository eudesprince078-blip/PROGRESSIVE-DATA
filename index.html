<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS | EUDES MEDIA CONTROL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0052cc; --accent: #ff3b30; --success: #34c759; --dark: #020617; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* HEADER & DASHBOARD BOXES */
        .header { background: white; padding: 15px; border-bottom: 5px solid var(--primary); text-align: center; }
        .view-container { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        .stat-box { background: white; padding: 15px; border-radius: 20px; text-align: center; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }

        /* INPUTS & SELECTS */
        .filter-bar { background: white; padding: 10px; border-radius: 15px; margin-bottom: 15px; border: 2px solid var(--primary); position: sticky; top: 0; z-index: 100; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #cbd5e1; margin-bottom: 8px; font-weight: 600; }
        .btn-main { background: var(--primary); color: white; padding: 15px; border-radius: 12px; border: none; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; }

        /* LIST ITEMS */
        .student-card { background: white; padding: 15px; border-radius: 18px; margin-bottom: 10px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 12px; }
        .btn-icon { padding: 8px; border-radius: 8px; border: none; cursor: pointer; color: white; font-size: 0.9rem; }

        /* NAVIGATION */
        .nav-bar { background: white; height: 75px; border-top: 1px solid #e2e8f0; display: flex; align-items: center; position: fixed; bottom: 0; width: 100%; }
        .nav-item { flex: 1; text-align: center; color: #94a3b8; font-size: 0.65rem; font-weight: 800; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.5rem; display: block; margin-bottom: 2px; }
        
        .hidden { display: none !important; }
        #auth-gate { position: fixed; inset: 0; background: var(--dark); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="auth-gate">
        <div style="background:white; padding:40px; border-radius:30px; width:100%; max-width:400px; text-align:center;">
            <img src="https://eudesmedia.com/logo.png" style="width:80px; margin-bottom:10px;">
            <h2 style="font-weight:900;">SYSTEM ACCESS</h2>
            <input type="text" id="auth-id" placeholder="SCHOOL ID">
            <input type="password" id="auth-key" placeholder="ACCESS KEY">
            <button class="btn-main" onclick="login()">ENTER CONTROL CENTER</button>
        </div>
    </div>

    <header class="header">
        <div id="sch-name" style="font-weight:900; font-size: 1.2rem;">LOADING...</div>
        <div id="top-time" style="font-size:0.8rem; font-weight:700; color:var(--primary);"></div>
    </header>

    <main class="view-container">
        
        <div id="v-dash">
            <div class="stat-grid">
                <div class="stat-box"><h3 id="d-present">0</h3><small>PRESENT</small></div>
                <div class="stat-box"><h3 id="d-absent">0</h3><small>ABSENT</small></div>
                <div class="stat-box"><h3 id="d-collected" style="color:var(--success)">0</h3><small>COLLECTED</small></div>
                <div class="stat-box"><h3 id="d-debts" style="color:var(--accent)">0</h3><small>DEBTS</small></div>
            </div>
            <div class="stat-box" style="margin-top:10px;">
                <h4>BULK COMMUNICATIONS</h4>
                <textarea id="wa-msg" placeholder="Type WhatsApp message here..." style="width:100%; margin-top:10px; height:80px; padding:10px; border-radius:10px;"></textarea>
                <button class="btn-main" style="background:#25D366; margin-top:5px;" onclick="sendWA()">SEND BULK WHATSAPP</button>
            </div>
        </div>

        <div id="v-list" class="hidden">
            <div class="filter-bar">
                <select id="filter-class" onchange="sync()">
                    <option value="ALL">ALL CLASSES</option>
                    <option>Baby Class</option><option>Middle Class</option><option>Top Class</option>
                    <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                    <option>P.5</option><option>P.6</option><option>P.7</option>
                </select>
                <input type="text" id="search-box" placeholder="Search Name or LIN..." onkeyup="filterUI()">
            </div>
            <div id="render-list"></div>
        </div>

        <div id="v-reg" class="hidden">
            <div class="stat-box">
                <h3>NEW REGISTRATION</h3>
                <input type="text" id="f-name" placeholder="Full Student Name">
                <input type="text" id="f-lin" placeholder="LIN Number">
                <select id="f-class">
                    <option>Baby Class</option><option>Middle Class</option><option>Top Class</option>
                    <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                    <option>P.5</option><option>P.6</option><option>P.7</option>
                </select>
                <select id="f-gender"><option>Male</option><option>Female</option></select>
                <input type="number" id="f-total" placeholder="Total Fees UGX">
                <input type="text" id="f-loc" placeholder="Location">
                <button class="btn-main" onclick="register()">SAVE STUDENT</button>
            </div>
        </div>

        <div id="v-fin" class="hidden">
            <div class="filter-bar">
                <select id="fin-class" onchange="sync()">
                    <option value="ALL">SELECT CLASS</option>
                    <option>P.1</option><option>P.2</option><option>P.7</option>
                </select>
            </div>
            <div id="render-fin"></div>
        </div>

    </main>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="nav('dash',this)"><i class="fas fa-th-large"></i>DASH</div>
        <div class="nav-item" onclick="nav('list',this)"><i class="fas fa-clipboard-check"></i>ROLLCALL</div>
        <div class="nav-item" onclick="nav('reg',this)"><i class="fas fa-user-plus"></i>ADD</div>
        <div class="nav-item" onclick="nav('fin',this)"><i class="fas fa-wallet"></i>FINANCE</div>
    </nav>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        let db, activeSch, students = [], role = 'admin';

        async function login() {
            const sid = document.getElementById('auth-id').value.toUpperCase().trim();
            const key = document.getElementById('auth-key').value.trim();
            db = supabase.createClient(SB_URL, SB_KEY);
            const { data } = await db.from('Schools').select('*').eq('sch_id', sid).single();
            if(data && (key === data.admin_key || key === data.finance_key || key === data.teacher_key)) {
                activeSch = sid;
                document.getElementById('sch-name').innerText = data.sch_name;
                document.getElementById('auth-gate').classList.add('hidden');
                sync();
            } else { alert("ACCESS DENIED"); }
        }

        async function sync() {
            const cls = document.getElementById('filter-class').value;
            let q = db.from('Students').select('*').eq('sch_id', activeSch);
            if(cls !== 'ALL') q = q.eq('class', cls);
            
            const { data } = await q.order('name', { ascending: true });
            students = data || [];
            filterUI();
        }

        function filterUI() {
            const search = document.getElementById('search-box').value.toUpperCase();
            const filtered = students.filter(s => s.name.includes(search) || (s.lin && s.lin.includes(search)));

            // DASHBOARD STATS
            let p = 0, a = 0, col = 0, dbt = 0;
            students.forEach(s => {
                s.is_absent ? a++ : p++;
                col += (s.fees_paid || 0);
                dbt += (s.total_fees - (s.fees_paid || 0));
            });
            document.getElementById('d-present').innerText = p;
            document.getElementById('d-absent').innerText = a;
            document.getElementById('d-collected').innerText = col.toLocaleString();
            document.getElementById('d-debts').innerText = dbt.toLocaleString();

            // ROLL CALL LIST
            document.getElementById('render-list').innerHTML = filtered.map(s => `
                <div class="student-card">
                    <div style="flex:1"><b>${s.name}</b><br><small>${s.lin || 'NO LIN'} | ${s.class}</small></div>
                    <button class="btn-icon" style="background:${s.is_absent ? 'var(--accent)' : 'var(--success)'}" onclick="mark('${s.id}', ${s.is_absent})">
                        ${s.is_absent ? 'ABSENT' : 'PRESENT'}
                    </button>
                    <i class="fas fa-edit" style="color:var(--primary)" onclick="editStud('${s.id}')"></i>
                </div>`).join('');

            // FINANCE LIST
            document.getElementById('render-fin').innerHTML = filtered.map(s => `
                <div class="student-card">
                    <div style="flex:1"><b>${s.name}</b><br><small>Bal: ${(s.total_fees - (s.fees_paid||0)).toLocaleString()}</small></div>
                    <input type="number" placeholder="Amt" style="width:90px; margin:0;" onchange="pay('${s.id}', this.value)">
                </div>`).join('');
        }

        async function mark(id, stat) {
            await db.from('Students').update({ is_absent: !stat }).eq('id', id);
            sync();
        }

        async function pay(id, val) {
            const s = students.find(x => x.id == id);
            const newTotal = Number(s.fees_paid || 0) + Number(val);
            const { error } = await db.from('Students').update({ fees_paid: newTotal }).eq('id', id);
            if(!error) {
                // LOG TRANSACTION
                await db.from('Finance_History').insert([{ student_id: id, amount: val, sch_id: activeSch, timestamp: new Date().toISOString() }]);
                alert("Payment Stored in History");
                sync();
            }
        }

        async function register() {
            const p = {
                sch_id: activeSch,
                name: document.getElementById('f-name').value.toUpperCase(),
                lin: document.getElementById('f-lin').value,
                class: document.getElementById('f-class').value,
                gender: document.getElementById('f-gender').value,
                total_fees: document.getElementById('f-total').value,
                location: document.getElementById('f-loc').value,
                is_absent: false,
                fees_paid: 0
            };
            await db.from('Students').insert([p]);
            alert("STUDENT REGISTERED");
            sync();
            nav('list');
        }

        function nav(v, b) {
            ['v-dash','v-list','v-reg','v-fin'].forEach(x => document.getElementById(x).classList.add('hidden'));
            document.getElementById('v-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(b) b.classList.add('active');
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('top-time').innerText = now.toLocaleString('en-GB', { 
                weekday: 'long', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit', second: '2-digit' 
            }).toUpperCase();
        }, 1000);
    </script>
</body>
</html>
