<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Progressive Mothers | Eudes Media System</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #002d5b; --gold: #ffc107; --light: #f1f4f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 0; }
        .header { background: var(--blue); color: white; padding: 15px; border-bottom: 5px solid var(--gold); text-align: center; }
        .container { padding: 15px; }
        .search-bar { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #ddd; margin-bottom: 15px; box-sizing: border-box; font-weight: bold; }
        .pupil-card { background: white; margin-bottom: 10px; padding: 10px; border-radius: 12px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid var(--blue); }
        .pupil-photo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; margin-right: 15px; background: #eee; border: 2px solid var(--blue); }
        .pupil-info { flex-grow: 1; }
        .pupil-name { font-weight: 900; color: var(--blue); font-size: 14px; text-transform: uppercase; }
        .pupil-meta { font-size: 11px; color: #666; font-weight: 700; }
        .lin-badge { background: var(--gold); padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-left: 5px; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 18px; font-weight: 900;">PROGRESSIVE MOTHERS</div>
    <div style="font-size: 10px; font-weight: 700;">DIGITAL LEDGER | EUDES MEDIA</div>
</div>

<div class="container">
    <input type="text" id="sb" class="search-bar" placeholder="🔍 Search pupil name or LIN..." oninput="render()">
    <div id="list"></div>
</div>

<script>
    const SUPA_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
    const _client = supabase.createClient(SUPA_URL, SUPA_KEY);
    let data = [];

    async function load() {
        const { data: pupils } = await _client.from('students').select('*').order('name');
        if(pupils) { data = pupils; render(); }
    }

    function render() {
        const container = document.getElementById('list');
        const query = document.getElementById('sb').value.toLowerCase();
        container.innerHTML = "";
        
        data.filter(s => s.name.toLowerCase().includes(query) || (s.lin && s.lin.includes(query))).forEach(s => {
            const photo = s['photo-url'] || s['photo_url'] || 'https://via.placeholder.com/60?text=No+Img';
            container.innerHTML += `
                <div class="pupil-card">
                    <img src="${photo}" class="pupil-photo" onerror="this.src='https://via.placeholder.com/60?text=Error'">
                    <div class="pupil-info">
                        <div class="pupil-name">${s.name} <span class="lin-badge">LIN: ${s.lin || '---'}</span></div>
                        <div class="pupil-meta">CLASS: ${s.class} | HEALTH: ${s.health_status || 'Normal'}</div>
                        <div class="pupil-meta">LOCATION: ${s.location || 'Not Set'}</div>
                    </div>
                </div>`;
        });
    }

    load();
</script>
</body>
</html>
