<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS AUTHORITY | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0047AB; --danger: #ef4444; --success: #22c55e; --dark: #0f172a; }
        * { box-sizing: border-box; text-transform: uppercase; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #f1f5f9; margin: 0; color: #1e293b; }
        #login-screen { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; padding: 35px; border-radius: 25px; width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; border: 2px solid #e2e8f0; font-weight: 700; }
        .btn { padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; color: white; background: var(--primary); width: 100%; }
        #main-app { display: none; }
        .header { background: white; padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #ddd; }
        .logo { width: 50px; height: 50px; border-radius: 8px; object-fit: contain; }
        .pipeline { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 20px; }
        .step { background: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .step b { display: block; font-size: 1.2rem; }
        .step span { font-size: 0.5rem; color: #64748b; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="color:var(--primary)">ESMS AUTHORITY</h2>
            <input type="text" id="schIdInput" placeholder="SCHOOL ID">
            <input type="password" id="passInput" placeholder="ACCESS KEY">
            <button class="btn" id="loginBtn" onclick="authenticate()">LOG IN</button>
            <p id="err" style="color:red; font-size:0.7rem; margin-top:10px; display:none;"></p>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <img src="" id="schLogo" class="logo">
            <div>
                <h3 id="schName" style="margin:0">SCHOOL NAME</h3>
                <small id="roleDisplay" style="color:var(--primary); font-weight:800;"></small>
            </div>
        </div>

        <div class="pipeline">
            <div class="step"><b id="c1">0</b><span>APPLIED</span></div>
            <div class="step"><b id="c2">0</b><span>INTERVIEW</span></div>
            <div class="step"><b id="c3">0</b><span>PAYMENT</span></div>
            <div class="step"><b id="c4">0</b><span>ENROLLED</span></div>
        </div>

        <div style="padding:20px;">
            <div style="background:white; border-radius:15px; padding:15px; overflow-x:auto;">
                <table style="width:100%; border-collapse:collapse; min-width:600px;">
                    <thead style="text-align:left; font-size:0.6rem; color:#999;">
                        <tr><th>NAME</th><th>LOCATION</th><th>STATUS</th></tr>
                    </thead>
                    <tbody id="stuBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const _URL = 'https://kjftrwuucjdnhfwesrup.supabase.co'; 
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const client = supabase.createClient(_URL, _KEY);

        let activeSID = "";

        async function authenticate() {
            const id = document.getElementById('schIdInput').value.trim();
            const key = document.getElementById('passInput').value.trim();
            const errBox = document.getElementById('err');
            const btn = document.getElementById('loginBtn');

            btn.innerText = "OPENING...";
            errBox.style.display = 'none';

            try {
                // IMPORTANT: Using 'Schools' with Capital S to match your screenshot
                const { data: school, error } = await client
                    .from('Schools') 
                    .select('*')
                    .eq('school_id', id)
                    .maybeSingle();

                if (error) throw new Error("DATABASE ERROR");
                if (!school) throw new Error("ID NOT FOUND");

                let role = "";
                if (key === school.admin_key) role = "ADMIN";
                else if (key === school.teacher_key) role = "TEACHER";
                else if (key === school.finance_key) role = "FINANCE";
                else throw new Error("WRONG ACCESS KEY");

                // Login Success
                activeSID = id;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('schName').innerText = school.school_name;
                document.getElementById('schLogo').src = school.logo_url;
                document.getElementById('roleDisplay').innerText = "ACCESS: " + role;

                loadStudents();

            } catch (e) {
                btn.innerText = "LOG IN";
                errBox.innerText = e.message;
                errBox.style.display = 'block';
            }
        }

        async function loadStudents() {
            const { data } = await client.from('students').select('*').eq('scho_id', activeSID);
            const list = data || [];
            let a=0, i=0, p=0, e=0;

            document.getElementById('stuBody').innerHTML = list.map(s => {
                if(s.status === 'APPLIED') a++;
                if(s.status === 'INTERVIEW') i++;
                if(s.status === 'PAYMENT') p++;
                if(s.status === 'ENROLLED') e++;

                return `<tr>
                    <td style="padding:10px; font-weight:800;">${s.name}</td>
                    <td>${s.location || '--'}</td>
                    <td><span style="font-size:0.6rem; background:#eee; padding:3px 8px; border-radius:5px;">${s.status || 'NEW'}</span></td>
                </tr>`;
            }).join('');

            document.getElementById('c1').innerText = a;
            document.getElementById('c2').innerText = i;
            document.getElementById('c3').innerText = p;
            document.getElementById('c4').innerText = e;
        }
    </script>
</body>
</html>
