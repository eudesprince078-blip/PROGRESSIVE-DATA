<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS ELITE PRO | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #0052cc; --sidebar: #020617; --bg: #f8fafc; --success: #22c55e; --danger: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #1e293b; height: 100vh; display: flex; overflow: hidden; }

        /* SIDEBAR LOGIC */
        .sidebar { width: 280px; background: var(--sidebar); display: flex; flex-direction: column; transition: 0.3s; z-index: 2000; flex-shrink: 0; }
        @media (max-width: 1024px) { .sidebar { position: fixed; height: 100%; transform: translateX(-100%); } .sidebar.open { transform: translateX(0); } }
        .nav-item { display: flex; align-items: center; padding: 14px 20px; color: #94a3b8; border: none; background: transparent; width: 100%; cursor: pointer; font-weight: 700; font-size: 0.8rem; border-radius: 12px; margin-bottom: 4px; }
        .nav-item.active { background: var(--primary); color: white; }

        /* MAIN CONTENT */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 70px; background: white; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e2e8f0; }
        .content { flex: 1; padding: 20px; overflow-y: auto; }

        /* UI COMPONENTS */
        .dash-card { background: white; padding: 20px; border-radius: 20px; border: 1px solid #e2e8f0; text-align: center; }
        .glass-card { background: white; border-radius: 24px; padding: 20px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 12px; font-weight: 600; }
        .btn-pro { background: var(--primary); color: white; padding: 14px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; width: 100%; }
        
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.6rem; font-weight: 900; }
        .absent-row { background: #fff1f2; border-left: 4px solid var(--danger); padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div id="auth" style="position:fixed; inset:0; background:var(--sidebar); z-index:9999; display:flex; align-items:center; justify-content:center; padding:20px;">
        <div style="background:white; padding:40px; border-radius:30px; width:100%; max-width:400px; text-align:center;">
            <h2 style="font-weight:900;">ESMS ELITE</h2>
            <input type="text" id="login-id" placeholder="SCHOOL ID" style="text-align:center; margin-top:20px;">
            <button class="btn-pro" onclick="verify()">LOGIN</button>
        </div>
    </div>

    <aside class="sidebar" id="sidebar">
        <div style="padding:40px 20px; text-align:center;">
            <img id="sch-logo" style="height:50px; background:white; border-radius:10px; padding:5px; margin-bottom:10px;">
            <h4 id="side-sch-name" style="color:white; font-size:0.8rem;"></h4>
        </div>
        <nav style="padding:15px; flex:1;">
            <button class="nav-item active" onclick="nav('dash', this)"><i class="fas fa-home"></i> &nbsp; Dashboard</button>
            <button class="nav-item" onclick="nav('reg', this)"><i class="fas fa-user-plus"></i> &nbsp; Enrollment</button>
            <button class="nav-item" onclick="nav('list', this)"><i class="fas fa-users"></i> &nbsp; Student List</button>
            <button class="nav-item" onclick="nav('fin', this)"><i class="fas fa-wallet"></i> &nbsp; Finance</button>
            <button class="nav-item" onclick="nav('roll', this)"><i class="fas fa-calendar-check"></i> &nbsp; Rollcall</button>
            <button class="nav-item" onclick="nav('rep', this)"><i class="fas fa-file-invoice"></i> &nbsp; Report Cards</button>
        </nav>
    </aside>

    <main class="main">
        <header class="header">
            <div onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></div>
            <h4 id="head-title" style="font-weight:800;">DASHBOARD</h4>
            <div id="notif-bell" style="position:relative;"><i class="fas fa-bell"></i><span id="notif-count" style="position:absolute; top:-5px; right:-5px; background:red; color:white; font-size:0.5rem; padding:2px 5px; border-radius:50%;">0</span></div>
        </header>

        <div class="content">
            <div id="v-dash">
                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap:15px; margin-bottom:20px;">
                    <div class="dash-card"><h2 id="d-total">0</h2><label>TOTAL</label></div>
                    <div class="dash-card" style="border-color:var(--danger);"><h2 id="d-absent" style="color:var(--danger)">0</h2><label>ABSENT TODAY</label></div>
                    <div class="dash-card"><h2 id="d-demand" style="color:orange">0</h2><label>DEMANDING</label></div>
                </div>
                <div class="glass-card">
                    <h4 style="margin-bottom:15px;">ABSENT STUDENTS LIST</h4>
                    <div id="absent-names-list"></div>
                </div>
            </div>

            <div id="v-reg" class="hidden">
                <div class="glass-card">
                    <h3>STUDENT REGISTRATION</h3>
                    <div style="text-align:center; margin-bottom:15px;">
                        <img id="p-preview" style="width:100px; height:100px; border-radius:50%; object-fit:cover; display:none; border:3px solid var(--primary); margin: 0 auto 10px;">
                        <input type="file" id="f-photo" accept="image/*" onchange="handlePhoto(this)">
                    </div>
                    <input type="hidden" id="f-id">
                    <input type="hidden" id="f-photo-data">
                    <input type="text" id="f-name" placeholder="FULL NAME">
                    <select id="f-class"><option value="">Select Class</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
                    <input type="number" id="f-total-fees" placeholder="TOTAL TERM FEES (UGX)">
                    <button class="btn-pro" onclick="save()">SAVE STUDENT</button>
                </div>
            </div>

            <div id="v-fin" class="hidden">
                <div class="glass-card">
                    <h3>PAYMENT HISTORY</h3>
                    <div id="fin-selector"></div>
                    <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
                    <div id="payment-input-box" class="hidden">
                        <h4 id="pay-student-name"></h4>
                        <input type="number" id="pay-amount" placeholder="Amount to Pay (UGX)">
                        <button class="btn-pro" onclick="addPayment()">RECORD PAYMENT</button>
                        <div id="student-history" style="margin-top:20px; font-size:0.8rem;"></div>
                    </div>
                </div>
            </div>

            <div id="v-roll" class="hidden">
                <div class="glass-card">
                    <h3>DAILY ATTENDANCE</h3>
                    <select id="roll-class" onchange="renderRoll()"><option value="">Select Class</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
                    <div id="roll-list" style="margin-top:20px;"></div>
                </div>
            </div>

            <div id="v-rep" class="hidden">
                <div class="glass-card">
                    <h3>AUTO-GRADING REPORT</h3>
                    <select id="rep-class" onchange="renderRepList()"><option value="">Select Class</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
                    <div id="rep-list" style="margin-top:20px;"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        let db, activeSch, students = [], absentCount = 0;

        async function verify() {
            const id = document.getElementById('login-id').value.toUpperCase();
            db = supabase.createClient(SB_URL, SB_KEY);
            const { data } = await db.from('Schools').select('*').eq('sch_id', id).single();
            if(data) {
                activeSch = id;
                document.getElementById('side-sch-name').innerText = data.school_name;
                document.getElementById('sch-logo').src = data.logo_url;
                document.getElementById('auth').classList.add('hidden');
                loadData();
            }
        }

        async function loadData() {
            const { data } = await db.from('Students').select('*').eq('sch_id', activeSch);
            students = data || [];
            updateDash();
            renderFinanceSelector();
        }

        function updateDash() {
            document.getElementById('d-total').innerText = students.length;
            let demand = 0;
            students.forEach(s => { demand += (Number(s.total_fees) - Number(s.paid_fees || 0)); });
            document.getElementById('d-demand').innerText = demand.toLocaleString();
        }

        function handlePhoto(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 200; canvas.height = 200;
                    canvas.getContext('2d').drawImage(img, 0,0,200,200);
                    const compressed = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('p-preview').src = compressed;
                    document.getElementById('p-preview').style.display = 'block';
                    document.getElementById('f-photo-data').value = compressed;
                }
            };
            reader.readAsDataURL(file);
        }

        async function save() {
            const entry = {
                sch_id: activeSch, name: document.getElementById('f-name').value.toUpperCase(),
                class: document.getElementById('f-class').value, total_fees: document.getElementById('f-total-fees').value,
                photo_url: document.getElementById('f-photo-data').value, paid_fees: 0
            };
            const { error } = await db.from('Students').insert([entry]);
            if(!error) { alert("SAVED SUCCESSFULLY"); location.reload(); }
        }

        function renderRoll() {
            const cls = document.getElementById('roll-class').value;
            const filtered = students.filter(s => s.class === cls);
            document.getElementById('roll-list').innerHTML = filtered.map(s => `
                <div style="display:flex; justify-content:space-between; padding:15px; border-bottom:1px solid #eee;">
                    <b>${s.name}</b>
                    <button onclick="markAbsent('${s.name}')" style="background:var(--danger); color:white; padding:5px 10px; border-radius:5px; border:none;">Mark Absent</button>
                </div>
            `).join('');
        }

        let absentList = [];
        function markAbsent(name) {
            if(!absentList.includes(name)) {
                absentList.push(name);
                document.getElementById('d-absent').innerText = absentList.length;
                document.getElementById('absent-names-list').innerHTML = absentList.map(n => `<div class="absent-row"><span>${n}</span> <span class="badge badge-red">ABSENT</span></div>`).join('');
                document.getElementById('notif-count').innerText = absentList.length;
            }
        }

        function renderFinanceSelector() {
            document.getElementById('fin-selector').innerHTML = students.map(s => `
                <div onclick="selectPay('${s.id}')" style="padding:10px; border:1px solid #eee; margin-bottom:5px; border-radius:8px; cursor:pointer;">
                    <b>${s.name}</b> <small style="float:right">Balance: UGX ${(s.total_fees - s.paid_fees).toLocaleString()}</small>
                </div>
            `).join('');
        }

        let currentPayId;
        function selectPay(id) {
            currentPayId = id;
            const s = students.find(x => x.id == id);
            document.getElementById('payment-input-box').classList.remove('hidden');
            document.getElementById('pay-student-name').innerText = s.name;
            // Load history from dummy/Supabase history table here
            document.getElementById('student-history').innerHTML = `Last Payment: UGX ${s.paid_fees || 0}`;
        }

        async function addPayment() {
            const amt = Number(document.getElementById('pay-amount').value);
            const s = students.find(x => x.id == currentPayId);
            const newPaid = Number(s.paid_fees || 0) + amt;
            await db.from('Students').update({ paid_fees: newPaid }).eq('id', currentPayId);
            alert("PAYMENT UPDATED"); location.reload();
        }

        function nav(v, b) {
            ['v-dash', 'v-reg', 'v-fin', 'v-roll', 'v-rep'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('v-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            b.classList.add('active');
        }
    </script>
</body>
</html>
