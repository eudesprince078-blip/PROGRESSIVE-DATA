<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROGRESSIVE PMS - V26 SORT & FILTER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #0056b3; --dark: #002244; --white: #ffffff; --green: #25d366; --red: #dc3545; --gray: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); margin: 0; padding: 10px; }
        .box { background: var(--white); padding: 18px; border-radius: 12px; max-width: 1000px; margin: 10px auto; border: 1px solid #ddd; }
        .header { background: linear-gradient(135deg, var(--blue), var(--dark)); color: white; padding: 15px; border-radius: 12px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin: 15px 0; }
        label { font-size: 11px; font-weight: bold; color: var(--blue); }
        input, select { width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        .btn-main { background: var(--blue); color: white; padding: 14px; border: none; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .student-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 6px solid var(--blue); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .lin-row { display: flex; flex-wrap: wrap; gap: 5px; margin: 5px 0; }
        .lin-badge { font-size: 9px; background: #e9ecef; padding: 2px 6px; border-radius: 4px; color: #333; font-weight: bold; border: 1px solid #ccc; }
        .pay-badge { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .btn-row { display: flex; gap: 5px; margin-top: 10px; }
        .action-btn { flex: 1; padding: 10px; border: none; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; color: white; }
        .edit { background: var(--blue); }
        .del { background: var(--red); }
        .wa { background: var(--green); }
        .search-container { display: flex; gap: 10px; margin-top: 10px; }
        .footer { text-align: center; margin-top: 25px; font-size: 11px; font-weight: bold; color: #666; padding: 10px; border-top: 1px solid #ddd; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loginGate" class="box" style="max-width:320px; margin-top:80px; text-align:center;">
    <h2 style="color:var(--blue)">PMS LOGIN</h2>
    <input id="u" placeholder="USERNAME" style="margin-bottom:10px;">
    <input id="p" type="password" placeholder="PASSWORD">
    <button onclick="login()" class="btn-main" style="margin-top:15px;">ENTER SYSTEM</button>
</div>

<div id="mainApp" class="hidden">
    <div class="header">
        <h2 style="margin:0;">PROGRESSIVE SCHOOL</h2>
        <p style="margin:0; font-size:10px; opacity:0.8;">Smart System by Eudes Media</p>
    </div>

    <div class="box" id="formContainer">
        <h4 id="fTitle" style="margin:0; color:var(--blue);">Student Registration</h4>
        <input type="hidden" id="editId">
        <div class="grid">
            <div><label>Full Name</label><input id="name"></div>
            <div><label>Phone (+256...)</label><input id="ph"></div>
            <div><label>Class</label>
                <select id="cl">
                    <option value="Baby">Baby</option><option value="Middle">Middle</option><option value="Top">Top</option>
                    <option value="P.1">P.1</option><option value="P.2">P.2</option><option value="P.3">P.3</option>
                    <option value="P.4">P.4</option><option value="P.5">P.5</option><option value="P.6">P.6</option><option value="P.7">P.7</option>
                </select>
            </div>
            <div><label>Official LIN</label><input id="officialLin" placeholder="Enter Official Link"></div>
            <div><label>Payment Code</label><input id="payCode" placeholder="Enter Manual Code"></div>
            <div><label>Paid (UGX)</label><input id="fPaid" type="number" value="0"></div>
            <div><label>Balance (UGX)</label><input id="fBal" type="number" value="0"></div>
        </div>
        <button id="saveBtn" onclick="save()" class="btn-main">CONFIRM & SAVE RECORD</button>
        <button id="cancelBtn" onclick="reset()" class="hidden" style="width:100%; padding:10px; margin-top:5px; border:none; background:#ccc; border-radius:8px; font-weight:bold;">CANCEL EDIT</button>
    </div>

    <div class="box" style="border:none; background:transparent; padding:0;">
        <div class="search-container">
            <input type="text" id="sBar" oninput="search()" placeholder="🔍 Search Name or Pay Code..." style="flex: 2; border: 2px solid var(--blue);">
            <select id="filterClass" onchange="search()" style="flex: 1; border: 2px solid var(--blue); padding: 5px;">
                <option value="ALL">ALL CLASSES</option>
                <option value="Baby">Baby</option><option value="Middle">Middle</option><option value="Top">Top</option>
                <option value="P.1">P.1</option><option value="P.2">P.2</option><option value="P.3">P.3</option>
                <option value="P.4">P.4</option><option value="P.5">P.5</option><option value="P.6">P.6</option><option value="P.7">P.7</option>
            </select>
        </div>
        <div id="listBody" style="margin-top:10px;"></div>
    </div>

    <div class="footer">Eudes Media | +256762992440</div>
</div>

<script>
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co";
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    let sb = null;
    let students = [];

    function login() {
        const u = document.getElementById('u').value.trim().toUpperCase();
        const p = document.getElementById('p').value.trim().toUpperCase();
        if(u === "PROGRESSIVE" && p === "JESUS CARES") {
            sb = supabase.createClient(SB_URL, SB_KEY);
            document.getElementById('loginGate').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            refresh();
        } else { alert("Login Failed"); }
    }

    async function refresh() {
        if(!sb) return;
        const { data, error } = await sb.from('students').select('*').order('name', { ascending: true });
        if(!error) { students = data || []; render(students); }
    }

    function render(list) {
        let html = "";
        list.forEach(s => {
            html += `<div class="student-card">
                <div>
                    <b style="font-size:15px; color:var(--dark);">${s.name.toUpperCase()}</b>
                    <div class="lin-row">
                        <span class="lin-badge">LIN: ${s.lin || 'NONE'}</span>
                        <span class="lin-badge pay-badge">PAY CODE: ${s.payment_code || 'NONE'}</span>
                        <span class="lin-badge" style="background:var(--blue); color:white;">CLASS: ${s.class}</span>
                    </div>
                    <span style="font-size:12px; color:#666;">Contact: ${s.contact} | <b style="color:var(--red);">Bal: UGX ${Number(s.fees_balance).toLocaleString()}</b></span>
                </div>
                <div class="btn-row">
                    <button onclick="editMode('${s.id}')" class="action-btn edit">EDIT</button>
                    <button onclick="delRecord('${s.id}', '${s.name}')" class="action-btn del">DELETE</button>
                    <button onclick="sendWA('${s.contact}', '${s.name}', '${s.fees_balance}', '${s.payment_code}')" class="action-btn wa">WHATSAPP</button>
                </div>
            </div>`;
        });
        document.getElementById('listBody').innerHTML = html || "<p style='text-align:center; color:#888;'>No students found.</p>";
    }

    async function save() {
        const id = document.getElementById('editId').value;
        const payload = {
            name: document.getElementById('name').value.trim(),
            contact: document.getElementById('ph').value,
            class: document.getElementById('cl').value,
            official_lin: document.getElementById('officialLin').value,
            payment_code: document.getElementById('payCode').value.trim().toUpperCase(),
            fees_paid: document.getElementById('fPaid').value || 0,
            fees_balance: document.getElementById('fBal').value || 0
        };

        if(!id) {
            payload.lin = "PMA-" + Math.floor(1000 + Math.random() * 9000);
            await sb.from('students').insert([payload]);
        } else {
            await sb.from('students').update(payload).eq('id', id);
        }
        await refresh(); reset();
    }

    async function delRecord(id, name) {
        if(!confirm("Permanently delete " + name + "?")) return;
        const { error } = await sb.from('students').delete().eq('id', id);
        if(error) { alert("Delete Error: " + error.message); }
        else { alert(name + " deleted."); await refresh(); }
    }

    function editMode(id) {
        const s = students.find(x => x.id == id);
        if(!s) return;
        document.getElementById('editId').value = s.id;
        document.getElementById('name').value = s.name;
        document.getElementById('ph').value = s.contact;
        document.getElementById('cl').value = s.class;
        document.getElementById('officialLin').value = s.official_lin || '';
        document.getElementById('payCode').value = s.payment_code || '';
        document.getElementById('fPaid').value = s.fees_paid;
        document.getElementById('fBal').value = s.fees_balance;
        document.getElementById('fTitle').innerText = "EDITING: " + s.name;
        document.getElementById('saveBtn').innerText = "SAVE CHANGES";
        document.getElementById('cancelBtn').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    function reset() {
        document.getElementById('editId').value = "";
        document.getElementById('name').value = "";
        document.getElementById('ph').value = "";
        document.getElementById('officialLin').value = "";
        document.getElementById('payCode').value = "";
        document.getElementById('fPaid').value = "0";
        document.getElementById('fBal').value = "0";
        document.getElementById('fTitle').innerText = "Student Registration";
        document.getElementById('saveBtn').innerText = "CONFIRM & SAVE RECORD";
        document.getElementById('cancelBtn').classList.add('hidden');
    }

    function search() {
        const q = document.getElementById('sBar').value.toUpperCase();
        const classFilter = document.getElementById('filterClass').value;
        
        const filtered = students.filter(s => {
            const matchesSearch = s.name.toUpperCase().includes(q) || (s.payment_code && s.payment_code.toUpperCase().includes(q));
            const matchesClass = (classFilter === "ALL") || (s.class === classFilter);
            return matchesSearch && matchesClass;
        });
        
        render(filtered);
    }

    function sendWA(num, name, bal, payCode) {
        const msg = `PROGRESSIVE SCHOOL\nStudent: ${name}\nPayment Code: ${payCode || 'N/A'}\nBalance: UGX ${Number(bal).toLocaleString()}\nEudes Media: +256762992440`;
        window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>
</body>
</html>
