<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Progressive Mothers - Gayaza Kijabijjo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #001a33; --red: #e63946; --gold: #ffc107; --white: #ffffff; --green: #28a745; --wa: #25D366; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; margin: 0; padding: 0; font-size: 16px; }
        
        .header { background: var(--red); color: white; padding: 12px; position: sticky; top: 0; z-index: 1000; border-bottom: 4px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .school-title { font-size: 11px; font-weight: 900; line-height: 1.2; }
        
        .hero { background: var(--blue); color: white; padding: 20px 10px; text-align: center; }
        #clock { font-size: 40px; font-weight: 900; margin: 5px 0; }
        
        /* ROUTINE SECTION */
        .routine-box { background: var(--gold); color: var(--blue); padding: 12px; margin: -15px 15px 15px 15px; border-radius: 12px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); position: relative; z-index: 5; }
        .routine-time { font-size: 10px; font-weight: bold; text-transform: uppercase; opacity: 0.8; }
        .routine-task { font-size: 18px; font-weight: 900; }

        .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 0 15px 15px 15px; }
        .s-card { background: white; border-radius: 10px; padding: 12px 5px; text-align: center; border-bottom: 4px solid var(--gold); }
        .s-val { font-size: 20px; font-weight: bold; color: var(--blue); }

        .nav-tabs { display: flex; background: white; border-bottom: 2px solid #ddd; position: sticky; top: 65px; z-index: 900; }
        .tab { flex: 1; text-align: center; padding: 15px 5px; font-weight: 900; font-size: 11px; color: #666; }
        .tab.active { color: var(--blue); border-bottom: 4px solid var(--blue); background: #f8f9fa; }

        .item-card { background: white; border-radius: 12px; padding: 15px; margin: 10px 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 6px solid var(--blue); }
        
        .btn-roll { padding: 15px; border-radius: 8px; border: none; font-weight: 900; font-size: 13px; min-width: 110px; cursor: pointer; color: white; transition: 0.3s; }
        .btn-present { background: var(--green); }
        .btn-absent { background: var(--red); }
        
        .login-screen { position: fixed; inset: 0; background: var(--blue); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; color: white; text-align: center; }
        input, select { width: 100%; padding: 14px; border: 2px solid #ccc; border-radius: 8px; font-size: 16px; margin-top: 8px; box-sizing: border-box; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loginGate" class="login-screen">
    <div style="font-size:16px; font-weight:900; color:var(--gold);">PROGRESSIVE MOTHERS<br>NURSERY AND PRIMARY SCHOOL</div>
    <input id="key" type="password" placeholder="ENTER ACCESS KEY" style="text-align:center; margin-top:20px; max-width:280px;">
    <button onclick="secureLogin()" style="width:100%; max-width:250px; background:var(--gold); color:var(--blue); padding:16px; border:none; border-radius:10px; font-weight:900; margin-top:15px;">LOGIN</button>
</div>

<div id="mainApp" class="hidden">
    <div class="header">
        <div class="school-title">PROGRESSIVE MOTHERS<br>GAYAZA-KIJABIJJO</div>
        <button onclick="location.reload()" style="background:transparent; border:1px solid white; color:white; padding:5px; border-radius:4px; font-size:10px;">LOGOUT</button>
    </div>

    <div class="hero">
        <div id="fullDate" style="font-size:11px; color:var(--gold); font-weight:bold;">DATE</div>
        <div id="clock">00:00:00</div>
    </div>

    <div class="routine-box">
        <div class="routine-time" id="r-time">CURRENT ACTIVITY</div>
        <div class="routine-task" id="r-task">LOADING...</div>
    </div>

    <div class="stats">
        <div class="s-card"><span class="s-val" id="tCnt">0</span><br><small>TOTAL</small></div>
        <div class="s-card"><span class="s-val" id="pCnt" style="color:var(--green)">0</span><br><small>CLEARED</small></div>
        <div class="s-card"><span class="s-val" id="aCnt" style="color:var(--red)">0</span><br><small>ABSENT</small></div>
    </div>

    <div class="nav-tabs">
        <div class="tab" id="tab-rec" onclick="tab('rec')">RECORDS</div>
        <div class="tab" id="tab-adm" onclick="tab('adm')">ADMISSION</div>
        <div class="tab" id="tab-roll" onclick="tab('roll')">ROLL CALL</div>
    </div>

    <div id="v-rec" class="hidden">
        <div style="padding:15px;"><input id="searchBar" placeholder="🔍 Search Students..." oninput="load()"></div>
        <div id="dataList"></div>
    </div>

    <div id="v-adm" class="hidden" style="padding:15px;">
        <div style="background:white; padding:20px; border-radius:15px;">
            <input type="hidden" id="editId">
            <input id="name" placeholder="Full Name">
            <select id="cls">
                <option>Baby Class</option><option>Middle Class</option><option>Top Class</option>
                <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                <option>P.5</option><option>P.6</option><option>P.7</option>
            </select>
            <input id="parent_ph" type="tel" placeholder="Contact Number">
            <input id="f_exp" type="number" placeholder="Fees Expected">
            <input id="f_paid" type="number" placeholder="Fees Paid">
            <button onclick="submitData()" style="width:100%; background:var(--blue); color:white; padding:18px; border:none; border-radius:10px; font-weight:900; margin-top:15px;">SAVE STUDENT</button>
        </div>
    </div>

    <div id="v-roll" class="hidden" style="padding:15px;">
        <select id="rollClass" onchange="load()">
            <option value="">-- Select Class --</option>
            <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
            <option>P.5</option><option>P.6</option><option>P.7</option>
        </select>
        <div id="rollData" style="margin-top:15px;"></div>
    </div>
</div>

<script>
    const SUPA_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
    const _client = supabase.createClient(SUPA_URL, SUPA_KEY);

    let role = "";

    function secureLogin() {
        const k = document.getElementById('key').value.trim().toUpperCase();
        if (k === "JESUS CARES") role = "Admin";
        else if (k === "TEACH2026") role = "Teacher";
        else { alert("Wrong Key"); return; }
        document.getElementById('loginGate').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        tab('roll'); load();
    }

    function tab(t) {
        ['v-adm','v-rec','v-roll'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById('v-'+t).classList.remove('hidden');
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active');
    }

    async function load() {
        let { data } = await _client.from('students').select('*').order('name');
        if(!data) return;

        document.getElementById('tCnt').innerText = data.length;
        document.getElementById('pCnt').innerText = data.filter(s => s.fees_paid >= s.fees_expected).length;
        document.getElementById('aCnt').innerText = data.filter(s => s.is_absent).length;

        const rollList = document.getElementById('rollData');
        const rCls = document.getElementById('rollClass').value;
        rollList.innerHTML = "";

        if(rCls) {
            data.filter(s => s.class === rCls).forEach(s => {
                rollList.innerHTML += `<div class="item-card" style="border-left-color:${s.is_absent?'red':'green'}">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b>${s.name}</b>
                        <button class="btn-roll ${s.is_absent?'btn-absent':'btn-present'}" onclick="markAttendance('${s.id}', ${!s.is_absent}, this)">
                            ${s.is_absent ? 'ABSENT' : 'PRESENT'}
                        </button>
                    </div>
                </div>`;
            });
        }
    }

    async function markAttendance(id, status, btn) {
        const originalText = btn.innerText;
        btn.innerText = "WAIT...";
        btn.disabled = true;

        const { error } = await _client.from('students').update({ is_absent: status }).eq('id', id);

        if(error) {
            alert("Connection Weak. Try again.");
            btn.innerText = originalText;
            btn.disabled = false;
        } else {
            load();
        }
    }

    // SCHOOL ROUTINE LOGIC
    function updateRoutine() {
        const now = new Date();
        const hr = now.getHours();
        const min = now.getMinutes();
        const time = hr * 100 + min;
        let task = "Rest Time";
        let label = "School Closed";

        if (time >= 700 && time < 800) { task = "Arrival & Cleaning"; label = "07:00 AM - 08:00 AM"; }
        else if (time >= 800 && time < 830) { task = "Morning Assembly"; label = "08:00 AM - 08:30 AM"; }
        else if (time >= 830 && time < 1030) { task = "Lesson Period 1"; label = "08:30 AM - 10:30 AM"; }
        else if (time >= 1030 && time < 1100) { task = "Porridge Break"; label = "10:30 AM - 11:00 AM"; }
        else if (time >= 1100 && time < 1240) { task = "Lesson Period 2"; label = "11:00 AM - 12:40 PM"; }
        else if (time >= 1240 && time < 1400) { task = "Lunch Break"; label = "12:40 PM - 02:00 PM"; }
        else if (time >= 1400 && time < 1600) { task = "Afternoon Lessons"; label = "02:00 PM - 04:00 PM"; }
        else if (time >= 1600 && time < 1700) { task = "Games & Departure"; label = "04:00 PM - 05:00 PM"; }

        document.getElementById('r-task').innerText = task;
        document.getElementById('r-time').innerText = label;
    }

    setInterval(() => {
        const d = new Date();
        document.getElementById('clock').innerText = d.toLocaleTimeString('en-GB');
        document.getElementById('fullDate').innerText = d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        updateRoutine();
    }, 1000);
</script>
</body>
</html>
