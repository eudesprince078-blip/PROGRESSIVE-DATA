<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Progressive Mothers PMS v37</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #001a33; --red: #e63946; --gold: #ffc107; --white: #ffffff; --green: #25D366; --light: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 0; }
        
        .header { background: var(--red); color: white; padding: 15px; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--gold); }
        .hero { background: var(--blue); color: white; padding: 20px 15px; text-align: center; border-bottom: 5px solid var(--gold); }
        
        .alert-box { background: #fff3cd; color: #856404; padding: 10px; margin: 10px; border-radius: 10px; border-left: 5px solid #ffeeba; font-size: 11px; font-weight: 700; }
        .critical-alert { background: #f8d7da; color: #721c24; border-left-color: var(--red); }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 15px; margin-top: -30px; }
        .stat-card { background: white; padding: 12px 5px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-bottom: 4px solid var(--blue); }
        .stat-val { font-size: 22px; font-weight: 900; color: var(--blue); display: block; }
        .stat-lbl { font-size: 8px; font-weight: 800; color: #888; text-transform: uppercase; }

        .nav-tabs { display: flex; background: white; border-bottom: 1px solid #ddd; position: sticky; top: 68px; z-index: 999; }
        .tab { flex: 1; text-align: center; padding: 15px 5px; font-weight: 900; font-size: 10px; color: #bbb; cursor: pointer; text-transform: uppercase; }
        .tab.active { color: var(--blue); border-bottom: 4px solid var(--blue); background: #fcfcfc; }

        .item-card { background: white; border-radius: 15px; padding: 15px; margin: 10px 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 8px solid var(--blue); position: relative; }
        
        .follow-up-input { width: 100%; border: 1px dashed #ccc; padding: 5px; border-radius: 5px; font-size: 11px; margin-top: 5px; }
        .hidden { display: none !important; }
        
        input, select { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 15px; margin: 5px 0 12px 0; box-sizing: border-box; }
        .btn-call { background: var(--green); color: white; text-decoration: none; padding: 8px; border-radius: 5px; font-size: 10px; font-weight: 800; }
    </style>
</head>
<body>

<div id="loginGate" style="position:fixed; inset:0; background:var(--blue); z-index:2000; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px;">
    <h2 style="color:white; font-weight:900;">PROGRESSIVE MOTHERS</h2>
    <input id="key" type="password" placeholder="ACCESS KEY" style="text-align:center; max-width:280px; border:3px solid var(--gold);">
    <button onclick="secureLogin()" style="background:var(--gold); color:var(--blue); padding:18px; width:100%; max-width:280px; border:none; border-radius:12px; font-weight:900;">LOGIN</button>
</div>

<div id="mainApp" class="hidden">
    <div class="header">
        <div><b style="font-size:12px;">PROGRESSIVE MOTHERS PMS</b></div>
        <button onclick="location.reload()" style="background:white; color:var(--red); border:none; padding:6px 10px; border-radius:5px; font-weight:900; font-size:10px;">LOGOUT</button>
    </div>

    <div class="hero">
        <div id="full-date" style="color:var(--gold); font-size:11px; font-weight:800;">DATE</div>
        <div id="clock">00:00:00</div>
        <div id="r-status" style="font-size:11px; font-weight:900; margin-top:5px;">SYSTEM ACTIVE</div>
    </div>

    <div id="alertArea"></div>

    <div class="dashboard">
        <div class="stat-card"><span class="stat-val" id="c-tot">0</span><span class="stat-lbl">Total</span></div>
        <div class="stat-card" style="border-bottom-color: var(--green);"><span class="stat-val" id="c-pres" style="color:var(--green)">0</span><span class="stat-lbl">Present</span></div>
        <div class="stat-card" style="border-bottom-color: var(--red);"><span class="stat-val" id="c-abs" style="color:var(--red)">0</span><span class="stat-lbl">Absent</span></div>
    </div>

    <div class="nav-tabs">
        <div class="tab" id="tab-rec" onclick="tab('rec')">Records</div>
        <div class="tab" id="tab-adm" onclick="tab('adm'); clearForm();">Admission</div>
        <div class="tab" id="tab-roll" onclick="tab('roll')">Attendance</div>
    </div>

    <div id="v-rec" class="hidden">
        <div style="padding:15px;"><input id="searchBar" placeholder="🔍 Search name..." oninput="loadData()"></div>
        <div id="dataList"></div>
    </div>

    <div id="v-adm" class="hidden" style="padding:15px;">
        <div style="background:white; padding:20px; border-radius:20px; border:1px solid #ddd;">
            <h3 id="admTitle" style="margin:0 0 15px 0; color:var(--blue); font-size:13px;">REGISTRATION</h3>
            <input type="hidden" id="editId">
            <label>Full Name</label><input id="name">
            <label>Class</label>
            <select id="cls">
                <option>Baby Class</option><option>Middle Class</option><option>Top Class</option>
                <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                <option>P.5</option><option>P.6</option><option>P.7</option>
            </select>
            <label>Age</label><input id="age" type="number">
            <label>Contact</label><input id="contact">
            <label>Health Status</label><input id="health_status">
            <div id="financeSection" class="hidden">
                <label>Fees Expected</label><input id="f_exp" type="number">
                <label>Fees Paid</label><input id="f_paid" type="number">
            </div>
            <button id="saveBtn" onclick="submitData()" style="width:100%; background:var(--blue); color:white; padding:18px; border:none; border-radius:15px; font-weight:900;">SAVE STUDENT</button>
        </div>
    </div>

    <div id="v-roll" class="hidden">
        <div style="padding:15px;">
            <select id="rollClass" onchange="loadData()" style="border:2px solid var(--blue);">
                <option value="">-- Select Class --</option>
                <option>Baby Class</option><option>Middle Class</option><option>Top Class</option>
                <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                <option>P.5</option><option>P.6</option><option>P.7</option>
            </select>
        </div>
        <div id="rollData"></div>
    </div>
</div>

<script>
    const SUPA_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
    const _client = supabase.createClient(SUPA_URL, SUPA_KEY);
    let role = ""; let cachedData = [];

    function secureLogin() {
        const k = document.getElementById('key').value.trim().toUpperCase();
        if (k === "JESUS CARES") role = "Admin";
        else if (k === "FINANCE 256") role = "Finance";
        else if (k === "TEACH2026") role = "Teacher";
        else return alert("WRONG KEY");
        
        document.getElementById('loginGate').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        if(role !== "Teacher") document.getElementById('financeSection').classList.remove('hidden');
        tab(role === "Teacher" ? 'roll' : 'rec');
        loadData();
    }

    function tab(t) {
        ['v-adm','v-rec','v-roll'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById('v-'+t).classList.remove('hidden');
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active');
    }

    async function loadData() {
        const { data, error } = await _client.from('students').select('*').order('name');
        if(error) return;
        cachedData = data;
        
        // 1. Dashboard Numbers
        const total = data.length;
        const absent = data.filter(s => s.is_absent).length;
        document.getElementById('c-tot').innerText = total;
        document.getElementById('c-abs').innerText = absent;
        document.getElementById('c-pres').innerText = total - absent;

        // 2. Monitoring Alerts (Consecutive Absence & Roll Call)
        checkAlerts(data);

        // 3. Render Records
        const q = document.getElementById('searchBar').value.toLowerCase();
        const list = document.getElementById('dataList'); list.innerHTML = "";
        data.filter(s => s.name.toLowerCase().includes(q)).forEach(s => {
            list.innerHTML += `<div class="item-card"><b>${s.name}</b><br><small>${s.class}</small></div>`;
        });

        // 4. Render Attendance
        const rCls = document.getElementById('rollClass').value;
        const rollList = document.getElementById('rollData'); rollList.innerHTML = "";
        data.filter(s => s.class === rCls).forEach(s => {
            const isA = s.is_absent;
            rollList.innerHTML += `
                <div class="item-card" style="border-left-color:${isA?'var(--red)':'var(--green)'}">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b>${s.name}</b>
                        <button style="padding:10px; border:none; color:white; border-radius:8px; background:${isA?'var(--red)':'var(--green)'}" 
                            onclick="markAtt('${s.id}', ${!isA})">${isA?'ABSENT':'PRESENT'}</button>
                    </div>
                    ${isA ? `
                        <input class="follow-up-input" placeholder="Reason/Follow up note..." 
                        value="${s.follow_up || ''}" onchange="saveNote('${s.id}', this.value)">
                    ` : ''}
                </div>`;
        });
    }

    async function checkAlerts(data) {
        const area = document.getElementById('alertArea'); area.innerHTML = "";
        const classes = ["Baby Class", "Middle Class", "Top Class", "P.1", "P.2", "P.3", "P.4", "P.5", "P.6", "P.7"];
        const now = new Date();
        
        // A. Roll Call Monitoring (Report if after 9:00 AM and class total is checked)
        if(now.getHours() >= 9) {
            let missing = [];
            classes.forEach(c => {
                const classStudents = data.filter(s => s.class === c);
                // Simple logic: if NO one in the class is marked present AND NO one is marked absent, roll call hasn't started
                const hasStarted = classStudents.some(s => s.is_absent !== null);
                if(classStudents.length > 0 && !hasStarted) missing.push(c);
            });
            if(missing.length > 0) {
                area.innerHTML += `<div class="alert-box critical-alert">⏰ <b>PENDING ROLL CALL:</b> ${missing.join(", ")}</div>`;
            }
        }

        // B. Consecutive Absence (2+ Days)
        // Note: For this to work accurately, your database column 'absence_streak' must be updated daily.
        const chronic = data.filter(s => s.absence_streak >= 2);
        chronic.forEach(s => {
            area.innerHTML += `<div class="alert-box">⚠️ <b>${s.name} (${s.class})</b> is absent for ${s.absence_streak} days. Contact: <a href="tel:${s.contact}">${s.contact}</a></div>`;
        });
    }

    async function markAtt(id, status) {
        // Find current streak
        const student = cachedData.find(s => s.id === id);
        let newStreak = status ? (student.absence_streak + 1) : 0;
        
        await _client.from('students').update({ 
            is_absent: status, 
            absence_streak: newStreak,
            last_updated: new Date() 
        }).eq('id', id);
        loadData();
    }

    async function saveNote(id, note) {
        await _client.from('students').update({ follow_up: note }).eq('id', id);
    }

    async function submitData() {
        const payload = {
            name: document.getElementById('name').value,
            class: document.getElementById('cls').value,
            age: document.getElementById('age').value,
            contact: document.getElementById('contact').value,
            health_status: document.getElementById('health_status').value,
            fees_expected: document.getElementById('f_exp').value || 0,
            fees_paid: document.getElementById('f_paid').value || 0,
            absence_streak: 0,
            is_absent: false
        };
        await _client.from('students').insert([payload]);
        alert("Student Saved!");
        loadData();
        tab('rec');
    }

    function clearForm() {
        ['name','age','contact','health_status','f_exp','f_paid'].forEach(i => document.getElementById(i).value = "");
    }

    setInterval(() => {
        const n = new Date();
        document.getElementById('clock').innerText = n.toLocaleTimeString('en-GB');
        document.getElementById('full-date').innerText = n.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
    }, 1000);
</script>
</body>
</html>
