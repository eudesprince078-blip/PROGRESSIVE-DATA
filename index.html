<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER CONTROL | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0052cc; --dark: #020617; --bg: #f1f5f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--dark); }
        
        .header { background: var(--dark); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--primary); }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        
        .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 25px; }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
        
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .card h3 { margin-bottom: 20px; font-weight: 800; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #cbd5e1; font-weight: 600; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        
        .school-row { display: flex; align-items: center; background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #e2e8f0; }
        .school-logo { width: 50px; height: 50px; border-radius: 10px; margin-right: 15px; object-fit: contain; background: #f8fafc; border: 1px solid #eee; }
        
        .badge { background: #e0e7ff; color: var(--primary); padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; }
        .status-pill { padding: 4px 12px; border-radius: 20px; font-size: 0.65rem; font-weight: 800; margin-left: auto; }
        .status-active { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>

    <header class="header">
        <div>
            <h1 style="font-size: 1.2rem; font-weight: 900;">EUDES MEDIA <span style="color:var(--primary)">ADMIN</span></h1>
            <p id="live-clock" style="font-size: 0.6rem; opacity: 0.7;"></p>
        </div>
        <div style="text-align: right;">
            <p style="font-size: 0.7rem; font-weight: 800;">MASTER CONTROL</p>
            <p style="font-size: 0.6rem;">v3.0 Elite</p>
        </div>
    </header>

    <div class="container">
        <div class="grid">
            <div class="card">
                <h3>CREATE NEW TENANT</h3>
                <input type="text" id="sch-id" placeholder="UNIQUE SCHOOL ID (e.g., PMS01)">
                <input type="text" id="sch-name" placeholder="SCHOOL FULL NAME">
                <p style="font-size: 0.6rem; font-weight: 800; color: #64748b; margin-bottom: 5px;">LOGO UPLOAD</p>
                <input type="file" id="sch-file" accept="image/*" onchange="previewLogo(this)">
                <div style="text-align: center;">
                    <img id="logo-preview" style="max-height: 80px; display: none; margin: 10px auto; border-radius: 10px;">
                </div>
                <input type="hidden" id="logo-base64">
                <button class="btn" onclick="registerSchool()">DEPLOY SYSTEM</button>
            </div>

            <div class="card">
                <h3>MANAGED INSTITUTIONS</h3>
                <div id="school-list">
                    <p style="text-align:center; color:#94a3b8;">Loading School Databases...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const db = supabase.createClient(SB_URL, SB_KEY);

        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleString();
        }, 1000);

        function previewLogo(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('logo-preview').src = e.target.result;
                document.getElementById('logo-preview').style.display = 'block';
                document.getElementById('logo-base64').value = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function registerSchool() {
            const sid = document.getElementById('sch-id').value.toUpperCase().trim();
            const name = document.getElementById('sch-name').value.trim();
            const logo = document.getElementById('logo-base64').value;

            if(!sid || !name) return alert("Please enter ID and Name");

            const { error } = await db.from('Schools').insert([{
                sch_id: sid,
                school_name: name,
                logo_url: logo,
                status: 'active',
                created_at: new Date()
            }]);

            if(!error) {
                alert("SCHOOL SYSTEM DEPLOYED!");
                location.reload();
            } else {
                alert("Error: " + error.message);
            }
        }

        async function loadSchools() {
            // Get all schools
            const { data: schools } = await db.from('Schools').select('*');
            // Get student counts for each school
            const { data: students } = await db.from('Students').select('sch_id');

            const listDiv = document.getElementById('school-list');
            listDiv.innerHTML = schools.map(s => {
                const count = students.filter(st => st.sch_id === s.sch_id).length;
                return `
                    <div class="school-row">
                        <img src="${s.logo_url}" class="school-logo">
                        <div style="flex:1">
                            <p style="font-weight:800; font-size:0.9rem;">${s.school_name}</p>
                            <span class="badge">ID: ${s.sch_id}</span>
                            <span style="font-size:0.65rem; font-weight:700; color:#64748b; margin-left:10px;">
                                <i class="fas fa-users"></i> ${count} Students
                            </span>
                        </div>
                        <div class="status-pill status-active">ACTIVE</div>
                        <i class="fas fa-trash" style="margin-left:15px; color:#cbd5e1; cursor:pointer;" onclick="deleteSchool('${s.id}')"></i>
                    </div>
                `;
            }).join('');
        }

        async function deleteSchool(id) {
            if(confirm("Are you sure? This will remove the school from Control Center but keep their student data.")) {
                await db.from('Schools').delete().eq('id', id);
                loadSchools();
            }
        }

        loadSchools();
    </script>
</body>
</html>
