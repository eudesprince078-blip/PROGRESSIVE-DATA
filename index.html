<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PMS PRO - Progressive School</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #0056b3; --white: #ffffff; --green: #28a745; --red: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f7; margin: 0; padding: 10px; }
        .box { background: var(--white); padding: 25px; border-radius: 15px; max-width: 1000px; margin: 15px auto; border: 1px solid #d1d9e6; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .header { background: linear-gradient(135deg, var(--blue), #003d7a); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .dash { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat { background: white; padding: 15px; border-radius: 10px; text-align: center; border-bottom: 4px solid var(--blue); }
        .stat b { font-size: 22px; color: var(--blue); display: block; }
        .stat span { font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        label { font-size: 12px; font-weight: bold; color: var(--blue); display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1.5px solid #ccc; border-radius: 8px; font-size: 14px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--blue); }
        .btn { background: var(--blue); color: white; padding: 15px; border: none; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 15px; text-transform: uppercase; }
        .btn:disabled { background: #888; cursor: not-allowed; }
        .btn-promo { background: #6f42c1; margin-top: 15px; }
        .table-wrap { overflow-x: auto; margin-top: 20px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 900px; }
        th { background: #f8f9fa; color: var(--blue); padding: 12px; text-align: left; border-bottom: 2px solid #ddd; font-size: 11px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        .footer { text-align: center; margin-top: 25px; font-size: 12px; font-weight: bold; color: #444; }
        .hidden { display: none !important; }
        #searchBox { border: 2px solid var(--blue); height: 48px; font-size: 15px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="gate" class="box" style="max-width:350px; margin-top:100px; text-align:center;">
    <h2 style="color:var(--blue)">PMS LOGIN</h2>
    <input id="u" placeholder="USERNAME">
    <input id="p" type="password" placeholder="PASSWORD" style="margin-top:10px;">
    <button onclick="login()" class="btn" style="margin-top:20px;">ENTER SYSTEM</button>
</div>

<div id="main" class="hidden">
    <div class="header">
        <h2 style="margin:0;">PROGRESSIVE SCHOOL DATA</h2>
    </div>

    <div class="dash">
        <div class="stat"><span>Total</span><b id="tCnt">0</b></div>
        <div class="stat"><span>Active</span><b id="aCnt" style="color:var(--green)">0</b></div>
        <div class="stat"><span>Left</span><b id="lCnt" style="color:var(--red)">0</b></div>
    </div>

    <div class="box">
        <h3 id="fTitle" style="color:var(--blue); margin-top:0;">Registration Form</h3>
        <input type="hidden" id="editId">
        <div class="grid">
            <div><label>Full Name</label><input id="name"></div>
            <div><label>Age</label><input id="age" type="number"></div>
            <div><label>Date of Birth</label><input id="dob" type="date"></div>
            <div><label>Contact Number</label><input id="phone"></div>
            <div><label>Physical Location</label><input id="loc"></div>
            <div><label>Payment Code</label><input id="pay"></div>
            <div><label>Class</label>
                <select id="cl">
                    <option>Baby</option><option>Middle</option><option>Top</option>
                    <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                    <option>P.5</option><option>P.6</option><option>P.7</option>
                </select>
            </div>
            <div><label>Health Status</label><input id="health" value="Good"></div>
            <div><label>Student Status</label>
                <select id="st">
                    <option value="active">Active Pupil</option>
                    <option value="left">Left School</option>
                </select>
            </div>
        </div>
        <button onclick="save()" id="sBtn" class="btn">CONFIRM & SAVE RECORD</button>
        <button onclick="cancelEdit()" id="cBtn" class="btn hidden" style="background:#666; margin-top:10px;">CANCEL EDIT</button>
    </div>

    <div class="box">
        <input type="text" id="searchBox" onkeyup="search()" placeholder="🔍 Search Name, LIN, Class, or Payment Code...">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>LIN</th><th>NAME</th><th>AGE</th><th>CLASS</th><th>PAYMENT CODE</th><th>STATUS</th><th>ACTIONS</th></tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
        <button onclick="promote()" class="btn btn-promo">🚀 END OF YEAR PROMOTION (MOVE ALL CLASSES UP)</button>
    </div>

    <div class="footer">Eudes Media | +256762992440</div>
</div>

<script>
    const URL = "https://kjftrwuucjdnhfwesrup.supabase.co";
    const KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    let sb = null;
    let students = [];

    function login() {
        if(document.getElementById('u').value.toUpperCase()==="PROGRESSIVE" && document.getElementById('p').value.toUpperCase()==="JESUS CARES") {
            document.getElementById('gate').classList.add('hidden');
            document.getElementById('main').classList.remove('hidden');
            sb = supabase.createClient(URL, KEY);
            refresh();
        } else { alert("Wrong Credentials"); }
    }

    async function refresh() {
        const { data } = await sb.from('students').select('*').order('created_at', { ascending: false });
        if(data) {
            students = data;
            render(data);
            document.getElementById('tCnt').innerText = data.length;
            document.getElementById('aCnt').innerText = data.filter(s => s.status === 'active').length;
            document.getElementById('lCnt').innerText = data.filter(s => s.status === 'left').length;
        }
    }

    function render(list) {
        let html = "";
        list.forEach(s => {
            html += `<tr>
                <td style="color:var(--blue); font-weight:bold;">${s.lin || '---'}</td>
                <td><b>${(s.name || '').toUpperCase()}</b></td>
                <td>${s.age || '--'}</td>
                <td><b>${s.class || '--'}</b></td>
                <td style="color:#555;">${s.payment_code || '---'}</td>
                <td style="font-weight:bold; color:${s.status==='active'?'green':'red'}">${(s.status || 'active').toUpperCase()}</td>
                <td>
                    <button onclick="editStep('${s.id}')" style="background:#ffc107; border:none; padding:6px; border-radius:4px; cursor:pointer; font-size:10px;">EDIT</button>
                    <button onclick="delStep('${s.id}')" style="background:#dc3545; color:white; border:none; padding:6px; border-radius:4px; cursor:pointer; font-size:10px;">DEL</button>
                </td>
            </tr>`;
        });
        document.getElementById('tbody').innerHTML = html;
    }

    async function save() {
        const id = document.getElementById('editId').value;
        const name = document.getElementById('name').value.trim();
        if(!name) return alert("Enter Student Name");

        const btn = document.getElementById('sBtn');
        btn.disabled = true; btn.innerText = "SAVING...";

        // GENDER REMOVED FROM PAYLOAD TO PREVENT CRASH
        const pupil = {
            name: name, age: document.getElementById('age').value,
            dob: document.getElementById('dob').value, contact: document.getElementById('phone').value,
            location: document.getElementById('loc').value, payment_code: document.getElementById('pay').value,
            class: document.getElementById('cl').value, health_status: document.getElementById('health').value,
            status: document.getElementById('st').value
        };

        try {
            if(!id) {
                // Generate LIN: PM + First Letter + 4 Numbers
                pupil.lin = "PM" + name.charAt(0).toUpperCase() + "-" + Math.floor(1000 + Math.random() * 9000);
                await sb.from('students').insert([pupil]);
            } else {
                await sb.from('students').update(pupil).eq('id', id);
            }
            alert("SAVED SUCCESSFULLY!");
            cancelEdit();
            await refresh();
        } catch (e) {
            alert("Database Error: " + e.message);
        } finally {
            btn.disabled = false; btn.innerText = "CONFIRM & SAVE RECORD";
        }
    }

    function editStep(id) {
        const s = students.find(x => x.id == id);
        document.getElementById('editId').value = s.id;
        document.getElementById('name').value = s.name;
        document.getElementById('age').value = s.age;
        document.getElementById('dob').value = s.dob;
        document.getElementById('phone').value = s.contact;
        document.getElementById('loc').value = s.location;
        document.getElementById('pay').value = s.payment_code;
        document.getElementById('cl').value = s.class;
        document.getElementById('health').value = s.health_status;
        document.getElementById('st').value = s.status;
        
        document.getElementById('fTitle').innerText = "Edit: " + s.lin;
        document.getElementById('sBtn').innerText = "UPDATE CHANGES";
        document.getElementById('cBtn').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    async function delStep(id) {
        if(confirm("Delete student?")) {
            await sb.from('students').delete().eq('id', id);
            refresh();
        }
    }

    async function promote() {
        if(!confirm("Promote all active students to the next class?")) return;
        const map = {'Baby':'Middle','Middle':'Top','Top':'P.1','P.1':'P.2','P.2':'P.3','P.3':'P.4','P.4':'P.5','P.5':'P.6','P.6':'P.7','P.7':'GRADUATED'};
        for(let s of students) {
            if(s.status === 'active' && map[s.class]) {
                await sb.from('students').update({class: map[s.class]}).eq('id', s.id);
            }
        }
        alert("Promotion Complete!"); refresh();
    }

    function search() {
        const q = document.getElementById('searchBox').value.toUpperCase();
        const f = students.filter(s => 
            (s.name && s.name.toUpperCase().includes(q)) || 
            (s.lin && s.lin.toUpperCase().includes(q)) || 
            (s.class && s.class.toUpperCase().includes(q)) ||
            (s.payment_code && s.payment_code.includes(q))
        );
        render(f);
    }

    function cancelEdit() {
        document.getElementById('editId').value = "";
        document.getElementById('name').value = "";
        document.getElementById('pay').value = "";
        document.getElementById('fTitle').innerText = "Registration Form";
        document.getElementById('sBtn').innerText = "CONFIRM & SAVE RECORD";
        document.getElementById('cBtn').classList.add('hidden');
    }
</script>
</body>
</html>
