<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROGRESSIVE MOTHERS PMS - V147 LIN FIX</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #002b5b; --gold: #ffce00; --red: #ff3b3b; --green: #2ecc71; --gray: #f4f7fa; }
        body { font-family: 'Inter', sans-serif; background: var(--gray); margin: 0; padding-bottom: 100px; -webkit-tap-highlight-color: transparent; color: #333; }
        
        .top-nav { background: #001326; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-weight: 700; position: sticky; top: 0; z-index: 2000; }
        .logout-link { color: var(--gold); text-decoration: none; border: 1px solid var(--gold); padding: 4px 10px; border-radius: 6px; }

        .header { background: linear-gradient(135deg, #001a33, var(--blue)); color: white; padding: 25px 15px 100px; text-align: center; border-radius: 0 0 50px 50px; border-bottom: 6px solid var(--gold); position: relative; }
        .school-title { font-size: 14px; font-weight: 900; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .school-loc { font-size: 10px; font-weight: 800; color: var(--gold); letter-spacing: 1.5px; display: block; margin-bottom: 15px; }
        .clock-box { font-size: 42px; font-weight: 900; margin: 5px 0; letter-spacing: -1px; }
        
        .activity-banner { font-size: 10px; font-weight: 900; padding: 8px 18px; border-radius: 50px; display: inline-block; border: 1px solid white; text-transform: uppercase; background: rgba(255,255,255,0.1); }

        .dash-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 15px; margin-top: -60px; position: relative; z-index: 100; }
        .dash-card { background: white; padding: 15px 5px; border-radius: 22px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .dash-card span { display: block; font-size: 18px; font-weight: 900; color: var(--blue); }
        .dash-card small { font-size: 8px; font-weight: 800; color: #999; text-transform: uppercase; }

        .tab-bar { display: flex; overflow-x: auto; background: white; padding: 8px; margin: 25px 15px 15px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .tab { flex: 1; padding: 12px 10px; font-size: 10px; font-weight: 900; color: #bbb; cursor: pointer; text-align: center; display: none; }
        .tab.active { background: var(--blue); color: white; border-radius: 15px; }

        .card { background: white; padding: 20px; border-radius: 25px; margin: 15px; border: 1px solid #eee; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        label { font-size: 10px; font-weight: 800; color: var(--blue); margin-top: 12px; display: block; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; margin-top: 5px; border: 1.5px solid #eee; border-radius: 12px; font-weight: 600; box-sizing: border-box; font-size: 14px; outline: none; }
        
        .btn-main { background: var(--blue); color: white; border: none; padding: 16px; width: 100%; border-radius: 15px; font-weight: 900; margin-top: 15px; font-size: 14px; cursor: pointer; }
        .hidden { display: none !important; }

        /* FIXED LIN TAG STYLE */
        .lin-tag { background: var(--blue); color: white; padding: 3px 10px; border-radius: 6px; font-size: 10px; font-weight: 900; display: inline-block; margin-bottom: 5px; letter-spacing: 0.5px; }
        
        .fin-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 15px; }
        .fin-box { background: white; padding: 15px 5px; text-align: center; border-radius: 18px; border: 1px solid #ddd; }
        .fin-box span { display: block; font-size: 8px; color: #888; font-weight: 800; }
        .fin-box b { font-size: 11px; color: var(--blue); font-weight: 900; }

        .list-item { border-left: 6px solid var(--blue); margin-bottom: 12px; padding: 15px; cursor: pointer; position: relative; overflow: hidden; }
        .list-item b { font-size: 15px; display: block; text-transform: uppercase; color: var(--blue); }
        .list-item small { font-size: 11px; color: #555; font-weight: 700; }
        .bal-status { font-size: 10px; font-weight: 900; margin-top: 5px; display: block; }

        .footer-brand { text-align: center; font-size: 10px; color: #bbb; font-weight: 800; margin-top: 30px; padding-bottom: 30px; }
    </style>
</head>
<body>

<div id="loginGate" style="padding: 100px 30px; text-align: center;">
    <h2 style="color:var(--blue); font-weight:900;">PROGRESSIVE MOTHERS</h2>
    <div class="card" style="max-width:340px; margin:auto; border: 3px solid var(--blue);">
        <input id="sysKey" type="text" placeholder="ACCESS KEY" style="text-align:center; text-transform: uppercase;">
        <button onclick="login()" class="btn-main">LOGIN</button>
    </div>
</div>

<div id="mainApp" class="hidden">
    <div class="top-nav">
        <a href="#" class="logout-link" onclick="location.reload()">LOGOUT</a>
        <div id="currDate">...</div>
    </div>

    <div class="header">
        <span class="school-title">PROGRESSIVE MOTHERS SCHOOL</span>
        <span class="school-loc">GAYAZA-KIJABIJJO</span>
        <div id="clock" class="clock-box">00:00:00</div>
        <div id="activityStatus" class="activity-banner">...</div>
    </div>

    <div class="dash-container">
        <div class="dash-card"><span id="statTotal">0</span><small>Students</small></div>
        <div class="dash-card"><span id="statPres" style="color:var(--green)">0</span><small>Present</small></div>
        <div class="dash-card"><span id="statAbs" style="color:var(--red)">0</span><small>Absent</small></div>
    </div>

    <div class="tab-bar">
        <div id="tReg" class="tab" onclick="showTab('reg')">ADMISSION</div>
        <div id="tRoll" class="tab" onclick="showTab('roll')">ROLL CALL</div>
        <div id="tRec" class="tab" onclick="showTab('rec')">RECORDS</div>
        <div id="tAbs" class="tab" onclick="showTab('abs')">ABSENTEES</div>
        <div id="tFin" class="tab" onclick="showTab('fin')">FINANCE</div>
    </div>

    <div id="secReg" class="card hidden">
        <h3 id="regTitle" style="margin:0; color:var(--blue); font-size: 15px;">STUDENT ADMISSION</h3>
        <input type="hidden" id="editId">
        <label>LIN Number (Generated Automatically)</label>
        <input id="fLin" readonly placeholder="Auto-gen on Save" style="background:#f0f4f8; font-weight: 900; color:var(--blue);">
        <label>Full Name</label><input id="fName" placeholder="Enter Full Name">
        <label>Class</label><select id="fClass"><option>Baby</option><option>Middle</option><option>Top</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
        <label>Parent/Guardian Contact</label><input id="fCon" placeholder="Contact Number">
        <div id="financePanel" class="hidden"><label>Total Fees Req.</label><input type="number" id="fExp"><label>Current Paid</label><input type="number" id="fPaid"></div>
        <button onclick="saveData()" class="btn-main">SAVE STUDENT RECORD</button>
        <button id="delBtn" onclick="deleteStudent()" class="btn-main hidden" style="background:var(--red)">DELETE STUDENT</button>
        <button onclick="clearForm()" class="btn-main" style="background:#666">NEW ADMISSION</button>
    </div>

    <div id="secRoll" class="hidden"><div class="card" style="background:var(--blue);"><select id="rollClass" onchange="loadFilteredRoll()"><option value="">-- Choose Class --</option><option>Baby</option><option>Middle</option><option>Top</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select></div><div id="rollArea"></div></div>
    
    <div id="secRec" class="hidden"><div class="card"><input type="text" id="search" oninput="renderRec()" placeholder="Search Name, Class or LIN..."></div><div id="recArea"></div></div>
    
    <div id="secAbs" class="hidden"><div id="absentArea"></div></div>

    <div id="secFin" class="hidden">
        <div class="fin-grid"><div class="fin-box"><span>Goal</span><b id="dashExp">0</b></div><div class="fin-box"><span>Collected</span><b id="dashPaid" style="color:var(--green)">0</b></div><div class="fin-box"><span>Balance</span><b id="dashBal" style="color:var(--red)">0</b></div></div>
        <div id="finArea"></div>
    </div>

    <div class="footer-brand">EUDES MEDIA SOLUTIONS | +256762992440</div>
</div>

<script>
    const sb = supabase.createClient("https://kjftrwuucjdnhfwesrup.supabase.co", "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO");
    let ROLE = "", students = [], att = {};

    function login() {
        const k = document.getElementById('sysKey').value.trim().toUpperCase();
        if (k === "JESUS CARES") ROLE = "ADMIN";
        else if (k === "FINANCE2026") ROLE = "FINANCE";
        else if (k === "TEACHER256") ROLE = "TEACHER";
        else return alert("Invalid Key");
        document.getElementById('loginGate').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        if (ROLE === "ADMIN") { ['tReg','tRoll','tRec','tAbs','tFin'].forEach(id => document.getElementById(id).style.display = "block"); document.getElementById('financePanel').classList.remove('hidden'); showTab('reg'); }
        else if (ROLE === "FINANCE") { ['tReg','tFin'].forEach(id => document.getElementById(id).style.display = "block"); document.getElementById('financePanel').classList.remove('hidden'); showTab('fin'); }
        else { document.getElementById('tRoll').style.display = "block"; showTab('roll'); }
        fetchData(); setInterval(tick, 1000); tick();
    }

    async function fetchData() {
        const { data } = await sb.from('students').select('*').order('name');
        if(data) { students = data; document.getElementById('statTotal').innerText = students.length; renderRec(); renderFinance(); }
    }

    // SMART LIN FINDER: Checks both possible column names
    function getLIN(s) { return s.lin_number || s.lin || "NO LIN"; }

    function generateLIN(name) {
        const letter = (name || "X").trim().charAt(0).toUpperCase();
        return `PM${letter}${Math.floor(1000 + Math.random() * 9000)}`;
    }

    function tick() {
        const n = new Date();
        const t = n.getHours() * 100 + n.getMinutes();
        document.getElementById('clock').innerText = n.toLocaleTimeString('en-GB');
        document.getElementById('currDate').innerText = n.toLocaleDateString('en-GB', { day:'2-digit', month:'long', year:'numeric' }).toUpperCase();
        const sch = [ {s:630, e:800, t:"🌅 ARRIVAL"}, {s:800, e:1030, t:"📚 LESSONS"}, {s:1030, e:1100, t:"☕ BREAK"}, {s:1100, e:1230, t:"📖 LESSONS"}, {s:1230, e:1330, t:"🍲 LUNCH"}, {s:1330, e:1500, t:"💤 SLEEPING"}, {s:1500, e:1600, t:"⚽ PLAY"} ];
        let cur = "🌙 CLOSED"; sch.forEach(s => { if(t >= s.s && t < s.e) cur = s.t; });
        document.getElementById('activityStatus').innerText = "STATUS: " + cur;
    }

    function showTab(t) {
        ['secReg','secRoll','secRec','secFin','secAbs'].forEach(s => document.getElementById(s).classList.add('hidden'));
        ['tReg','tRoll','tRec','tFin','tAbs'].forEach(s => document.getElementById(s).classList.remove('active'));
        document.getElementById('sec' + t.charAt(0).toUpperCase() + t.slice(1)).classList.remove('hidden');
        document.getElementById('t' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
    }

    async function saveData() {
        const id = document.getElementById('editId').value;
        const name = document.getElementById('fName').value;
        const lin = id ? document.getElementById('fLin').value : generateLIN(name);
        const row = { 
            lin_number: lin, // New code saves to lin_number
            name: name, 
            class: document.getElementById('fClass').value, 
            contact: document.getElementById('fCon').value, 
            fees_expected: parseInt(document.getElementById('fExp').value) || 0, 
            fees_paid: parseInt(document.getElementById('fPaid').value) || 0 
        };
        if(id) await sb.from('students').update(row).eq('id', id); else await sb.from('students').insert([row]);
        alert("SYNCED!"); clearForm(); fetchData();
    }

    function setEdit(id) {
        const s = students.find(x => x.id == id);
        if(!s) return;
        document.getElementById('editId').value = s.id;
        document.getElementById('fLin').value = getLIN(s);
        document.getElementById('fName').value = s.name;
        document.getElementById('fClass').value = s.class;
        document.getElementById('fCon').value = s.contact;
        document.getElementById('fExp').value = s.fees_expected || 0;
        document.getElementById('fPaid').value = s.fees_paid || 0;
        document.getElementById('regTitle').innerText = "UPDATE: " + s.name;
        if(ROLE === "ADMIN") document.getElementById('delBtn').classList.remove('hidden');
        showTab('reg'); window.scrollTo(0,0);
    }

    function renderRec() {
        const q = document.getElementById('search').value.toUpperCase();
        let h = "";
        students.filter(s => s.name.toUpperCase().includes(q) || s.class.toUpperCase().includes(q) || getLIN(s).toUpperCase().includes(q)).forEach(s => {
            h += `<div class="card list-item" onclick="setEdit('${s.id}')">
                    <span class="lin-tag">${getLIN(s)}</span>
                    <b>${s.name}</b>
                    <small>Class: ${s.class} | 📞 ${s.contact}</small>
                  </div>`;
        });
        document.getElementById('recArea').innerHTML = h || "<p style='text-align:center;'>No records found.</p>";
    }

    function renderFinance() {
        let tE = 0, tP = 0, h = "";
        students.forEach(s => {
            const exp = s.fees_expected || 0; const paid = s.fees_paid || 0; const bal = exp - paid;
            tE += exp; tP += paid;
            h += `<div class="card list-item" onclick="setEdit('${s.id}')" style="border-left-color: ${bal <= 0 ? 'var(--green)' : 'var(--red)'}">
                    <span class="lin-tag" style="background:#eee; color:#333;">${getLIN(s)}</span>
                    <b>${s.name}</b>
                    <small>Total: ${exp.toLocaleString()} | Paid: ${paid.toLocaleString()}</small>
                    <span class="bal-status" style="color:${bal <= 0 ? 'var(--green)' : 'var(--red)'}">BALANCE: UGX ${bal.toLocaleString()}</span>
                  </div>`;
        });
        document.getElementById('dashExp').innerText = tE.toLocaleString();
        document.getElementById('dashPaid').innerText = tP.toLocaleString();
        document.getElementById('dashBal').innerText = (tE - tP).toLocaleString();
        document.getElementById('finArea').innerHTML = h;
    }

    function loadFilteredRoll() {
        const sel = document.getElementById('rollClass').value;
        const filtered = students.filter(s => s.class === sel);
        let h = "";
        filtered.forEach(s => {
            const isAbs = att[s.id] === 'absent';
            h += `<div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:15px; margin-bottom:10px;">
                    <div><b>${s.name}</b><br><span class="lin-tag" style="font-size:8px;">${getLIN(s)}</span></div>
                    <button onclick="toggleAtt('${s.id}')" style="padding:12px; border-radius:10px; border:none; background:${isAbs ? 'var(--red)' : 'var(--green)'}; color:white; font-weight:900;">${isAbs ? 'ABS' : 'PRES'}</button>
                  </div>`;
        });
        document.getElementById('rollArea').innerHTML = h || "<p style='text-align:center; padding:20px;'>Select a class.</p>";
    }

    function toggleAtt(id) {
        att[id] = (att[id] === 'absent') ? 'present' : 'absent';
        let a = 0; Object.values(att).forEach(v => { if(v === 'absent') a++; });
        document.getElementById('statAbs').innerText = a; document.getElementById('statPres').innerText = students.length - a;
        loadFilteredRoll();
    }

    function clearForm() {
        ['fName','fCon','fExp','fPaid','editId','fLin'].forEach(i => { document.getElementById(i).value = ""; document.getElementById(i).disabled = false; });
        document.getElementById('regTitle').innerText = "STUDENT ADMISSION";
        document.getElementById('delBtn').classList.add('hidden');
    }

    async function deleteStudent() {
        if(confirm("Delete this student permanently?")) {
            await sb.from('students').delete().eq('id', document.getElementById('editId').value); fetchData(); clearForm();
        }
    }
</script>
</body>
</html>
