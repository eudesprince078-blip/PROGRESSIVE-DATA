<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS ELITE | EUDES MEDIA MASTER</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #0052cc; --dark: #020617; --bg: #f8fafc; --danger: #ef4444; --success: #22c55e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #1e293b; height: 100vh; display: flex; overflow: hidden; }

        .sidebar { width: 260px; background: var(--dark); display: flex; flex-direction: column; transition: 0.3s; z-index: 3000; flex-shrink: 0; }
        @media (max-width: 1024px) { .sidebar { position: fixed; height: 100%; transform: translateX(-100%); } .sidebar.open { transform: translateX(0); } }
        .nav-item { display: flex; align-items: center; padding: 14px 20px; color: #94a3b8; border: none; background: transparent; width: 100%; cursor: pointer; font-weight: 700; }
        .nav-item.active { background: var(--primary); color: white; border-radius: 0 25px 25px 0; }

        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 70px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #e2e8f0; }
        .content { flex: 1; padding: 20px; overflow-y: auto; }

        .glass-card { background: white; border-radius: 20px; padding: 20px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 10px; font-weight: 600; }
        .btn-pro { background: var(--primary); color: white; padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; width: 100%; }
        
        .row-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .subject-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f1f5f9; padding: 15px; border-radius: 15px; margin-top: 10px; }
        .hidden { display: none !important; }
        
        .result-box { margin-top: 15px; padding: 15px; border-radius: 12px; background: var(--dark); color: white; text-align: center; }
    </style>
</head>
<body>

    <div id="auth" style="position:fixed; inset:0; background:var(--dark); z-index:9999; display:flex; align-items:center; justify-content:center; padding:20px;">
        <div style="background:white; padding:40px; border-radius:30px; width:100%; max-width:400px; text-align:center;">
            <h1 style="font-weight:900;">ESMS <span style="color:var(--primary)">ELITE</span></h1>
            <input type="text" id="login-id" placeholder="ENTER SCHOOL ID" style="text-align:center; margin-top:20px;">
            <button class="btn-pro" onclick="verify()">ACCESS PORTAL</button>
        </div>
    </div>

    <aside class="sidebar" id="sidebar">
        <div style="padding:30px 20px; text-align:center;">
            <img id="sch-logo" style="height:50px; border-radius:10px;">
            <h4 id="side-sch-name" style="color:white; font-size:0.8rem; margin-top:10px;"></h4>
        </div>
        <nav>
            <button class="nav-item active" onclick="nav('dash', this)"><i class="fas fa-home"></i> &nbsp; Dashboard</button>
            <button class="nav-item" onclick="nav('list', this)"><i class="fas fa-users"></i> &nbsp; Student List</button>
            <button class="nav-item" onclick="nav('rep', this)"><i class="fas fa-file-invoice"></i> &nbsp; Report Cards</button>
        </nav>
    </aside>

    <main class="main">
        <header class="header">
            <div onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></div>
            <h4 id="head-title" style="font-weight:800;">REPORTS & GRADING</h4>
            <p id="live-time" style="font-size:0.7rem; font-weight:800; color:var(--primary)"></p>
        </header>

        <div class="content">
            <div id="v-rep">
                <div class="glass-card">
                    <h3>STUDENT ASSESSMENT</h3>
                    <select id="rep-cls" onchange="loadStudentsForRep()"><option value="">Select Class</option></select>
                    <div id="rep-st-list" style="margin-top:10px;"></div>
                </div>

                <div id="grading-panel" class="glass-card hidden">
                    <h3 id="target-name" style="color:var(--primary)"></h3>
                    <div id="subject-inputs" class="subject-grid"></div>
                    
                    <textarea id="t-comment" placeholder="Class Teacher's Comment" style="margin-top:10px;"></textarea>
                    
                    <div class="result-box">
                        <div id="calc-agg" style="font-size:1.2rem; font-weight:800;">Aggregates: --</div>
                        <div id="calc-div" style="font-size:0.9rem; font-weight:700; color:var(--success)">Division: --</div>
                    </div>
                    
                    <button class="btn-pro" style="margin-top:15px;" onclick="saveReport()">SAVE & PRINT REPORT</button>
                </div>
            </div>

            <div id="v-dash" class="hidden">Dashboard Content...</div>
            <div id="v-list" class="hidden">List Content...</div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        let db, activeSch, students = [];

        async function verify() {
            const id = document.getElementById('login-id').value.toUpperCase().trim();
            db = supabase.createClient(SB_URL, SB_KEY);
            const { data } = await db.from('Schools').select('*').eq('sch_id', id).single();
            if(data) {
                activeSch = id;
                document.getElementById('side-sch-name').innerText = data.school_name;
                document.getElementById('sch-logo').src = data.logo_url;
                document.getElementById('auth').classList.add('hidden');
                refresh();
            }
        }

        async function refresh() {
            const { data } = await db.from('Students').select('*').eq('sch_id', activeSch);
            students = data || [];
            const classes = [...new Set(students.map(s => s.class))];
            document.getElementById('rep-cls').innerHTML = '<option value="">Select Class</option>' + classes.map(c => `<option>${c}</option>`).join('');
        }

        function loadStudentsForRep() {
            const cls = document.getElementById('rep-cls').value;
            const filtered = students.filter(s => s.class === cls);
            document.getElementById('rep-st-list').innerHTML = filtered.map(s => `
                <div class="row-item" onclick="openGrader('${s.id}')" style="cursor:pointer">
                    <b>${s.name}</b>
                    <i class="fas fa-chevron-right"></i>
                </div>
            `).join('');
        }

        function openGrader(id) {
            const s = students.find(x => x.id == id);
            document.getElementById('grading-panel').classList.remove('hidden');
            document.getElementById('target-name').innerText = s.name + " (" + s.class + ")";
            
            // DYNAMIC SUBJECTS
            let subs = [];
            if(s.class.includes('P.')) {
                subs = ['English', 'Mathematics', 'SST', 'Science'];
            } else {
                subs = ['Numeracy', 'Literacy', 'News', 'Drawing'];
            }

            document.getElementById('subject-inputs').innerHTML = subs.map(sub => `
                <div>
                    <label style="font-size:0.7rem; font-weight:800;">${sub}</label>
                    <input type="number" class="mark-input" placeholder="Marks" oninput="calculateUgandaGrade()">
                </div>
            `).join('');
        }

        function getUgPoint(mark) {
            if (mark >= 90) return 1; if (mark >= 80) return 2;
            if (mark >= 75) return 3; if (mark >= 70) return 4;
            if (mark >= 60) return 5; if (mark >= 50) return 6;
            if (mark >= 45) return 7; if (mark >= 40) return 8;
            return 9;
        }

        function calculateUgandaGrade() {
            let totalPoints = 0;
            let inputs = document.querySelectorAll('.mark-input');
            let allFilled = true;

            inputs.forEach(i => {
                if(!i.value) allFilled = false;
                totalPoints += getUgPoint(Number(i.value));
            });

            if(!allFilled) return;

            let div = "4";
            if(totalPoints <= 12) div = "1";
            else if(totalPoints <= 24) div = "2";
            else if(totalPoints <= 28) div = "3";
            else if(totalPoints > 28) div = "U";

            document.getElementById('calc-agg').innerText = "Aggregates: " + totalPoints;
            document.getElementById('calc-div').innerText = "Division: " + div;
        }

        async function saveReport() {
            alert("REPORT PROCESSED: Aggregates and Division Saved to Ledger.");
            document.getElementById('grading-panel').classList.add('hidden');
        }

        function nav(v, b) {
            ['v-dash', 'v-list', 'v-rep'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('v-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            b.classList.add('active');
        }
    </script>
</body>
</html>
