<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESMS AUTHORITY</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0047AB; --bg: #0f172a; }
        body { background: var(--bg); margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
        h1 { color: var(--primary); font-size: 1.5rem; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 2px solid #e2e8f0; text-align: center; font-weight: 700; text-transform: uppercase; outline: none; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: 800; cursor: pointer; margin-top: 10px; }
        #msg { margin-top: 15px; font-size: 0.7rem; font-weight: 800; display: none; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>ESMS AUTHORITY</h1>
        <p style="font-size:0.6rem; color:#64748b; margin-bottom:20px;">EUDES MEDIA SOLUTIONS</p>
        
        <input type="text" id="sid" placeholder="SCHOOL ID (PM001)">
        <input type="password" id="skey" placeholder="ACCESS KEY">
        <button class="btn" onclick="login()">OPEN SYSTEM</button>
        
        <div id="msg"></div>
    </div>

    <script>
        const _URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const supabaseClient = supabase.createClient(_URL, _KEY);

        async function login() {
            const idVal = document.getElementById('sid').value.trim().toUpperCase();
            const keyVal = document.getElementById('skey').value.trim();
            const msg = document.getElementById('msg');

            msg.style.display = "block";
            msg.style.background = "#f1f5f9";
            msg.innerText = "🔍 CONNECTING TO DATABASE...";

            try {
                // Fetch all schools
                const { data: rows, error } = await supabaseClient.from('Schools').select('*');
                
                if (error) throw new Error("CONNECTION ERROR");

                // SEARCH ALL COLUMNS FOR "PM001"
                const school = rows.find(r => 
                    Object.values(r).some(v => v && v.toString().toUpperCase() === idVal)
                );

                if (!school) {
                    msg.style.background = "#fee2e2";
                    msg.style.color = "#b91c1c";
                    msg.innerText = "❌ ID NOT FOUND IN DATABASE";
                    return;
                }

                // CHECK KEYS
                if (keyVal === school.admin_key || keyVal === school.teacher_key) {
                    msg.style.background = "#dcfce7";
                    msg.style.color = "#15803d";
                    msg.innerText = "✅ ACCESS GRANTED! OPENING...";
                    // Redirect or load your main app here
                    setTimeout(() => alert("WELCOME TO " + school.school_name), 500);
                } else {
                    msg.style.background = "#fef3c7";
                    msg.style.color = "#b45309";
                    msg.innerText = "⚠️ WRONG KEY FOR " + school.school_name;
                }

            } catch (err) {
                msg.innerText = "🚨 " + err.message;
            }
        }
    </script>
</body>
</html>
