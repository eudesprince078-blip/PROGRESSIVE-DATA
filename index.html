<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS ELITE | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #0052cc; --dark: #020617; --bg: #f8fafc; --danger: #ef4444; --success: #22c55e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #1e293b; height: 100vh; display: flex; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 260px; background: var(--dark); display: flex; flex-direction: column; transition: 0.3s; z-index: 3000; flex-shrink: 0; }
        @media (max-width: 1024px) { .sidebar { position: fixed; height: 100%; transform: translateX(-100%); } .sidebar.open { transform: translateX(0); } }
        .nav-item { display: flex; align-items: center; padding: 14px 20px; color: #94a3b8; border: none; background: transparent; width: 100%; cursor: pointer; font-weight: 700; }
        .nav-item.active { background: var(--primary); color: white; border-radius: 0 25px 25px 0; }

        /* MAIN */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 70px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #e2e8f0; }
        .content { flex: 1; padding: 20px; overflow-y: auto; }

        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 20px; text-align: center; border-bottom: 4px solid var(--primary); }
        
        .glass-card { background: white; border-radius: 20px; padding: 20px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 10px; font-weight: 600; font-size: 0.85rem; }
        .btn-pro { background: var(--primary); color: white; padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; width: 100%; }
        
        .list-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .subject-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f1f5f9; padding: 15px; border-radius: 15px; }
        .hidden { display: none !important; }
        .badge { padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; }
    </style>
</head>
<body>

    <div id="auth" style="position:fixed; inset:0; background:var(--dark); z-index:9999; display:flex; align-items:center; justify-content:center; padding:20px;">
        <div style="background:white; padding:40px; border-radius:30px; width:100%; max-width:400px; text-align:center;">
            <h1 style="font-weight:900;">ESMS <span style="color:var(--primary)">ELITE</span></h1>
            <input type="text" id="login-id" placeholder="ENTER SCHOOL ID" style="text-align:center; margin-top:20px;">
            <button class="btn-pro" onclick="verify()">ACCESS PORTAL</button>
        </div>
    </div>

    <aside class="sidebar" id="sidebar">
        <div style="padding:30px 20px; text-align:center;">
            <img id="sch-logo" style="height:50px; border-radius:10px;">
            <h4 id="side-sch-name" style="color:white; font-size:0.75rem; margin-top:10px;"></h4>
        </div>
        <nav style="flex:1;">
            <button class="nav-item active" onclick="nav('dash', this)"><i class="fas fa-home"></i> &nbsp; Dashboard</button>
            <button class="nav-item" onclick="nav('reg', this)"><i class="fas fa-user-plus"></i> &nbsp; Enrollment</button>
            <button class="nav-item" onclick="nav('list', this)"><i class="fas fa-users"></i> &nbsp; Student List</button>
            <button class="nav-item" onclick="nav('fin', this)"><i class="fas fa-wallet"></i> &nbsp; Finance</button>
            <button class="nav-item" onclick="nav('broad', this)"><i class="fas fa-paper-plane"></i> &nbsp; Broadcast</button>
            <button class="nav-item" onclick="nav('rep', this)"><i class="fas fa-file-invoice"></i> &nbsp; Reports</button>
        </nav>
    </aside>

    <main class="main">
        <header class="header">
            <div onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></div>
            <div style="text-align:center;">
                <h4 id="head-title" style="font-weight:800; font-size:0.85rem;">SCHOOL MANAGER</h4>
                <p id="live-time" style="font-size:0.6rem; font-weight:700; color:var(--primary)"></p>
            </div>
            <i class="fas fa-shield-alt"></i>
        </header>

        <div class="content">
            <div id="v-dash">
                <div class="stat-grid">
                    <div class="stat-card"><h3 id="s-exp">0</h3><label>Expected</label></div>
                    <div class="stat-card"><h3 id="s-paid" style="color:var(--success)">0</h3><label>Paid</label></div>
                    <div class="stat-card"><h3 id="s-debt" style="color:var(--danger)">0</h3><label>Debt</label></div>
                </div>
                <div class="glass-card">
                    <h4>DAILY ABSENTEES</h4>
                    <div id="absent-list-view"></div>
                </div>
            </div>

            <div id="v-reg" class="hidden">
                <div class="glass-card">
                    <h3>STUDENT ENROLLMENT</h3>
                    <input type="hidden" id="f-id">
                    <div style="text-align:center; margin-bottom:10px;">
                        <img id="f-preview" style="width:100px; height:100px; border-radius:20px; display:none; margin: 0 auto 10px;">
                        <input type="file" onchange="handlePhoto(this)">
                        <input type="hidden" id="f-photo">
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <input type="text" id="f-name" placeholder="Full Name">
                        <select id="f-class">
                            <option>Baby Class</option><option>Middle Class</option><option>Top Class</option>
                            <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                            <option>P.5</option><option>P.6</option><option>P.7</option>
                        </select>
                        <input type="text" id="f-contact" placeholder="Guardian Phone">
                        <input type="text" id="f-loc" placeholder="Location">
                        <input type="text" id="f-health" placeholder="Health Status">
                        <input type="date" id="f-dob">
                    </div>
                    <input type="number" id="f-fees" placeholder="Total Fees (UGX)">
                    <button class="btn-pro" onclick="save()">SAVE STUDENT</button>
                </div>
            </div>

            <div id="v-list" class="hidden">
                <div class="glass-card" style="padding:10px; margin-bottom:10px;">
                    <input type="text" id="m-search" placeholder="Search by Name, LIN or Class..." onkeyup="filterMaster()" style="margin:0;">
                </div>
                <div id="master-list-container"></div>
            </div>

            <div id="v-fin" class="hidden">
                <div class="glass-card">
                    <h3>FEES HUB</h3>
                    <div id="fin-list-container"></div>
                </div>
            </div>

            <div id="v-broad" class="hidden">
                <div class="glass-card">
                    <h3>COMMUNICATION CENTER</h3>
                    <select id="b-target" onchange="updateBMessage()">
                        <option value="all">All Parents</option>
                        <option value="debtors">All Debtors (Auto-Fill Balance)</option>
                    </select>
                    <textarea id="b-msg" style="height:150px;" placeholder="Message..."></textarea>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <button class="btn-pro" style="background:#25D366" onclick="alert('Sent to WhatsApp')">WhatsApp</button>
                        <button class="btn-pro" style="background:#ea4335" onclick="alert('Sent to Email')">Email</button>
                    </div>
                </div>
            </div>

            <div id="v-rep" class="hidden">
                <div class="glass-card">
                    <h3>GRADING & SUBJECTS</h3>
                    <select id="rep-cls" onchange="loadRepStudents()"><option value="">Select Class</option></select>
                    <div id="rep-st-list"></div>
                    <div id="grading-panel" class="hidden" style="margin-top:20px; border-top:2px solid #eee; padding-top:20px;">
                        <h4 id="g-name" style="color:var(--primary)"></h4>
                        <div id="g-inputs" class="subject-grid"></div>
                        <textarea id="g-comment" placeholder="Teacher's Comment" style="margin-top:10px;"></textarea>
                        <div style="background:var(--dark); color:white; padding:15px; border-radius:15px; text-align:center; margin-top:10px;">
                            <div id="res-agg" style="font-weight:900;">Aggregates: --</div>
                            <div id="res-div" style="font-weight:700; color:var(--success)">Division: --</div>
                        </div>
                        <button class="btn-pro" style="margin-top:10px;" onclick="alert('Report Saved')">SAVE REPORT</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        let db, activeSch, students = [], abs = [];

        setInterval(() => { document.getElementById('live-time').innerText = new Date().toLocaleString(); }, 1000);

        async function verify() {
            const id = document.getElementById('login-id').value.toUpperCase().trim();
            db = supabase.createClient(SB_URL, SB_KEY);
            const { data } = await db.from('Schools').select('*').eq('sch_id', id).single();
            if(data) {
                activeSch = id;
                document.getElementById('side-sch-name').innerText = data.school_name;
                document.getElementById('sch-logo').src = data.logo_url;
                document.getElementById('auth').classList.add('hidden');
                refresh();
            }
        }

        async function refresh() {
            const { data } = await db.from('Students').select('*').eq('sch_id', activeSch);
            students = data || [];
            
            let exp = 0, paid = 0;
            students.forEach(s => { exp += Number(s.total_fees || 0); paid += Number(s.paid_fees || 0); });
            document.getElementById('s-exp').innerText = exp.toLocaleString();
            document.getElementById('s-paid').innerText = paid.toLocaleString();
            document.getElementById('s-debt').innerText = (exp - paid).toLocaleString();

            const clsList = [...new Set(students.map(s => s.class))];
            document.getElementById('rep-cls').innerHTML = '<option value="">Select Class</option>' + clsList.map(c => `<option>${c}</option>`).join('');

            renderMaster();
            renderFin();
        }

        function handlePhoto(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('f-preview').src = e.target.result;
                document.getElementById('f-preview').style.display = 'block';
                document.getElementById('f-photo').value = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }

        async function save() {
            const id = document.getElementById('f-id').value;
            const payload = {
                sch_id: activeSch, name: document.getElementById('f-name').value.toUpperCase(),
                class: document.getElementById('f-class').value, contact: document.getElementById('f-contact').value,
                location: document.getElementById('f-loc').value, health: document.getElementById('f-health').value,
                dob: document.getElementById('f-dob').value, total_fees: document.getElementById('f-fees').value,
                photo_url: document.getElementById('f-photo').value, lin: id ? undefined : activeSch + "-" + Math.floor(1000 + Math.random()*9000)
            };
            if(id) await db.from('Students').update(payload).eq('id', id);
            else await db.from('Students').insert([payload]);
            alert("SECURED"); refresh(); nav('list');
        }

        function renderMaster() {
            document.getElementById('master-list-container').innerHTML = students.map(s => `
                <div class="list-item">
                    <div><b>${s.name}</b><br><small>${s.class} | ${s.lin} | Loc: ${s.location || 'N/A'}</small></div>
                    <div>
                        <i class="fas fa-edit" onclick="editStud('${s.id}')" style="margin-right:15px; cursor:pointer;"></i>
                        <i class="fas fa-trash" onclick="delStud('${s.id}')" style="color:red; cursor:pointer;"></i>
                    </div>
                </div>
            `).join('');
        }

        function renderFin() {
            document.getElementById('fin-list-container').innerHTML = students.map(s => {
                const debt = (s.total_fees || 0) - (s.paid_fees || 0);
                return `
                <div class="list-item">
                    <div><b>${s.name}</b><br><small>Exp: ${Number(s.total_fees).toLocaleString()} | Paid: ${Number(s.paid_fees || 0).toLocaleString()}</small></div>
                    <div style="text-align:right">
                        <span class="badge ${debt > 0 ? 'badge-debt' : 'badge-paid'}">Bal: ${debt.toLocaleString()}</span><br>
                        <input type="number" placeholder="Pay" style="width:80px; margin:0;" onchange="updatePay('${s.id}', this.value)">
                    </div>
                </div>`;
            }).join('');
        }

        async function updatePay(id, v) {
            const s = students.find(x => x.id == id);
            await db.from('Students').update({ paid_fees: Number(s.paid_fees || 0) + Number(v) }).eq('id', id);
            refresh();
        }

        function loadRepStudents() {
            const cls = document.getElementById('rep-cls').value;
            const filtered = students.filter(s => s.class === cls);
            document.getElementById('rep-st-list').innerHTML = filtered.map(s => `<div onclick="openGrade('${s.id}')" style="padding:15px; border-bottom:1px solid #eee; cursor:pointer;">${s.name}</div>`).join('');
        }

        function openGrade(id) {
            const s = students.find(x => x.id == id);
            document.getElementById('grading-panel').classList.remove('hidden');
            document.getElementById('g-name').innerText = s.name;
            const subs = s.class.includes('P.') ? ['English', 'Math', 'SST', 'Science'] : ['Literacy', 'Numeracy', 'News', 'Drawing'];
            document.getElementById('g-inputs').innerHTML = subs.map(sub => `<div><label style="font-size:0.6rem; font-weight:800;">${sub}</label><input type="number" class="m-in" oninput="calcReport()"></div>`).join('');
        }

        function calcReport() {
            let totalP = 0, filled = true;
            document.querySelectorAll('.m-in').forEach(i => {
                if(!i.value) filled = false;
                const m = Number(i.value);
                if(m >= 90) totalP += 1; else if(m >= 80) totalP += 2; else if(m >= 75) totalP += 3;
                else if(m >= 70) totalP += 4; else if(m >= 60) totalP += 5; else if(m >= 50) totalP += 6;
                else if(m >= 45) totalP += 7; else if(m >= 40) totalP += 8; else totalP += 9;
            });
            if(!filled) return;
            document.getElementById('res-agg').innerText = "Aggregates: " + totalP;
            let div = totalP <= 12 ? "1" : totalP <= 24 ? "2" : totalP <= 28 ? "3" : "U";
            document.getElementById('res-div').innerText = "Division: " + div;
        }

        function editStud(id) {
            const s = students.find(x => x.id == id);
            document.getElementById('f-id').value = s.id;
            document.getElementById('f-name').value = s.name;
            document.getElementById('f-class').value = s.class;
            document.getElementById('f-fees').value = s.total_fees;
            nav('reg');
        }

        async function delStud(id) { if(confirm("Delete?")) { await db.from('Students').delete().eq('id', id); refresh(); } }

        function nav(v, b) {
            ['v-dash', 'v-reg', 'v-list', 'v-fin', 'v-broad', 'v-rep'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('v-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(b) b.classList.add('active');
            if(window.innerWidth < 1024) document.getElementById('sidebar').classList.remove('open');
        }
    </script>
</body>
</html>
