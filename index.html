<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Progressive Mothers PMS v47.5</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #001a33; --red: #e63946; --gold: #ffc107; --white: #ffffff; --green: #25D366; --light: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 0; }
        .header { background: var(--red); color: white; padding: 20px 15px; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--gold); }
        .hero { background: var(--blue); color: white; padding: 20px 15px; text-align: center; border-bottom: 5px solid var(--gold); }
        #clock { font-size: 32px; font-weight: 900; margin: 5px 0; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 15px; margin-top: -30px; }
        .stat-card { background: white; padding: 12px 5px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-bottom: 4px solid var(--blue); }
        .stat-val { font-size: 20px; font-weight: 900; color: var(--blue); display: block; }
        .stat-lbl { font-size: 8px; font-weight: 800; color: #888; text-transform: uppercase; }

        .nav-tabs { display: flex; background: white; border-bottom: 1px solid #ddd; position: sticky; top: 82px; z-index: 999; overflow-x: auto; }
        .tab { flex: 1; min-width: 80px; text-align: center; padding: 15px 5px; font-weight: 900; font-size: 9px; color: #bbb; cursor: pointer; text-transform: uppercase; }
        .tab.active { color: var(--blue); border-bottom: 4px solid var(--blue); background: #fcfcfc; }

        .item-card { background: white; border-radius: 15px; padding: 15px; margin: 10px 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 8px solid var(--blue); position: relative; }
        .alert-box { background: #fff3f3; border: 1px solid var(--red); color: var(--red); padding: 12px; margin: 15px; border-radius: 12px; font-size: 11px; font-weight: 800; }

        input, select { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; font-size: 14px; margin: 5px 0 12px 0; box-sizing: border-box; font-weight: 600; }
        .hidden { display: none !important; }
        .btn-save { width: 100%; background: var(--blue); color: white; padding: 18px; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; }
        
        /* Fees Tracking Table */
        .fees-history { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 11px; }
        .fees-history th { text-align: left; color: #888; padding: 5px; border-bottom: 1px solid #eee; }
        .fees-history td { padding: 8px 5px; border-bottom: 1px solid #f9f9f9; font-weight: 700; }

        .class-report { background: white; margin: 15px; padding: 15px; border-radius: 15px; border: 1px dashed var(--blue); }
    </style>
</head>
<body>

<div id="loginGate" style="position:fixed; inset:0; background:var(--blue); z-index:2000; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px;">
    <h1 style="color:white; font-weight:900; font-size:22px; text-align:center;">PROGRESSIVE MOTHER'S</h1>
    <p style="color:var(--gold); font-weight:800; margin-bottom:30px;">NURSERY & PRIMARY SCHOOL</p>
    <input id="key" type="password" placeholder="ENTER ACCESS KEY" style="text-align:center; max-width:300px; border:3px solid var(--gold); text-transform: uppercase;">
    <button onclick="secureLogin()" style="background:var(--gold); color:var(--blue); padding:18px; width:100%; max-width:300px; border:none; border-radius:12px; font-weight:900; margin-top:10px;">LOGIN</button>
</div>

<div id="mainApp" class="hidden">
    <div class="header">
        <div style="line-height:1.2;"><b style="font-size:14px;">PROGRESSIVE MOTHER'S</b><br><span style="font-size:9px;">Nursery & Primary School</span></div>
        <button onclick="location.reload()" style="background:white; color:var(--red); border:none; padding:8px 12px; border-radius:10px; font-weight:900; font-size:10px;">LOGOUT</button>
    </div>

    <div class="hero">
        <div id="full-date" style="color:var(--gold); font-size:11px; font-weight:800;">DATE</div>
        <div id="clock">00:00:00</div>
    </div>

    <div class="dashboard">
        <div class="stat-card"><span class="stat-val" id="c-tot">0</span><span class="stat-lbl">Pupils</span></div>
        <div class="stat-card" style="border-bottom-color: var(--green);"><span class="stat-val" id="c-pres" style="color:var(--green)">0</span><span class="stat-lbl">Present</span></div>
        <div class="stat-card" style="border-bottom-color: var(--red);"><span class="stat-val" id="c-abs" style="color:var(--red)">0</span><span class="stat-lbl">Absent</span></div>
    </div>

    <div class="nav-tabs">
        <div class="tab" id="tab-sum" onclick="tab('sum')">Director</div>
        <div class="tab" id="tab-rec" onclick="tab('rec')">Records</div>
        <div class="tab" id="tab-adm" onclick="tab('adm')">Admission</div>
        <div class="tab" id="tab-roll" onclick="tab('roll')">Attendance</div>
    </div>

    <div id="v-sum" class="hidden">
        <div id="absentListSummary"></div>
        <div style="padding:15px; font-weight:900; color:var(--blue);">SCHOOL FINANCE TOTALS:</div>
        <div id="financeBox" style="padding: 0 15px 25px 15px;"></div>
    </div>

    <div id="v-rec" class="hidden">
        <div style="padding:15px;"><input id="searchBar" placeholder="🔍 Search pupil..." oninput="renderUI()"></div>
        <div id="dataList"></div>
    </div>

    <div id="v-adm" class="hidden" style="padding:15px;">
        <div style="background:white; padding:20px; border-radius:20px; border:1px solid #ddd;">
            <h3 id="admTitle" style="color:var(--blue); font-size:15px;">PUPIL PROFILE</h3>
            <input type="hidden" id="editId">
            <label>Full Name</label><input id="name">
            <label>LIN</label><input id="lin" readonly>
            <select id="cls"><option>Baby Class</option><option>Middle Class</option><option>Top Class</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
            <label>Parent Contact</label><input id="contact">
            
            <div style="background:#f9f9f9; padding:15px; border-radius:12px; margin:10px 0;">
                <label style="color:var(--red)">Fees supposed to be paid</label><input id="f_exp" type="number">
                <label style="color:var(--green)">Add New Payment Amount</label><input id="f_new_pay" type="number" placeholder="Enter amount paid today">
                <label>Payment Date</label><input id="f_date" type="date">
            </div>

            <div id="feesLedger"></div>
            <button onclick="submitData()" class="btn-save">SAVE & UPDATE RECORD</button>
            <button onclick="clearForm()" style="width:100%; background:none; border:none; color:var(--red); font-weight:800; margin-top:10px;">+ Register New Student Instead</button>
        </div>
    </div>

    <div id="v-roll" class="hidden">
        <div style="padding:15px;"><select id="rollClass" onchange="renderUI()" style="border:2px solid var(--blue);"><option value="">-- Select Class --</option><option>Baby Class</option><option>Middle Class</option><option>Top Class</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select></div>
        <div id="classStatusReport"></div>
        <div id="rollData"></div>
    </div>
</div>

<script>
    const SUPA_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
    const _client = supabase.createClient(SUPA_URL, SUPA_KEY);
    let role = ""; let cachedData = [];

    function secureLogin() {
        const val = document.getElementById('key').value.trim().toUpperCase();
        if (val === "JESUS CARES") role = "Admin";
        else if (val === "FINANCE 256") role = "Finance";
        else if (val === "TEACH2026") role = "Teacher";
        else return alert("ACCESS DENIED");
        document.getElementById('loginGate').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        tab(role === "Admin" ? 'sum' : (role === "Teacher" ? 'roll' : 'rec'));
        loadData();
    }

    function tab(t) {
        ['v-adm','v-rec','v-roll','v-sum'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById('v-'+t).classList.remove('hidden');
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active');
    }

    async function loadData() {
        const { data } = await _client.from('students').select('*').order('name');
        if(data) { cachedData = data; renderUI(); updateFinance(); }
    }

    function updateFinance() {
        let tE = 0, tP = 0;
        cachedData.forEach(s => { tE += (s.fees_expected||0); tP += (s.fees_paid||0); });
        document.getElementById('financeBox').innerHTML = `<div style="background:var(--blue); color:white; padding:15px; border-radius:15px;">
            <p>Total Revenue Expected: UGX ${tE.toLocaleString()}</p>
            <p style="color:var(--green)">Total Collected: UGX ${tP.toLocaleString()}</p>
            <p style="color:var(--gold)">Total Debt (Debt): UGX ${(tE - tP).toLocaleString()}</p>
        </div>`;
    }

    function renderUI() {
        document.getElementById('c-tot').innerText = cachedData.length;
        document.getElementById('c-abs').innerText = cachedData.filter(s => s.is_absent === true).length;
        document.getElementById('c-pres').innerText = cachedData.length - cachedData.filter(s => s.is_absent === true).length;

        const q = document.getElementById('searchBar').value.toLowerCase();
        const list = document.getElementById('dataList'); list.innerHTML = "";
        cachedData.filter(s => s.name.toLowerCase().includes(q)).forEach(s => {
            const debt = (s.fees_expected || 0) - (s.fees_paid || 0);
            list.innerHTML += `<div class="item-card" onclick="editMode('${s.id}')"><b>${s.name}</b><br><small>Paid: ${s.fees_paid.toLocaleString()} | Debt: ${debt.toLocaleString()}</small></div>`;
        });

        const rCls = document.getElementById('rollClass').value;
        const rList = document.getElementById('rollData'); rList.innerHTML = "";
        const reportDiv = document.getElementById('classStatusReport');
        
        if(rCls) {
            const clsPupils = cachedData.filter(s => s.class === rCls);
            const absentNames = clsPupils.filter(s => s.is_absent).map(s => s.name);
            const presentCount = clsPupils.length - absentNames.length;
            
            reportDiv.innerHTML = `<div class="class-report">
                <b style="color:var(--blue)">${rCls} Daily Report:</b><br>
                <small>Present: ${presentCount} | Absent: ${absentNames.length}</small><br>
                <small style="color:var(--red)">Absent Names: ${absentNames.join(", ") || 'None'}</small>
            </div>`;

            clsPupils.forEach(s => {
                const isA = s.is_absent === true;
                rList.innerHTML += `<div class="item-card" style="border-left-color:${isA?'var(--red)':'var(--green)'}">
                    <b>${s.name}</b> <button onclick="markAtt('${s.id}', ${!isA})" style="float:right; background:${isA?'var(--red)':'var(--green)'}; color:white; border:none; padding:8px; border-radius:8px;">${isA?'MARK ABSENT':'MARK PRESENT'}</button>
                </div>`;
            });
        }
    }

    async function markAtt(id, status) { await _client.from('students').update({ is_absent: status }).eq('id', id); loadData(); }

    function editMode(id) {
        const s = cachedData.find(st => st.id == id);
        document.getElementById('editId').value = s.id;
        document.getElementById('name').value = s.name;
        document.getElementById('lin').value = s.lin || "";
        document.getElementById('cls').value = s.class;
        document.getElementById('contact').value = s.contact || "";
        document.getElementById('f_exp').value = s.fees_expected || 0;
        document.getElementById('f_new_pay').value = "";
        document.getElementById('f_date').value = new Date().toISOString().split('T')[0];
        
        const debt = (s.fees_expected || 0) - (s.fees_paid || 0);
        document.getElementById('feesLedger').innerHTML = `
            <div style="margin-bottom:15px; border-top:1px solid #eee; padding-top:10px;">
                <p style="font-size:12px;"><b>Total Paid:</b> UGX ${s.fees_paid.toLocaleString()}</p>
                <p style="font-size:12px; color:var(--red)"><b>Current Debt:</b> UGX ${debt.toLocaleString()}</p>
            </div>
        `;
        tab('adm');
    }

    function clearForm() {
        document.getElementById('editId').value = "";
        document.getElementById('name').value = "";
        document.getElementById('lin').value = "PM-" + Math.floor(1000 + Math.random()*9000);
        document.getElementById('f_exp').value = 0;
        document.getElementById('f_new_pay').value = 0;
        document.getElementById('feesLedger').innerHTML = "";
        alert("Cleared for new pupil.");
    }

    async function submitData() {
        const id = document.getElementById('editId').value;
        const s = cachedData.find(st => st.id == id);
        const newPay = parseInt(document.getElementById('f_new_pay').value) || 0;
        const totalPaid = (s ? s.fees_paid : 0) + newPay;

        const payload = { 
            name: document.getElementById('name').value, 
            class: document.getElementById('cls').value,
            contact: document.getElementById('contact').value,
            lin: document.getElementById('lin').value,
            fees_expected: parseInt(document.getElementById('f_exp').value) || 0,
            fees_paid: totalPaid
        };
        const { error } = id ? await _client.from('students').update(payload).eq('id', id) : await _client.from('students').insert([payload]);
        if(!error) { alert("Record Updated Successfully!"); loadData(); tab('rec'); }
    }

    setInterval(() => {
        document.getElementById('full-date').innerText = new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
    }, 1000);
</script>
</body>
                                                                                                                                                                                                                                                                                                                    </html>
