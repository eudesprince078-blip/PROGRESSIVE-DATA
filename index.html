<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>School Management System | Eudes Media</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #003366; --gold: #ffc107; --white: #ffffff; --green: #2b9348; --red: #d90429; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--white); margin: 0; padding: 0; }
        
        #loginGate { position:fixed; inset:0; background:var(--blue); z-index:2000; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px; }
        .header { background: var(--blue); color: white; padding: 15px; position: sticky; top: 0; z-index: 1000; border-bottom: 4px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        
        .hero { background: #001a33; padding: 20px; text-align: center; color: white; }
        #clock { font-size: 32px; font-weight: 800; }

        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; margin-top: -30px; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 4px solid var(--blue); }
        .stat-val { font-size: 18px; font-weight: 900; color: var(--blue); display: block; }

        .nav-tabs { display: flex; background: var(--blue); overflow-x: auto; }
        .tab { flex: 1; text-align: center; padding: 15px; font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.5); cursor: pointer; display: none; min-width: 80px; }
        .tab.active { color: var(--gold); border-bottom: 4px solid var(--gold); background: rgba(0,0,0,0.2); }
        .visible-tab { display: block !important; }

        .card { background: white; border-radius: 12px; padding: 15px; margin: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); border-left: 6px solid var(--blue); position: relative; }
        .p-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid var(--blue); margin-right: 12px; }
        
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px; font-weight: 600; }
        label { font-size: 10px; font-weight: 800; color: var(--blue); text-transform: uppercase; display: block; margin-bottom: 2px; }
        
        .btn-main { width: 100%; background: var(--blue); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; }
        .hidden { display: none !important; }
        
        .history-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; background: #f8f9fa; }
        .history-table td, th { padding: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div id="loginGate">
    <h2 style="color:white; margin-bottom:5px;">EUDES MEDIA</h2>
    <p style="color:var(--gold); margin-top:0; font-size:12px;">TENANT MANAGEMENT LOGIN</p>
    <input id="key" type="password" placeholder="ENTER SCHOOL ACCESS KEY" style="text-align:center; max-width:300px;">
    <button onclick="secureLogin()" class="btn-main" style="max-width:300px; background:var(--gold); color:var(--blue);">AUTHENTICATE</button>
</div>

<div id="mainApp" class="hidden">
    <div class="header">
        <div id="schoolTitle">SCHOOL PORTAL</div>
        <button onclick="location.reload()" style="background:var(--red); color:white; border:none; padding:8px 15px; border-radius:8px; font-weight:900;">LOGOUT</button>
    </div>

    <div class="hero">
        <div id="clock">00:00:00</div>
        <div id="status">...</div>
    </div>

    <div class="dashboard">
        <div class="stat-card"><span class="stat-val" id="c-tot">0</span><span style="font-size:8px;">TOTAL</span></div>
        <div class="stat-card"><span class="stat-val" id="c-pres" style="color:var(--green)">0</span><span style="font-size:8px;">PRESENT</span></div>
        <div class="stat-card"><span class="stat-val" id="c-abs" style="color:var(--red)">0</span><span style="font-size:8px;">ABSENT</span></div>
    </div>

    <div class="nav-tabs">
        <div class="tab" id="tab-sum" onclick="tab('sum')">Summary</div>
        <div class="tab" id="tab-rec" onclick="tab('rec')">Records</div>
        <div class="tab" id="tab-adm" onclick="tab('adm')">Admission</div>
        <div class="tab" id="tab-roll" onclick="tab('roll')">Roll-Call</div>
    </div>

    <div id="v-sum" class="hidden">
        <div class="card" style="background:var(--blue); color:white;">
            <h3 style="color:var(--gold); margin-top:0;">DIRECTOR'S PANEL</h3>
            <div id="financeSummary">Loading Financials...</div>
        </div>
        <div id="absenteeReport" style="padding:15px;"></div>
    </div>

    <div id="v-rec" class="hidden">
        <div style="padding:15px;"><input id="searchBar" placeholder="Search LIN, Name, or Class..." oninput="renderUI()"></div>
        <div id="dataList"></div>
    </div>

    <div id="v-adm" class="hidden">
        <div class="card">
            <h3 id="admTitle">ADMIT NEW STUDENT</h3>
            <input type="hidden" id="editId">
            <label>Student Photo URL</label><input id="p_url" placeholder="https://link-to-photo.jpg">
            <label>Full Name</label><input id="name">
            <label>LIN</label><input id="lin_field" placeholder="Auto-gen if blank">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Age</label><input id="age" type="number"></div>
                <div><label>Academic Year</label><input id="acad_year" placeholder="2026"></div>
            </div>
            <label>Date of Birth</label><input id="dob" type="date">
            <label>Class</label><select id="cls"><option>Baby</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
            <label>Physical Location</label><input id="loc">
            <label>Health Status</label><input id="health">
            <label>Parent Contact</label><input id="contact">
            
            <div id="financeSec" style="background:#f0f0f0; padding:15px; border-radius:10px; margin-top:10px;">
                <label>Expected Fees</label><input id="f_exp" type="number">
                <label>Add Payment</label>
                <div style="display:flex; gap:5px;"><input id="pay_amt" type="number" placeholder="Amt"><input id="pay_date" type="date"></div>
                <div id="payHist"></div>
            </div>
            <button onclick="saveData()" class="btn-main" style="margin-top:10px;">SAVE RECORD</button>
        </div>
    </div>

    <div id="v-roll" class="hidden">
        <div style="padding:15px;"><select id="rollCls" onchange="renderUI()"><option value="">-- Choose Class --</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select></div>
        <div id="rollList"></div>
    </div>

    <div style="text-align:center; padding:20px; font-size:10px; color:#aaa;">EUDES MEDIA SYSTEMS v51.9</div>
</div>

<script>
    const SUPA_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
    const _client = supabase.createClient(SUPA_URL, SUPA_KEY);
    
    let cachedData = [];
    let role = "";
    let tenantKey = ""; // Each school sees their own data via this key

    async function secureLogin() {
        const val = document.getElementById('key').value.trim().toUpperCase();
        // Place keys here:
        const keys = { "ADMIN-PM": "Admin", "TEACH-PM": "Teacher", "FINANCE-PM": "Finance" };
        
        if (keys[val]) {
            role = keys[val];
            tenantKey = "PROGRESSIVE-MOTHERS"; // Fixed tenant for this instance
            setupUI(); await loadData();
            document.getElementById('loginGate').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            startClock();
        } else alert("INVALID ACCESS KEY");
    }

    function setupUI() {
        const access = { Admin:['sum','rec','adm','roll'], Finance:['rec','adm'], Teacher:['roll','adm'] };
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('visible-tab'));
        access[role].forEach(id => document.getElementById('tab-'+id).classList.add('visible-tab'));
        tab(access[role][0]);
    }

    async function loadData() {
        // TENANT SYSTEM: Only select data where tenant matches
        const { data } = await _client.from('students').select('*').eq('school_id', tenantKey).order('name');
        if(data) { cachedData = data; renderUI(); updateStats(); }
    }

    function updateStats() {
        let totalExp = 0, totalPaid = 0;
        cachedData.forEach(s => { totalExp += (s.fees_expected || 0); totalPaid += (s.fees_paid || 0); });
        
        document.getElementById('c-tot').innerText = cachedData.length;
        document.getElementById('c-pres').innerText = cachedData.filter(s => !s.is_absent).length;
        document.getElementById('c-abs').innerText = cachedData.filter(s => s.is_absent).length;
        
        if(document.getElementById('financeSummary')) {
            document.getElementById('financeSummary').innerHTML = `
                <p>Expected: UGX ${totalExp.toLocaleString()}</p>
                <p>Received: UGX ${totalPaid.toLocaleString()}</p>
                <p style="color:var(--gold)">Balance: UGX ${(totalExp-totalPaid).toLocaleString()}</p>
            `;
        }
    }

    function renderUI() {
        const search = document.getElementById('searchBar').value.toLowerCase();
        const list = document.getElementById('dataList');
        
        list.innerHTML = cachedData.filter(s => s.name.toLowerCase().includes(search) || s.lin?.includes(search) || s.class.toLowerCase().includes(search)).map(s => `
            <div class="card" onclick="editMode('${s.id}')">
                <div style="display:flex; align-items:center;">
                    <img src="${s.photo_url || 'https://via.placeholder.com/50'}" class="p-img">
                    <div>
                        <b>${s.name.toUpperCase()}</b><br>
                        <small>${s.class} | ${s.lin || 'NO LIN'}</small>
                    </div>
                </div>
                <div style="margin-top:10px; font-size:11px;">
                    Contact: ${s.contact} | Location: ${s.location}<br>
                    <b style="color:var(--red)">Balance: UGX ${((s.fees_expected||0)-(s.fees_paid||0)).toLocaleString()}</b>
                </div>
            </div>
        `).join('');

        // Attendance List
        const rCls = document.getElementById('rollCls').value;
        document.getElementById('rollList').innerHTML = cachedData.filter(s => s.class === rCls).map(s => `
            <div class="card">
                <b>${s.name}</b>
                <button onclick="markAtt('${s.id}', ${!s.is_absent})" style="float:right; border:none; padding:8px; border-radius:5px; color:white; background:${s.is_absent?'var(--red)':'var(--green)'}">${s.is_absent?'ABSENT':'PRESENT'}</button>
            </div>
        `).join('');
    }

    function editMode(id) {
        const s = cachedData.find(x => x.id == id);
        document.getElementById('editId').value = s.id;
        document.getElementById('admTitle').innerText = "EDIT STUDENT";
        document.getElementById('name').value = s.name;
        document.getElementById('lin_field').value = s.lin || "";
        document.getElementById('age').value = s.age;
        document.getElementById('dob').value = s.dob;
        document.getElementById('cls').value = s.class;
        document.getElementById('loc').value = s.location;
        document.getElementById('health').value = s.health_status;
        document.getElementById('contact').value = s.contact;
        document.getElementById('f_exp').value = s.fees_expected;
        document.getElementById('p_url').value = s.photo_url || "";
        document.getElementById('acad_year').value = s.academic_year || "2026";
        
        const hist = s.payment_history ? JSON.parse(s.payment_history) : [];
        document.getElementById('payHist').innerHTML = `<table class="history-table"><tr><th>Date</th><th>Amount</th></tr>` + 
            hist.map(h => `<tr><td>${h.date}</td><td>${h.amount.toLocaleString()}</td></tr>`).join('') + `</table>`;
        tab('adm');
    }

    async function saveData() {
        const id = document.getElementById('editId').value;
        const name = document.getElementById('name').value;
        const amt = parseInt(document.getElementById('pay_amt').value) || 0;
        const date = document.getElementById('pay_date').value;
        
        let history = []; let paid = 0;
        if(id) {
            const s = cachedData.find(x => x.id == id);
            history = s.payment_history ? JSON.parse(s.payment_history) : [];
            paid = s.fees_paid || 0;
        }

        if(amt > 0 && date) { history.push({date, amount: amt}); paid += amt; }

        const payload = {
            name, lin: document.getElementById('lin_field').value || "LIN-"+Math.floor(1000+Math.random()*9000),
            age: document.getElementById('age').value,
            dob: document.getElementById('dob').value,
            class: document.getElementById('cls').value,
            location: document.getElementById('loc').value,
            health_status: document.getElementById('health').value,
            contact: document.getElementById('contact').value,
            fees_expected: document.getElementById('f_exp').value,
            fees_paid: paid,
            payment_history: JSON.stringify(history),
            photo_url: document.getElementById('p_url').value,
            academic_year: document.getElementById('acad_year').value,
            school_id: tenantKey // Critical for tenant isolation
        };

        const { error } = id ? await _client.from('students').update(payload).eq('id', id) : await _client.from('students').insert([payload]);
        if(!error) { alert("SUCCESS"); await loadData(); tab('rec'); }
    }

    async function markAtt(id, stat) {
        const s = cachedData.find(x => x.id == id);
        let attHist = s.attendance_history ? JSON.parse(s.attendance_history) : [];
        if(stat) attHist.push(new Date().toLocaleDateString('en-GB'));
        
        await _client.from('students').update({ is_absent: stat, attendance_history: JSON.stringify(attHist) }).eq('id', id);
        loadData();
    }

    function tab(t) {
        ['v-sum','v-rec','v-adm','v-roll'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById('v-'+t).classList.remove('hidden');
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+t).classList.add('active');
    }

    function startClock() {
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
            document.getElementById('status').innerText = (now.getHours() > 7 && now.getHours() < 17) ? "CLASS IN SESSION" : "OFF-DUTY";
        }, 1000);
    }
</script>
</body>
</html>
