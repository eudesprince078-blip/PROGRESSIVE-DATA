<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progressive Mothers | Registry</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --pms-red: #e11d48; --pms-blue: #1e40af; --bg: #fdf2f8; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); padding-bottom: 60px; }
        header { background: var(--pms-red); color: white; padding: 12px; text-align: center; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        
        /* Dashboard Stats */
        .dash-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; margin-top: -30px; }
        .stat-card { background: white; padding: 15px; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-bottom: 4px solid var(--pms-red); }
        .stat-num { display: block; font-size: 26px; font-weight: 900; color: var(--pms-blue); }
        .stat-label { font-size: 11px; font-weight: bold; color: #64748b; text-transform: uppercase; }

        .hero { background: var(--pms-blue); color: white; padding: 30px 20px 50px 20px; text-align: center; border-radius: 0 0 30px 30px; }
        .container { max-width: 450px; margin: 0 auto; padding: 10px; }
        .card { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 15px; }
        
        input, select { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; border: 1.5px solid #e2e8f0; font-size: 15px; box-sizing: border-box; }
        .btn-save { background: var(--pms-blue); color: white; border: none; width: 100%; padding: 16px; border-radius: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        
        .s-box { background: white; padding: 18px; border-radius: 20px; margin-bottom: 12px; border-left: 8px solid var(--pms-red); position: relative; }
        .status-left { opacity: 0.5; filter: grayscale(1); border-left-color: #94a3b8; }
        .pay-badge { background: #e0f2fe; color: #0369a1; padding: 5px 10px; border-radius: 8px; font-weight: 800; font-size: 12px; display: inline-block; margin-top: 5px; }
        .lin-tag { position: absolute; top: 10px; right: 10px; font-size: 10px; background: #f1f5f9; padding: 2px 6px; border-radius: 5px; font-weight: bold; color: var(--pms-blue); }
        
        #adminArea { display: none; }
        .footer { text-align: center; padding: 20px; font-size: 11px; color: #64748b; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div style="width:40px"></div>
    <span style="font-weight: 900;">SCHOOL REGISTRY</span>
    <div onclick="openAdmin()" style="cursor:pointer; font-size:24px; padding-right:10px;">⚙️</div>
</header>

<div class="hero">
    <h2 style="margin:0;">PROGRESSIVE MOTHERS</h2>
    <div style="font-style:italic; font-size:12px; opacity:0.8;">"With God everything is possible"</div>
</div>

<div class="dash-row">
    <div class="stat-card">
        <span class="stat-num" id="activeTotal">0</span>
        <span class="stat-label">Active Students</span>
    </div>
    <div class="stat-card">
        <span class="stat-num" id="filterCount">0</span>
        <span class="stat-label" id="filterLabel">Class Total</span>
    </div>
</div>

<div class="container">
    <div id="adminArea" class="card">
        <h3 style="margin-top:0; color:var(--pms-blue)">Register Student</h3>
        <input type="text" id="fName" placeholder="Full Student Name">
        <input type="text" id="fPhone" placeholder="Parent Contact Number">
        <input type="text" id="fLoc" placeholder="Physical Location">
        <select id="fClass">
            <option>Baby Class</option><option>Middle Class</option><option>Top Class</option>
            <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
            <option>P.5</option><option>P.6</option><option>P.7</option>
        </select>
        <select id="fStatus">
            <option value="Active">Active Student</option>
            <option value="Left">Student Has Left School</option>
        </select>
        <input type="text" id="fPayCode" placeholder="Enter Payment/Receipt Code">
        <button class="btn-save" onclick="saveRecord()">SAVE TO DATABASE</button>
        <p id="msg" style="text-align:center; font-weight:bold; font-size:12px; margin-top:10px; color: red;"></p>
    </div>

    <div class="card" style="padding: 10px; border: 2px solid var(--pms-blue);">
        <input type="text" id="search" placeholder="🔍 Search name or code..." onkeyup="applyFilters()" style="margin-bottom:10px;">
        <select id="classFilter" onchange="applyFilters()" style="margin-bottom:0; font-weight:bold; color: var(--pms-blue);">
            <option value="All">All Classes (View All)</option>
            <option>Baby Class</option><option>Middle Class</option><option>Top Class</option>
            <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
            <option>P.5</option><option>P.6</option><option>P.7</option>
        </select>
    </div>

    <div id="mainList"></div>
</div>

<div class="footer">
    Developed by <b>Eudes Media</b><br>
    Contact: +256762992440 | WhatsApp: +256762992440
</div>

<script>
    // Paste the LONG "ey..." key here
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co"; 
    const SB_KEY = "PASTE_THE_LONG_EY_KEY_HERE"; 

    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    let studentDB = [];

    async function loadData() {
        try {
            const { data, error } = await supabaseClient.from('students').select('*').order('name');
            if(error) throw error;
            studentDB = data || [];
            applyFilters();
        } catch (e) {
            console.log("Loading error:", e.message);
        }
    }

    function openAdmin() {
        const p = prompt("Enter Admin Password:");
        if(p === "mothers.comit1") {
            document.getElementById('adminArea').style.display = 'block';
            applyFilters();
        }
    }

    function applyFilters() {
        const searchVal = document.getElementById('search').value.toLowerCase();
        const classVal = document.getElementById('classFilter').value;

        // Dashboard: Only count Active students
        const activeCount = studentDB.filter(s => s.status !== 'Left').length;
        document.getElementById('activeTotal').innerText = activeCount;

        let filtered = studentDB.filter(s => {
            const matchesSearch = s.name.toLowerCase().includes(searchVal) || (s.payment_code && s.payment_code.toLowerCase().includes(searchVal));
            const matchesClass = (classVal === "All") || (s.class === classVal);
            return matchesSearch && matchesClass;
        });

        document.getElementById('filterCount').innerText = filtered.length;
        document.getElementById('filterLabel').innerText = classVal === "All" ? "Total Shown" : classVal + " Total";
        display(filtered);
    }

    function display(list) {
        const box = document.getElementById('mainList');
        box.innerHTML = "";
        list.forEach(s => {
            const isLeft = s.status === 'Left';
            box.innerHTML += `
                <div class="s-box ${isLeft ? 'status-left' : ''}">
                    <span class="lin-tag">${s.lin}</span>
                    <span style="font-weight: 800; color: var(--pms-blue); font-size: 18px;">${s.name}</span><br>
                    <span style="font-size: 13px; color: #64748b;">📚 ${s.class} ${isLeft ? ' | <b style="color:red">LEFT</b>' : ''}</span><br>
                    <div class="pay-badge">💳 Code: ${s.payment_code || '---'}</div>
                </div>`;
        });
    }

    async function saveRecord() {
        const n = document.getElementById('fName').value;
        if(!n) return alert("Enter Student Name");

        // LIN LOGIC: First letter + Random 4 digits
        const generatedLin = n.trim().charAt(0).toUpperCase() + "-" + Math.floor(1000 + Math.random() * 9000);

        const { error } = await supabaseClient.from('students').insert([{
            name: n, contact: document.getElementById('fPhone').value,
            location: document.getElementById('fLoc').value, class: document.getElementById('fClass').value,
            status: document.getElementById('fStatus').value, payment_code: document.getElementById('fPayCode').value, 
            lin: generatedLin
        }]);
        
        if(error) alert(error.message); else location.reload();
    }

    window.onload = loadData;
</script>
</body>
</html>
