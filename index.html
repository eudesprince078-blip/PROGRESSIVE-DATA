<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS ELITE | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0052cc; --dark: #020617; --bg: #f8fafc; --danger: #ef4444; --success: #22c55e; --warning: #f59e0b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #1e293b; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* HEADER & CLOCK */
        .top-bar { height: 75px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; }
        #live-clock { font-size: 0.7rem; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }

        .wrapper { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 250px; background: var(--dark); display: flex; flex-direction: column; transition: 0.3s; }
        @media (max-width: 1024px) { .sidebar { position: fixed; height: 100%; transform: translateX(-100%); z-index: 2000; } .sidebar.open { transform: translateX(0); } }
        
        .nav-item { padding: 18px 25px; color: #94a3b8; cursor: pointer; display: flex; align-items: center; font-weight: 700; border: none; background: none; width: 100%; text-align: left; transition: 0.2s; }
        .nav-item i { width: 25px; }
        .nav-item.active { background: var(--primary); color: white; border-radius: 0 30px 30px 0; margin-right: 10px; }
        
        .content { flex: 1; overflow-y: auto; padding: 25px; }

        /* DASHBOARD CARDS */
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 25px; border-bottom: 5px solid var(--primary); text-align: center; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .stat-card h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 5px; }
        .stat-card p { font-size: 0.65rem; font-weight: 800; color: #64748b; text-transform: uppercase; }

        /* FORMS & LISTS */
        .glass-card { background: white; border-radius: 25px; padding: 25px; border: 1px solid #e2e8f0; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .student-item { background: white; padding: 15px; border-radius: 20px; margin-bottom: 12px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 15px; transition: 0.2s; }
        .student-item:hover { border-color: var(--primary); }
        .st-photo { width: 60px; height: 60px; border-radius: 15px; object-fit: cover; background: #e2e8f0; border: 2px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        input, select { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #cbd5e1; margin-bottom: 15px; font-weight: 600; font-size: 0.95rem; outline: none; }
        input:focus { border-color: var(--primary); }
        .btn-pro { background: var(--primary); color: white; padding: 18px; border-radius: 18px; border: none; font-weight: 800; cursor: pointer; width: 100%; font-size: 1rem; box-shadow: 0 4px 12px rgba(0, 82, 204, 0.3); }
        .btn-pro:disabled { background: #94a3b8; cursor: not-allowed; }
        
        .hidden { display: none !important; }
        #auth { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="auth">
        <div style="background:white; padding:50px; border-radius:40px; width:100%; max-width:420px; text-align:center;">
            <h1 style="font-weight:900; font-size:2rem; letter-spacing:-1px;">ESMS <span style="color:var(--primary)">ELITE</span></h1>
            <p style="font-size:0.75rem; font-weight:800; color:#94a3b8; margin-bottom:30px; letter-spacing:2px;">TENANT INTERFACE</p>
            <input type="text" id="sch-login" placeholder="ENTER SCHOOL ID" style="text-align:center; text-transform:uppercase;">
            <button class="btn-pro" onclick="verify()">AUTHORIZE ACCESS</button>
        </div>
    </div>

    <header class="top-bar">
        <div onclick="document.getElementById('sidebar').classList.toggle('open')" style="cursor:pointer; font-size:1.2rem;"><i class="fas fa-bars-staggered"></i></div>
        <div style="text-align:center;">
            <img id="logo" style="height:40px; border-radius:8px; margin-bottom:2px;">
            <div id="live-clock">Loading Clock...</div>
        </div>
        <div id="sch-name-display" style="font-weight:900; color:var(--dark); font-size:0.8rem;"></div>
    </header>

    <div class="wrapper">
        <aside class="sidebar" id="sidebar">
            <nav style="margin-top:30px;">
                <button class="nav-item active" onclick="nav('dash', this)"><i class="fas fa-grid-2"></i>Dashboard</button>
                <button class="nav-item" onclick="nav('list', this)"><i class="fas fa-user-group"></i>Students</button>
                <button class="nav-item" onclick="nav('reg', this)"><i class="fas fa-user-plus"></i>Enrollment</button>
                <button class="nav-item" onclick="nav('att', this)"><i class="fas fa-calendar-check"></i>Roll Call</button>
                <button class="nav-item" onclick="nav('fin', this)"><i class="fas fa-wallet"></i>Finance</button>
                <button class="nav-item" onclick="nav('rep', this)"><i class="fas fa-file-chart-column"></i>Reports</button>
            </nav>
            <div style="margin-top:auto; padding:20px; border-top:1px solid #1e293b; color:#475569; font-size:0.6rem; font-weight:800; text-align:center;">
                POWERED BY EUDES MEDIA
            </div>
        </aside>

        <main class="content">
            <div id="v-dash">
                <div class="stat-grid">
                    <div class="stat-card"><h2><span id="st-count">0</span></h2><p>Registered Students</p></div>
                    <div class="stat-card"><h2><span id="st-absent">0</span></h2><p>Absent Today</p></div>
                    <div class="stat-card"><h2><span id="st-paid" style="color:var(--success)">0</span></h2><p>Fees Collected</p></div>
                    <div class="stat-card"><h2><span id="st-debt" style="color:var(--danger)">0</span></h2><p>Outstanding Bal</p></div>
                </div>
                <div class="glass-card">
                    <h4 style="font-weight:800; font-size:0.8rem; color:var(--primary); margin-bottom:10px;"><i class="fas fa-signal"></i> SYSTEM LOG</h4>
                    <div id="debug-log" style="font-size:0.65rem; font-family:monospace; color:#64748b; height:60px; overflow-y:auto;">System operational. Awaiting data...</div>
                </div>
            </div>

            <div id="v-reg" class="hidden">
                <div class="glass-card">
                    <h3 style="margin-bottom:20px;">STUDENT ENROLLMENT</h3>
                    <input type="hidden" id="f-id">
                    <div style="text-align:center; margin-bottom:20px;">
                        <img id="f-preview" class="st-photo" style="width:120px; height:120px; display:none; margin:0 auto 15px;">
                        <input type="file" id="f-file" accept="image/*" onchange="processImage(this)">
                        <input type="hidden" id="f-img">
                    </div>
                    <input type="text" id="f-name" placeholder="FULL STUDENT NAME">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                        <input type="number" id="f-age" placeholder="AGE">
                        <input type="date" id="f-dob">
                    </div>
                    <select id="f-class">
                        <option>Baby Class</option><option>Middle Class</option><option>Top Class</option>
                        <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                        <option>P.5</option><option>P.6</option><option>P.7</option>
                    </select>
                    <input type="text" id="f-contact" placeholder="CONTACT NUMBER (+256...)">
                    <input type="text" id="f-loc" placeholder="PHYSICAL LOCATION / RESIDENCE">
                    <input type="text" id="f-health" placeholder="HEALTH STATUS (HEALTH_STATUS)">
                    <input type="number" id="f-fees" placeholder="TERM FEES AMOUNT (UGX)">
                    <button id="save-btn" class="btn-pro" onclick="saveStudent()">COMMIT TO CLOUD</button>
                </div>
            </div>

            <div id="v-list" class="hidden">
                <div class="glass-card" style="padding:10px;"><input type="text" placeholder="Search LIN or Name..." onkeyup="filterList(this.value)" style="margin:0;"></div>
                <div id="master-list"></div>
            </div>

            <div id="v-att" class="hidden">
                <div class="glass-card"><h3>DAILY ROLL CALL</h3><div id="att-list" style="margin-top:15px;"></div></div>
            </div>

            <div id="v-fin" class="hidden">
                <div class="glass-card"><h3>FEES & PAYMENT CODES</h3><div id="finance-list" style="margin-top:15px;"></div></div>
            </div>

            <div id="v-rep" class="hidden">
                <div class="glass-card">
                    <select id="rep-cls" onchange="loadRepList()"><option value="">SELECT CLASS</option></select>
                    <div id="rep-st-list"></div>
                    <div id="g-panel" class="hidden" style="margin-top:25px; border-top:2px dashed #eee; padding-top:25px;">
                        <h4 id="g-name" style="color:var(--primary); font-weight:900;"></h4>
                        <div id="g-inputs" style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:20px;"></div>
                        <div style="background:var(--dark); color:white; padding:25px; border-radius:25px; text-align:center; margin:20px 0;">
                            <h1 id="res-agg">--</h1><p style="font-size:0.7rem; letter-spacing:2px;">AGGREGATES</p>
                            <h4 id="res-div" style="color:var(--success); margin-top:5px;"></h4>
                        </div>
                        <button class="btn-pro" onclick="saveReport()">ARCHIVE REPORT</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
