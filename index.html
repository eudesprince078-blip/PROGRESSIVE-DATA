<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMS | Eudes Media</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #2563eb; --white: #ffffff; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        header { background: #3b82f6; color: white; padding: 20px; text-align: center; font-weight: bold; }
        .container { max-width: 450px; margin: 0 auto; padding: 15px; }
        .card { background: var(--white); padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* Professional Photo Area */
        .photo-input { border: 2px dashed #cbd5e1; border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 15px; background: #f0f7ff; cursor: pointer; }
        #imgPrev { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; display: none; margin: 0 auto 10px; border: 3px solid var(--blue); }
        
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-save { background: var(--blue); color: white; padding: 16px; border-radius: 12px; border: none; width: 100%; font-weight: 700; font-size: 16px; cursor: pointer; }
        .btn-save:disabled { background: #94a3b8; }

        .student-row { display: flex; align-items: center; gap: 15px; padding: 15px; background: white; border-radius: 15px; margin-top: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .list-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; background: #2563eb; }

        .footer { text-align: center; padding: 20px; color: #64748b; font-size: 13px; line-height: 1.6; }
        .contact { color: var(--blue); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<header>WELCOME TO EUDES CHAT</header>

<div class="container">
    <div class="card">
        <div class="photo-input" onclick="document.getElementById('fileInp').click()">
            <img id="imgPrev" src="">
            <span id="txtPrompt">📷 Tap to Add/Change Photo</span>
            <input type="file" id="fileInp" accept="image/*" style="display:none" onchange="preview(this)">
        </div>

        <input type="text" id="name" placeholder="Full Student Name" required>
        <input type="text" id="contact" placeholder="Contact Number">
        <div style="display:flex; gap:10px;">
            <input type="text" id="class" placeholder="Class">
            <input type="text" id="age" placeholder="Age">
        </div>
        <input type="date" id="dob">
        <input type="text" id="location" placeholder="Physical Location">
        <textarea id="health_status" placeholder="Health Status (Allergies, etc.)"></textarea>
        <select id="status">
            <option value="Active">Active Student</option>
            <option value="Left">Left School</option>
        </select>
        
        <input type="hidden" id="editId">
        <button class="btn-save" id="saveBtn" onclick="handleSave()">Save Student Record</button>
    </div>

    <div id="list">Loading School Records...</div>
</div>

<div class="footer">
    System Developed by <b>Eudes Media</b><br>
    WhatsApp: <a href="https://wa.me/256762992440" class="contact">+256 762 992 440</a> [cite: 2026-03-05]<br>
    Direct Call: <a href="tel:+256200930932" class="contact">+256 200 930 932</a> [cite: 2026-03-05]
</div>

<script>
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co"; 
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    // Matches your bucket name exactly: "students photos"
    const BUCKET_NAME = "students photos"; 

    function preview(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('imgPrev').src = e.target.result;
                document.getElementById('imgPrev').style.display = 'block';
                document.getElementById('txtPrompt').style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function handleSave() {
        const nameInput = document.getElementById('name');
        const nameVal = nameInput.value.trim();
        const file = document.getElementById('fileInp').files[0];
        const dobVal = document.getElementById('dob').value;
        const btn = document.getElementById('saveBtn');

        if (!nameVal) {
            alert("Full Name is required"); [cite: 2026-03-05]
            return;
        }

        btn.disabled = true;
        btn.innerText = "Saving...";

        let finalPhotoUrl = "";

        // Uploading to your Public bucket
        if (file) {
            const fileName = `${Date.now()}.jpg`;
            const { data, error } = await supabaseClient.storage.from(BUCKET_NAME).upload(fileName, file);
            
            if (!error) {
                const { data: publicData } = supabaseClient.storage.from(BUCKET_NAME).getPublicUrl(fileName);
                finalPhotoUrl = publicData.publicUrl;
            }
        }

        const studentData = {
            name: nameVal,
            contact: document.getElementById('contact').value,
            class: document.getElementById('class').value,
            age: document.getElementById('age').value,
            dob: dobVal || null, // Fixes the "invalid syntax for type date" error [cite: 2026-03-05]
            location: document.getElementById('location').value,
            health_status: document.getElementById('health_status').value,
            status: document.getElementById('status').value
        };

        if (finalPhotoUrl) studentData.photo_url = finalPhotoUrl;

        const id = document.getElementById('editId').value;
        let res;

        if (id) {
            res = await supabaseClient.from('students').update(studentData).eq('id', id);
        } else {
            studentData.lin = "PMS-" + Math.floor(1000 + Math.random() * 9000);
            res = await supabaseClient.from('students').insert([studentData]);
        }

        if (res.error) {
            alert("Error: " + res.error.message);
            btn.disabled = false;
            btn.innerText = "Save Student Record";
        } else {
            location.reload(); 
        }
    }

    async function load() {
        const { data } = await supabaseClient.from('students').select('*').order('created_at', { ascending: false });
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = "";
        
        (data || []).forEach(s => {
            const initials = s.name ? s.name.charAt(0).toUpperCase() : "S";
            const avatar = `https://ui-avatars.com/api/?name=${initials}&background=2563eb&color=fff`;
            
            listDiv.innerHTML += `
                <div class="student-row">
                    <img src="${s.photo_url || avatar}" class="list-img">
                    <div style="flex:1">
                        <b style="color:#1e3a8a; font-size:16px;">${s.name}</b><br>
                        <small style="color:gray;">${s.lin} | ${s.class}</small>
                    </div>
                    <button onclick="editRec('${s.id}')" style="background:#f59e0b; color:white; border:none; padding:5px 10px; border-radius:5px; font-size:12px; cursor:pointer;">Edit</button>
                </div>`;
        });
    }

    async function editRec(id) {
        const { data: s } = await supabaseClient.from('students').select('*').eq('id', id).single();
        if (s) {
            document.getElementById('editId').value = s.id;
            document.getElementById('name').value = s.name;
            document.getElementById('contact').value = s.contact;
            document.getElementById('class').value = s.class;
            document.getElementById('age').value = s.age;
            document.getElementById('dob').value = s.dob || "";
            document.getElementById('location').value = s.location;
            document.getElementById('health_status').value = s.health_status;
            document.getElementById('status').value = s.status || "Active";
            
            if (s.photo_url) {
                document.getElementById('imgPrev').src = s.photo_url;
                document.getElementById('imgPrev').style.display = 'block';
                document.getElementById('txtPrompt').style.display = 'none';
            }
            window.scrollTo(0,0);
        }
    }
    load();
</script>
</body>
</html>
