<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PMS V77 BRANDED</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #002b5b; --secondary: #005bc5; --accent: #b87333; --danger: #ff3b3b; --success: #00c851; --bg: #f0f2f5; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: #333; }
        
        /* Branded Header with Logo */
        .app-bar { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; padding: 25px 20px; text-align: center; 
            border-radius: 0 0 35px 35px; position: relative; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }
        .school-logo-container {
            width: 75px; height: 75px; background: white; border-radius: 50%;
            margin: -10px auto 10px; display: flex; align-items: center; justify-content: center;
            border: 3px solid var(--accent); overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .school-logo-container img { width: 90%; height: 90%; object-fit: contain; }

        .logout-pill { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 20px; font-size: 10px; border: 1px solid rgba(255,255,255,0.2); color: white; cursor: pointer; font-weight: bold; }

        .nav-dock { display: flex; justify-content: space-around; background: white; margin: -15px 20px 0; padding: 12px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); position: sticky; top: 10px; z-index: 1000; }
        .nav-item { font-size: 11px; font-weight: 800; color: #888; cursor: pointer; padding: 10px 15px; border-radius: 12px; text-transform: uppercase; }
        .nav-item.active { background: var(--primary); color: white; }

        .pro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; }
        .data-tile { background: white; padding: 15px; border-radius: 20px; border-left: 5px solid var(--accent); box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .tile-label { font-size: 9px; color: #888; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        .tile-value { font-size: 18px; font-weight: 900; color: var(--primary); margin-top: 5px; }

        .admin-card { background: white; margin: 15px; padding: 20px; border-radius: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.03); }
        input, select { width: 100%; padding: 14px; margin-top: 8px; border: 1.5px solid #eee; border-radius: 15px; box-sizing: border-box; font-size: 14px; }
        
        .student-row { background: white; padding: 16px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #f0f0f0; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .btn-full { background: var(--primary); color: white; border: none; padding: 18px; width: 100%; border-radius: 18px; font-weight: 800; margin-top: 10px; cursor: pointer; font-size: 14px; box-shadow: 0 4px 10px rgba(0,43,91,0.2); }
        .btn-mark { border: none; padding: 12px 18px; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-pay { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 10px; font-size: 11px; font-weight: bold; }
        
        .badge { font-size: 9px; font-weight: 900; padding: 4px 10px; border-radius: 8px; text-transform: uppercase; margin-top: 5px; display: inline-block; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loginPage" style="padding: 100px 30px; text-align: center;">
    <div class="school-logo-container" style="width: 100px; height: 100px; margin-bottom: 20px;">
        <img src="https://i.ibb.co/C3Yx06xS/MOTHER-S-PRIDE.jpg" alt="Logo">
    </div>
    <h2 style="color:var(--primary); letter-spacing: 1px;">PROGRESSIVE MOTHERS</h2>
    <div class="admin-card" style="max-width: 350px; margin: auto;">
        <input id="key" type="password" placeholder="Enter System Key" style="text-align:center;">
        <button onclick="login()" class="btn-full">SECURE ACCESS</button>
    </div>
</div>

<div id="app" class="hidden">
    <div class="app-bar">
        <button class="logout-pill" onclick="location.reload()">LOGOUT</button>
        <div class="school-logo-container">
            <img src="https://i.ibb.co/C3Yx06xS/MOTHER-S-PRIDE.jpg" alt="Logo">
        </div>
        <h3 style="margin:0; font-size: 16px; letter-spacing: 1px;">PROGRESSIVE MOTHERS</h3>
        <div id="liveDate" style="font-size: 10px; margin-top: 5px; opacity: 0.8; font-weight: bold;"></div>
        <div id="routine" style="background: var(--accent); color: white; display: inline-block; padding: 4px 12px; border-radius: 15px; font-size: 9px; font-weight: 900; margin-top: 8px;">LUNCH TIME</div>
    </div>

    <div class="nav-dock">
        <div id="nDash" class="nav-item active" onclick="openTab(event,'dash')">DASH</div>
        <div id="nStud" class="nav-item" onclick="openTab(event,'students')">STUDENTS</div>
        <div id="nAtt" class="nav-item" onclick="openTab(event,'attendance')">ROLL CALL</div>
        <div id="nFin" class="nav-item" onclick="openTab(event,'finance')">FINANCE</div>
    </div>

    <div id="dash">
        <div class="pro-grid">
            <div class="data-tile"><div class="tile-label">Enrollment</div><div id="statTotal" class="tile-value">0</div></div>
            <div class="data-tile"><div class="tile-label">M | F Ratio</div><div id="statGender" class="tile-value" style="font-size:15px;">0 | 0</div></div>
            <div class="data-tile" style="border-color:var(--danger)"><div class="tile-label">Absent Today</div><div id="statAbs" class="tile-value" style="color:var(--danger)">0</div></div>
            <div id="finTile" class="data-tile" style="border-color:var(--success)"><div class="tile-label">School Debt</div><div id="statDebt" class="tile-value" style="font-size:15px; color:var(--danger)">UGX 0</div></div>
        </div>
    </div>

    <div id="students" class="hidden">
        <div id="regForm" class="admin-card">
            <h4 style="margin:0; color: var(--primary);">Student Registry</h4>
            <input type="hidden" id="editId">
            <input id="stName" placeholder="Full Student Name">
            <div style="display:flex; gap:10px;">
                <input id="stLin" placeholder="LIN">
                <select id="stGender"><option value="">Gender</option><option>Male</option><option>Female</option></select>
            </div>
            <select id="stClass">
                <option value="">Select Class</option>
                <option>Baby</option><option>Middle</option><option>Top</option>
                <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option>
            </select>
            <input id="stContact" placeholder="Parent Contact">
            <button id="saveBtn" onclick="saveStudent()" class="btn-full">SAVE TO CLOUD</button>
            <button id="arcBtn" onclick="archiveStudent()" style="background:#fff1f1; color:red; border:2px solid red; margin-top:10px; width:100%; padding:15px; border-radius:15px; font-weight:bold; cursor:pointer;" class="hidden">MARK AS LEFT SCHOOL</button>
        </div>
        <div style="padding:15px;">
            <input id="search" oninput="renderStudents()" placeholder="🔍 Quick Search Students..." style="background:white; border:none; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
            <div id="list" style="margin-top:15px;"></div>
        </div>
    </div>

    <div id="attendance" class="hidden" style="padding: 20px;">
        <p style="font-weight: 800; font-size: 12px; color: var(--primary);">SELECT CLASS FOR ROLL CALL:</p>
        <select id="attSelector" onchange="renderAttendance(this.value)" style="border: 2px solid var(--primary);">
            <option value="">-- Choose Class --</option>
            <option>Baby</option><option>Middle</option><option>Top</option>
            <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option>
        </select>
        <div id="attList" style="margin-top:20px;"></div>
    </div>

    <div id="finance" class="hidden" style="padding: 20px;">
        <div id="finStats" style="background:var(--primary); color:white; padding:20px; border-radius:20px; margin-bottom:20px; text-align:center; font-weight:900; letter-spacing:1px; box-shadow: 0 5px 15px rgba(0,43,91,0.3);"></div>
        <div id="finList"></div>
    </div>

</div>

<script>
    const sb = supabase.createClient("https://kjftrwuucjdnhfwesrup.supabase.co", "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO");
    let students = [], attendance = [], ROLE = "";

    function login(){
        let k = document.getElementById('key').value.trim().toUpperCase();
        if(k==="JESUS CARES") ROLE="ADMIN";
        else if(k==="FINANCE2026") ROLE="FINANCE";
        else if(k==="TEACHER256") ROLE="TEACHER";
        else return alert("Invalid Key");

        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        
        if(ROLE==="TEACHER") {
            document.getElementById('nFin').classList.add('hidden');
            document.getElementById('regForm').classList.add('hidden');
        }
        if(ROLE==="FINANCE") document.getElementById('nAtt').classList.add('hidden');
        
        load();
    }

    async function load(){
        let {data:st} = await sb.from('students').select('*').order('name', {ascending:true});
        students = st || [];
        let {data:att} = await sb.from('attendance').select('*');
        attendance = att || [];
        
        dashboard();
        renderStudents();
        financeView();
    }

    function dashboard(){
        let active = students.filter(s => s.class !== 'Left School');
        document.getElementById('statTotal').innerText = active.length;
        document.getElementById('statGender').innerText = `${active.filter(s=>s.gender==='Male').length} M | ${active.filter(s=>s.gender==='Female').length} F`;
        
        let today = new Date().toISOString().split('T')[0];
        let abs = attendance.filter(a=>a.date===today && a.status==='Absent').length;
        document.getElementById('statAbs').innerText = abs;

        if(ROLE !== 'TEACHER'){
            let debt = active.reduce((a,b)=>a+(b.fees_balance||0),0);
            document.getElementById('statDebt').innerText = "UGX " + debt.toLocaleString();
        }
    }

    function renderStudents(){
        let q = document.getElementById('search').value.toUpperCase();
        let h = "";
        students.filter(s => s.class !== 'Left School' && s.name.toUpperCase().includes(q)).forEach(s => {
            h += `<div class="student-row">
                <div><b>${s.name}</b><br><small style="color:var(--accent); font-weight:800;">${s.class}</small></div>
                ${ROLE==='ADMIN'?`<button class="btn-pay" style="background:#eee; color:#333;" onclick="edit('${s.id}')">EDIT</button>`:''}
            </div>`;
        });
        document.getElementById('list').innerHTML = h;
    }

    function edit(id){
        let s = students.find(x => x.id == id);
        document.getElementById('editId').value = s.id;
        document.getElementById('stName').value = s.name;
        document.getElementById('stLin').value = s.lin || "";
        document.getElementById('stGender').value = s.gender;
        document.getElementById('stClass').value = s.class;
        document.getElementById('stContact').value = s.contact || "";
        document.getElementById('arcBtn').classList.remove('hidden');
        document.getElementById('saveBtn').innerText = "UPDATE STUDENT RECORD";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function renderAttendance(cls){
        if(!cls) return document.getElementById('attList').innerHTML = "";
        let list = students.filter(s => s.class === cls);
        let today = new Date().toISOString().split('T')[0];
        let h = `<div style="background:white; padding:10px; border-radius:10px; margin-bottom:15px; font-weight:bold; color:var(--primary);">Roll Call for ${cls}</div>`;
        
        list.forEach(s => {
            let rec = attendance.find(a => a.student_id == s.id && a.date === today);
            let statusBadge = rec ? 
                `<span class="badge" style="background:${rec.status==='Present'?'#e8f9ee':'#fff1f1'}; color:${rec.status==='Present'?'green':'red'}">${rec.status}</span>` : 
                `<span class="badge" style="background:#f4f4f4; color:#999;">Pending</span>`;
            
            h += `<div class="student-row">
                <div><b>${s.name}</b><br>${statusBadge}</div>
                <div style="display:flex; gap:8px;">
                    <button onclick="mark('${s.id}','Present')" class="btn-mark" style="background:var(--success)">✅</button>
                    <button onclick="mark('${s.id}','Absent')" class="btn-mark" style="background:var(--danger)">❌</button>
                </div>
            </div>`;
        });
        document.getElementById('attList').innerHTML = h;
    }

    async function mark(id, status){
        let today = new Date().toISOString().split('T')[0];
        await sb.from('attendance').delete().match({ student_id: id, date: today });
        await sb.from('attendance').insert([{ student_id: id, status: status, date: today }]);
        await load();
        renderAttendance(document.getElementById('attSelector').value);
    }

    function financeView(){
        if(ROLE==='TEACHER') return;
        let active = students.filter(s=>s.class!=='Left School');
        let totalDebt = active.reduce((a,b)=>a+(b.fees_balance||0),0);
        document.getElementById('finStats').innerText = "TOTAL OUTSTANDING: UGX " + totalDebt.toLocaleString();
        
        let h = "";
        active.forEach(s => {
            let bal = (s.fees_balance || 0);
            h += `<div class="student-row">
                <div><b>${s.name}</b><br><small style="color:${bal > 0 ? 'red' : 'green'}; font-weight:bold;">Bal: UGX ${bal.toLocaleString()}</small></div>
                <button class="btn-pay" onclick="pay('${s.id}')">PAYMENT</button>
            </div>`;
        });
        document.getElementById('finList').innerHTML = h;
    }

    async function pay(id){
        let exp = parseInt(prompt("Total Fees Expected (UGX)?")) || 0;
        let paid = parseInt(prompt("Amount Already Paid (UGX)?")) || 0;
        await sb.from('students').update({ fees_expected: exp, fees_paid: paid, fees_balance: exp - paid }).eq('id', id);
        load();
    }

    async function saveStudent(){
        let p = { name: stName.value, lin: stLin.value, gender: stGender.value, class: stClass.value, contact: stContact.value };
        if(!p.name || !p.class) return alert("Student Name and Class are required!");
        let id = editId.value;
        if(id) await sb.from('students').update(p).eq('id', id);
        else await sb.from('students').insert([p]);
        location.reload();
    }

    async function archiveStudent(){
        if(confirm("Permanently mark this student as 'Left School'?")) {
            await sb.from('students').update({ class: 'Left School' }).eq('id', editId.value);
            location.reload();
        }
    }

    function openTab(e, id){
        ['dash','students','attendance','finance'].forEach(t => document.getElementById(t).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        e.currentTarget.classList.add('active');
    }

    setInterval(() => {
        let now = new Date();
        document.getElementById('liveDate').innerText = now.toLocaleString('en-GB', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit', second:'2-digit' });
    }, 1000);
</script>
</body>
</html>
