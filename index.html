<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eudes Media | Supreme Management System V63</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #002d5b; --gold: #ffc107; --red: #d90429; --white: #ffffff; --light: #f1f4f9; --green: #2b9348; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--light); margin: 0; padding: 0; color: #333; }
        
        .header { background: var(--blue); color: white; padding: 20px 15px; border-bottom: 5px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .hero { background: #001a33; padding: 25px 15px; text-align: center; color: white; }
        #clock { font-size: 32px; font-weight: 900; }
        
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; margin-top: -35px; }
        .stat-card { background: white; padding: 15px 5px; border-radius: 12px; text-align: center; box-shadow: 0 8px 16px rgba(0,0,0,0.1); border-top: 4px solid var(--blue); }
        .stat-val { font-size: 18px; font-weight: 900; color: var(--blue); display: block; }
        .stat-lbl { font-size: 8px; font-weight: 800; color: #777; text-transform: uppercase; }
        
        .nav-tabs { display: flex; background: white; border-bottom: 2px solid #ddd; position: sticky; top: 0; z-index: 1000; }
        .tab { flex: 1; text-align: center; padding: 15px 5px; font-size: 12px; font-weight: 900; color: #999; cursor: pointer; text-transform: uppercase; }
        .tab.active { color: var(--blue); border-bottom: 4px solid var(--blue); background: #fdfdfd; }
        
        .search-container { padding: 10px 15px; background: #fff; border-bottom: 1px solid #eee; }
        .search-bar { width: 100%; padding: 12px; border: 2px solid var(--blue); border-radius: 8px; font-size: 14px; font-weight: 600; }

        .scroll-box { overflow-x: auto; margin: 15px; background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { text-align: left; padding: 12px; background: var(--blue); font-size: 11px; font-weight: 900; color: white; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; font-weight: 700; }
        
        .lin-badge { background: var(--gold); color: var(--blue); padding: 4px 8px; border-radius: 4px; font-weight: 900; }
        .photo-circle { width: 40px; height: 40px; background: #ddd; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #777; border: 2px solid var(--blue); }
        
        .btn-edit { background: var(--blue); color: white; border: none; padding: 6px 10px; border-radius: 4px; font-size: 10px; font-weight: 800; cursor: pointer; margin-right: 5px; }
        .btn-delete { background: var(--red); color: white; border: none; padding: 6px 10px; border-radius: 4px; font-size: 10px; font-weight: 800; cursor: pointer; }

        .btn-main { width: 100%; background: var(--blue); color: white; padding: 18px; border: none; border-radius: 10px; font-size: 15px; font-weight: 900; cursor: pointer; }
        input, select { width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 10px; margin-bottom: 12px; font-size: 15px; font-weight: 600; box-sizing: border-box; }
        label { font-weight: 900; font-size: 12px; color: var(--blue); text-transform: uppercase; display: block; margin-bottom: 4px; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="mainApp">
    <div class="header">
        <div><b id="headerSchoolName">PROGRESSIVE MOTHERS</b><br><span style="font-size:10px; color:var(--gold); font-weight: 800;">EUDES MEDIA MASTER PANEL</span></div>
        <button onclick="location.reload()" style="background:var(--red); color:white; border:none; padding:8px 12px; border-radius:6px; font-weight:900;">LOGOUT</button>
    </div>
    
    <div class="hero"><div id="clock">00:00:00</div></div>
    
    <div class="dashboard">
        <div class="stat-card"><span class="stat-val" id="c-tot">0</span><span class="stat-lbl">Pupils</span></div>
        <div class="stat-card"><span class="stat-val" id="c-paid" style="color:var(--green)">0</span><span class="stat-lbl">Paid (UGX)</span></div>
        <div class="stat-card"><span class="stat-val" id="c-debt" style="color:var(--red)">0</span><span class="stat-lbl">Debt (UGX)</span></div>
    </div>

    <div class="nav-tabs">
        <div class="tab active" id="t-rec" onclick="tab('rec')">Student Ledger</div>
        <div class="tab" id="t-adm" onclick="tab('adm')">Admission</div>
    </div>

    <div id="v-rec" class="p-view">
        <div class="search-container">
            <input type="text" id="searchBar" class="search-bar" placeholder="🔍 Search Name or LIN..." oninput="renderUI()">
        </div>
        <div class="scroll-box">
            <table>
                <thead>
                    <tr>
                        <th>LIN</th>
                        <th>Photo</th>
                        <th>Name (Alphabetical)</th>
                        <th>Class</th>
                        <th>Paid</th>
                        <th>Debt</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="v-adm" class="hidden p-view">
        <div class="card">
            <h3 style="color:var(--blue); margin-top:0;">NEW ADMISSION</h3>
            <label>Full Name</label><input id="name" placeholder="John Doe">
            <label>Class</label>
            <select id="cls">
                <option>Baby Class</option><option>Middle Class</option><option>Top Class</option>
                <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                <option>P.5</option><option>P.6</option><option>P.7</option>
            </select>
            <label>Expected Fees</label><input id="f_exp" type="number" value="0">
            <label>Amount Paid</label><input id="f_paid" type="number" value="0">
            <label>Contact</label><input id="contact" placeholder="+256...">
            <button onclick="submitData()" class="btn-main" id="saveBtn">SAVE RECORD</button>
        </div>
    </div>
</div>

<script>
    const SUPA_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
    const _client = supabase.createClient(SUPA_URL, SUPA_KEY);
    let cachedData = [];
    window.currentSchool = {id: 1, school_name: "Progressive Mothers", brand_color: "#002d5b"};

    async function init() {
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
        await loadData();
    }

    async function loadData() {
        const { data } = await _client.from('students').select('*').eq('school_id', window.currentSchool.id).order('name', { ascending: true });
        if(data) { cachedData = data; renderUI(); }
    }

    function renderUI() {
        const body = document.getElementById('tableBody');
        const searchQ = document.getElementById('searchBar').value.toLowerCase();
        body.innerHTML = "";
        
        let tPaid = 0, tDebt = 0;

        cachedData.filter(s => s.name.toLowerCase().includes(searchQ)).forEach((s, index) => {
            const exp = parseInt(s.fees_expected || 0), paid = parseInt(s.fees_paid || 0), debt = exp - paid;
            tPaid += paid; tDebt += debt;

            body.innerHTML += `
                <tr>
                    <td><span class="lin-badge">${index + 1}</span></td>
                    <td><div class="photo-circle">NO IMG</div></td>
                    <td><b style="text-transform:uppercase;">${s.name}</b></td>
                    <td>${s.class || 'N/A'}</td>
                    <td style="color:var(--green)">${paid.toLocaleString()}</td>
                    <td style="color:var(--red)">${debt.toLocaleString()}</td>
                    <td>
                        <button class="btn-edit" onclick="alert('Edit Mode Coming Soon')">EDIT</button>
                        <button class="btn-delete" onclick="deleteRecord('${s.id}')">DEL</button>
                    </td>
                </tr>`;
        });

        document.getElementById('c-tot').innerText = cachedData.length;
        document.getElementById('c-paid').innerText = tPaid.toLocaleString();
        document.getElementById('c-debt').innerText = tDebt.toLocaleString();
    }

    async function deleteRecord(id) {
        if(confirm("Permanently Delete this pupil?")) {
            const { error } = await _client.from('students').delete().eq('id', id);
            if(!error) loadData();
        }
    }

    async function submitData() {
        const payload = {
            school_id: window.currentSchool.id,
            name: document.getElementById('name').value,
            class: document.getElementById('cls').value,
            fees_expected: document.getElementById('f_exp').value,
            fees_paid: document.getElementById('f_paid').value,
            contact: document.getElementById('contact').value
        };
        const { error } = await _client.from('students').insert([payload]);
        if(!error) { alert("SAVED"); loadData(); tab('rec'); }
    }

    function tab(t) { 
        document.querySelectorAll('.p-view').forEach(v => v.classList.add('hidden')); 
        document.getElementById('v-'+t).classList.remove('hidden');
        document.querySelectorAll('.tab').forEach(tb => tb.classList.remove('active'));
        document.getElementById('t-'+t).classList.add('active');
    }

    init();
</script>
</body>
</html>
