<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progressive Mother's School</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --brand: #673ab7; }
        body { font-family: sans-serif; background: #f4f0fa; margin: 0; padding: 0; }
        header { background: var(--brand); color: white; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--brand); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .student-item { padding: 10px; border-bottom: 1px solid #eee; }
        .footer { text-align: center; font-size: 0.8rem; color: #666; padding: 20px; }
    </style>
</head>
<body>

<header>
    <h1>PROGRESSIVE MOTHER’S SCHOOL</h1>
    <p>With God Everything Is Possible</p>
</header>

<div class="container">
    <div class="card">
        <h2 style="color:var(--brand); margin-top:0;">Register Student</h2>
        <div class="grid">
            <input type="text" id="stuName" placeholder="Name">
            <input type="text" id="stuContact" placeholder="Contact">
            <input type="text" id="stuClass" placeholder="Class">
            <input type="text" id="stuAge" placeholder="Age">
            <input type="text" id="stuLoc" placeholder="Location">
            <input type="text" id="stuHealth" placeholder="Health">
        </div>
        <button onclick="register()" id="saveBtn">Save Record</button>
    </div>

    <div class="card">
        <h2 style="color:var(--brand); margin-top:0;">Recent Admissions</h2>
        <div id="studentList">Loading...</div>
    </div>
</div>

<div class="footer">Developed by Eudes Media | +256762992440</div>

<script>
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co"; 
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    const supabase = libSupabase.createClient(SB_URL, SB_KEY);

    async function register() {
        const btn = document.getElementById('saveBtn');
        const data = {
            name: document.getElementById('stuName').value,
            contact: document.getElementById('stuContact').value,
            class: document.getElementById('stuClass').value,
            age: document.getElementById('stuAge').value,
            location: document.getElementById('stuLoc').value,
            health_status: document.getElementById('stuHealth').value,
            lin: "PMS-" + Math.floor(1000 + Math.random() * 9000)
        };
        if(!data.name) return alert("Enter Name");
        btn.innerText = "Saving...";
        const { error } = await supabase.from('students').insert([data]);
        if (error) alert(error.message); else { alert("Saved!"); location.reload(); }
    }

    async function load() {
        const list = document.getElementById('studentList');
        // REMOVED 'order' line to prevent the "Connecting" hang
        const { data, error } = await supabase.from('students').select('*');
        if (error) { list.innerHTML = "Error: " + error.message; return; }
        if (!data || data.length === 0) { list.innerHTML = "No records yet."; return; }
        list.innerHTML = "";
        data.forEach(s => {
            list.innerHTML += `<div class="student-item"><b>${s.name}</b> (${s.class})<br><small>ID: ${s.lin}</small></div>`;
        });
    }
    load();
</script>
</body>
</html>
