<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS CLIENT | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0052cc; --dark: #020617; --bg: #f8fafc; --danger: #ef4444; --success: #22c55e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #1e293b; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* TOP NAV */
        .top-bar { height: 70px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; }
        #live-clock { font-size: 0.7rem; font-weight: 800; color: var(--primary); }

        .wrapper { display: flex; flex: 1; overflow: hidden; }
        
        /* SIDEBAR */
        .sidebar { width: 240px; background: var(--dark); display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; }
        @media (max-width: 1024px) { .sidebar { position: fixed; height: 100%; transform: translateX(-100%); } .sidebar.open { transform: translateX(0); } }
        
        .nav-item { padding: 16px 20px; color: #94a3b8; cursor: pointer; display: flex; align-items: center; font-weight: 700; border: none; background: none; width: 100%; text-align: left; font-size: 0.9rem; }
        .nav-item i { width: 25px; font-size: 1.1rem; }
        .nav-item.active { background: var(--primary); color: white; border-radius: 0 25px 25px 0; margin-right: 10px; }
        
        .content { flex: 1; overflow-y: auto; padding: 20px; }

        /* CARDS & UI */
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 20px; border-radius: 20px; border-bottom: 4px solid var(--primary); text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .stat-card h2 { font-size: 1.5rem; font-weight: 800; }
        .stat-card p { font-size: 0.6rem; font-weight: 800; color: #64748b; text-transform: uppercase; }

        .glass-card { background: white; border-radius: 20px; padding: 20px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .student-item { background: white; padding: 12px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 12px; }
        .st-photo { width: 55px; height: 55px; border-radius: 12px; object-fit: cover; background: #e2e8f0; border: 1px solid #cbd5e1; }
        
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #cbd5e1; margin-bottom: 12px; font-weight: 600; font-size: 0.9rem; }
        .btn-pro { background: var(--primary); color: white; padding: 16px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-pro:active { transform: scale(0.98); }
        
        .hidden { display: none !important; }
        #auth { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="auth">
        <div style="background:white; padding:40px; border-radius:30px; width:100%; max-width:400px; text-align:center;">
            <h1 style="font-weight:900; letter-spacing:-1px;">ESMS <span style="color:var(--primary)">CLIENT</span></h1>
            <p style="font-size:0.7rem; font-weight:800; color:#94a3b8; margin-bottom:25px; letter-spacing:1px;">EUDES MEDIA SOLUTIONS</p>
            <input type="text" id="sch-login" placeholder="ENTER SCHOOL ID" style="text-align:center;">
            <button class="btn-pro" onclick="verify()">ACCESS PORTAL</button>
        </div>
    </div>

    <header class="top-bar">
        <div onclick="document.getElementById('sidebar').classList.toggle('open')" style="cursor:pointer;"><i class="fas fa-bars"></i></div>
        <div style="text-align:center;">
            <img id="logo" style="height:35px; border-radius:5px; margin-bottom:2px;">
            <div id="live-clock">--:--:--</div>
        </div>
        <div style="width:30px;"></div>
    </header>

    <div class="wrapper">
        <aside class="sidebar" id="sidebar">
            <nav style="margin-top:20px;">
                <button class="nav-item active" onclick="nav('dash', this)"><i class="fas fa-house"></i>Dashboard</button>
                <button class="nav-item" onclick="nav('list', this)"><i class="fas fa-users"></i>Student List</button>
                <button class="nav-item" onclick="nav('reg', this)"><i class="fas fa-plus-circle"></i>New Entry</button>
                <button class="nav-item" onclick="nav('fin', this)"><i class="fas fa-money-bill-wave"></i>Finance</button>
                <button class="nav-item" onclick="nav('rep', this)"><i class="fas fa-file-invoice"></i>Report Cards</button>
            </nav>
            <div style="margin-top:auto; padding:20px; text-align:center;">
                <p style="color:#475569; font-size:0.6rem; font-weight:800;">EUDES MEDIA<br>+256762992440</p>
            </div>
        </aside>

        <main class="content">
            <div id="v-dash">
                <div class="stat-grid">
                    <div class="stat-card"><h2><span id="st-count">0</span></h2><p>Total Students</p></div>
                    <div class="stat-card"><h2><span id="st-paid" style="color:var(--success)">0</span></h2><p>Fees Collected</p></div>
                    <div class="stat-card"><h2><span id="st-debt" style="color:var(--danger)">0</span></h2><p>Balance Due</p></div>
                </div>
                <div class="glass-card">
                    <h4 style="font-size:0.7rem; font-weight:900; color:var(--primary);"><i class="fas fa-info-circle"></i> SYSTEM STATUS</h4>
                    <p id="debug-log" style="font-size:0.6rem; font-family:monospace; margin-top:5px;">Connection Active...</p>
                </div>
            </div>

            <div id="v-reg" class="hidden">
                <div class="glass-card">
                    <h3>STUDENT ENROLLMENT</h3>
                    <input type="hidden" id="f-id">
                    <div style="text-align:center; margin-bottom:15px;">
                        <img id="f-preview" class="st-photo" style="width:100px; height:100px; display:none; margin:0 auto 10px;">
                        <input type="file" id="f-file" accept="image/*" onchange="compressPhoto(this)">
                        <input type="hidden" id="f-img">
                    </div>
                    <input type="text" id="f-name" placeholder="Full Student Name">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <input type="number" id="f-age" placeholder="Age">
                        <input type="date" id="f-dob">
                    </div>
                    <select id="f-class">
                        <option>Baby Class</option><option>Middle Class</option><option>Top Class</option>
                        <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                        <option>P.5</option><option>P.6</option><option>P.7</option>
                    </select>
                    <input type="text" id="f-contact" placeholder="Contact (+256...)">
                    <input type="text" id="f-loc" placeholder="Physical Location">
                    <input type="text" id="f-health" placeholder="Health Status">
                    <input type="number" id="f-fees" placeholder="Total Fees for Term">
                    <button id="save-btn" class="btn-pro" onclick="saveStudent()">SECURE SAVE</button>
                </div>
            </div>

            <div id="v-list" class="hidden">
                <div class="glass-card" style="padding:10px;"><input type="text" placeholder="Search by name..." onkeyup="filter(this.value)" style="margin:0;"></div>
                <div id="master-list"></div>
            </div>

            <div id="v-fin" class="hidden"><div id="finance-list"></div></div>

            <div id="v-rep" class="hidden">
                <div class="glass-card">
                    <select id="rep-cls" onchange="loadRepList()"><option value="">Select Class</option></select>
                    <div id="rep-st-list"></div>
                    <div id="g-panel" class="hidden" style="margin-top:20px; border-top:2px solid #eee; padding-top:20px;">
                        <h4 id="g-name" style="color:var(--primary)"></h4>
                        <div id="g-inputs" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;"></div>
                        <div style="background:var(--dark); color:white; padding:20px; border-radius:20px; text-align:center; margin-top:15px;">
                            <h1 id="res-agg">--</h1><p>Aggregates</p>
                            <h4 id="res-div" style="color:var(--success)">--</h4>
                        </div>
                        <button class="btn-pro" onclick="saveReport()" style="margin-top:15px;">SAVE REPORT CARD</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        let db, activeSch, students = [];

        // LIVE CLOCK (Uganda Time)
        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleString('en-GB');
        }, 1000);

        async function verify() {
            const id = document.getElementById('sch-login').value.toUpperCase().trim();
            db = supabase.createClient(SB_URL, SB_KEY);
            const { data } = await db.from('Schools').select('*').eq('sch_id', id).single();
            if(data) {
                activeSch = id;
                document.getElementById('logo').src = data.logo_url;
                document.getElementById('auth').classList.add('hidden');
                refresh();
            } else { alert("ID NOT FOUND"); }
        }

        async function refresh() {
            const { data } = await db.from('Students').select('*').eq('sch_id', activeSch);
            students = data || [];
            updateUI();
        }

        // PHOTO COMPRESSION (Fixed Slowdown)
        function compressPhoto(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 250; canvas.height = 250; // High speed sizing
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, 250, 250);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.6); // 60% quality
                    document.getElementById('f-preview').src = dataUrl;
                    document.getElementById('f-preview').style.display = 'block';
                    document.getElementById('f-img').value = dataUrl;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function saveStudent() {
            const id = document.getElementById('f-id').value;
            const btn = document.getElementById('save-btn');
            btn.innerText = "SAVING..."; btn.disabled = true;

            const payload = {
                sch_id: activeSch, name: document.getElementById('f-name').value.toUpperCase(),
                age: document.getElementById('f-age').value, dob: document.getElementById('f-dob').value,
                class: document.getElementById('f-class').value, contact: document.getElementById('f-contact').value,
                location: document.getElementById('f-loc').value, 
                health_status: document.getElementById('f-health').value, // MATCHED TO TABLE
                total_fees: document.getElementById('f-fees').value, photo_url: document.getElementById('f-img').value
            };

            if(!id) {
                payload.lin = activeSch + "-" + Math.floor(1000 + Math.random()*8999);
                payload.payment_code = "PAY-" + Math.floor(100000 + Math.random()*899999);
            }

            const { error } = id ? await db.from('Students').update(payload).eq('id', id) : await db.from('Students').insert([payload]);
            
            if(!error) {
                alert("SUCCESSFULLY SAVED");
                refresh();
                nav('list');
                // Reset form
                ['f-id','f-name','f-age','f-dob','f-contact','f-loc','f-health','f-fees','f-img'].forEach(f => document.getElementById(f).value="");
                document.getElementById('f-preview').style.display='none';
            } else { alert(error.message); }
            btn.innerText = "SECURE SAVE"; btn.disabled = false;
        }

        function updateUI() {
            let p = 0, t = 0;
            students.forEach(s => { p += Number(s.paid_fees || 0); t += Number(s.total_fees || 0); });
            document.getElementById('st-count').innerText = students.length;
            document.getElementById('st-paid').innerText = p.toLocaleString();
            document.getElementById('st-debt').innerText = (t - p).toLocaleString();
            
            document.getElementById('master-list').innerHTML = students.map(s => `
                <div class="student-item">
                    <img src="${s.photo_url || ''}" class="st-photo">
                    <div style="flex:1"><b>${s.name}</b><br><small>${s.lin} | ${s.class}</small></div>
                    <div style="display:flex; gap:12px;">
                        <i class="fas fa-edit" style="color:var(--primary)" onclick="editS('${s.id}')"></i>
                        <i class="fas fa-trash" style="color:red" onclick="delS('${s.id}')"></i>
                    </div>
                </div>`).join('');

            document.getElementById('finance-list').innerHTML = students.map(s => `
                <div class="student-item">
                    <div style="flex:1"><b>${s.name}</b><br><small>PAY CODE: ${s.payment_code || 'N/A'}</small></div>
                    <div style="text-align:right">
                        <small>Bal: ${(s.total_fees - s.paid_fees).toLocaleString()}</small><br>
                        <input type="number" placeholder="UGX" style="width:80px; margin:0; padding:5px;" onchange="updatePay('${s.id}', this.value)">
                    </div>
                </div>`).join('');

            const cls = [...new Set(students.map(s => s.class))].sort();
            document.getElementById('rep-cls').innerHTML = '<option value="">Class</option>' + cls.map(c => `<option>${c}</option>`).join('');
        }

        async function updatePay(id, val) {
            const s = students.find(x => x.id == id);
            await db.from('Students').update({ paid_fees: Number(s.paid_fees || 0) + Number(val) }).eq('id', id);
            refresh();
        }

        function loadRepList() {
            const cls = document.getElementById('rep-cls').value;
            const filtered = students.filter(s => s.class === cls);
            document.getElementById('rep-st-list').innerHTML = filtered.map(s => `<div class="student-item" onclick="openG('${s.id}')">${s.name}</div>`).join('');
        }

        async function openG(id) {
            currentSid = id; const s = students.find(x => x.id == id);
            document.getElementById('g-panel').classList.remove('hidden');
            document.getElementById('g-name').innerText = s.name;
            const isP = s.class.includes('P.');
            const subs = isP ? ['English', 'Math', 'SST', 'Science'] : ['Literacy', 'Numeracy', 'Reading', 'Drawing'];
            const { data: rep } = await db.from('Reports').select('*').eq('student_id', id).single();
            document.getElementById('g-inputs').innerHTML = subs.map(sub => `
                <div><label style="font-size:0.6rem;">${sub}</label>
                <input type="number" class="mk" data-sub="${sub.toLowerCase()}" value="${rep ? rep[sub.toLowerCase()] || '' : ''}" oninput="calcG()"></div>`).join('');
            if(rep) calcG();
        }

        function calcG() {
            let pts = 0, all = true;
            document.querySelectorAll('.mk').forEach(i => {
                if(!i.value) all = false;
                const m = Number(i.value);
                if(m >= 90) pts += 1; else if(m >= 80) pts += 2; else if(m >= 75) pts += 3;
                else if(m >= 70) pts += 4; else if(m >= 60) pts += 5; else if(m >= 50) pts += 6;
                else if(m >= 45) pts += 7; else if(m >= 40) pts += 8; else pts += 9;
            });
            if(!all) return;
            document.getElementById('res-agg').innerText = pts;
            document.getElementById('res-div').innerText = "DIVISION " + (pts <= 12 ? "1" : pts <= 24 ? "2" : pts <= 28 ? "3" : "U");
        }

        async function saveReport() {
            const m = {}; document.querySelectorAll('.mk').forEach(i => m[i.getAttribute('data-sub')] = Number(i.value));
            await db.from('Reports').upsert({ 
                student_id: currentSid, sch_id: activeSch, ...m, 
                aggregates: parseInt(document.getElementById('res-agg').innerText),
                division: document.getElementById('res-div').innerText
            }, { onConflict: 'student_id' });
            alert("REPORT ARCHIVED");
        }

        function editS(id) {
            const s = students.find(x => x.id == id);
            document.getElementById('f-id').value = s.id;
            document.getElementById('f-name').value = s.name;
            document.getElementById('f-class').value = s.class;
            document.getElementById('f-fees').value = s.total_fees;
            document.getElementById('f-preview').src = s.photo_url || '';
            document.getElementById('f-preview').style.display = s.photo_url ? 'block' : 'none';
            document.getElementById('f-img').value = s.photo_url || '';
            nav('reg');
        }

        async function delS(id) { if(confirm("DELETE PERMANENTLY?")) { await db.from('Students').delete().eq('id', id); refresh(); } }

        function nav(v, b) {
            ['v-dash', 'v-list', 'v-reg', 'v-fin', 'v-rep'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('v-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(b) b.classList.add('active');
            if(window.innerWidth < 1024) document.getElementById('sidebar').classList.remove('open');
        }
    </script>
</body>
</html>
