<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMS Manager | Eudes Media</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #2563eb; --dark-blue: #1e3a8a; --bg: #f1f5f9; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        header { background: var(--dark-blue); color: white; padding: 25px; text-align: center; border-bottom: 5px solid var(--blue); }
        .container { max-width: 600px; margin: -20px auto 0; padding: 0 15px; }
        .card { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* Photo Upload Area */
        .photo-picker { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #eff6ff; border: 2px dashed #bfdbfe; padding: 20px; border-radius: 12px; margin-bottom: 15px; cursor: pointer; text-align: center; }
        #imagePreview { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; display: none; margin-bottom: 10px; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        textarea, .full { grid-column: span 2; }
        
        .btn { padding: 15px; border-radius: 8px; font-weight: 700; cursor: pointer; border: none; width: 100%; margin-top: 10px; }
        .btn-primary { background: var(--blue); color: white; }
        .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }

        .student-item { display: flex; align-items: center; gap: 15px; padding: 15px; border-bottom: 1px solid #f1f5f9; background: white; border-radius: 8px; margin-bottom: 8px; }
        .stu-photo-list { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; background: #eee; }
        
        .footer { text-align: center; padding: 30px; color: #64748b; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size: 1.4rem;">PROGRESSIVE MOTHER’S SCHOOL</h1>
</header>

<div class="container">
    <div class="card">
        <h2 id="formTitle" style="margin-top:0; color:var(--dark-blue); font-size: 1.1rem;">📝 Full Student Registration</h2>
        <input type="hidden" id="editId">
        
        <div class="photo-picker" onclick="document.getElementById('stuPhotoFile').click()">
            <img id="imagePreview" src="">
            <span id="uploadText" style="color:var(--blue); font-weight:bold;">📷 Tap to Take Photo or Select</span>
            <input type="file" id="stuPhotoFile" accept="image/*" style="display:none" onchange="previewImage(this)">
        </div>

        <div class="grid">
            <input type="text" id="stuName" placeholder="Student Name" required>
            <input type="text" id="stuContact" placeholder="Contact Number">
            <input type="text" id="stuClass" placeholder="Class">
            <input type="text" id="stuAge" placeholder="Age">
            <input type="date" id="stuDob">
            <input type="text" id="stuLoc" placeholder="Physical Location" class="full">
            <textarea id="stuHealth" placeholder="Health Status (Allergies, etc.)"></textarea>
            <select id="stuStatus" class="full">
                <option value="Active">Active Student</option>
                <option value="Left">Left School</option>
            </select>
        </div>
        <button class="btn btn-primary" id="saveBtn" onclick="handleSave()">Save Student Record</button>
    </div>

    <div id="studentList">Loading Records...</div>
</div>

<div class="footer">
    Eudes Media<br>
    Contact: +256762992440
</div>

<script>
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co"; 
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let allStudents = [];

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('imagePreview').src = e.target.result;
                document.getElementById('imagePreview').style.display = 'block';
                document.getElementById('uploadText').innerText = "✅ Photo Attached";
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function handleSave() {
        const id = document.getElementById('editId').value;
        const name = document.getElementById('stuName').value.trim();
        const photoFile = document.getElementById('stuPhotoFile').files[0];
        const saveBtn = document.getElementById('saveBtn');

        if (!name) return alert("Please enter the student's name");

        saveBtn.disabled = true;
        saveBtn.innerText = "Saving... Please wait";

        let photoUrl = "";
        
        // 1. UPLOAD PHOTO FIRST
        if (photoFile) {
            const fileName = `photo_${Date.now()}_${name.replace(/\s/g, '_')}`;
            const { data: upData, error: upErr } = await supabaseClient.storage.from('student-photos').upload(fileName, photoFile);
            
            if (upErr) {
                console.error("Photo Error:", upErr);
            } else {
                const { data } = supabaseClient.storage.from('student-photos').getPublicUrl(fileName);
                photoUrl = data.publicUrl;
            }
        }

        // 2. PREPARE DATA
        const studentData = {
            name: name,
            contact: document.getElementById('stuContact').value,
            class: document.getElementById('stuClass').value,
            age: document.getElementById('stuAge').value,
            dob: document.getElementById('stuDob').value,
            location: document.getElementById('stuLoc').value,
            health_status: document.getElementById('stuHealth').value,
            status: document.getElementById('stuStatus').value
        };

        if (photoUrl) studentData.photo_url = photoUrl;

        // 3. SAVE TO DATABASE
        let finalResponse;
        if (id) {
            finalResponse = await supabaseClient.from('students').update(studentData).eq('id', id);
        } else {
            studentData.lin = name.charAt(0).toUpperCase() + "-PMS-" + Math.floor(1000 + Math.random() * 9000);
            finalResponse = await supabaseClient.from('students').insert([studentData]);
        }

        if (finalResponse.error) {
            alert("Database Error: " + finalResponse.error.message);
        } else {
            resetForm();
            loadRecords();
        }

        saveBtn.disabled = false;
        saveBtn.innerText = "Save Student Record";
    }

    async function loadRecords() {
        const { data } = await supabaseClient.from('students').select('*').order('created_at', { ascending: false });
        allStudents = data || [];
        display(allStudents);
    }

    function display(data) {
        const listDiv = document.getElementById('studentList');
        listDiv.innerHTML = "";
        data.forEach(s => {
            const avatar = `https://ui-avatars.com/api/?name=${s.name}&background=2563eb&color=fff`;
            listDiv.innerHTML += `
                <div class="student-item">
                    <img src="${s.photo_url || avatar}" class="stu-photo-list">
                    <div style="flex:1;">
                        <b style="display:block; color:var(--dark-blue);">${s.name}</b>
                        <small>${s.lin} | ${s.class}</small>
                    </div>
                    <button onclick="editRecord('${s.id}')" style="border:none; background:#f59e0b; color:white; padding:5px 10px; border-radius:4px;">Edit</button>
                </div>`;
        });
    }

    function editRecord(id) {
        const s = allStudents.find(x => x.id == id);
        document.getElementById('editId').value = s.id;
        document.getElementById('stuName').value = s.name;
        document.getElementById('stuContact').value = s.contact;
        document.getElementById('stuClass').value = s.class;
        document.getElementById('stuAge').value = s.age;
        document.getElementById('stuDob').value = s.dob;
        document.getElementById('stuLoc').value = s.location;
        document.getElementById('stuHealth').value = s.health_status;
        document.getElementById('stuStatus').value = s.status || 'Active';
        document.getElementById('formTitle').innerText = "✏️ Editing " + s.name;
        window.scrollTo(0,0);
    }

    function resetForm() {
        document.getElementById('editId').value = "";
        document.getElementById('stuName').value = "";
        document.getElementById('stuPhotoFile').value = "";
        document.getElementById('imagePreview').style.display = 'none';
        document.getElementById('uploadText').innerText = "📷 Tap to Take Photo or Select";
        document.getElementById('formTitle').innerText = "📝 Full Student Registration";
    }

    loadRecords();
</script>
</body>
</html>
