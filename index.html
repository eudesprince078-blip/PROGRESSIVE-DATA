<script>
    async function save() {
        const id = document.getElementById('editId').value;
        const btn = document.getElementById('saveBtn');
        
        // Basic data every table has
        const payload = {
            name: document.getElementById('name').value.trim(),
            class: document.getElementById('cl').value,
            contact: document.getElementById('ph').value.trim(),
            fees_balance: parseInt(document.getElementById('fBal').value) || 0,
            payment_code: document.getElementById('payCode').value.trim().toUpperCase()
        };

        // NEW COLUMNS: We wrap these in a try-catch later or only add if Admin
        if (USER_ROLE === "ADMIN") {
            payload.gender = document.getElementById('gender').value;
            // Only set absent_days for NEW students to avoid schema errors on updates
            if (!id) payload.absent_days = 0; 
        }

        btn.innerText = "SAVING...";
        btn.disabled = true;

        try {
            let result;
            if (!id) {
                payload.lin = "PMA-" + Math.floor(1000 + Math.random() * 9000);
                result = await sb.from('students').insert([payload]);
            } else {
                result = await sb.from('students').update(payload).eq('id', id);
            }

            if (result.error) {
                // If it fails because of 'absent_days', try saving without it
                if (result.error.message.includes('absent_days') || result.error.message.includes('gender')) {
                    console.log("Database missing new columns, saving basic info only...");
                    delete payload.absent_days;
                    delete payload.gender;
                    const retry = id ? 
                        await sb.from('students').update(payload).eq('id', id) : 
                        await sb.from('students').insert([payload]);
                    
                    if (retry.error) throw retry.error;
                } else {
                    throw result.error;
                }
            }
            
            alert("Success! Data saved.");
            resetForm();
            refresh();
        } catch (err) {
            alert("Critical Error: " + err.message);
        } finally {
            btn.innerText = "UPDATE SYSTEM";
            btn.disabled = false;
        }
    }
</script>
