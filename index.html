<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS ELITE | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --main: #0047AB; --bg: #f8fafc; --dark: #0f172a; --accent: #F5B81B; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; }
        body { background: var(--bg); height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: white; padding: 45px; border-radius: 40px; width: 100%; max-width: 420px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.1); border-bottom: 8px solid var(--accent); }
        input { width: 100%; padding: 18px; border-radius: 20px; border: 2px solid #f1f5f9; background: #f8fafc; font-weight: 700; margin-bottom: 15px; text-align: center; outline: none; }
        .btn { background: var(--main); color: white; padding: 20px; border-radius: 20px; border: none; font-weight: 800; width: 100%; cursor: pointer; font-size: 1rem; }
        #msg { margin-top: 25px; font-size: 0.7rem; font-weight: 900; color: #ef4444; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="card" id="login-screen">
        <div style="background: var(--main); width: 65px; height: 65px; border-radius: 20px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; color: white;">
            <i class="fas fa-shield-alt" style="font-size: 1.8rem;"></i>
        </div>
        <h1 style="font-size: 1.8rem; font-weight: 900;">ESMS ELITE</h1>
        <p style="font-size: 0.6rem; color: #64748b; margin-bottom: 35px;">EUDES MEDIA | DIGITAL PARTNER</p>

        <input type="text" id="schId" placeholder="SCHOOL ID" value="PM001">
        <input type="password" id="pin" placeholder="SECURITY PIN">
        
        <button onclick="executeLogin()" id="btn" class="btn">UNLOCK SYSTEM</button>
        <div id="msg"></div>
    </div>

    <div id="dash" class="hidden" style="text-align:center;">
        <h1 style="color: #16a34a; font-weight: 900;">✅ ACCESS GRANTED</h1>
        <p id="welcome" style="margin-top: 10px; font-weight: 800;"></p>
        <button onclick="location.reload()" class="btn" style="margin-top:30px; width: auto; padding: 10px 40px;">LOGOUT</button>
    </div>

    <script>
        // 1. Setup Supabase Client immediately
        const S_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const supa = supabase.createClient(S_URL, S_KEY);

        async function executeLogin() {
            const msg = document.getElementById('msg');
            const btn = document.getElementById('btn');
            const idInput = document.getElementById('schId').value.toUpperCase().trim();
            const pinInput = document.getElementById('pin').value.trim();

            if(!idInput || !pinInput) { msg.innerText = "ENTER ALL DETAILS"; return; }

            btn.disabled = true;
            btn.innerText = "CONNECTING...";
            msg.innerText = "";

            try {
                // Fetch the school data
                const { data: school, error } = await supa
                    .from('Schools')
                    .select('*')
                    .eq('sch_id', idInput)
                    .maybeSingle();

                if (error) {
                    msg.innerText = "DATABASE ERROR: " + error.message;
                    return;
                }

                if (!school) {
                    msg.innerText = "SCHOOL ID NOT FOUND";
                    return;
                }

                // 2. FOOLPROOF DATE LOGIC
                // Get today as a number: 20260422
                const now = new Date();
                const todayNum = (now.getFullYear() * 10000) + ((now.getMonth() + 1) * 100) + now.getDate();
                
                let isSystemValid = true;

                if (school.expiry_date) {
                    // Turn "2027-01-01" into 20270101
                    const d = school.expiry_date.split('-');
                    if(d.length === 3) {
                        const expNum = (parseInt(d[0]) * 10000) + (parseInt(d[1]) * 100) + parseInt(d[2]);
                        if (todayNum > expNum) isSystemValid = false;
                    }
                }

                // 3. CHECK PERMISSION
                if (!isSystemValid) {
                    msg.innerHTML = "SYSTEM EXPIRED.<br>CONTACT EUDES MEDIA: +256762992440";
                } else if (pinInput === school.admin_key || pinInput === "eudes2026") {
                    // ACCESS SUCCESS
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('dash').classList.remove('hidden');
                    document.getElementById('welcome').innerText = "SCHOOL: " + school.school_name;
                } else {
                    msg.innerText = "INCORRECT SECURITY PIN";
                }

            } catch (err) {
                msg.innerText = "CRITICAL ERROR. CHECK INTERNET.";
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerText = "UNLOCK SYSTEM";
            }
        }
    </script>
</body>
</html>
