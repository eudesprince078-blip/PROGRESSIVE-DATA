<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PMS V72 PRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f6f9; }
        .header { background: #001a33; color: white; padding: 15px; text-align: center; position: relative; }
        .logout-btn { position: absolute; top: 10px; right: 10px; background: #dc3545; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .tabs { display: flex; background: white; justify-content: space-around; padding: 10px; border-bottom: 1px solid #ddd; }
        .tab { cursor: pointer; font-weight: bold; font-size: 13px; color: #666; }
        .active { color: #004085; border-bottom: 2px solid #004085; }
        .card { background: white; margin: 10px; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .stat { padding: 15px; border-radius: 10px; color: white; font-weight: bold; text-align: center; margin-bottom: 10px; }
        .blue { background: #004085; } .red { background: #dc3545; } .green { background: #28a745; }
        .btn { background: #004085; color: white; padding: 12px; border: none; width: 100%; margin-top: 10px; border-radius: 5px; font-weight: bold; }
        .btn-mark { padding: 10px 15px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .student-item { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .hidden { display: none !important; }
        #routine { font-size: 11px; color: #ffc107; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<div id="loginPage" style="padding: 100px 20px; text-align: center;">
    <h2 style="color:#001a33">PROGRESSIVE PMS</h2>
    <div class="card" style="max-width: 350px; margin: auto;">
        <input id="key" type="password" placeholder="System Key" style="text-align:center;">
        <button onclick="login()" class="btn">LOGIN</button>
    </div>
</div>

<div id="app" class="hidden">
    <div class="header">
        <button class="logout-btn" onclick="location.reload()">LOGOUT</button>
        <h3 style="margin:0;">PROGRESSIVE MOTHERS</h3>
        <div id="time" style="font-size:11px;"></div>
        <div id="routine"></div>
    </div>

    <div class="tabs">
        <div id="tDash" class="tab active" onclick="openTab(event,'dash')">Dashboard</div>
        <div id="tStud" class="tab" onclick="openTab(event,'students')">Students</div>
        <div id="tAtt" class="tab" onclick="openTab(event,'attendance')">Attendance</div>
        <div id="tFin" class="tab" onclick="openTab(event,'finance')">Finance</div>
    </div>

    <div id="dash" class="card"></div>

    <div id="students" class="card hidden">
        <div id="regForm">
            <h4>Register Student</h4>
            <input id="stName" placeholder="Full Name">
            <input id="stLin" placeholder="LIN Number">
            <select id="stGender"><option value="">-- Gender --</option><option>Male</option><option>Female</option></select>
            <select id="stClass">
                <option value="">-- Class --</option>
                <option>Baby</option><option>Middle</option><option>Top</option>
                <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                <option>P.5</option><option>P.6</option><option>P.7</option>
            </select>
            <button onclick="saveStudent()" class="btn">Save to Cloud</button>
        </div>
        <hr>
        <div id="studentListView">
            <input id="stSearch" oninput="render()" placeholder="🔍 Search Name or LIN...">
            <div id="list"></div>
        </div>
    </div>

    <div id="attendance" class="card hidden">
        <label><b>Step 1: Select Class</b></label>
        <select id="attClass" onchange="loadAttendanceList(this.value)">
            <option value="">-- Click to choose class --</option>
            <option>Baby</option><option>Middle</option><option>Top</option>
            <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
            <option>P.5</option><option>P.6</option><option>P.7</option>
        </select>
        <div id="attDisplay" style="margin-top:15px;"></div>
    </div>

    <div id="finance" class="card hidden">
        <div id="finSummary" class="stat red"></div>
        <div id="finList"></div>
    </div>
</div>

<script>
const sb = supabase.createClient("https://kjftrwuucjdnhfwesrup.supabase.co", "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO");
let students = [], attendance = [], ROLE = "";

function login(){
    let k = document.getElementById('key').value.trim().toUpperCase();
    if(k==="JESUS CARES") ROLE="ADMIN";
    else if(k==="DIRECTOR2026") ROLE="DIRECTOR";
    else if(k==="TEACHER256") ROLE="TEACHER";
    else if(k==="FINANCE2026") ROLE="FINANCE";
    else return alert("Wrong Key");

    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');

    if(ROLE==="TEACHER"){
        document.getElementById('tFin').classList.add('hidden');
        document.getElementById('regForm').classList.add('hidden');
        document.getElementById('studentListView').classList.add('hidden'); // Teachers can't see full list
    }
    if(ROLE==="FINANCE") document.getElementById('tAtt').classList.add('hidden');
    if(ROLE==="DIRECTOR") document.getElementById('regForm').classList.add('hidden');

    load();
}

async function load(){
    let {data:st} = await sb.from('students').select('*').order('name', {ascending:true});
    students = st || [];
    let {data:att} = await sb.from('attendance').select('*');
    attendance = att || [];
    
    dashboard();
    render();
    financeView();
}

function dashboard(){
    let boys = students.filter(s=>s.gender==="Male").length;
    let girls = students.filter(s=>s.gender==="Female").length;
    let today = new Date().toISOString().split('T')[0];
    let abs = attendance.filter(a=>a.date===today && a.status==="Absent").length;

    document.getElementById('dash').innerHTML = `
        <div class="stat blue">Total Students: ${students.length}</div>
        <div class="stat green">Boys: ${boys} | Girls: ${girls}</div>
        <div class="stat red">Absent Today: ${abs}</div>
    `;
}

function render(){
    if(ROLE==="TEACHER") return; // Safety check
    let q = document.getElementById('stSearch').value.toUpperCase();
    let h = "";
    students.filter(s=>s.name.toUpperCase().includes(q) || (s.lin && s.lin.includes(q))).forEach(s=>{
        h += `<div class="student-item"><div><b>${s.name}</b><br><small>LIN: ${s.lin||'--'}</small></div></div>`;
    });
    document.getElementById('list').innerHTML = h;
}

function loadAttendanceList(cls){
    if(!cls) return document.getElementById('attDisplay').innerHTML = "";
    let today = new Date().toISOString().split('T')[0];
    let classList = students.filter(s=>s.class === cls);
    let h = `<h4>Roll Call: ${cls}</h4>`;
    
    classList.forEach(s=>{
        let record = attendance.find(a=>a.student_id == s.id && a.date === today);
        let statusText = record ? `<b style="color:${record.status==='Present'?'green':'red'}">${record.status}</b>` : "Not Marked";
        
        h += `<div class="student-item">
            <div>${s.name}<br><small>Status: ${statusText}</small></div>
            <div>
                <button onclick="mark('${s.id}','Present')" class="btn-mark green">✅</button>
                <button onclick="mark('${s.id}','Absent')" class="btn-mark red">❌</button>
            </div>
        </div>`;
    });
    document.getElementById('attDisplay').innerHTML = h;
}

async function mark(id, status){
    let today = new Date().toISOString().split('T')[0];
    // Delete existing record for today if it exists to avoid duplicates
    await sb.from('attendance').delete().match({ student_id: id, date: today });
    // Insert new status
    await sb.from('attendance').insert([{ student_id: id, status: status, date: today }]);
    await load();
    loadAttendanceList(document.getElementById('attClass').value);
}

async function saveStudent(){
    let n = document.getElementById('stName').value;
    let g = document.getElementById('stGender').value;
    let c = document.getElementById('stClass').value;
    if(!n || !g || !c) return alert("Fill Name, Gender, and Class");
    
    await sb.from('students').insert([{ name:n, gender:g, class:c, lin:document.getElementById('stLin').value }]);
    alert("Saved");
    load();
}

function financeView(){
    if(ROLE==="TEACHER") return;
    let debt = students.reduce((a,b)=>a+(b.fees_balance||0), 0);
    document.getElementById('finSummary').innerText = "TOTAL DEBT: UGX " + debt.toLocaleString();
    let h = "";
    students.forEach(s=>{
        h += `<div class="student-item"><span>${s.name}</span><span style="color:red">UGX ${(s.fees_balance||0).toLocaleString()}</span></div>`;
    });
    document.getElementById('finList').innerHTML = h;
}

function openTab(e, id){
    document.querySelectorAll('.card').forEach(c=>c.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    e.currentTarget.classList.add('active');
}

setInterval(()=>{
    let now = new Date();
    document.getElementById('time').innerText = now.toLocaleString();
    let h = now.getHours(), m = now.getMinutes(), time = h*100+m;
    let status = "CLASS TIME";
    if(time>=1030 && time<1100) status = "BREAK TIME";
    else if(time>=1300 && time<1400) status = "LUNCH TIME";
    document.getElementById('routine').innerText = "STATUS: " + status;
},1000);
</script>
</body>
</html>
