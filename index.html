<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROGRESSIVE MOTHERS PMS - V162</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #002b5b; --gold: #ffce00; --red: #ff3b3b; --green: #2ecc71; --gray: #f4f7fa; }
        body { font-family: 'Inter', sans-serif; background: var(--gray); margin: 0; padding-bottom: 100px; color: #333; -webkit-tap-highlight-color: transparent; }
        
        .top-nav { background: #001326; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-weight: 700; position: sticky; top: 0; z-index: 2000; }
        .header { background: linear-gradient(135deg, #001a33, var(--blue)); color: white; padding: 20px 15px 90px; text-align: center; border-bottom: 6px solid var(--gold); border-radius: 0 0 40px 40px; }
        .clock-box { font-size: 42px; font-weight: 900; margin: 5px 0; }
        .activity-banner { font-size: 11px; font-weight: 900; padding: 10px 25px; border-radius: 50px; display: inline-block; border: 2px solid var(--gold); background: rgba(0,0,0,0.4); color: var(--gold); text-transform: uppercase; }

        .dash-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 15px; margin-top: -45px; z-index: 100; position: relative; }
        .dash-card { background: white; padding: 15px 5px; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        .tab-bar { display: flex; background: white; padding: 8px; margin: 20px 15px; border-radius: 15px; gap: 5px; overflow-x: auto; }
        .tab { flex: 1; padding: 12px 5px; font-size: 9px; font-weight: 900; color: #bbb; text-align: center; display: none; cursor: pointer; border-radius: 10px; }
        .tab.active { background: var(--blue); color: white; }

        .list-item { border-left: 6px solid var(--blue); padding: 15px; margin: 10px 15px; background: white; border-radius: 15px; position: relative; border: 1px solid #eee; }
        .list-item b { font-size: 15px; display: block; color: var(--blue); text-transform: uppercase; }
        .lin-tag { font-size: 10px; font-weight: 800; color: #555; background: #eee; padding: 2px 6px; border-radius: 4px; margin: 5px 0; display: inline-block; }
        .contact-row { display: flex; gap: 10px; margin-top: 10px; }
        .action-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; color: white; font-weight: 900; font-size: 11px; display: flex; align-items: center; justify-content: center; gap: 5px; text-decoration: none; }

        .card { background: white; padding: 20px; border-radius: 25px; margin: 15px; border: 1px solid #eee; }
        label { font-size: 10px; font-weight: 800; color: var(--blue); margin-top: 12px; display: block; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; margin-top: 5px; border: 1.5px solid #eee; border-radius: 12px; font-size: 14px; box-sizing: border-box; font-weight: 600; }
        
        .pass-box { position: relative; }
        .pass-box i { position: absolute; right: 15px; top: 18px; color: var(--blue); cursor: pointer; }

        .btn-main { background: var(--blue); color: white; border: none; padding: 16px; width: 100%; border-radius: 15px; font-weight: 900; margin-top: 15px; }
        .hidden { display: none !important; }
        .footer-brand { text-align: center; font-size: 10px; color: #bbb; padding: 30px; font-weight: 800; }
    </style>
</head>
<body>

<div id="loginGate" style="max-width: 340px; margin: 80px auto; text-align: center;">
    <h1 style="color:var(--blue); font-weight:900;">PROGRESSIVE MOTHERS</h1>
    <div class="card">
        <label>SYSTEM ACCESS KEY</label>
        <div class="pass-box">
            <input id="sysKey" type="password" placeholder="••••••••" style="text-align:center;">
            <i class="fa-solid fa-eye" id="toggleEye" onclick="togglePass()"></i>
        </div>
        <button onclick="login()" class="btn-main">LOGIN</button>
    </div>
</div>

<div id="mainApp" class="hidden">
    <div class="top-nav">
        <span id="sysDateDisplay">...</span>
        <button onclick="location.reload()" style="background:var(--red); color:white; border:none; padding:5px 10px; border-radius:5px; font-weight:900;">LOGOUT</button>
    </div>

    <div class="header">
        <div id="clock" class="clock-box">00:00:00</div>
        <div id="activityStatus" class="activity-banner">...</div>
    </div>

    <div class="dash-container">
        <div class="dash-card"><span id="statTotal">0</span><small>TOTAL</small></div>
        <div class="dash-card"><span id="statPres" style="color:var(--green)">0</span><small>PRES</small></div>
        <div class="dash-card"><span id="statAbs" style="color:var(--red)">0</span><small>ABS</small></div>
    </div>

    <div class="tab-bar">
        <div id="tReg" class="tab" onclick="showTab('reg')">ADMISSION</div>
        <div id="tRoll" class="tab" onclick="showTab('roll')">ROLL CALL</div>
        <div id="tRec" class="tab" onclick="showTab('rec')">RECORDS</div>
        <div id="tFin" class="tab" onclick="showTab('fin')">FINANCE</div>
        <div id="tNotif" class="tab" onclick="showTab('notif')">NOTIFS</div>
    </div>

    <div id="secNotif" class="card hidden">
        <h3 style="color:var(--blue); margin:0 0 15px;">ADMIN APPROVALS</h3>
        <div id="notifList"></div>
    </div>

    <div id="searchWrapper" class="hidden" style="padding:0 15px;">
        <input type="text" id="globalSearch" oninput="runGlobalSearch()" placeholder="Search Name or LIN..." style="width:100%; padding:15px; border-radius:15px; border:2px solid #ddd;">
    </div>

    <div id="secReg" class="card hidden">
        <label>LIN (Auto-Generated)</label><input id="fLin" disabled style="background:#f4f4f4; color:var(--blue); font-weight:900;">
        <label>Full Name</label><input id="fName">
        <label>Age</label><input type="number" id="fAge">
        <label>DOB</label><input type="date" id="fDob">
        <label>Location</label><input id="fLoc">
        <label>Health Status</label><input id="fHealth">
        <label>Class</label><select id="fClass"><option>Baby</option><option>Middle</option><option>Top</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
        <label>Parent Contact</label><input id="fCon">
        <label>Total Fees</label><input type="number" id="fExp">
        <label>Amount Paid</label><input type="number" id="fPaid">
        <button id="saveBtn" onclick="saveData()" class="btn-main">SAVE RECORD</button>
    </div>

    <div id="secList" class="hidden"></div>

    <div class="footer-brand">EUDES MEDIA SOLUTIONS | +256762992440</div>
</div>

<script>
    const sb = supabase.createClient("https://kjftrwuucjdnhfwesrup.supabase.co", "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO");
    let ROLE = "", students = [], pendingNotifs = [], activeTab = "";

    function togglePass() {
        const x = document.getElementById("sysKey");
        const eye = document.getElementById("toggleEye");
        if (x.type === "password") { x.type = "text"; eye.className = "fa-solid fa-eye-slash"; }
        else { x.type = "password"; eye.className = "fa-solid fa-eye"; }
    }

    function login() {
        const k = document.getElementById('sysKey').value.trim().toUpperCase();
        if (k === "JESUS CARES") ROLE = "ADMIN";
        else if (k === "FINANCE2026") ROLE = "FINANCE";
        else if (k === "TEACHER256") ROLE = "TEACHER";
        else return alert("Wrong Access Key");
        
        document.getElementById('loginGate').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        
        ['tReg','tRoll','tRec','tFin','tNotif'].forEach(t => { 
            let show = ROLE === "ADMIN";
            if(ROLE === "FINANCE" && (t==="tReg"||t==="tFin")) show = true;
            if(ROLE === "TEACHER" && (t==="tReg"||t==="tRoll")) show = true;
            if(show) document.getElementById(t).style.display="block";
        });
        showTab(ROLE === "ADMIN" ? 'notif' : 'reg');
        fetchData(); setInterval(tick, 1000);
    }

    async function fetchData() {
        const { data } = await sb.from('students').select('*').order('name');
        if(data) { students = data; document.getElementById('statTotal').innerText = data.length; runGlobalSearch(); }
    }

    function tick() {
        const n = new Date();
        document.getElementById('clock').innerText = n.toLocaleTimeString('en-GB');
        document.getElementById('sysDateDisplay').innerText = n.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }).toUpperCase();
        const d = n.getDate(); const m = n.getMonth() + 1;
        const t = n.getHours() * 100 + n.getMinutes();
        let r = "🏫 SCHOOL OPEN";

        if(d===5 && m===4) r = "🐣 HAPPY EASTER 2026";
        else if(d===6 && m===4) r = "🐣 EASTER MONDAY";
        else if(d===1 && m===5) r = "👷 LABOUR DAY";
        else if(d===3 && m===6) r = "⛪ MARTYRS DAY";
        else {
            if(t >= 500 && t < 1030) r = "📚 MORNING LESSONS";
            else if(t >= 1030 && t < 1100) r = "☕ BREAK TIME";
            else if(t >= 1100 && t < 1300) r = "📖 MID-DAY LESSONS";
            else if(t >= 1300 && t < 1400) r = "🍲 LUNCH TIME";
            else if(t >= 1400 && t < 1600) r = "✍️ AFTERNOON CLASSES";
            else if(t >= 1600 && t < 1900) r = "🚿 SHOWER & HOME PREP";
            else if(t >= 1900 && t < 2100) r = "📖 EVENING PREP";
            else if(t >= 2100 || t < 500) r = "💤 SLEEPING TIME";
        }
        document.getElementById('activityStatus').innerText = r;
    }

    function showTab(t) {
        activeTab = t;
        ['tReg','tRoll','tRec','tFin','tNotif'].forEach(id => document.getElementById(id).classList.remove('active'));
        document.getElementById('t'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('active');
        ['secReg','secList','searchWrapper','secNotif'].forEach(id => document.getElementById(id).classList.add('hidden'));

        if(t === 'reg') { document.getElementById('secReg').classList.remove('hidden'); clearForm(); }
        else if(t === 'notif') { document.getElementById('secNotif').classList.remove('hidden'); renderNotifs(); }
        else { document.getElementById('secList').classList.remove('hidden'); document.getElementById('searchWrapper').classList.remove('hidden'); runGlobalSearch(); }
    }

    function runGlobalSearch() {
        const q = document.getElementById('globalSearch').value.toUpperCase();
        const filtered = students.filter(s => s.name.toUpperCase().includes(q) || (s.lin_number||"").includes(q));
        let h = "";
        filtered.forEach(s => {
            const lin = s.lin_number || `PM${s.name.charAt(0).toUpperCase()}${Math.floor(1000+Math.random()*9000)}`;
            const con = s.contact || "No Contact";
            h += `<div class="list-item">
                <b onclick="${ROLE==='ADMIN' ? "setEdit('"+s.id+"')" : "alert('Access Denied')"}">${s.name}</b>
                <span class="lin-tag">LIN: ${lin}</span><br>
                <small>${s.class} | ${s.health_status || 'Good Health'}</small><br>
                <small style="color:var(--blue); font-weight:700;">Parent: ${con}</small>
                <div class="contact-row">
                    <a href="tel:${con}" class="action-btn" style="background:var(--blue)"><i class="fa-solid fa-phone"></i> CALL</a>
                    <a href="https://wa.me/${con.replace(/\D/g,'')}" class="action-btn" style="background:var(--green)"><i class="fa-brands fa-whatsapp"></i> WHATSAPP</a>
                </div>
            </div>`;
        });
        document.getElementById('secList').innerHTML = h || "<p style='text-align:center;padding:20px;'>No students found.</p>";
    }

    async function saveData() {
        const id = document.getElementById('editId').value;
        if(id && ROLE !== "ADMIN") return alert("Only Admin can edit existing students!");
        
        const name = document.getElementById('fName').value;
        const exp = parseInt(document.getElementById('fExp').value) || 0;
        const paid = parseInt(document.getElementById('fPaid').value) || 0;
        const con = document.getElementById('fCon').value;
        
        const row = { name, class: document.getElementById('fClass').value, contact: con, fees_expected: exp, fees_paid: paid, age: document.getElementById('fAge').value, dob: document.getElementById('fDob').value, location: document.getElementById('fLoc').value, health_status: document.getElementById('fHealth').value };
        
        if(!id) row.lin_number = `PM${name.charAt(0).toUpperCase()}${Math.floor(1000+Math.random()*9000)}`;
        
        const { error } = id ? await sb.from('students').update(row).eq('id', id) : await sb.from('students').insert([row]);

        if(!error) {
            const msg = `*PROGRESSIVE MOTHERS*\n*FEE UPDATE*\nStudent: ${name}\nLIN: ${id ? document.getElementById('fLin').value : row.lin_number}\nPaid: ${paid}\nBal: ${exp-paid}\n\n_Eudes Media Solutions_`;
            pendingNotifs.push({ msg, con });
            alert("Record Saved Successfully!");
            fetchData(); clearForm();
        }
    }

    function renderNotifs() {
        let h = "";
        pendingNotifs.forEach((m, i) => {
            h += `<div class="card" style="border-left:8px solid var(--gold);"><pre style="font-size:12px; white-space:pre-wrap;">${m.msg}</pre>
                  <button onclick="window.open('https://wa.me/'+pendingNotifs[${i}].con.replace(/\\D/g,'')+'?text='+encodeURIComponent(pendingNotifs[${i}].msg)); pendingNotifs.splice(${i},1); renderNotifs();" style="padding:10px; background:var(--green); color:white; border:none; border-radius:10px; font-weight:900;">SEND TO PARENT</button>
                  <button onclick="pendingNotifs.splice(${i},1);renderNotifs();" style="padding:10px; background:var(--red); color:white; border:none; border-radius:10px; margin-left:10px; font-weight:900;">DISCARD</button></div>`;
        });
        document.getElementById('notifList').innerHTML = h || "<p style='text-align:center; color:#999;'>No pending approvals.</p>";
    }

    function setEdit(id) {
        const s = students.find(x => x.id == id);
        document.getElementById('fName').value = s.name; document.getElementById('fClass').value = s.class;
        document.getElementById('fCon').value = s.contact; document.getElementById('fExp').value = s.fees_expected;
        document.getElementById('fPaid').value = s.fees_paid; document.getElementById('fLin').value = s.lin_number;
        document.getElementById('fAge').value = s.age; document.getElementById('fDob').value = s.dob;
        document.getElementById('fLoc').value = s.location; document.getElementById('fHealth').value = s.health_status;
        document.getElementById('editId').value = s.id; showTab('reg');
    }
    function clearForm() { ['fName','fCon','fExp','fPaid','fLin','fAge','fDob','fLoc','fHealth'].forEach(f => document.getElementById(f).value=""); document.getElementById('editId').value=""; }
</script>
<input type="hidden" id="editId">
</body>
</html>
