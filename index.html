<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0052cc; --accent: #ff3b30; --success: #34c759; --dark: #020617; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .header { background: white; padding: 20px; border-bottom: 5px solid var(--primary); text-align: center; }
        .view-container { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        .card { background: white; border-radius: 28px; padding: 20px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: white; padding: 15px; border-radius: 20px; text-align: center; border-bottom: 4px solid var(--primary); }

        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #e2e8f0; margin-bottom: 10px; font-weight: 700; }
        .btn-main { background: var(--primary); color: white; padding: 16px; border-radius: 14px; border: none; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; }
        
        .list-item { background: white; padding: 12px; border-radius: 18px; margin-bottom: 10px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 12px; }
        .nav-bar { background: white; height: 75px; border-top: 1px solid #e2e8f0; display: flex; align-items: center; }
        .nav-item { flex: 1; text-align: center; color: #94a3b8; font-size: 0.6rem; font-weight: 800; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.4rem; display: block; }
        .hidden { display: none !important; }
        #auth-gate { position: fixed; inset: 0; background: var(--dark); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="auth-gate">
        <div style="background:white; padding:35px; border-radius:30px; width:100%; max-width:400px; text-align:center;">
            <h1 style="font-weight:900; letter-spacing:-1px;">ESMS <span style="color:var(--primary)">DATA</span></h1>
            <input type="text" id="auth-id" placeholder="SCHOOL ID (PM001)">
            <input type="password" id="auth-key" placeholder="ACCESS KEY">
            <button class="btn-main" onclick="initSession()">CONNECT SYSTEM</button>
        </div>
    </div>

    <header class="header">
        <div id="sch-display" style="font-weight:900; text-transform:uppercase;">...</div>
        <div id="clock" style="font-size:0.75rem; font-weight:800; color:var(--primary);"></div>
    </header>

    <main class="view-container" id="scroller">
        
        <div id="v-dash">
            <div class="stat-grid">
                <div class="stat-card"><h2 id="st-present" style="color:var(--success)">0</h2><small>PRESENT</small></div>
                <div class="stat-card"><h2 id="st-absent" style="color:var(--accent)">0</h2><small>ABSENT</small></div>
            </div>
            <div class="card">
                <h4>QUICK ACTIONS</h4>
                <button class="btn-main" style="background:#25D366; margin-top:10px;" onclick="bulkMsg('WhatsApp')">BULK WHATSAPP</button>
            </div>
        </div>

        <div id="v-list" class="hidden">
            <input type="text" id="search" placeholder="🔍 Search Students..." onkeyup="filterData()" style="border:3px solid var(--primary); position:sticky; top:0; z-index:100;">
            <div id="render-list"></div>
        </div>

        <div id="v-reg" class="hidden">
            <div class="card">
                <h3>REGISTRATION</h3>
                <input type="text" id="f-name" placeholder="Full Name">
                <select id="f-gender"><option>Male</option><option>Female</option></select>
                <input type="number" id="f-age" placeholder="Age">
                <input type="text" id="f-loc" placeholder="Location">
                <input type="text" id="f-health" placeholder="Health Status">
                <input type="number" id="f-total" placeholder="Total Fees (UGX)">
                <button class="btn-main" onclick="saveToCloud()">COMMIT RECORD</button>
            </div>
        </div>

        <div id="v-fin" class="hidden">
            <div class="card"><h3>LEDGER</h3><div id="render-fin"></div></div>
        </div>

    </main>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="nav('dash',this)"><i class="fas fa-chart-pie"></i>DASH</div>
        <div class="nav-item" onclick="nav('list',this)"><i class="fas fa-users"></i>LIST</div>
        <div class="nav-item" onclick="nav('reg',this)"><i class="fas fa-plus-circle"></i>ADD</div>
        <div class="nav-item" onclick="nav('fin',this)"><i class="fas fa-wallet"></i>FEES</div>
    </nav>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        let db, activeSch, students = [];

        async function initSession() {
            const sid = document.getElementById('auth-id').value.toUpperCase().trim();
            const key = document.getElementById('auth-key').value.trim();
            db = supabase.createClient(SB_URL, SB_KEY);
            const { data } = await db.from('Schools').select('*').eq('sch_id', sid).single();
            if(data && (key === data.admin_key || key === data.finance_key || key === data.teacher_key)) {
                activeSch = sid;
                document.getElementById('sch-display').innerText = data.sch_name;
                document.getElementById('auth-gate').classList.add('hidden');
                sync();
            } else { alert("Authentication Failed."); }
        }

        async function sync() {
            const { data } = await db.from('Students').select('*').eq('sch_id', activeSch).order('name', { ascending: true });
            students = data || [];
            updateUI();
        }

        function updateUI() {
            let present = 0, absent = 0;
            students.forEach(s => { s.is_absent ? absent++ : present++; });
            document.getElementById('st-present').innerText = present;
            document.getElementById('st-absent').innerText = absent;

            document.getElementById('render-list').innerHTML = students.map(s => `
                <div class="list-item">
                    <div style="flex:1"><b>${s.name}</b><br><small>${s.gender} | ${s.location}</small></div>
                    <button style="padding:8px; border-radius:8px; border:none; background:${s.is_absent ? 'var(--accent)' : 'var(--success)'}; color:white; font-weight:800;" onclick="markRoll('${s.id}', ${s.is_absent})">
                        ${s.is_absent ? 'ABSENT' : 'PRESENT'}
                    </button>
                </div>`).join('');

            document.getElementById('render-fin').innerHTML = students.map(s => `
                <div class="list-item">
                    <div style="flex:1"><b>${s.name}</b><br><small>Bal: ${(s.total_fees - (s.fees_paid||0)).toLocaleString()}</small></div>
                    <input type="number" placeholder="Amt" style="width:100px; margin:0;" onchange="commitFees('${s.id}', this.value)">
                </div>`).join('');
        }

        // MATCHED COLUMN: fees_paid
        async function commitFees(id, val) {
            const s = students.find(x => x.id == id);
            const total = Number(s.fees_paid || 0) + Number(val);
            const { error } = await db.from('Students').update({ fees_paid: total }).eq('id', id);
            if(!error) { alert("Fees Saved to Database"); sync(); }
        }

        // MATCHED COLUMN: is_absent
        async function markRoll(id, currentStatus) {
            const { error } = await db.from('Students').update({ is_absent: !currentStatus }).eq('id', id);
            if(!error) sync();
        }

        async function saveToCloud() {
            const p = {
                sch_id: activeSch,
                name: document.getElementById('f-name').value.toUpperCase(),
                gender: document.getElementById('f-gender').value,
                age: document.getElementById('f-age').value,
                location: document.getElementById('f-loc').value,
                health_status: document.getElementById('f-health').value,
                total_fees: document.getElementById('f-total').value,
                is_absent: false
            };
            const { error } = await db.from('Students').insert([p]);
            if(!error) { alert("Record Created"); sync(); nav('list'); }
        }

        function filterData() {
            const q = document.getElementById('search').value.toUpperCase();
            const filt = students.filter(s => s.name.includes(q) || s.location.toUpperCase().includes(q));
            // Update the display for list...
        }

        function nav(v, b) {
            ['v-dash','v-list','v-reg','v-fin'].forEach(x => document.getElementById(x).classList.add('hidden'));
            document.getElementById('v-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(b) b.classList.add('active');
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString().toUpperCase(); }, 1000);
    </script>
</body>
</html>
