<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PMS V84 DATABASE STABLE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #002b5b; --secondary: #005bc5; --accent: #b87333; --danger: #ff3b3b; --success: #00c851; --bg: #f4f7fa; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        
        .app-bar { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 45px 20px; text-align: center; border-radius: 0 0 40px 40px; position: relative; }
        .logout-pill { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 20px; font-size: 10px; color: white; border: none; font-weight: 800; cursor: pointer; }

        .nav-dock { display: flex; justify-content: space-around; background: white; margin: -20px 25px 0; padding: 12px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); position: sticky; top: 10px; z-index: 1000; }
        .nav-item { font-size: 10px; font-weight: 800; color: #aaa; cursor: pointer; padding: 10px; border-radius: 12px; text-transform: uppercase; }
        .nav-item.active { background: var(--primary); color: white; box-shadow: 0 5px 15px rgba(0,43,91,0.3); }

        .card { background: white; margin: 15px 20px; padding: 22px; border-radius: 28px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); border: 1px solid #f0f0f0; }
        input, select, textarea { width: 100%; padding: 15px; margin-top: 10px; border: 1.5px solid #eee; border-radius: 18px; box-sizing: border-box; font-size: 14px; background: #fafafa; }
        
        .pass-container { position: relative; }
        .pass-toggle { position: absolute; right: 15px; top: 28px; color: #999; cursor: pointer; font-size: 18px; }

        .list-item { background: white; padding: 20px; border-radius: 25px; margin: 0 20px 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 18px; width: 100%; border-radius: 20px; font-weight: 800; margin-top: 15px; cursor: pointer; }
        
        .btn-mark { border: none; width: 50px; height: 50px; border-radius: 15px; color: white; font-weight: 900; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .btn-p { background: var(--success); box-shadow: 0 5px 12px rgba(0,200,81,0.2); }
        .btn-a { background: var(--danger); box-shadow: 0 5px 12px rgba(255,59,59,0.2); }
        .loading-spin { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loginPage" style="padding: 100px 30px; text-align: center;">
    <h1 style="color:var(--primary); font-weight: 900; margin-bottom:5px;">PROGRESSIVE MOTHERS</h1>
    <p style="font-size: 12px; color: #888; font-weight: 700;">SYSTEM COMMAND CENTER</p>
    <div class="card" style="max-width: 350px; margin: 40px auto; padding: 35px;">
        <div class="pass-container">
            <input id="key" type="password" placeholder="System Key" style="text-align:center;">
            <i class="fa-solid fa-eye pass-toggle" id="toggleEye" onclick="togglePass()"></i>
        </div>
        <button onclick="login()" class="btn-main">SECURE LOGIN</button>
    </div>
</div>

<div id="app" class="hidden">
    <div class="app-bar">
        <button class="logout-pill" onclick="location.reload()">LOGOUT</button>
        <h3 style="margin:0; font-weight: 900;">PROGRESSIVE MOTHERS</h3>
        <div id="liveClock" style="font-size: 10px; margin-top: 8px; font-weight: bold;"></div>
    </div>

    <div class="nav-dock">
        <div id="nDash" class="nav-item active" onclick="tab(event,'dash')">DASH</div>
        <div id="nStud" class="nav-item" onclick="tab(event,'stud')">STUDENTS</div>
        <div id="nAtt" class="nav-item" onclick="tab(event,'att')">ROLLCALL</div>
        <div id="nFin" class="nav-item" onclick="tab(event,'fin')">FINANCE</div>
    </div>

    <div id="dash">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; padding:20px;">
            <div class="card" style="margin:0; text-align:center;"><small>Total Students</small><div id="dTotal" style="font-size:26px; font-weight:900; color:var(--primary)">0</div></div>
            <div class="card" style="margin:0; text-align:center;"><small>Absent Today</small><div id="dAbs" style="font-size:26px; font-weight:900; color:var(--danger)">0</div></div>
        </div>
    </div>

    <div id="stud" class="hidden">
        <div id="regForm" class="card">
            <h4 style="margin:0; color: var(--primary);">Student Enrollment</h4>
            <input id="stName" placeholder="Full Name">
            <div style="display:flex; gap:10px;">
                <input id="stAge" type="number" placeholder="Age">
                <select id="stYear"><option>2026</option><option>2027</option><option>2028</option></select>
            </div>
            <select id="stClass">
                <option value="">Select Class</option>
                <option>Baby</option><option>Middle</option><option>Top</option>
                <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option>
            </select>
            <input id="stContact" placeholder="Contact">
            <input id="stLocation" placeholder="Location">
            <textarea id="stHealth" placeholder="Health Info"></textarea>
            <button onclick="registerStudent()" class="btn-main">SAVE STUDENT</button>
        </div>
        <div style="padding:0 20px;">
            <input id="search" oninput="renderList()" placeholder="🔍 Search Students...">
            <div id="studentList" style="margin-top:15px;"></div>
        </div>
    </div>

    <div id="att" class="hidden" style="padding:20px;">
        <select id="attCls" onchange="renderAttendance(this.value)" style="border: 2px solid var(--primary);">
            <option value="">-- Choose Class for Rollcall --</option>
            <option>Baby</option><option>Middle</option><option>Top</option>
            <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option>
        </select>
        <div id="attBox" style="margin-top:20px;"></div>
    </div>

    <div id="fin" class="hidden" style="padding:20px;"><div id="finBox"></div></div>
</div>

<script>
    const sb = supabase.createClient("https://kjftrwuucjdnhfwesrup.supabase.co", "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO");
    let students = [], attendance = [], ROLE = "";

    function togglePass() {
        const input = document.getElementById('key');
        const eye = document.getElementById('toggleEye');
        if (input.type === "password") { input.type = "text"; eye.classList.replace('fa-eye', 'fa-eye-slash'); }
        else { input.type = "password"; eye.classList.replace('fa-eye-slash', 'fa-eye'); }
    }

    function login(){
        let k = document.getElementById('key').value.trim().toUpperCase();
        if(k==="JESUS CARES") ROLE="ADMIN";
        else if(k==="FINANCE2026") ROLE="FINANCE";
        else if(k==="TEACHER256") ROLE="TEACHER";
        else return alert("Invalid Key");
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        if(ROLE !== 'ADMIN') document.getElementById('regForm').classList.add('hidden');
        loadData();
    }

    async function loadData(){
        let {data:st} = await sb.from('students').select('*').order('name');
        students = st || [];
        let {data:att} = await sb.from('attendance').select('*').eq('date', new Date().toISOString().split('T')[0]);
        attendance = att || [];
        renderList();
        document.getElementById('dTotal').innerText = students.length;
        document.getElementById('dAbs').innerText = attendance.filter(a=>a.status==='Absent').length;
    }

    async function registerStudent(){
        let name = document.getElementById('stName').value;
        let yr = document.getElementById('stYear').value;
        if(!name || !stClass.value) return alert("Missing Info");
        let lin = `PM-${yr}-${name.charAt(0).toUpperCase()}${Math.floor(1000 + Math.random() * 9000)}`;
        const { error } = await sb.from('students').insert([{
            name, lin, age: stAge.value, year: yr, class: stClass.value, 
            contact: stContact.value, location: stLocation.value, health_status: stHealth.value
        }]);
        if(!error) { alert("Saved: " + lin); loadData(); document.getElementById('stName').value=""; }
    }

    function renderList(){
        let q = search.value.toUpperCase();
        let h = "";
        students.filter(s => s.name.toUpperCase().includes(q)).forEach(s => {
            h += `<div class="list-item">
                <div><b>${s.name}</b><br><small>${s.class}</small></div>
                ${ROLE==='ADMIN' ? `<button onclick="alert('LIN: ${s.lin}\\nContact: ${s.contact}\\nLocation: ${s.location}')" style="background:#eee; border:none; padding:10px; border-radius:10px; font-size:10px;">INFO</button>` : ''}
            </div>`;
        });
        document.getElementById('studentList').innerHTML = h;
    }

    function renderAttendance(cls){
        if(!cls) return document.getElementById('attBox').innerHTML = "";
        let h = `<h4 style="color:var(--primary)">Class List: ${cls}</h4>`;
        students.filter(s => s.class === cls).forEach(s => {
            let record = attendance.find(a => a.student_id == s.id);
            let status = record ? record.status : "Pending";
            let color = status === "Present" ? "var(--success)" : (status === "Absent" ? "var(--danger)" : "#ccc");
            h += `<div class="list-item">
                <div><b>${s.name}</b><br><small id="stat-${s.id}" style="color:${color}; font-weight:900;">${status}</small></div>
                <div style="display:flex; gap:10px;">
                    <button id="p-${s.id}" onclick="markAttendance('${s.id}','Present')" class="btn-mark btn-p">P</button>
                    <button id="a-${s.id}" onclick="markAttendance('${s.id}','Absent')" class="btn-mark btn-a">A</button>
                </div>
            </div>`;
        });
        document.getElementById('attBox').innerHTML = h;
    }

    async function markAttendance(id, status){
        let btn = status === 'Present' ? document.getElementById(`p-${id}`) : document.getElementById(`a-${id}`);
        let old = btn.innerText; btn.innerHTML = `<i class="fa-solid fa-spinner loading-spin"></i>`;
        let today = new Date().toISOString().split('T')[0];
        
        // Use UPSERT to prevent database double-entry errors
        const { error } = await sb.from('attendance').upsert({ student_id: id, status: status, date: today }, { onConflict: 'student_id,date' });

        if(!error) {
            btn.innerText = old;
            document.getElementById(`stat-${id}`).innerText = status;
            document.getElementById(`stat-${id}`).style.color = status === 'Present' ? 'var(--success)' : 'var(--danger)';
            loadData();
        } else {
            alert("Database Error: Check connection or table permissions.");
            btn.innerText = old;
        }
    }

    function tab(e, id){
        ['dash','stud','att','fin'].forEach(t => document.getElementById(t).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        e.currentTarget.classList.add('active');
    }

    setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleString().toUpperCase(); }, 1000);
</script>
</body>
</html>
