<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS Premium | Eudes Media</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0047AB; --sidebar: #0f172a; --bg: #f8fafc; --white: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; text-transform: uppercase; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; color: #1e293b; overflow-x: hidden; }

        /* HEADER & CLOCK */
        .header-bar { background: var(--white); padding: 20px; border-bottom: 2px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1001; }
        .clock-section { text-align: right; }
        #live-clock { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin: 0; }
        #live-date { font-size: 0.7rem; font-weight: 600; color: #64748b; margin: 0; }

        /* DASHBOARD ELEMENTS */
        .main { padding: 25px; max-width: 1200px; margin: 0 auto; }
        .stat-banner { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--white); padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .stat-card b { font-size: 1.8rem; display: block; color: var(--sidebar); }
        .stat-card span { font-size: 0.65rem; color: #94a3b8; font-weight: 800; }

        /* ENROLLMENT FORM */
        .registration-box { background: var(--white); padding: 25px; border-radius: 20px; border: 1px solid #e2e8f0; margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #cbd5e1; font-weight: 600; font-family: inherit; font-size: 0.85rem; background: #fcfcfc; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 10px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 15px; }

        /* TABLE DESIGN */
        .table-container { background: white; border-radius: 20px; border: 1px solid #e2e8f0; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .scroll-area { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #f1f5f9; padding: 18px 15px; text-align: left; font-size: 0.7rem; color: #475569; border-bottom: 1px solid #e2e8f0; }
        td { padding: 18px 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.8rem; font-weight: 600; }
        
        .lin-cell { font-weight: 800; color: #94a3b8; width: 50px; }
        .name-cell { color: var(--primary); font-weight: 800; }
        .badge { padding: 5px 10px; border-radius: 8px; font-size: 0.65rem; }
        .bg-green { background: #dcfce7; color: #15803d; }
        .bg-blue { background: #e0f2fe; color: #0369a1; }

        @media (max-width: 600px) {
            .main { padding: 15px; }
            .header-bar { padding: 15px; }
            #live-clock { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <div style="font-weight: 800; color: var(--sidebar); font-size: 1.1rem; border-left: 4px solid var(--primary); padding-left: 10px;">
            EUDES MEDIA <br> <small style="color:var(--primary); font-size:0.6rem;">AUTHORITY HUB</small>
        </div>
        <div class="clock-section">
            <p id="live-clock">00:00:00</p>
            <p id="live-date">LOADING DATE...</p>
        </div>
    </div>

    <main class="main">
        <div id="login-section" class="registration-box" style="max-width:400px; margin: 50px auto; text-align:center;">
            <h2 style="margin-top:0">SYSTEM ACCESS</h2>
            <input type="text" id="loginID" placeholder="SCHOOL ID" style="margin-bottom:10px;">
            <input type="password" id="loginKey" placeholder="ACCESS KEY">
            <button class="btn-add" onclick="doLogin()">AUTHORIZE LOGIN</button>
        </div>

        <div id="dashboard-content" style="display:none;">
            <div class="stat-banner">
                <div class="stat-card"><span id="schoolName">---</span><b>SCHOOL</b></div>
                <div class="stat-card"><span id="pupilCount">0</span><b>PUPILS</b></div>
                <div class="stat-card"><span>STATUS</span><b>ACTIVE</b></div>
            </div>

            <div class="registration-box">
                <h3 style="margin-top:0; color:var(--primary); font-size:0.9rem;">NEW ENROLLMENT</h3>
                <div class="form-grid">
                    <input type="text" id="stuName" placeholder="FULL NAME">
                    <input type="text" id="stuClass" placeholder="CLASS (e.g. P.7)">
                    <input type="number" id="stuAge" placeholder="AGE">
                    <input type="text" id="stuHealth" placeholder="HEALTH STATUS">
                    <input type="number" id="stuTotal" placeholder="TOTAL FEES">
                </div>
                <button class="btn-add" onclick="saveStudent()">REGISTER STUDENT TO SYSTEM</button>
            </div>

            <div class="table-container">
                <div class="scroll-area">
                    <table>
                        <thead>
                            <tr>
                                <th>LIN</th>
                                <th>STUDENT NAME</th>
                                <th>CLASS</th>
                                <th>AGE</th>
                                <th>HEALTH</th>
                                <th>FEES TOTAL</th>
                                <th>PAID</th>
                                <th>BALANCE</th>
                            </tr>
                        </thead>
                        <tbody id="stuTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const _URL = 'https://kjftrwuucjdnhfwesrup.supabase.co'; 
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const supabaseClient = supabase.createClient(_URL, _KEY);
        let activeSchoolID = "";

        // CLOCK LOGIC
        setInterval(() => {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-GB');
            document.getElementById('live-date').innerText = now.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
        }, 1000);

        async function doLogin() {
            const id = document.getElementById('loginID').value.trim().toUpperCase();
            const key = document.getElementById('loginKey').value.trim();
            const { data } = await supabaseClient.from('schools').select('*').eq('id', id).eq('access_key', key).maybeSingle();

            if (data) {
                activeSchoolID = id;
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('dashboard-content').style.display = 'block';
                document.getElementById('schoolName').innerText = data.school_name;
                loadPupils();
            } else { alert("ACCESS DENIED"); }
        }

        async function loadPupils() {
            const { count, data } = await supabaseClient.from('students')
                .select('*', {count:'exact'}).eq('school_id', activeSchoolID).order('name', {ascending:true});
            
            document.getElementById('pupilCount').innerText = count || 0;
            
            if(data) {
                document.getElementById('stuTable').innerHTML = data.map((s, index) => {
                    const total = s.total_fees || 0;
                    const paid = s.paid_fees || 0;
                    const balance = total - paid;
                    return `
                        <tr>
                            <td class="lin-cell">${index + 1}</td>
                            <td class="name-cell">${s.name}</td>
                            <td><span class="badge bg-blue">${s.class || 'N/A'}</span></td>
                            <td>${s.age || '--'}</td>
                            <td><span class="badge bg-green">${s.health_status || 'GOOD'}</span></td>
                            <td>${total.toLocaleString()}</td>
                            <td style="color:green;">${paid.toLocaleString()}</td>
                            <td style="color:red;">${balance.toLocaleString()}</td>
                        </tr>
                    `;
                }).join('');
            }
        }

        async function saveStudent() {
            const name = document.getElementById('stuName').value;
            const stuClass = document.getElementById('stuClass').value;
            const age = document.getElementById('stuAge').value;
            const health = document.getElementById('stuHealth').value;
            const total = document.getElementById('stuTotal').value;

            if(!name) return alert("NAME REQUIRED");

            const { error } = await supabaseClient.from('students').insert([{
                name: name,
                class: stuClass,
                age: age,
                health_status: health,
                total_fees: total,
                paid_fees: 0,
                school_id: activeSchoolID
            }]);

            if(!error) {
                document.querySelectorAll('.form-grid input').forEach(i => i.value = '');
                loadPupils();
            }
        }
    </script>
</body>
</html>
