<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PMS Professional - Stable</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #0056b3; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; margin: 0; padding: 10px; }
        .box { background: var(--white); padding: 20px; border-radius: 12px; max-width: 1000px; margin: 10px auto; border: 1px solid #ddd; }
        .header { background: var(--blue); color: white; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 15px; }
        label { font-size: 11px; font-weight: bold; color: var(--blue); display: block; margin-bottom: 4px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        .btn { background: var(--blue); color: white; padding: 16px; border: none; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn:disabled { background: #666; cursor: not-allowed; }
        .table-wrap { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 1000px; }
        th { background: #f1f4f9; color: var(--blue); padding: 12px; text-align: left; border-bottom: 2px solid #ddd; font-size: 11px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        .footer { text-align: center; margin-top: 25px; font-size: 12px; font-weight: bold; color: #555; padding: 10px; }
        .hidden { display: none !important; }
        .stat-bar { display: flex; gap: 10px; margin-bottom: 15px; }
        .stat { flex: 1; background: white; padding: 10px; border-radius: 8px; text-align: center; border-bottom: 3px solid var(--blue); }
    </style>
</head>
<body>

<div id="login" class="box" style="max-width:350px; margin-top:80px; text-align:center;">
    <h2 style="color:var(--blue)">PMS ACCESS</h2>
    <input id="u" placeholder="Username">
    <input id="p" type="password" placeholder="Password" style="margin-top:10px;">
    <button onclick="auth()" class="btn" style="margin-top:20px;">LOGIN SYSTEM</button>
</div>

<div id="app" class="hidden">
    <div class="header"><h2>PROGRESSIVE SCHOOL DATA</h2></div>

    <div class="stat-bar">
        <div class="stat"><span>Total</span><br><b id="tCnt">0</b></div>
        <div class="stat"><span>Active</span><br><b id="aCnt" style="color:green">0</b></div>
    </div>

    <div class="box">
        <h3 id="formTitle" style="color:var(--blue); margin-top:0;">Register Pupil</h3>
        <input type="hidden" id="editId">
        <div class="grid">
            <div><label>Full Name</label><input id="name"></div>
            <div><label>Gender</label><select id="gender"><option>Male</option><option>Female</option></select></div>
            <div><label>Age</label><input id="age" type="number"></div>
            <div><label>Contact</label><input id="phone"></div>
            <div><label>Location</label><input id="loc"></div>
            <div><label>Health Status</label><input id="health" value="Good"></div>
            <div><label>Payment Code</label><input id="payCode"></div>
            <div><label>Class</label>
                <select id="class">
                    <option>Baby</option><option>Middle</option><option>Top</option>
                    <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                    <option>P.5</option><option>P.6</option><option>P.7</option>
                </select>
            </div>
            <div><label>Status</label><select id="status"><option value="active">Active</option><option value="left">Left School</option></select></div>
        </div>
        <button onclick="saveRecord()" id="sBtn" class="btn">CONFIRM & SAVE RECORD</button>
        <button onclick="clearForm()" id="cBtn" class="btn hidden" style="background:#666; margin-top:10px;">CANCEL EDIT</button>
    </div>

    <div class="box">
        <input type="text" id="find" onkeyup="search()" placeholder="🔍 Search Name, LIN, or Payment Code...">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>LIN</th><th>NAME</th><th>GENDER</th><th>CLASS</th><th>PAYMENT CODE</th><th>LOCATION</th><th>STATUS</th><th>ACTIONS</th></tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>
    <div class="footer">Eudes Media | +256762992440</div>
</div>

<script>
    const URL = "https://kjftrwuucjdnhfwesrup.supabase.co";
    const KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    let sb = null;
    let students = [];

    function auth() {
        if(document.getElementById('u').value.toUpperCase()==="PROGRESSIVE" && document.getElementById('p').value.toUpperCase()==="JESUS CARES") {
            document.getElementById('login').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            sb = supabase.createClient(URL, KEY);
            refresh();
        } else { alert("Login Failed"); }
    }

    async function refresh() {
        // We order by created_at to ensure we get the latest data correctly
        const { data, error } = await sb.from('students').select('*').order('created_at', { ascending: false });
        if(error) {
            console.error(error);
            alert("Fetch Error: Check your internet or table name.");
            return;
        }
        students = data || [];
        render(students);
        document.getElementById('tCnt').innerText = students.length;
        document.getElementById('aCnt').innerText = students.filter(s => s.status === 'active').length;
    }

    function render(list) {
        let html = "";
        list.forEach(s => {
            html += `<tr>
                <td><b>${s.lin || '---'}</b></td>
                <td>${(s.name || '').toUpperCase()}</td>
                <td>${s.gender || '---'}</td>
                <td>${s.class || '---'}</td>
                <td style="color:var(--blue); font-weight:bold;">${s.payment_code || '---'}</td>
                <td>${s.location || '---'}</td>
                <td style="font-weight:bold; color:${s.status==='active'?'green':'red'}">${(s.status || '---').toUpperCase()}</td>
                <td>
                    <button onclick="startEdit('${s.id}')" style="background:#ffc107; border:none; padding:6px; border-radius:4px; cursor:pointer;">EDIT</button>
                    <button onclick="delRecord('${s.id}', '${s.name}')" style="background:#dc3545; color:white; border:none; padding:6px; border-radius:4px; cursor:pointer;">DEL</button>
                </td>
            </tr>`;
        });
        document.getElementById('tbody').innerHTML = html;
    }

    async function saveRecord() {
        const id = document.getElementById('editId').value;
        const name = document.getElementById('name').value.trim();
        if(!name) return alert("Please enter name");

        const btn = document.getElementById('sBtn');
        btn.disabled = true;
        btn.innerText = "SAVING TO DATABASE...";

        const pupil = {
            name: name, gender: document.getElementById('gender').value,
            age: document.getElementById('age').value, contact: document.getElementById('phone').value,
            location: document.getElementById('loc').value, health_status: document.getElementById('health').value,
            payment_code: document.getElementById('payCode').value,
            class: document.getElementById('class').value, status: document.getElementById('status').value
        };

        try {
            let res;
            if(id) {
                res = await sb.from('students').update(pupil).eq('id', id);
            } else {
                pupil.lin = "PM" + name.charAt(0).toUpperCase() + "-" + Math.floor(1000 + Math.random() * 9000);
                res = await sb.from('students').insert([pupil]);
            }

            if(res.error) throw res.error;

            alert("Successfully Saved!");
            clearForm();
            await refresh();
        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "CONFIRM & SAVE RECORD";
        }
    }

    function startEdit(id) {
        const s = students.find(x => x.id == id);
        if(!s) return;
        document.getElementById('editId').value = s.id;
        document.getElementById('name').value = s.name;
        document.getElementById('gender').value = s.gender || "Male";
        document.getElementById('age').value = s.age;
        document.getElementById('phone').value = s.contact;
        document.getElementById('loc').value = s.location;
        document.getElementById('health').value = s.health_status;
        document.getElementById('payCode').value = s.payment_code || "";
        document.getElementById('class').value = s.class;
        document.getElementById('status').value = s.status || "active";
        
        document.getElementById('formTitle').innerText = "Edit: " + s.name;
        document.getElementById('sBtn').innerText = "UPDATE RECORD";
        document.getElementById('cBtn').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    function clearForm() {
        document.getElementById('editId').value = "";
        document.getElementById('name').value = "";
        document.getElementById('payCode').value = "";
        document.getElementById('formTitle').innerText = "Register Pupil";
        document.getElementById('sBtn').innerText = "CONFIRM & SAVE RECORD";
        document.getElementById('cBtn').classList.add('hidden');
    }

    async function delRecord(id, name) {
        if(confirm("Delete " + name + " permanently?")) {
            const { error } = await sb.from('students').delete().eq('id', id);
            if(error) alert(error.message);
            else refresh();
        }
    }

    function search() {
        const q = document.getElementById('find').value.toUpperCase();
        const f = students.filter(s => 
            (s.name && s.name.toUpperCase().includes(q)) || 
            (s.payment_code && s.payment_code.toUpperCase().includes(q)) ||
            (s.lin && s.lin.toUpperCase().includes(q))
        );
        render(f);
    }
</script>
</body>
</html>
