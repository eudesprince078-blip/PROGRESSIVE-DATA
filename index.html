<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PMS ONLINE SYSTEM</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    :root { --blue: #0056b3; --white: #ffffff; }
    body { font-family: sans-serif; margin: 0; background: #f0f4f8; padding: 10px; }
    .box { background: white; padding: 20px; border-radius: 12px; max-width: 500px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #ccc; }
    input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 15px; }
    button { background: var(--blue); color: white; font-weight: bold; border: none; cursor: pointer; }
    .hidden { display: none; }
    .debug { background: #ffeeee; color: red; font-size: 12px; padding: 10px; margin-top: 10px; border-radius: 5px; border: 1px solid #ffcccc; font-weight: bold; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
    th { background: var(--blue); color: white; padding: 10px; text-align: left; }
    td { border-bottom: 1px solid #ddd; padding: 10px; }
</style>
</head>
<body>

<div id="loginBox" class="box" style="margin-top: 50px;">
    <h2 style="text-align:center; color:var(--blue);">SCHOOL LOGIN</h2>
    <input id="u_id" placeholder="USERNAME (PROGRESSIVE)">
    <input id="p_id" type="password" placeholder="PASSWORD (JESUS CARES)">
    <button onclick="login()">LOGIN SYSTEM</button>
    <p id="l_msg" style="color:red; text-align:center; font-weight:bold;"></p>
    <div style="text-align:center; font-size:12px; margin-top:10px;">Eudes Media | +256762992440</div>
</div>

<div id="mainBox" class="hidden">
    <div class="box" style="max-width: 800px;">
        <h2 style="text-align:center; color:var(--blue);">STUDENT REGISTRATION</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <input id="in_name" placeholder="Full Name">
            <input id="in_age" type="number" placeholder="Age">
            <input id="in_dob" type="date">
            <input id="in_phone" placeholder="Contact Number">
            <input id="in_loc" placeholder="Physical Location">
            <input id="in_pay" placeholder="Payment Code">
            <select id="in_cl"><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
            <select id="in_h"><option value="Good">Health: Good</option><option value="Attention">Attention Required</option></select>
            <select id="in_s"><option value="Active">Status: Active</option><option value="Left">Status: Left</option></select>
        </div>
        <button id="sBtn" onclick="save()">CONFIRM & UPLOAD</button>
        <div id="debugBox" class="debug hidden"></div>
        <hr>
        <div id="list"></div>
        <p style="text-align:center; font-size:12px; font-weight:bold; margin-top:15px;">Developed by Eudes Media | +256762992440</p>
    </div>
</div>

<script>
// Updated with your NEW Publishable Key
const URL = "https://kjftrwuucjdnhfwesrup.supabase.co";
const KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO"; 
const client = supabase.createClient(URL, KEY);

function login() {
    const user = document.getElementById('u_id').value.trim().toUpperCase();
    const pass = document.getElementById('p_id').value.trim().toUpperCase();
    if(user === "PROGRESSIVE" && pass === "JESUS CARES") {
        loginBox.classList.add("hidden"); mainBox.classList.remove("hidden"); load();
    } else { document.getElementById('l_msg').innerText = "ACCESS DENIED"; }
}

async function save() {
    const sName = document.getElementById('in_name').value;
    const debug = document.getElementById('debugBox');
    if(!sName) return alert("Enter Name");
    
    const btn = document.getElementById('sBtn');
    btn.innerText = "⚡ UPLOADING..."; btn.disabled = true;
    debug.classList.add("hidden");

    // LIN: PM + First Letter + 4 Random Numbers [cite: 2026-03-05]
    const lin = "PM" + sName.trim().charAt(0).toUpperCase() + Math.floor(1000 + Math.random() * 9000);

    try {
        const { error } = await client.from('students').insert([{
            name: sName,
            age: document.getElementById('in_age').value,
            dob: document.getElementById('in_dob').value,
            contact: document.getElementById('in_phone').value,
            location: document.getElementById('in_loc').value,
            payment_code: document.getElementById('in_pay').value,
            class: document.getElementById('in_cl').value,
            health_status: document.getElementById('in_h').value,
            status: document.getElementById('in_s').value,
            lin: lin,
            is_active: document.getElementById('in_s').value
        }]);

        if(error) {
            btn.innerText = "CONFIRM & UPLOAD"; btn.disabled = false;
            debug.innerText = "DATABASE ERROR: " + error.message;
            debug.classList.remove("hidden");
        } else {
            alert("✅ SUCCESS! Registered as " + lin);
            location.reload();
        }
    } catch (err) {
        btn.innerText = "CONFIRM & UPLOAD"; btn.disabled = false;
        debug.innerText = "SYSTEM ERROR: " + err.message;
        debug.classList.remove("hidden");
    }
}

async function load() {
    const { data } = await client.from('students').select('*').order('created_at', { ascending: false });
    if(data) {
        let html = "<table><tr><th>LIN</th><th>NAME</th><th>CLASS</th></tr>";
        data.forEach(s => html += `<tr><td>${s.lin}</td><td>${s.name}</td><td>${s.class}</td></tr>`);
        document.getElementById('list').innerHTML = html + "</table>";
    }
}
</script>
</body>
</html>
