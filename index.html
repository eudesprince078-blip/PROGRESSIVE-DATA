<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS ELITE | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0052cc; --dark: #020617; --bg: #f8fafc; --danger: #ef4444; --success: #22c55e; --warning: #f59e0b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #1e293b; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* HEADER & CLOCK */
        .top-bar { height: 75px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; }
        #live-clock { font-size: 0.7rem; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }

        .wrapper { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 250px; background: var(--dark); display: flex; flex-direction: column; transition: 0.3s; }
        @media (max-width: 1024px) { .sidebar { position: fixed; height: 100%; transform: translateX(-100%); z-index: 2000; } .sidebar.open { transform: translateX(0); } }
        
        .nav-item { padding: 18px 25px; color: #94a3b8; cursor: pointer; display: flex; align-items: center; font-weight: 700; border: none; background: none; width: 100%; text-align: left; transition: 0.2s; }
        .nav-item i { width: 25px; }
        .nav-item.active { background: var(--primary); color: white; border-radius: 0 30px 30px 0; margin-right: 10px; }
        
        .content { flex: 1; overflow-y: auto; padding: 25px; }

        /* DASHBOARD CARDS */
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 25px; border-bottom: 5px solid var(--primary); text-align: center; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .stat-card h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 5px; }
        .stat-card p { font-size: 0.65rem; font-weight: 800; color: #64748b; text-transform: uppercase; }

        /* FORMS & LISTS */
        .glass-card { background: white; border-radius: 25px; padding: 25px; border: 1px solid #e2e8f0; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .student-item { background: white; padding: 15px; border-radius: 20px; margin-bottom: 12px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 15px; transition: 0.2s; }
        .student-item:hover { border-color: var(--primary); }
        .st-photo { width: 60px; height: 60px; border-radius: 15px; object-fit: cover; background: #e2e8f0; border: 2px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        input, select { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #cbd5e1; margin-bottom: 15px; font-weight: 600; font-size: 0.95rem; outline: none; }
        input:focus { border-color: var(--primary); }
        .btn-pro { background: var(--primary); color: white; padding: 18px; border-radius: 18px; border: none; font-weight: 800; cursor: pointer; width: 100%; font-size: 1rem; box-shadow: 0 4px 12px rgba(0, 82, 204, 0.3); }
        .btn-pro:disabled { background: #94a3b8; cursor: not-allowed; }
        
        .hidden { display: none !important; }
        #auth { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="auth">
        <div style="background:white; padding:50px; border-radius:40px; width:100%; max-width:420px; text-align:center;">
            <h1 style="font-weight:900; font-size:2rem; letter-spacing:-1px;">ESMS <span style="color:var(--primary)">ELITE</span></h1>
            <p style="font-size:0.75rem; font-weight:800; color:#94a3b8; margin-bottom:30px; letter-spacing:2px;">TENANT INTERFACE</p>
            <input type="text" id="sch-login" placeholder="ENTER SCHOOL ID" style="text-align:center; text-transform:uppercase;">
            <button class="btn-pro" onclick="verify()">AUTHORIZE ACCESS</button>
        </div>
    </div>

    <header class="top-bar">
        <div onclick="document.getElementById('sidebar').classList.toggle('open')" style="cursor:pointer; font-size:1.2rem;"><i class="fas fa-bars-staggered"></i></div>
        <div style="text-align:center;">
            <img id="logo" style="height:40px; border-radius:8px; margin-bottom:2px;">
            <div id="live-clock">Loading Clock...</div>
        </div>
        <div id="sch-name-display" style="font-weight:900; color:var(--dark); font-size:0.8rem;"></div>
    </header>

    <div class="wrapper">
        <aside class="sidebar" id="sidebar">
            <nav style="margin-top:30px;">
                <button class="nav-item active" onclick="nav('dash', this)"><i class="fas fa-grid-2"></i>Dashboard</button>
                <button class="nav-item" onclick="nav('list', this)"><i class="fas fa-user-group"></i>Students</button>
                <button class="nav-item" onclick="nav('reg', this)"><i class="fas fa-user-plus"></i>Enrollment</button>
                <button class="nav-item" onclick="nav('att', this)"><i class="fas fa-calendar-check"></i>Roll Call</button>
                <button class="nav-item" onclick="nav('fin', this)"><i class="fas fa-wallet"></i>Finance</button>
                <button class="nav-item" onclick="nav('rep', this)"><i class="fas fa-file-chart-column"></i>Reports</button>
            </nav>
            <div style="margin-top:auto; padding:20px; border-top:1px solid #1e293b; color:#475569; font-size:0.6rem; font-weight:800; text-align:center;">
                POWERED BY EUDES MEDIA
            </div>
        </aside>

        <main class="content">
            <div id="v-dash">
                <div class="stat-grid">
                    <div class="stat-card"><h2><span id="st-count">0</span></h2><p>Registered Students</p></div>
                    <div class="stat-card"><h2><span id="st-absent">0</span></h2><p>Absent Today</p></div>
                    <div class="stat-card"><h2><span id="st-paid" style="color:var(--success)">0</span></h2><p>Fees Collected</p></div>
                    <div class="stat-card"><h2><span id="st-debt" style="color:var(--danger)">0</span></h2><p>Outstanding Bal</p></div>
                </div>
                <div class="glass-card">
                    <h4 style="font-weight:800; font-size:0.8rem; color:var(--primary); margin-bottom:10px;"><i class="fas fa-signal"></i> SYSTEM LOG</h4>
                    <div id="debug-log" style="font-size:0.65rem; font-family:monospace; color:#64748b; height:60px; overflow-y:auto;">System operational. Awaiting data...</div>
                </div>
            </div>

            <div id="v-reg" class="hidden">
                <div class="glass-card">
                    <h3 style="margin-bottom:20px;">STUDENT ENROLLMENT</h3>
                    <input type="hidden" id="f-id">
                    <div style="text-align:center; margin-bottom:20px;">
                        <img id="f-preview" class="st-photo" style="width:120px; height:120px; display:none; margin:0 auto 15px;">
                        <input type="file" id="f-file" accept="image/*" onchange="processImage(this)">
                        <input type="hidden" id="f-img">
                    </div>
                    <input type="text" id="f-name" placeholder="FULL STUDENT NAME">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                        <input type="number" id="f-age" placeholder="AGE">
                        <input type="date" id="f-dob">
                    </div>
                    <select id="f-class">
                        <option>Baby Class</option><option>Middle Class</option><option>Top Class</option>
                        <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                        <option>P.5</option><option>P.6</option><option>P.7</option>
                    </select>
                    <input type="text" id="f-contact" placeholder="CONTACT NUMBER (+256...)">
                    <input type="text" id="f-loc" placeholder="PHYSICAL LOCATION / RESIDENCE">
                    <input type="text" id="f-health" placeholder="HEALTH STATUS (HEALTH_STATUS)">
                    <input type="number" id="f-fees" placeholder="TERM FEES AMOUNT (UGX)">
                    <button id="save-btn" class="btn-pro" onclick="saveStudent()">COMMIT TO CLOUD</button>
                </div>
            </div>

            <div id="v-list" class="hidden">
                <div class="glass-card" style="padding:10px;"><input type="text" placeholder="Search LIN or Name..." onkeyup="filterList(this.value)" style="margin:0;"></div>
                <div id="master-list"></div>
            </div>

            <div id="v-att" class="hidden">
                <div class="glass-card"><h3>DAILY ROLL CALL</h3><div id="att-list" style="margin-top:15px;"></div></div>
            </div>

            <div id="v-fin" class="hidden">
                <div class="glass-card"><h3>FEES & PAYMENT CODES</h3><div id="finance-list" style="margin-top:15px;"></div></div>
            </div>

            <div id="v-rep" class="hidden">
                <div class="glass-card">
                    <select id="rep-cls" onchange="loadRepList()"><option value="">SELECT CLASS</option></select>
                    <div id="rep-st-list"></div>
                    <div id="g-panel" class="hidden" style="margin-top:25px; border-top:2px dashed #eee; padding-top:25px;">
                        <h4 id="g-name" style="color:var(--primary); font-weight:900;"></h4>
                        <div id="g-inputs" style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:20px;"></div>
                        <div style="background:var(--dark); color:white; padding:25px; border-radius:25px; text-align:center; margin:20px 0;">
                            <h1 id="res-agg">--</h1><p style="font-size:0.7rem; letter-spacing:2px;">AGGREGATES</p>
                            <h4 id="res-div" style="color:var(--success); margin-top:5px;"></h4>
                        </div>
                        <button class="btn-pro" onclick="saveReport()">ARCHIVE REPORT</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        let db, activeSch, students = [], attendance = {};

        // CLOCK
        setInterval(() => {
            const d = new Date();
            document.getElementById('live-clock').innerText = d.toLocaleDateString('en-GB') + ' | ' + d.toLocaleTimeString();
        }, 1000);

        function log(msg) { document.getElementById('debug-log').prepend(msg + " | "); }

        async function verify() {
            const id = document.getElementById('sch-login').value.toUpperCase().trim();
            db = supabase.createClient(SB_URL, SB_KEY);
            const { data, error } = await db.from('Schools').select('*').eq('sch_id', id).single();
            if(data) {
                activeSch = id;
                document.getElementById('logo').src = data.logo_url;
                document.getElementById('sch-name-display').innerText = data.school_name;
                document.getElementById('auth').classList.add('hidden');
                refresh();
            } else { alert("INVALID SCHOOL ID"); }
        }

        async function refresh() {
            const { data } = await db.from('Students').select('*').eq('sch_id', activeSch);
            students = data || [];
            updateStats();
            renderList();
            renderAtt();
            renderFin();
            const cls = [...new Set(students.map(s => s.class))].sort();
            document.getElementById('rep-cls').innerHTML = '<option value="">Class</option>' + cls.map(c => `<option>${c}</option>`).join('');
        }

        function updateStats() {
            let p = 0, t = 0;
            students.forEach(s => { p += Number(s.paid_fees || 0); t += Number(s.total_fees || 0); });
            document.getElementById('st-count').innerText = students.length;
            document.getElementById('st-paid').innerText = p.toLocaleString();
            document.getElementById('st-debt').innerText = (t - p).toLocaleString();
            document.getElementById('st-absent').innerText = Object.values(attendance).filter(a => a === 'absent').length;
        }

        // PHOTO COMPRESSION (STOPS SLOWDOWN)
        function processImage(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 300; canvas.height = 300; // Force small size for speed
                    ctx.drawImage(img, 0, 0, 300, 300);
                    const compressed = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('f-preview').src = compressed;
                    document.getElementById('f-preview').style.display = 'block';
                    document.getElementById('f-img').value = compressed;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function saveStudent() {
            const id = document.getElementById('f-id').value;
            const btn = document.getElementById('save-btn');
            btn.innerText = "UPLOADING..."; btn.disabled = true;

            const payload = {
                sch_id: activeSch, name: document.getElementById('f-name').value.toUpperCase(),
                age: document.getElementById('f-age').value, dob: document.getElementById('f-dob').value,
                class: document.getElementById('f-class').value, contact: document.getElementById('f-contact').value,
                location: document.getElementById('f-loc').value, health_status: document.getElementById('f-health').value,
                total_fees: document.getElementById('f-fees').value, photo_url: document.getElementById('f-img').value
            };

            if(!id) {
                payload.lin = activeSch + "-" + Math.floor(1000 + Math.random()*8999);
                payload.payment_code = "PAY-" + Math.floor(100000 + Math.random()*899999);
            }

            const { error } = id ? await db.from('Students').update(payload).eq('id', id) : await db.from('Students').insert([payload]);
            
            if(!error) { 
                alert("SECURED SUCCESSFULLY"); 
                refresh(); 
                nav('list');
                // Clear form
                ['f-id','f-name','f-age','f-dob','f-contact','f-loc','f-health','f-fees','f-img'].forEach(k => document.getElementById(k).value = "");
                document.getElementById('f-preview').style.display = 'none';
            } else { log("ERR: " + error.message); alert(error.message); }
            btn.innerText = "COMMIT TO CLOUD"; btn.disabled = false;
        }

        function renderList() {
            document.getElementById('master-list').innerHTML = students.map(s => `
                <div class="student-item">
                    <img src="${s.photo_url || ''}" class="st-photo">
                    <div style="flex:1"><b>${s.name}</b><br><small>${s.lin} | ${s.class}</small><br><small style="color:var(--primary)">${s.contact}</small></div>
                    <div style="display:flex; gap:15px; font-size:1.1rem;">
                        <i class="fas fa-edit" style="color:var(--primary); cursor:pointer;" onclick="editS('${s.id}')"></i>
                        <i class="fas fa-trash" style="color:var(--danger); cursor:pointer;" onclick="delS('${s.id}')"></i>
                    </div>
                </div>`).join('');
        }

        function renderAtt() {
            document.getElementById('att-list').innerHTML = students.map(s => `
                <div class="student-item">
                    <div style="flex:1"><b>${s.name}</b></div>
                    <div style="display:flex; gap:8px;">
                        <button onclick="setAtt('${s.id}', 'present', this)" style="padding:8px 12px; border-radius:10px; border:1px solid #eee; font-weight:800; font-size:0.7rem;">PRESENT</button>
                        <button onclick="setAtt('${s.id}', 'absent', this)" style="padding:8px 12px; border-radius:10px; border:1px solid #eee; font-weight:800; font-size:0.7rem;">ABSENT</button>
                    </div>
                </div>`).join('');
        }

        function setAtt(id, status, btn) {
            attendance[id] = status;
            btn.parentElement.querySelectorAll('button').forEach(b => { b.style.background = 'white'; b.style.color = '#1e293b'; });
            btn.style.background = status === 'present' ? 'var(--success)' : 'var(--danger)';
            btn.style.color = 'white';
            updateStats();
        }

        function renderFin() {
            document.getElementById('finance-list').innerHTML = students.map(s => `
                <div class="student-item">
                    <div style="flex:1"><b>${s.name}</b><br><small>PAY CODE: ${s.payment_code || '---'}</small></div>
                    <div style="text-align:right">
                        <small>Bal: ${(s.total_fees - s.paid_fees).toLocaleString()}</small><br>
                        <input type="number" placeholder="ADD UGX" style="width:100px; margin:5px 0 0; padding:8px; font-size:0.7rem;" onchange="updatePay('${s.id}', this.value)">
                    </div>
                </div>`).join('');
        }

        async function updatePay(id, val) {
            const s = students.find(x => x.id == id);
            await db.from('Students').update({ paid_fees: Number(s.paid_fees || 0) + Number(val) }).eq('id', id);
            refresh();
        }

        function loadRepList() {
            const cls = document.getElementById('rep-cls').value;
            const filtered = students.filter(s => s.class === cls);
            document.getElementById('rep-st-list').innerHTML = filtered.map(s => `<div class="student-item" onclick="openG('${s.id}')" style="cursor:pointer;">${s.name} <i class="fas fa-chevron-right" style="margin-left:auto; opacity:0.3;"></i></div>`).join('');
        }

        async function openG(id) {
            currentSid = id; const s = students.find(x => x.id == id);
            document.getElementById('g-panel').classList.remove('hidden');
            document.getElementById('g-name').innerText = s.name;
            const isP = s.class.includes('P.');
            const subs = isP ? ['English', 'Math', 'SST', 'Science'] : ['Literacy', 'Numeracy', 'Reading', 'Drawing'];
            const { data: rep } = await db.from('Reports').select('*').eq('student_id', id).single();
            document.getElementById('g-inputs').innerHTML = subs.map(sub => `
                <div><label style="font-size:0.6rem; font-weight:900;">${sub}</label>
                <input type="number" class="mk" data-sub="${sub.toLowerCase()}" value="${rep ? rep[sub.toLowerCase()] || '' : ''}" oninput="calcG()"></div>`).join('');
            if(rep) calcG();
        }

        function calcG() {
            let pts = 0, all = true;
            document.querySelectorAll('.mk').forEach(i => {
                if(!i.value) all = false;
                const m = Number(i.value);
                if(m >= 90) pts += 1; else if(m >= 80) pts += 2; else if(m >= 75) pts += 3;
                else if(m >= 70) pts += 4; else if(m >= 60) pts += 5; else if(m >= 50) pts += 6;
                else if(m >= 45) pts += 7; else if(m >= 40) pts += 8; else pts += 9;
            });
            if(!all) return;
            document.getElementById('res-agg').innerText = pts;
            document.getElementById('res-div').innerText = "DIV " + (pts <= 12 ? "1" : pts <= 24 ? "2" : pts <= 28 ? "3" : "U");
        }

        async function saveReport() {
            const m = {}; document.querySelectorAll('.mk').forEach(i => m[i.getAttribute('data-sub')] = Number(i.value));
            const { error } = await db.from('Reports').upsert({ 
                student_id: currentSid, sch_id: activeSch, ...m, 
                aggregates: parseInt(document.getElementById('res-agg').innerText),
                division: document.getElementById('res-div').innerText
            }, { onConflict: 'student_id' });
            if(!error) alert("REPORT ARCHIVED");
        }

        function editS(id) {
            const s = students.find(x => x.id == id);
            document.getElementById('f-id').value = s.id;
            document.getElementById('f-name').value = s.name;
            document.getElementById('f-class').value = s.class;
            document.getElementById('f-fees').value = s.total_fees;
            document.getElementById('f-preview').src = s.photo_url || '';
            document.getElementById('f-preview').style.display = s.photo_url ? 'block' : 'none';
            document.getElementById('f-img').value = s.photo_url || '';
            nav('reg');
        }

        async function delS(id) { if(confirm("DELETE STUDENT PERMANENTLY?")) { await db.from('Students').delete().eq('id', id); refresh(); } }

        function nav(v, b) {
            ['v-dash', 'v-list', 'v-reg', 'v-att', 'v-fin', 'v-rep'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('v-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(b) b.classList.add('active');
            if(window.innerWidth < 1024) document.getElementById('sidebar').classList.remove('open');
        }
    </script>
</body>
</html>
