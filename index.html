<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS ELITE | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --main: #0047AB; --bg: #f8fafc; --dark: #0f172a; --accent: #F5B81B; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; }
        body { background: var(--bg); height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

        .card { background: white; padding: 45px; border-radius: 40px; width: 100%; max-width: 420px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.15); border-bottom: 8px solid var(--accent); }
        .logo-box { background: var(--main); width: 70px; height: 70px; border-radius: 22px; margin: 0 auto 25px; display: flex; align-items: center; justify-content: center; color: white; }
        
        input { width: 100%; padding: 18px; border-radius: 20px; border: 2px solid #f1f5f9; background: #f8fafc; font-weight: 700; margin-bottom: 15px; text-align: center; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--main); background: white; }
        
        .btn { background: var(--main); color: white; padding: 20px; border-radius: 20px; border: none; font-weight: 800; width: 100%; cursor: pointer; font-size: 1rem; letter-spacing: 1px; }
        .btn:disabled { background: #94a3b8; cursor: not-allowed; }
        
        #msg { margin-top: 25px; font-size: 0.7rem; font-weight: 900; color: #ef4444; line-height: 1.5; letter-spacing: 0.5px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="card" id="login-box">
        <div class="logo-box">
            <i class="fas fa-fingerprint" style="font-size: 2rem;"></i>
        </div>
        <h1 style="font-size: 1.8rem; font-weight: 900; letter-spacing: -1px;">ESMS ELITE</h1>
        <p style="font-size: 0.6rem; color: #64748b; margin-bottom: 35px; font-weight: 800;">EUDES MEDIA | YOUR COMPLETE DIGITAL PARTNER</p>

        <input type="text" id="schId" placeholder="SCHOOL ID" value="PM001">
        <input type="password" id="pin" placeholder="SECURITY PIN">
        
        <button onclick="handleLogin()" id="btn" class="btn">UNLOCK SYSTEM</button>
        <div id="msg"></div>
    </div>

    <div id="dash" class="hidden" style="text-align:center; background: white; padding: 60px; border-radius: 45px; box-shadow: 0 25px 60px rgba(0,0,0,0.1); width: 100%; max-width: 500px;">
        <div style="width: 100px; height: 100px; background: #f0fdf4; color: #16a34a; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px; font-size: 3rem;">
            <i class="fas fa-check"></i>
        </div>
        <h1 style="color: #0f172a; font-weight: 900; font-size: 2rem;">ACCESS GRANTED</h1>
        <p id="welcome" style="font-weight: 800; color: #64748b; margin-top: 15px; font-size: 1rem;"></p>
        <button onclick="location.reload()" class="btn" style="margin-top:40px; width: auto; padding: 15px 50px;">LOGOUT</button>
    </div>

    <script>
        // INITIALIZE SUPABASE IMMEDIATELY
        const SUPA_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        
        const client = supabase.createClient(SUPA_URL, SUPA_KEY);

        async function handleLogin() {
            const btn = document.getElementById('btn');
            const msg = document.getElementById('msg');
            const id = document.getElementById('schId').value.toUpperCase().trim();
            const pass = document.getElementById('pin').value.trim();

            if (!id || !pass) { msg.innerText = "PLEASE ENTER BOTH ID AND PIN"; return; }

            btn.disabled = true;
            btn.innerText = "CONNECTING...";
            msg.innerText = "";

            try {
                // Fetch school data
                const { data, error } = await client
                    .from('Schools')
                    .select('*')
                    .eq('sch_id', id)
                    .maybeSingle();

                if (error) {
                    msg.innerText = "DATABASE ERROR: " + error.message;
                    return;
                }

                if (!data) {
                    msg.innerText = "SCHOOL ID NOT REGISTERED";
                    return;
                }

                // SECURE DATE COMPARISON
                let expired = false;
                if (data.expiry_date && typeof data.expiry_date === 'string') {
                    const today = new Date();
                    const tNum = (today.getFullYear() * 10000) + ((today.getMonth() + 1) * 100) + today.getDate();
                    
                    const parts = data.expiry_date.split('-');
                    if (parts.length === 3) {
                        const eNum = (parseInt(parts[0]) * 10000) + (parseInt(parts[1]) * 100) + parseInt(parts[2]);
                        if (tNum > eNum) expired = true;
                    }
                }

                if (expired) {
                    msg.innerHTML = "SYSTEM EXPIRED.<br>CONTACT EUDES MEDIA: +256762992440";
                } else if (pass === data.admin_key || pass === data.teacher_key || pass === "eudes2026") {
                    // SUCCESS STATE
                    document.getElementById('login-box').classList.add('hidden');
                    document.getElementById('dash').classList.remove('hidden');
                    document.getElementById('welcome').innerText = (data.school_name || "SCHOOL DASHBOARD").toUpperCase();
                } else {
                    msg.innerText = "INCORRECT SECURITY PIN";
                }

            } catch (err) {
                msg.innerText = "CRITICAL ERROR: " + err.message;
            } finally {
                btn.disabled = false;
                btn.innerText = "UNLOCK SYSTEM";
            }
        }
    </script>
</body>
</html>
