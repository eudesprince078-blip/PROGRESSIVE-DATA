<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROGRESSIVE MOTHERS PMS - V141 MASTER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #002b5b; --gold: #ffce00; --red: #ff3b3b; --green: #2ecc71; --orange: #f39c12; --gray: #f4f7fa; }
        body { font-family: 'Inter', sans-serif; background: var(--gray); margin: 0; padding-bottom: 100px; -webkit-tap-highlight-color: transparent; }
        
        #holidayBanner { background: linear-gradient(90deg, var(--gold), #ffaa00); color: var(--blue); padding: 12px; text-align: center; font-weight: 900; font-size: 13px; display: none; border-bottom: 3px solid #fff; position: sticky; top: 0; z-index: 1001; }

        /* FIXED TOP NAV FOR LOGOUT & DATE */
        .top-nav { background: #001326; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-weight: 700; }
        .logout-link { color: var(--gold); text-decoration: none; border: 1px solid var(--gold); padding: 4px 10px; border-radius: 6px; }

        .header { background: linear-gradient(135deg, #001a33, var(--blue)); color: white; padding: 25px 15px 100px; text-align: center; border-radius: 0 0 50px 50px; border-bottom: 6px solid var(--gold); position: relative; }
        .school-title { font-size: 14px; font-weight: 900; text-transform: uppercase; display: block; margin-bottom: 4px; line-height: 1.2; }
        .school-loc { font-size: 10px; font-weight: 800; color: var(--gold); letter-spacing: 1.5px; display: block; margin-bottom: 15px; }
        .clock-box { font-size: 48px; font-weight: 900; margin: 5px 0; letter-spacing: -1px; }
        
        .activity-banner { font-size: 12px; font-weight: 900; padding: 8px 20px; border-radius: 50px; display: inline-block; border: 2px solid white; text-transform: uppercase; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .act-lessons { background: var(--blue); }
        .act-break { background: var(--orange); }
        .act-arrival { background: var(--green); }
        .act-closed { background: var(--red); }

        .dash-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 15px; margin-top: -60px; position: relative; z-index: 5; }
        .dash-card { background: white; padding: 15px 5px; border-radius: 22px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .dash-card span { display: block; font-size: 22px; font-weight: 900; color: var(--blue); }
        .dash-card small { font-size: 8px; font-weight: 800; color: #999; text-transform: uppercase; }

        .tab-bar { display: flex; justify-content: space-around; background: white; padding: 8px; margin: 25px 15px 15px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .tab { padding: 12px 5px; font-size: 10px; font-weight: 900; color: #bbb; cursor: pointer; text-align: center; flex: 1; display: none; }
        .tab.active { background: var(--blue); color: white; border-radius: 15px; }

        .card { background: white; padding: 22px; border-radius: 28px; margin: 15px; border: 1px solid #eee; }
        label { font-size: 10px; font-weight: 800; color: var(--blue); margin-top: 15px; display: block; text-transform: uppercase; }
        input, select { width: 100%; padding: 15px; margin-top: 5px; border: 1.5px solid #eee; border-radius: 15px; font-weight: 600; box-sizing: border-box; font-size: 14px; outline: none; }
        input:focus { border-color: var(--blue); }
        
        .btn-main { background: var(--blue); color: white; border: none; padding: 18px; width: 100%; border-radius: 18px; font-weight: 900; margin-top: 15px; font-size: 15px; cursor: pointer; }
        .hidden { display: none !important; }
        .footer-brand { text-align: center; font-size: 10px; color: #bbb; font-weight: 800; margin-top: 30px; padding-bottom: 20px; }
    </style>
</head>
<body>

<div id="holidayBanner"></div>

<div id="loginGate" style="padding: 120px 30px; text-align: center;">
    <h2 style="color:var(--blue); font-weight:900;">PROGRESSIVE MOTHERS</h2>
    <div class="card" style="max-width:340px; margin:auto; border: 3px solid var(--blue);">
        <input id="sysKey" type="password" placeholder="ACCESS KEY" style="text-align:center;">
        <button onclick="login()" class="btn-main">LOGIN</button>
    </div>
</div>

<div id="mainApp" class="hidden">
    <div class="top-nav">
        <a href="#" class="logout-link" onclick="location.reload()">LOGOUT</a>
        <div id="currDate">05 APRIL 2026</div>
    </div>

    <div class="header">
        <span class="school-title">PROGRESSIVE MOTHERS NURSERY AND PRIMARY SCHOOL</span>
        <span class="school-loc">GAYAZA-KIJABIJJO</span>
        <div id="clock" class="clock-box">00:00:00</div>
        <div id="activityStatus" class="activity-banner">SYNC...</div>
    </div>

    <div class="dash-container">
        <div class="dash-card"><span id="statTotal">0</span><small>Total</small></div>
        <div class="dash-card"><span id="statPres" style="color:var(--green)">0</span><small>Present</small></div>
        <div class="dash-card"><span id="statAbs" style="color:var(--red)">0</span><small>Absent</small></div>
    </div>

    <div class="tab-bar">
        <div id="tReg" class="tab" onclick="showTab('reg')">ADMISSION</div>
        <div id="tRoll" class="tab" onclick="showTab('roll')">ROLL CALL</div>
        <div id="tRec" class="tab" onclick="showTab('rec')">RECORDS</div>
        <div id="tAbs" class="tab" onclick="showTab('abs')">ABSENTEES</div>
        <div id="tFin" class="tab" onclick="showTab('fin')">FINANCE</div>
    </div>

    <div id="secReg" class="card hidden">
        <h3 id="regTitle" style="margin:0; color:var(--blue);">STUDENT DATA</h3>
        <input type="hidden" id="editId">
        <label>Student Name</label><input id="fName">
        <label>Class</label><select id="fClass"><option value="">-- Pick --</option><option>Baby</option><option>Middle</option><option>Top</option><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select>
        <label>Contact</label><input id="fCon">
        <div id="financePanel" class="hidden">
            <label>Fees Required</label><input type="number" id="fExp" oninput="calcFinance()">
            <label>Amount Paid</label><input type="number" id="fPaid" oninput="calcFinance()">
        </div>
        <button onclick="saveData()" class="btn-main">SAVE RECORD</button>
        <button id="delBtn" onclick="deleteStudent()" class="btn-main hidden" style="background:var(--red)">DELETE</button>
    </div>

    <div id="secRoll" class="hidden"><div id="rollArea"></div></div>
    <div id="secRec" class="hidden"><div class="card"><input type="text" id="search" oninput="renderRec()" placeholder="Search..."></div><div id="recArea"></div></div>
    <div id="secAbs" class="hidden"><div id="absentArea" style="padding:15px;"></div></div>
    <div id="secFin" class="hidden"><div id="finArea"></div></div>

    <div class="footer-brand">EUDES MEDIA SOLUTIONS | +256762992440</div>
</div>

<script>
    const sb = supabase.createClient("https://kjftrwuucjdnhfwesrup.supabase.co", "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO");
    let ROLE = "", students = [], att = {};

    const holidays = {
        "1-1": "HAPPY NEW YEAR!", "1-26": "NRM LIBERATION DAY", "2-16": "ARCHBISHOP JANAN LUWUM DAY",
        "3-8": "INT. WOMEN'S DAY", "4-3": "GOOD FRIDAY", "4-5": "HAPPY EASTER SUNDAY! ✨",
        "4-6": "EASTER MONDAY", "5-1": "LABOUR DAY", "6-3": "MARTYRS' DAY", "6-9": "HEROES' DAY",
        "10-9": "INDEPENDENCE DAY 🇺🇬", "12-25": "MERRY CHRISTMAS!", "12-26": "BOXING DAY"
    };

    function login() {
        const k = document.getElementById('sysKey').value.toUpperCase();
        if (k === "JESUS CARES") ROLE = "ADMIN";
        else if (k === "FINANCE2026") ROLE = "FINANCE";
        else if (k === "TEACHER256") ROLE = "TEACHER";
        else return alert("Invalid Access Key");

        document.getElementById('loginGate').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');

        if (ROLE === "ADMIN") { 
            ['tReg','tRoll','tRec','tAbs','tFin'].forEach(id => document.getElementById(id).style.display = "block"); 
            document.getElementById('financePanel').classList.remove('hidden'); showTab('reg'); 
        } else if (ROLE === "FINANCE") { 
            ['tReg','tFin'].forEach(id => document.getElementById(id).style.display = "block"); 
            document.getElementById('financePanel').classList.remove('hidden'); showTab('fin'); 
        } else { 
            document.getElementById('tRoll').style.display = "block"; showTab('roll'); 
        }

        fetchData(); setInterval(tick, 1000);
    }

    async function fetchData() {
        const { data } = await sb.from('students').select('*').order('name');
        if(data) { students = data; document.getElementById('statTotal').innerText = students.length; renderRec(); renderFinance(); loadRoll(); }
    }

    function tick() {
        const n = new Date();
        const mD = (n.getMonth()+1) + "-" + n.getDate();
        const time = n.getHours() * 100 + n.getMinutes();
        
        document.getElementById('clock').innerText = n.toLocaleTimeString('en-GB');
        document.getElementById('currDate').innerText = n.toLocaleDateString('en-GB', { day:'2-digit', month:'long', year:'numeric' }).toUpperCase();

        const hb = document.getElementById('holidayBanner');
        if(holidays[mD]) { hb.style.display = "block"; hb.innerText = "✨ " + holidays[mD] + " ✨"; } 
        else { hb.style.display = "none"; }

        const el = document.getElementById('activityStatus');
        el.className = 'activity-banner';
        if (time >= 800 && time < 1300) { el.innerText = "📚 LESSONS"; el.classList.add('act-lessons'); }
        else if (time >= 1300 && time < 1400) { el.innerText = "🍲 LUNCH"; el.classList.add('act-break'); }
        else if (time >= 1600 || time < 700) { el.innerText = "🌙 CLOSED"; el.classList.add('act-closed'); }
        else { el.innerText = "📖 SCHOOL OPEN"; el.classList.add('act-arrival'); }
    }

    function showTab(t) {
        ['secReg','secRoll','secRec','secFin','secAbs'].forEach(s => document.getElementById(s).classList.add('hidden'));
        ['tReg','tRoll','tRec','tFin','tAbs'].forEach(s => document.getElementById(s).classList.remove('active'));
        document.getElementById('sec' + t.charAt(0).toUpperCase() + t.slice(1)).classList.remove('hidden');
        document.getElementById('t' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
    }

    async function saveData() {
        const id = document.getElementById('editId').value;
        const row = { name: document.getElementById('fName').value, class: document.getElementById('fClass').value, contact: document.getElementById('fCon').value, fees_expected: parseInt(document.getElementById('fExp').value) || 0, fees_paid: parseInt(document.getElementById('fPaid').value) || 0 };
        if(id) await sb.from('students').update(row).eq('id', id); else await sb.from('students').insert([row]);
        alert("Sync OK."); clearForm(); fetchData();
    }

    function setEdit(id) {
        const s = students.find(x => x.id == id);
        document.getElementById('editId').value = s.id;
        document.getElementById('fName').value = s.name;
        document.getElementById('fClass').value = s.class;
        document.getElementById('fCon').value = s.contact;
        document.getElementById('fExp').value = s.fees_expected || 0;
        document.getElementById('fPaid').value = s.fees_paid || 0;
        if(ROLE === "FINANCE") ['fName','fClass','fCon'].forEach(i => document.getElementById(i).disabled = true);
        showTab('reg'); if(ROLE === "ADMIN") document.getElementById('delBtn').classList.remove('hidden');
    }

    function loadRoll() {
        let h = ""; 
        students.forEach(s => {
            const isAbs = att[s.id] === 'absent';
            h += `<div style="background:white; margin:10px 15px; border-radius:15px; display:flex; justify-content:space-between; align-items:center; padding:15px; box-shadow:0 2px 5px rgba(0,0,0,0.05);"><div><b>${s.name}</b><br><small>${s.class}</small></div><button onclick="toggleAtt('${s.id}')" style="padding:10px 18px; border-radius:12px; border:none; background:${isAbs ? 'var(--red)' : 'var(--green)'}; color:white; font-weight:900;">${isAbs ? 'ABS' : 'PRES'}</button></div>`;
        });
        document.getElementById('rollArea').innerHTML = h || "<p style='text-align:center;'>No Students Loaded</p>";
    }

    function toggleAtt(id) {
        att[id] = (att[id] === 'absent') ? 'present' : 'absent';
        let a = 0; Object.values(att).forEach(v => { if(v === 'absent') a++; });
        document.getElementById('statAbs').innerText = a; document.getElementById('statPres').innerText = students.length - a;
        loadRoll(); renderAbs();
    }

    function renderAbs() {
        let h = ""; students.forEach(s => { if(att[s.id] === 'absent') h += `<div class="card" style="border-left:8px solid var(--red)"><b>${s.name}</b><br><a href="tel:${s.contact}" style="color:var(--green); font-weight:800;">📞 CALL PARENT</a></div>`; });
        document.getElementById('absentArea').innerHTML = h || "<p style='text-align:center;'>Everyone Present</p>";
    }

    function renderFinance() {
        let h = ""; students.forEach(s => {
            const b = (s.fees_expected || 0) - (s.fees_paid || 0);
            h += `<div class="card" onclick="setEdit('${s.id}')" style="border-left:8px solid ${b <= 0 ? 'var(--green)' : 'var(--red)'}"><b>${s.name}</b><br><small>${b <= 0 ? 'PAID' : 'BAL: UGX ' + b.toLocaleString()}</small></div>`;
        });
        document.getElementById('finArea').innerHTML = h;
    }

    function renderRec() {
        const q = document.getElementById('search').value.toUpperCase();
        let h = ""; students.filter(s => s.name.toUpperCase().includes(q)).forEach(s => { h += `<div class="card" onclick="setEdit('${s.id}')"><b>${s.name}</b> <small style="float:right;">${s.class}</small></div>`; });
        document.getElementById('recArea').innerHTML = h;
    }

    function clearForm() { ['fName','fCon','fExp','fPaid','editId'].forEach(i => { document.getElementById(i).value = ""; document.getElementById(i).disabled = false; }); document.getElementById('delBtn').classList.add('hidden'); }
    async function deleteStudent() { if(confirm("Delete?")) { await sb.from('students').delete().eq('id', document.getElementById('editId').value); fetchData(); clearForm(); } }
</script>
</body>
</html>
