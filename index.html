<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progressive Mothers | PMS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --purple: #4c1d95; --gold: #b45309; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 120px; background: #f8fafc; }
        header { background: var(--white); padding: 30px 20px; text-align: center; border-bottom: 4px solid var(--purple); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .motto { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 15px; margin-top: 5px; }
        .container { max-width: 450px; margin: 0 auto; padding: 15px; }
        
        /* Admin UI */
        #adminPanel, .admin-only, #logoutBtn { display: none; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #cbd5e1; box-sizing: border-box; font-size: 14px; }
        .btn-main { background: var(--purple); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; }
        
        /* List UI */
        .student-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; border: 1px solid #e2e8f0; cursor: pointer; position: relative; }
        .student-img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; background: #f1f5f9; }
        .student-details { flex: 1; }
        .student-details b { color: var(--purple); font-size: 15px; }
        .edit-tools { margin-top: 5px; display: flex; gap: 10px; }
        .btn-edit { color: #2563eb; font-size: 11px; font-weight: bold; background: none; border: none; cursor: pointer; padding: 0; }
        .btn-del { color: #dc2626; font-size: 11px; font-weight: bold; background: none; border: none; cursor: pointer; padding: 0; }

        /* ID Modal */
        #idModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; }
        .id-design { width: 300px; background: white; border-radius: 15px; overflow: hidden; text-align: center; border: 1px solid #ddd; }
        .id-header { background: var(--purple); color: white; padding: 15px; }
        .id-photo { width: 90px; height: 90px; border-radius: 50%; border: 4px solid var(--purple); margin-top: -45px; background: white; object-fit: cover; }

        .footer { text-align: center; padding: 20px; font-size: 10px; color: #64748b; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; color: var(--purple); font-size: 1.2rem;">PROGRESSIVE MOTHERS</div>
    <div class="motto">"With God everything is possible"</div>
    <button id="logoutBtn" onclick="logout()" style="margin-top:10px; background:#fee2e2; color:#b91c1c; border:none; padding:5px 15px; border-radius:5px; cursor:pointer; font-weight:bold;">LOGOUT</button>
</header>

<div class="container">
    <div id="loginSection" class="card">
        <h3 style="text-align:center; color:var(--purple); margin-top:0;">Admin Access</h3>
        <input type="password" id="adminPass" placeholder="Enter Password">
        <button class="btn-main" onclick="login()">LOGIN</button>
    </div>

    <div id="adminPanel" class="card">
        <h3 id="formTitle" style="color:var(--purple); margin-top:0;">Register Student</h3>
        <input type="file" id="inpFile" accept="image/*">
        <input type="text" id="inpName" placeholder="Full Name">
        <input type="text" id="inpPhone" placeholder="Parent Contact">
        <div style="display:flex; gap:10px;">
            <input type="date" id="inpDOB" onchange="autoAge()">
            <input type="number" id="inpAge" placeholder="Age" readonly>
        </div>
        <select id="inpClass">
            <option>Baby</option><option>Middle</option><option>Top</option>
            <option>P.1</option><option>P.2</option><option>P.3</option>
            <option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option>
        </select>
        <input type="text" id="inpLoc" placeholder="Location">
        <textarea id="inpHealth" placeholder="Health Notes"></textarea>
        <button class="btn-main" id="btnSave" onclick="saveRecord()">SAVE TO DATABASE</button>
    </div>

    <input type="text" id="search" placeholder="🔍 Search name or class..." onkeyup="filterList()" style="margin-bottom:15px;">
    <div id="studentList">Loading...</div>
</div>

<div id="idModal" onclick="this.style.display='none'">
    <div class="id-design" id="idToPrint" onclick="event.stopPropagation()">
        <div class="id-header">
            <h4 style="margin:0;">PROGRESSIVE MOTHERS</h4>
            <small style="font-size:7px;">With God everything is possible</small>
        </div>
        <div style="height:50px;"></div>
        <div style="padding:15px;">
            <img id="idImg" src="" class="id-photo">
            <h3 id="idNameDisplay" style="margin:10px 0 5px; color:var(--purple);">Name</h3>
            <b id="idLinDisplay" style="color:var(--gold); font-size:12px;">LIN: PM-0000</b>
            <div style="text-align:left; font-size:10px; margin-top:10px; border-top:1px solid #eee; padding-top:10px;">
                <b>CLASS:</b> <span id="idClassDisplay"></span><br>
                <b>HEALTH:</b> <span id="idHealthDisplay"></span>
            </div>
        </div>
        <div style="background:#f8fafc; padding:10px; font-size:7px;">Eudes Media Support: +256762992440</div>
    </div>
    <button class="btn-main" onclick="downloadPDF()" style="width:200px; margin-top:15px; background:#16a34a;">DOWNLOAD PDF</button>
</div>

<div class="footer">
    &copy; 2026 Eudes Media Professional Series
</div>

<script>
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co"; 
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    
    let allStudents = [];
    let currentEditId = null;

    // Persist login state
    if(localStorage.getItem('isLogged') === 'true') { login(true); }

    function login(reloading = false) {
        if(reloading || document.getElementById('adminPass').value === "mothers.comit1") {
            localStorage.setItem('isLogged', 'true');
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('logoutBtn').style.display = 'inline-block';
            document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'block');
            fetchData();
        } else { alert("Access Denied"); }
    }

    function logout() { localStorage.clear(); location.reload(); }

    function autoAge() {
        const dob = new Date(document.getElementById('inpDOB').value);
        document.getElementById('inpAge').value = new Date().getFullYear() - dob.getFullYear();
    }

    async function fetchData() {
        const { data } = await supabaseClient.from('students').select('*').order('name');
        allStudents = data || [];
        renderList(allStudents);
    }

    function renderList(list) {
        const container = document.getElementById('studentList');
        container.innerHTML = "";
        list.forEach(s => {
            container.innerHTML += `
                <div class="student-item" onclick="showID('${s.id}')">
                    <img src="${s.photo_url || 'https://via.placeholder.com/50'}" class="student-img">
                    <div class="student-details">
                        <b>${s.name}</b><br>
                        <small>${s.class} | ${s.lin}</small>
                        <div class="edit-tools">
                            <button class="btn-edit" onclick="startEdit(event, '${s.id}')">Edit</button>
                            <button class="btn-del" onclick="deleteRecord(event, '${s.id}')">Delete</button>
                        </div>
                    </div>
                </div>`;
        });
    }

    function startEdit(event, id) {
        event.stopPropagation(); // Stops the ID card from opening
        const s = allStudents.find(x => x.id === id);
        currentEditId = id;
        document.getElementById('formTitle').innerText = "Editing: " + s.name;
        document.getElementById('inpName').value = s.name;
        document.getElementById('inpPhone').value = s.contact;
        document.getElementById('inpDOB').value = s.dob;
        document.getElementById('inpAge').value = s.age;
        document.getElementById('inpClass').value = s.class;
        document.getElementById('inpLoc').value = s.location;
        document.getElementById('inpHealth').value = s.health_status;
        document.getElementById('btnSave').innerText = "UPDATE RECORD";
        window.scrollTo(0,0);
    }

    async function saveRecord() {
        const file = document.getElementById('inpFile').files[0];
        let photoUrl = "";
        if(file) {
            const fileName = `img_${Date.now()}`;
            const { data, error } = await supabaseClient.storage.from('students photos').upload(fileName, file);
            if(!error) photoUrl = `${SB_URL}/storage/v1/object/public/students%20photos/${fileName}`;
        }

        const studentData = {
            name: document.getElementById('inpName').value,
            contact: document.getElementById('inpPhone').value,
            dob: document.getElementById('inpDOB').value,
            age: document.getElementById('inpAge').value,
            class: document.getElementById('inpClass').value,
            location: document.getElementById('inpLoc').value,
            health_status: document.getElementById('inpHealth').value
        };

        if(currentEditId) {
            if(photoUrl) studentData.photo_url = photoUrl;
            await supabaseClient.from('students').update(studentData).eq('id', currentEditId);
        } else {
            studentData.lin = "PM-" + Math.floor(1000 + Math.random() * 9000);
            studentData.photo_url = photoUrl;
            await supabaseClient.from('students').insert([studentData]);
        }
        location.reload();
    }

    async function deleteRecord(event, id) {
        event.stopPropagation();
        if(confirm("Permanently delete this student?")) {
            await supabaseClient.from('students').delete().eq('id', id);
            location.reload();
        }
    }

    function showID(id) {
        const s = allStudents.find(x => x.id === id);
        document.getElementById('idNameDisplay').innerText = s.name;
        document.getElementById('idLinDisplay').innerText = "LIN: " + s.lin;
        document.getElementById('idClassDisplay').innerText = s.class;
        document.getElementById('idHealthDisplay').innerText = s.health_status || "Fit";
        document.getElementById('idImg').src = s.photo_url || 'https://via.placeholder.com/100';
        document.getElementById('idModal').style.display = 'flex';
    }

    function downloadPDF() { html2pdf().from(document.getElementById('idToPrint')).save('Student_ID.pdf'); }
    
    function filterList() {
        const q = document.getElementById('search').value.toLowerCase();
        renderList(allStudents.filter(x => x.name.toLowerCase().includes(q) || x.class.toLowerCase().includes(q)));
    }
    
    fetchData();
</script>
</body>
</html>
