<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROGRESSIVE PMS V66</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #004085; --dark: #001a33; --white: #ffffff; --green: #218838; --red: #c82333; --gold: #ffc107; --gray: #f1f4f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); margin: 0; padding: 0; }
        
        .header { background: linear-gradient(135deg, var(--dark), var(--blue)); color: white; padding: 25px 20px; text-align: center; border-radius: 0 0 30px 30px; position: relative; }
        .logout-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.2); color: white; border: none; padding: 6px 15px; border-radius: 50px; cursor: pointer; font-size: 10px; }
        
        .card { background: white; padding: 15px; border-radius: 12px; margin: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-pro { background: var(--blue); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        input, select, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1.5px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 14px; }
        .hidden { display: none !important; }
        
        .student-row { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 5px solid var(--blue); }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; font-size: 11px; color: #555; }
        .data-label { font-weight: bold; color: var(--blue); text-transform: uppercase; font-size: 9px; }
    </style>
</head>
<body>

<div id="loginPage" style="padding: 100px 20px; text-align: center;">
    <h2 style="color:var(--blue)">PROGRESSIVE PMS PRO</h2>
    <div class="card" style="max-width: 350px; margin: auto;">
        <input id="key" type="password" placeholder="System Key" style="text-align:center;">
        <button onclick="login()" class="btn-pro">LOGIN</button>
    </div>
</div>

<div id="app" class="hidden">
    <div class="header">
        <button class="logout-btn" onclick="location.reload()">LOGOUT</button>
        <h3 style="margin:0;">STUDENT MASTER LIST</h3>
        <div id="liveDateTime" style="font-size:11px; color:var(--gold); margin-top:5px;"></div>
    </div>

    <div id="regCard" class="card">
        <h4 style="margin:0; color:var(--blue);">NEW REGISTRATION</h4>
        <input type="hidden" id="editId">
        
        <input id="stName" placeholder="Full Name">
        <input id="stLin" placeholder="Official LIN Number">
        <input id="stContact" placeholder="Parent Contact Number">
        
        <div style="display:flex; gap:10px;">
            <input id="stAge" type="number" placeholder="Age">
            <input id="stDob" type="date" title="Date of Birth">
        </div>

        <select id="stGender">
            <option value="">-- Select Gender --</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>

        <select id="stClass">
            <option value="Baby">Baby</option><option value="Middle">Middle</option><option value="Top">Top</option>
            <option value="P.1">P.1</option><option value="P.2">P.2</option><option value="P.3">P.3</option>
            <option value="P.4">P.4</option><option value="P.5">P.5</option><option value="P.6">P.6</option><option value="P.7">P.7</option>
        </select>

        <input id="stLoc" placeholder="Physical Location (Address)">
        <textarea id="stHealth" placeholder="Health Status / Conditions"></textarea>

        <div id="finSection" class="hidden">
            <input id="stExp" type="number" placeholder="Expected Fees">
            <input id="stPaid" type="number" placeholder="Paid Fees">
        </div>

        <button id="saveBtn" onclick="saveStudent()" class="btn-pro">SAVE STUDENT DATA</button>
    </div>

    <div class="card">
        <input type="text" id="search" oninput="render()" placeholder="🔍 Search LIN or Name...">
        <div id="list" style="margin-top:15px;"></div>
    </div>
</div>

<script>
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co";
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    const sb = supabase.createClient(SB_URL, SB_KEY);
    let students = [], ROLE = "";

    function login() {
        const k = document.getElementById('key').value.toUpperCase();
        if(k === "JESUS CARES") ROLE = "ADMIN";
        else if(k === "DIRECTOR2026") ROLE = "DIRECTOR";
        else if(k === "FINANCE2026") ROLE = "FINANCE";
        else if(k === "TEACHER256") ROLE = "TEACHER";
        else return alert("Invalid Key");

        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');

        if(ROLE === "ADMIN" || ROLE === "FINANCE") document.getElementById('finSection').classList.remove('hidden');
        if(ROLE === "DIRECTOR") document.getElementById('regCard').classList.add('hidden');
        
        refresh();
    }

    async function refresh() {
        const { data } = await sb.from('students').select('*').order('name', { ascending: true });
        students = data || [];
        render();
    }

    function render() {
        const q = document.getElementById('search').value.toUpperCase();
        let h = "";
        
        students.filter(s => s.name.toUpperCase().includes(q) || (s.lin && s.lin.includes(q))).forEach(s => {
            h += `<div class="student-row">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <b style="font-size:16px;">${s.name}</b><br>
                        <span style="color:var(--blue); font-weight:bold; font-size:12px;">LIN: ${s.lin || 'N/A'}</span>
                    </div>
                    <button onclick="edit('${s.id}')" style="font-size:10px; padding:5px 10px;">VIEW/EDIT</button>
                </div>
                
                <div class="info-grid">
                    <div><span class="data-label">Class:</span> ${s.class}</div>
                    <div><span class="data-label">Gender:</span> ${s.gender}</div>
                    <div><span class="data-label">Contact:</span> ${s.contact || 'N/A'}</div>
                    <div><span class="data-label">Age:</span> ${s.age || 'N/A'}</div>
                    <div><span class="data-label">Location:</span> ${s.physical_location || 'N/A'}</div>
                    <div><span class="data-label">Health:</span> ${s.health_status || 'Normal'}</div>
                </div>
            </div>`;
        });
        document.getElementById('list').innerHTML = h;
    }

    async function saveStudent() {
        const id = document.getElementById('editId').value;
        const payload = {
            name: document.getElementById('stName').value,
            lin: document.getElementById('stLin').value,
            contact: document.getElementById('stContact').value,
            gender: document.getElementById('stGender').value,
            class: document.getElementById('stClass').value,
            age: document.getElementById('stAge').value,
            dob: document.getElementById('stDob').value,
            physical_location: document.getElementById('stLoc').value,
            health_status: document.getElementById('stHealth').value,
            fees_expected: parseInt(document.getElementById('stExp').value) || 0,
            fees_paid: parseInt(document.getElementById('stPaid').value) || 0
        };
        payload.fees_balance = payload.fees_expected - payload.fees_paid;

        if(id) {
            if(ROLE === "TEACHER") return alert("Teacher cannot edit existing records!");
            await sb.from('students').update(payload).eq('id', id);
        } else {
            await sb.from('students').insert([payload]);
        }
        
        alert("Data Synchronized with Supabase");
        location.reload(); 
    }

    function edit(id) {
        const s = students.find(x => x.id == id);
        document.getElementById('editId').value = s.id;
        document.getElementById('stName').value = s.name;
        document.getElementById('stLin').value = s.lin || "";
        document.getElementById('stContact').value = s.contact || "";
        document.getElementById('stGender').value = s.gender || "";
        document.getElementById('stClass').value = s.class;
        document.getElementById('stAge').value = s.age || "";
        document.getElementById('stDob').value = s.dob || "";
        document.getElementById('stLoc').value = s.physical_location || "";
        document.getElementById('stHealth').value = s.health_status || "";
        
        if(ROLE === "TEACHER" || ROLE === "DIRECTOR") {
            document.getElementById('saveBtn').classList.add('hidden');
        }
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
