<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Progressive PMS Master</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --pms-blue: #001a33; --pms-red: #e63946; --gold: #ffc107; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; padding-bottom: 30px; }
        
        /* Dashboard Branding */
        .header { background: var(--pms-red); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .hero { background: var(--pms-blue); color: white; padding: 30px 15px 50px 15px; text-align: center; }
        .clock { font-size: 48px; font-weight: bold; margin: 10px 0; }
        
        /* Stats Display */
        .stats { display: flex; justify-content: center; gap: 8px; margin-top: -35px; padding: 0 10px; }
        .card { background: white; border-radius: 12px; padding: 15px 5px; width: 32%; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-bottom: 4px solid var(--gold); }
        .val { font-size: 22px; font-weight: bold; color: var(--pms-blue); display: block; }
        .lbl { font-size: 9px; color: #888; text-transform: uppercase; font-weight: bold; }

        /* Navigation */
        .nav { display: flex; overflow-x: auto; padding: 20px 10px; gap: 10px; justify-content: center; }
        .pill { padding: 10px 20px; border-radius: 25px; background: white; border: 1px solid #ddd; font-size: 11px; font-weight: bold; color: #888; cursor: pointer; }
        .pill.active { background: var(--pms-blue); color: white; border-color: var(--pms-blue); }

        /* Content Areas */
        .container { background: white; margin: 10px; border-radius: 12px; padding: 20px; border: 1.5px solid var(--pms-blue); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        label { font-size: 11px; font-weight: bold; color: var(--pms-blue); display: block; margin-bottom: 4px; }
        .btn { background: var(--pms-blue); color: white; padding: 15px; border: none; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        
        /* Data Table */
        .table-wrap { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; font-size: 12px; }
        th { background: #003366; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="login" class="container" style="max-width:320px; margin: 100px auto; text-align:center;">
    <h2 style="color:var(--pms-blue)">SYSTEM LOGIN</h2>
    <input id="user" placeholder="Username" style="margin-bottom:10px;">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="doLogin()" class="btn">LOGIN</button>
</div>

<div id="app" class="hidden">
    <div class="header">
        <div>SCHOOL DATA <span style="background:white; color:var(--pms-red); border-radius:50%; padding:2px 6px; margin-left:5px;">+</span></div>
        <div>🔔</div>
    </div>

    <div class="hero">
        <div style="font-size:14px; font-weight:bold;">PROGRESSIVE MOTHERS SCHOOL</div>
        <div style="font-size:10px; color:var(--gold);">GAYAZA-KIJABIJJO</div>
        <div class="clock" id="clock">00:00:00</div>
        <div id="date" style="font-size:11px; font-weight:bold;">-- APRIL 2026</div>
    </div>

    <div class="stats">
        <div class="card"><span class="val" id="tCnt">0</span><span class="lbl">Students</span></div>
        <div class="card"><span class="val" id="pCnt" style="color:#28a745">0</span><span class="lbl">Paid Full</span></div>
        <div class="card"><span class="val" id="aCnt" style="color:var(--pms-red)">0</span><span class="lbl">Absentees</span></div>
    </div>

    <div class="nav">
        <div class="pill active" id="n-rec" onclick="setView('rec')">RECORDS</div>
        <div class="pill" id="n-adm" onclick="setView('adm')">ADMISSION</div>
        <div class="pill" id="n-fin" onclick="setView('fin')">FINANCE</div>
    </div>

    <div id="v-adm" class="container hidden">
        <h3 style="margin-top:0; color:var(--pms-blue)">New Admission</h3>
        <div class="grid">
            <div style="grid-column: span 2;"><label>Full Name</label><input id="f_name"></div>
            <div><label>Official LIN</label><input id="f_olin" placeholder="PMS/2026/000"></div>
            <div><label>Gender</label><select id="f_gen"><option>Male</option><option>Female</option></select></div>
            <div><label>DOB</label><input id="f_dob" type="date"></div>
            <div><label>Class</label><select id="f_cls"><option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option></select></div>
            <div><label>Location</label><input id="f_loc"></div>
            <div><label>Fees Expected</label><input id="f_exp" type="number"></div>
            <div><label>Fees Paid</label><input id="f_paid" type="number" value="0"></div>
        </div>
        <button class="btn" onclick="saveData()">SAVE STUDENT RECORD</button>
    </div>

    <div id="v-rec" class="container table-wrap">
        <table>
            <thead>
                <tr><th>Official LIN</th><th>Auto LIN</th><th>Name</th><th>Class</th><th>Gender</th><th>Status</th><th>Action</th></tr>
            </thead>
            <tbody id="resList"></tbody>
        </table>
    </div>

    <div id="v-fin" class="container table-wrap hidden">
        <table>
            <thead>
                <tr><th>Name</th><th>Payment Code</th><th>Paid</th><th>Balance</th><th>Status</th></tr>
            </thead>
            <tbody id="finList"></tbody>
        </table>
    </div>

    <div style="text-align:center; padding:20px; font-size:10px; font-weight:bold; color:#aaa;">
        EUDES MEDIA SOLUTIONS | +256762992440
    </div>
</div>

<script>
    // FULL VERIFIED CONNECTION
    const URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
    const _supabase = supabase.createClient(URL, KEY);

    function doLogin() {
        if(document.getElementById('user').value === "Admin" && document.getElementById('pass').value === "JESUS CARES") {
            document.getElementById('login').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            refresh();
        } else { alert("Login Failed"); }
    }

    function setView(v) {
        ['v-adm','v-rec','v-fin'].forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById('v-'+v).classList.remove('hidden');
        document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        document.getElementById('n-'+v).classList.add('active');
    }

    async function saveData() {
        const auto_lin = "PMA-" + Math.floor(Math.random()*9000+1000);
        const { error } = await _supabase.from('students').insert([{
            name: document.getElementById('f_name').value,
            official_lin: document.getElementById('f_olin').value,
            lin: auto_lin,
            gender: document.getElementById('f_gen').value,
            dob: document.getElementById('f_dob').value,
            class: document.getElementById('f_cls').value,
            location: document.getElementById('f_loc').value,
            fees_expected: document.getElementById('f_exp').value || 0,
            fees_paid: document.getElementById('f_paid').value || 0,
            payment_code: "TX-" + Math.floor(Math.random()*9000),
            status: "Active",
            is_absent: false
        }]);
        if(error) alert(error.message); else { alert("Saved!"); refresh(); setView('rec'); }
    }

    async function refresh() {
        const { data, error } = await _supabase.from('students').select('*').order('name');
        if (error) { console.error(error); return; }

        document.getElementById('tCnt').innerText = data.length;
        document.getElementById('pCnt').innerText = data.filter(s => parseFloat(s.fees_paid) >= parseFloat(s.fees_expected)).length;
        document.getElementById('aCnt').innerText = data.filter(s => s.is_absent).length;

        const list = document.getElementById('resList');
        const flist = document.getElementById('finList');
        list.innerHTML = ""; flist.innerHTML = "";

        data.forEach(s => {
            list.innerHTML += `<tr>
                <td><b>${s.official_lin || '---'}</b></td>
                <td><small>${s.lin}</small></td>
                <td>${s.name}</td><td>${s.class}</td><td>${s.gender}</td>
                <td><span style="background:green;color:white;padding:3px 6px;border-radius:4px;font-size:10px;">${s.status}</span></td>
                <td><button onclick="del('${s.id}')" style="color:red;border:none;background:none;cursor:pointer;">DEL</button></td>
            </tr>`;

            const bal = (s.fees_expected || 0) - (s.fees_paid || 0);
            flist.innerHTML += `<tr>
                <td>${s.name}</td><td>${s.payment_code}</td><td>${s.fees_paid}</td>
                <td>${bal}</td><td>${bal<=0?'PAID':'DEBT'}</td>
            </tr>`;
        });
    }

    async function del(id) {
        if(confirm("Delete Record?")) {
            await _supabase.from('students').delete().eq('id', id);
            refresh();
        }
    }

    setInterval(() => {
        const d = new Date();
        document.getElementById('clock').innerText = d.toLocaleTimeString('en-GB');
        document.getElementById('date').innerText = d.toLocaleDateString('en-GB', { day: '2-digit', month: 'LONG', year: 'numeric' }).toUpperCase();
    }, 1000);
</script>
</body>
</html>
