<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROGRESSIVE SCHOOL - SECURE PMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #0056b3; --white: #ffffff; --green: #28a745; --red: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; padding: 10px; }
        .box { background: var(--white); padding: 25px; border-radius: 15px; max-width: 900px; margin: 15px auto; border: 1px solid #d1d9e6; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .header { background: linear-gradient(135deg, var(--blue), #003d7a); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        
        /* Login Page Styling */
        #loginGate { max-width: 380px; margin: 80px auto; text-align: center; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #loginGate h2 { color: var(--blue); margin-bottom: 25px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        label { font-size: 12px; font-weight: bold; color: var(--blue); display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1.5px solid #ccc; border-radius: 8px; font-size: 14px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--blue); box-shadow: 0 0 8px rgba(0,86,179,0.1); }
        
        .btn { background: var(--blue); color: white; padding: 15px; border: none; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 15px; text-transform: uppercase; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #888; cursor: not-allowed; }
        
        .table-wrap { overflow-x: auto; margin-top: 20px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 800px; }
        th { background: #f8f9fa; color: var(--blue); padding: 12px; text-align: left; border-bottom: 2px solid #ddd; font-size: 11px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        .footer { text-align: center; margin-top: 30px; font-size: 12px; font-weight: bold; color: #444; border-top: 1px solid #ddd; padding-top: 15px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loginGate">
    <img src="https://img.icons8.com/fluency/96/shield.png" width="60" style="margin-bottom:10px;">
    <h2>PMS LOGIN</h2>
    <input id="userIn" placeholder="USERNAME" style="margin-bottom:10px;">
    <input id="passIn" type="password" placeholder="PASSWORD">
    <button onclick="checkAccess()" class="btn" style="margin-top:20px;">ACCESS SYSTEM</button>
</div>

<div id="appBody" class="hidden">
    <div class="header">
        <h2 style="margin:0;">PROGRESSIVE SCHOOL DATA</h2>
        <p style="margin:5px 0 0 0; opacity:0.9;">Secure Student Management</p>
    </div>

    <div class="box">
        <h3 id="formTitle" style="color:var(--blue); margin-top:0;">Student Registration</h3>
        <input type="hidden" id="editId">
        <div class="grid">
            <div><label>Full Name</label><input id="name"></div>
            <div><label>Age</label><input id="age" type="number"></div>
            <div><label>Date of Birth</label><input id="dob" type="date"></div>
            <div><label>Contact Number</label><input id="phone"></div>
            <div><label>Physical Location</label><input id="loc"></div>
            <div><label>Payment Code</label><input id="pay"></div>
            <div><label>Class</label>
                <select id="cl">
                    <option>Baby</option><option>Middle</option><option>Top</option>
                    <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                    <option>P.5</option><option>P.6</option><option>P.7</option>
                </select>
            </div>
            <div><label>Health Status</label><input id="health" value="Good"></div>
            <div><label>Status</label>
                <select id="st">
                    <option value="active">Active Pupil</option>
                    <option value="left">Left School</option>
                </select>
            </div>
        </div>
        <button onclick="saveStudent()" id="saveBtn" class="btn">CONFIRM & SAVE RECORD</button>
        <button onclick="resetForm()" id="cancelBtn" class="btn hidden" style="background:#666; margin-top:10px;">CANCEL EDIT</button>
    </div>

    <div class="box">
        <input type="text" id="searchBar" onkeyup="filterTable()" style="border: 2px solid var(--blue); height: 50px;" placeholder="🔍 Search Name, LIN, or Class...">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>LIN</th><th>NAME</th><th>CLASS</th><th>AGE</th><th>PAYMENT CODE</th><th>STATUS</th><th>ACTION</th></tr>
                </thead>
                <tbody id="studentTableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="footer">Eudes Media | +256762992440</div>
</div>

<script>
    const DB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co";
    const DB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    // Initialize DB connection immediately to prevent 'null' error
    const supabaseClient = supabase.createClient(DB_URL, DB_KEY);
    let allData = [];

    function checkAccess() {
        const u = document.getElementById('userIn').value.toUpperCase();
        const p = document.getElementById('passIn').value.toUpperCase();
        
        if(u === "PROGRESSIVE" && p === "JESUS CARES") {
            document.getElementById('loginGate').classList.add('hidden');
            document.getElementById('appBody').classList.remove('hidden');
            loadRecords();
        } else {
            alert("Incorrect Username or Password");
        }
    }

    async function loadRecords() {
        const { data, error } = await supabaseClient.from('students').select('*').order('created_at', { ascending: false });
        if(data) {
            allData = data;
            display(data);
        }
    }

    function display(list) {
        let rows = "";
        list.forEach(s => {
            rows += `<tr>
                <td style="color:var(--blue); font-weight:bold;">${s.lin || '---'}</td>
                <td><b>${(s.name || '').toUpperCase()}</b></td>
                <td><b>${s.class || '--'}</b></td>
                <td>${s.age || '--'}</td>
                <td style="color:#555;">${s.payment_code || '---'}</td>
                <td style="font-weight:bold; color:${s.status==='active'?'green':'red'}">${(s.status || 'active').toUpperCase()}</td>
                <td>
                    <button onclick="startEdit('${s.id}')" style="background:#ffc107; border:none; padding:6px 10px; border-radius:5px; cursor:pointer; font-weight:bold;">EDIT</button>
                </td>
            </tr>`;
        });
        document.getElementById('studentTableBody').innerHTML = rows;
    }

    async function saveStudent() {
        const id = document.getElementById('editId').value;
        const nameVal = document.getElementById('name').value.trim();
        if(!nameVal) return alert("Please enter a name");

        const b = document.getElementById('saveBtn');
        b.disabled = true; b.innerText = "SAVING...";

        // GENDER REMOVED to match your database schema
        const payload = {
            name: nameVal, age: document.getElementById('age').value,
            dob: document.getElementById('dob').value, contact: document.getElementById('phone').value,
            location: document.getElementById('loc').value, payment_code: document.getElementById('pay').value,
            class: document.getElementById('cl').value, health_status: document.getElementById('health').value,
            status: document.getElementById('st').value
        };

        try {
            if(!id) {
                payload.lin = "PM" + nameVal.charAt(0).toUpperCase() + "-" + Math.floor(1000 + Math.random() * 9000);
                await supabaseClient.from('students').insert([payload]);
            } else {
                await supabaseClient.from('students').update(payload).eq('id', id);
            }
            alert("SAVED!");
            resetForm();
            loadRecords();
        } catch (err) {
            alert("Error: " + err.message);
        } finally {
            b.disabled = false; b.innerText = "CONFIRM & SAVE RECORD";
        }
    }

    function startEdit(id) {
        const s = allData.find(x => x.id == id);
        if(!s) return;
        document.getElementById('editId').value = s.id;
        document.getElementById('name').value = s.name;
        document.getElementById('cl').value = s.class;
        document.getElementById('pay').value = s.payment_code;
        document.getElementById('st').value = s.status;
        document.getElementById('formTitle').innerText = "Edit: " + s.lin;
        document.getElementById('cancelBtn').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    function filterTable() {
        const q = document.getElementById('searchBar').value.toUpperCase();
        const f = allData.filter(s => 
            (s.name && s.name.toUpperCase().includes(q)) || 
            (s.lin && s.lin.toUpperCase().includes(q)) || 
            (s.class && s.class.toUpperCase().includes(q))
        );
        display(f);
    }

    function resetForm() {
        document.getElementById('editId').value = "";
        document.getElementById('name').value = "";
        document.getElementById('formTitle').innerText = "Student Registration";
        document.getElementById('cancelBtn').classList.add('hidden');
    }
</script>
</body>
</html>
