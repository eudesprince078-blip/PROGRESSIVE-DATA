<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS PRO | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --eudes-blue: #0047AB; --dark: #0f172a; --success: #10b981; --danger: #ef4444; --accent: #F5B81B; --white: #ffffff; --gray: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; }
        body { background: var(--gray); color: #1e293b; height: 100vh; display: flex; overflow: hidden; }

        /* RESPONSIVE SIDEBAR */
        .sidebar { width: 70px; background: var(--dark); display: flex; flex-direction: column; align-items: center; padding: 20px 0; z-index: 100; flex-shrink: 0; border-right: 3px solid var(--eudes-blue); transition: width 0.3s ease; }
        @media (min-width: 1024px) { .sidebar { width: 280px; align-items: flex-start; padding: 30px; } }
        
        .nav-btn { width: 50px; height: 50px; border-radius: 12px; color: #94a3b8; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 10px; border: none; background: none; transition: 0.3s; width: 90%; }
        .nav-btn span { display: none; font-weight: 800; font-size: 0.7rem; margin-left: 15px; }
        @media (min-width: 1024px) { .nav-btn { justify-content: flex-start; padding: 0 20px; } .nav-btn span { display: inline; } }
        .nav-btn.active { background: var(--eudes-blue); color: white; box-shadow: 0 8px 20px rgba(0, 71, 171, 0.3); }

        /* MAIN CONTENT SECTION */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-bar { background: white; padding: 15px 25px; border-bottom: 1px solid #e2e8f0; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 10px; }
        .view-port { padding: 20px; overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }

        /* PROFESSIONAL CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 25px; border-radius: 24px; border: 1px solid #eef2f6; box-shadow: 0 4px 15px rgba(0,0,0,0.02); position: relative; overflow: hidden; }
        .card::after { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 6px; background: var(--eudes-blue); }

        /* TABLES & LISTS */
        .data-table { width: 100%; border-collapse: collapse; background: white; border-radius: 20px; overflow: hidden; margin-top: 20px; }
        .data-table th { background: #f1f5f9; padding: 15px; text-align: left; font-size: 0.65rem; font-weight: 900; }
        .data-table td { padding: 15px; font-size: 0.75rem; border-bottom: 1px solid #f1f5f9; font-weight: 700; }
        .student-img { width: 45px; height: 45px; border-radius: 12px; object-fit: cover; border: 2px solid var(--eudes-blue); }

        /* FORM STYLING */
        .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-box { background: white; padding: 30px; border-radius: 30px; width: 100%; max-width: 600px; border-bottom: 8px solid var(--eudes-blue); }
        .input-pro { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #f1f5f9; background: #f8fafc; font-weight: 700; outline: none; margin-bottom: 15px; }
        .input-pro:focus { border-color: var(--eudes-blue); background: white; }

        .hidden { display: none !important; }
        .btn-full { background: var(--eudes-blue); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-full:active { transform: scale(0.98); }
        .badge { padding: 6px 12px; border-radius: 8px; font-size: 0.6rem; font-weight: 900; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div style="margin-bottom: 40px;"><i class="fas fa-cube" style="color:var(--accent); font-size: 2rem;"></i></div>
        <button class="nav-btn active" onclick="switchView('dash', this)"><i class="fas fa-home"></i><span>DASHBOARD</span></button>
        <button class="nav-btn" onclick="switchView('students', this)"><i class="fas fa-user-graduate"></i><span>STUDENTS</span></button>
        <button class="nav-btn" onclick="switchView('finance', this)"><i class="fas fa-chart-pie"></i><span>FINANCIALS</span></button>
        <button class="nav-btn" onclick="switchView('marks', this)"><i class="fas fa-award"></i><span>ACADEMICS</span></button>
        <button class="nav-btn" onclick="switchView('attend', this)"><i class="fas fa-calendar-check"></i><span>ATTENDANCE</span></button>
        
        <div style="margin-top: auto; text-align: center; color: #94a3b8; font-size: 0.5rem; font-weight: 900;">
            EUDES MEDIA LTD<br>+256762992440
        </div>
    </aside>

    <main class="main">
        <header class="top-bar">
            <div>
                <h2 style="font-size: 1rem; font-weight: 900; color: var(--dark);" id="sch-display">PROGRESSIVE MOTHER'S SCHOOL</h2>
                <p style="font-size: 0.55rem; color: var(--eudes-blue); font-weight: 800;">YOUR COMPLETE DIGITAL PARTNER</p>
            </div>
            <div style="display: flex; gap: 10px;">
                <select id="active-term" class="badge" style="border: 1px solid #ddd; outline: none;">
                    <option>TERM 1</option><option>TERM 2</option><option>TERM 3</option>
                </select>
                <select id="active-year" class="badge" style="border: 1px solid #ddd; outline: none;">
                    <option>2026</option><option>2027</option>
                </select>
            </div>
        </header>

        <section class="view-port">
            
            <div id="view-dash">
                <div class="grid">
                    <div class="card">
                        <p style="font-size: 0.6rem; font-weight: 900; color: #64748b;">TOTAL ENROLLMENT</p>
                        <h1 id="dash-total" style="font-size: 3rem; font-weight: 900;">0</h1>
                    </div>
                    <div class="card" style="border-left: 6px solid var(--success);">
                        <p style="font-size: 0.6rem; font-weight: 900; color: #64748b;">TOTAL FEES COLLECTED</p>
                        <h1 id="dash-cash" style="font-size: 2rem; font-weight: 900; color: var(--success);">0 UGX</h1>
                    </div>
                    <div class="card" style="border-left: 6px solid var(--danger);">
                        <p style="font-size: 0.6rem; font-weight: 900; color: #64748b;">TODAY'S ABSENTEEISM</p>
                        <h1 id="dash-absent" style="font-size: 3rem; font-weight: 900; color: var(--danger);">0</h1>
                    </div>
                </div>
            </div>

            <div id="view-students" class="hidden">
                <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                    <h3 style="font-weight: 900;">STUDENT MASTER LIST</h3>
                    <button onclick="document.getElementById('modal-reg').classList.remove('hidden')" class="badge" style="background:var(--eudes-blue); color:white; border:none; cursor:pointer; padding: 10px 20px;">+ NEW ADMISSION</button>
                </div>
                <div style="overflow-x: auto;">
                    <table class="data-table">
                        <thead>
                            <tr><th>PHOTO</th><th>LIN</th><th>FULL NAME</th><th>CLASS</th><th>STATUS</th><th>ACTIONS</th></tr>
                        </thead>
                        <tbody id="table-students"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-finance" class="hidden">
                <h3 style="font-weight: 900; margin-bottom: 20px;">FINANCIAL LEDGER</h3>
                <div id="ledger-list"></div>
            </div>

            <div id="view-attend" class="hidden">
                <h3 style="font-weight: 900; margin-bottom: 20px;">DAILY ROLL CALL</h3>
                <div id="attend-list"></div>
            </div>

        </section>
    </main>

    <div id="modal-reg" class="modal hidden">
        <div class="modal-box">
            <h2 style="font-weight: 900; margin-bottom: 20px; color: var(--eudes-blue);">ADMIT NEW LEARNER</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div><label style="font-size: 0.6rem; font-weight: 900;">FULL NAME</label><input type="text" id="in-name" class="input-pro"></div>
                <div><label style="font-size: 0.6rem; font-weight: 900;">CLASS</label>
                    <select id="in-class" class="input-pro">
                        <option>BABY CLASS</option><option>TOP CLASS</option><option>P.1</option><option>P.7</option>
                    </select>
                </div>
            </div>
            <label style="font-size: 0.6rem; font-weight: 900;">PHOTO URL</label>
            <input type="text" id="in-photo" class="input-pro" placeholder="Paste link here...">
            
            <label style="font-size: 0.6rem; font-weight: 900;">TOTAL FEES REQUIRED (TERM)</label>
            <input type="number" id="in-fees" class="input-pro" value="500000">

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="saveStudent()" class="btn-full">FINALIZE ADMISSION</button>
                <button onclick="document.getElementById('modal-reg').classList.add('hidden')" class="btn-full" style="background:#e2e8f0; color:var(--dark);">CLOSE</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let schoolID = "PM001"; // Default based on your screens

        async function refreshData() {
            const { data: students } = await sb.from('Students').select('*').eq('sch_id', schoolID);
            if (!students) return;

            // 1. DASHBOARD UPDATE
            document.getElementById('dash-total').innerText = students.length;
            let cash = students.reduce((sum, s) => sum + (Number(s.fees_paid) || 0), 0);
            document.getElementById('dash-cash').innerText = cash.toLocaleString() + " UGX";

            // 2. STUDENT TABLE RENDER
            const tbody = document.getElementById('table-students');
            tbody.innerHTML = students.map(s => `
                <tr>
                    <td><img src="${s.photo_url || 'https://via.placeholder.com/100'}" class="student-img"></td>
                    <td><span class="badge" style="background:#f1f5f9; color:var(--eudes-blue);">${s.lin}</span></td>
                    <td>${s.name}</td>
                    <td>${s.class}</td>
                    <td><span class="badge" style="background: ${s.fees_paid >= s.total_fees_required ? 'var(--success)' : 'var(--danger)'}; color:white;">
                        ${s.fees_paid >= s.total_fees_required ? 'CLEARED' : 'DEBT'}
                    </span></td>
                    <td>
                        <button onclick="edit('${s.id}')" style="border:none; color:var(--eudes-blue); background:none; cursor:pointer;"><i class="fas fa-edit"></i></button>
                        <button onclick="del('${s.id}')" style="border:none; color:var(--danger); background:none; cursor:pointer; margin-left:10px;"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');

            // 3. ATTENDANCE RENDER
            const attDiv = document.getElementById('attend-list');
            attDiv.innerHTML = students.map(s => `
                <div style="background:white; padding:15px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                    <div style="font-weight:800;">${s.name} <small style="display:block; color:#64748b;">${s.class}</small></div>
                    <div style="display:flex; gap:10px;">
                        <button class="badge" style="background:var(--success); color:white; border:none;">PRESENT</button>
                        <button class="badge" style="background:#e2e8f0; color:var(--dark); border:none;">ABSENT</button>
                    </div>
                </div>
            `).join('');
        }

        async function saveStudent() {
            const name = document.getElementById('in-name').value;
            const lin = `PM-${name.charAt(0).toUpperCase()}-${Math.floor(1000 + Math.random() * 9000)}`;
            const { error } = await sb.from('Students').insert([{
                sch_id: schoolID, name, lin,
                class: document.getElementById('in-class').value,
                photo_url: document.getElementById('in-photo').value,
                total_fees_required: document.getElementById('in-fees').value,
                term: document.getElementById('active-term').value,
                year: document.getElementById('active-year').value
            }]);
            if (!error) { document.getElementById('modal-reg').classList.add('hidden'); refreshData(); }
        }

        async function del(id) {
            if(confirm("DELETE THIS STUDENT RECORD FOREVER?")) {
                await sb.from('Students').delete().eq('id', id);
                refreshData();
            }
        }

        function switchView(v, btn) {
            ['dash', 'students', 'finance', 'marks', 'attend'].forEach(id => {
                const el = document.getElementById('view-' + id);
                if (el) el.classList.add('hidden');
            });
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + v).classList.remove('hidden');
            btn.classList.add('active');
        }

        // INITIAL LOAD
        refreshData();
    </script>
</body>
</html>
