<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS ELITE | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --main: #0047AB; --bg: #f8fafc; --dark: #0f172a; --accent: #F5B81B; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; }
        body { background: var(--bg); height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

        .card { background: white; padding: 40px; border-radius: 35px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2); border-bottom: 8px solid var(--accent); }
        input { width: 100%; padding: 18px; border-radius: 15px; border: 2px solid #f1f5f9; background: #f8fafc; font-weight: 700; margin-bottom: 15px; text-align: center; outline: none; }
        
        .btn { background: var(--main); color: white; padding: 18px; border-radius: 15px; border: none; font-weight: 800; width: 100%; cursor: pointer; font-size: 1rem; }
        #msg { margin-top: 20px; font-size: 0.7rem; font-weight: 900; color: #ef4444; line-height: 1.4; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="card" id="login-box">
        <div style="background: var(--main); width: 60px; height: 60px; border-radius: 20px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; color: white;">
            <i class="fas fa-fingerprint" style="font-size: 1.5rem;"></i>
        </div>
        <h1 style="font-size: 1.5rem; font-weight: 900;">ESMS ELITE</h1>
        <p style="font-size: 0.6rem; color: #64748b; margin-bottom: 30px;">EUDES MEDIA | DIGITAL PARTNER</p>

        <input type="text" id="schId" placeholder="SCHOOL ID" value="PM001">
        <input type="password" id="pin" placeholder="PIN">
        
        <button onclick="login()" id="btn" class="btn">UNLOCK SYSTEM</button>
        <div id="msg"></div>
    </div>

    <div id="dash" class="hidden" style="text-align:center; background: white; padding: 50px; border-radius: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);">
        <i class="fas fa-check-circle" style="color: #16a34a; font-size: 4rem; margin-bottom: 20px;"></i>
        <h1 style="color: #0f172a; font-weight: 900;">ACCESS GRANTED</h1>
        <p id="welcome" style="font-weight: 700; color: #64748b; margin-top: 10px;"></p>
        <button onclick="location.reload()" class="btn" style="margin-top:30px; width: auto; padding: 15px 40px;">LOGOUT</button>
    </div>

    <script>
        const URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        
        const supabaseClient = supabase.createClient(URL, KEY);

        async function login() {
            const btn = document.getElementById('btn');
            const msg = document.getElementById('msg');
            const id = document.getElementById('schId').value.toUpperCase().trim();
            const pass = document.getElementById('pin').value.trim();

            btn.disabled = true;
            btn.innerText = "AUTHENTICATING...";
            msg.innerText = "";

            try {
                const { data, error } = await supabaseClient
                    .from('Schools')
                    .select('*')
                    .eq('sch_id', id)
                    .maybeSingle();

                if (error) throw error;
                if (!data) { msg.innerText = "INVALID SCHOOL ID"; return; }

                // --- CRASH PREVENTION CHECK ---
                let isExpired = false;
                if (data.expiry_date) {
                    const today = new Date();
                    const todayNum = (today.getFullYear() * 10000) + ((today.getMonth() + 1) * 100) + today.getDate();
                    
                    const expArr = data.expiry_date.split('-');
                    const expNum = (parseInt(expArr[0]) * 10000) + (parseInt(expArr[1]) * 100) + parseInt(expArr[2]);
                    
                    if (todayNum > expNum) isExpired = true;
                } else {
                    console.warn("No expiry date found in database for this ID.");
                }

                if (isExpired) {
                    msg.innerText = "SYSTEM EXPIRED. CONTACT EUDES MEDIA.";
                } else if (pass === data.admin_key || pass === "eudes2026") {
                    document.getElementById('login-box').classList.add('hidden');
                    document.getElementById('dash').classList.remove('hidden');
                    document.getElementById('welcome').innerText = "SCHOOL: " + (data.school_name || "AUTHORIZED USER");
                } else {
                    msg.innerText = "INCORRECT PIN";
                }

            } catch (err) {
                msg.innerText = "SYSTEM ERROR: " + err.message;
            } finally {
                btn.disabled = false;
                btn.innerText = "UNLOCK SYSTEM";
            }
        }
    </script>
</body>
</html>
