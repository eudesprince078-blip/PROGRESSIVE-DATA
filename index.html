<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0052cc; --accent: #ff3b30; --success: #34c759; --dark: #020617; --bg: #f8fafc; --blue-light: #e0e7ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* HEADER */
        .header { background: white; padding: 15px; border-bottom: 5px solid var(--primary); text-align: center; }
        .sch-name { font-weight: 900; font-size: 1.2rem; color: var(--dark); text-transform: uppercase; letter-spacing: -0.5px; }

        /* VIEWPORT */
        .main-view { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        .card { background: white; border-radius: 25px; padding: 18px; margin-bottom: 12px; border: 1px solid #e2e8f0; position: relative; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        
        /* STUDENT CARD STYLING */
        .stud-img { width: 65px; height: 65px; border-radius: 18px; object-fit: cover; background: var(--blue-light); border: 2px solid var(--primary); }
        .details { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; font-size: 0.7rem; font-weight: 700; color: #475569; }
        .tag { background: #f1f5f9; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; }

        /* INPUTS */
        .search-area { position: sticky; top: 0; z-index: 100; background: white; padding: 12px; border-radius: 15px; border: 2px solid var(--primary); margin-bottom: 15px; display: flex; gap: 10px; align-items: center; }
        input, select, textarea { border: none; outline: none; font-weight: 700; width: 100%; font-size: 0.9rem; }
        
        /* BUTTONS */
        .btn-p { background: var(--primary); color: white; padding: 15px; border-radius: 15px; border: none; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; }
        .edit-tool { position: absolute; top: 15px; right: 45px; color: var(--primary); cursor: pointer; }
        .del-tool { position: absolute; top: 15px; right: 15px; color: var(--accent); cursor: pointer; }

        /* NAV */
        .nav { background: white; height: 80px; border-top: 1px solid #e2e8f0; display: flex; position: fixed; bottom: 0; width: 100%; box-shadow: 0 -4px 10px rgba(0,0,0,0.03); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; font-size: 0.65rem; font-weight: 800; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.5rem; margin-bottom: 5px; }

        #auth-gate { position: fixed; inset: 0; background: var(--dark); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-gate">
        <div style="background:white; padding:40px; border-radius:35px; width:100%; max-width:400px; text-align:center;">
            <h1 style="font-weight:900; margin-bottom:20px;">ESMS <span style="color:var(--primary)">ELITE</span></h1>
            <input type="text" id="auth-id" placeholder="SCHOOL ID" style="background:#f1f5f9; padding:15px; border-radius:12px; margin-bottom:10px;">
            <input type="password" id="auth-key" placeholder="ACCESS KEY" style="background:#f1f5f9; padding:15px; border-radius:12px; margin-bottom:15px;">
            <button class="btn-p" onclick="login()">CONNECT SYSTEM</button>
        </div>
    </div>

    <header class="header">
        <div id="display-name" class="sch-name">AUTHORIZING...</div>
        <div id="display-time" style="font-size:0.75rem; font-weight:800; color:var(--primary);"></div>
    </header>

    <main class="main-view" id="main-scroller">
        
        <div id="v-dash">
            <div class="card" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div style="text-align:center;"><h2 id="st-p">0</h2><small>PRESENT</small></div>
                <div style="text-align:center;"><h2 id="st-a">0</h2><small>ABSENT</small></div>
            </div>
            <div class="card">
                <h3>BULK BROADCAST</h3>
                <textarea id="bulk-text" placeholder="Type your message for WhatsApp and Email here..." style="background:#f8fafc; border:1px solid #e2e8f0; height:100px; padding:15px; border-radius:15px; margin:10px 0;"></textarea>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <button onclick="sendBulk('WhatsApp')" style="background:#25D366; color:white; border:none; padding:12px; border-radius:10px; font-weight:800;"><i class="fab fa-whatsapp"></i> WHATSAPP</button>
                    <button onclick="sendBulk('Email')" style="background:#ea4335; color:white; border:none; padding:12px; border-radius:10px; font-weight:800;"><i class="fas fa-envelope"></i> EMAIL</button>
                </div>
            </div>
        </div>

        <div id="v-list" class="hidden">
            <div class="search-area">
                <select id="f-class" onchange="sync()" style="flex:0.5; color:var(--primary)">
                    <option value="ALL">ALL CLASSES</option>
                    <option>Baby Class</option><option>Middle Class</option><option>Top Class</option>
                    <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                    <option>P.5</option><option>P.6</option><option>P.7</option>
                </select>
                <input type="text" id="f-search" placeholder="Search Name/LIN..." onkeyup="filterUI()">
            </div>
            <div id="list-render"></div>
        </div>

        <div id="v-fin" class="hidden">
            <div class="card">
                <h3 style="margin-bottom:10px;">COLLECTION SUMMARY</h3>
                <div style="display:flex; justify-content:space-between; font-weight:800;">
                    <span>TOTAL REVENUE:</span> <span id="rev-total">0</span>
                </div>
                <div style="display:flex; justify-content:space-between; color:var(--accent); font-weight:800;">
                    <span>TOTAL DEBTS:</span> <span id="rev-debt">0</span>
                </div>
            </div>
            <div id="fin-render"></div>
        </div>

        <div id="v-add" class="hidden">
            <div class="card">
                <h3>REGISTER STUDENT</h3>
                <input type="text" id="r-name" placeholder="Name">
                <input type="text" id="r-lin" placeholder="LIN">
                <select id="r-class">
                    <option>Baby Class</option><option>Middle Class</option><option>Top Class</option>
                    <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                    <option>P.5</option><option>P.6</option><option>P.7</option>
                </select>
                <input type="number" id="r-fees" placeholder="Total Fees">
                <input type="text" id="r-loc" placeholder="Location">
                <input type="text" id="r-health" placeholder="Health Status">
                <button class="btn-p" onclick="saveStudent()">COMMIT RECORD</button>
            </div>
        </div>

    </main>

    <nav class="nav">
        <div class="nav-item active" onclick="nav('dash',this)"><i class="fas fa-chart-line"></i>DASH</div>
        <div class="nav-item" onclick="nav('list',this)"><i class="fas fa-tasks"></i>ROLLCALL</div>
        <div class="nav-item" onclick="nav('fin',this)"><i class="fas fa-file-invoice-dollar"></i>FINANCE</div>
        <div class="nav-item" onclick="nav('add',this)"><i class="fas fa-plus-circle"></i>ADD</div>
    </nav>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        let db, activeSch, students = [];

        async function login() {
            const sid = document.getElementById('auth-id').value.toUpperCase().trim();
            const key = document.getElementById('auth-key').value.trim();
            db = supabase.createClient(SB_URL, SB_KEY);
            const { data, error } = await db.from('Schools').select('*').eq('sch_id', sid).single();
            if(data && (key === data.admin_key || key === data.finance_key || key === data.teacher_key)) {
                activeSch = sid;
                document.getElementById('display-name').innerText = data.sch_name;
                document.getElementById('auth-gate').classList.add('hidden');
                sync();
            } else { alert("Login Error: Incorrect ID or Key."); }
        }

        async function sync() {
            const cls = document.getElementById('f-class').value;
            let query = db.from('Students').select('*').eq('sch_id', activeSch);
            if(cls !== 'ALL') query = query.eq('class', cls);
            const { data } = await query.order('name', { ascending: true });
            students = data || [];
            filterUI();
        }

        function filterUI() {
            const q = document.getElementById('f-search').value.toUpperCase();
            const filtered = students.filter(s => s.name.includes(q) || (s.lin && s.lin.includes(q)));

            let p=0, a=0, total=0, paid=0;
            students.forEach(s => {
                s.is_absent ? a++ : p++;
                total += (s.total_fees || 0);
                paid += (s.fees_paid || 0);
            });

            document.getElementById('st-p').innerText = p;
            document.getElementById('st-a').innerText = a;
            document.getElementById('rev-total').innerText = "UGX " + paid.toLocaleString();
            document.getElementById('rev-debt').innerText = "UGX " + (total - paid).toLocaleString();

            document.getElementById('list-render').innerHTML = filtered.map(s => `
                <div class="card">
                    <i class="fas fa-pen edit-tool" onclick="editS('${s.id}')"></i>
                    <i class="fas fa-trash del-tool" onclick="delS('${s.id}')"></i>
                    <div style="display:flex; gap:15px; align-items:center;">
                        <img src="${s.photo_url || 'https://via.placeholder.com/65'}" class="stud-img">
                        <div style="flex:1">
                            <b style="font-size:1rem;">${s.name}</b><br>
                            <span style="color:var(--primary); font-size:0.75rem; font-weight:800;">${s.lin || 'NO LIN'}</span>
                        </div>
                        <button style="background:${s.is_absent ? 'var(--accent)' : 'var(--success)'}; color:white; border:none; padding:10px; border-radius:10px; font-weight:900;" onclick="toggleAbs('${s.id}', ${s.is_absent})">
                            ${s.is_absent ? 'ABSENT' : 'PRESENT'}
                        </button>
                    </div>
                    <div class="details">
                        <div class="tag">Class: ${s.class}</div>
                        <div class="tag">Loc: ${s.location || 'N/A'}</div>
                        <div class="tag">Health: ${s.health_status || 'Good'}</div>
                        <div class="tag">Gender: ${s.gender}</div>
                    </div>
                </div>`).join('');

            document.getElementById('fin-render').innerHTML = filtered.map(s => `
                <div class="card">
                    <div style="font-weight:900;">${s.name} <span style="color:#64748b; font-size:0.7rem;">(${s.class})</span></div>
                    <div class="details" style="margin-bottom:10px;">
                        <div>TOTAL: ${s.total_fees.toLocaleString()}</div>
                        <div style="color:var(--success)">PAID: ${s.fees_paid.toLocaleString()}</div>
                    </div>
                    <input type="number" placeholder="Enter Payment..." style="background:#f1f5f9; padding:12px; border-radius:10px;" onchange="updatePay('${s.id}', this.value)">
                </div>`).join('');
        }

        async function toggleAbs(id, current) {
            await db.from('Students').update({ is_absent: !current }).eq('id', id);
            sync();
        }

        async function updatePay(id, val) {
            const s = students.find(x => x.id == id);
            const total = Number(s.fees_paid || 0) + Number(val);
            await db.from('Students').update({ fees_paid: total }).eq('id', id);
            sync();
        }

        async function delS(id) {
            if(confirm("Delete this student permanently?")) {
                await db.from('Students').delete().eq('id', id);
                sync();
            }
        }

        async function saveStudent() {
            const p = {
                sch_id: activeSch,
                name: document.getElementById('r-name').value.toUpperCase(),
                lin: document.getElementById('r-lin').value,
                class: document.getElementById('r-class').value,
                total_fees: document.getElementById('r-fees').value,
                location: document.getElementById('r-loc').value,
                health_status: document.getElementById('r-health').value,
                fees_paid: 0, is_absent: false, gender: 'Male'
            };
            await db.from('Students').insert([p]);
            alert("STUDENT ADDED");
            sync(); nav('list');
        }

        function nav(v, b) {
            ['v-dash','v-list','v-fin','v-add'].forEach(x => document.getElementById(x).classList.add('hidden'));
            document.getElementById('v-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(b) b.classList.add('active');
        }

        setInterval(() => {
            document.getElementById('display-time').innerText = new Date().toLocaleString('en-GB', { 
                weekday: 'long', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit', second: '2-digit' 
            }).toUpperCase();
        }, 1000);
    </script>
</body>
</html>
