<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PMS V71 PROFESSIONAL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f6f9; user-select: none; }
        .header { background: #001a33; color: white; padding: 15px; text-align: center; border-bottom: 3px solid #ffc107; }
        .tabs { display: flex; background: white; justify-content: space-around; padding: 10px; border-bottom: 1px solid #ddd; }
        .tab { cursor: pointer; font-weight: bold; font-size: 13px; color: #666; }
        .active { color: #004085; border-bottom: 2px solid #004085; }
        .card { background: white; margin: 10px; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat { padding: 15px; border-radius: 10px; color: white; font-weight: bold; text-align: center; }
        .blue { background: #004085; } .green { background: #28a745; }
        .red { background: #dc3545; } .gold { background: #ffc107; color: black; }
        .btn { background: #004085; color: white; padding: 12px; border: none; width: 100%; margin-top: 10px; border-radius: 5px; font-weight: bold; }
        .btn-mark { padding: 8px; border: none; border-radius: 5px; color: white; font-weight: bold; margin-left: 5px; cursor: pointer; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .student { padding: 15px; border-bottom: 1px solid #eee; position: relative; }
        .hidden { display: none !important; }
        #routine { font-size: 12px; color: #ffc107; font-weight: bold; margin-top: 5px; }
    </style>
</head>

<body>

<div id="loginPage" style="padding: 80px 20px; text-align: center;">
    <h2 style="color:#001a33">PROGRESSIVE PMS PRO</h2>
    <div class="card" style="max-width: 350px; margin: auto;">
        <input id="key" type="password" placeholder="Enter System Key" style="text-align:center;">
        <button onclick="login()" class="btn">SECURE LOGIN</button>
    </div>
</div>

<div id="app" class="hidden">
    <div class="header">
        <h3 style="margin:0;">PROGRESSIVE MOTHERS</h3>
        <div id="time" style="font-size:12px; opacity:0.8;"></div>
        <div id="routine">STATUS: INITIALIZING...</div>
    </div>

    <div class="tabs">
        <div id="tabDash" class="tab active" onclick="openTab(event,'dash')">Dashboard</div>
        <div id="tabStud" class="tab" onclick="openTab(event,'students')">Students</div>
        <div id="tabAtt" class="tab" onclick="openTab(event,'attendance')">Attendance</div>
        <div id="tabFin" class="tab" onclick="openTab(event,'finance')">Finance</div>
    </div>

    <div id="dash" class="card"></div>

    <div id="students" class="card hidden">
        <div id="studentForm">
            <h4 style="margin-top:0;">Register New Student</h4>
            <input id="stName" placeholder="Full Name">
            <input id="stLin" placeholder="LIN Number">
            <div class="grid">
                <input id="stAge" placeholder="Age">
                <select id="stGender">
                    <option value="">-- Gender --</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            <select id="stClass">
                <option value="Baby">Baby</option><option value="Middle">Middle</option><option value="Top">Top</option>
                <option value="P.1">P.1</option><option value="P.2">P.2</option><option value="P.3">P.3</option>
                <option value="P.4">P.4</option><option value="P.5">P.5</option><option value="P.6">P.6</option><option value="P.7">P.7</option>
            </select>
            <input id="stContact" placeholder="Parent Contact">
            <button onclick="saveStudent()" class="btn">Register Student</button>
        </div>
        <hr>
        <input type="text" id="stSearch" oninput="render()" placeholder="🔍 Search by Name or LIN...">
        <div id="list"></div>
    </div>

    <div id="attendance" class="card hidden">
        <label><b>Select Class for Roll Call:</b></label>
        <select id="attClassSelect" onchange="renderAttendance(this.value)">
            <option value="">-- Choose Class --</option>
            <option>Baby</option><option>Middle</option><option>Top</option>
            <option>P.1</option><option>P.2</option><option>P.3</option>
            <option>P.4</option><option>P.5</option><option>P.6</option><option>P.7</option>
        </select>
        <div id="attendanceList" style="margin-top:15px;"></div>
    </div>

    <div id="finance" class="card hidden">
        <div id="financeSummary" class="stat red" style="margin-bottom:10px; background:#800000"></div>
        <div id="financeList"></div>
    </div>
</div>

<script>
const sb = supabase.createClient(
    "https://kjftrwuucjdnhfwesrup.supabase.co",
    "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO"
);

let students = [], attendance = [], ROLE = "";

function login(){
    let k = document.getElementById('key').value.trim().toUpperCase();
    const now = new Date();
    const hour = now.getHours();

    if(k === "JESUS CARES") ROLE = "ADMIN";
    else if(k === "DIRECTOR2026") ROLE = "DIRECTOR";
    else if(k === "TEACHER256") {
        if(hour < 7 || hour >= 21) return alert("TEACHERS: Login only 7AM - 9PM");
        ROLE = "TEACHER";
    }
    else if(k === "FINANCE2026") ROLE = "FINANCE";
    else return alert("Invalid Password");

    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');

    applyPermissions();
    load();
}

function applyPermissions(){
    if(ROLE === "TEACHER") {
        document.getElementById('tabFin').classList.add('hidden');
        document.getElementById('studentForm').classList.add('hidden');
    }
    if(ROLE === "FINANCE") {
        document.getElementById('tabAtt').classList.add('hidden');
    }
    if(ROLE === "DIRECTOR") {
        document.getElementById('studentForm').classList.add('hidden');
    }
}

async function load(){
    let { data: stData } = await sb.from('students').select('*').order('name', { ascending: true });
    students = stData || [];
    
    let { data: attData } = await sb.from('attendance').select('*');
    attendance = attData || [];

    dashboard();
    render();
    financeView();
}

function dashboard(){
    let total = students.length;
    let boys = students.filter(s => s.gender === "Male").length;
    let girls = students.filter(s => s.gender === "Female").length;
    let today = new Date().toISOString().split('T')[0];
    let absToday = attendance.filter(a => a.date === today && a.status === "Absent").length;

    let alerts = "";
    students.forEach(s => {
        let rec = attendance.filter(a => a.student_id == s.id).sort((a,b) => new Date(b.date) - new Date(a.date));
        if(rec.length >= 2 && rec[0].status === "Absent" && rec[1].status === "Absent") {
            alerts += `🚨 ${s.name} (${s.class}) absent 2 days<br>`;
        }
    });

    document.getElementById('dash').innerHTML = `
        <div class="grid">
            <div class="stat blue">Total: ${total}</div>
            <div class="stat green">Boys: ${boys}</div>
            <div class="stat gold">Girls: ${girls}</div>
            <div class="stat red">Absent Today: ${absToday}</div>
        </div>
        <div style="margin-top:15px; color:red; font-weight:bold;">${alerts}</div>
    `;
}

function render(){
    let q = document.getElementById('stSearch').value.toUpperCase();
    let html = "";
    students.filter(s => s.name.toUpperCase().includes(q) || (s.lin && s.lin.includes(q))).forEach(s => {
        html += `
        <div class="student">
            <b>${s.name}</b> [${s.gender}]<br>
            <small>LIN: ${s.lin || 'N/A'} | Class: ${s.class}</small><br>
            ${ROLE === "ADMIN" ? `<button onclick="del('${s.id}')" style="background:red; color:white; border:none; padding:5px; font-size:10px; border-radius:3px;">Delete</button>` : ""}
        </div>`;
    });
    document.getElementById('list').innerHTML = html;
}

async function saveStudent(){
    const p = {
        name: document.getElementById('stName').value,
        lin: document.getElementById('stLin').value,
        age: document.getElementById('stAge').value,
        gender: document.getElementById('stGender').value,
        class: document.getElementById('stClass').value,
        contact: document.getElementById('stContact').value
    };

    if(!p.name || !p.gender) return alert("Fill Name and Gender!");

    await sb.from('students').insert([p]);
    alert("Saved Successfully!");
    load(); // Refresh without logout
}

async function del(id){
    if(!confirm("Delete this student?")) return;
    await sb.from('students').delete().eq('id', id);
    load();
}

function renderAttendance(cls){
    if(!cls) return document.getElementById('attendanceList').innerHTML = "";
    let list = students.filter(s => s.class === cls);
    let html = `<h4>Roll Call: ${cls}</h4>`;
    list.forEach(s => {
        html += `
        <div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
            <span>${s.name}</span>
            <div>
                <button onclick="mark('${s.id}','Present')" class="btn-mark green">✅</button>
                <button onclick="mark('${s.id}','Absent')" class="btn-mark red">❌</button>
            </div>
        </div>`;
    });
    document.getElementById('attendanceList').innerHTML = html;
}

async function mark(id, status){
    await sb.from('attendance').insert([{
        student_id: id,
        status: status,
        date: new Date().toISOString().split('T')[0]
    }]);
    alert("Marked " + status);
    load();
}

function financeView(){
    if(ROLE === "TEACHER") return;
    let debt = students.reduce((a, b) => a + (b.fees_balance || 0), 0);
    document.getElementById('financeSummary').innerText = "TOTAL OUTSTANDING DEBT: UGX " + debt.toLocaleString();

    let html = "";
    students.forEach(s => {
        html += `
        <div class="student">
            <b>${s.name}</b><br>
            Balance: <span style="color:red">UGX ${ (s.fees_balance || 0).toLocaleString() }</span><br>
            ${ROLE !== "DIRECTOR" ? `<button onclick="updateFees('${s.id}')" style="font-size:10px; padding:5px;">Update Payment</button>` : ""}
        </div>`;
    });
    document.getElementById('financeList').innerHTML = html;
}

async function updateFees(id){
    let exp = parseInt(prompt("Total Fees Expected?")) || 0;
    let paid = parseInt(prompt("Amount Paid?")) || 0;
    await sb.from('students').update({
        fees_expected: exp,
        fees_paid: paid,
        fees_balance: exp - paid
    }).eq('id', id);
    load();
}

function openTab(evt, tab) {
    document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
    document.getElementById(tab).classList.remove('hidden');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    evt.currentTarget.classList.add('active');
}

setInterval(() => {
    let now = new Date();
    document.getElementById('time').innerText = now.toLocaleString();
    let h = now.getHours(), m = now.getMinutes(), time = h * 100 + m, day = now.getDay();
    let status = "CLASS TIME";
    if (day === 6) status = "HAPPY SABBATH";
    else if (time >= 1030 && time < 1100) status = "BREAK TIME";
    else if (time >= 1300 && time < 1400) status = "LUNCH TIME";
    else if (time >= 1600 && time < 1900) status = "GOING HOME";
    else if (time >= 1900 && time <= 2100) status = "PREPS";
    document.getElementById('routine').innerText = "STATUS: " + status;
}, 1000);
</script>

</body>
</html>
