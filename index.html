<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Progressive Mothers School Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
--blue:#1e40af;
--red:#e11d48;
}
body{
font-family:Arial; margin:0; background:#f1f5f9;
}
header{
background:var(--red); color:white; padding:15px; text-align:center; font-weight:bold; position:relative;
}
.adminBtn{
position:absolute; right:10px; top:12px; font-size:11px; border:1px solid white; padding:5px; cursor:pointer;
}
.hero{
background:var(--blue); color:white; padding:20px; text-align:center; border-radius:0 0 25px 25px;
}
.statGrid{
display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:10px; padding:15px; margin-top:-20px;
}
.stat{
background:white; padding:15px; border-radius:12px; text-align:center; box-shadow:0 4px 8px rgba(0,0,0,0.1);
}
.container{
max-width:600px; margin:auto; padding:15px;
}
.card{
background:white; padding:15px; border-radius:15px; margin-bottom:12px; box-shadow:0 2px 8px rgba(0,0,0,0.05);
}
input,select{
width:100%; padding:12px; margin-bottom:8px; border-radius:8px; border:1px solid #ccc;
}
button{
padding:10px; border:none; border-radius:8px; cursor:pointer; margin-top:4px;
}
.btn{ background:var(--blue); color:white; width:100%; }
.delete{ background:red; color:white; }
.promote{ background:green; color:white; }
</style>
</head>

<body>

<header>
PROGRESSIVE MOTHERS SCHOOL DASHBOARD
<div class="adminBtn" onclick="admin()">ADMIN</div>
</header>

<div class="hero">
<h3 style="margin:0">School Data Center</h3>
<small>With God Everything Is Possible</small>
</div>

<!-- Dashboard -->
<div class="statGrid">
<div class="stat">
<span id="total">0</span><br>TOTAL STUDENTS
</div>
<div class="stat">
<span id="active">0</span><br>ACTIVE
</div>
<div class="stat">
<span id="graduated">0</span><br>FINISHED P.7
</div>
<div class="stat">
<span id="p1">0</span><br>P.1 STUDENTS
</div>
</div>

<div class="container">
<div id="form" class="card" style="display:none">
<input id="names" placeholder="Student Name">
<input id="age" type="number" placeholder="Age">
<input id="contacts" placeholder="Contact">
<input id="location" placeholder="Location">
<input id="dob" type="date" placeholder="Date of Birth">
<input id="health_status" placeholder="Health Status">
<input id="payment_code" placeholder="Payment Code">

<select id="class">
<option>P.1</option>
<option>P.2</option>
<option>P.3</option>
<option>P.4</option>
<option>P.5</option>
<option>P.6</option>
<option>P.7</option>
</select>

<button class="btn" onclick="save()">SAVE STUDENT</button>
</div>

<div class="card">
<input id="search" placeholder="Search student..." onkeyup="render()">
</div>

<div id="list"></div>
</div>

<script>
// Supabase setup
const URL="https://cpfttwvonuptqdpskobx.supabase.co";
const KEY="sb_publishable_uu88mKaDL9v7-RjzDkH4PQ_oJ3nMkNl";
const client = supabase.createClient(URL,KEY);

let students = [];
let editing = null;

// Initialize
async function init(){
  const { data } = await client.from("students").select("*").order("names");
  students = data || [];
  render();
  updateDashboard();
}

// Show admin form
function admin(){
  if(prompt("Admin Password:")=="mothers.comit1"){
    document.getElementById("form").style.display="block";
  }
}

// Render list
function render(){
  const q = document.getElementById("search").value.toLowerCase();
  const filtered = students.filter(s=>s.names.toLowerCase().includes(q));
  const box = document.getElementById("list");
  box.innerHTML = "";
  filtered.forEach((s,i)=>{
    box.innerHTML+=`
    <div class="card">
      <b>${i+1}. ${s.names}</b><br>
      <small>Class: ${s.class} | LIN: ${s.lin}</small><br>
      <button onclick="idCard('${s.names}','${s.class}','${s.lin}')">ID Card</button>
      <button onclick="edit('${s.id}')">Edit</button>
      <button class="delete" onclick="del('${s.id}')">Delete</button>
      <button class="promote" onclick="promote('${s.id}','${s.class}')">Promote</button>
    </div>
    `;
  });
}

// Update Dashboard
function updateDashboard(){
  document.getElementById("total").innerText = students.length;
  document.getElementById("active").innerText = students.filter(s=>s.status=="Active").length;
  document.getElementById("graduated").innerText = students.filter(s=>s.class=="P.7").length;
  document.getElementById("p1").innerText = students.filter(s=>s.class=="P.1").length;
}

// Save student
async function save(){
  const names = document.getElementById("names").value;
  const age = document.getElementById("age").value;
  const contacts = document.getElementById("contacts").value;
  const location = document.getElementById("location").value;
  const dob = document.getElementById("dob").value;
  const health_status = document.getElementById("health_status").value;
  const payment_code = document.getElementById("payment_code").value;
  const cls = document.getElementById("class").value;

  if(!names) return alert("Enter student name");

  const letter = names.charAt(0).toUpperCase();
  const num = (students.length+1).toString().padStart(4,"0");
  const lin = "PM"+letter+num;

  const payload = {names, age, contacts, location, dob, health_status, payment_code, class:cls, status:"Active", lin};

  if(editing){
    await client.from("students").update(payload).eq("id",editing);
    editing=null;
  } else {
    await client.from("students").insert([payload]);
  }

  // Clear form
  document.getElementById("names").value="";
  document.getElementById("age").value="";
  document.getElementById("contacts").value="";
  document.getElementById("location").value="";
  document.getElementById("dob").value="";
  document.getElementById("health_status").value="";
  document.getElementById("payment_code").value="";
  document.getElementById("form").style.display="none";

  init();
}

// Edit
function edit(id){
  const s = students.find(x=>x.id==id);
  document.getElementById("names").value = s.names;
  document.getElementById("age").value = s.age;
  document.getElementById("contacts").value = s.contacts;
  document.getElementById("location").value = s.location;
  document.getElementById("dob").value = s.dob;
  document.getElementById("health_status").value = s.health_status;
  document.getElementById("payment_code").value = s.payment_code;
  document.getElementById("class").value = s.class;
  editing = id;
  document.getElementById("form").style.display="block";
}

// Delete
async function del(id){
  if(!confirm("Delete student?")) return;
  await client.from("students").delete().eq("id",id);
  init();
}

// Promote
async function promote(id,current){
  const classes=["P.1","P.2","P.3","P.4","P.5","P.6","P.7"];
  let i = classes.indexOf(current);
  if(i==6){ alert("Student finished P.7"); return; }
  let next = classes[i+1];
  await client.from("students").update({class:next}).eq("id",id);
  init();
}

// ID Card
function idCard(names,cls,lin){
  let w=window.open("");
  w.document.write(`
    <div style="width:320px;border:3px solid #1e40af;border-radius:15px;padding:20px;font-family:Arial">
      <h3 style="text-align:center;color:#1e40af">PROGRESSIVE MOTHERS SCHOOL</h3>
      <p style="text-align:center">With God Everything Is Possible</p>
      <hr>
      <p><b>Name:</b> ${names}</p>
      <p><b>Class:</b> ${cls}</p>
      <p><b>LIN:</b> ${lin}</p>
      <p style="font-size:11px">Gayaza Kijabijjo</p>
    </div>
  `);
  w.print();
}

window.onload=init;
</script>

</body>
</html>
