<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0052cc; --accent: #ff3b30; --success: #34c759; --dark: #020617; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #1e293b; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* HEADER */
        .app-header { background: white; padding: 20px; border-bottom: 5px solid var(--primary); text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .school-title { font-size: 1.7rem; font-weight: 900; color: var(--dark); text-transform: uppercase; letter-spacing: -1px; }

        /* SCROLLABLE VIEWPORT */
        .main-view { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        
        .card { background: white; border-radius: 28px; padding: 22px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .stat-card { background: white; padding: 18px; border-radius: 24px; text-align: center; border-bottom: 5px solid var(--primary); }

        /* DATA INPUTS */
        label { font-size: 0.7rem; font-weight: 800; color: #64748b; margin-left: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 16px; border-radius: 16px; border: 2px solid #e2e8f0; margin-bottom: 12px; font-weight: 700; font-size: 1rem; }
        input:focus { border-color: var(--primary); outline: none; }
        .btn-main { background: var(--primary); color: white; padding: 18px; border-radius: 18px; border: none; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; }

        /* LISTS */
        .list-item { background: white; padding: 16px; border-radius: 20px; margin-bottom: 12px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 15px; }
        .list-img { width: 60px; height: 60px; border-radius: 16px; object-fit: cover; background: #f1f5f9; }

        /* BOTTOM NAV */
        .nav-bar { background: white; height: 80px; border-top: 1px solid #e2e8f0; display: flex; justify-content: space-around; align-items: center; padding-bottom: 10px; }
        .nav-item { color: #94a3b8; text-align: center; font-size: 0.65rem; font-weight: 800; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.5rem; display: block; margin-bottom: 4px; }

        #auth-gate { position: fixed; inset: 0; background: var(--dark); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-gate">
        <div style="background:white; padding:40px; border-radius:35px; width:100%; max-width:400px; text-align:center;">
            <h1 style="font-weight:900; letter-spacing:-2px; margin-bottom:20px;">ESMS <span style="color:var(--primary)">DATA</span></h1>
            <input type="text" id="auth-id" placeholder="SCHOOL ID" style="text-align:center; text-transform:uppercase;">
            <input type="password" id="auth-key" placeholder="ACCESS KEY" style="text-align:center;">
            <button class="btn-main" onclick="initSession()">AUTHORIZE SESSION</button>
        </div>
    </div>

    <header class="app-header">
        <div id="display-sch" class="school-title">...</div>
        <div id="display-clock" style="font-size:0.8rem; font-weight:800; color:var(--primary); margin-top:5px;"></div>
    </header>

    <main class="main-view" id="main-scroll">
        <div id="v-dash">
            <div class="stat-grid">
                <div class="stat-card"><h2 id="st-total">0</h2><small>REGISTRY</small></div>
                <div class="stat-card"><h2 id="st-debt" style="color:var(--accent)">0</h2><small>BALANCE</small></div>
            </div>
            <div class="card">
                <h4 style="margin-bottom:10px;"><i class="fas fa-database"></i> DATA LOGS</h4>
                <div id="notif-box" style="font-size:0.75rem; font-weight:700; color:#64748b; line-height:1.5;">Session started.</div>
            </div>
        </div>

        <div id="v-list" class="hidden">
            <input type="text" id="search-input" placeholder="Search Database..." onkeyup="filterData()" style="position:sticky; top:0; z-index:100; border:3px solid var(--primary);">
            <div id="render-list"></div>
        </div>

        <div id="v-roll" class="hidden">
            <div class="card">
                <h3>ATTENDANCE VERIFICATION</h3>
                <div id="render-roll" style="margin-top:15px;"></div>
            </div>
        </div>

        <div id="v-reg" class="hidden">
            <div class="card">
                <h3 id="form-title">DATA ENTRY</h3>
                <input type="hidden" id="f-id">
                <div style="text-align:center; margin:15px 0;">
                    <img id="f-preview" style="width:100px; height:100px; border-radius:20px; object-fit:cover; display:none; margin:0 auto 10px; border:3px solid var(--primary);">
                    <input type="file" onchange="processImg(this)" style="font-size:0.7rem;">
                    <input type="hidden" id="f-img">
                </div>
                
                <label>Full Name</label>
                <input type="text" id="f-name">

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div><label>Class</label>
                        <select id="f-class">
                            <option>Baby Class</option><option>Middle Class</option><option>Top Class</option>
                            <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                            <option>P.5</option><option>P.6</option><option>P.7</option>
                        </select>
                    </div>
                    <div><label>Age</label><input type="number" id="f-age"></div>
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div><label>Date of Birth</label><input type="date" id="f-dob"></div>
                    <div><label>Contact</label><input type="text" id="f-contact"></div>
                </div>

                <label>Address & Health Status</label>
                <input type="text" id="f-loc" placeholder="Location">
                <input type="text" id="f-health" placeholder="Health Notes">

                <label>Fees Policy (Term Total)</label>
                <input type="number" id="f-fees">

                <button id="save-btn" class="btn-main" onclick="commitData()">COMMIT TO DATABASE</button>
                <button id="cancel-btn" class="hidden" onclick="clearForm()" style="width:100%; margin-top:10px; border:none; background:#f1f5f9; padding:12px; border-radius:12px; font-weight:800;">ABORT EDIT</button>
            </div>
        </div>

        <div id="v-fin" class="hidden">
            <div class="card"><h3>LEDGER MANAGEMENT</h3><div id="render-fin" style="margin-top:15px;"></div></div>
        </div>
    </main>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="nav('dash', this)"><i class="fas fa-chart-line"></i>DASH</div>
        <div class="nav-item" onclick="nav('list', this)"><i class="fas fa-database"></i>LIST</div>
        <div class="nav-item" onclick="nav('roll', this)"><i class="fas fa-calendar-check"></i>ROLL</div>
        <div class="nav-item" onclick="nav('reg', this)"><i class="fas fa-plus-square"></i>ADD</div>
        <div class="nav-item" onclick="nav('fin', this)"><i class="fas fa-wallet"></i>FEES</div>
    </nav>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        let db, activeSch, students = [], rollData = {};

        async function initSession() {
            const sid = document.getElementById('auth-id').value.toUpperCase().trim();
            const key = document.getElementById('auth-key').value.trim();
            db = supabase.createClient(SB_URL, SB_KEY);
            
            const { data, error } = await db.from('Schools').select('*').eq('sch_id', sid).single();
            if (data && (key === data.admin_key || key === data.finance_key || key === data.teacher_key)) {
                activeSch = sid;
                document.getElementById('display-sch').innerText = data.sch_name;
                document.getElementById('auth-gate').classList.add('hidden');
                syncData();
            } else { alert("Principle Violation: Access Denied."); }
        }

        async function syncData() {
            const { data } = await db.from('Students').select('*').eq('sch_id', activeSch).order('name', { ascending: true });
            students = data || [];
            renderUI();
        }

        function processImg(i) {
            const r = new FileReader();
            r.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const c = document.createElement('canvas');
                    c.width = 300; c.height = 300;
                    c.getContext('2d').drawImage(img, 0, 0, 300, 300);
                    const b = c.toDataURL('image/jpeg', 0.8);
                    document.getElementById('f-preview').src = b;
                    document.getElementById('f-preview').style.display='block';
                    document.getElementById('f-img').value = b;
                };
                img.src = e.target.result;
            };
            r.readAsDataURL(i.files[0]);
        }

        async function commitData() {
            const btn = document.getElementById('save-btn');
            const id = document.getElementById('f-id').value;
            
            const p = {
                sch_id: activeSch,
                name: document.getElementById('f-name').value.toUpperCase().trim(),
                class: document.getElementById('f-class').value,
                age: parseInt(document.getElementById('f-age').value),
                dob: document.getElementById('f-dob').value,
                contact: document.getElementById('f-contact').value,
                location: document.getElementById('f-loc').value,
                health_status: document.getElementById('f-health').value,
                total_fees: parseInt(document.getElementById('f-fees').value) || 0,
                photo_url: document.getElementById('f-img').value
            };

            if(!p.name) return alert("Validation Failed: Name Required");

            btn.innerText = "COMMITTING..."; btn.disabled = true;

            try {
                if(id) { await db.from('Students').update(p).eq('id', id); }
                else {
                    p.lin = activeSch + "-" + Math.floor(1000 + Math.random()*8999);
                    await db.from('Students').insert([p]);
                }
                log("Transaction Successful for: " + p.name);
                await syncData();
                clearForm();
                nav('list');
            } catch(e) { log("Data Conflict: Write Aborted"); }
            
            btn.innerText = "COMMIT TO DATABASE"; btn.disabled = false;
        }

        function renderUI() {
            let debt = 0; students.forEach(s => debt += (s.total_fees - (s.paid_fees || 0)));
            document.getElementById('st-total').innerText = students.length;
            document.getElementById('st-debt').innerText = debt.toLocaleString();

            const html = students.map(s => `
                <div class="list-item">
                    <img src="${s.photo_url || ''}" class="list-img">
                    <div style="flex:1"><b>${s.name}</b><br><small>${s.class} | LIN: ${s.lin}</small></div>
                    <i class="fas fa-edit" style="color:var(--primary); padding:10px" onclick="editRec('${s.id}')"></i>
                    <i class="fas fa-trash" style="color:var(--accent); padding:10px" onclick="dropRec('${s.id}')"></i>
                </div>`).join('');
            document.getElementById('render-list').innerHTML = html || "<p style='text-align:center; padding:20px;'>No Data Found.</p>";

            document.getElementById('render-roll').innerHTML = students.map(s => `
                <div class="list-item" onclick="toggleRoll('${s.id}')" style="border-left: 8px solid ${rollData[s.id] ? 'var(--success)' : '#eee'}">
                    <div style="flex:1"><b>${s.name}</b><br><small>${s.class}</small></div>
                    <i class="fas ${rollData[s.id] ? 'fa-check-circle' : 'fa-circle'}" style="color:${rollData[s.id] ? 'var(--success)' : '#eee'}; font-size:1.5rem"></i>
                </div>`).join('');

            document.getElementById('render-fin').innerHTML = students.map(s => `
                <div class="list-item">
                    <div style="flex:1"><b>${s.name}</b><br><small>Bal: ${(s.total_fees - (s.paid_fees||0)).toLocaleString()}</small></div>
                    <input type="number" placeholder="Amt" style="width:110px; margin:0" onchange="postPay('${s.id}', this.value)">
                </div>`).join('');
        }

        async function postPay(id, val) {
            const s = students.find(x => x.id == id);
            const sum = Number(s.paid_fees || 0) + Number(val);
            const { error } = await db.from('Students').update({ paid_fees: sum }).eq('id', id);
            if(!error) { log("Ledger Entry: " + val + " for " + s.name); syncData(); }
        }

        async function dropRec(id) {
            if(confirm("Confirm Irreversible Record Deletion?")) {
                await db.from('Students').delete().eq('id', id);
                log("Data Integrity: Record Purged.");
                syncData();
            }
        }

        function editRec(id) {
