<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eudes Media | Progressive Mother's Sync</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #003366; --gold: #ffc107; --white: #ffffff; --green: #2b9348; --red: #d90429; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; margin: 0; padding: 0; }
        
        #gate { position:fixed; inset:0; background:var(--blue); z-index:2000; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
        .login-box { background:white; padding:30px; border-radius:25px; width:90%; max-width:360px; text-align:center; box-shadow:0 15px 40px rgba(0,0,0,0.4); }
        
        .header { background: var(--blue); color: white; padding: 15px; position: sticky; top: 0; z-index: 1000; border-bottom: 4px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .hero { background: #001a33; padding: 25px; text-align: center; color: white; border-bottom: 4px solid var(--blue); }
        #clock { font-size: 34px; font-weight: 800; color: var(--gold); }

        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; margin-top: -35px; }
        .stat-card { background: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.1); border-top: 5px solid var(--blue); }
        .stat-val { font-size: 20px; font-weight: 900; color: var(--blue); display: block; }

        .nav-tabs { display: flex; background: var(--blue); position: sticky; top: 65px; z-index: 999; }
        .tab { flex: 1; text-align: center; padding: 18px 5px; font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.4); cursor: pointer; text-transform: uppercase; }
        .tab.active { color: var(--gold); border-bottom: 4px solid var(--gold); background: rgba(0,0,0,0.2); }

        .card { background: white; border-radius: 15px; padding: 20px; margin: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-left: 8px solid var(--blue); }
        .btn-main { width: 100%; background: var(--blue); color: white; padding: 18px; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; font-size: 16px; }
        .hidden { display: none !important; }
        input { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="gate">
    <div class="login-box">
        <h2 style="color:var(--blue); margin:0;">EUDES MEDIA</h2>
        <p style="font-size:10px; font-weight:900; color:#aaa; margin-bottom:25px;">PROGRESSIVE MOTHER'S PORTAL</p>
        <input id="login_id" type="text" placeholder="SCHOOL ID" value="PM001" style="text-align:center;">
        <input id="login_key" type="password" placeholder="ACCESS KEY" style="text-align:center;">
        <button onclick="startApp()" class="btn-main">AUTHENTICATE</button>
    </div>
</div>

<div id="app" class="hidden">
    <div class="header">
        <div><b id="sch_display_name">PROGRESSIVE MOTHER'S</b><br><span id="db_status" style="font-size:9px; color:var(--gold);">CONNECTING...</span></div>
        <button onclick="forceSync()" style="background:var(--green); color:white; border:none; padding:8px 12px; border-radius:8px; font-weight:900;">SYNC DATA</button>
    </div>

    <div class="hero">
        <div id="clock">00:00:00</div>
        <div style="font-size:10px; font-weight:900; margin-top:5px; color:var(--gold);">● SYSTEM ONLINE</div>
    </div>

    <div class="dashboard">
        <div class="stat-card"><span class="stat-val" id="stat_total">0</span><span style="font-size:9px; font-weight:800;">PUPILS</span></div>
        <div class="stat-card"><span class="stat-val" id="stat_present" style="color:var(--green)">0</span><span style="font-size:9px; font-weight:800;">PRESENT</span></div>
        <div class="stat-card"><span class="stat-val" id="stat_absent" style="color:var(--red)">0</span><span style="font-size:9px; font-weight:800;">ABSENT</span></div>
    </div>

    <div class="nav-tabs">
        <div class="tab active" id="tab-rec" onclick="show('rec')">Records</div>
        <div class="tab" id="tab-adm" onclick="show('adm')">Admission</div>
    </div>

    <div id="v-rec">
        <div style="padding:15px;"><input id="search_in" placeholder="Search by name..." oninput="draw()"></div>
        <div id="list_view"></div>
    </div>

    <div id="v-adm" class="hidden">
        <div class="card">
            <h3>NEW REGISTRATION</h3>
            <p style="font-size:12px; color:#666;">Each new entry will automatically link to <b>PM001</b>.</p>
            <input id="reg_name" placeholder="Full Student Name">
            <input id="reg_class" placeholder="Class">
            <button onclick="commit()" class="btn-main">SAVE RECORD</button>
        </div>
    </div>

    <div style="text-align:center; padding:30px; font-size:10px; font-weight:900; color:#bbb;">
        EUDES MEDIA | +256762992440
    </div>
</div>

<script>
    const S_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
    const _db = supabase.createClient(S_URL, S_KEY);

    let _data = [];
    let _activeSch = "PM001";

    function startApp() {
        const key = document.getElementById('login_key').value;
        if(key) {
            document.getElementById('gate').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
            forceSync();
        }
    }

    async function forceSync() {
        document.getElementById('db_status').innerText = "FETCHING...";
        
        // CRITICAL FIX: Using 'sch_id' as verified in your screenshot
        let { data, error } = await _db
            .from('students')
            .select('*')
            .eq('sch_id', _activeSch);
        
        if(error) {
            document.getElementById('db_status').innerText = "SYNC ERROR";
            alert("Database Error: " + error.message);
        } else {
            _data = data || [];
            document.getElementById('db_status').innerText = "CONNECTED";
            document.getElementById('stat_total').innerText = _data.length;
            draw();
        }
    }

    function draw() {
        const q = document.getElementById('search_in').value.toLowerCase();
        const filtered = _data.filter(s => s.name && s.name.toLowerCase().includes(q));

        document.getElementById('list_view').innerHTML = filtered.length ? filtered.map(s => `
            <div class="card">
                <b>${s.name}</b><br>
                <small>${s.class} | ID: ${s.sch_id}</small>
            </div>
        `).join('') : '<div style="text-align:center; padding:30px; color:#888;">No records found for this School ID.</div>';
    }

    async function commit() {
        const student = {
            sch_id: _activeSch,
            name: document.getElementById('reg_name').value.toUpperCase(),
            class: document.getElementById('reg_class').value,
            lin: "PMA-" + Math.floor(1000 + Math.random() * 9000)
        };

        const { error } = await _db.from('students').insert([student]);
        if(!error) { alert("Record Saved Successfully!"); forceSync(); show('rec'); }
        else { alert("Insert Error: " + error.message); }
    }

    function show(id) {
        ['rec','adm'].forEach(x => {
            document.getElementById('v-'+x).classList.add('hidden');
            document.getElementById('tab-'+x).classList.remove('active');
        });
        document.getElementById('v-'+id).classList.remove('hidden');
        document.getElementById('tab-'+id).classList.add('active');
    }
</script>
</body>
</html>
