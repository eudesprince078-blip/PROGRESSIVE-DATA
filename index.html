<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROGRESSIVE PMS - FULL PRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #0056b3; --dark-blue: #003366; --white: #ffffff; --green: #25d366; --red: #dc3545; --gray: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); margin: 0; padding: 10px; }
        .box { background: var(--white); padding: 20px; border-radius: 15px; max-width: 1000px; margin: 10px auto; border: 1px solid #ddd; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .header-card { background: linear-gradient(135deg, var(--blue), var(--dark-blue)); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        label { font-size: 12px; font-weight: bold; color: var(--dark-blue); display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 10px; font-size: 14px; box-sizing: border-box; background: #fafafa; }
        .btn-main { background: var(--blue); color: white; padding: 16px; border: none; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 14px; text-transform: uppercase; }
        .search-box { width: 100%; padding: 15px; border: 2px solid var(--blue); border-radius: 10px; margin-bottom: 15px; font-size: 15px; }
        .student-item { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid var(--blue); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-edit { background: var(--blue); color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; font-size: 12px; }
        .footer { text-align: center; margin-top: 30px; font-size: 12px; font-weight: bold; color: #555; border-top: 1px solid #ddd; padding-top: 15px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loginGate" class="box" style="max-width:350px; margin-top:80px; text-align:center;">
    <h2 style="color:var(--blue)">PMS LOGIN</h2>
    <input id="u" placeholder="USERNAME" style="margin-bottom:10px;">
    <input id="p" type="password" placeholder="PASSWORD">
    <button onclick="login()" class="btn-main" style="margin-top:20px;">ENTER SYSTEM</button>
</div>

<div id="mainApp" class="hidden">
    <div class="header-card">
        <h2 style="margin:0; letter-spacing: 1px;">PROGRESSIVE SCHOOL DATA</h2>
        <p style="margin:5px 0 0 0; font-size:11px; opacity: 0.9;">Eudes Media Smart Management System</p>
    </div>

    <div class="box">
        <h3 id="fTitle" style="color:var(--blue); margin-top:0;">Register New Student</h3>
        <input type="hidden" id="editId">
        <div class="grid">
            <div><label>Full Name</label><input id="name" placeholder="Enter Full Name"></div>
            <div><label>Parent Phone</label><input id="ph" placeholder="+256..."></div>
            <div><label>Age</label><input id="age" type="number"></div>
            <div><label>Class</label>
                <select id="cl">
                    <option value="Baby">Baby</option><option value="Middle">Middle</option><option value="Top">Top</option>
                    <option value="P.1">P.1</option><option value="P.2">P.2</option><option value="P.3">P.3</option>
                    <option value="P.4">P.4</option><option value="P.5">P.5</option><option value="P.6">P.6</option><option value="P.7">P.7</option>
                </select>
            </div>
            <div><label>Amount Paid (UGX)</label><input id="fPaid" type="number" value="0"></div>
            <div><label>Balance (UGX)</label><input id="fBal" type="number" value="0"></div>
            <div><label>Health Status</label><input id="health" value="Good"></div>
        </div>
        <button onclick="saveRecord()" id="sBtn" class="btn-main">CONFIRM & SAVE RECORD</button>
    </div>

    <div class="box" style="border: none; background: transparent; padding: 0;">
        <input type="text" id="sBar" onkeyup="search()" class="search-box" placeholder="🔍 Search Name, LIN, or Class...">
        <div id="listBody"></div>
    </div>

    <div class="footer">Eudes Media | +256762992440</div>
</div>

<script>
    // FIXED CONNECTION STRINGS
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co".trim();
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO".trim();
    let sb = null;
    let students = [];
    let processedNumbers = new Set(); 

    function login() {
        const u = document.getElementById('u').value.trim().toUpperCase();
        const p = document.getElementById('p').value.trim().toUpperCase();
        if(u === "PROGRESSIVE" && p === "JESUS CARES") {
            try {
                sb = supabase.createClient(SB_URL, SB_KEY);
                document.getElementById('loginGate').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                refresh();
            } catch (e) { alert("Connection Error: " + e.message); }
        } else { alert("Wrong Username or Password"); }
    }

    async function refresh() {
        const { data, error } = await sb.from('students').select('*').order('name', { ascending: true });
        if(!error) { students = data || []; render(students); }
    }

    function render(dataList) {
        let html = "";
        dataList.forEach(s => {
            html += `<div class="student-item">
                <div>
                    <span style="font-size:13px; font-weight:bold; color:var(--dark-blue);">${s.name.toUpperCase()}</span><br>
                    <span style="font-size:11px; color:#666;">LIN: ${s.lin || 'Pending'} | Bal: UGX ${Number(s.fees_balance).toLocaleString()}</span>
                </div>
                <button onclick="editMode('${s.id}')" class="btn-edit">EDIT</button>
            </div>`;
        });
        document.getElementById('listBody').innerHTML = html;
    }

    async function saveRecord() {
        const name = document.getElementById('name').value.trim();
        const age = document.getElementById('age').value;
        const ph = document.getElementById('ph').value.trim();
        const id = document.getElementById('editId').value;
        const paid = document.getElementById('fPaid').value;
        const bal = document.getElementById('fBal').value;

        if(!name || !ph) return alert("Name and Phone are required!");

        // 1. DUPLICATE PREVENTION
        if(!id) {
            const exists = students.some(s => s.name.toLowerCase() === name.toLowerCase() && s.age == age && s.contact === ph);
            if(exists) return alert("❌ ALREADY REGISTERED: A student with this exact name, age, and phone already exists.");
        }

        const pupil = {
            name: name, contact: ph, age: age, health_status: document.getElementById('health').value,
            class: document.getElementById('cl').value, fees_paid: paid, fees_balance: bal
        };

        try {
            if(!id) {
                pupil.lin = "PM" + name.charAt(0).toUpperCase() + "-" + Math.floor(1000 + Math.random() * 9000);
                await sb.from('students').insert([pupil]);
                alert("Successfully Registered!");
            } else {
                await sb.from('students').update(pupil).eq('id', id);
                // 2. AUTO-WHATSAPP RECEIPT TRIGGER
                sendReceipt(pupil);
            }
            refresh();
            resetForm();
        } catch (e) { alert("Save Failed: Check Connection"); }
    }

    function sendReceipt(s) {
        // 3. NO DOUBLE SENDING LOGIC
        if(processedNumbers.has(s.contact)) return;

        const text = `PROGRESSIVE SCHOOL RECEIPT\n--------------------------\nStudent: ${s.name.toUpperCase()}\nLIN: ${s.lin || 'N/A'}\nPaid: UGX ${Number(s.fees_paid).toLocaleString()}\nBalance: UGX ${Number(s.fees_balance).toLocaleString()}\n--------------------------\nThank you for paying. Contact: +256762992440`;
        
        if(confirm("Fee update saved. Send WhatsApp receipt to parent?")) {
            const waUrl = `https://api.whatsapp.com/send?phone=${s.contact}&text=${encodeURIComponent(text)}`;
            window.open(waUrl, '_blank');
            processedNumbers.add(s.contact);
        }
    }

    function editMode(id) {
        const s = students.find(x => x.id == id);
        document.getElementById('editId').value = s.id;
        document.getElementById('name').value = s.name;
        document.getElementById('ph').value = s.contact;
        document.getElementById('age').value = s.age;
        document.getElementById('fPaid').value = s.fees_paid;
        document.getElementById('fBal').value = s.fees_balance;
        document.getElementById('fTitle').innerText = "Updating: " + s.name;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function search() {
        const q = document.getElementById('sBar').value.toUpperCase();
        render(students.filter(s => s.name.toUpperCase().includes(q) || s.class.toUpperCase().includes(q)));
    }

    function resetForm() {
        document.getElementById('editId').value = "";
        document.getElementById('name').value = "";
        document.getElementById('fTitle').innerText = "Register New Student";
    }
</script>
</body>
</html>
