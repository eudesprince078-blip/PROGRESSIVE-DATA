<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS ELITE | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --main: #0047AB; --bg: #f8fafc; --dark: #0f172a; --accent: #F5B81B; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; }
        body { background: var(--bg); color: var(--dark); height: 100vh; display: flex; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 260px; background: var(--dark); display: flex; flex-direction: column; padding: 30px 15px; flex-shrink: 0; }
        .nav-btn { width: 100%; display: flex; align-items: center; padding: 16px 20px; color: #94a3b8; cursor: pointer; border-radius: 12px; margin-bottom: 8px; border: none; background: transparent; transition: 0.3s; font-weight: 700; font-size: 0.85rem; }
        .nav-btn i { font-size: 1.2rem; margin-right: 15px; width: 25px; }
        .nav-btn.active { background: var(--main); color: white; box-shadow: 0 10px 20px rgba(0, 71, 171, 0.2); }

        /* MAIN CONTENT */
        .main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { height: 80px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        .content { padding: 30px; overflow-y: auto; flex: 1; }

        /* STATS */
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 25px; border: 1px solid #e2e8f0; display: flex; align-items: center; }
        .stat-icon { width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; margin-right: 15px; }

        /* PANEL & FORMS */
        .panel { background: white; border-radius: 30px; padding: 35px; border: 1px solid #e2e8f0; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        label { display: block; font-size: 0.65rem; font-weight: 800; color: #64748b; margin-bottom: 8px; margin-left: 5px; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #f1f5f9; background: #f8fafc; font-weight: 700; outline: none; }
        input:focus { border-color: var(--main); background: white; }

        .btn-save { background: var(--main); color: white; padding: 18px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; width: 100%; font-size: 0.9rem; letter-spacing: 1px; }

        /* TABLE */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; min-width: 800px; }
        th { text-align: left; padding: 15px; background: #f8fafc; font-size: 0.7rem; font-weight: 800; color: #64748b; border-bottom: 2px solid #f1f5f9; }
        td { padding: 15px; font-size: 0.85rem; font-weight: 700; border-bottom: 1px solid #f1f5f9; }

        .hidden { display: none !important; }
        .tag { background: #dcfce7; color: #166534; padding: 6px 12px; border-radius: 10px; font-size: 0.65rem; font-weight: 900; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div style="margin-bottom: 50px; text-align: center;">
            <h1 style="color: white; font-weight: 900; font-size: 1.6rem; letter-spacing: -1px;">EUDES<span style="color: var(--accent);">.</span></h1>
            <p style="color: #475569; font-size: 0.6rem; font-weight: 800; letter-spacing: 2px;">ESMS ELITE</p>
        </div>
        
        <button class="nav-btn active" onclick="nav('dash', this)"><i class="fas fa-grid-2"></i>Dashboard</button>
        <button class="nav-btn" onclick="nav('reg', this)"><i class="fas fa-user-plus"></i>Admission</button>
        <button class="nav-btn" onclick="nav('list', this)"><i class="fas fa-users"></i>Learner List</button>
        
        <div style="margin-top: auto; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 20px; text-align: center;">
            <p style="color: #94a3b8; font-size: 0.6rem; font-weight: 800;">EUDES MEDIA SUPPORT</p>
            <p style="color: white; font-size: 0.8rem; font-weight: 900; margin-top: 5px;">+256 762 992440</p>
        </div>
    </nav>

    <div class="main">
        <header class="header">
            <div><h2 id="sch-title" style="font-weight: 900; font-size: 1rem; color: var(--main);">CONNECTING...</h2></div>
            <div class="tag">SYSTEM SECURE</div>
        </header>

        <div class="content">
            <div id="v-dash">
                <div class="grid-stats">
                    <div class="stat-card">
                        <div class="stat-icon" style="background: #eff6ff; color: var(--main);"><i class="fas fa-user-graduate"></i></div>
                        <div><h2 id="stat-total" style="font-size: 1.8rem; font-weight: 900;">0</h2><label>TOTAL LEARNERS</label></div>
                    </div>
                </div>
            </div>

            <div id="v-reg" class="hidden">
                <div class="panel" style="max-width: 800px; margin: 0 auto;">
                    <h2 style="margin-bottom: 30px; font-weight: 900; letter-spacing: -1px;">NEW ADMISSION FORM</h2>
                    
                    <div class="form-row">
                        <div class="group"><label>FULL NAME</label><input type="text" id="f-name"></div>
                        <div class="group"><label>AGE</label><input type="number" id="f-age"></div>
                    </div>

                    <div class="form-row">
                        <div class="group"><label>DATE OF BIRTH</label><input type="date" id="f-dob"></div>
                        <div class="group">
                            <label>CLASS</label>
                            <select id="f-class">
                                <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                                <option>P.5</option><option>P.6</option><option>P.7</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="group"><label>LOCATION</label><input type="text" id="f-loc" placeholder="Physical Location"></div>
                        <div class="group"><label>HEALTH STATUS</label><input type="text" id="f-health" value="NORMAL"></div>
                    </div>

                    <div class="form-row">
                        <div class="group"><label>CONTACT NUMBER</label><input type="tel" id="f-tel" value="+256 "></div>
                        <div class="group"><label>LIN (AUTO)</label><input type="text" id="f-lin" readonly style="background:#f1f5f9; color:var(--main);"></div>
                    </div>

                    <button class="btn-save" onclick="save()" id="sbtn">REGISTER TO DATABASE</button>
                </div>
            </div>

            <div id="v-list" class="hidden">
                <div class="panel">
                    <h2 style="margin-bottom: 20px; font-weight: 900;">LEARNER DIRECTORY</h2>
                    <div style="overflow-x: auto;">
                        <table id="learner-table">
                            <thead>
                                <tr><th>NAME</th><th>LIN</th><th>CLASS</th><th>LOCATION</th><th>HEALTH</th><th>STATUS</th></tr>
                            </thead>
                            <tbody id="list-data"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const supa = supabase.createClient(URL, KEY);
        const SCH_ID = "PM001"; 

        async function init() {
            const { data: s } = await supa.from('Schools').select('school_name').eq('sch_id', SCH_ID).single();
            if(s) document.getElementById('sch-title').innerText = s.school_name;
            
            document.getElementById('f-lin').value = "LIN-" + Math.floor(100000 + Math.random() * 900000);
            refresh();
        }

        async function refresh() {
            const { data } = await supa.from('Students').select('*').eq('sch_id', SCH_ID);
            if(data) {
                document.getElementById('stat-total').innerText = data.length;
                document.getElementById('list-data').innerHTML = data.map(i => `
                    <tr>
                        <td style="color:var(--main); font-weight:800;">${i.name}</td>
                        <td style="font-family:monospace;">${i.lin}</td>
                        <td>${i.class}</td>
                        <td style="font-size:0.7rem; color:#64748b;">${i.location || 'N/A'}</td>
                        <td>${i.health_status || 'NORMAL'}</td>
                        <td><span class="tag">ACTIVE</span></td>
                    </tr>
                `).join('');
            }
        }

        async function save() {
            const btn = document.getElementById('sbtn');
            const payload = {
                sch_id: SCH_ID,
                name: document.getElementById('f-name').value,
                lin: document.getElementById('f-lin').value,
                age: document.getElementById('f-age').value,
                dob: document.getElementById('f-dob').value,
                class: document.getElementById('f-class').value,
                health_status: document.getElementById('f-health').value,
                location: document.getElementById('f-loc').value, // Fixed to 'location'
                contact: document.getElementById('f-tel').value
            };

            if(!payload.name) return alert("ENTER LEARNER NAME");
            btn.innerText = "UPLOADING..."; btn.disabled = true;

            const { error } = await supa.from('Students').insert([payload]);
            if(!error) { alert("SUCCESS"); location.reload(); }
            else { alert(error.message); btn.innerText = "REGISTER"; btn.disabled = false; }
        }

        function nav(v, b) {
            ['v-dash', 'v-reg', 'v-list'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('v-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            b.classList.add('active');
        }

        window.onload = init;
    </script>
</body>
</html>
