<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLIENT PORTAL | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0052cc; --dark: #020617; --bg: #f8fafc; --success: #22c55e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #1e293b; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .top-bar { height: 75px; background: white; border-bottom: 2px solid var(--primary); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; }
        #live-clock { font-size: 0.75rem; font-weight: 800; color: var(--primary); }

        .wrapper { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 260px; background: var(--dark); display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; }
        @media (max-width: 1024px) { .sidebar { position: fixed; height: 100%; transform: translateX(-100%); } .sidebar.open { transform: translateX(0); } }
        
        .nav-item { padding: 18px 25px; color: #94a3b8; cursor: pointer; display: flex; align-items: center; font-weight: 700; border: none; background: none; width: 100%; text-align: left; }
        .nav-item i { width: 30px; font-size: 1.2rem; }
        .nav-item.active { background: var(--primary); color: white; }
        
        .content { flex: 1; overflow-y: auto; padding: 25px; }

        .stat-card { background: white; padding: 25px; border-radius: 20px; border-left: 6px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .glass-card { background: white; border-radius: 25px; padding: 30px; border: 1px solid #e2e8f0; margin-bottom: 25px; }
        
        input, select { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid #cbd5e1; margin-bottom: 15px; font-weight: 600; font-size: 1rem; }
        .btn-pro { background: var(--primary); color: white; padding: 20px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; width: 100%; font-size: 1.1rem; box-shadow: 0 5px 15px rgba(0, 82, 204, 0.3); }
        
        .student-item { background: white; padding: 15px; border-radius: 18px; margin-bottom: 12px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 15px; }
        .st-photo { width: 65px; height: 65px; border-radius: 15px; object-fit: cover; background: #e2e8f0; border: 2px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        .hidden { display: none !important; }
        #auth { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="auth">
        <div style="background:white; padding:50px; border-radius:40px; width:100%; max-width:420px; text-align:center;">
            <h1 style="font-weight:900; color:var(--dark)">ESMS <span style="color:var(--primary)">ELITE</span></h1>
            <p style="font-size:0.8rem; font-weight:800; color:#94a3b8; margin-bottom:30px;">EUDES MEDIA SOLUTIONS</p>
            <input type="text" id="sch-login" placeholder="SCHOOL ACCESS ID" style="text-align:center; text-transform:uppercase;">
            <button class="btn-pro" onclick="verify()">LOAD DATABASE</button>
        </div>
    </div>

    <header class="top-bar">
        <div onclick="document.getElementById('sidebar').classList.toggle('open')" style="cursor:pointer; font-size:1.5rem;"><i class="fas fa-bars"></i></div>
        <div style="text-align:center;">
            <img id="logo" style="height:45px; border-radius:8px; margin-bottom:5px;">
            <div id="live-clock">24/04/2026, 01:01:06</div>
        </div>
        <div id="sch-name-header" style="font-weight:900; color:var(--primary); font-size:0.7rem;"></div>
    </header>

    <div class="wrapper">
        <aside class="sidebar" id="sidebar">
            <nav style="margin-top:30px;">
                <button class="nav-item active" onclick="nav('dash', this)"><i class="fas fa-chart-pie"></i>Dashboard</button>
                <button class="nav-item" onclick="nav('reg', this)"><i class="fas fa-user-plus"></i>Student Enrollment</button>
                <button class="nav-item" onclick="nav('list', this)"><i class="fas fa-address-book"></i>Student Directory</button>
                <button class="nav-item" onclick="nav('fin', this)"><i class="fas fa-wallet"></i>Financials</button>
                <button class="nav-item" onclick="nav('rep', this)"><i class="fas fa-file-contract"></i>Reports</button>
            </nav>
            <div style="margin-top:auto; padding:30px; text-align:center; border-top:1px solid #1e293b;">
                <p style="color:white; font-size:0.7rem; font-weight:800;">EUDES MEDIA</p>
                <p style="color:var(--primary); font-size:0.65rem; font-weight:800;">+256762992440</p>
            </div>
        </aside>

        <main class="content">
            <div id="v-dash">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:30px;">
                    <div class="stat-card"><h2><span id="st-count">0</span></h2><p>Students</p></div>
                    <div class="stat-card"><h2><span id="st-debt" style="color:red">0</span></h2><p>Balance (UGX)</p></div>
                </div>
            </div>

            <div id="v-reg" class="hidden">
                <div class="glass-card">
                    <h3 style="margin-bottom:25px; font-weight:900;">STUDENT REGISTRATION</h3>
                    <input type="hidden" id="f-id">
                    <div style="text-align:center; margin-bottom:20px;">
                        <img id="f-preview" class="st-photo" style="width:120px; height:120px; display:none; margin:0 auto 15px;">
                        <input type="file" id="f-file" accept="image/*" onchange="handlePhoto(this)">
                        <input type="hidden" id="f-img">
                    </div>
                    <input type="text" id="f-name" placeholder="Full Student Name">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                        <input type="number" id="f-age" placeholder="Age">
                        <input type="date" id="f-dob">
                    </div>
                    <select id="f-class">
                        <option>Baby Class</option><option>Middle Class</option><option>Top Class</option>
                        <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                        <option>P.5</option><option>P.6</option><option>P.7</option>
                    </select>
                    <input type="text" id="f-contact" placeholder="Guardian Contact">
                    <input type="text" id="f-loc" placeholder="Physical Location">
                    <input type="text" id="f-health" placeholder="Health Status (health_status)">
                    <input type="number" id="f-fees" placeholder="Total Fees Amount">
                    <button id="save-btn" class="btn-pro" onclick="saveToCloud()">SAVE TO DATABASE</button>
                </div>
            </div>

            <div id="v-list" class="hidden"><div id="master-list"></div></div>
            <div id="v-fin" class="hidden"><div id="finance-list"></div></div>

            <div id="v-rep" class="hidden">
                <div class="glass-card">
                    <select id="rep-cls" onchange="loadRepList()"><option value="">Select Class</option></select>
                    <div id="rep-st-list"></div>
                    <div id="g-panel" class="hidden" style="margin-top:25px; padding-top:25px; border-top:2px dashed #eee;">
                        <h4 id="g-name" style="color:var(--primary); font-weight:900;"></h4>
                        <div id="g-inputs" style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:15px;"></div>
                        <div style="background:var(--dark); color:white; padding:25px; border-radius:25px; text-align:center; margin:20px 0;">
                            <h1 id="res-agg">--</h1><p style="font-size:0.7rem; letter-spacing:2px;">AGGREGATES</p>
                            <h4 id="res-div" style="color:var(--success)"></h4>
                        </div>
                        <button class="btn-pro" onclick="saveReport()">ARCHIVE REPORT</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        let db, activeSch, students = [];

        async function verify() {
            const id = document.getElementById('sch-login').value.toUpperCase().trim();
            db = supabase.createClient(SB_URL, SB_KEY);
            const { data } = await db.from('Schools').select('*').eq('sch_id', id).single();
            if(data) {
                activeSch = id;
                document.getElementById('logo').src = data.logo_url;
                document.getElementById('sch-name-header').innerText = data.school_name;
                document.getElementById('auth').classList.add('hidden');
                refresh();
            } else { alert("ACCESS DENIED: ID NOT FOUND"); }
        }

        async function refresh() {
            const { data } = await db.from('Students').select('*').eq('sch_id', activeSch);
            students = data || [];
            updateUI();
        }

        function handlePhoto(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 300; canvas.height = 300;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, 300, 300);
                    const b64 = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('f-preview').src = b64;
                    document.getElementById('f-preview').style.display = 'block';
                    document.getElementById('f-img').value = b64;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function saveToCloud() {
            const btn = document.getElementById('save-btn');
            btn.innerText = "SAVING..."; btn.disabled = true;

            const ageVal = document.getElementById('f-age').value;
            const feeVal = document.getElementById('f-fees').value;

            const payload = {
                sch_id: activeSch, 
                name: document.getElementById('f-name').value.toUpperCase(),
                age: ageVal ? parseInt(ageVal) : 0, // Fix for BigInt syntax error
                dob: document.getElementById('f-dob').value,
                class: document.getElementById('f-class').value, 
                contact: document.getElementById('f-contact').value,
                location: document.getElementById('f-loc').value, 
                health_status: document.getElementById('f-health').value, // Fixed column name
                total_fees: feeVal ? parseInt(feeVal) : 0, // Fix for BigInt syntax error
                photo_url: document.getElementById('f-img').value
            };

            const id = document.getElementById('f-id').value;
            if(!id) {
                payload.lin = activeSch + "-" + Math.floor(1000 + Math.random()*8999);
                payload.payment_code = "PAY-" + Math.floor(100000 + Math.random()*899999);
            }

            const { error } = id ? await db.from('Students').update(payload).eq('id', id) : await db.from('Students').insert([payload]);
            
            if(!error) {
                alert("SECURELY SAVED TO EUDES MEDIA CLOUD");
                refresh(); nav('list');
                ['f-id','f-name','f-age','f-dob','f-contact','f-loc','f-health','f-fees','f-img'].forEach(f => document.getElementById(f).value="");
                document.getElementById('f-preview').style.display='none';
            } else { alert("DATABASE ERROR: " + error.message); }
            btn.innerText = "SAVE TO DATABASE"; btn.disabled = false;
        }

        function updateUI() {
            let debt = 0;
            students.forEach(s => debt += (Number(s.total_fees || 0) - Number(s.paid_fees || 0)));
            document.getElementById('st-count').innerText = students.length;
            document.getElementById('st-debt').innerText = debt.toLocaleString();
            
            document.getElementById('master-list').innerHTML = students.map(s => `
                <div class="student-item">
                    <img src="${s.photo_url}" class="st-photo">
                    <div style="flex:1"><b>${s.name}</b><br><small>${s.lin} | ${s.class}</small></div>
                    <div style="display:flex; gap:15px;">
                        <i class="fas fa-edit" style="color:var(--primary)" onclick="editS('${s.id}')"></i>
                        <i class="fas fa-trash" style="color:red" onclick="delS('${s.id}')"></i>
                    </div>
                </div>`).join('');

            document.getElementById('finance-list').innerHTML = students.map(s => `
                <div class="student-item">
                    <div style="flex:1"><b>${s.name}</b><br><small>CODE: ${s.payment_code}</small></div>
                    <div style="text-align:right">
                        <small>Bal: ${(s.total_fees - s.paid_fees).toLocaleString()}</small><br>
                        <input type="number" placeholder="Pay" style="width:80px; margin:0; padding:5px;" onchange="updatePay('${s.id}', this.value)">
                    </div>
                </div>`).join('');

            const cls = [...new Set(students.map(s => s.class))].sort();
            document.getElementById('rep-cls').innerHTML = '<option value="">Class</option>' + cls.map(c => `<option>${c}</option>`).join('');
        }

        async function updatePay(id, val) {
            const s = students.find(x => x.id == id);
            await db.from('Students').update({ paid_fees: Number(s.paid_fees || 0) + Number(val) }).eq('id', id);
            refresh();
        }

        function loadRepList() {
            const cls = document.getElementById('rep-cls').value;
            const filtered = students.filter(s => s.class === cls);
            document.getElementById('rep-st-list').innerHTML = filtered.map(s => `<div class="student-item" onclick="openG('${s.id}')" style="cursor:pointer;">${s.name}</div>`).join('');
        }

        async function openG(id) {
            currentSid = id; const s = students.find(x => x.id == id);
            document.getElementById('g-panel').classList.remove('hidden');
            document.getElementById('g-name').innerText = s.name;
            const isP = s.class.includes('P.');
            const subs = isP ? ['English', 'Math', 'SST', 'Science'] : ['Literacy', 'Numeracy', 'Reading', 'Drawing'];
            const { data: rep } = await db.from('Reports').select('*').eq('student_id', id).single();
            document.getElementById('g-inputs').innerHTML = subs.map(sub => `
                <div><label style="font-size:0.6rem; font-weight:800;">${sub}</label>
                <input type="number" class="mk" data-sub="${sub.toLowerCase()}" value="${rep ? rep[sub.toLowerCase()] || '' : ''}" oninput="calcG()"></div>`).join('');
            if(rep) calcG();
        }

        function calcG() {
            let pts = 0, all = true;
            document.querySelectorAll('.mk').forEach(i => {
                if(!i.value) all = false;
                const m = Number(i.value);
                if(m >= 90) pts += 1; else if(m >= 80) pts += 2; else if(m >= 75) pts += 3;
                else if(m >= 70) pts += 4; else if(m >= 60) pts += 5; else if(m >= 50) pts += 6;
                else if(m >= 45) pts += 7; else if(m >= 40) pts += 8; else pts += 9;
            });
            if(!all) return;
            document.getElementById('res-agg').innerText = pts;
            document.getElementById('res-div').innerText = "DIV " + (pts <= 12 ? "1" : pts <= 24 ? "2" : pts <= 28 ? "3" : "U");
        }

        async function saveReport() {
            const m = {}; document.querySelectorAll('.mk').forEach(i => m[i.getAttribute('data-sub')] = Number(i.value));
            await db.from('Reports').upsert({ 
                student_id: currentSid, sch_id: activeSch, ...m, 
                aggregates: parseInt(document.getElementById('res-agg').innerText),
                division: document.getElementById('res-div').innerText
            }, { onConflict: 'student_id' });
            alert("REPORT CARD ARCHIVED");
        }

        function editS(id) {
            const s = students.find(x => x.id == id);
            document.getElementById('f-id').value = s.id;
            document.getElementById('f-name').value = s.name;
            document.getElementById('f-class').value = s.class;
            document.getElementById('f-fees').value = s.total_fees;
            document.getElementById('f-preview').src = s.photo_url;
            document.getElementById('f-preview').style.display = 'block';
            document.getElementById('f-img').value = s.photo_url;
            nav('reg');
        }

        async function delS(id) { if(confirm("DELETE PERMANENTLY?")) { await db.from('Students').delete().eq('id', id); refresh(); } }

        function nav(v, b) {
            ['v-dash', 'v-list', 'v-reg', 'v-fin', 'v-rep'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('v-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(b) b.classList.add('active');
            if(window.innerWidth < 1024) document.getElementById('sidebar').classList.remove('open');
        }
    </script>
</body>
</html>
