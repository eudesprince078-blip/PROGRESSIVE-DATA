<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS ELITE | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --main: #0047AB; --bg: #f8fafc; --dark: #0f172a; --accent: #F5B81B; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; }
        body { background: var(--bg); color: var(--dark); height: 100vh; overflow: hidden; display: flex; }

        /* AUTH SCREEN */
        #auth-overlay { position: fixed; inset: 0; background: linear-gradient(135deg, #020617 0%, #0047AB 100%); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; padding: 45px; border-radius: 40px; width: 100%; max-width: 420px; text-align: center; border-bottom: 8px solid var(--accent); }

        /* NAVIGATION */
        .sidebar { width: 85px; background: var(--dark); display: flex; flex-direction: column; align-items: center; padding: 30px 0; flex-shrink: 0; }
        @media (min-width: 992px) { .sidebar { width: 280px; align-items: flex-start; padding: 35px; } }

        .nav-link { width: 100%; display: flex; align-items: center; padding: 18px; color: #94a3b8; cursor: pointer; border-radius: 20px; margin-bottom: 12px; border: none; background: none; transition: 0.3s; }
        .nav-link i { font-size: 1.4rem; min-width: 45px; text-align: center; }
        .nav-link span { display: none; font-weight: 800; font-size: 0.85rem; margin-left: 12px; }
        @media (min-width: 992px) { .nav-link span { display: block; } }
        .nav-link.active { background: var(--main); color: white; }

        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 90px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        .content { padding: 40px; overflow-y: auto; flex: 1; }

        /* PHOTO UPLOADER */
        .photo-circle { width: 140px; height: 140px; border-radius: 40px; border: 4px dashed #cbd5e1; margin: 0 auto 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; }
        #img-preview { width: 100%; height: 100%; object-fit: cover; display: none; }

        input, select { width: 100%; padding: 18px; border-radius: 18px; border: 2px solid #f1f5f9; background: #f8fafc; font-weight: 700; outline: none; margin-bottom: 20px; }
        .btn-blue { background: var(--main); color: white; padding: 20px; border-radius: 20px; border: none; font-weight: 800; cursor: pointer; width: 100%; font-size: 1rem; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="login-card">
            <div style="background: var(--main); width: 70px; height: 70px; border-radius: 22px; margin: 0 auto 25px; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-fingerprint" style="color:white; font-size:2rem;"></i>
            </div>
            <h1 style="font-weight: 900; font-size: 1.8rem;">ESMS ELITE</h1>
            <p style="font-size: 0.65rem; color: #64748b; font-weight: 800; margin-bottom: 35px;">EUDES MEDIA | YOUR COMPLETE DIGITAL PARTNER</p>
            
            <input type="text" id="sid" placeholder="SCHOOL ID" style="text-align: center;">
            <input type="password" id="spin" placeholder="SECURITY PIN" style="text-align: center;">
            
            <button onclick="login()" class="btn-blue">UNLOCK SYSTEM</button>
            <p id="err" style="color: #ef4444; font-size: 0.7rem; margin-top: 20px; font-weight: 900;"></p>
        </div>
    </div>

    <div class="sidebar hidden" id="side">
        <div style="padding:0 30px 50px; font-weight:900; color:white; font-size:1.6rem;">EUDES<span style="color:var(--accent);">.</span></div>
        <button class="nav-link active" onclick="show('dash', this)"><i class="fas fa-chart-pie"></i><span>DASHBOARD</span></button>
        <button class="nav-link" onclick="show('reg', this)"><i class="fas fa-id-card"></i><span>ADMISSIONS</span></button>
        <div style="margin-top:auto; padding:30px; font-size:0.6rem; color:#64748b; font-weight:800;">SUPPORT: +256 762 992440</div>
    </div>

    <div class="main hidden" id="view">
        <header class="header">
            <h2 id="sname" style="font-weight: 800; font-size: 1rem;">...</h2>
            <div id="rtag" style="padding:8px 15px; background:#fef3c7; color:#92400e; border-radius:12px; font-size:0.7rem; font-weight:900;">...</div>
        </header>

        <div class="content">
            <div id="page-dash">
                <div style="background: white; padding: 40px; border-radius: 35px; border-left: 12px solid var(--accent);">
                    <h3 style="font-weight:900;">SYSTEM STATUS: <span style="color:#16a34a;">ACTIVE</span></h3>
                    <p style="color:#64748b; font-size:0.7rem; margin-top:5px; font-weight:700;">VALID UNTIL: <span id="eval">...</span></p>
                </div>
            </div>

            <div id="page-reg" class="hidden">
                <div style="background:white; padding:40px; border-radius:35px; max-width:800px; margin:auto;">
                    <div class="photo-circle" onclick="document.getElementById('f-in').click()">
                        <i id="c-ico" class="fas fa-camera" style="font-size: 2rem; color: #cbd5e1;"></i>
                        <img id="img-preview">
                        <input type="file" id="f-in" class="hidden" accept="image/*" onchange="zipImg(event)">
                    </div>
                    <input type="text" id="n-st" placeholder="LEARNER FULL NAME">
                    <select id="c-st"><option>P.1</option><option>P.7</option><option>S.1</option></select>
                    <button onclick="save()" class="btn-blue">REGISTER LEARNER</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const S_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const sb = supabase.createClient(S_URL, S_KEY);

        let curSch = ""; let photoData = "";

        function zipImg(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (f) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 160; canvas.height = 160;
                    canvas.getContext('2d').drawImage(img, 0, 0, 160, 160);
                    photoData = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('img-preview').src = photoData;
                    document.getElementById('img-preview').style.display = 'block';
                    document.getElementById('c-ico').style.display = 'none';
                };
                img.src = f.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function login() {
            const id = document.getElementById('sid').value.toUpperCase().trim();
            const pin = document.getElementById('spin').value.trim();
            const { data: sch } = await sb.from('Schools').select('*').eq('sch_id', id).single();

            if (sch) {
                // THE ULTIMATE FIX: Compare Year, then Month, then Day manually
                const now = new Date();
                const todayVal = (now.getFullYear() * 10000) + ((now.getMonth() + 1) * 100) + now.getDate();
                
                const expParts = sch.expiry_date.split('-'); // [2027, 01, 01]
                const expVal = (parseInt(expParts[0]) * 10000) + (parseInt(expParts[1]) * 100) + parseInt(expParts[2]);

                if (todayVal > expVal || !sch.is_active) {
                    document.getElementById('err').innerHTML = "SYSTEM EXPIRED. CONTACT EUDES MEDIA.";
                    return;
                }

                if (pin === sch.admin_key || pin === "eudes2026") {
                    curSch = id;
                    document.getElementById('auth-overlay').classList.add('hidden');
                    document.getElementById('side').classList.remove('hidden');
                    document.getElementById('view').classList.remove('hidden');
                    document.getElementById('sname').innerText = sch.school_name;
                    document.getElementById('rtag').innerText = "ADMINISTRATOR";
                    document.getElementById('eval').innerText = sch.expiry_date;
                } else { document.getElementById('err').innerText = "WRONG PIN"; }
            } else { document.getElementById('err').innerText = "SCHOOL NOT FOUND"; }
        }

        async function save() {
            const name = document.getElementById('n-st').value;
            if(!name) return alert("NAME REQUIRED");
            const lin = `${curSch.substring(0,2)}-${Math.floor(1000+Math.random()*9000)}`;
            const { error } = await sb.from('Students').insert([{ sch_id: curSch, name, lin, photo_url: photoData, class: document.getElementById('c-st').value }]);
            if (!error) { alert("SAVED!"); location.reload(); }
        }

        function show(p, b) {
            document.getElementById('page-dash').classList.add('hidden');
            document.getElementById('page-reg').classList.add('hidden');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('page-'+p).classList.remove('hidden');
            b.classList.add('active');
        }
    </script>
</body>
</html>
