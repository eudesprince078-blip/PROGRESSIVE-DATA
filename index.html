<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS ELITE | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #0052cc; --dark: #0f172a; --bg: #f1f5f9; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--dark); height: 100vh; overflow: hidden; }

        /* --- AUTH SCREEN --- */
        #auth-screen { position: fixed; inset: 0; background: #020617; z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--white); padding: 35px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); }
        .auth-icon { background: var(--primary); width: 60px; height: 60px; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; color: white; font-size: 1.5rem; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #e2e8f0; background: #f8fafc; font-weight: 600; margin-bottom: 15px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); background: white; }
        .btn-pro { background: var(--primary); color: white; padding: 16px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase; letter-spacing: 1px; }

        /* --- MAIN LAYOUT --- */
        .app-shell { display: flex; height: 100vh; width: 100vw; position: relative; }

        /* Sidebar - Hidden by default on Mobile */
        .sidebar { width: 280px; background: #020617; color: white; display: flex; flex-direction: column; height: 100%; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 500; }
        @media (max-width: 900px) { .sidebar { position: absolute; transform: translateX(-100%); } .sidebar.open { transform: translateX(0); } }

        .main-content { flex: 1; display: flex; flex-direction: column; height: 100%; background: var(--bg); position: relative; overflow: hidden; }

        /* --- TOP NAVIGATION --- */
        .header { height: 70px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #e2e8f0; flex-shrink: 0; }
        .menu-btn { font-size: 1.4rem; color: var(--dark); cursor: pointer; display: none; }
        @media (max-width: 900px) { .menu-btn { display: block; } }

        /* --- VIEW PANELS --- */
        .view-container { flex: 1; padding: 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .pro-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* --- FORM GRID --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .field label { font-size: 0.7rem; font-weight: 800; color: #64748b; text-transform: uppercase; display: block; margin-bottom: 6px; }

        /* --- DATA TABLE (RESPONSIVE) --- */
        .table-wrap { overflow-x: auto; background: white; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { text-align: left; padding: 15px; font-size: 0.65rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; border-bottom: 1px solid #f1f5f9; }
        td { padding: 15px; font-weight: 600; font-size: 0.85rem; border-bottom: 1px solid #f8fafc; }
        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 0.65rem; font-weight: 800; background: #ecfdf5; color: #065f46; }

        .hidden { display: none !important; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 400; display: none; }
        .overlay.show { display: block; }
    </style>
</head>
<body>

    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

    <div id="auth-screen">
        <div class="auth-card">
            <div class="auth-icon"><i class="fas fa-fingerprint"></i></div>
            <h2 style="font-weight: 800; margin-bottom: 5px;">ESMS ELITE</h2>
            <p style="font-size: 0.6rem; color: #94a3b8; font-weight: 700; margin-bottom: 25px;">EUDES MEDIA DIGITAL PARTNER</p>
            
            <input type="text" id="sch-id" placeholder="SCHOOL ID (e.g. PM001)" style="text-align:center">
            <input type="password" id="sch-pin" placeholder="ACCESS PIN" style="text-align:center">
            
            <button class="btn-pro" onclick="login()">UNLOCK SYSTEM</button>
            <p id="err" style="color: #ef4444; font-size: 0.7rem; font-weight: 700; margin-top: 15px;"></p>
        </div>
    </div>

    <div class="app-shell hidden" id="app">
        <aside class="sidebar" id="sidebar">
            <div style="padding: 30px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1);">
                <img id="logo" src="" style="max-height: 50px; margin-bottom: 10px;" onerror="this.style.display='none'">
                <h4 id="sch-name" style="font-size: 0.8rem; font-weight: 800;"></h4>
            </div>
            
            <nav style="flex: 1; padding: 20px;">
                <div style="margin-bottom: 10px; cursor: pointer; padding: 12px; border-radius: 10px; background: var(--primary);" onclick="show('list')"><i class="fas fa-list-ul"></i> &nbsp; Learner List</div>
                <div style="margin-bottom: 10px; cursor: pointer; padding: 12px; border-radius: 10px;" onclick="show('reg')"><i class="fas fa-plus-circle"></i> &nbsp; New Entry</div>
            </nav>

            <div style="padding: 25px; background: rgba(0,0,0,0.3); font-size: 0.7rem;">
                <p style="color: #94a3b8; font-weight: 700;">SUPPORT: EUDES MEDIA</p>
                <p style="color: white; font-weight: 800; margin-top: 4px;">+256 762 992440</p>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
                <h3 style="font-weight: 800; font-size: 0.9rem; color: var(--primary);">STUDENT MANAGEMENT</h3>
                <div style="background: #eff6ff; color: #1d4ed8; padding: 6px 12px; border-radius: 8px; font-size: 0.6rem; font-weight: 800;">PRO VERSION</div>
            </header>

            <div class="view-container">
                <div id="v-list">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 15px; gap: 10px;">
                        <input type="text" placeholder="Search by Name or LIN..." style="margin-bottom: 0;" onkeyup="search(this)">
                    </div>
                    <div class="table-wrap pro-card">
                        <table>
                            <thead>
                                <tr><th>LIN No.</th><th>Name</th><th>Age/DOB</th><th>Location</th><th>Health</th><th>Class</th></tr>
                            </thead>
                            <tbody id="data-rows"></tbody>
                        </table>
                    </div>
                </div>

                <div id="v-reg" class="hidden">
                    <div class="pro-card">
                        <h3 style="margin-bottom: 20px; font-weight: 800;">ENROLL NEW LEARNER</h3>
                        <div class="grid">
                            <div class="field"><label>Full Name</label><input type="text" id="f-name"></div>
                            <div class="field"><label>Age</label><input type="number" id="f-age"></div>
                            <div class="field"><label>Date of Birth</label><input type="date" id="f-dob"></div>
                            <div class="field"><label>Physical Location</label><input type="text" id="f-loc"></div>
                            <div class="field"><label>Health Status</label><input type="text" id="f-health" value="GOOD"></div>
                            <div class="field"><label>Student LIN (Auto)</label><input type="text" id="f-lin" readonly style="color:var(--primary)"></div>
                            <div class="field"><label>Contact</label><input type="tel" id="f-tel" value="+256 "></div>
                            <div class="field"><label>Class</label><input type="text" id="f-class" placeholder="e.g. P.7"></div>
                        </div>
                        <button class="btn-pro" onclick="save()">SAVE TO DATABASE</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SB_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        let client, activeSch;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        async function login() {
            const id = document.getElementById('sch-id').value.trim().toUpperCase();
            if(!id) return;
            
            client = supabase.createClient(SB_URL, SB_KEY);
            const { data, error } = await client.from('Schools').select('*').eq('sch_id', id).single();
            
            if(data) {
                activeSch = id;
                document.getElementById('sch-name').innerText = data.school_name;
                document.getElementById('logo').src = data.logo_url;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                genLIN();
                load();
            } else {
                document.getElementById('err').innerText = "INVALID SCHOOL ID";
            }
        }

        function genLIN() {
            document.getElementById('f-lin').value = "PMS-" + Math.floor(Math.random()*9000 + 1000);
        }

        async function load() {
            const { data } = await client.from('Students').select('*').eq('sch_id', activeSch);
            if(data) {
                document.getElementById('data-rows').innerHTML = data.map(s => `
                    <tr>
                        <td style="font-family:monospace; color:var(--primary)">${s.lin}</td>
                        <td style="font-weight:800">${s.name}</td>
                        <td>${s.age} yrs <br><small style="color:#94a3b8">${s.dob}</small></td>
                        <td>${s.location}</td>
                        <td><span class="status-badge">${s.health_status}</span></td>
                        <td>${s.class}</td>
                    </tr>
                `).join('');
            }
        }

        async function save() {
            const entry = {
                sch_id: activeSch,
                name: document.getElementById('f-name').value.toUpperCase(),
                age: document.getElementById('f-age').value,
                dob: document.getElementById('f-dob').value,
                location: document.getElementById('f-loc').value.toUpperCase(),
                health_status: document.getElementById('f-health').value.toUpperCase(),
                lin: document.getElementById('f-lin').value,
                contact: document.getElementById('f-tel').value,
                class: document.getElementById('f-class').value
            };
            await client.from('Students').insert([entry]);
            alert("STUDENT REGISTERED");
            location.reload();
        }

        function show(v) {
            document.getElementById('v-list').classList.toggle('hidden', v !== 'list');
            document.getElementById('v-reg').classList.toggle('hidden', v !== 'reg');
            if(window.innerWidth < 900) toggleMenu();
        }

        function search(i) {
            let q = i.value.toUpperCase();
            document.querySelectorAll('#data-rows tr').forEach(r => {
                r.style.display = r.innerText.toUpperCase().includes(q) ? "" : "none";
            });
        }
    </script>
</body>
</html>
