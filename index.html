<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PMS Professional - Eudes Media</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #0056b3; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; margin: 0; padding: 10px; }
        .box { background: var(--white); padding: 20px; border-radius: 12px; max-width: 950px; margin: 10px auto; border: 1px solid #ddd; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .header { background: var(--blue); color: white; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 15px; }
        
        /* Dashboard Stats */
        .dash { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat { background: white; padding: 15px; border-radius: 10px; text-align: center; border-bottom: 4px solid var(--blue); }
        .stat b { font-size: 24px; color: var(--blue); display: block; }
        .stat span { font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 15px; }
        label { font-size: 11px; font-weight: bold; color: var(--blue); display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        
        .btn-save { background: var(--blue); color: white; padding: 16px; border: none; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-save:disabled { background: #999; }

        .table-area { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 800px; }
        th { background: #f8f9fa; color: var(--blue); padding: 12px; text-align: left; border-bottom: 2px solid #ddd; font-size: 12px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        
        .footer { text-align: center; margin-top: 30px; padding: 15px; font-size: 12px; font-weight: bold; color: #555; border-top: 1px solid #ddd; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loginGate" class="box" style="max-width:350px; margin-top:80px; text-align:center;">
    <h2 style="color:var(--blue)">PMS LOGIN</h2>
    <input id="userIn" placeholder="Username">
    <input id="passIn" type="password" placeholder="Password" style="margin-top:10px;">
    <button onclick="startApp()" class="btn-save" style="margin-top:20px;">ACCESS DATABASE</button>
</div>

<div id="mainApp" class="hidden">
    <div class="header">
        <h2 style="margin:0">PROGRESSIVE SCHOOL MANAGEMENT</h2>
    </div>

    <div class="dash">
        <div class="stat"><span>Total Pupils</span><b id="totalPupils">0</b></div>
        <div class="stat"><span>Active Only</span><b id="activePupils" style="color:#28a745">0</b></div>
        <div class="stat"><span>Filtered Count</span><b id="filteredPupils">0</b></div>
    </div>

    <div class="box">
        <div class="grid">
            <div><label>Full Name</label><input id="pName"></div>
            <div><label>Gender</label><select id="pGender"><option>Male</option><option>Female</option></select></div>
            <div><label>Age</label><input id="pAge" type="number"></div>
            <div><label>Contact Number</label><input id="pPhone"></div>
            <div><label>Location</label><input id="pLoc"></div>
            <div><label>Health Status</label><input id="pHealth" value="Normal"></div>
            <div><label>Class</label>
                <select id="pClass">
                    <option>Baby</option><option>Middle</option><option>Top</option>
                    <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                    <option>P.5</option><option>P.6</option><option>P.7</option>
                </select>
            </div>
            <div><label>Status</label><select id="pStatus"><option value="active">Active</option><option value="left">Left School</option></select></div>
        </div>
        <button onclick="saveRecord()" id="saveBtn" class="btn-save">REGISTER & REFRESH LIST</button>
    </div>

    <div class="box">
        <input type="text" id="searchBox" onkeyup="applyFilter()" placeholder="🔍 Search Name, LIN, or Class (Count updates instantly)...">
        <div class="table-area">
            <table>
                <thead>
                    <tr><th>LIN</th><th>NAME</th><th>GENDER</th><th>CLASS</th><th>LOCATION</th><th>STATUS</th></tr>
                </thead>
                <tbody id="studentTable"></tbody>
            </table>
        </div>
    </div>

    <div class="footer">Eudes Media | +256762992440</div>
</div>

<script>
    const SB_URL = "https://kjftrwuucjdnhfwesrup.supabase.co";
    const SB_KEY = "sb_publishable_1PetUo8klWCLfupRq52CVg_Y_YYrzcO";
    let sbClient = null;
    let localStore = [];

    function startApp() {
        if(document.getElementById('userIn').value.toUpperCase()==="PROGRESSIVE" && document.getElementById('passIn').value.toUpperCase()==="JESUS CARES") {
            document.getElementById('loginGate').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            sbClient = supabase.createClient(SB_URL, SB_KEY);
            loadData(); // Load old students immediately
        } else { alert("Login Denied"); }
    }

    async function loadData() {
        try {
            const { data, error } = await sbClient.from('students').select('*').order('created_at', { ascending: false });
            if(error) throw error;
            if(data) {
                localStore = data;
                updateView(data);
                document.getElementById('totalPupils').innerText = data.length;
                document.getElementById('activePupils').innerText = data.filter(s => s.status === 'active').length;
            }
        } catch (e) {
            console.error(e);
            alert("Table error: Check if 'gender' column exists in Supabase.");
        }
    }

    function updateView(list) {
        let html = "";
        list.forEach(s => {
            html += `<tr>
                <td><b>${s.lin || 'N/A'}</b></td>
                <td>${(s.name || '').toUpperCase()}</td>
                <td>${s.gender || '---'}</td>
                <td>${s.class || '---'}</td>
                <td>${s.location || '---'}</td>
                <td style="font-weight:bold; color:${s.status === 'active' ? '#28a745' : '#dc3545'}">${(s.status || '---').toUpperCase()}</td>
            </tr>`;
        });
        document.getElementById('studentTable').innerHTML = html;
        document.getElementById('filteredPupils').innerText = list.length;
    }

    async function saveRecord() {
        const name = document.getElementById('pName').value.trim();
        if(!name) return alert("Please enter Name");

        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.innerText = "SAVING TO DATABASE...";

        const newLin = "PM" + name.charAt(0).toUpperCase() + "-" + Math.floor(1000 + Math.random() * 9000);

        const { error } = await sbClient.from('students').insert([{
            name: name, gender: document.getElementById('pGender').value,
            age: document.getElementById('pAge').value, contact: document.getElementById('pPhone').value,
            location: document.getElementById('pLoc').value, health_status: document.getElementById('pHealth').value,
            class: document.getElementById('pClass').value, status: document.getElementById('pStatus').value,
            lin: newLin
        }]);

        if(error) {
            alert("Save Error: " + error.message);
        } else {
            alert("Saved Successfully!");
            document.getElementById('pName').value = ""; // Clear form name
            await loadData(); // Reload all students (Old + New)
        }
        btn.disabled = false;
        btn.innerText = "REGISTER & REFRESH LIST";
    }

    function applyFilter() {
        const q = document.getElementById('searchBox').value.toUpperCase();
        const filtered = localStore.filter(s => 
            (s.name && s.name.toUpperCase().includes(q)) || 
            (s.lin && s.lin.toUpperCase().includes(q)) || 
            (s.class && s.class.toUpperCase().includes(q))
        );
        updateView(filtered);
    }
</script>
</body>
</html>
