<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS AUTHORITY | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0047AB; --bg: #f8fafc; --dark: #0f172a; --white: #ffffff; }
        * { box-sizing: border-box; text-transform: uppercase; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); margin: 0; color: #1e293b; }
        
        #login-screen { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: var(--white); padding: 40px; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 2px solid #e2e8f0; font-weight: 700; text-align: center; outline: none; }
        .btn { padding: 16px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; color: white; background: var(--primary); width: 100%; }
        #err { color: #e11d48; font-size: 0.7rem; margin-top: 15px; font-weight: 800; display: none; }

        .header { background: var(--white); padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #e2e8f0; }
        .logo { width: 55px; height: 55px; border-radius: 12px; object-fit: contain; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="color:var(--primary); margin:0;">ESMS AUTHORITY</h1>
            <p style="font-size:0.55rem; color:#64748b; font-weight:800; margin-bottom:25px;">EUDES MEDIA SOLUTIONS</p>
            <input type="text" id="schId" placeholder="SCHOOL ID (PM001)">
            <input type="password" id="schKey" placeholder="ACCESS KEY">
            <button class="btn" onclick="authenticate()">OPEN SYSTEM</button>
            <p id="err"></p>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <div class="header">
            <img src="" id="schLogo" class="logo" onerror="this.src='https://via.placeholder.com/60'">
            <div>
                <h2 id="schName" style="margin:0; font-size: 1.1rem; color: var(--primary);">---</h2>
                <div style="font-size:0.55rem; color:#64748b; font-weight:800;">DASHBOARD ACTIVE</div>
            </div>
        </div>
        <div style="padding:20px; text-align:center;">
            <div style="background:white; padding:30px; border-radius:20px; border:1px solid #e2e8f0;">
                <h2 style="color:var(--primary)">AUTHENTICATED</h2>
                <p>YOU ARE NOW CONNECTED TO THE DATABASE.</p>
                <button class="btn" onclick="location.reload()" style="background:#64748b; width:150px;">LOGOUT</button>
            </div>
        </div>
    </div>

    <script>
        const _URL = 'https://kjftrwuucjdnhfwesrup.supabase.co'; 
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const client = supabase.createClient(_URL, _KEY);

        async function authenticate() {
            const idInput = document.getElementById('schId').value.trim().toUpperCase();
            const keyInput = document.getElementById('schKey').value.trim();
            const errBox = document.getElementById('err');
            
            errBox.style.display = "none";

            try {
                // FIXED: Changed 'sch_id' to 'scho_id' to match your Supabase table
                const { data, error } = await client
                    .from('Schools')
                    .select('*')
                    .eq('scho_id', idInput)
                    .single();

                if (error || !data) {
                    throw new Error("SCHOOL ID NOT FOUND IN DATABASE");
                }

                // Check key (PM2026)
                if (keyInput === data.admin_key || keyInput === data.teacher_key) {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('main-app').style.display = 'block';
                    document.getElementById('schName').innerText = data.school_name;
                    document.getElementById('schLogo').src = data.logo_url || "";
                } else {
                    throw new Error("INVALID ACCESS KEY");
                }

            } catch (e) {
                errBox.style.display = "block";
                errBox.innerText = "⚠️ " + e.message;
            }
        }
    </script>
</body>
</html>
