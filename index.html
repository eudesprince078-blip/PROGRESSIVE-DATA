<style>
    /* New Style for the Master Switch */
    .switch-card { border: 2px solid var(--blue); background: #f0f7ff; }
    .status-indicator { font-size: 10px; font-weight: 900; padding: 4px 10px; border-radius: 10px; margin-left: 10px; }
    .status-auto { background: #ddd; color: #555; }
    .status-locked { background: var(--red); color: white; }
    .status-unlocked { background: var(--green); color: white; }
    .btn-group { display: flex; gap: 5px; margin-top: 10px; }
    .btn-opt { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #ccc; font-size: 10px; font-weight: 800; cursor: pointer; }
    .btn-opt.active { background: var(--blue); color: white; border-color: var(--blue); }
</style>

<div id="adminOverride" class="card switch-card hidden">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <b style="color:var(--blue); font-size:12px;">TEACHER ACCESS CONTROL</b>
        <span id="accessStatus" class="status-indicator status-auto">SYSTEM AUTO</span>
    </div>
    <div class="btn-group">
        <button id="optAuto" class="btn-opt active" onclick="setOverride('AUTO')">SYSTEM AUTO</button>
        <button id="optLock" class="btn-opt" onclick="setOverride('LOCKED')">FORCE LOCK</button>
        <button id="optUnlock" class="btn-opt" onclick="setOverride('UNLOCKED')">FORCE UNLOCK</button>
    </div>
    <p style="font-size:9px; color:#666; margin-top:8px;">* Force Unlock allows teachers access 24/7 (including weekends).</p>
</div>

<script>
    let currentOverride = "AUTO"; // This should be fetched from Supabase settings

    async function setOverride(mode) {
        currentOverride = mode;
        // Update UI
        document.querySelectorAll('.btn-opt').forEach(b => b.classList.remove('active'));
        if(mode === 'AUTO') document.getElementById('optAuto').classList.add('active');
        if(mode === 'LOCKED') document.getElementById('optLock').classList.add('active');
        if(mode === 'UNLOCKED') document.getElementById('optUnlock').classList.add('active');
        
        const status = document.getElementById('accessStatus');
        status.innerText = "MODE: " + mode;
        status.className = "status-indicator status-" + mode.toLowerCase();

        // Save to Supabase so it affects all teachers immediately
        await sb.from('settings').upsert({ id: 2, key: 'teacher_access_mode', value: mode });
    }

    async function gatekeeper() {
        const now = new Date();
        const dateStr = now.toISOString().split('T')[0];
        const day = now.getDay(); 
        const time = now.getHours() * 100 + now.getMinutes();

        // Fetch latest override from database
        const { data } = await sb.from('settings').select('value').eq('key', 'teacher_access_mode').single();
        const mode = data ? data.value : "AUTO";

        if (ROLE === "TEACHER") {
            // 1. Check Manual Force Lock
            if (mode === "LOCKED") {
                alert("The Admin has manually locked the system for all staff.");
                return false;
            }
            
            // 2. If Manual Force Unlock, allow access regardless of time
            if (mode === "UNLOCKED") return true;

            // 3. Fallback to Automatic Rules (The "Auto" Agreement)
            const isHoliday = UG_HOLIDAYS[dateStr] || SPECIAL_CALENDAR[dateStr];
            if (day === 0 || day === 6 || isHoliday) {
                alert("Access Denied: The system is closed for the weekend/holiday.");
                return false;
            }
            if (time >= 1600 || time < 730) {
                alert("Access Denied: System is closed. Teachers access is 7:30 AM - 4:00 PM.");
                return false;
            }
        }
        return true;
    }

    // Update the login and the 1-minute tick to include the gatekeeper check
    setInterval(async () => {
        if (ROLE === "TEACHER") {
            const ok = await gatekeeper();
            if (!ok) location.reload();
        }
    }, 60000); 
</script>
