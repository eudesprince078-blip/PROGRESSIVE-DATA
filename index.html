<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESMS AUTHORITY | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0047AB; --bg: #0f172a; --white: #ffffff; }
        * { box-sizing: border-box; text-transform: uppercase; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: var(--white); padding: 40px; border-radius: 30px; width: 95%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 2px solid #e2e8f0; font-weight: 700; text-align: center; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        .btn { padding: 16px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; color: white; background: var(--primary); width: 100%; }
        #err { color: #e11d48; font-size: 0.7rem; margin-top: 15px; font-weight: 800; display: none; background: #fff1f2; padding: 10px; border-radius: 10px; border: 1px solid #fda4af; }
        #dash { display: none; width: 100%; height: 100vh; background: #f8fafc; flex-direction: column; color: #000; }
        .nav { background: white; padding: 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e2e8f0; }
        .sch-logo { width: 45px; height: 45px; border-radius: 8px; object-fit: contain; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="color:var(--primary); margin:0; font-size: 1.6rem;">ESMS AUTHORITY</h1>
            <p style="font-size:0.55rem; color:#64748b; font-weight:800; margin-bottom:25px;">EUDES MEDIA SOLUTIONS</p>
            
            <input type="text" id="schId" placeholder="SCHOOL ID">
            <input type="password" id="schKey" placeholder="ACCESS KEY">
            <button class="btn" id="loginBtn" onclick="authenticate()">OPEN SYSTEM</button>
            
            <div id="err"></div>
        </div>
    </div>

    <div id="dash">
        <div class="nav">
            <div style="display:flex; align-items:center; gap:15px;">
                <img src="" id="dispLogo" class="sch-logo" onerror="this.src='https://via.placeholder.com/45?text=LOGO'">
                <div>
                    <h2 id="dispName" style="margin:0; font-size: 1rem; color: var(--primary);"></h2>
                    <p id="dispId" style="margin:0; font-size: 0.6rem; font-weight: 800; color: #64748b;"></p>
                </div>
            </div>
            <button onclick="location.reload()" style="background:none; border:1px solid #cbd5e1; padding:8px 15px; border-radius:8px; font-weight:800; cursor:pointer;">LOGOUT</button>
        </div>

        <div style="padding:30px; text-align: center;">
            <div style="background:white; padding:40px; border-radius:24px; border:1px solid #e2e8f0;">
                <h3 style="margin-top:0; color: green;">✅ SYSTEM ACTIVE</h3>
                <p>YOU ARE SECURELY LOGGED IN.</p>
            </div>
        </div>
    </div>

    <script>
        const _URL = 'https://kjftrwuucjdnhfwesrup.supabase.co'; 
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const client = supabase.createClient(_URL, _KEY);

        async function authenticate() {
            const idInput = document.getElementById('schId').value.trim();
            const keyInput = document.getElementById('schKey').value.trim();
            const errBox = document.getElementById('err');
            const btn = document.getElementById('loginBtn');

            errBox.style.display = "none";
            btn.innerText = "CONNECTING...";

            try {
                // DIRECT LOOKUP: Get only the row that matches this ID
                const { data, error } = await client
                    .from('Schools')
                    .select('*')
                    .eq('sch_id', idInput);

                if (error) throw new Error("DATABASE CONNECTION ERROR");
                
                if (!data || data.length === 0) {
                    throw new Error("ID NOT RECOGNIZED IN 'Schools' TABLE");
                }

                const school = data[0];

                // CHECK KEY
                if (keyInput === school.admin_key || keyInput === school.teacher_key) {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('dash').style.display = 'flex';
                    document.getElementById('dispName').innerText = school.school_name;
                    document.getElementById('dispId').innerText = "SCHOOL ID: " + school.sch_id;
                    document.getElementById('dispLogo').src = school.logo_url || "";
                } else {
                    throw new Error("INVALID ACCESS KEY");
                }

            } catch (e) {
                errBox.style.display = "block";
                errBox.innerText = "❌ " + e.message;
                btn.innerText = "OPEN SYSTEM";
            }
        }
    </script>
</body>
</html>
