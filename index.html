<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Progressive Mothers | Master Management V84</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #002d5b; --gold: #ffc107; --white: #ffffff; --light: #f1f4f9; --red: #d90429; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--light); margin: 0; padding: 0; }
        
        /* Premium Header */
        .header { background: var(--blue); color: white; padding: 15px; border-bottom: 5px solid var(--gold); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .hero { background: #001a33; padding: 15px; text-align: center; color: white; border-bottom: 2px solid var(--gold); }
        #clock { font-size: 24px; font-weight: 900; color: var(--gold); }

        /* Navigation */
        .nav-tabs { display: flex; background: white; border-bottom: 2px solid #ddd; position: sticky; top: 75px; z-index: 999; }
        .tab { flex: 1; text-align: center; padding: 15px; font-size: 12px; font-weight: 900; color: #999; cursor: pointer; text-transform: uppercase; }
        .tab.active { color: var(--blue); border-bottom: 4px solid var(--blue); background: #f0f4ff; }

        /* Pupil Display */
        .container { padding: 15px; }
        .search-bar { width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #ddd; margin-bottom: 12px; box-sizing: border-box; font-size: 14px; }
        .pupil-card { background: white; margin-bottom: 12px; padding: 12px; border-radius: 15px; display: flex; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 6px solid var(--blue); position: relative; }
        .pupil-photo { width: 75px; height: 75px; border-radius: 50%; object-fit: cover; margin-right: 15px; border: 3px solid var(--blue); background: #eee; }
        .pupil-info { flex: 1; }
        .pupil-name { font-weight: 900; color: var(--blue); font-size: 14px; text-transform: uppercase; margin-bottom: 3px; }
        .pupil-meta { font-size: 11px; color: #555; font-weight: 700; }
        .lin-tag { background: var(--gold); color: black; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-left: 5px; }

        /* Action Buttons */
        .action-row { display: flex; gap: 8px; margin-top: 10px; }
        .btn-action { flex: 1; padding: 8px; border-radius: 6px; border: none; font-size: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .edit { background: #e9ecef; color: var(--blue); border: 1px solid #dee2e6; }
        .delete { background: #fff5f5; color: var(--red); border: 1px solid #ffc9c9; }

        /* Form Styling */
        .form-box { background: white; padding: 20px; border-radius: 15px; }
        label { font-weight: 900; font-size: 11px; color: var(--blue); display: block; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; font-size: 14px; }
        .btn-save { background: var(--blue); color: white; padding: 18px; border: none; border-radius: 12px; font-weight: 900; width: 100%; cursor: pointer; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="header">
    <div><b>PROGRESSIVE MOTHERS</b><br><span style="font-size:9px; color:var(--gold);">EUDES MEDIA | SYSTEM V84</span></div>
    <button onclick="location.reload()" style="background:var(--red); color:white; border:none; padding:8px 12px; border-radius:6px; font-weight:900; font-size:10px;">REFRESH</button>
</div>

<div class="hero">
    <div id="clock">00:00:00</div>
    <div id="date-text" style="font-size:11px; font-weight:bold; opacity:0.8;"></div>
</div>

<div class="nav-tabs">
    <div class="tab active" id="t-list" onclick="tab('list')">Pupil Ledger</div>
    <div class="tab" id="t-form" onclick="tab('form')">New Admission</div>
</div>

<div id="v-list" class="container">
    <input type="text" id="sb" class="search-bar" placeholder="🔍 Search Name or LIN..." oninput="render()">
    <div id="pupil-container"></div>
</div>

<div id="v-form" class="container hidden">
    <div class="form-box">
        <h3 id="form-head" style="margin-top:0; color:var(--blue);">Student Registration</h3>
        <input type="hidden" id="edit-id">
        
        <label>Full Name</label>
        <input id="in-name" placeholder="Enter Full Name">
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div><label>Class</label>
                <select id="in-cls">
                    <option>P.1</option><option>P.2</option><option>P.3</option><option>P.4</option>
                    <option>P.5</option><option>P.6</option><option>P.7</option>
                </select>
            </div>
            <div><label>LIN Number</label><input id="in-lin" placeholder="e.g. PMA-1234"></div>
        </div>

        <label>Physical Location</label><input id="in-loc" placeholder="Village / Residence">
        <label>Health Status</label><input id="in-health" value="Good">
        
        <label>Upload/Change Photo</label>
        <input type="file" id="in-photo" accept="image/*">
        
        <button class="btn-save" id="save-btn" onclick="saveRecord()">SAVE DATA TO CLOUD</button>
        <button id="cancel-btn" class="hidden" onclick="clearForm()" style="background:none; border:none; color:var(--red); width:100%; margin-top:15px; font-weight:bold; cursor:pointer;">Cancel Edit</button>
    </div>
</div>

<script>
    const S_URL = 'https://kjftrwuucjdnhfwesrup.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
    const _db = supabase.createClient(S_URL, S_KEY);
    const BKT = 'student-photos';
    let pupils = [];

    function start() {
        setInterval(() => {
            const d = new Date();
            document.getElementById('clock').innerText = d.toLocaleTimeString('en-GB');
            document.getElementById('date-text').innerText = d.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' });
        }, 1000);
        fetchData();
    }

    async function fetchData() {
        const { data } = await _db.from('students').select('*').order('name', { ascending: true });
        if(data) { pupils = data; render(); }
    }

    function render() {
        const box = document.getElementById('pupil-container');
        const q = document.getElementById('sb').value.toLowerCase();
        box.innerHTML = "";
        
        pupils.filter(p => p.name.toLowerCase().includes(q) || (p.lin && p.lin.toLowerCase().includes(q))).forEach(p => {
            // Smart Image Pathing
            const imgPath = p['photo-url'] || p['photo_url'] || 'https://via.placeholder.com/100?text=No+Photo';
            
            box.innerHTML += `
                <div class="pupil-card">
                    <img src="${imgPath}" class="pupil-photo" onerror="this.src='https://via.placeholder.com/100?text=Image+Error'">
                    <div class="pupil-info">
                        <div class="pupil-name">${p.name} <span class="lin-tag">${p.lin || 'NEW'}</span></div>
                        <div class="pupil-meta">CLASS: ${p.class} | HEALTH: ${p.health_status || 'Good'}</div>
                        <div class="pupil-meta">LOCATION: ${p.location || 'Unknown'}</div>
                        <div class="action-row">
                            <button class="btn-action edit" onclick="prepEdit('${p.id}')">Edit</button>
                            <button class="btn-action delete" onclick="killRecord('${p.id}', '${p.name}')">Delete</button>
                        </div>
                    </div>
                </div>`;
        });
    }

    function prepEdit(id) {
        const p = pupils.find(x => x.id == id);
        document.getElementById('edit-id').value = p.id;
        document.getElementById('in-name').value = p.name;
        document.getElementById('in-cls').value = p.class;
        document.getElementById('in-lin').value = p.lin || "";
        document.getElementById('in-loc').value = p.location || "";
        document.getElementById('in-health').value = p.health_status || "Good";
        
        document.getElementById('form-head').innerText = "Update Record";
        document.getElementById('save-btn').innerText = "CONFIRM CHANGES";
        document.getElementById('cancel-btn').classList.remove('hidden');
        tab('form');
    }

    function clearForm() {
        document.getElementById('edit-id').value = "";
        document.getElementById('in-name').value = "";
        document.getElementById('in-lin').value = "";
        document.getElementById('in-loc').value = "";
        document.getElementById('form-head').innerText = "Student Registration";
        document.getElementById('save-btn').innerText = "SAVE DATA TO CLOUD";
        document.getElementById('cancel-btn').classList.add('hidden');
    }

    async function killRecord(id, name) {
        if(confirm(`Delete record for ${name}?`)) {
            await _db.from('students').delete().eq('id', id);
            location.reload();
        }
    }

    async function saveRecord() {
        const btn = document.getElementById('save-btn');
        const file = document.getElementById('in-photo').files[0];
        const eid = document.getElementById('edit-id').value;
        
        btn.disabled = true;
        btn.innerText = "SYNCING WITH SUPABASE...";

        let finalUrl = null;
        if(file) {
            const fileName = `img_${Date.now()}.jpg`;
            const { data: uploadInfo } = await _db.storage.from(BKT).upload(fileName, file);
            if(uploadInfo) finalUrl = `${S_URL}/storage/v1/object/public/${BKT}/${fileName}`;
        }

        const row = {
            name: document.getElementById('in-name').value,
            class: document.getElementById('in-cls').value,
            lin: document.getElementById('in-lin').value,
            location: document.getElementById('in-loc').value,
            health_status: document.getElementById('in-health').value
        };
        
        if(finalUrl) { row['photo-url'] = finalUrl; row['photo_url'] = finalUrl; }

        if(eid) {
            await _db.from('students').update(row).eq('id', eid);
        } else {
            await _db.from('students').insert([row]);
        }
        
        location.reload();
    }

    function tab(v) {
        document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
        document.getElementById('v-'+v).classList.remove('hidden');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('t-'+v).classList.add('active');
    }

    start();
</script>
</body>
</html>
