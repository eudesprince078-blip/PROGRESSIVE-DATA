<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESMS AUTHORITY | EUDES MEDIA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0047AB; --danger: #ef4444; --success: #22c55e; --dark: #0f172a; }
        * { box-sizing: border-box; text-transform: uppercase; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; margin: 0; color: #1e293b; }
        .top-nav { background: var(--danger); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-weight: 800; }
        .tab-bar { background: white; display: flex; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 1000; }
        .tab { flex: 1; padding: 15px; text-align: center; font-size: 0.65rem; font-weight: 800; color: #64748b; cursor: pointer; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: #f8fafc; }
        .container { padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        label { display: block; font-size: 0.6rem; font-weight: 800; color: var(--primary); margin-bottom: 5px; }
        input, select { padding: 12px; border-radius: 10px; border: 1px solid #cbd5e1; font-weight: 700; width: 100%; font-family: inherit; }
        .btn { padding: 12px 20px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; color: white; width: 100%; display: block; }
        .btn-edit { background: var(--primary); font-size: 0.6rem; width: auto; padding: 6px 10px; display: inline-block; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { text-align: left; font-size: 0.6rem; color: #94a3b8; padding: 10px; border-bottom: 2px solid #f1f5f9; }
        td { padding: 12px 10px; font-size: 0.8rem; font-weight: 700; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div>ESMS AUTHORITY HUB</div>
        <div style="font-size:0.6rem; opacity:0.8;">EUDES MEDIA | +256762992440</div>
    </div>

    <div class="tab-bar">
        <div class="tab active" id="tab-dash" onclick="showTab('dash')">DASHBOARD</div>
        <div class="tab" id="tab-adm" onclick="showTab('admission')">ADMISSION</div>
    </div>

    <div id="dash" class="tab-content container">
        <div class="card">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>STUDENT NAME</th>
                            <th>CLASS</th>
                            <th>CONTACT</th>
                            <th>FEES EXPECTED</th>
                            <th>STATUS</th>
                            <th>ACTION</th>
                        </tr>
                    </thead>
                    <tbody id="dashBody">
                        <tr><td colspan="6" style="text-align:center; color:#94a3b8;">LOADING DATA...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="admission" class="tab-content container" style="display:none;">
        <div class="card">
            <h3 id="formTitle" style="margin-top:0; color:var(--primary);">NEW REGISTRATION</h3>
            <div class="form-grid">
                <div><label>FULL NAME</label><input type="text" id="inName"></div>
                <div><label>CLASS</label><input type="text" id="inClass"></div>
                <div><label>CONTACT (PARENT)</label><input type="text" id="inContact"></div>
                <div><label>FEES EXPECTED</label><input type="number" id="inExp"></div>
                <div><label>FEES PAID</label><input type="number" id="inPaid"></div>
                <div>
                    <label>STATUS</label>
                    <select id="inStatus">
                        <option value="OWING">OWING</option>
                        <option value="CLEARED">CLEARED</option>
                        <option value="PARTIAL">PARTIAL</option>
                    </select>
                </div>
            </div>
            <button class="btn" style="background:var(--primary); margin-top:20px;" id="saveBtn" onclick="runSave()">SAVE TO DATABASE</button>
            <button class="btn" style="background:#64748b; margin-top:10px; display:none;" id="cancelBtn" onclick="resetForm()">CANCEL EDIT</button>
        </div>
    </div>

    <script>
        const _URL = 'https://kjftrwuucjdnhfwesrup.supabase.co'; 
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnRyd3V1Y2pkbmhmd2VzcnVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc0OTksImV4cCI6MjA4NzM0MzQ5OX0.YAIdcBo2MXs86CrunR2CBM4Uh6RjNbGxIG-E260NfCM';
        const client = supabase.createClient(_URL, _KEY);
        
        let allStudents = [];
        let editTargetId = null;

        async function fetchStudents() {
            try {
                const { data, error } = await client.from('students').select('*').order('name');
                if (error) throw error;
                allStudents = data || [];
                renderTable();
            } catch (err) {
                document.getElementById('dashBody').innerHTML = `<tr><td colspan="6" style="color:red; text-align:center;">ERROR: ${err.message}</td></tr>`;
            }
        }

        function renderTable() {
            const body = document.getElementById('dashBody');
            if (allStudents.length === 0) {
                body.innerHTML = `<tr><td colspan="6" style="text-align:center;">NO RECORDS FOUND</td></tr>`;
                return;
            }
            body.innerHTML = allStudents.map(s => `
                <tr>
                    <td style="color:var(--primary)">${s.name || 'N/A'}</td>
                    <td>${s.class || 'N/A'}</td>
                    <td>${s.contact || s.contact_number || '--'}</td>
                    <td>${(s.fees_expected || 0).toLocaleString()}</td>
                    <td style="color:${s.fees_status === 'CLEARED' ? 'green' : 'red'}">${s.fees_status || 'OWING'}</td>
                    <td><button class="btn btn-edit" onclick="openEditMode('${s.id}')">EDIT</button></td>
                </tr>
            `).join('');
        }

        function showTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display='none');
            document.querySelectorAll('.tab').forEach(c => c.classList.remove('active'));
            document.getElementById(t).style.display='block';
            document.getElementById(t === 'dash' ? 'tab-dash' : 'tab-adm').classList.add('active');
            if(t === 'dash') fetchStudents();
        }

        function openEditMode(id) {
            const s = allStudents.find(x => String(x.id) === String(id));
            if(!s) return alert("Error: Student ID not found in current list.");

            editTargetId = id;
            document.getElementById('inName').value = s.name || "";
            document.getElementById('inClass').value = s.class || "";
            document.getElementById('inContact').value = s.contact || s.contact_number || "";
            document.getElementById('inExp').value = s.fees_expected || "";
            document.getElementById('inPaid').value = s.fees_paid || "";
            document.getElementById('inStatus').value = s.fees_status || "OWING";
            
            document.getElementById('formTitle').innerText = "EDITING: " + (s.name || "STUDENT");
            document.getElementById('saveBtn').innerText = "UPDATE RECORD NOW";
            document.getElementById('cancelBtn').style.display = "block";
            
            showTab('admission');
        }

        async function runSave() {
            const btn = document.getElementById('saveBtn');
            btn.innerText = "WAIT..."; btn.disabled = true;

            const dataObj = {
                name: document.getElementById('inName').value,
                class: document.getElementById('inClass').value,
                contact: document.getElementById('inContact').value,
                fees_expected: document.getElementById('inExp').value,
                fees_paid: document.getElementById('inPaid').value,
                fees_status: document.getElementById('inStatus').value
            };

            let result;
            if(editTargetId) {
                result = await client.from('students').update(dataObj).eq('id', editTargetId);
            } else {
                result = await client.from('students').insert([dataObj]);
            }

            if(!result.error) {
                alert("SUCCESSFUL");
                resetForm();
                showTab('dash');
            } else {
                alert("DATABASE ERROR: " + result.error.message);
            }
            btn.innerText = "SAVE TO DATABASE"; btn.disabled = false;
        }

        function resetForm() {
            editTargetId = null;
            document.querySelectorAll('#admission input').forEach(i => i.value = "");
            document.getElementById('formTitle').innerText = "NEW REGISTRATION";
            document.getElementById('saveBtn').innerText = "SAVE TO DATABASE";
            document.getElementById('cancelBtn').style.display = "none";
        }

        // Initial Load
        fetchStudents();
    </script>
</body>
</html>
